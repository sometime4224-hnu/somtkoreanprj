<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국어 문법 업그레이드: -던</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; }
        .injected-global-nav {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e0e7ff;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 99999;
            box-sizing: border-box;
        }
        .injected-global-nav a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
        .injected-global-nav .divider { color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col max-w-md mx-auto shadow-xl">
    <nav class="injected-global-nav">
        <a href="../index.html"><i class="fa-solid fa-house"></i> 메인으로</a>
        <span class="divider">|</span>
        <a href="index.html"><i class="fa-solid fa-folder-open"></i> 단원 홈</a>
    </nav>

    <header class="bg-white px-5 py-4 border-b border-slate-200 sticky top-[60px] z-20">
        <div class="flex justify-between items-start gap-3">
            <div>
                <p class="text-xs text-indigo-600 font-bold uppercase tracking-wide">Grammar Upgrade</p>
                <h1 class="text-lg font-extrabold text-slate-900 mt-0.5">A/V-던</h1>
                <p class="text-xs text-slate-500 mt-1">1과: 옛날 습관/미완료 회상 표현</p>
            </div>
            <button id="translation-btn" type="button" class="flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-slate-100 text-slate-600 border border-slate-200">
                <i data-lucide="languages" class="w-3 h-3 mr-1"></i>
                <span id="translation-text">Tiếng Việt OFF</span>
            </button>
        </div>
    </header>

    <div class="flex border-b border-slate-200 bg-white sticky top-[139px] z-10">
        <button id="tab-learn" type="button" onclick="setTab('learn')" class="flex-1 py-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50">공부해요</button>
        <button id="tab-practice" type="button" onclick="setTab('practice')" class="flex-1 py-3 text-sm font-semibold text-slate-500">연습해요</button>
    </div>

    <main id="app-content" class="flex-1 p-4 pb-14"></main>

    <script>
        const questionBank = [
            {
                id: "q1", type: "mcq",
                prompt: "내가 ____ 커피가 어디 갔지?",
                promptVi: "Cốc cà phê tôi đang uống dở đâu rồi?",
                options: ["마시던", "마신", "마시는"],
                answer: "마시던",
                explanationKo: "미완료 과거 상황 회상이라 '-던'이 맞아요.",
                explanationVi: "Hành động quá khứ chưa hoàn tất -> dùng '-던'."
            },
            {
                id: "q2", type: "mcq",
                prompt: "어릴 때 ____ 자전거를 아직도 갖고 있어요.",
                promptVi: "Tôi vẫn còn chiếc xe đạp hồi nhỏ hay đi.",
                options: ["타던", "탄", "타는"],
                answer: "타던",
                explanationKo: "과거 반복 습관을 말하므로 '-던'이에요.",
                explanationVi: "Thói quen lặp lại trong quá khứ -> '-던'."
            },
            {
                id: "q3", type: "mcq",
                prompt: "지난주에 ____ 영화는 결말이 슬펐어요.",
                promptVi: "Bộ phim đã xem tuần trước có kết buồn.",
                options: ["보던", "봤던", "보는"],
                answer: "봤던",
                explanationKo: "완료된 경험은 보통 '-았/었던'을 써요.",
                explanationVi: "Kinh nghiệm đã hoàn tất thường dùng '-았/었던'."
            },
            {
                id: "q4", type: "mcq",
                prompt: "요즘 아침마다 ____ 빵집이 오늘은 닫았네요.",
                promptVi: "Tiệm bánh tôi thường đi dạo này hôm nay đóng cửa.",
                options: ["가던", "갔던", "가는"],
                answer: "가는",
                explanationKo: "'요즘'은 현재 습관이므로 '-는'이 자연스러워요.",
                explanationVi: "'요즘' là thói quen hiện tại nên dùng '-는'."
            },
            {
                id: "q5", type: "fill",
                prompt: "엄마가 젊을 때 ____ 코트예요. (입다)",
                promptVi: "Đây là chiếc áo mẹ từng mặc lúc trẻ.",
                answers: ["입던"], hint: "입...",
                explanationKo: "과거의 상태/습관 회상이므로 '입던'이 맞아요.",
                explanationVi: "Hồi tưởng quá khứ -> '입던'."
            },
            {
                id: "q6", type: "fill",
                prompt: "제가 어젯밤에 ____ 책인데 아직 끝까지 못 읽었어요. (읽다)",
                promptVi: "Đó là cuốn sách tôi đọc tối qua nhưng chưa đọc hết.",
                answers: ["읽던"], hint: "읽...",
                explanationKo: "미완료 행동이라 '읽던'이 맞아요.",
                explanationVi: "Hành động chưa hoàn tất -> '읽던'."
            }
        ];

        const KEY = "c10.grammar1.upgraded.v2";

        function loadPref() {
            try {
                return JSON.parse(localStorage.getItem(KEY) || "{}");
            } catch (e) {
                return {};
            }
        }

        function savePref(data) {
            try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) {}
        }

        function shuffle(arr) {
            const copied = [...arr];
            for (let i = copied.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [copied[i], copied[j]] = [copied[j], copied[i]];
            }
            return copied;
        }

        function cloneQuestions(pool) {
            return shuffle(pool).map((q) => ({ ...q, options: q.options ? [...q.options] : undefined, answers: q.answers ? [...q.answers] : undefined }));
        }

        function createQuiz(pool, modeLabel = "전체 문제") {
            return {
                modeLabel,
                questions: cloneQuestions(pool),
                index: 0,
                score: 0,
                selected: "",
                showResult: false,
                showHint: false,
                finished: false,
                mistakes: []
            };
        }

        const pref = loadPref();
        const state = {
            activeTab: "learn",
            showVi: Boolean(pref.showVi),
            best: pref.best || { score: 0, total: questionBank.length, percent: 0 },
            quiz: createQuiz(questionBank)
        };

        function viClass() { return state.showVi ? "block" : "hidden"; }
        function norm(v) { return String(v || "").replace(/\s+/g, "").trim(); }
        function currentQ() { return state.quiz.questions[state.quiz.index]; }

        function setTab(tab) { state.activeTab = tab; render(); }

        function toggleTranslation() {
            state.showVi = !state.showVi;
            savePref({ showVi: state.showVi, best: state.best });
            render();
        }

        function chooseOption(option) {
            const quiz = state.quiz;
            const q = currentQ();
            if (!q || q.type !== "mcq" || quiz.showResult || quiz.finished) return;

            quiz.selected = option;
            quiz.showResult = true;
            if (option === q.answer) {
                quiz.score += 1;
            } else {
                quiz.mistakes.push({ question: q, userAnswer: option });
            }
            render();
        }

        function submitFill() {
            const quiz = state.quiz;
            const q = currentQ();
            if (!q || q.type !== "fill" || quiz.showResult || quiz.finished) return;

            const input = document.getElementById("fill-input");
            const value = input ? input.value : "";
            if (!norm(value)) return;

            quiz.selected = value;
            quiz.showResult = true;
            const ok = q.answers.some((a) => norm(a) === norm(value));
            if (ok) {
                quiz.score += 1;
            } else {
                quiz.mistakes.push({ question: q, userAnswer: value });
            }
            render();
        }

        function toggleHint() {
            if (state.quiz.showResult || state.quiz.finished) return;
            state.quiz.showHint = !state.quiz.showHint;
            render();
        }

        function nextQuestion() {
            const quiz = state.quiz;
            if (!quiz.showResult) return;

            quiz.selected = "";
            quiz.showResult = false;
            quiz.showHint = false;

            if (quiz.index < quiz.questions.length - 1) {
                quiz.index += 1;
            } else {
                quiz.finished = true;
                updateBest();
            }
            render();
        }

        function updateBest() {
            const quiz = state.quiz;
            const percent = Math.round((quiz.score / quiz.questions.length) * 100);
            if (
                percent > state.best.percent ||
                (percent === state.best.percent && quiz.questions.length >= state.best.total && quiz.score > state.best.score)
            ) {
                state.best = { score: quiz.score, total: quiz.questions.length, percent };
                savePref({ showVi: state.showVi, best: state.best });
            }
        }

        function restartQuiz() {
            state.quiz = createQuiz(questionBank);
            render();
        }

        function retryWrong() {
            const unique = [];
            const seen = new Set();
            state.quiz.mistakes.forEach((m) => {
                if (!seen.has(m.question.id)) {
                    seen.add(m.question.id);
                    unique.push(m.question);
                }
            });
            if (!unique.length) return;
            state.quiz = createQuiz(unique, "오답 다시 풀기");
            render();
        }

        function renderLearn() {
            const vi = viClass();
            return `
                <div class="space-y-4">
                    <section class="bg-gradient-to-br from-indigo-50 to-white border border-indigo-100 rounded-2xl p-5 shadow-sm">
                        <h2 class="text-2xl font-black text-indigo-700">A/V-던</h2>
                        <p class="text-sm font-semibold text-slate-700 mt-1">과거에 자주 했던 일, 하다가 멈춘 일을 떠올릴 때</p>
                        <p class="text-xs text-indigo-600 mt-1 ${vi}">Dùng để hồi tưởng thói quen quá khứ hoặc hành động dang dở</p>

                        <div class="mt-4 bg-white border border-indigo-100 rounded-xl p-3">
                            <p class="text-xs font-bold text-slate-500">학습 전략 (효과 강화)</p>
                            <ol class="mt-2 text-sm text-slate-700 list-decimal pl-5 space-y-1">
                                <li>핵심 의미를 먼저 이해하기</li>
                                <li>-던 / -았(었)던 / -는 비교로 구별하기</li>
                                <li>즉시 피드백 + 오답 재풀이로 기억 고정하기</li>
                            </ol>
                        </div>
                    </section>

                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <h3 class="font-bold text-slate-800 flex items-center">
                            <i data-lucide="split-square-horizontal" class="w-4 h-4 mr-2 text-indigo-600"></i>
                            헷갈림 비교
                        </h3>
                        <div class="mt-3 overflow-x-auto">
                            <table class="w-full text-sm border-collapse">
                                <thead>
                                    <tr class="bg-slate-100">
                                        <th class="text-left p-2 border border-slate-200">형태</th>
                                        <th class="text-left p-2 border border-slate-200">의미</th>
                                        <th class="text-left p-2 border border-slate-200">예시</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-indigo-700">-던</td>
                                        <td class="p-2 border border-slate-200">
    <p>과거 반복/미완료 회상</p>
    <p class="text-[11px] leading-4 text-indigo-600 mt-1 break-words ${vi}">Thói quen lặp lại trong quá khứ / hành động chưa hoàn tất</p>
</td>
                                        <td class="p-2 border border-slate-200">내가 읽던 책</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-sky-700">-았/었던</td>
                                        <td class="p-2 border border-slate-200">
    <p>완료된 과거 경험</p>
    <p class="text-[11px] leading-4 text-indigo-600 mt-1 break-words ${vi}">Kinh nghiệm quá khứ đã hoàn tất</p>
</td>
                                        <td class="p-2 border border-slate-200">어제 봤던 영화</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-emerald-700">-는</td>
                                        <td class="p-2 border border-slate-200">
    <p>현재 습관/일반 사실</p>
    <p class="text-[11px] leading-4 text-indigo-600 mt-1 break-words ${vi}">Thói quen hiện tại / sự thật chung</p>
</td>
                                        <td class="p-2 border border-slate-200">요즘 읽는 책</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <section class="bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm">
                        <h3 class="font-bold text-amber-900 flex items-center">
                            <i data-lucide="brain" class="w-4 h-4 mr-2"></i>
                            미니 인출 연습
                        </h3>
                        <p class="text-xs text-amber-700 mt-1">먼저 머릿속으로 답한 뒤 펼쳐보세요.</p>
                        <div class="mt-3 space-y-2">
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">어릴 때 자주 ____ 골목 (뛰어놀다)</summary>
                                <p class="text-sm mt-2">정답: <b>뛰어놀던</b></p>
                            </details>
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">지난주에 ____ 공연 (보다, 완료)</summary>
                                <p class="text-sm mt-2">정답: <b>봤던</b></p>
                            </details>
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">요즘 매일 ____ 뉴스 (보다)</summary>
                                <p class="text-sm mt-2">정답: <b>보는</b></p>
                            </details>
                        </div>
                    </section>
                </div>
            `;
        }

        function renderPractice() {
            const quiz = state.quiz;
            const vi = viClass();

            if (quiz.finished) {
                const percent = Math.round((quiz.score / quiz.questions.length) * 100);
                const mistakes = quiz.mistakes.length
                    ? quiz.mistakes.map((m, i) => `
                        <li class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs">
                            <p class="font-semibold">${i + 1}. ${m.question.prompt}</p>
                            <p class="mt-1">내 답: <b>${m.userAnswer}</b></p>
                            <p>정답: <b>${m.question.type === 'mcq' ? m.question.answer : m.question.answers[0]}</b></p>
                            <p class="mt-1">${m.question.explanationKo}</p>
                        </li>
                    `).join("")
                    : `<li class="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-xs text-emerald-700">오답이 없습니다. 훌륭해요!</li>`;

                return `
                    <div class="space-y-4">
                        <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center">
                            <div class="w-16 h-16 rounded-full bg-indigo-100 mx-auto flex items-center justify-center text-indigo-600">
                                <i data-lucide="trophy" class="w-8 h-8"></i>
                            </div>
                            <h2 class="text-xl font-black text-slate-800 mt-3">${quiz.score} / ${quiz.questions.length}</h2>
                            <p class="text-sm text-slate-600 mt-1">정답률 ${percent}%</p>
                            <p class="text-xs text-slate-500 mt-1">최고 기록: ${state.best.score}/${state.best.total} (${state.best.percent}%)</p>
                            <p class="text-xs text-indigo-600 mt-1 ${vi}">Best score: ${state.best.percent}%</p>
                            <div class="grid gap-2 mt-4">
                                <button onclick="restartQuiz()" class="w-full bg-indigo-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-indigo-700">처음부터 다시</button>
                                <button onclick="retryWrong()" ${quiz.mistakes.length ? "" : "disabled"} class="w-full border border-slate-300 rounded-lg py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100 disabled:opacity-50">오답만 다시 풀기</button>
                            </div>
                        </section>
                        <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-3">오답 노트</h3>
                            <ul class="space-y-2">${mistakes}</ul>
                        </section>
                    </div>
                `;
            }

            const q = currentQ();
            const progress = Math.round(((quiz.showResult ? quiz.index + 1 : quiz.index) / quiz.questions.length) * 100);
            const isCorrect = q.type === "mcq"
                ? quiz.selected === q.answer
                : q.answers.some((a) => norm(a) === norm(quiz.selected));

            const options = q.type === "mcq" ? q.options.map((opt) => {
                let style = "border-slate-200 hover:border-indigo-300 hover:bg-indigo-50";
                let icon = "";
                if (quiz.showResult) {
                    if (opt === q.answer) { style = "border-emerald-500 bg-emerald-50 text-emerald-700"; icon = "<i data-lucide='check' class='w-4 h-4 text-emerald-600'></i>"; }
                    else if (opt === quiz.selected) { style = "border-rose-400 bg-rose-50 text-rose-700"; icon = "<i data-lucide='x' class='w-4 h-4 text-rose-600'></i>"; }
                    else { style = "border-slate-200 text-slate-400"; }
                }
                return `<button onclick="chooseOption('${opt}')" ${quiz.showResult ? "disabled" : ""} class="w-full border-2 rounded-lg px-4 py-3 text-left font-semibold mb-2 flex justify-between items-center ${style}"><span>${opt}</span>${icon}</button>`;
            }).join("") : `
                <label for="fill-input" class="text-xs font-semibold text-slate-500">정답 입력</label>
                <input id="fill-input" type="text" autocomplete="off" ${quiz.showResult ? "disabled" : ""} class="w-full mt-1 border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="예: 읽던" onkeydown="if(event.key==='Enter'){submitFill();}">
                <div class="flex gap-2 mt-3">
                    <button onclick="submitFill()" ${quiz.showResult ? "disabled" : ""} class="flex-1 bg-indigo-600 text-white rounded-lg py-2.5 text-sm font-semibold">정답 확인</button>
                    <button onclick="toggleHint()" ${quiz.showResult ? "disabled" : ""} class="px-3 border border-slate-300 rounded-lg text-sm font-semibold text-slate-600">힌트</button>
                </div>
                <p class="text-xs text-amber-700 mt-2 ${quiz.showHint ? "block" : "hidden"}">힌트: ${q.hint || "-"}</p>
            `;

            const feedback = quiz.showResult ? `
                <div class="mt-4 rounded-xl border p-4 ${isCorrect ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200"}">
                    <p class="text-sm font-bold ${isCorrect ? "text-emerald-700" : "text-rose-700"}">${isCorrect ? "정답입니다!" : "오답입니다. 근거를 확인하세요."}</p>
                    <p class="text-xs text-slate-600 mt-2">내 답: <b>${quiz.selected}</b></p>
                    <p class="text-xs text-slate-700 mt-1">정답: <b>${q.type === "mcq" ? q.answer : q.answers[0]}</b></p>
                    <p class="text-sm text-slate-700 mt-3">${q.explanationKo}</p>
                    <p class="text-xs text-indigo-600 mt-1 ${vi}">${q.explanationVi}</p>
                    <button onclick="nextQuestion()" class="mt-4 w-full bg-indigo-600 text-white rounded-lg py-2.5 text-sm font-semibold">다음 문제</button>
                </div>
            ` : "";

            return `
                <div class="space-y-4">
                    <section class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 shadow-sm">
                        <h2 class="text-sm font-bold text-indigo-700">전략 기반 연습</h2>
                        <p class="text-xs text-slate-600 mt-1">즉시 피드백과 오답 재풀이로 기억을 고정합니다.</p>
                    </section>

                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-indigo-600">${quiz.modeLabel}</span>
                            <span class="text-xs text-slate-500">문제 ${quiz.index + 1}/${quiz.questions.length}</span>
                        </div>
                        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-indigo-500" style="width: ${progress}%;"></div></div>
                        <p class="text-xs text-slate-500 mt-1">점수 ${quiz.score}점</p>

                        <div class="mt-4 bg-slate-50 border border-slate-200 rounded-xl p-4">
                            <p class="text-sm font-semibold text-slate-800">${q.prompt}</p>
                            <p class="text-xs text-indigo-600 mt-1 ${vi}">${q.promptVi}</p>
                        </div>

                        <div class="mt-4">${options}</div>
                        ${feedback}
                    </section>
                </div>
            `;
        }

        function render() {
            const content = document.getElementById("app-content");
            const tabLearn = document.getElementById("tab-learn");
            const tabPractice = document.getElementById("tab-practice");
            const transBtn = document.getElementById("translation-btn");
            const transText = document.getElementById("translation-text");

            if (state.activeTab === "learn") {
                tabLearn.className = "flex-1 py-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50";
                tabPractice.className = "flex-1 py-3 text-sm font-semibold text-slate-500";
                content.innerHTML = renderLearn();
            } else {
                tabPractice.className = "flex-1 py-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50";
                tabLearn.className = "flex-1 py-3 text-sm font-semibold text-slate-500";
                content.innerHTML = renderPractice();
            }

            if (state.showVi) {
                transBtn.className = "flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-indigo-100 text-indigo-700 border border-indigo-200";
                transText.textContent = "Tiếng Việt ON";
            } else {
                transBtn.className = "flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-slate-100 text-slate-600 border border-slate-200";
                transText.textContent = "Tiếng Việt OFF";
            }

            lucide.createIcons();

            if (state.activeTab === "practice") {
                const q = currentQ();
                if (q && q.type === "fill" && !state.quiz.showResult) {
                    const input = document.getElementById("fill-input");
                    if (input) input.focus();
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("translation-btn").addEventListener("click", toggleTranslation);
            render();
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
