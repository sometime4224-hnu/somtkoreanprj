            },

            },
            {
                id: "g2_05",
                grammar: "-잖아요",
                type: "mcq",

                answer: "죠",
                explainKo: "이 문장은 상대 동의를 묻는 질문이므로 확인 질문형 '-죠?'가 가장 자연스럽습니다.",

            },
            {

                options: ["잖아요", "거든요", "죠"],

            },
            {
                id: "g2_07",
                grammar: "-잖아요",
                type: "short",
                prompt: "한국 드라마 ____ 다들 많이 보잖아요. (재미있다)",
                contextKo: "상황: 한국 드라마가 재미있다는 공감대를 다시 확인하는 장면",
                contextVi: "Tình huống: nhắc lại sự đồng thuận rằng phim Hàn rất thú vị",
                answers: ["재미있잖아요"],
                placeholder: "정답 입력",
                explainKo: "형용사 어간 '재미있-' 뒤에 '-잖아요'를 붙여 공유된 평가를 상기합니다.",
                explainVi: "Thêm '-잖아요' sau gốc tính từ '재미있-' để nhắc lại đánh giá chung đã biết."
            }
        ];

        const state = {
            view: "start",
            quiz: {
                questions: [],
                index: 0,
                answers: [],
                startedAt: 0,
                submitted: false,
                currentFeedback: null
            },
            selectedRecordId: null
        };

        function esc(value) {
            return String(value == null ? "" : value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalize(text) {
            return String(text || "").replace(/\s+/g, "").trim();
        }

        function shuffle(list) {
            const arr = [...list];
            for (let i = arr.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadHistory() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (err) {
                return [];
            }
        }

        function saveHistory(history) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            } catch (err) {
                // ignore
            }
        }

        function formatDate(iso) {
            try {
                const d = new Date(iso);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, "0");
                const day = String(d.getDate()).padStart(2, "0");
                const hh = String(d.getHours()).padStart(2, "0");
                const mm = String(d.getMinutes()).padStart(2, "0");
                return `${y}-${m}-${day} ${hh}:${mm}`;
            } catch (err) {
                return iso;
            }
        }

        function bestRecord(history) {
            if (!history.length) return null;
            return history.reduce((best, cur) => {
                if (cur.percent > best.percent) return cur;
                if (cur.percent === best.percent && cur.score > best.score) return cur;
                return best;
            }, history[0]);
        }

        function currentQuestion() {
            return state.quiz.questions[state.quiz.index] || null;
        }

        function startQuiz() {
            state.quiz.questions = shuffle(QUESTION_BANK);
            state.quiz.index = 0;
            state.quiz.answers = [];
            state.quiz.startedAt = Date.now();
            state.quiz.submitted = false;
            state.quiz.currentFeedback = null;
            state.view = "quiz";
            state.selectedRecordId = null;
            render();
            focusShortInput();
        }

        function goStart() {
            state.view = "start";
            state.selectedRecordId = null;
            render();
        }

        function openRecord(id) {
            state.view = "result";
            state.selectedRecordId = id;
            render();
        }

        function restartFromResult() {
            startQuiz();
        }

        function evaluate(q, userAnswer) {
            if (q.type === "mcq") {
                return userAnswer === q.answer;
            }
            const normalizedUser = normalize(userAnswer);
            return q.answers.some((ans) => normalize(ans) === normalizedUser);
        }

        function submitMcq(choiceIndex) {
            const q = currentQuestion();
            if (!q || q.type !== "mcq" || state.quiz.submitted) return;
            const selected = q.options[choiceIndex];
            submitAnswer(selected);
        }

        function submitShort() {
            const q = currentQuestion();
            if (!q || q.type !== "short" || state.quiz.submitted) return;
            const input = document.getElementById("short-answer");
            if (!input) return;
            const value = input.value.trim();
            if (!value) return;
            submitAnswer(value);
        }

        function submitAnswer(rawAnswer) {
            const q = currentQuestion();
            if (!q || state.quiz.submitted) return;

            const isCorrect = evaluate(q, rawAnswer);
            const answerRecord = {
                id: q.id,
                grammar: q.grammar,
                prompt: q.prompt,
                type: q.type,
                userAnswer: String(rawAnswer || ""),
                correctAnswer: q.type === "mcq" ? q.answer : q.answers[0],
                isCorrect,
                explainKo: q.explainKo,
                explainVi: q.explainVi,
                nonTargetKo: q.nonTargetKo || "",
                nonTargetVi: q.nonTargetVi || ""
            };

            state.quiz.answers.push(answerRecord);
            state.quiz.currentFeedback = answerRecord;
            state.quiz.submitted = true;
            render();
        }

        function nextInQuiz() {
            if (!state.quiz.submitted) return;

            if (state.quiz.index < state.quiz.questions.length - 1) {
                state.quiz.index += 1;
                state.quiz.submitted = false;
                state.quiz.currentFeedback = null;
                render();
                focusShortInput();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            const total = state.quiz.answers.length;
            const score = state.quiz.answers.filter((a) => a.isCorrect).length;
            const percent = total ? Math.round((score / total) * 100) : 0;
            const durationSec = Math.max(1, Math.round((Date.now() - state.quiz.startedAt) / 1000));

            const attempt = {
                id: `rec-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                completedAt: new Date().toISOString(),
                score,
                total,
                percent,
                durationSec,
                answers: state.quiz.answers
            };

            const history = loadHistory();
            history.unshift(attempt);
            if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
            saveHistory(history);

            state.selectedRecordId = attempt.id;
            state.view = "result";
            render();
        }

        function resultById(id) {
            const history = loadHistory();
            return history.find((h) => h.id === id) || null;
        }

        function focusShortInput() {
            const q = currentQuestion();
            if (!q || q.type !== "short" || state.quiz.submitted) return;
            const input = document.getElementById("short-answer");
            if (input) input.focus();
        }

        function renderStart() {
            const history = loadHistory();
            const best = bestRecord(history);

            const historyHtml = history.length
                ? history.map((r, idx) => `
                    <button type="button" onclick="openRecord('${r.id}')" class="record-btn w-full border border-slate-200 bg-white rounded-xl px-3 py-2 text-left hover:border-blue-300 transition">
                        <p class="text-xs text-slate-500">${idx + 1}회차 · ${formatDate(r.completedAt)}</p>
                        <p class="text-sm font-bold text-slate-800 mt-0.5">${r.score}/${r.total} (${r.percent}%)</p>
                    </button>
                `).join("")
                : `<p class="text-sm text-slate-500">아직 응시 기록이 없습니다.</p>`;

            return `
                <section class="space-y-4">
                    <div class="bg-gradient-to-br from-blue-50 to-white border border-blue-100 rounded-2xl p-5 shadow-sm">
                        <h1 class="text-xl font-black text-blue-700 safe-wrap">문법 1+2 통합 퀴즈</h1>
                        <p class="text-sm text-slate-700 mt-2">-던 / -잖아요를 섞어 연습합니다.</p>
                        <p class="text-xs text-slate-500 mt-1">각 문항은 정오답 피드백을 먼저 확인한 뒤 다음 버튼으로 진행합니다.</p>
                        <div class="mt-4 grid grid-cols-2 gap-2 text-xs">
                            <div class="bg-white border border-blue-100 rounded-lg p-2">
                                <p class="text-slate-500">문항 수</p>
                                <p class="font-bold text-slate-800">${QUESTION_BANK.length}문항</p>
                            </div>
                            <div class="bg-white border border-blue-100 rounded-lg p-2">
                                <p class="text-slate-500">최고 기록</p>
                                <p class="font-bold text-slate-800">${best ? `${best.score}/${best.total} (${best.percent}%)` : "없음"}</p>
                            </div>
                        </div>
                        <a href="grammar12-quiz-warmup.html" class="mt-4 w-full border border-blue-300 text-blue-700 bg-blue-50 py-2.5 rounded-xl font-bold text-sm text-center no-underline block">O/X 워밍업 먼저 하기</a>
                        <button type="button" onclick="startQuiz()" class="mt-2 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700">
                            퀴즈 시작
                        </button>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <h2 class="text-sm font-bold text-slate-800 mb-3">과거 응시 기록</h2>
                        <div class="space-y-2">${historyHtml}</div>
                    </div>
                </section>
            `;
        }

        function renderQuiz() {
            const q = currentQuestion();
            if (!q) return "";

            const idx = state.quiz.index + 1;
            const total = state.quiz.questions.length;
            const progress = Math.round((idx / total) * 100);
            const submitted = state.quiz.submitted;
            const fb = state.quiz.currentFeedback;

            const choicesHtml = q.type === "mcq"
                ? q.options.map((opt, i) => {
                    let cls = "border-slate-300 bg-white text-slate-800 hover:border-blue-400 hover:bg-blue-50";
                    if (submitted && fb) {
                        if (opt === fb.correctAnswer) {
                            cls = "border-emerald-400 bg-emerald-50 text-emerald-800";
                        } else if (opt === fb.userAnswer && !fb.isCorrect) {
                            cls = "border-rose-400 bg-rose-50 text-rose-800";
                        } else {
                            cls = "border-slate-200 bg-slate-50 text-slate-400";
                        }
                    }
                    return `
                        <button type="button" onclick="submitMcq(${i})" ${submitted ? "disabled" : ""}
                            class="option-btn w-full border rounded-xl px-4 py-3 text-left text-sm font-semibold transition safe-wrap ${cls}">
                            ${esc(opt)}
                        </button>
                    `;
                }).join("")
                : `
                    <div class="space-y-2">
                        <input id="short-answer" type="text" autocomplete="off" ${submitted ? "disabled" : ""}
                            placeholder="${esc(q.placeholder || "정답 입력")}" onkeydown="if(event.key==='Enter'){submitShort();}"
                            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 ${submitted ? "bg-slate-100 text-slate-500" : ""}">
                        <button type="button" onclick="submitShort()" ${submitted ? "disabled" : ""}
                            class="w-full py-3 rounded-xl font-bold text-sm ${submitted ? "bg-slate-300 text-slate-500" : "bg-blue-600 text-white hover:bg-blue-700"}">
                            정답 확인
                        </button>
                    </div>
                `;

            const feedbackHtml = submitted && fb ? `
                <div class="mt-4 rounded-xl border p-4 ${fb.isCorrect ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200"}">
                    <p class="text-sm font-bold ${fb.isCorrect ? "text-emerald-700" : "text-rose-700"}">
                        ${fb.isCorrect ? "정답입니다." : "오답입니다."}
                        <span class="text-xs ml-1">(${fb.isCorrect ? "Bạn làm đúng." : "Bạn làm sai."})</span>
                    </p>
                    <p class="text-xs text-slate-700 mt-2"><b>내 답:</b> ${esc(fb.userAnswer || "(무응답)")}</p>
                    <p class="text-xs text-slate-700 mt-1"><b>정답:</b> ${esc(fb.correctAnswer)}</p>
                    <p class="text-xs text-slate-700 mt-2 safe-wrap"><b>설명 (KO):</b> ${esc(fb.explainKo || "")}</p>
                    <p class="text-xs text-blue-700 mt-1 safe-wrap"><b>Giải thích (VI):</b> ${esc(fb.explainVi || "")}</p>
                    ${fb.nonTargetKo ? `
                        <div class="mt-3 rounded-lg border border-amber-200 bg-amber-50 p-3">
                            <p class="text-xs font-bold text-amber-800">학습 범위 보충</p>
                            <p class="text-xs text-slate-700 mt-1 safe-wrap"><b>KO:</b> ${esc(fb.nonTargetKo)}</p>
                            <p class="text-xs text-blue-700 mt-1 safe-wrap"><b>VI:</b> ${esc(fb.nonTargetVi || "")}</p>
                        </div>
                    ` : ""}
                </div>
            ` : "";

            return `
                <section class="space-y-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <div class="flex items-center justify-between text-xs">
                            <span class="font-bold text-blue-600">${idx} / ${total}</span>
                            <span class="text-slate-500">${q.grammar}</span>
                        </div>
                        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width:${progress}%"></div>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <p class="text-xs font-bold text-slate-500">문제</p>
                        <p class="text-base font-bold text-slate-800 mt-2 leading-relaxed safe-wrap">${esc(q.prompt)}</p>
                        <div class="mt-2 rounded-lg border border-slate-200 bg-slate-50 p-3">
                            <p class="text-[11px] text-slate-600 safe-wrap"><b>상황 (KO):</b> ${esc(q.contextKo || "")}</p>
                            <p class="text-[11px] text-blue-700 mt-1 safe-wrap"><b>Tình huống (VI):</b> ${esc(q.contextVi || "")}</p>
                        </div>
                        <div class="mt-4 space-y-2">${choicesHtml}</div>
                        ${feedbackHtml}
                        ${submitted ? `<button type="button" onclick="nextInQuiz()" class="mt-3 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700">다음 문제</button>` : ""}
                    </div>
                </section>
            `;
        }

        function renderResult() {
            const attempt = resultById(state.selectedRecordId);
            if (!attempt) {
                return `
                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <p class="text-sm text-slate-700">기록을 찾을 수 없습니다.</p>
                        <button onclick="goStart()" class="mt-3 w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold text-sm">시작 화면으로</button>
                    </section>
                `;
            }

            const answerCards = attempt.answers.map((a, index) => {
                if (a.isCorrect) {
                    return `
                        <article class="bg-emerald-50 border border-emerald-200 rounded-xl p-3">
                            <p class="text-xs text-emerald-700 font-bold">${index + 1}. ${esc(a.grammar)} · 정답</p>
                            <p class="text-sm text-slate-800 mt-1 safe-wrap">${esc(a.prompt)}</p>
                            <p class="text-xs text-emerald-700 mt-2">정답입니다.</p>
                            <p class="text-xs text-slate-700 mt-1 safe-wrap"><b>설명 (KO):</b> ${esc(a.explainKo || a.correctFeedback || "")}</p>
                            <p class="text-xs text-blue-700 mt-1 safe-wrap"><b>Giải thích (VI):</b> ${esc(a.explainVi || a.correctFeedbackVi || "")}</p>
                            ${a.nonTargetKo ? `
                                <div class="mt-2 rounded-lg border border-amber-200 bg-amber-50 p-2">
                                    <p class="text-xs font-bold text-amber-800">학습 범위 보충</p>
                                    <p class="text-xs text-slate-700 mt-1 safe-wrap"><b>KO:</b> ${esc(a.nonTargetKo)}</p>
                                    <p class="text-xs text-blue-700 mt-1 safe-wrap"><b>VI:</b> ${esc(a.nonTargetVi || "")}</p>
                                </div>
                            ` : ""}
                        </article>
                    `;
                }

                return `
                    <article class="bg-rose-50 border border-rose-200 rounded-xl p-3">
                        <p class="text-xs text-rose-700 font-bold">${index + 1}. ${esc(a.grammar)} · 오답</p>
                        <p class="text-sm text-slate-800 mt-1 safe-wrap">${esc(a.prompt)}</p>
                        <p class="text-xs text-slate-700 mt-2"><b>내 답:</b> ${esc(a.userAnswer || "(무응답)")}</p>
                        <p class="text-xs text-slate-700 mt-1"><b>정답:</b> ${esc(a.correctAnswer)}</p>
                        <p class="text-xs text-rose-700 mt-2 safe-wrap"><b>설명 (KO):</b> ${esc(a.explainKo || a.wrongFeedback || "")}</p>
                        <p class="text-xs text-blue-700 mt-1 safe-wrap"><b>Giải thích (VI):</b> ${esc(a.explainVi || a.wrongFeedbackVi || "")}</p>
                        ${a.nonTargetKo ? `
                            <div class="mt-2 rounded-lg border border-amber-200 bg-amber-50 p-2">
                                <p class="text-xs font-bold text-amber-800">학습 범위 보충</p>
                                <p class="text-xs text-slate-700 mt-1 safe-wrap"><b>KO:</b> ${esc(a.nonTargetKo)}</p>
                                <p class="text-xs text-blue-700 mt-1 safe-wrap"><b>VI:</b> ${esc(a.nonTargetVi || "")}</p>
                            </div>
                        ` : ""}
                    </article>
                `;
            }).join("");

            return `
                <section class="space-y-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center">
                        <p class="text-xs text-slate-500">응시 시각: ${formatDate(attempt.completedAt)}</p>
                        <h1 class="text-2xl font-black text-slate-800 mt-1">${attempt.score} / ${attempt.total}</h1>
                        <p class="text-sm text-slate-600 mt-1">정답률 ${attempt.percent}% · 소요 ${attempt.durationSec}초</p>
                        <div class="grid gap-2 mt-4">
                            <button onclick="restartFromResult()" class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold text-sm">다시 풀기</button>
                            <button onclick="goStart()" class="w-full border border-slate-300 text-slate-700 py-2.5 rounded-xl font-bold text-sm">시작 화면</button>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <h2 class="text-sm font-bold text-slate-800 mb-3">정오답 피드백</h2>
                        <div class="space-y-2">${answerCards}</div>
                    </div>
                </section>
            `;
        }

        function render() {
            const app = document.getElementById("app");
            if (state.view === "start") {
                app.innerHTML = renderStart();
            } else if (state.view === "quiz") {
                app.innerHTML = renderQuiz();
            } else {
                app.innerHTML = renderResult();
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            render();
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
