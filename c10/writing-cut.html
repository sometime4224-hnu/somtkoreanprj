<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c10 읽기 컷 쓰기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4ee;
      --surface: #ffffff;
      --line: #ddd6c9;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #d97706;
      --accent-soft: #fff1dc;
      --accent-strong: #9a3412;
      --success: #166534;
      --success-soft: #dcfce7;
      --warn: #92400e;
      --warn-soft: #fef3c7;
      --wrong: #b91c1c;
      --wrong-soft: #fee2e2;
      --shadow: 0 18px 40px rgba(31, 41, 55, 0.08);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.12), transparent 34%),
        linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
    }

    a { color: inherit; }

    .global-nav {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(221, 214, 201, 0.9);
    }

    .global-nav a {
      text-decoration: none;
      font-size: 0.9rem;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      transition: 0.18s ease;
    }

    .global-nav a:hover,
    .global-nav a:focus-visible {
      color: var(--accent-strong);
      background: var(--accent-soft);
      outline: none;
    }

    .page-header {
      padding: 20px 16px 18px;
    }

    .header-card {
      max-width: 1100px;
      margin: 0 auto;
      background: linear-gradient(135deg, rgba(255, 244, 225, 0.98), rgba(255, 255, 255, 0.98));
      border: 1px solid rgba(234, 179, 8, 0.2);
      border-radius: 30px;
      padding: 22px 22px 20px;
      box-shadow: var(--shadow);
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .header-card h1 {
      margin: 12px 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.15;
    }

    .header-card p {
      margin: 0;
      max-width: 760px;
      color: #475569;
      line-height: 1.6;
    }

    .page-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    .app-root {
      min-height: 60vh;
    }

    .progress-card,
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .progress-card {
      padding: 20px;
      margin-bottom: 18px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 0.86rem;
    }

    .progress-title {
      margin: 8px 0 6px;
      font-size: clamp(1.25rem, 3vw, 1.7rem);
    }

    .progress-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .focus-chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: white;
      font-weight: 800;
      font-size: 0.88rem;
      box-shadow: 0 12px 24px rgba(249, 115, 22, 0.22);
    }

    .step-pills {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .cut-pills {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .step-pill {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fcfaf7;
      padding: 12px 10px;
      text-align: center;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .step-pill.done {
      color: var(--success);
      border-color: #86efac;
      background: #f0fdf4;
    }

    .step-pill.active {
      color: var(--accent-strong);
      border-color: #fdba74;
      background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
      box-shadow: 0 12px 24px rgba(245, 158, 11, 0.18);
      transform: translateY(-1px);
    }

    .cut-pill {
      border-radius: 16px;
      border: 1px solid #e7e5e4;
      background: white;
      padding: 10px 8px;
      text-align: center;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .cut-pill.done {
      color: var(--success);
      border-color: #86efac;
      background: #f0fdf4;
    }

    .cut-pill.active {
      color: var(--accent-strong);
      border-color: #fdba74;
      background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
      box-shadow: 0 12px 24px rgba(245, 158, 11, 0.16);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
      gap: 18px;
    }

    .panel {
      padding: 20px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 1.15rem;
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .highlight-tag {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .image-wrap {
      overflow: hidden;
      border-radius: 22px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .image-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .image-caption {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fffbeb;
      color: var(--warn);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .support-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .support-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid #dbe3ef;
      color: #475569;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .instruction-card {
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff7ed, #fff1dc);
      border: 1px solid #fdba74;
      color: var(--accent-strong);
      box-shadow: 0 14px 28px rgba(245, 158, 11, 0.14);
    }

    .instruction-card strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .instruction-card span {
      color: #9a3412;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .guide-zone {
      position: relative;
      margin-top: 14px;
    }

    .guide-zone.compact {
      margin-top: 0;
      width: 100%;
      max-width: 320px;
    }

    .guide-zone.compact .guide-callout {
      margin-left: 6px;
    }

    .guide-zone.compact .nav-btn,
    .guide-zone.compact .ghost-btn {
      width: 100%;
    }

    .guide-zone > :not(.guide-callout) {
      position: relative;
      z-index: 2;
    }

    .guide-zone.primary::before,
    .guide-zone.primary::after,
    .guide-zone.success::before,
    .guide-zone.success::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 24px;
      pointer-events: none;
      z-index: 1;
    }

    .guide-zone.primary::before,
    .guide-zone.primary::after {
      border: 3px solid rgba(245, 158, 11, 0.72);
      box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.26);
    }

    .guide-zone.success::before,
    .guide-zone.success::after {
      border: 3px solid rgba(34, 197, 94, 0.7);
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.24);
    }

    .guide-zone.primary::before,
    .guide-zone.success::before {
      animation: guideWave 1.9s ease-out infinite;
    }

    .guide-zone.primary::after,
    .guide-zone.success::after {
      animation: guideWave 1.9s ease-out 0.95s infinite;
    }

    .guide-callout {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px 10px;
      padding: 9px 14px;
      border-radius: 999px;
      color: white;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      z-index: 3;
      animation: guideFloat 1.6s ease-in-out infinite;
      box-shadow: 0 14px 24px rgba(15, 23, 42, 0.18);
    }

    .guide-callout::after {
      content: '';
      position: absolute;
      left: 22px;
      bottom: -6px;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      border-radius: 3px;
      background: inherit;
    }

    .guide-callout.primary {
      background: linear-gradient(135deg, #f59e0b, #f97316);
    }

    .guide-callout.success {
      background: linear-gradient(135deg, #22c55e, #15803d);
    }

    .choice-list,
    .word-bank,
    .summary-list {
      display: grid;
      gap: 10px;
    }

    .choice-btn,
    .word-chip,
    .nav-btn,
    .ghost-btn,
    .reset-btn {
      font: inherit;
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      box-shadow: none;
      transform: none;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #dbe3ef;
      background: #fff;
      color: var(--text);
      transition: 0.18s ease;
    }

    .choice-btn:hover,
    .choice-btn:focus-visible {
      border-color: #f59e0b;
      box-shadow: 0 12px 24px rgba(245, 158, 11, 0.14);
      transform: translateY(-1px);
      outline: none;
    }

    .choice-btn.selected {
      border-color: #f59e0b;
      background: #fff7ed;
    }

    .choice-btn.correct {
      border-color: #22c55e;
      background: #f0fdf4;
    }

    .choice-btn.wrong {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .template-box,
    .arranged-box,
    .fill-preview,
    .fullwrite-box,
    .summary-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      background: #fcfcfb;
    }

    .template-line,
    .arranged-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 54px;
      line-height: 1.8;
      font-size: 1rem;
    }

    .drop-slot,
    .blank-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 14px;
      border: 2px dashed #fdba74;
      background: #fff7ed;
      color: var(--accent-strong);
      font-weight: 800;
      text-align: center;
    }

    .drop-slot.active {
      outline: 3px solid rgba(245, 158, 11, 0.28);
      transform: translateY(-1px);
      animation: activeSlotPulse 1.35s ease-in-out infinite;
    }

    .drop-slot.filled {
      border-style: solid;
      background: #fff;
      color: var(--text);
    }

    .word-bank {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 14px;
    }

    .word-chip {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: var(--accent-strong);
      font-weight: 800;
    }

    .word-chip.used {
      opacity: 0.45;
      cursor: default;
    }

    .order-bank,
    .order-result {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .order-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 48px;
    }

    .order-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-weight: 700;
      cursor: pointer;
    }

    .fill-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .fill-field label,
    .fullwrite-box label {
      display: block;
      margin-bottom: 6px;
      color: #475569;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .fill-field input,
    .fullwrite-box textarea {
      width: 100%;
      font: inherit;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      padding: 13px 14px;
      background: white;
      color: var(--text);
    }

    .fullwrite-box textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    .feedback {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .feedback strong {
      display: block;
      margin-bottom: 4px;
    }

    .feedback.correct {
      border: 1px solid #86efac;
      background: var(--success-soft);
      color: var(--success);
    }

    .feedback.warn {
      border: 1px solid #fcd34d;
      background: var(--warn-soft);
      color: var(--warn);
    }

    .feedback.wrong {
      border: 1px solid #fca5a5;
      background: var(--wrong-soft);
      color: var(--wrong);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
    }

    .action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-btn,
    .ghost-btn,
    .reset-btn {
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 800;
    }

    .nav-btn {
      background: linear-gradient(135deg, #d97706, #ea580c);
      color: white;
      box-shadow: 0 14px 28px rgba(217, 119, 6, 0.2);
    }

    .nav-btn:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
    }

    .ghost-btn,
    .reset-btn {
      border: 1px solid #d6d3d1;
      background: white;
      color: #475569;
    }

    .summary-layout {
      display: grid;
      gap: 18px;
    }

    .summary-metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      padding: 16px;
      border-radius: 20px;
      background: white;
      border: 1px solid #e7e5e4;
      box-shadow: var(--shadow);
    }

    .metric strong {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    @keyframes guideWave {
      0% {
        opacity: 0.95;
        transform: scale(0.99);
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.24);
      }
      70% {
        opacity: 0.2;
        transform: scale(1.015);
        box-shadow: 0 0 0 18px rgba(245, 158, 11, 0);
      }
      100% {
        opacity: 0;
        transform: scale(1.03);
        box-shadow: 0 0 0 24px rgba(245, 158, 11, 0);
      }
    }

    @keyframes guideFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes activeSlotPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.22); }
      50% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .guide-zone.primary::before,
      .guide-zone.primary::after,
      .guide-zone.success::before,
      .guide-zone.success::after,
      .guide-callout,
      .drop-slot.active {
        animation: none;
      }
    }

    .summary-list {
      margin-top: 14px;
    }

    .summary-item {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: white;
    }

    .summary-item strong {
      display: block;
      margin-bottom: 6px;
    }

    .summary-item p {
      margin: 0;
      color: #475569;
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      .workspace,
      .summary-metrics {
        grid-template-columns: 1fr;
      }

      .panel,
      .progress-card {
        padding: 18px;
      }
    }

    @media (max-width: 640px) {
      .global-nav {
        overflow-x: auto;
        white-space: nowrap;
      }

      .header-card,
      .progress-card,
      .panel {
        border-radius: 22px;
      }

      .progress-top,
      .panel-head,
      .actions {
        flex-direction: column;
      }

      .focus-chip,
      .highlight-tag {
        align-self: flex-start;
      }

      .step-pills {
        grid-template-columns: repeat(5, minmax(88px, 1fr));
        overflow-x: auto;
      }

      .cut-pills {
        grid-template-columns: repeat(6, minmax(72px, 1fr));
        overflow-x: auto;
      }

      .word-bank {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="header-card">
      <span class="header-badge">점진적 쓰기 훈련</span>
      <h1>그림을 보고 문장으로 바꾸는 연습</h1>
      <p>한 컷씩 보면서 난이도를 올립니다. 먼저 고르고, 다음엔 넣고, 배열하고, 직접 쓰고, 마지막에는 전체 문장을 완성합니다.</p>
    </div>
  </header>

  <main class="page-shell">
    <div id="app" class="app-root"></div>
