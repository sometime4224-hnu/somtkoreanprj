<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>관형형 축구 러시 모바일</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f172a;
            --muted: #334155;
            --panel: rgba(255, 255, 255, 0.93);
            --line: #cbd5e1;
            --ok: #15803d;
            --bad: #b91c1c;
            --game-h: min(35dvh, 270px);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: stretch;
            background: linear-gradient(170deg, #dcfce7 0%, #22c55e 45%, #15803d 100%);
            font-family: "Noto Sans KR", sans-serif;
            color: var(--ink);
        }

        .app {
            width: min(100vw, 460px);
            height: 100dvh;
            padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
            display: grid;
            grid-template-rows: auto 9px var(--game-h) auto 1fr auto;
            gap: 8px;
        }

        .app.shake {
            animation: appShake 0.28s ease;
        }

        .hud {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 6px;
        }

        .hud-item {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 6px 6px;
            text-align: center;
        }

        .hud-item .k {
            font-size: 10px;
            font-weight: 800;
            color: #475569;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .hud-item .v {
            margin-top: 3px;
            font-size: clamp(0.9rem, 2.9vw, 1.06rem);
            font-weight: 900;
            line-height: 1.2;
        }

        .timer-shell {
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.75);
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #f59e0b 65%, #ef4444 100%);
            transition: width 0.07s linear;
        }

        .arena {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.86);
            background: linear-gradient(180deg, rgba(187, 247, 208, 0.78) 0%, rgba(21, 128, 61, 0.24) 100%);
        }

        .clouds {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 18% 28%, rgba(255,255,255,0.68) 0 20px, transparent 21px),
                radial-gradient(circle at 68% 22%, rgba(255,255,255,0.52) 0 16px, transparent 17px),
                radial-gradient(circle at 90% 56%, rgba(255,255,255,0.36) 0 14px, transparent 15px);
            animation: drift 16s linear infinite;
        }

        .streak {
            position: absolute;
            inset: 0;
            opacity: 0.16;
            background:
                repeating-linear-gradient(90deg, rgba(134,239,172,0.34) 0 28px, rgba(34,197,94,0.18) 28px 56px),
                linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.08) 100%);
            animation: streak 6.8s linear infinite;
        }

        .track {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 42%;
            background:
                repeating-linear-gradient(90deg, rgba(187, 247, 208, 0.36) 0 36px, rgba(34,197,94,0.14) 36px 72px),
                linear-gradient(180deg, #166534 0%, #14532d 100%);
            animation: run 1.1s linear infinite;
        }

        .goal-mouth {
            position: absolute;
            left: 2.8%;
            bottom: 18%;
            width: 26%;
            height: 45%;
            border: 3px solid rgba(255,255,255,0.95);
            border-right-width: 5px;
            border-radius: 8px;
            background: rgba(248, 250, 252, 0.11);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
            z-index: 3;
            overflow: hidden;
        }

        .goal-net {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(90deg, rgba(255,255,255,0.33) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255,255,255,0.28) 1px, transparent 1px);
            background-size: 12px 12px;
            opacity: 0.7;
        }

        .player {
            position: absolute;
            left: 16%;
            top: 56%;
            width: 66px;
            height: 66px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-size: 2rem;
            background: rgba(240, 253, 244, 0.92);
            border: 2px solid rgba(255,255,255,0.95);
            box-shadow: 0 10px 24px rgba(0,0,0,0.24);
            z-index: 4;
            animation: bob 0.9s ease-in-out infinite;
            transition: transform 0.2s ease;
        }

        .player.good {
            filter: brightness(1.12) saturate(1.15);
            outline: 3px solid rgba(34,197,94,0.38);
            box-shadow: 0 0 0 6px rgba(34,197,94,0.3), 0 10px 24px rgba(0,0,0,0.2);
        }

        .player.bad {
            filter: brightness(0.94) saturate(1.12);
            outline: 3px solid rgba(239,68,68,0.36);
            box-shadow: 0 0 0 6px rgba(239,68,68,0.3), 0 10px 24px rgba(0,0,0,0.2);
        }

        .gate {
            position: absolute;
            top: 53%;
            left: 88%;
            transform: translate(-50%, -50%);
            width: clamp(84px, 21vw, 104px);
            height: clamp(84px, 21vw, 104px);
            border-radius: 999px;
            padding: 8px 8px;
            background: radial-gradient(circle at 35% 30%, #ffffff 0%, #f8fafc 52%, #e2e8f0 100%);
            color: #0f172a;
            border: 2px solid rgba(15, 23, 42, 0.23);
            z-index: 5;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.24);
            display: grid;
            align-content: center;
            justify-items: center;
            text-align: center;
            transition: left 0.1s linear;
            overflow: hidden;
        }

        .gate::before {
            content: "";
            position: absolute;
            inset: 8%;
            border-radius: 999px;
            border: 2px dashed rgba(15, 23, 42, 0.22);
            animation: spinBall 2.8s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .gate .mini {
            display: none;
        }

        .gate .lemma {
            margin-top: 0;
            font-size: clamp(0.9rem, 2.7vw, 1.02rem);
            font-weight: 900;
            line-height: 1.1;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
            word-break: keep-all;
        }

        .gate .clue {
            display: none;
        }

        .gate.good {
            border-color: #22c55e;
            animation: gatePulse 0.34s ease;
        }
        .gate.bad {
            border-color: #ef4444;
            animation: gateShake 0.28s ease;
        }

        .gate.deflect {
            border-color: #22c55e;
            offset-rotate: 0deg;
            will-change: offset-distance, transform, opacity;
        }

        .gate.deflect-arc1 {
            offset-path: path("M 0 0 Q 126 -188 256 -216");
            animation: arcMotion 0.92s cubic-bezier(0.2, 0.76, 0.24, 1) forwards;
        }

        .gate.deflect-arc2 {
            offset-path: path("M 0 0 Q 94 -230 220 -248");
            animation: arcMotion 0.96s cubic-bezier(0.2, 0.76, 0.24, 1) forwards;
        }

        .gate.deflect-arc3 {
            offset-path: path("M 0 0 Q 168 -154 278 -198");
            animation: arcMotion 0.88s cubic-bezier(0.2, 0.76, 0.24, 1) forwards;
        }

        .gate[class*="deflect"]::before {
            animation: spinBallFast 0.08s linear infinite;
        }

        .gate.goal-in {
            transform: translate(-50%, -50%) scale(0.78);
            opacity: 0.22;
            filter: saturate(0.68);
        }

        .fx-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 7;
            overflow: hidden;
        }

        .fx-layer.flash-good {
            animation: flashGood 0.34s ease;
        }

        .fx-layer.flash-bad {
            animation: flashBad 0.28s ease;
        }

        .pop-text {
            position: absolute;
            left: 50%;
            top: 46%;
            transform: translate(-50%, -50%);
            font-size: clamp(1rem, 4.4vw, 1.35rem);
            font-weight: 900;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
            animation: popUp 0.56s ease forwards;
        }

        .pop-text.good { color: #86efac; }
        .pop-text.bad { color: #fca5a5; }

        .spark {
            position: absolute;
            left: 50%;
            top: 54%;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #f8fafc;
            transform: translate(-50%, -50%);
            animation: sparkFly 0.56s ease-out forwards;
        }

        .spark.good { background: #86efac; }
        .spark.bad { background: #fca5a5; }

        .kick-impact {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 3px solid #fef08a;
            transform: translate(-50%, -50%) scale(0.42);
            animation: kickImpact 0.42s ease-out forwards;
            pointer-events: none;
        }

        .kick-impact::before,
        .kick-impact::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 24px;
            height: 3px;
            background: rgba(254, 240, 138, 0.92);
            border-radius: 999px;
            transform: translate(-50%, -50%);
        }

        .kick-impact::after {
            transform: translate(-50%, -50%) rotate(90deg);
        }

        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            background: rgba(15,23,42,0.55);
            z-index: 1200;
            text-align: center;
            padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
            color: #f8fafc;
        }

        .overlay.show { display: grid; }
        .overlay.start-mode { background: rgba(15,23,42,0.66); }

        .count-text {
            font-size: clamp(2.1rem, 12vw, 3.5rem);
            font-weight: 900;
            line-height: 1;
        }

        .start-card {
            width: min(82vw, 280px);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.42);
            padding: 14px 12px;
            backdrop-filter: blur(2px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
        }

        .start-btn-ui {
            width: 100%;
            min-height: 58px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(34, 211, 238, 0.26);
            color: #f8fafc;
            font-size: clamp(1.15rem, 4.2vw, 1.45rem);
            font-weight: 900;
            letter-spacing: 0.04em;
        }

        .start-hint {
            margin-top: 8px;
            font-size: 0.84rem;
            font-weight: 800;
            color: #bae6fd;
            line-height: 1.3;
        }

        .result-card {
            width: min(92vw, 360px);
            border-radius: 14px;
            background: rgba(2, 6, 23, 0.84);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 14px;
        }

        .result-card h2 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 900;
        }

        .result-card p {
            margin: 7px 0 0;
            font-size: 0.92rem;
            font-weight: 700;
            color: #e2e8f0;
            line-height: 1.35;
        }

        .break-card {
            width: min(84vw, 290px);
            border-radius: 14px;
            background: rgba(2, 6, 23, 0.84);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 14px;
        }

        .break-card h3 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 900;
            color: #e2e8f0;
        }

        .break-card p {
            margin: 6px 0 0;
            font-size: 0.92rem;
            font-weight: 800;
            color: #bae6fd;
            line-height: 1.35;
        }

        .rank-board {
            margin-top: 10px;
            border: 1px solid rgba(103, 232, 249, 0.5);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.9);
            padding: 8px 8px 6px;
            max-height: 180px;
            overflow: auto;
        }

        .rank-title {
            font-size: 0.74rem;
            font-weight: 900;
            color: #67e8f9;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 0 0 6px;
        }

        .rank-row {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr) auto;
            align-items: center;
            gap: 6px;
            padding: 4px 5px;
            border-radius: 7px;
            font-family: "Courier New", monospace;
        }

        .rank-row.current {
            background: rgba(34, 211, 238, 0.16);
            outline: 1px solid rgba(34, 211, 238, 0.45);
        }

        .rank-no {
            color: #bae6fd;
            font-size: 0.78rem;
            font-weight: 900;
        }

        .rank-main {
            font-size: 0.78rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .rank-sub {
            font-size: 0.68rem;
            font-weight: 700;
            color: #94a3b8;
        }

        .rank-score {
            color: #fef08a;
            font-size: 0.84rem;
            font-weight: 900;
            letter-spacing: 0.03em;
        }

        .replay {
            margin-top: 10px;
            width: 100%;
            border: 0;
            border-radius: 11px;
            background: linear-gradient(120deg, #06b6d4 0%, #0e7490 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 900;
            min-height: 50px;
            cursor: pointer;
        }

        .question {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 13px;
            padding: 9px 10px;
        }

        .mini-head {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        .chip {
            background: #e2e8f0;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #0f172a;
            text-transform: uppercase;
        }

        .sentence {
            margin: 0;
            font-size: clamp(0.98rem, 3vw, 1.08rem);
            line-height: 1.45;
            font-weight: 900;
            word-break: keep-all;
        }

        .blank,
        .filled {
            display: inline-block;
            min-width: 70px;
            text-align: center;
            border-radius: 8px;
            padding: 2px 8px;
            margin: 0 2px;
            font-weight: 900;
        }

        .blank {
            background: #fef3c7;
            border: 1px dashed #d97706;
            color: #9a3412;
        }

        .filled {
            background: #dcfce7;
            border: 1px solid #16a34a;
            color: #14532d;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            align-content: stretch;
        }

        .choice {
            min-height: 74px;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: #ffffff;
            padding: 10px 8px;
            text-align: center;
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 2px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
            position: relative;
        }

        .choice:active { transform: scale(0.98); }

        .choice:hover:not(:disabled) {
            border-color: #0891b2;
            box-shadow: 0 6px 14px rgba(6, 182, 212, 0.18);
        }

        .choice:disabled {
            opacity: 0.82;
            cursor: not-allowed;
        }

        .choice-index {
            position: absolute;
            top: 5px;
            right: 5px;
            min-width: 20px;
            height: 20px;
            border-radius: 7px;
            padding: 0 5px;
            background: #e2e8f0;
            color: #334155;
            font-size: 0.76rem;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .choice-main {
            font-size: clamp(1.01rem, 3.35vw, 1.18rem);
            font-weight: 900;
            color: #0f172a;
            line-height: 1.15;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .choice-tail {
            font-size: clamp(0.76rem, 2.4vw, 0.82rem);
            font-weight: 800;
            color: #334155;
        }

        .choice.correct {
            border-color: #16a34a;
            background: #dcfce7;
        }

        .choice.wrong {
            border-color: #dc2626;
            background: #fee2e2;
        }

        .choice.dim { opacity: 0.56; }

        .feedback {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            min-height: 45px;
            padding: 8px 10px;
            font-size: clamp(0.84rem, 2.5vw, 0.9rem);
            line-height: 1.35;
            font-weight: 800;
            color: #0f172a;
        }

        .feedback.good {
            border-color: #22c55e;
            background: #f0fdf4;
            color: #14532d;
        }

        .feedback.bad {
            border-color: #ef4444;
            background: #fef2f2;
            color: #7f1d1d;
        }

        @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-5%); } }
        @keyframes streak { from { transform: translateX(0); } to { transform: translateX(-9%); } }
        @keyframes run { from { background-position-x: 0, 0; } to { background-position-x: -40px, 0; } }
        @keyframes bob { 0% { transform: translateY(0); } 50% { transform: translateY(-2px); } 100% { transform: translateY(0); } }
        @keyframes gatePulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes gateShake {
            0% { transform: translate(-50%, -50%) translateX(0); }
            35% { transform: translate(-50%, -50%) translateX(4px); }
            70% { transform: translate(-50%, -50%) translateX(-4px); }
            100% { transform: translate(-50%, -50%) translateX(0); }
        }
        @keyframes flashGood {
            0% { background: rgba(34, 197, 94, 0.28); }
            100% { background: rgba(34, 197, 94, 0); }
        }
        @keyframes flashBad {
            0% { background: rgba(239, 68, 68, 0.24); }
            100% { background: rgba(239, 68, 68, 0); }
        }
        @keyframes spinBall {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spinBallFast {
            from { transform: rotate(0deg); }
            to { transform: rotate(2160deg); }
        }
        @keyframes arcMotion {
            0% {
                offset-distance: 0%;
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                offset-distance: 100%;
                transform: translate(-50%, -50%) scale(0.44);
                opacity: 0;
            }
        }
        @keyframes kickImpact {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.42);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2.15);
            }
        }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -18%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -82%) scale(1.03); }
        }
        @keyframes sparkFly {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(var(--ang)) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--ang)) translateX(var(--dist)) scale(0.22);
            }
        }
        @keyframes appShake {
            0% { transform: translateX(0); }
            30% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }

        @media (max-height: 700px) {
            :root { --game-h: min(32dvh, 230px); }
            .choice { min-height: 68px; }
            .player { width: 56px; height: 56px; font-size: 1.7rem; }
            .hud-item .k { font-size: 9px; }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="hud">
            <article class="hud-item"><div class="k">Score</div><div class="v" id="score">0</div></article>
            <article class="hud-item"><div class="k">Combo</div><div class="v" id="combo">0</div></article>
            <article class="hud-item"><div class="k">Lives</div><div class="v" id="lives">❤❤❤❤</div></article>
            <article class="hud-item"><div class="k">Wave</div><div class="v" id="wave">0/24</div></article>
            <article class="hud-item"><div class="k">Speed</div><div class="v" id="speed">1</div></article>
        </section>

        <div class="timer-shell"><div id="timer" class="timer-bar"></div></div>

        <section class="arena" id="arena">
            <div class="clouds"></div>
            <div class="streak"></div>
            <div class="track"></div>
            <div class="goal-mouth" aria-hidden="true"><div class="goal-net"></div></div>
            <div class="player" id="player">🧤</div>

            <article class="gate" id="gate">
                <div class="mini">BALL</div>
                <div class="lemma" id="gate-lemma">가다 + ?</div>
                <div class="clue" id="gate-clue">단서 확인</div>
            </article>

            <div class="fx-layer" id="fx-layer"></div>
        </section>

        <section class="question">
            <div class="mini-head">
                <span class="chip" id="round-chip">Round 0</span>
                <span class="chip" id="clue-chip">단서 없음</span>
            </div>
            <p class="sentence" id="sentence">곧 자동으로 시작합니다.</p>
        </section>

        <section id="choices" class="choices"></section>

        <section id="feedback" class="feedback">정답 어미를 빠르게 터치하세요.</section>
    </main>
    <div class="overlay" id="overlay"></div>

    <script>
        const ENDINGS = {
            present: { label: "는", hint: "현재/일반 사실" },
            past: { label: "(으)ㄴ", hint: "완료된 과거" },
            future: { label: "(으)ㄹ", hint: "미래/예정" },
            retrospective: { label: "던", hint: "과거 습관/미완료 회상" }
        };

        const KEYS = ["present", "past", "future", "retrospective"];
        const HISTORY_KEY = "korean3b.c10.action.mobile.runs.v1";
        const BASE_WAVE_MS = 7200;
        const MIN_WAVE_MS = 4200;

        const QUESTIONS = [
            { lemma: "가다", clue: "어릴 때 + 자주", sentence: "이 공원은 제가 어릴 때 자주 {form} 곳이에요.", answer: "retrospective", forms: { present: "가는", past: "간", future: "갈", retrospective: "가던" } },
            { lemma: "가다", clue: "지금 + 진행", sentence: "지금 제가 {form} 길이 가장 빨라요.", answer: "present", forms: { present: "가는", past: "간", future: "갈", retrospective: "가던" } },
            { lemma: "가다", clue: "어제 + 완료", sentence: "어제 {form} 길에서 지갑을 찾았어요.", answer: "past", forms: { present: "가는", past: "간", future: "갈", retrospective: "가던" } },
            { lemma: "가다", clue: "내일 + 예정", sentence: "내일 {form} 길은 공사 중이에요.", answer: "future", forms: { present: "가는", past: "간", future: "갈", retrospective: "가던" } },

            { lemma: "먹다", clue: "아까 + 미완료", sentence: "냉장고에 아까 제가 {form} 케이크가 있어요.", answer: "retrospective", forms: { present: "먹는", past: "먹은", future: "먹을", retrospective: "먹던" } },
            { lemma: "먹다", clue: "요즘 + 습관", sentence: "요즘 제가 아침마다 {form} 빵은 통밀빵이에요.", answer: "present", forms: { present: "먹는", past: "먹은", future: "먹을", retrospective: "먹던" } },
            { lemma: "먹다", clue: "어제 + 완료", sentence: "어제 회의 전에 {form} 샌드위치가 맛있었어요.", answer: "past", forms: { present: "먹는", past: "먹은", future: "먹을", retrospective: "먹던" } },
            { lemma: "먹다", clue: "소풍 + 계획", sentence: "소풍에서 {form} 김밥 재료를 준비했어요.", answer: "future", forms: { present: "먹는", past: "먹은", future: "먹을", retrospective: "먹던" } },

            { lemma: "읽다", clue: "어젯밤 + 미완료", sentence: "책상 위에 어젯밤 {form} 소설이 있어요.", answer: "retrospective", forms: { present: "읽는", past: "읽은", future: "읽을", retrospective: "읽던" } },
            { lemma: "읽다", clue: "지금 + 진행", sentence: "지금 {form} 소설은 역사 배경이에요.", answer: "present", forms: { present: "읽는", past: "읽은", future: "읽을", retrospective: "읽던" } },
            { lemma: "읽다", clue: "지난주 + 완료", sentence: "지난주에 {form} 소설의 작가를 만났어요.", answer: "past", forms: { present: "읽는", past: "읽은", future: "읽을", retrospective: "읽던" } },
            { lemma: "읽다", clue: "방학 + 예정", sentence: "방학에 {form} 소설 목록을 정리했어요.", answer: "future", forms: { present: "읽는", past: "읽은", future: "읽을", retrospective: "읽던" } },

            { lemma: "타다", clue: "중학교 때 + 매일", sentence: "저 자전거는 제가 중학교 때 매일 {form} 거예요.", answer: "retrospective", forms: { present: "타는", past: "탄", future: "탈", retrospective: "타던" } },
            { lemma: "타다", clue: "지금 + 현재", sentence: "지금 {form} 지하철이 급행이에요.", answer: "present", forms: { present: "타는", past: "탄", future: "탈", retrospective: "타던" } },
            { lemma: "타다", clue: "어제 + 완료", sentence: "어제 {form} 택시 기사님이 친절했어요.", answer: "past", forms: { present: "타는", past: "탄", future: "탈", retrospective: "타던" } },
            { lemma: "타다", clue: "주말 + 예정", sentence: "이번 주말에 {form} KTX 표를 예매했어요.", answer: "future", forms: { present: "타는", past: "탄", future: "탈", retrospective: "타던" } },

            { lemma: "보다", clue: "어릴 때 + 자주", sentence: "이 영화는 어릴 때 자주 {form} 작품이에요.", answer: "retrospective", forms: { present: "보는", past: "본", future: "볼", retrospective: "보던" } },
            { lemma: "보다", clue: "요즘 + 매일", sentence: "요즘 제가 매일 {form} 뉴스 채널이에요.", answer: "present", forms: { present: "보는", past: "본", future: "볼", retrospective: "보던" } },
            { lemma: "보다", clue: "어제 + 완료", sentence: "어제 {form} 공연 사진을 보냈어요.", answer: "past", forms: { present: "보는", past: "본", future: "볼", retrospective: "보던" } },
            { lemma: "보다", clue: "다음 달 + 예정", sentence: "다음 달에 {form} 공연 좌석을 골랐어요.", answer: "future", forms: { present: "보는", past: "본", future: "볼", retrospective: "보던" } },

            { lemma: "공부하다", clue: "시험 전 + 오래", sentence: "이건 제가 시험 전에 오래 {form} 단어장이에요.", answer: "retrospective", forms: { present: "공부하는", past: "공부한", future: "공부할", retrospective: "공부하던" } },
            { lemma: "공부하다", clue: "요즘 + 매일", sentence: "요즘 매일 {form} 단어장이 앱으로 바뀌었어요.", answer: "present", forms: { present: "공부하는", past: "공부한", future: "공부할", retrospective: "공부하던" } },
            { lemma: "공부하다", clue: "어제 + 완료", sentence: "어제 집중해서 {form} 문법을 복습했어요.", answer: "past", forms: { present: "공부하는", past: "공부한", future: "공부할", retrospective: "공부하던" } },
            { lemma: "공부하다", clue: "내일부터 + 계획", sentence: "내일부터 본격적으로 {form} 단원이에요.", answer: "future", forms: { present: "공부하는", past: "공부한", future: "공부할", retrospective: "공부하던" } }
        ];

        const state = {
            status: "idle",
            target: 24,
            hp: 4,
            maxHp: 4,
            score: 0,
            combo: 0,
            maxCombo: 0,
            level: 1,
            total: 0,
            correct: 0,
            roundMs: BASE_WAVE_MS,
            queue: [],
            current: null,
            order: [...KEYS],
            activeKeys: [],
            resolved: false,
            lastBreakWave: 0,
            history: [],
            historyLimit: 20,
            roundStart: 0,
            rafId: null,
            nextTimer: null,
            countTimer: null
        };

        const el = {
            app: document.querySelector(".app"),
            player: document.getElementById("player"),
            gate: document.getElementById("gate"),
            gateLemma: document.getElementById("gate-lemma"),
            gateClue: document.getElementById("gate-clue"),
            fxLayer: document.getElementById("fx-layer"),
            overlay: document.getElementById("overlay"),
            timer: document.getElementById("timer"),
            roundChip: document.getElementById("round-chip"),
            clueChip: document.getElementById("clue-chip"),
            sentence: document.getElementById("sentence"),
            choices: document.getElementById("choices"),
            feedback: document.getElementById("feedback"),
            score: document.getElementById("score"),
            combo: document.getElementById("combo"),
            lives: document.getElementById("lives"),
            wave: document.getElementById("wave"),
            speed: document.getElementById("speed")
        };

        function shuffle(arr) {
            const copied = [...arr];
            for (let i = copied.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [copied[i], copied[j]] = [copied[j], copied[i]];
            }
            return copied;
        }

        function hearts(hp, maxHp) {
            return "❤".repeat(Math.max(0, hp)) + "·".repeat(Math.max(0, maxHp - hp));
        }

        function getRoundFromWave(wave) {
            return Math.floor((Math.max(1, wave) - 1) / 6) + 1;
        }

        function getChoiceCountForRound(round) {
            if (round <= 2) return 2;
            if (round === 3) return 3;
            return 4;
        }

        function buildChoiceKeys(answerKey, round) {
            const count = getChoiceCountForRound(round);
            const distractors = shuffle(KEYS.filter((key) => key !== answerKey)).slice(0, Math.max(0, count - 1));
            return shuffle([answerKey, ...distractors]);
        }

        function fillSentence(q, reveal) {
            if (!q) return "곧 자동으로 시작합니다.";
            const mark = reveal ? `<span class="filled">${q.forms[q.answer]}</span>` : '<span class="blank">____</span>';
            return q.sentence.replace("{form}", mark);
        }

        function setFeedback(type, text) {
            el.feedback.classList.remove("good", "bad");
            if (type === "good") el.feedback.classList.add("good");
            if (type === "bad") el.feedback.classList.add("bad");
            el.feedback.textContent = text;
        }

        function updateHud() {
            el.score.textContent = state.score.toLocaleString("ko-KR");
            el.combo.textContent = String(state.combo);
            el.lives.textContent = hearts(state.hp, state.maxHp);
            el.wave.textContent = `${state.total}/${state.target}`;
            el.speed.textContent = String(state.level);
        }

        function pulsePlayer(kind) {
            el.player.classList.remove("good", "bad");
            if (kind === "good") el.player.classList.add("good");
            if (kind === "bad") el.player.classList.add("bad");
            setTimeout(() => el.player.classList.remove("good", "bad"), 260);
        }

        function gateCenterInFx() {
            const gateRect = el.gate.getBoundingClientRect();
            const fxRect = el.fxLayer.getBoundingClientRect();
            return {
                x: gateRect.left - fxRect.left + (gateRect.width / 2),
                y: gateRect.top - fxRect.top + (gateRect.height / 2)
            };
        }

        function spawnSaveKickFx() {
            const center = gateCenterInFx();

            const impact = document.createElement("span");
            impact.className = "kick-impact";
            impact.style.left = `${center.x}px`;
            impact.style.top = `${center.y}px`;
            el.fxLayer.appendChild(impact);
            setTimeout(() => impact.remove(), 460);
        }

        function animateBallOutcome(saved) {
            el.gate.classList.remove("deflect", "deflect-arc1", "deflect-arc2", "deflect-arc3", "goal-in");
            el.gate.style.offsetDistance = "";
            if (saved) {
                spawnSaveKickFx();
                const arcPick = 1 + Math.floor(Math.random() * 3);
                el.gate.classList.add("deflect", `deflect-arc${arcPick}`);
            } else {
                el.gate.style.left = "8.5%";
                el.gate.classList.add("goal-in");
            }
        }

        function shakeApp() {
            el.app.classList.remove("shake");
            void el.app.offsetWidth;
            el.app.classList.add("shake");
            setTimeout(() => el.app.classList.remove("shake"), 300);
        }

        function clearTimers() {
            if (state.rafId) cancelAnimationFrame(state.rafId);
            if (state.nextTimer) clearTimeout(state.nextTimer);
            if (state.countTimer) clearInterval(state.countTimer);
            state.rafId = null;
            state.nextTimer = null;
            state.countTimer = null;
        }

        function formatStamp(isoString) {
            const d = new Date(isoString);
            const mm = String(d.getMonth() + 1).padStart(2, "0");
            const dd = String(d.getDate()).padStart(2, "0");
            const hh = String(d.getHours()).padStart(2, "0");
            const mi = String(d.getMinutes()).padStart(2, "0");
            return `${mm}.${dd} ${hh}:${mi}`;
        }

        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                return [];
            }
        }

        function saveHistory() {
            try {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(state.history.slice(0, state.historyLimit)));
            } catch (error) {
                // ignore storage errors on privacy mode
            }
        }

        function rankRowsHTML(currentId) {
            if (!state.history.length) {
                return '<div class="rank-row"><div class="rank-no">--</div><div class="rank-main">NO DATA</div><div class="rank-score">0</div></div>';
            }
            return state.history.slice(0, 10).map((row, idx) => {
                const currentClass = row.id === currentId ? "current" : "";
                return `
                    <div class="rank-row ${currentClass}">
                        <div class="rank-no">#${String(idx + 1).padStart(2, "0")}</div>
                        <div>
                            <div class="rank-main">${formatStamp(row.stamp)} | ${row.cleared ? "CLR" : "FAIL"} | ${row.acc}%</div>
                            <div class="rank-sub">WAVE ${row.waves} / COMBO ${row.combo}</div>
                        </div>
                        <div class="rank-score">${row.score.toLocaleString("ko-KR")}</div>
                    </div>
                `;
            }).join("");
        }

        function recordRun(cleared) {
            const acc = state.total > 0 ? Math.round((state.correct / state.total) * 100) : 0;
            const entry = {
                id: `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 6)}`,
                stamp: new Date().toISOString(),
                score: state.score,
                acc,
                waves: state.total,
                combo: state.maxCombo,
                cleared: Boolean(cleared)
            };

            state.history = [entry, ...state.history]
                .sort((a, b) => b.score - a.score || b.acc - a.acc || b.combo - a.combo || b.waves - a.waves)
                .slice(0, state.historyLimit);
            saveHistory();
            return entry;
        }

        function triggerHitFx(kind, text) {
            const isGood = kind === "good";
            el.fxLayer.classList.remove("flash-good", "flash-bad");
            void el.fxLayer.offsetWidth;
            el.fxLayer.classList.add(isGood ? "flash-good" : "flash-bad");

            const pop = document.createElement("div");
            pop.className = `pop-text ${isGood ? "good" : "bad"}`;
            pop.textContent = text;
            el.fxLayer.appendChild(pop);

            for (let i = 0; i < 10; i += 1) {
                const spark = document.createElement("span");
                spark.className = `spark ${isGood ? "good" : "bad"}`;
                spark.style.setProperty("--ang", `${i * 36}deg`);
                spark.style.setProperty("--dist", `${42 + Math.random() * 34}px`);
                el.fxLayer.appendChild(spark);
                setTimeout(() => spark.remove(), 580);
            }
            setTimeout(() => pop.remove(), 600);

            if (typeof navigator !== "undefined" && typeof navigator.vibrate === "function") {
                navigator.vibrate(isGood ? [14, 26, 14] : 34);
            }
        }

        function showBreakOverlay(wave, rewardText) {
            el.overlay.classList.remove("start-mode");
            el.overlay.classList.add("show");
            el.overlay.innerHTML = `
                <article class="break-card">
                    <h3>WAVE ${wave} CLEAR</h3>
                    <p>휴식 시간 + 보상 지급</p>
                    <p>${rewardText}</p>
                </article>
            `;
        }

        function maybeTakeBreak() {
            const reachedBreak = state.total > 0 && state.total % 6 === 0;
            if (!reachedBreak || state.total === state.lastBreakWave) return false;
            state.lastBreakWave = state.total;
            state.status = "break";

            let rewardText = "";
            if (state.hp >= state.maxHp) {
                state.maxHp += 1;
                state.hp = state.maxHp;
                rewardText = "생명 보너스: 최대 생명 +1";
            } else {
                state.hp += 1;
                rewardText = "생명 회복: +1";
            }
            updateHud();
            setFeedback("good", `휴식 보상 획득! ${rewardText}`);
            showBreakOverlay(state.total, rewardText);
            state.nextTimer = setTimeout(() => {
                el.overlay.classList.remove("show");
                nextRound();
            }, 2200);
            return true;
        }

        function showStartOverlay() {
            state.status = "ready";
            el.overlay.classList.add("show", "start-mode");
            el.overlay.innerHTML = `
                <article class="start-card">
                    <button type="button" class="start-btn-ui">START!</button>
                    <p class="start-hint">화면 아무 곳이나 터치하면<br>3, 2, 1 카운트 후 시작합니다.</p>
                </article>
            `;
        }

        function beginCountdown() {
            if (state.status !== "ready") return;
            state.status = "countdown";
            el.overlay.classList.remove("start-mode");
            let count = 3;
            showOverlayCount(String(count));
            state.countTimer = setInterval(() => {
                count -= 1;
                if (count > 0) {
                    showOverlayCount(String(count));
                } else if (count === 0) {
                    showOverlayCount("GO!");
                } else {
                    clearInterval(state.countTimer);
                    state.countTimer = null;
                    el.overlay.classList.remove("show");
                    nextRound();
                }
            }, 560);
        }

        function showOverlayCount(text) {
            el.overlay.classList.remove("start-mode");
            el.overlay.classList.add("show");
            el.overlay.innerHTML = `<div class="count-text">${text}</div>`;
        }

        function showResultOverlay(cleared, currentId) {
            const acc = state.total > 0 ? Math.round((state.correct / state.total) * 100) : 0;
            const title = cleared ? "CLEAR!" : "GAME OVER";
            el.overlay.classList.remove("start-mode");
            el.overlay.classList.add("show");
            el.overlay.innerHTML = `
                <article class="result-card">
                    <h2>${title}</h2>
                    <p>점수: ${state.score.toLocaleString("ko-KR")}</p>
                    <p>정확도: ${acc}% (${state.correct}/${state.total})</p>
                    <p>최대 콤보: ${state.maxCombo}</p>
                    <section class="rank-board">
                        <p class="rank-title">Arcade Ranking</p>
                        ${rankRowsHTML(currentId)}
                    </section>
                    <button id="replay-btn" class="replay" type="button">다시 플레이</button>
                </article>
            `;
            const replay = document.getElementById("replay-btn");
            replay.addEventListener("click", startRun, { once: true });
        }
        function drawChoices(resolvedInfo) {
            const disabled = state.status !== "playing" || state.resolved || !state.current;
            const nextWave = Math.max(1, state.total + 1);
            const nextRound = getRoundFromWave(nextWave);
            const previewCount = getChoiceCountForRound(nextRound);
            const active = state.current ? state.activeKeys : KEYS.slice(0, previewCount);
            if (!state.current) {
                el.choices.innerHTML = active.map((key, idx) => `
                    <button class="choice" disabled>
                        <span class="choice-index">${idx + 1}</span>
                        <div class="choice-main">${ENDINGS[key].label}</div>
                        <div class="choice-tail">관형형 선택</div>
                    </button>
                `).join("");
                return;
            }

            el.choices.innerHTML = active.map((key, idx) => {
                let cls = "";
                if (resolvedInfo) {
                    if (key === resolvedInfo.correctKey) cls = "correct";
                    else if (key === resolvedInfo.selectedKey && key !== resolvedInfo.correctKey) cls = "wrong";
                    else cls = "dim";
                }
                return `
                    <button class="choice ${cls}" data-key="${key}" ${disabled ? "disabled" : ""}>
                        <span class="choice-index">${idx + 1}</span>
                        <div class="choice-main">${state.current.forms[key]}</div>
                        <div class="choice-tail">${ENDINGS[key].label}</div>
                    </button>
                `;
            }).join("");

            el.choices.querySelectorAll("button[data-key]").forEach((button) => {
                button.addEventListener("click", () => resolveRound(button.dataset.key, false));
            });
        }

        function resetScene() {
            el.gate.style.left = "88%";
            el.gate.style.offsetDistance = "";
            el.gate.classList.remove("good", "bad", "deflect", "deflect-arc1", "deflect-arc2", "deflect-arc3", "goal-in");
            el.timer.style.width = "100%";
            el.roundChip.textContent = "Round 0";
            el.clueChip.textContent = "단서 없음";
            el.gateLemma.textContent = "가다 + ?";
            el.gateClue.textContent = "단서 확인";
            el.sentence.innerHTML = "곧 자동으로 시작합니다.";
            setFeedback("neutral", "정답 어미를 빠르게 터치하세요.");
            drawChoices();
        }

        function startRun() {
            clearTimers();
            state.maxHp = 4;
            state.hp = state.maxHp;
            state.score = 0;
            state.combo = 0;
            state.maxCombo = 0;
            state.level = 1;
            state.total = 0;
            state.correct = 0;
            state.roundMs = BASE_WAVE_MS;
            state.queue = shuffle(QUESTIONS);
            state.current = null;
            state.order = [...KEYS];
            state.activeKeys = [];
            state.resolved = false;
            state.lastBreakWave = 0;
            updateHud();
            resetScene();
            showStartOverlay();
        }

        function nextRound() {
            if (state.total >= state.target) {
                finish(true);
                return;
            }
            if (maybeTakeBreak()) {
                return;
            }
            if (state.hp <= 0) {
                finish(false);
                return;
            }
            if (!state.queue.length) {
                state.queue = shuffle(QUESTIONS);
            }

            const waveNo = state.total + 1;
            const roundNo = getRoundFromWave(waveNo);
            state.current = state.queue.pop();
            state.activeKeys = buildChoiceKeys(state.current.answer, roundNo);
            state.order = [...state.activeKeys];
            state.resolved = false;
            state.status = "playing";

            el.gate.classList.remove("good", "bad", "deflect", "deflect-arc1", "deflect-arc2", "deflect-arc3", "goal-in");
            el.gate.style.offsetDistance = "";
            el.gate.style.left = "88%";
            el.gateLemma.textContent = `${state.current.lemma} + ?`;
            const hintOn = roundNo === 1;
            const hintText = ENDINGS[state.current.answer].hint;
            el.gateClue.textContent = hintOn ? `힌트: ${hintText}` : state.current.clue;
            el.roundChip.textContent = `Round ${roundNo} · Wave ${waveNo}`;
            el.clueChip.textContent = hintOn ? `힌트: ${hintText}` : state.current.clue;
            el.sentence.innerHTML = fillSentence(state.current, false);
            setFeedback(
                "neutral",
                hintOn
                    ? "1라운드 힌트 ON: 정답 어미의 문법 기능을 보고 고르세요."
                    : `정답을 선택하세요. (선택지 ${state.activeKeys.length}개)`
            );
            drawChoices();
            updateHud();

            state.roundStart = performance.now();
            if (state.rafId) cancelAnimationFrame(state.rafId);
            state.rafId = requestAnimationFrame(tick);
        }

        function applyProgress(ratio) {
            const clamped = Math.max(0, Math.min(1, ratio));
            el.gate.style.left = `${12 + (1 - clamped) * 76}%`;
            el.timer.style.width = `${Math.max(0, 100 - clamped * 100)}%`;
        }

        function tick(now) {
            if (state.status !== "playing") return;
            const elapsed = now - state.roundStart;
            const ratio = elapsed / state.roundMs;
            applyProgress(ratio);
            if (ratio >= 1 && !state.resolved) {
                resolveRound(null, true);
                return;
            }
            state.rafId = requestAnimationFrame(tick);
        }

        function resolveRound(selectedKey, timeout) {
            if (state.status !== "playing" || state.resolved || !state.current) return;

            state.resolved = true;
            state.total += 1;
            if (state.rafId) cancelAnimationFrame(state.rafId);
            state.rafId = null;

            const q = state.current;
            const correctKey = q.answer;
            const isCorrect = selectedKey === correctKey;
            const elapsed = performance.now() - state.roundStart;
            const remain = Math.max(0, 1 - elapsed / state.roundMs);

            el.sentence.innerHTML = fillSentence(q, true);
            el.gate.classList.remove("good", "bad");
            void el.gate.offsetWidth;

            if (isCorrect) {
                state.correct += 1;
                state.combo += 1;
                state.maxCombo = Math.max(state.maxCombo, state.combo);
                const gain = 95 + Math.round(remain * 65) + state.combo * 10;
                state.score += gain;
                el.gate.classList.add("good");
                pulsePlayer("good");
                animateBallOutcome(true);
                triggerHitFx("good", `+${gain}`);
                if (state.correct % 4 === 0) {
                    state.level += 1;
                    state.roundMs = Math.max(MIN_WAVE_MS, state.roundMs - 300);
                }
                setFeedback("good", `슈퍼 세이브! ${q.forms[correctKey]} (${ENDINGS[correctKey].label})`);
            } else {
                state.hp -= 1;
                state.combo = 0;
                el.gate.classList.add("bad");
                pulsePlayer("bad");
                animateBallOutcome(false);
                shakeApp();
                triggerHitFx("bad", timeout ? "시간초과!" : "오답!");
                const pickedForm = selectedKey ? q.forms[selectedKey] : "미선택";
                if (timeout) {
                    setFeedback("bad", `실점... 시간 초과! 정답은 ${q.forms[correctKey]} (${ENDINGS[correctKey].label})`);
                } else {
                    setFeedback("bad", `실점! ${pickedForm} × → ${q.forms[correctKey]} (${ENDINGS[correctKey].label})`);
                }
            }

            drawChoices({ selectedKey, correctKey });
            updateHud();

            if (state.hp <= 0 || state.total >= state.target) {
                state.nextTimer = setTimeout(() => finish(state.hp > 0 && state.total >= state.target), 760);
            } else {
                state.nextTimer = setTimeout(nextRound, isCorrect ? 1040 : 700);
            }
        }

        function finish(cleared) {
            clearTimers();
            state.status = "ended";
            const currentRun = recordRun(cleared);
            showResultOverlay(cleared, currentRun.id);
        }

        document.addEventListener("keydown", (event) => {
            if (state.status !== "playing" || state.resolved) return;
            const index = Number(event.key) - 1;
            if (Number.isInteger(index) && index >= 0 && index < state.activeKeys.length) {
                resolveRound(state.activeKeys[index], false);
            }
        });

        document.addEventListener("pointerdown", () => {
            if (state.status === "ready") {
                beginCountdown();
            }
        });

        state.history = loadHistory();
        startRun();
    </script>
</body>
</html>
