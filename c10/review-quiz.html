        const S = { view: "start", selectedId: null, name: "", qs: [], i: 0, submitted: false, fb: null, answers: [], startedAt: 0 };

        function esc(v) {
            return String(v == null ? "" : v)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function norm(v) {
            return String(v || "")
                .normalize("NFC")                      // 베트남어 성조 입력 문제 해결 (조합형/완성형 통일)
                .replace(/[\s.,!?~"']/g, "")           // 공백 및 각종 기본 문장 부호 무시
                .toLowerCase();
        }
        function shuffle(arr) {
            const c = [...arr];
            for (let i = c.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [c[i], c[j]] = [c[j], c[i]];
            }
            return c;
        }

        function loadHistory() {
            try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : []; }
            catch (e) { return []; }
        }

        function saveHistory(h) {
            try { localStorage.setItem(KEY, JSON.stringify(h)); } catch (e) {}
        }

        function getLastName() {
            try { return localStorage.getItem(NKEY) || ""; } catch (e) { return ""; }
        }

        function setLastName(n) {
            try { localStorage.setItem(NKEY, n); } catch (e) {}
        }

        function currentQ() { return S.qs[S.i] || null; }

        function fmt(iso) {
            try {
                const d = new Date(iso);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
            } catch (e) { return iso; }
        }

        function best(h) {
            if (!h.length) return null;
            return h.reduce((b, c) => {
                if (c.percent > b.percent) return c;
                if (c.percent === b.percent && c.score > b.score) return c;
                return b;
            }, h[0]);
        }

            const name = (ip ? ip.value : "").trim();
            if (!name) {

                if (warn) warn.classList.remove("hidden");
                if (ip) ip.focus();
                return;
            }

            setLastName(name);
            S.name = name;
            // 문제 순서를 섞으면서, 객관식 문제의 보기(options)도 함께 섞어줍니다.
            S.qs = shuffle(Q).map(q => {
                const newQ = { ...q };
                if (newQ.type === "mcq" && newQ.options) {
                    newQ.options = shuffle([...newQ.options]);
                }
                return newQ;
            });
            S.i = 0;
            S.submitted = false;
            S.fb = null;
            S.answers = [];
            S.startedAt = Date.now();
            S.view = "quiz";
            S.selectedId = null;
            render();
            focusShort();
        }

        function openLog(id) { S.view = "result"; S.selectedId = id; render(); }
        function toStart() { S.view = "start"; S.selectedId = null; render(); }
        function byId(id) { return loadHistory().find((x) => x.id === id) || null; }

        function evalQ(q, user) {
            if (q.type === "mcq") return q.answer === user;
            const u = norm(user);
            return (q.answers || []).some((a) => norm(a) === u);
        }

        function submitMcq(i) {
            const q = currentQ();
            if (!q || q.type !== "mcq" || S.submitted) return;
            submitAnswer(q.options[i]);
        }

        function submitShort() {
            const q = currentQ();
            if (!q || q.type !== "short" || S.submitted) return;
            const ip = document.getElementById("short");
            if (!ip) return;
            const v = ip.value.trim();
            if (!v) return;
            submitAnswer(v);
        }

        function submitAnswer(user) {
            const q = currentQ();
            if (!q || S.submitted) return;

            const ok = evalQ(q, user);
            const rec = {
                id: q.id,
                area: q.area,
                prompt: q.prompt,
                promptVi: q.promptVi || "",
                contextKo: q.contextKo || "",
                contextVi: q.contextVi || "",
                user: String(user || ""),
                correct: q.type === "mcq" ? q.answer : (q.answers ? q.answers[0] : ""),
                ok,
                explainKo: q.explainKo || "",
                explainVi: q.explainVi || "",
                nonTargetKo: q.nonTargetKo || "",
                nonTargetVi: q.nonTargetVi || ""
            };

            S.answers.push(rec);
            S.fb = rec;
            S.submitted = true;
            render();
        }

        function nextQ() {
            if (!S.submitted) return;
            if (S.i < S.qs.length - 1) {
                S.i += 1;
                S.submitted = false;
                S.fb = null;
                render();
                focusShort();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            const total = S.answers.length;
            const score = S.answers.filter((x) => x.ok).length;
            const percent = total ? Math.round((score / total) * 100) : 0;
            const dur = Math.max(1, Math.round((Date.now() - S.startedAt) / 1000));

            const at = {
                id: `rq-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                time: new Date().toISOString(),
                name: S.name,
                score,
                total,
                percent,
                duration: dur,
                answers: S.answers
            };

            const h = loadHistory();
            h.unshift(at);
            if (h.length > MAX) h.length = MAX;
            saveHistory(h);

            S.selectedId = at.id;
            S.view = "result";
            render();
        }

        function focusShort() {
            const q = currentQ();
            if (!q || q.type !== "short" || S.submitted) return;
            const ip = document.getElementById("short");
            if (ip) ip.focus();
        }

        function clearLogs() {
            if (!confirm("응시 기록을 모두 삭제할까요?")) return;
            saveHistory([]);
            render();
        }

        function saveJson() {
            const at = byId(S.selectedId);
            if (!at) return;
            const blob = new Blob([JSON.stringify(at, null, 2)], { type: "application/json;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const dt = fmt(at.time).replace(/[: ]/g, "-");
            const nm = (at.name || "student").replace(/[^a-zA-Z0-9가-힣_-]/g, "_");
            const a = document.createElement("a");
            a.href = url;
            a.download = `c10-review-${nm}-${dt}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        async function captureResult() {
            const t = document.getElementById("cap");
            if (!t) return;

            const b = document.getElementById("capBtn");
            if (b) { b.disabled = true; b.textContent = "캡처 중..."; }

            try {
                const c = await html2canvas(t, { scale: 2, backgroundColor: "#f8fafc", useCORS: true });
                const url = c.toDataURL("image/png");
                const at = byId(S.selectedId);
                const dt = at ? fmt(at.time).replace(/[: ]/g, "-") : Date.now();
                const nm = at ? (at.name || "student").replace(/[^a-zA-Z0-9가-힣_-]/g, "_") : "student";
                const a = document.createElement("a");
                a.href = url;
                a.download = `c10-review-${nm}-${dt}.png`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (e) {
                alert("캡처에 실패했습니다.");
            } finally {
                if (b) { b.disabled = false; b.textContent = "결과창 캡처 (PNG)"; }
            }
        }

        function renderStart() {
            const h = loadHistory();
            const b = best(h);
            const areaCnt = {};
            Q.forEach((q) => { areaCnt[q.area] = (areaCnt[q.area] || 0) + 1; });

            const rows = Object.entries(areaCnt)
                .map(([k, v]) => `<li class="text-xs text-slate-600">${esc(k)}: <b>${v}문항</b></li>`)
                .join("");

            const logs = h.length
                ? h.map((x, i) => `
                    <button class="log w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-left hover:border-blue-300" onclick="openLog('${x.id}')">
                        <p class="text-[11px] text-slate-500">${i + 1}회차 · ${fmt(x.time)}</p>
                        <p class="text-sm font-bold text-slate-800 mt-0.5 safe">${esc(x.name)} · ${x.score}/${x.total} (${x.percent}%)</p>
                    </button>
                `).join("")
                : `<p class="text-sm text-slate-500">아직 응시 기록이 없습니다.</p>`;

            return `
                <section class="space-y-4">
                    <div class="bg-gradient-to-br from-blue-50 to-white border border-blue-100 rounded-2xl p-5 shadow-sm">
                        <h1 class="text-xl font-black text-blue-700 safe">10과 복습 퀴즈</h1>
                        <p class="text-sm text-slate-700 mt-2">vocabulary-upgraded-v3 + grammar1~4 기반 복습</p>
                        <p class="text-xs text-slate-500 mt-1">이름 입력 후 시작하면 결과가 자동 저장됩니다.</p>

                        <div class="mt-4">
                            <label for="name" class="text-xs font-bold text-slate-600">응시자 이름</label>
                            <input id="name" type="text" maxlength="20" value="${esc(getLastName())}" placeholder="이름 입력"
                                oninput="document.getElementById('nameWarn') && document.getElementById('nameWarn').classList.add('hidden')"
                                class="mt-1 w-full border border-slate-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                            <p id="nameWarn" class="hidden text-xs text-rose-600 mt-1">이름을 입력하세요.</p>
                        </div>

                        <div class="mt-4 grid grid-cols-2 gap-2 text-xs">
                            <div class="bg-white border border-blue-100 rounded-lg p-2">
                                <p class="text-slate-500">총 문항</p>
                                <p class="font-bold text-slate-800">${Q.length}문항</p>
                            </div>
                            <div class="bg-white border border-blue-100 rounded-lg p-2">
                                <p class="text-slate-500">최고 기록</p>
                                <p class="font-bold text-slate-800 safe">${b ? `${esc(b.name)} · ${b.score}/${b.total} (${b.percent}%)` : "없음"}</p>
                            </div>
                        </div>

                        <ul class="mt-3 space-y-1">${rows}</ul>

                        <button class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-700" onclick="startQuiz()">퀴즈 시작</button>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <div class="flex items-center justify-between mb-3">
                            <h2 class="text-sm font-bold text-slate-800">과거 응시 기록</h2>
                            <button class="text-[11px] px-2 py-1 border border-slate-300 rounded-lg text-slate-600" onclick="clearLogs()">전체 삭제</button>
                        </div>
                        <div class="space-y-2">${logs}</div>
                    </div>
                </section>
            `;
        }
        function renderQuiz() {
            const q = currentQ();
            if (!q) return "";

            const idx = S.i + 1;
            const tot = S.qs.length;
            const pg = Math.round((idx / tot) * 100);
            const fb = S.fb;

            const body = q.type === "mcq"
                ? q.options.map((o, i) => {
                    let c = "border-slate-300 bg-white text-slate-800 hover:border-blue-400 hover:bg-blue-50";
                    if (S.submitted && fb) {
                        if (o === fb.correct) c = "border-emerald-400 bg-emerald-50 text-emerald-800";
                        else if (o === fb.user && !fb.ok) c = "border-rose-400 bg-rose-50 text-rose-800";
                        else c = "border-slate-200 bg-slate-50 text-slate-400";
                    }
                    return `<button class="op w-full border rounded-xl px-4 py-3 text-left text-sm font-semibold safe ${c}" ${S.submitted ? "disabled" : ""} onclick="submitMcq(${i})">${esc(o)}</button>`;
                }).join("")
                : `
                    <div class="space-y-2">
                        <input id="short" type="text" ${S.submitted ? "disabled" : ""} placeholder="${esc(q.placeholder || "정답 입력")}" onkeydown="if(event.key==='Enter'){submitShort()}"
                            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 ${S.submitted ? "bg-slate-100 text-slate-500" : ""}">
                        <button class="w-full py-3 rounded-xl text-sm font-bold ${S.submitted ? "bg-slate-300 text-slate-500" : "bg-blue-600 text-white hover:bg-blue-700"}" ${S.submitted ? "disabled" : ""} onclick="submitShort()">정답 확인</button>
                    </div>
                `;

            const feedback = S.submitted && fb
                ? `
                    <div class="mt-4 rounded-xl border p-4 ${fb.ok ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200"}">
                        <p class="text-sm font-bold ${fb.ok ? "text-emerald-700" : "text-rose-700"}">${fb.ok ? "정답입니다." : "오답입니다."} <span class="text-xs ml-1">(${fb.ok ? "Đúng" : "Sai"})</span></p>
                        <p class="text-xs text-slate-700 mt-2"><b>내 답:</b> ${esc(fb.user || "(무응답)")}</p>
                        <p class="text-xs text-slate-700 mt-1"><b>정답:</b> ${esc(fb.correct)}</p>
                        <p class="text-xs text-slate-700 mt-2 safe"><b>설명(KO):</b> ${esc(fb.explainKo)}</p>
                        <p class="text-xs text-blue-700 mt-1 safe"><b>Giải thích (VI):</b> ${esc(fb.explainVi)}</p>
                        ${fb.nonTargetKo ? `
                            <div class="mt-3 rounded-lg border border-amber-200 bg-amber-50 p-3">
                                <p class="text-xs font-bold text-amber-800">학습 범위 보충</p>
                                <p class="text-xs text-slate-700 mt-1 safe"><b>KO:</b> ${esc(fb.nonTargetKo)}</p>
                                <p class="text-xs text-blue-700 mt-1 safe"><b>VI:</b> ${esc(fb.nonTargetVi)}</p>
                            </div>
                        ` : ""}
                    </div>
                `
                : "";

            return `
                <section class="space-y-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <div class="flex items-center justify-between text-xs">
                            <span class="font-bold text-blue-600">${idx} / ${tot}</span>
                            <span class="px-2 py-1 rounded-full bg-blue-100 text-blue-700 font-bold">${esc(q.area)}</span>
                        </div>
                        <p class="text-[11px] text-slate-500 mt-1">응시자: <b>${esc(S.name)}</b></p>
                        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${pg}%"></div></div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <p class="text-xs font-bold text-slate-500">문제</p>
                        <p class="text-base font-bold text-slate-800 mt-2 leading-relaxed safe">${esc(q.prompt)}</p>
                        ${q.image ? `<div class="mt-3 rounded-lg overflow-hidden border border-slate-200"><img src="${esc(q.image)}" alt="quiz-image" class="w-full h-44 object-cover"></div>` : ""}
                        <div class="mt-2 rounded-lg border border-slate-200 bg-slate-50 p-3">
                            <p class="text-[11px] text-slate-600 safe"><b>상황(KO):</b> ${esc(q.contextKo || "")}</p>
                            <p class="text-[11px] text-blue-700 mt-1 safe"><b>Tình huống (VI):</b> ${esc(q.contextVi || "")}</p>
                            <p class="text-[11px] text-blue-700 mt-1 safe"><b>Dịch câu hỏi:</b> ${esc(q.promptVi || "")}</p>
                        </div>
                        <div class="mt-4 space-y-2">${body}</div>
                        ${feedback}
                        ${S.submitted ? `<button class="mt-3 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700" onclick="nextQ()">다음 문제</button>` : ""}
                    </div>
                </section>
            `;
        }

        function renderResult() {
            const at = byId(S.selectedId);
            if (!at) {
                return `<section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm"><p class="text-sm text-slate-700">기록을 찾을 수 없습니다.</p><button class="mt-3 w-full bg-blue-600 text-white py-2.5 rounded-xl text-sm font-bold" onclick="toStart()">시작 화면</button></section>`;
            }

            const cards = at.answers.map((x, i) => {
                if (x.ok) {
                    return `
                        <article class="bg-emerald-50 border border-emerald-200 rounded-xl p-3">
                            <p class="text-xs text-emerald-700 font-bold">${i + 1}. ${esc(x.area)} · 정답</p>
                            <p class="text-sm text-slate-800 mt-1 safe">${esc(x.prompt)}</p>
                            <p class="text-xs text-slate-700 mt-2"><b>정답:</b> ${esc(x.correct)}</p>
                            <p class="text-xs text-slate-700 mt-1 safe"><b>설명(KO):</b> ${esc(x.explainKo)}</p>
                            <p class="text-xs text-blue-700 mt-1 safe"><b>Giải thích (VI):</b> ${esc(x.explainVi)}</p>
                            ${x.nonTargetKo ? `<div class="mt-2 rounded-lg border border-amber-200 bg-amber-50 p-2"><p class="text-xs font-bold text-amber-800">학습 범위 보충</p><p class="text-xs text-slate-700 mt-1 safe"><b>KO:</b> ${esc(x.nonTargetKo)}</p><p class="text-xs text-blue-700 mt-1 safe"><b>VI:</b> ${esc(x.nonTargetVi)}</p></div>` : ""}
                        </article>
                    `;
                }
                return `
                    <article class="bg-rose-50 border border-rose-200 rounded-xl p-3">
                        <p class="text-xs text-rose-700 font-bold">${i + 1}. ${esc(x.area)} · 오답</p>
                        <p class="text-sm text-slate-800 mt-1 safe">${esc(x.prompt)}</p>
                        <p class="text-xs text-slate-700 mt-2"><b>내 답:</b> ${esc(x.user || "(무응답)")}</p>
                        <p class="text-xs text-slate-700 mt-1"><b>정답:</b> ${esc(x.correct)}</p>
                        <p class="text-xs text-rose-700 mt-2 safe"><b>설명(KO):</b> ${esc(x.explainKo)}</p>
                        <p class="text-xs text-blue-700 mt-1 safe"><b>Giải thích (VI):</b> ${esc(x.explainVi)}</p>
                        ${x.nonTargetKo ? `<div class="mt-2 rounded-lg border border-amber-200 bg-amber-50 p-2"><p class="text-xs font-bold text-amber-800">학습 범위 보충</p><p class="text-xs text-slate-700 mt-1 safe"><b>KO:</b> ${esc(x.nonTargetKo)}</p><p class="text-xs text-blue-700 mt-1 safe"><b>VI:</b> ${esc(x.nonTargetVi)}</p></div>` : ""}
                    </article>
                `;
            }).join("");

            return `
                <section class="space-y-4">
                    <div id="cap" class="space-y-4">
                        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center">
                            <p class="text-xs text-slate-500">응시자: <b>${esc(at.name)}</b></p>
                            <p class="text-xs text-slate-500 mt-1">응시 시각: ${fmt(at.time)}</p>
                            <h1 class="text-2xl font-black text-slate-800 mt-2">${at.score} / ${at.total}</h1>
                            <p class="text-sm text-slate-600 mt-1">정답률 ${at.percent}% · 소요 ${at.duration}초</p>
                            <p class="text-xs text-emerald-700 mt-2">결과가 자동 저장되었습니다.</p>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                            <h2 class="text-sm font-bold text-slate-800 mb-3">정오답 피드백</h2>
                            <div class="space-y-2">${cards}</div>
                        </div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <div class="grid gap-2">
                            <button id="capBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-blue-700" onclick="captureResult()">결과창 캡처 (PNG)</button>
                            <button class="w-full border border-blue-300 bg-blue-50 text-blue-700 py-2.5 rounded-xl text-sm font-bold" onclick="saveJson()">결과 저장 (JSON)</button>
                            <button class="w-full border border-slate-300 text-slate-700 py-2.5 rounded-xl text-sm font-bold" onclick="toStart()">시작 화면으로</button>
                        </div>
                    </div>
                </section>
            `;
        }

        function render() {
            const app = document.getElementById("app");
            if (S.view === "start") app.innerHTML = renderStart();
            else if (S.view === "quiz") app.innerHTML = renderQuiz();
            else app.innerHTML = renderResult();
        }

        document.addEventListener("DOMContentLoaded", () => {
            try {
                render();
            } catch (e) {
                const app = document.getElementById("app");
                app.innerHTML = `<div class="bg-white border border-rose-200 rounded-xl p-4 text-sm text-rose-700"><b>오류가 발생했습니다.</b><p class="mt-2 safe">${esc(String(e && e.message ? e.message : e))}</p></div>`;
            }
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
