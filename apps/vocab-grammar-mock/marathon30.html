<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <title>어휘·문법 30문제 마라톤 모의고사</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./marathon30.css">
</head>
<body class="quiz-page quiz-page--marathon" data-round-id="marathon30" data-quiz-source="./marathon30.md" data-feedback-mode="marathon">
    <main class="page-shell quiz-shell marathon-shell">
        <section class="marathon-hero">
            <div class="marathon-hero__eyebrow">URL 전용 마라톤 세트</div>
            <h1>어휘·문법 30문제 마라톤</h1>
            <p class="marathon-hero__lead">기출문제 원본 2회와 모의고사 1~5회를 바탕으로 선별한 30문항입니다. 끝까지 다 풀면 채점되고, 채점 후에는 약한 유형과 다시 볼 문항이 바로 정리됩니다.</p>
            <div class="marathon-hero__stats" aria-label="마라톤 안내">
                <span>실전형 30문항</span>
                <span>어휘 10 + 문법 10 + 적용 10</span>
                <span>채점 후 코칭 피드백 제공</span>
            </div>
        </section>

        <section class="quiz-panel quiz-panel--marathon">
            <div class="toolbar">
                <div class="toolbar__status">
                    <div id="progressText" class="status-value">불러오는 중...</div>
                    <div id="quizMeta" class="toolbar__meta"></div>
                    <p id="scoreText" class="status-note">30문항을 모두 풀면 채점할 수 있습니다.</p>
                    <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
                </div>
                <div class="toolbar__actions">
                    <button id="gradeButton" data-action="grade" class="action-button action-button--primary" type="button">채점</button>
                    <button id="resetButton" data-action="reset" class="action-button" type="button">다시</button>
                </div>
            </div>

            <section id="quizIntro" class="shared-card marathon-intro"></section>

            <section id="focusCard" class="shared-card marathon-focus" hidden>
                <div class="shared-card__range">이번 세트 핵심</div>
                <div id="focusList" class="marathon-focus__list"></div>
            </section>

            <section id="coachSummary" class="coach-card" hidden aria-live="polite">
                <div class="coach-card__head">
                    <div>
                        <div class="coach-card__eyebrow">채점 후 요약</div>
                        <h2>보완 포인트</h2>
                    </div>
                </div>
                <div class="coach-card__body"></div>
            </section>

            <div id="loadError" class="error-card" hidden></div>
            <div id="quizSections" class="section-stack"></div>

            <div class="toolbar toolbar--bottom">
                <div class="toolbar__status">
                    <p class="status-note">끝까지 푼 뒤 채점하고, 요약 카드에서 약한 유형부터 다시 보세요.</p>
                </div>
                <div class="toolbar__actions">
                    <button data-action="grade" class="action-button action-button--primary" type="button">채점</button>
                    <button data-action="reset" class="action-button" type="button">다시</button>
                </div>
            </div>
        </section>
    </main>
    <script src="./quiz-data.js"></script>
    <script defer src="./app.js"></script>
    <script defer src="./marathon30.js"></script>
</body>
</html>
