<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진을 보고 묘사하기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden;
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }

.app { display: flex; flex-direction: column; height: 100vh; background: #0F2340; }

/* ══ 헤더 ══ */
header {
  flex-shrink: 0; height: 52px;
  background: #1A3D6E;
  border-bottom: 3px solid #E07B1A;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; gap: 16px;
}
.h-left { display: flex; align-items: baseline; gap: 0; }
.h-title { font-size: 1.05rem; font-weight: 700; color: #fff; }
.h-sub   { font-size: 0.72rem; color: #7AAAD8; margin-left: 10px; }
.h-right { display: flex; align-items: center; gap: 10px; }
.h-divider { width: 1px; height: 22px; background: rgba(255,255,255,.2); }

/* 토글 그룹 공통 */
.toggle-group {
  display: flex; background: rgba(255,255,255,.1);
  border-radius: 20px; padding: 3px; gap: 2px;
}
.tg-btn {
  padding: 5px 16px; border: none; border-radius: 16px;
  font-size: 0.82rem; font-family: inherit; font-weight: 700;
  cursor: pointer; transition: all .2s;
  background: transparent; color: #7AAAD8;
}
/* 전경/세부 활성 색 */
.tg-btn.active-ov { background: #E07B1A; color: #fff; }
.tg-btn.active-dt { background: #0D9488; color: #fff; }
/* 바로보기/연습 활성 색 */
.tg-btn.active-mode { background: #2563EB; color: #fff; }
.quick-link {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 6px 14px; border-radius: 16px;
  background: rgba(255,255,255,.95); color: #1A3D6E;
  font-size: 0.82rem; font-weight: 700; text-decoration: none;
  white-space: nowrap; transition: all .2s;
}
.quick-link:hover { background: #2563EB; color: #fff; }

/* ══ 탭 ══ */
.tab-bar {
  flex-shrink: 0; height: 40px;
  background: #162E54;
  display: flex; align-items: flex-end; padding: 0 14px;
  border-bottom: 2px solid #0F2340;
  overflow-x: auto;
}
.tab-btn {
  padding: 7px 18px; border: none; border-radius: 6px 6px 0 0;
  background: transparent; color: #4A7AAE;
  font-size: 0.86rem; font-family: inherit; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; transition: all .15s;
}
.tab-btn:hover  { color: #AECBF0; }
.tab-btn.active { color: #fff; background: #1A3D6E; border-bottom-color: #E07B1A; }

/* ══ 슬라이드 컨테이너 ══ */
#slides-wrap { flex: 1; overflow: hidden; position: relative; }
.slide-panel { display: none; width: 100%; height: 100%; }
.slide-panel.active { display: block; }

/* ══ 사진 래퍼 ══ */
.photo-wrap {
  position: relative; width: 100%; height: 100%;
  overflow: hidden; cursor: default;
}
.photo-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; user-select: none; pointer-events: none;
}

/* ══════════════════════════════════════════════
   상단 말풍선
══════════════════════════════════════════════ */
.bubble {
  position: absolute;
  top: 14px; left: 7%; right: 7%;
  background: rgba(255,255,255,.97);
  border: 3px solid #1A3D6E;
  border-radius: 18px;
  padding: 16px 24px 14px;
  z-index: 50;
  box-shadow: 0 10px 40px rgba(0,0,0,.45);
  opacity: 0; transform: translateY(-14px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  --tail-x: 50%;
}
.bubble.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

/* 꼬리 – 외부 */
.bubble::after {
  content: ''; position: absolute;
  bottom: -24px; left: var(--tail-x); transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 20px solid transparent; border-right: 20px solid transparent;
  border-top: 24px solid #1A3D6E;
}
/* 꼬리 – 내부 */
.bubble::before {
  content: ''; position: absolute;
  bottom: -17px; left: var(--tail-x); transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 15px solid transparent; border-right: 15px solid transparent;
  border-top: 18px solid rgba(255,255,255,.97);
  z-index: 1;
}

/* 말풍선 내부 */
.b-label {
  font-size: 0.78rem; font-weight: 700; color: #E07B1A;
  letter-spacing: .5px; margin-bottom: 8px;
}
/* 세부 모드일 때 label 색 변경 */
.bubble.dt-bubble .b-label { color: #0D9488; }
.b-label.dt { color: #0D9488; }

.b-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.b-list li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 1.45rem; font-weight: 600; line-height: 1.5; color: #1A2535;
}
.blt { color: #E07B1A; flex-shrink: 0; margin-top: 3px; font-size: 1rem; }
.bubble.dt-bubble .blt { color: #0D9488; }

/* 말풍선 하단 푸터 (세부 버튼) */
.b-footer {
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid #E8F0F8;
  display: flex; align-items: center;
}
.b-to-detail-btn {
  padding: 5px 16px; border: none; border-radius: 10px;
  background: #0D9488; color: #fff;
  font-size: 0.85rem; font-family: inherit; font-weight: 700;
  cursor: pointer; transition: background .2s;
}
.b-to-detail-btn:hover { background: #0F766E; }

/* 연습 모드 버튼 */
.b-reveal-btn {
  margin-top: 10px; padding: 8px 24px; border: none;
  background: #1A3D6E; color: #fff; border-radius: 10px;
  font-size: 1rem; font-family: inherit; font-weight: 700;
  cursor: pointer; transition: background .2s; display: block;
}
.b-reveal-btn:hover { background: #E07B1A; }
.b-prompt { font-size: 1.1rem; color: #546E7A; font-weight: 600; margin-bottom: 6px; }
.b-prompt strong { color: #1A3D6E; }
.b-answer-head { font-size: 0.75rem; font-weight: 700; color: #1A3D6E; margin-bottom: 8px; letter-spacing: .5px; }
.b-retry-btn {
  margin-top: 8px; padding: 6px 18px; background: transparent;
  color: #1A3D6E; border: 2px solid #1A3D6E; border-radius: 8px;
  font-size: 0.9rem; font-family: inherit; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.b-retry-btn:hover { background: #1A3D6E; color: #fff; }

/* ══════════════════════════════════════════════
   핫스팟 핀 – 전경 (주황)
══════════════════════════════════════════════ */
.hotspot {
  position: absolute; transform: translate(-50%,-50%);
  z-index: 20; cursor: pointer; display: flex; flex-direction: column; align-items: center;
}
.pin {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 900;
  box-shadow: 0 3px 12px rgba(0,0,0,.45);
  transition: transform .18s, box-shadow .18s;
  position: relative; z-index: 2;
  border: 3px solid #fff; color: #fff;
}
.ov-pin { background: #E07B1A; }
.pin-pulse {
  position: absolute; width: 36px; height: 36px;
  border-radius: 50%; animation: pulse 2s ease-out infinite;
  top: 0; left: 0; margin: -0px;
  /* pulse colors set per class */
}
.ov-pulse { background: rgba(224,123,26,.4); }
.hotspot:hover .pin { transform: scale(1.2); }

/* 전경 핀 활성 */
.hotspot.active .pin {
  transform: scale(1.35); border-color: #FFD580;
  box-shadow: 0 0 0 6px rgba(255,213,128,.4), 0 4px 16px rgba(0,0,0,.5);
}
.hotspot.active .pin-pulse { animation: none; opacity: 0; }
.hotspot.active::after {
  content: ''; position: absolute;
  width: 70px; height: 70px; border-radius: 50%;
  top: 0; left: 50%; transform: translate(-50%,-50%);
  pointer-events: none;
}
/* 전경 활성 링 */
.hotspot.ov-hs.active::after { border: 3px solid #FFD580; animation: ring .3s ease-out forwards; }
/* 세부 활성 링 */
.hotspot.dt-hs.active::after { border: 3px solid #5EEAD4; animation: ring .3s ease-out forwards; }

@keyframes ring {
  from { opacity:0; transform:translate(-50%,-50%) scale(.5); }
  to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
}
@keyframes pulse {
  0%   { transform:scale(1);   opacity:.8; }
  100% { transform:scale(2.4); opacity:0; }
}

/* ══════════════════════════════════════════════
   핫스팟 핀 – 세부 (청록)
══════════════════════════════════════════════ */
.dt-pin { background: #0D9488; width: 30px; height: 30px; font-size: 0.7rem; }
.dt-pulse { background: rgba(13,149,136,.4); width: 30px; height: 30px; }
/* 세부 핀 라벨 (핀 아래 작은 태그) */
.pin-label {
  margin-top: 3px;
  background: rgba(13,149,136,.92);
  color: #fff; font-size: 0.68rem; font-weight: 700;
  padding: 2px 7px; border-radius: 8px;
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
  position: relative; z-index: 2;
}
</style>
</head>

<div id="slides-wrap"></div>

</div><!-- /.app -->

/* ══════════════════════════════════════════════════════════════
   상태
══════════════════════════════════════════════════════════════ */
let curSlide = 0;
let curStage = 'overview'; // 'overview' | 'detail'
let curMode  = 'view';     // 'view' | 'practice'
let activeHS = null;       // { s, i, stage }

/* ══════════════════════════════════════════════════════════════
   초기화: 슬라이드 HTML 동적 생성
══════════════════════════════════════════════════════════════ */
(function init() {
  const wrap = document.getElementById('slides-wrap');
  wrap.style.cssText = 'flex:1;overflow:hidden;position:relative;';

  SLIDES.forEach((slide, s) => {
    /* 전경 핀 */
    const ovPins = slide.overview.map((hs, i) => `
      <div class="hotspot ov-hs" style="left:${hs.x}%;top:${hs.y}%"
           data-s="${s}" data-i="${i}" data-stage="overview">
        <div class="pin-pulse ov-pulse"></div>
        <div class="pin ov-pin">${NUMS[i]}</div>
      </div>`).join('');

    /* 세부 핀 (초기: 숨김) */
    const dtPins = slide.detail.map((hs, i) => `
      <div class="hotspot dt-hs" style="left:${hs.x}%;top:${hs.y}%;display:none"
           data-s="${s}" data-i="${i}" data-stage="detail">
        <div class="pin-pulse dt-pulse"></div>
        <div class="pin dt-pin">${NUMS[i]}</div>
        <div class="pin-label">${hs.label}</div>
      </div>`).join('');

    const panel = document.createElement('div');
    panel.className = 'slide-panel' + (s === 0 ? ' active' : '');
    panel.id = 'slide-' + s;
    panel.style.cssText = 'width:100%;height:100%;';
    panel.innerHTML = `
      <div class="photo-wrap" id="photo-${s}" onclick="clearSel(${s})">
        <img src="${slide.image}" alt="${slide.alt}" draggable="false">
        ${ovPins}
        ${dtPins}
        <div class="bubble" id="bubble-${s}">
          <div class="b-label" id="blbl-${s}"></div>
          <div id="bcont-${s}"></div>
        </div>
      </div>`;
    wrap.appendChild(panel);
  });

  /* 핫스팟 클릭 이벤트 */
  document.querySelectorAll('.hotspot').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const s     = +this.dataset.s;
      const i     = +this.dataset.i;
      const stage = this.dataset.stage;
      if (activeHS && activeHS.s===s && activeHS.i===i && activeHS.stage===stage) {
        clearSel(s); return;
      }
      activate(s, i, stage, this);
    });
  });
})();

/* ══════════════════════════════════════════════════════════════
   탭 전환
══════════════════════════════════════════════════════════════ */
function showSlide(n) {
  document.querySelectorAll('.slide-panel').forEach((el,i) => el.classList.toggle('active', i===n));
  document.querySelectorAll('.tab-btn').forEach((el,i)     => el.classList.toggle('active', i===n));
  curSlide = n;
  activeHS = null;
}

/* ══════════════════════════════════════════════════════════════
   전경 / 세부 전환
══════════════════════════════════════════════════════════════ */
function setStage(stage) {
  curStage = stage;
  const ovBtn = document.getElementById('btn-ov');
  const dtBtn = document.getElementById('btn-dt');

  ovBtn.className = 'tg-btn' + (stage==='overview' ? ' active-ov' : '');
  dtBtn.className = 'tg-btn' + (stage==='detail'   ? ' active-dt' : '');

  document.querySelectorAll('.ov-hs').forEach(el => el.style.display = stage==='overview' ? '' : 'none');
  document.querySelectorAll('.dt-hs').forEach(el => el.style.display = stage==='detail'   ? '' : 'none');

  /* 현재 슬라이드 말풍선 닫기 */
  if (activeHS !== null) clearSel(curSlide);
}

/* ══════════════════════════════════════════════════════════════
   바로보기 / 연습 모드 전환
══════════════════════════════════════════════════════════════ */
function setMode(mode) {
  curMode = mode;
  document.getElementById('btn-view').className     = 'tg-btn' + (mode==='view'     ? ' active-mode' : '');
  document.getElementById('btn-practice').className = 'tg-btn' + (mode==='practice' ? ' active-mode' : '');
  /* 선택 중인 핀이 있으면 내용 다시 렌더 */
  if (activeHS) {
    const el = document.querySelector(`[data-s="${activeHS.s}"][data-i="${activeHS.i}"][data-stage="${activeHS.stage}"]`);
    activate(activeHS.s, activeHS.i, activeHS.stage, el);
  }
}

/* ══════════════════════════════════════════════════════════════
   핀 활성화
══════════════════════════════════════════════════════════════ */
function activate(s, i, stage, el) {
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
  if (el) el.classList.add('active');
  activeHS = { s, i, stage };

  const data = stage==='overview' ? SLIDES[s].overview[i] : SLIDES[s].detail[i];

  /* 꼬리 위치 계산: 핀 x% → 말풍선 상대 위치
     말풍선이 left:7% ~ right:7% (너비 86%) */
  const pinX   = parseFloat(el.style.left);
  const tailPct = Math.max(6, Math.min(94, (pinX - 7) / 86 * 100));

  const bubble = document.getElementById('bubble-' + s);
  bubble.style.setProperty('--tail-x', tailPct + '%');

  /* 말풍선 테두리 색 (세부=청록) */
  bubble.style.borderColor = stage==='detail' ? '#0D9488' : '#1A3D6E';

  /* 말풍선 꼬리 색 (::after는 border-top으로 색 지정) */
  /* CSS 변수로 처리 */
  bubble.style.setProperty('--tail-color', stage==='detail' ? '#0D9488' : '#1A3D6E');

  /* 라벨 */
  const lbl = document.getElementById('blbl-' + s);
  lbl.textContent = data.label;
  lbl.className   = 'b-label' + (stage==='detail' ? ' dt' : '');

  /* 내용 렌더 */
  if (curMode === 'view') renderView(s, data, stage);
  else renderPractice(s, data, stage);

  bubble.classList.add('show');
}

/* ══════════════════════════════════════════════════════════════
   바로 보기 렌더
══════════════════════════════════════════════════════════════ */
function renderView(s, data, stage) {
  const bltClass = stage==='detail' ? 'blt dt' : 'blt';
  const items = data.s.map(sen =>
    `<li><span class="${bltClass}">▸</span><span>${sen}</span></li>`
  ).join('');

  /* 전경 모드일 때만 "세부 보기" 버튼 표시 */
  const footer = stage==='overview'
    ? `<div class="b-footer"><button class="b-to-detail-btn" onclick="setStage('detail')">세부 보기 →</button></div>`
    : '';

  document.getElementById('bcont-'+s).innerHTML =
    `<ul class="b-list">${items}</ul>${footer}`;
}

/* ══════════════════════════════════════════════════════════════
   연습 모드 렌더
══════════════════════════════════════════════════════════════ */
function renderPractice(s, data, stage) {
  document.getElementById('bcont-'+s).innerHTML = `
    <p class="b-prompt">📝 <strong>"${data.label}"</strong> 부분을 한국어로 묘사해 보세요.</p>
    <button class="b-reveal-btn" onclick="revealPractice(${s})">정답 확인 →</button>`;
}

function revealPractice(s) {
  if (!activeHS) return;
  const { i, stage } = activeHS;
  const data = stage==='overview' ? SLIDES[s].overview[i] : SLIDES[s].detail[i];
  const bltClass = stage==='detail' ? 'blt dt' : 'blt';
  const items = data.s.map(sen =>
    `<li><span class="${bltClass}">▸</span><span>${sen}</span></li>`
  ).join('');
  const footer = stage==='overview'
    ? `<div class="b-footer"><button class="b-to-detail-btn" onclick="setStage('detail')">세부 보기 →</button></div>`
    : '';
  document.getElementById('bcont-'+s).innerHTML = `
    <div class="b-answer-head">예시 답안</div>
    <ul class="b-list">${items}</ul>
    <button class="b-retry-btn" onclick="renderPractice(${s}, ${
      stage==='overview' ? `SLIDES[${s}].overview[${i}]` : `SLIDES[${s}].detail[${i}]`
    }, '${stage}')">다시 보기</button>${footer}`;
}

/* ══════════════════════════════════════════════════════════════
   선택 해제
══════════════════════════════════════════════════════════════ */
function clearSel(s) {
  document.querySelectorAll(`#photo-${s} .hotspot`).forEach(h => h.classList.remove('active'));
  const bubble = document.getElementById('bubble-'+s);
  bubble.classList.remove('show');
  bubble.style.borderColor = '#1A3D6E';
  activeHS = null;
}
</script>

<!-- 말풍선 꼬리 색상 동적 처리 (CSS 변수로는 border-color 변경 불가하여 JS에서 직접 처리됨) -->
<style>
/* ::after 꼬리는 border-top 색상을 직접 바꿀 수 없으므로
   .bubble 자체의 border-color와 일치시키기 위해 JS로 처리 */
</style>
</body>
