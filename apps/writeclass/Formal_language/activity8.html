/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let order = [];
let current = 0;
let score = 0;

/* ══════════════════════════════════════════
   PC MODE
══════════════════════════════════════════ */
function initPCMode(){
  if(localStorage.getItem('formalView')==='pc'){
    document.body.classList.add('pc-mode');
    document.getElementById('pc-toggle-label').textContent='모바일 화면';
  }
}
function togglePCMode(){
  const b=document.body;
  if(b.classList.toggle('pc-mode')){
    localStorage.setItem('formalView','pc');
    document.getElementById('pc-toggle-label').textContent='모바일 화면';
  } else {
    localStorage.setItem('formalView','mobile');
    document.getElementById('pc-toggle-label').textContent='PC 화면';
  }
}

/* ══════════════════════════════════════════
   GAME
══════════════════════════════════════════ */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startGame(){
  order = shuffle([...Array(PAIRS.length).keys()]);
  current = 0;
  score = 0;
  document.getElementById('result-screen').classList.remove('show');
  renderQuestion();
  updateProgress();
}

function updateProgress(){
  const total = PAIRS.length;
  const pct = total > 0 ? (current / total) * 100 : 0;
  document.getElementById('pb-fill').style.width = pct + '%';
  document.getElementById('pb-label').textContent = `${current} / ${total}`;
  document.getElementById('pb-score').textContent = `✓ ${score}`;
}

function renderQuestion(){
  if(current >= PAIRS.length){ showResult(); return; }
  const p = PAIRS[order[current]];
  const qi = current + 1;

  // Randomly swap A/B on display for variety
  const swap = Math.random() < .5;
  const leftKey = swap ? 'B' : 'A';
  const rightKey = swap ? 'A' : 'B';

  document.getElementById('question-area').innerHTML = `
    <div class="sit-card" id="sit-card-${qi}">
      <div class="sit-head">
        <div class="sit-num">${qi}</div>
        <div class="sit-desc">📌 ${p.ctx}</div>
        <button class="vn-sit-btn" onclick="toggleSitVN(${qi})">🇻🇳 VN</button>
      </div>
      <div class="sit-vn" id="sit-vn-${qi}">${p.ctxVN}</div>
      <div class="email-row">
        <div class="email-option" id="opt-left" onclick="choose('${leftKey}',${qi})">
          <div class="eo-label">📄 이메일 ${leftKey}</div>
          <div class="eo-body">${p[leftKey]}</div>
          <span class="result-badge" id="badge-left"></span>
        </div>
        <div class="email-option" id="opt-right" onclick="choose('${rightKey}',${qi})">
          <div class="eo-label">📄 이메일 ${rightKey}</div>
          <div class="eo-body">${p[rightKey]}</div>
          <span class="result-badge" id="badge-right"></span>
        </div>
      </div>
      <div class="explain-panel" id="explain-${qi}">
        <div class="explain-title">💡 해설</div>
        <div class="explain-body">
          ${p.points.map(pt=>`<div class="point"><span class="pt-icon">${pt.icon}</span><span>${pt.text}</span></div>`).join('')}
        </div>
      </div>
      <div class="next-row">
        <button class="btn-next" id="btn-next-${qi}" onclick="nextQ()">다음 문제 →</button>
      </div>
    </div>
  `;
  // store mapping
  document.getElementById('opt-left').dataset.key = leftKey;
  document.getElementById('opt-right').dataset.key = rightKey;
  document.getElementById('opt-left').dataset.correct = p.correct;
  document.getElementById('opt-right').dataset.correct = p.correct;
}

function toggleSitVN(qi){
  const vn = document.getElementById('sit-vn-'+qi);
  const btn = vn.previousElementSibling.querySelector('.vn-sit-btn');
  const on = vn.classList.toggle('visible');
  if(btn){ btn.classList.toggle('on',on); btn.textContent=on?'🇻🇳 숨기기':'🇻🇳 VN'; }
}

let answered = false;
function choose(chosen, qi){
  if(answered) return;
  answered = true;
  const p = PAIRS[order[current]];
  const correct = chosen === p.correct;
  if(correct) score++;

  // Visual feedback
  const left = document.getElementById('opt-left');
  const right = document.getElementById('opt-right');
  const lKey = left.dataset.key;
  const rKey = right.dataset.key;

  [left, right].forEach(el => {
    const k = el.dataset.key;
    const badge = el.querySelector('.result-badge');
    if(k === p.correct){
      el.classList.add('correct');
      badge.textContent = '✅ 정답';
      badge.className = 'result-badge rb-ok show';
    } else {
      el.classList.add('wrong');
      badge.textContent = '❌ 오답';
      badge.className = 'result-badge rb-ng show';
    }
    el.onclick = null; // disable
  });

  // Show explanation
  document.getElementById('explain-'+qi).classList.add('show');
  document.getElementById('btn-next-'+qi).classList.add('show');
  updateProgress();
}

function nextQ(){
  answered = false;
  current++;
  updateProgress();
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showResult(){
  document.getElementById('question-area').innerHTML='';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');
  const total = PAIRS.length;
  const pct = Math.round((score/total)*100);
  let icon='🎉',title='',msg='';
  if(pct===100){ icon='🏆'; title='완벽합니다!'; msg='모든 이메일을 정확히 판단했습니다. 격식체 감각이 탁월해요!'; }
  else if(pct>=75){ icon='😊'; title='훌륭해요!'; msg='대부분의 이메일을 올바르게 골랐습니다.'; }
  else if(pct>=50){ icon='🙂'; title='절반 이상!'; msg='조금 더 연습하면 금방 잘할 수 있을 거예요.'; }
  else { icon='📚'; title='다시 도전해요!'; msg='해설을 잘 읽고 다시 한번 도전해 보세요!'; }
  document.getElementById('r-icon').textContent=icon;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-score').textContent=`${score} / ${total} (${pct}%)`;
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('r-c').textContent=`✓ ${score}개 정답`;
  document.getElementById('r-w').textContent=`✗ ${total-score}개 오답`;
  document.getElementById('pb-fill').style.width='100%';
  document.getElementById('pb-label').textContent=`${total} / ${total}`;
  document.getElementById('pb-score').textContent=`✓ ${score}`;
}

initPCMode();
startGame();
</script>
