<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>격식 / 비격식 판단 게임</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1e293b;font-size:16px}

    /* ── Nav ── */
    header{background:linear-gradient(135deg,#1a4a7a,#2c5f8a);color:#fff;padding:1rem 1rem .6rem;text-align:center}
    header h1{font-size:1.25rem;font-weight:700;margin-bottom:.2rem}
    header p{font-size:.8rem;opacity:.85;margin-bottom:.7rem}
    .nav-links{display:flex;gap:.4rem;overflow-x:auto;padding:.2rem 0;scrollbar-width:none;justify-content:flex-start}
    .nav-links::-webkit-scrollbar{display:none}
    .nav-link{white-space:nowrap;padding:.32rem .75rem;border-radius:14px;background:rgba(255,255,255,.15);color:#fff;text-decoration:none;font-size:.75rem;font-weight:500;transition:background .2s;flex-shrink:0}
    .nav-link:hover{background:rgba(255,255,255,.28)}
    .nav-link.cur{background:#fff;color:#1a4a7a;font-weight:700}

    /* ── PC mode ── */
    body.pc-mode main{max-width:860px;margin:0 auto}
    body.pc-mode .card-stage{min-height:340px}
    .pc-toggle{position:fixed;bottom:1rem;right:1rem;z-index:999;background:#1a4a7a;color:#fff;border:none;border-radius:20px;padding:.45rem 1rem;font-size:.78rem;font-family:inherit;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25);display:flex;align-items:center;gap:.35rem}
    .pc-toggle:hover{background:#2c5f8a}

    main{padding:.9rem .85rem 5rem}

    /* ── Score bar ── */
    .score-bar{background:#fff;border-radius:12px;padding:.75rem 1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.6rem;box-shadow:0 1px 6px rgba(0,0,0,.07)}
    .sb-progress{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
    .sb-fill{height:100%;background:linear-gradient(90deg,#2c5f8a,#22c55e);border-radius:4px;transition:width .4s ease}
    .sb-label{font-size:.8rem;font-weight:700;color:#1a4a7a;white-space:nowrap}
    .sb-score{font-size:.8rem;color:#555;white-space:nowrap}

    /* ── Card stage ── */
    .card-stage{position:relative;min-height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem}

    .swipe-card{
      width:100%;max-width:480px;background:#fff;border-radius:18px;
      box-shadow:0 4px 20px rgba(0,0,0,.12);padding:1.4rem 1.2rem;
      transition:transform .35s ease, opacity .35s ease;
      position:relative;
    }
    .swipe-card.fly-left{transform:translateX(-120%) rotate(-12deg);opacity:0}
    .swipe-card.fly-right{transform:translateX(120%) rotate(12deg);opacity:0}
    .swipe-card.pop-in{animation:popIn .3s ease}

    @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .ctx-badge{display:inline-block;padding:.25rem .7rem;background:#eff6ff;color:#2c5f8a;border-radius:12px;font-size:.73rem;font-weight:700;margin-bottom:.75rem}
    .card-sentence{font-size:1.1rem;font-weight:700;color:#1e293b;line-height:1.55;margin-bottom:.9rem;min-height:2.5rem}
    .card-note{font-size:.78rem;color:#777;margin-bottom:.9rem;line-height:1.5}

    .vn-row{margin-bottom:.6rem}
    .vn-toggle-btn{background:none;border:1px solid #bcd;border-radius:10px;color:#2c5f8a;font-size:.73rem;padding:.22rem .6rem;cursor:pointer;font-family:inherit}
    .vn-toggle-btn.on{background:#eff6ff}
    .card-vn{display:none;font-size:.77rem;color:#5a7a9a;margin-top:.35rem;line-height:1.5;padding:.5rem .7rem;background:#f7fbff;border-radius:8px;border-left:3px solid #93c5fd}
    .card-vn.visible{display:block;animation:fadeIn .2s ease}

    /* Feedback overlay */
    .feedback-overlay{display:none;position:absolute;inset:0;border-radius:18px;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;font-size:1rem;font-weight:700;animation:fadeIn .2s ease}
    .feedback-overlay.show{display:flex}
    .feedback-overlay.correct{background:rgba(34,197,94,.92);color:#fff}
    .feedback-overlay.wrong{background:rgba(239,68,68,.92);color:#fff}
    .feedback-overlay .fb-icon{font-size:2.5rem}
    .feedback-overlay .fb-text{font-size:1rem;font-weight:700;text-align:center;padding:0 .5rem}
    .feedback-overlay .fb-why{font-size:.8rem;font-weight:400;opacity:.93;text-align:center;padding:0 .8rem;line-height:1.5;margin-top:.2rem}

    /* ── Buttons ── */
    .btn-row{display:flex;gap:.8rem;justify-content:center}
    .judge-btn{flex:1;max-width:160px;padding:.85rem .5rem;border:none;border-radius:14px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:.2rem}
    .judge-btn span.lbl{font-size:.7rem;font-weight:500;opacity:.85}
    .btn-formal{background:#22c55e;color:#fff;box-shadow:0 3px 10px rgba(34,197,94,.4)}
    .btn-formal:hover{background:#16a34a}
    .btn-informal{background:#ef4444;color:#fff;box-shadow:0 3px 10px rgba(239,68,68,.35)}
    .btn-informal:hover{background:#dc2626}
    .judge-btn:disabled{opacity:.45;cursor:not-allowed}

    /* ── Result screen ── */
    .result-screen{display:none;animation:fadeIn .4s ease}
    .result-screen.show{display:block}
    .result-card{background:#fff;border-radius:18px;padding:1.6rem 1.2rem;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
    .result-icon{font-size:3.5rem;margin-bottom:.6rem}
    .result-title{font-size:1.3rem;font-weight:700;color:#1a4a7a;margin-bottom:.3rem}
    .result-score{font-size:2.2rem;font-weight:700;color:#22c55e;margin:.5rem 0}
    .result-msg{font-size:.9rem;color:#555;line-height:1.6;margin-bottom:1rem}
    .result-breakdown{display:flex;gap:.7rem;justify-content:center;margin-bottom:1.2rem;flex-wrap:wrap}
    .rb-item{padding:.4rem .9rem;border-radius:10px;font-size:.8rem;font-weight:700}
    .rb-correct{background:#dcfce7;color:#166534}
    .rb-wrong{background:#fee2e2;color:#991b1b}
    .btn-retry{background:#1a4a7a;color:#fff;border:none;border-radius:12px;padding:.75rem 2rem;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;width:100%;max-width:260px}
    .btn-retry:hover{background:#2c5f8a}
    .missed-list{text-align:left;margin-top:1rem}
    .missed-item{padding:.6rem .8rem;background:#fff7ed;border-left:3px solid #f97316;border-radius:0 8px 8px 0;margin-bottom:.5rem;font-size:.8rem;line-height:1.5}
    .missed-item strong{color:#c2410c;display:block;margin-bottom:.2rem}

    /* Empty state */
    .no-cards{text-align:center;padding:3rem 1rem;color:#999;font-size:.9rem}
  </style>
</head>
<body>

<header>
  <h1>⚡ 격식 / 비격식 판단</h1>
  <p>이 표현, 격식체로 쓸 수 있을까요?</p>
  <div class="nav-links">

    <a href="activity2.html" class="nav-link">🔄 변환</a>
    <a href="activity3.html" class="nav-link">📋 순서</a>
    <a href="activity4.html" class="nav-link">🃏 어휘</a>
    <a href="activity5.html" class="nav-link">🎴 상황 카드</a>

<main>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="sb-progress"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
    <span class="sb-label" id="sb-label">0 / 20</span>
    <span class="sb-score" id="sb-score">✓ 0</span>
  </div>

  <!-- Card stage -->
  <div class="card-stage" id="card-stage">
    <div class="swipe-card pop-in" id="swipe-card">
      <span class="ctx-badge" id="ctx-badge"></span>
      <div class="card-sentence" id="card-sentence"></div>
      <div class="card-note" id="card-note"></div>
      <div class="vn-row">
        <button class="vn-toggle-btn" id="vn-btn" onclick="toggleCardVN()">🇻🇳 VN</button>
        <div class="card-vn" id="card-vn"></div>
      </div>
      <div class="feedback-overlay" id="feedback-overlay">
        <div class="fb-icon" id="fb-icon"></div>
        <div class="fb-text" id="fb-text"></div>
        <div class="fb-why" id="fb-why"></div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row" id="btn-row">
    <button class="judge-btn btn-informal" id="btn-no" onclick="judge(false)">
      ❌ 비격식
      <span class="lbl">공식 이메일에 부적절</span>
    </button>
    <button class="judge-btn btn-formal" id="btn-yes" onclick="judge(true)">
      ✅ 격식체
      <span class="lbl">공식 이메일에 사용 가능</span>
    </button>
  </div>

  <!-- Result screen -->
  <div class="result-screen" id="result-screen">
    <div class="result-card">
      <div class="result-icon" id="r-icon"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-score" id="r-score"></div>
      <div class="result-msg" id="r-msg"></div>
      <div class="result-breakdown">
        <span class="rb-item rb-correct" id="r-correct">✓ 0개 정답</span>
        <span class="rb-item rb-wrong" id="r-wrong">✗ 0개 오답</span>
      </div>
      <button class="btn-retry" onclick="startGame()">🔄 다시 도전</button>
      <div class="missed-list" id="missed-list"></div>
    </div>
  </div>

</main>

<button class="pc-toggle" onclick="togglePCMode()">
  🖥 <span id="pc-toggle-label">PC 화면</span>
</button>

<footer style="text-align:center;padding:1.5rem;font-size:.78rem;color:#aaa;border-top:1px solid #e8ecf0;margin-top:1rem">
  <a href="index.html" style="color:#2c5f8a;text-decoration:none">← 실습 페이지로</a>
</footer>

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let queue = [];
let current = 0;
let score = 0;
let wrongCards = [];
let waiting = false;

/* ══════════════════════════════════════════
   PC MODE
══════════════════════════════════════════ */
function initPCMode(){
  if(localStorage.getItem('formalView')==='pc'){
    document.body.classList.add('pc-mode');
    document.getElementById('pc-toggle-label').textContent='모바일 화면';
  }
}
function togglePCMode(){
  const b=document.body;
  if(b.classList.toggle('pc-mode')){
    localStorage.setItem('formalView','pc');
    document.getElementById('pc-toggle-label').textContent='모바일 화면';
  } else {
    localStorage.setItem('formalView','mobile');
    document.getElementById('pc-toggle-label').textContent='PC 화면';
  }
}

/* ══════════════════════════════════════════
   GAME LOGIC
══════════════════════════════════════════ */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startGame(){
  queue = shuffle([...Array(CARDS.length).keys()]);
  current = 0;
  score = 0;
  wrongCards = [];
  waiting = false;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('card-stage').style.display='flex';
  document.getElementById('btn-row').style.display='flex';
  showCard();
}

function showCard(){
  if(current >= queue.length){ showResult(); return; }
  const c = CARDS[queue[current]];
  document.getElementById('ctx-badge').textContent = c.ctx;
  document.getElementById('card-sentence').textContent = c.s;
  document.getElementById('card-note').textContent = c.note;
  document.getElementById('card-vn').textContent = c.vn;
  document.getElementById('card-vn').classList.remove('visible');
  document.getElementById('vn-btn').classList.remove('on');
  document.getElementById('vn-btn').textContent = '🇻🇳 VN';
  document.getElementById('feedback-overlay').classList.remove('show','correct','wrong');

  const card = document.getElementById('swipe-card');
  card.classList.remove('fly-left','fly-right');
  card.style.transition='none';
  card.style.transform='';
  card.style.opacity='1';
  void card.offsetHeight;
  card.style.transition='';
  card.classList.add('pop-in');
  setTimeout(()=>card.classList.remove('pop-in'), 300);

  setBtnsDisabled(false);
  updateScoreBar();
}

function judge(isFormal){
  if(waiting) return;
  waiting = true;
  setBtnsDisabled(true);

  const c = CARDS[queue[current]];
  const correct = (isFormal === c.formal);
  if(correct) score++;
  else wrongCards.push(queue[current]);

  // feedback overlay
  const fo = document.getElementById('feedback-overlay');
  document.getElementById('fb-icon').textContent = correct ? '🎉' : '😅';
  document.getElementById('fb-text').textContent = correct ? '정답입니다!' : (c.formal ? '이건 격식체예요!' : '이건 비격식체예요!');
  document.getElementById('fb-why').textContent = c.why;
  fo.classList.add('show', correct ? 'correct' : 'wrong');

  updateScoreBar();

  // fly animation after delay
  setTimeout(()=>{
    const card = document.getElementById('swipe-card');
    card.classList.add(isFormal ? 'fly-right' : 'fly-left');
    setTimeout(()=>{
      current++;
      waiting = false;
      showCard();
    }, 360);
  }, 1600);
}

function toggleCardVN(){
  const vn = document.getElementById('card-vn');
  const btn = document.getElementById('vn-btn');
  const on = vn.classList.toggle('visible');
  btn.classList.toggle('on', on);
  btn.textContent = on ? '🇻🇳 숨기기' : '🇻🇳 VN';
}

function setBtnsDisabled(d){
  document.getElementById('btn-yes').disabled = d;
  document.getElementById('btn-no').disabled = d;
}

function updateScoreBar(){
  const total = queue.length;
  const done = current;
  const pct = total > 0 ? (done/total)*100 : 0;
  document.getElementById('sb-fill').style.width = pct+'%';
  document.getElementById('sb-label').textContent = `${done} / ${total}`;
  document.getElementById('sb-score').textContent = `✓ ${score}`;
}

function showResult(){
  document.getElementById('card-stage').style.display='none';
  document.getElementById('btn-row').style.display='none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const total = queue.length;
  const pct = Math.round((score/total)*100);
  let icon='🎉', title='대단해요!', msg='';
  if(pct>=90){ icon='🏆'; title='격식체 달인!'; msg='거의 완벽합니다. 격식체 감각이 뛰어나네요!'; }
  else if(pct>=70){ icon='😊'; title='잘했어요!'; msg='좋은 성적입니다. 틀린 문장을 다시 확인해 보세요.'; }
  else if(pct>=50){ icon='🙂'; title='조금 더 연습해요'; msg='절반 이상 맞혔어요. 비격식 표현을 더 익혀 보세요!'; }
  else { icon='📚'; title='다시 도전해요!'; msg='격식체와 비격식체의 차이를 조금 더 공부해 보세요.'; }

  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-score').textContent = `${score} / ${total} (${pct}%)`;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('r-correct').textContent = `✓ ${score}개 정답`;
  document.getElementById('r-wrong').textContent = `✗ ${total-score}개 오답`;

  // Show missed cards
  const ml = document.getElementById('missed-list');
  if(wrongCards.length === 0){
    ml.innerHTML = '';
  } else {
    ml.innerHTML = '<div style="font-weight:700;font-size:.85rem;color:#1a4a7a;margin:.8rem 0 .4rem">틀린 표현 복습</div>' +
      wrongCards.map(idx=>{
        const c = CARDS[idx];
        return `<div class="missed-item">
          <strong>${c.formal ? '✅ 격식체' : '❌ 비격식체'} — "${c.s}"</strong>
          ${c.why}
        </div>`;
      }).join('');
  }
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
initPCMode();
startGame();
</script>
