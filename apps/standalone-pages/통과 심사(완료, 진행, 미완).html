<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>문법 입장 심사소 - 인터뷰 버전</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #1f2937;
            --bg-2: #7c2d12;
            --panel: #fffdf5;
            --panel-2: #f8f1df;
            --ink: #1f2937;
            --muted: #475569;
            --line: #d6c9ab;
            --allow: #166534;
            --deny: #991b1b;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "IBM Plex Sans KR", sans-serif;
            background:
                radial-gradient(circle at 20% 15%, rgba(250, 204, 21, 0.2) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(20, 184, 166, 0.15) 0%, transparent 28%),
                linear-gradient(150deg, var(--bg-1), var(--bg-2));
            color: var(--ink);
            display: grid;
            place-items: center;
        }

        .phone {
            width: min(100vw, 430px);
            height: 100dvh;
            padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
            display: grid;
            grid-template-rows: auto auto auto minmax(0, 1fr) auto auto;
            gap: 6px;
        }

        .hud,
        .rule-box,
        .npc-box,
        .interview-box,
        .feedback {
            border: 2px solid var(--line);
            border-radius: 14px;
            background: linear-gradient(160deg, var(--panel), var(--panel-2));
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
        }

        .hud {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
        }

        .logo {
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: clamp(0.82rem, 3.2vw, 0.96rem);
        }

        .metric {
            text-align: center;
            min-width: 62px;
            border-radius: 8px;
            border: 1px solid #ccb993;
            background: #fff8e7;
            padding: 3px 5px;
        }

        .metric .k {
            font-size: 0.58rem;
            color: #6b7280;
            font-weight: 700;
        }

        .metric .v {
            font-size: 0.86rem;
            font-weight: 700;
            line-height: 1.1;
            margin-top: 1px;
        }

        .rule-box {
            padding: 7px 9px;
            background: linear-gradient(155deg, #ecfeff 0%, #fefce8 100%);
            transform-origin: center center;
        }

        .rule-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
            font-size: 0.67rem;
            color: #0f766e;
            font-weight: 700;
        }

        .stage-track {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 4px;
            margin: 4px 0;
        }

        .stage-chip {
            text-align: center;
            font-size: clamp(0.58rem, 2.1vw, 0.66rem);
            font-weight: 700;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            padding: 3px 1px;
            color: #475569;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .stage-chip.active {
            color: #ffffff;
            border-color: transparent;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2);
        }

        .stage-alert {
            min-height: 16px;
            margin: 0 0 4px;
            border-radius: 8px;
            font-size: clamp(0.62rem, 2.2vw, 0.72rem);
            font-weight: 700;
            text-align: center;
            background: rgba(15, 118, 110, 0.08);
            border: 1px solid rgba(15, 118, 110, 0);
            padding: 1px 5px;
            opacity: 0;
            transform: translateY(-2px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .stage-alert.show {
            opacity: 1;
            transform: translateY(0);
            animation: stageAlertPop 0.65s ease;
            border-color: rgba(15, 118, 110, 0.45);
        }

        .rule-box.swap {
            animation: stageRuleSwap 0.62s cubic-bezier(0.2, 0.9, 0.2, 1);
        }

        .phone.stage-done .rule-box {
            border-color: #93c5fd;
            background: linear-gradient(155deg, #eff6ff 0%, #fefce8 100%);
        }

        .phone.stage-progress .rule-box {
            border-color: #86efac;
            background: linear-gradient(155deg, #ecfdf5 0%, #f0fdf4 100%);
        }

        .phone.stage-plan .rule-box {
            border-color: #fcd34d;
            background: linear-gradient(155deg, #fffbeb 0%, #fef3c7 100%);
        }

        .phone.stage-no-plan .rule-box {
            border-color: #d8b4fe;
            background: linear-gradient(155deg, #f5f3ff 0%, #fdf4ff 100%);
        }

        .phone.stage-done .stage-chip[data-key="done"].active {
            background: #2563eb;
        }

        .phone.stage-progress .stage-chip[data-key="progress"].active {
            background: #059669;
        }

        .phone.stage-plan .stage-chip[data-key="plan"].active {
            background: #d97706;
        }

        .phone.stage-no-plan .stage-chip[data-key="no-plan"].active {
            background: #9333ea;
        }

        .rule-title {
            margin: 0;
            font-size: clamp(0.84rem, 3.1vw, 0.96rem);
            line-height: 1.25;
            font-weight: 700;
        }

        .rule-vi {
            margin: 2px 0 0;
            font-size: clamp(0.63rem, 2.2vw, 0.72rem);
            color: #334155;
            line-height: 1.2;
        }

        .rule-hint {
            margin: 3px 0 0;
            font-size: clamp(0.66rem, 2.35vw, 0.75rem);
            color: var(--muted);
            line-height: 1.22;
        }

        .npc-box {
            min-height: 0;
            padding: 7px;
            display: grid;
            grid-template-columns: 56px 1fr;
            gap: 7px;
            align-items: start;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            border: 2px solid #0f766e;
            background: #f0fdfa;
            display: grid;
            place-items: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .avatar.react-good {
            background: #dcfce7;
            border-color: #22c55e;
            animation: avatarCheer 0.9s ease;
        }

        .avatar.react-bad {
            background: #fee2e2;
            border-color: #ef4444;
            animation: avatarOops 0.9s ease;
        }

        .speech {
            background: #ffffff;
            border: 1px solid #d5dbe4;
            border-radius: 12px;
            padding: 6px 8px;
            line-height: 1.35;
            min-height: 60px;
            overflow: auto;
        }

        .npc-name {
            margin: 0;
            font-size: 0.8rem;
            font-weight: 700;
            color: #0f172a;
        }

        .npc-line {
            margin: 3px 0 0;
            font-size: clamp(0.82rem, 3vw, 0.92rem);
            font-weight: 500;
        }

        .tag-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.64rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 3px 6px;
            border: 1px solid #c9d3e4;
            background: #eff6ff;
            color: #1e3a8a;
        }

        .interview-box {
            min-height: 0;
            padding: 6px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 5px;
        }

        .question-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .q-btn {
            border: 1px solid #c7d2fe;
            border-radius: 10px;
            background: #eef2ff;
            color: #1e3a8a;
            padding: 6px 6px;
            min-height: 42px;
            font-family: inherit;
            font-size: clamp(0.7rem, 2.5vw, 0.78rem);
            font-weight: 700;
            line-height: 1.2;
            display: grid;
            align-content: center;
            gap: 2px;
            cursor: pointer;
        }

        .q-btn .vi {
            font-size: clamp(0.58rem, 2vw, 0.64rem);
            opacity: 0.9;
            font-weight: 500;
        }

        .q-btn:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .q-counter {
            font-size: clamp(0.66rem, 2.2vw, 0.74rem);
            color: #64748b;
            font-weight: 700;
        }

        .interview-log {
            min-height: 0;
            overflow: auto;
            border: 1px solid #d6deeb;
            border-radius: 10px;
            background: #ffffff;
            padding: 5px;
            display: grid;
            gap: 5px;
            align-content: start;
        }

        .interview-log.empty::before {
            content: "질문 버튼을 눌러 인터뷰를 시작하세요.";
            color: #64748b;
            font-size: clamp(0.72rem, 2.5vw, 0.8rem);
        }

        .qa-item {
            border-radius: 8px;
            border: 1px solid #dbe6f7;
            background: #f8fbff;
            padding: 4px 5px;
            font-size: clamp(0.73rem, 2.6vw, 0.82rem);
            line-height: 1.3;
        }

        .qa-q {
            color: #1d4ed8;
            font-weight: 700;
            margin: 0;
        }

        .qa-a {
            margin: 2px 0 0;
        }

        .qa-gram {
            margin-left: 4px;
            font-size: 0.65rem;
            color: #0f766e;
            font-weight: 700;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        button {
            border: 0;
            border-radius: 12px;
            min-height: 50px;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.2s ease;
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 1px;
            padding: 6px;
        }

        button:active {
            transform: scale(0.985);
        }

        .btn-ko {
            font-size: clamp(0.92rem, 3.3vw, 1rem);
            font-weight: 700;
            line-height: 1.05;
        }

        .btn-vi {
            font-size: clamp(0.6rem, 2.2vw, 0.68rem);
            font-weight: 500;
            opacity: 0.9;
            line-height: 1.1;
        }

        .allow-btn {
            background: linear-gradient(160deg, #16a34a 0%, var(--allow) 100%);
        }

        .deny-btn {
            background: linear-gradient(160deg, #ef4444 0%, var(--deny) 100%);
        }

        button:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .feedback {
            padding: 5px 8px;
            font-size: clamp(0.73rem, 2.5vw, 0.81rem);
            line-height: 1.2;
            min-height: 42px;
            max-height: 52px;
            overflow: auto;
            display: grid;
            align-content: center;
        }

        @media (max-height: 820px) {
            .phone {
                padding: max(6px, env(safe-area-inset-top)) 8px max(6px, env(safe-area-inset-bottom));
                gap: 5px;
            }

            .rule-hint {
                margin-top: 2px;
            }

            button {
                min-height: 46px;
            }

            .feedback {
                min-height: 36px;
                max-height: 44px;
                padding: 4px 7px;
            }
        }

        @media (max-height: 700px) {
            .logo {
                font-size: 0.74rem;
            }

            .metric {
                min-width: 54px;
                padding: 2px 4px;
            }

            .rule-box {
                padding: 6px 7px;
            }

            .rule-title {
                font-size: 0.8rem;
            }

            .rule-vi,
            .rule-hint {
                display: none;
            }

            .stage-track {
                margin: 2px 0;
            }

            .npc-box {
                grid-template-columns: 48px 1fr;
                padding: 6px;
            }

            .avatar {
                width: 48px;
                height: 48px;
                border-radius: 10px;
                font-size: 1.3rem;
            }

            .speech {
                min-height: 52px;
                padding: 5px 6px;
            }

            .q-btn {
                min-height: 36px;
            }

            button {
                min-height: 42px;
            }

            .feedback {
                min-height: 32px;
                max-height: 38px;
                padding: 3px 7px;
                font-size: 0.7rem;
            }
        }

        .feedback.good {
            border-color: #86efac;
            background: linear-gradient(150deg, #ecfdf5 0%, #f0fdf4 100%);
        }

        .feedback.bad {
            border-color: #fca5a5;
            background: linear-gradient(150deg, #fff1f2 0%, #fef2f2 100%);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.58);
            display: none;
            place-items: center;
            padding: 20px;
        }

        .overlay.show {
            display: grid;
        }

        .result-card {
            width: min(92vw, 390px);
            border-radius: 16px;
            border: 2px solid var(--line);
            background: linear-gradient(150deg, #fffef8 0%, #fef3c7 100%);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.3);
            padding: 14px;
        }

        .result-card h2 {
            margin: 0;
            font-size: 1.18rem;
        }

        .result-score {
            margin: 6px 0 8px;
            font-size: 0.96rem;
            font-weight: 700;
        }

        .result-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 4px;
            font-size: 0.84rem;
        }

        .retry {
            margin-top: 10px;
            width: 100%;
            min-height: 46px;
            background: linear-gradient(140deg, #0d9488 0%, #115e59 100%);
        }

        .phone.hit-good {
            animation: phoneBoomGood 0.75s ease;
            box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.45), 0 12px 30px rgba(34, 197, 94, 0.35);
        }

        .phone.hit-bad {
            animation: phoneShakeBad 0.75s ease;
            box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.45), 0 12px 30px rgba(239, 68, 68, 0.35);
        }

        .global-fx {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            display: none;
            place-items: center;
        }

        .global-fx.show {
            display: grid;
        }

        .global-fx.good {
            background: radial-gradient(circle at center, rgba(34, 197, 94, 0.5) 0%, rgba(16, 185, 129, 0.22) 35%, rgba(0, 0, 0, 0) 70%);
            animation: screenFlashGood 0.85s ease forwards;
        }

        .global-fx.bad {
            background: radial-gradient(circle at center, rgba(239, 68, 68, 0.54) 0%, rgba(244, 63, 94, 0.24) 35%, rgba(0, 0, 0, 0) 70%);
            animation: screenFlashBad 0.85s ease forwards;
        }

        .fx-text {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.4rem, 16vw, 4.8rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 8px 24px rgba(15, 23, 42, 0.55);
            opacity: 0;
        }

        .fx-text.good {
            color: #dcfce7;
            animation: textPopGood 0.8s ease forwards;
        }

        .fx-text.bad {
            color: #fee2e2;
            animation: textPopBad 0.8s ease forwards;
        }

        .fx-burst {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .fx-particle {
            position: absolute;
            left: 50%;
            top: 56%;
            width: 10px;
            height: 20px;
            border-radius: 99px;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: particleBlast 0.85s ease-out forwards;
            animation-delay: var(--delay, 0ms);
            background: var(--pcolor, #ffffff);
        }

        @keyframes avatarCheer {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.24) rotate(-6deg); }
            50% { transform: scale(1.08) rotate(6deg); }
            75% { transform: scale(1.16) rotate(-4deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes stageAlertPop {
            0% { transform: translateY(-7px) scale(0.94); opacity: 0; }
            45% { transform: translateY(0) scale(1.06); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes stageRuleSwap {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1);
                filter: blur(0);
            }
            34% {
                opacity: 0.05;
                transform: translateX(-20px) scale(0.96);
                filter: blur(2px);
            }
            35% {
                opacity: 0.05;
                transform: translateX(20px) scale(0.96);
                filter: blur(2px);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes avatarOops {
            0% { transform: scale(1) translateX(0); }
            18% { transform: scale(1.05) translateX(-8px) rotate(-5deg); }
            36% { transform: scale(1.03) translateX(8px) rotate(5deg); }
            54% { transform: scale(1.05) translateX(-6px) rotate(-4deg); }
            72% { transform: scale(1.02) translateX(6px) rotate(4deg); }
            100% { transform: scale(1) translateX(0) rotate(0deg); }
        }

        @keyframes phoneBoomGood {
            0% { transform: scale(1); }
            20% { transform: scale(1.035); }
            40% { transform: scale(0.985); }
            60% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes phoneShakeBad {
            0% { transform: translateX(0) rotate(0deg); }
            15% { transform: translateX(-9px) rotate(-1.5deg); }
            30% { transform: translateX(9px) rotate(1.5deg); }
            45% { transform: translateX(-8px) rotate(-1.4deg); }
            60% { transform: translateX(8px) rotate(1.2deg); }
            75% { transform: translateX(-5px) rotate(-0.8deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        @keyframes screenFlashGood {
            0% { opacity: 0; }
            18% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes screenFlashBad {
            0% { opacity: 0; }
            15% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes textPopGood {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.35); }
            22% { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
            40% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
        }

        @keyframes textPopBad {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.45) rotate(0deg); }
            22% { opacity: 1; transform: translate(-50%, -50%) scale(1.16) rotate(-4deg); }
            42% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(3deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.06) rotate(0deg); }
        }

        @keyframes particleBlast {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot));
            }
        }
    </style>
</head>
<body>
    <main class="phone stage-done" id="phoneApp" aria-live="polite">
        <section class="hud">
            <div class="logo">문법 입장 심사소: 인터뷰</div>
            <div class="metric">
                <div class="k">STAGE</div>
                <div class="v" id="stageView">1/4</div>
            </div>
            <div class="metric">
                <div class="k">ROUND</div>
                <div class="v" id="roundView">1/16</div>
            </div>
        </section>

        <section class="rule-box" id="ruleBox">
            <div class="rule-head">
                <span id="stageNameView">완료 스테이지</span>
                <span id="scoreView">점수 0</span>
            </div>
            <div class="stage-track" id="stageTrack">
                <span class="stage-chip active" data-key="done">완료</span>
                <span class="stage-chip" data-key="progress">진행</span>
                <span class="stage-chip" data-key="plan">계획</span>
                <span class="stage-chip" data-key="no-plan">계획 없음</span>
            </div>
            <div class="stage-alert" id="stageAlert" aria-live="polite"></div>
            <h1 class="rule-title" id="ruleText">규칙 로딩 중...</h1>
            <p class="rule-vi" id="ruleVi"></p>
            <p class="rule-hint" id="ruleHint"></p>
        </section>

        <section class="npc-box">
            <div class="avatar" id="npcAvatar">🙂</div>
            <article class="speech">
                <p class="npc-name" id="npcName">...</p>
                <p class="npc-line" id="npcLine">...</p>
                <div class="tag-row" style="margin-top:6px;">
                    <span class="tag" id="grammarTag">문법</span>
                    <span class="tag" id="focusTag">힌트</span>
                </div>
            </article>
        </section>

        <section class="interview-box">
            <div class="question-grid" id="questionGrid"></div>
            <div class="q-counter" id="questionCounter">질문 0/3</div>
            <div class="interview-log empty" id="interviewLog"></div>
        </section>

        <section class="actions">
            <button class="allow-btn" id="allowBtn" type="button">
                <span class="btn-ko">허락</span>
                <span class="btn-vi">Cho vào</span>
            </button>
            <button class="deny-btn" id="denyBtn" type="button">
                <span class="btn-ko">허락 안 함</span>
                <span class="btn-vi">Không cho vào</span>
            </button>
        </section>

        <section class="feedback" id="feedback">

        function shuffle(arr) {
            const clone = [...arr];
            for (let i = clone.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [clone[i], clone[j]] = [clone[j], clone[i]];
            }
            return clone;
        }

        function cloneTemplate(template) {
            return JSON.parse(JSON.stringify(template));
        }

        function pickMany(pool, count) {
            if (pool.length === 0) {
                return [];
            }
            const picked = [];
            let idx = 0;
            const shuffled = shuffle(pool);
            while (picked.length < count) {
                picked.push(shuffled[idx % shuffled.length]);
                idx += 1;
            }
            return picked;
        }

        function pickPlanStyle(name) {
            const pool = ["생각이에요", "예정이에요", "계획이에요"];
            const code = name.charCodeAt(0) || 0;
            return pool[code % pool.length];
        }

        function buildStageTopicMap() {
            const shuffledTopics = shuffle(TOPICS);
            const stageTopicMap = {};
            STAGES.forEach((stage, index) => {
                stageTopicMap[stage.key] = shuffledTopics[index % shuffledTopics.length];
            });
            return stageTopicMap;
        }

        function getCurrentScenario() {
            return state.deck[state.index] || null;

        function getAnswerForQuestion(npc, topic, questionId) {
            const planStyle = pickPlanStyle(npc.name);
            const answers = topic.answers;
            if (questionId === "cert") {
                if (npc.status === "done") {
                    return { text: answers.certDone, grammar: "-았어요" };
                }
                return { text: answers.certNo, grammar: "-았어요(부정)" };
            }

            if (questionId === "study") {
                if (npc.status === "progress") {
                    return { text: answers.studyProgress, grammar: "-고 있어요" };
                }
                if (npc.status === "done") {
                    return { text: answers.studyDone, grammar: "-고 있어요" };
                }
                return { text: answers.studyNo, grammar: "-고 있어요(부정)" };
            }

            if (questionId === "plan") {
                if (npc.status === "no-plan") {
                    return { text: answers.planNo, grammar: "-(으)ㄹ 계획이 없어요" };
                }
                return {
                    text: answers.planYes.replace("{planStyle}", planStyle),
                    grammar: `-(으)ㄹ ${planStyle}`
                };
            }

            if (npc.status === "done") {
                return { text: answers.levelDone, grammar: "-려면 멀었어요" };
            }
            if (npc.status === "progress") {
                return { text: answers.levelProgress, grammar: "-려면 멀었어요" };
            }
            if (npc.status === "plan") {
                return { text: answers.levelPlan, grammar: "-려면 멀었어요" };
            }
            return { text: answers.levelNo, grammar: "-려면 멀었어요" };
        }

        }

        function renderQuestionButtons() {
            const scenario = getCurrentScenario();

            const disabledAll = state.askedIds.length >= MAX_QUESTIONS || state.roundLocked;
            el.questionGrid.innerHTML = questions.map((q) => {
                const disabled = disabledAll || state.askedIds.includes(q.id) ? "disabled" : "";
                return `<button class="q-btn" data-qid="${q.id}" ${disabled}><span>${q.ko}</span><span class="vi">${q.vi}</span></button>`;
            }).join("");
        }

            el.interviewLog.innerHTML = "";
            el.interviewLog.classList.add("empty");
            updateQuestionCounter();
            renderQuestionButtons();

        function appendInterview(question, answer) {

            const node = document.createElement("div");

            el.interviewLog.appendChild(node);
            el.interviewLog.scrollTop = el.interviewLog.scrollHeight;
        }

        function askQuestion(questionId) {
            if (state.roundLocked) return;
            if (state.askedIds.includes(questionId)) return;
            if (state.askedIds.length >= MAX_QUESTIONS) return;

            const scenario = getCurrentScenario();
            if (!scenario) return;
            const question = scenario.topic.questions.find((q) => q.id === questionId);
            if (!question) return;
            const answer = getAnswerForQuestion(scenario.npc, scenario.topic, questionId);
            state.askedIds.push(questionId);
            appendInterview(question, answer);
            updateQuestionCounter();
            renderQuestionButtons();

            if (state.askedIds.length >= MAX_QUESTIONS) {
                el.feedback.className = "feedback";
                el.feedback.textContent = "질문 3개를 모두 사용했어요. 이제 허락/허락 안 함을 선택하세요.";
            } else {
                el.feedback.className = "feedback";
                el.feedback.textContent = "질문을 더 하거나 지금 바로 판정할 수 있어요.";
            }
        }

        function buildDeck(stageTopicMap) {
            const deck = [];
            STAGES.forEach((stage) => {
                const topic = stageTopicMap[stage.key];
                const passPool = NPCS.filter((npc) => npc.status === stage.key);
                const failPool = NPCS.filter((npc) => npc.status !== stage.key);
                const passList = pickMany(passPool, 2).map((npc) => ({ stage, topic, npc, shouldAllow: true }));
                const failList = pickMany(failPool, 2).map((npc) => ({ stage, topic, npc, shouldAllow: false }));
                const stageDeck = shuffle([...passList, ...failList]);
                deck.push(...stageDeck);
            });
            return deck;
        }

        function setStageTheme(stageKey) {
            const classes = ["stage-done", "stage-progress", "stage-plan", "stage-no-plan"];
            classes.forEach((className) => el.phoneApp.classList.remove(className));
            el.phoneApp.classList.add(`stage-${stageKey}`);
        }

        function setStageTrack(stageKey) {
            const chips = el.stageTrack.querySelectorAll(".stage-chip");
            chips.forEach((chip) => {
                const active = chip.dataset.key === stageKey;
                chip.classList.toggle("active", active);
            });
        }

        function showStageAlert(stage, topic) {
            if (state.lastStageKey === null) {
                state.lastStageKey = stage.key;
                return;
            }
            if (state.lastStageKey === stage.key) {
                return;
            }
            state.lastStageKey = stage.key;
            if (state.stageAlertTimer) {
                clearTimeout(state.stageAlertTimer);
            }
            el.stageAlert.textContent = `다음 상황! ${stage.name} · ${topic.labelKo}`;
            el.stageAlert.classList.add("show");
            el.ruleBox.classList.remove("swap");
            void el.ruleBox.offsetWidth;
            el.ruleBox.classList.add("swap");
            state.stageAlertTimer = setTimeout(() => {
                el.stageAlert.classList.remove("show");
                el.ruleBox.classList.remove("swap");
            }, 1200);
        }

        function clearAvatarReaction() {
            el.npcAvatar.classList.remove("react-good", "react-bad");
        }

        function makeFxParticles(isCorrect) {
            const palette = isCorrect
                ? ["#86efac", "#22c55e", "#bbf7d0", "#fef08a", "#ffffff"]
                : ["#fda4af", "#ef4444", "#fecaca", "#fb7185", "#ffffff"];
            el.fxBurst.innerHTML = "";
            for (let i = 0; i < 28; i += 1) {
                const dot = document.createElement("span");
                const dx = Math.round((Math.random() - 0.5) * 340);
                const dy = Math.round((Math.random() - 0.5) * 300 - 30);
                const rot = `${Math.round((Math.random() - 0.5) * 540)}deg`;
                const delay = `${Math.round(Math.random() * 140)}ms`;
                const color = palette[Math.floor(Math.random() * palette.length)];
                dot.className = "fx-particle";
                dot.style.setProperty("--dx", `${dx}px`);
                dot.style.setProperty("--dy", `${dy}px`);
                dot.style.setProperty("--rot", rot);
                dot.style.setProperty("--delay", delay);
                dot.style.setProperty("--pcolor", color);
                el.fxBurst.appendChild(dot);
            }
        }

        function triggerVisualFeedback(isCorrect) {
            clearAvatarReaction();
            el.phoneApp.classList.remove("hit-good", "hit-bad");
            el.globalFx.classList.remove("show", "good", "bad");
            void el.phoneApp.offsetWidth;

            const isGood = isCorrect;
            el.npcAvatar.textContent = isGood ? "😄" : "😵";
            el.npcAvatar.classList.add(isGood ? "react-good" : "react-bad");

            el.phoneApp.classList.add(isGood ? "hit-good" : "hit-bad");
            el.globalFx.classList.add("show", isGood ? "good" : "bad");
            el.fxText.textContent = isGood ? "정답!" : "오답!";
            el.fxText.className = `fx-text ${isGood ? "good" : "bad"}`;
            makeFxParticles(isGood);

            if (state.fxTimer) {
                clearTimeout(state.fxTimer);
            }
            state.fxTimer = setTimeout(() => {
                el.globalFx.classList.remove("show", "good", "bad");
                el.phoneApp.classList.remove("hit-good", "hit-bad");
                clearAvatarReaction();
            }, 900);
        }

        function syncHud() {
            const current = state.deck[state.index];
            const stageIndex = current ? STAGES.findIndex((s) => s.key === current.stage.key) + 1 : STAGES.length;
            el.stageView.textContent = `${stageIndex}/${STAGES.length}`;
            el.roundView.textContent = `${Math.min(state.index + 1, TOTAL_ROUNDS)}/${TOTAL_ROUNDS}`;
            el.scoreView.textContent = `점수 ${state.score}`;
        }

        function showRound() {
            if (state.index >= TOTAL_ROUNDS) {
                finishGame();
                return;
            }

            const scenario = getCurrentScenario();
            const { stage, topic, npc } = scenario;
            const stageRule = topic.rules[stage.key];
            syncHud();

            setStageTheme(stage.key);
            setStageTrack(stage.key);
            showStageAlert(stage, topic);
            el.stageNameView.textContent = `${stage.name} · ${topic.labelKo}`;
            el.ruleText.textContent = stageRule.ko;
            el.ruleVi.textContent = stageRule.vi;
            el.ruleHint.textContent = `${stage.hint} · 주제: ${topic.labelKo}`;
            el.npcAvatar.textContent = npc.avatar;
            clearAvatarReaction();
            el.npcName.textContent = `${npc.name}의 첫 말`;
            el.npcLine.textContent = `"${npc.line}"`;
            el.grammarTag.textContent = `문법: ${npc.grammar}`;
            el.focusTag.textContent = `주제: ${topic.labelKo}`;
            state.roundLocked = false;
            resetInterviewPanel();
            el.feedback.className = "feedback";
            el.feedback.textContent = "질문을 1개 이상 한 뒤 허락/허락 안 함을 결정하세요.";
            toggleButtons(true);
        }

        function toggleButtons(enabled) {
            el.allowBtn.disabled = !enabled;
            el.denyBtn.disabled = !enabled;
        }

        function touchGrammarStat(npc, isCorrect) {
            const key = npc.grammar;
            if (!state.grammarStats[key]) {
                state.grammarStats[key] = { seen: 0, correct: 0 };
            }
            state.grammarStats[key].seen += 1;
            if (isCorrect) {
                state.grammarStats[key].correct += 1;
            }
        }

        function touchStageStat(stageKey, isCorrect) {
            state.stageStats[stageKey].seen += 1;
            if (isCorrect) {
                state.stageStats[stageKey].correct += 1;
            }
        }

        function judge(allowPressed) {
            if (state.askedIds.length < 1) {
                el.feedback.className = "feedback bad";
                el.feedback.textContent = "최소 1개 질문을 해야 판정할 수 있어요.";
                return;
            }

            const scenario = state.deck[state.index];
            const isCorrect = allowPressed === scenario.shouldAllow;
            const questionBonus = Math.max(0, MAX_QUESTIONS - state.askedIds.length) * 15;
            state.roundLocked = true;
            toggleButtons(false);
            renderQuestionButtons();

            touchGrammarStat(scenario.npc, isCorrect);
            touchStageStat(scenario.stage.key, isCorrect);
            triggerVisualFeedback(isCorrect);

            if (isCorrect) {
                state.correct += 1;
                state.streak += 1;
                state.score += 100 + questionBonus + Math.min(60, state.streak * 8);
                el.feedback.className = "feedback good";
                el.feedback.textContent = `정답! 이 사람은 ${scenario.shouldAllow ? "허락" : "허락 안 함"}이 맞아요.`;
            } else {
                state.wrong += 1;
                state.streak = 0;
                el.feedback.className = "feedback bad";
                el.feedback.textContent = `오답. 이 사람은 ${scenario.shouldAllow ? "허락" : "허락 안 함"}이 맞아요.`;
            }

            syncHud();
            state.index += 1;
            setTimeout(showRound, 1200);
        }

        function stageSummaryLine(stage) {
            const s = state.stageStats[stage.key];
            const topic = state.stageTopicMap[stage.key];
            return `${stage.name} (${topic.labelKo}): ${s.correct}/${s.seen} 정답`;
        }

        function finishGame() {
            el.finalScore.textContent = `총점: ${state.score}점 · 정답 ${state.correct}/${TOTAL_ROUNDS}`;
            const lines = [
                "4개 스테이지를 모두 완료했습니다.",
                ...STAGES.map(stageSummaryLine)
            ];
            el.resultList.innerHTML = lines.map((line) => `<li>${line}</li>`).join("");
            el.resultOverlay.classList.add("show");
        }

        function startGame() {
            const stageTopicMap = buildStageTopicMap();
            state = {
                index: 0,
                score: 0,
                correct: 0,
                wrong: 0,
                streak: 0,
                askedIds: [],
                roundLocked: false,
                lastStageKey: null,
                stageAlertTimer: null,
                fxTimer: null,
                stageTopicMap,
                deck: buildDeck(stageTopicMap),
                grammarStats: cloneTemplate(grammarStatsTemplate),
                stageStats: cloneTemplate(stageStatsTemplate)
            };
            el.resultOverlay.classList.remove("show");
            showRound();
        }

        el.allowBtn.addEventListener("click", () => judge(true));
        el.denyBtn.addEventListener("click", () => judge(false));
        el.retryBtn.addEventListener("click", startGame);
        el.questionGrid.addEventListener("click", (event) => {
            const btn = event.target.closest("button[data-qid]");
            if (!btn) return;
            askQuestion(btn.dataset.qid);
        });

        window.addEventListener("keydown", (event) => {
            if (el.resultOverlay.classList.contains("show")) return;
            if (event.key.toLowerCase() === "a" && !el.allowBtn.disabled) judge(true);
            if (event.key.toLowerCase() === "d" && !el.denyBtn.disabled) judge(false);
        });

        startGame();
    </script>
</body>
</html>
