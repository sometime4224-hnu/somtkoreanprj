<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1명 뽑기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      margin: 0;
      background: #f8fafc;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      gap: 22px;
      width: min(680px, calc(100% - 32px));
    }

    button {
      width: 100%;
      min-height: 88px;
      border: 0;
      border-radius: 18px;
      background: #2563eb;
      color: #fff;
      font: inherit;
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      font-weight: 900;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    #student-name {
      display: grid;
      place-items: center;
      min-height: 160px;
      padding: 18px;
      border-radius: 18px;
      background: #fff;
      border: 2px solid #dbeafe;
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 900;
      line-height: 1.18;
      text-align: center;
      word-break: keep-all;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body>
  <main>
    <button type="button" id="draw-button">뽑기</button>
    <div id="student-name" aria-live="polite"></div>
  </main>

  <script>
    (() => {
      'use strict';

      const students = [
        '도안 티 응엣 하',
        '팜 반 탄',
        '황 티 튀 드엉',
        '호 티 화이',
        '응웬 팜 드엉 비',
        '버 탄 쩡',
        '당 반 빔',
        '응웬 휴 득',
        '보 쑤안 타이',
        '짠 바오 응옥',
        '짠 낫 란',
        '레 딘 하이',
        '또 자 하오',
        '훤 티 홍 깜',
        '응웬 티 응옥 즈앙',
        '부 티 비',
        '까오 티 응아',
        '응웬 당 코이',
        '레 반 러이',
        '응웬 티 엔 찌',
        '응우엔 티 호앙 후이 히에우',
        '당 티 미 디엔',
        '응웬 프엉 아잉',
        '팜 티 프엉 웬',
        '응웬 티 타잉 후에',
        '팜 티 응억 란',
        '레 득 한',
        '까어 쩐 뜨어 뜨',
        '다오 티 투 짱'
      ];

      const button = document.getElementById('draw-button');
      const output = document.getElementById('student-name');

      button.addEventListener('click', () => {
        const index = Math.floor(Math.random() * students.length);
        output.textContent = students[index];
      });
    })();
  </script>
</body>
</html>
