  <meta charset="UTF-8">

  <title>발표 순서 뽑기</title>
  <meta name="description" content="학생 명단을 섞는 모션과 최종 발표 순서를 한 화면에서 보여 주는 페이지입니다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg1:#f9f4ec;--bg2:#e8f4ff;--panel:rgba(255,255,255,.88);--panel2:rgba(255,255,255,.95);--line:rgba(148,163,184,.2);--ink:#1b2430;--muted:#66768c;--accent:#ea580c;--blue:#2563eb;--shadow:0 24px 56px rgba(15,23,42,.12)}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:"Noto Sans KR",sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 18%,rgba(249,115,22,.18),transparent 24%),radial-gradient(circle at 88% 16%,rgba(59,130,246,.18),transparent 26%),linear-gradient(180deg,var(--bg1),var(--bg2))}
    .shell{width:min(1200px,calc(100% - 24px));margin:12px auto}.app{min-height:calc(100vh - 24px);padding:14px;border-radius:28px;background:var(--panel);border:1px solid rgba(255,255,255,.78);box-shadow:var(--shadow);backdrop-filter:blur(18px)}
    .toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:14px;border-radius:24px;background:rgba(255,255,255,.76)}.title h1{margin:0;font-size:clamp(1.9rem,4vw,3rem);line-height:1}.meta,.actions{display:flex;gap:8px;flex-wrap:wrap}.meta{margin-top:8px}
    .pill,.status,.count{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;font-size:.85rem;font-weight:900;white-space:nowrap}.pill{background:rgba(255,255,255,.9);border:1px solid var(--line);color:var(--muted)}.pill strong{color:var(--ink)}.status{min-width:96px;background:rgba(15,118,110,.1);color:#0f766e;text-transform:uppercase}.status.mix{background:rgba(249,115,22,.14);color:#c2410c}.status.done{background:rgba(37,99,235,.12);color:#1d4ed8}.count{background:rgba(37,99,235,.12);color:#1d4ed8}
    .btn{border:none;border-radius:999px;padding:13px 18px;font:inherit;font-weight:800;cursor:pointer;transition:transform .18s ease,opacity .18s ease}.btn:hover:not(:disabled){transform:translateY(-1px)}.btn:disabled{opacity:.55;cursor:not-allowed}.btn-primary{color:#fff;background:linear-gradient(135deg,#f97316,#ea580c)}.btn-secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn-danger{background:rgba(239,68,68,.12);color:#b91c1c}
    .grid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr);gap:14px;min-height:calc(100vh - 146px);margin-top:14px}.panel{display:flex;flex-direction:column;min-height:0;padding:18px;border-radius:26px;background:var(--panel2);box-shadow:0 16px 32px rgba(15,23,42,.06)}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.head h2{margin:0;font-size:1.15rem}
    .progress{height:10px;border-radius:999px;overflow:hidden;background:rgba(209,213,219,.46)}.progress span{display:block;width:100%;height:100%;transform-origin:left center;transform:scaleX(0);background:linear-gradient(90deg,#fb923c,#38bdf8);transition:transform .2s ease}
    .board{position:relative;flex:1;min-height:340px;margin-top:14px;border-radius:24px;overflow:hidden;border:1px solid var(--line);background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.96),rgba(239,246,255,.92) 44%,rgba(224,242,254,.86))}.zone{position:absolute;left:16px;top:16px;z-index:2;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.82);color:var(--muted);font-size:.76rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase}
    .chip{position:absolute;left:50%;top:50%;display:inline-flex;align-items:center;justify-content:center;min-width:128px;max-width:min(40vw,220px);padding:12px 16px;border-radius:999px;white-space:nowrap;font-size:.94rem;font-weight:800;border:1px solid rgba(255,255,255,.94);box-shadow:0 18px 26px rgba(30,41,59,.12);transform:translate(-50%,-50%);transition:left .46s cubic-bezier(.2,.82,.2,1),top .46s cubic-bezier(.2,.82,.2,1),transform .46s cubic-bezier(.2,.82,.2,1),opacity .22s ease}
    .chip.compact{justify-content:flex-start;gap:8px;min-width:0;max-width:none;padding:8px 10px;border-radius:16px;font-size:.78rem;white-space:normal;line-height:1.15}
    .chip-order{display:inline-flex;align-items:center;justify-content:center;flex:0 0 24px;width:24px;height:24px;border-radius:999px;background:rgba(255,255,255,.82);font-size:.72rem;font-weight:900}
    .chip-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chip[data-tone="0"]{background:linear-gradient(135deg,rgba(255,247,237,.98),rgba(254,215,170,.88));color:#9a3412}.chip[data-tone="1"]{background:linear-gradient(135deg,rgba(240,249,255,.98),rgba(191,219,254,.88));color:#1d4ed8}.chip[data-tone="2"]{background:linear-gradient(135deg,rgba(240,253,250,.98),rgba(153,246,228,.88));color:#0f766e}.chip[data-tone="3"]{background:linear-gradient(135deg,rgba(253,242,248,.98),rgba(251,207,232,.88));color:#be185d}
    .spot{display:grid;gap:8px;margin-top:14px;padding:16px 18px;border-radius:20px;background:rgba(255,255,255,.78);border:1px solid var(--line)}.spot em{font-style:normal;color:var(--muted);font-size:.76rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.spot strong{font-size:1.18rem}.spot span{color:var(--muted);line-height:1.55}
    .empty{display:flex;align-items:center;justify-content:center;flex:1;min-height:220px;border-radius:22px;border:1px dashed rgba(148,163,184,.34);color:var(--muted);text-align:center;line-height:1.7}.empty.hide{display:none}.results{flex:1;min-height:0;margin:0;padding:0;list-style:none;display:grid;gap:10px;overflow:auto;padding-right:4px}
    .result{display:grid;grid-template-columns:52px minmax(0,1fr);gap:12px;align-items:center;padding:12px 14px;border-radius:18px;background:#fff;border:1px solid rgba(148,163,184,.14);opacity:0;transform:translateY(14px);animation:rise .5s cubic-bezier(.2,.82,.2,1) forwards}.num{display:inline-flex;align-items:center;justify-content:center;height:40px;border-radius:14px;background:linear-gradient(135deg,rgba(249,115,22,.14),rgba(37,99,235,.14));color:#9a3412;font-size:.92rem;font-weight:900}.name{font-weight:800;line-height:1.45;word-break:keep-all}
    .modal{position:fixed;inset:0;display:none;place-items:center;padding:18px;background:rgba(15,23,42,.38);backdrop-filter:blur(8px);z-index:20}.modal.open{display:grid}.dialog{width:min(720px,100%);max-height:min(86vh,920px);display:flex;flex-direction:column;overflow:hidden;border-radius:28px;background:rgba(255,255,255,.98);box-shadow:0 28px 64px rgba(15,23,42,.2)}
    .mhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:20px 22px 14px;border-bottom:1px solid rgba(148,163,184,.14)}.mhead h2{margin:0;font-size:1.3rem}.mhead p{margin:6px 0 0;color:var(--muted);line-height:1.55}.mmeta{display:flex;gap:8px;flex-wrap:wrap;padding:14px 22px 0}.mbody{overflow:auto;padding:14px 22px 22px}
    .roster{margin:0;padding:0;list-style:none;display:grid;gap:10px}.row{display:grid;grid-template-columns:48px minmax(0,1fr) auto;align-items:center;gap:12px;padding:12px 14px;border-radius:18px;background:rgba(248,250,252,.95);border:1px solid rgba(148,163,184,.16)}.row.off{background:rgba(254,242,242,.96)}.rnum{display:inline-flex;align-items:center;justify-content:center;height:38px;border-radius:14px;background:rgba(15,118,110,.08);color:#0f766e;font-size:.9rem;font-weight:900}.rinfo{display:grid;gap:6px}.badge{display:inline-flex;width:fit-content;padding:5px 10px;border-radius:999px;background:rgba(239,68,68,.12);color:#b91c1c;font-size:.74rem;font-weight:800}.toggle{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:.9rem;font-weight:700;cursor:pointer}.toggle input{width:18px;height:18px;margin:0;accent-color:#dc2626;cursor:pointer}
    @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @media (max-width:980px){.app{min-height:auto}.grid{grid-template-columns:1fr;min-height:auto}.board{min-height:320px}.panel:last-child{min-height:420px}}
    @media (max-width:720px){.shell{width:min(100%,calc(100% - 16px));margin:8px auto}.app{min-height:calc(100vh - 16px);padding:12px;border-radius:22px}.toolbar{grid-template-columns:1fr}.actions .btn{flex:1 1 calc(50% - 4px)}.chip{min-width:104px;max-width:176px;padding:10px 12px;font-size:.82rem}.chip.compact{padding:8px 9px;font-size:.72rem}.chip-order{flex-basis:22px;width:22px;height:22px;font-size:.68rem}.result,.row{grid-template-columns:44px minmax(0,1fr)}.toggle{grid-column:2}}
  </style>
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <main class="shell">
    <section class="app">
      <div class="toolbar">
        <div class="title">
          <h1>발표 순서 뽑기</h1>
          <div class="meta">
            <span class="status" id="status-pill">Ready</span>
            <span class="pill">참여 <strong id="active-count">29</strong>명</span>
            <span class="pill">제외 <strong id="excluded-count">0</strong>명</span>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-secondary" data-action="open-exclusions">학생 제외</button>
          <button type="button" class="btn btn-secondary" data-action="copy-result" disabled>결과 복사</button>
          <button type="button" class="btn btn-primary" data-action="start-draw">순서 뽑기</button>
        </div>
      </div>

      <div class="grid">
        <article class="panel">
          <div class="head"><h2>섞는 화면</h2></div>
          <div class="progress"><span id="progress-fill"></span></div>
          <div class="board" data-mix-board><span class="zone">shuffle zone</span></div>
          <div class="spot" aria-live="polite">
            <em>현재 안내</em>
            <strong id="spotlight-name">버튼을 눌러 발표 순서를 뽑아 주세요.</strong>
            <span id="spotlight-note">왼쪽 화면에서 이름이 섞이고, 오른쪽에 최종 발표 순서가 바로 정리됩니다.</span>
          </div>
        </article>

        <article class="panel">
          <div class="head">
            <h2>최종 결과</h2>
            <div class="count"><span id="result-count">0</span>&nbsp;/&nbsp;<span id="result-total">29</span></div>
          </div>
          <div class="empty" id="results-empty">결과가 아직 없습니다.<br>순서 뽑기를 시작하면 이 자리에서 바로 확인할 수 있습니다.</div>
          <ol class="results" id="result-list" data-result-list aria-live="polite"></ol>
        </article>
      </div>
    </section>
  </main>

  <div class="modal" id="exclusion-modal" data-modal aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="exclusion-modal-title">
      <div class="mhead">
        <div>
          <h2 id="exclusion-modal-title">학생 제외</h2>
          <p>체크한 학생은 이번 발표 순서에서 제외됩니다.</p>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-danger" data-action="reset-exclusions">제외 초기화</button>
          <button type="button" class="btn btn-secondary" data-action="close-exclusions">닫기</button>
        </div>
      </div>
      <div class="mmeta">
        <span class="pill">참여 <strong id="modal-active-count">29</strong>명</span>
        <span class="pill">제외 <strong id="modal-excluded-count">0</strong>명</span>
      </div>
      <div class="mbody"><ol class="roster" id="roster-list"></ol></div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';
      const students = ['도안 티 응엣 하','팜 반 탄','황 티 튀 드엉','호 티 화이','응웬 팜 드엉 비','버 탄 쩡','당 반 빔','응웬 휴 득','보 쑤안 타이','짠 바오 응옥','짠 낫 란','레 딘 하이','또 자 하오','훤 티 홍 깜','응웬 티 응옥 즈앙','부 티 비','까오 티 응아','응웬 당 코이','레 반 러이','응웬 티 엔 찌','응우엔 티 호앙 후이 히에우','당 티 미 디엔','응웬 프엉 아잉','팜 티 프엉 웬','응웬 티 타잉 후에','팜 티 응억 란','레 득 한','까어 쩐 뜨어 뜨','다오 티 투 짱'];
      const mixDurationMs = 3800, mixFrameMs = 160, mixVisibleChipCount = 12, chipPoolCount = students.length;
      const board = document.querySelector('[data-mix-board]');
      const progressFill = document.getElementById('progress-fill');
      const startButton = document.querySelector('[data-action="start-draw"]');
      const copyButton = document.querySelector('[data-action="copy-result"]');
      const openExclusionsButton = document.querySelector('[data-action="open-exclusions"]');
      const closeExclusionsButton = document.querySelector('[data-action="close-exclusions"]');
      const resetExclusionsButton = document.querySelector('[data-action="reset-exclusions"]');
      const statusPill = document.getElementById('status-pill');
      const activeCount = document.getElementById('active-count');
      const excludedCount = document.getElementById('excluded-count');
      const modalActiveCount = document.getElementById('modal-active-count');
      const modalExcludedCount = document.getElementById('modal-excluded-count');
      const resultList = document.getElementById('result-list');
      const resultCount = document.getElementById('result-count');
      const resultTotal = document.getElementById('result-total');
      const resultsEmpty = document.getElementById('results-empty');
      const rosterList = document.getElementById('roster-list');
      const spotlightName = document.getElementById('spotlight-name');
      const spotlightNote = document.getElementById('spotlight-note');
      const modal = document.getElementById('exclusion-modal');
      let mixIntervalId = null, copyResetId = null, hasDrawnResult = false, finalOrder = [], lastFocusedElement = null;
      const excludedStudents = new Set();
      const chips = Array.from({ length: chipPoolCount }, (_, index) => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.dataset.tone = String(index % 4);
        chip.style.opacity = '0';
        board.appendChild(chip);
        return chip;
      });

      const escapeHtml = (value) => value.replace(/[&<>"']/g, (character) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[character]));
      const getActiveStudents = () => students.filter((name) => !excludedStudents.has(name));
      const shuffle = (list) => { const cloned = [...list]; for (let index = cloned.length - 1; index > 0; index -= 1) { const randomIndex = Math.floor(Math.random() * (index + 1)); [cloned[index], cloned[randomIndex]] = [cloned[randomIndex], cloned[index]]; } return cloned; };
      const setProgress = (value) => { progressFill.style.transform = 'scaleX(' + Math.max(0, Math.min(1, value)) + ')'; };
      const getFinalColumns = () => {
        const width = board.clientWidth || window.innerWidth;
        if (width <= 320) return 2;
        if (width <= 620) return 3;
        return width <= 980 ? 3 : 4;
      };
      const getFinalVisibleCount = (order) => order.length;
      function setStatus(mode) { statusPill.classList.remove('mix', 'done'); if (mode === 'mixing') { statusPill.textContent = 'Mixing'; statusPill.classList.add('mix'); return; } if (mode === 'complete') { statusPill.textContent = 'Done'; statusPill.classList.add('done'); return; } statusPill.textContent = 'Ready'; }
      function clearBoard() { board.style.height = ''; chips.forEach((chip) => { chip.innerHTML = ''; chip.classList.remove('compact'); chip.style.width = ''; chip.style.opacity = '0'; }); }
      function placeChip(chip, html, left, top, rotate, scale, zIndex, compact = false, width = '') { chip.innerHTML = html; chip.classList.toggle('compact', compact); chip.style.width = width; chip.style.left = left; chip.style.top = top; chip.style.opacity = '1'; chip.style.zIndex = String(zIndex); chip.style.transform = 'translate(-50%, -50%) rotate(' + rotate + 'deg) scale(' + scale + ')'; }
      function renderMixFrame(source) {
        const visibleNames = shuffle(source).slice(0, mixVisibleChipCount);
        board.style.height = '';
        if (!visibleNames.length) { clearBoard(); spotlightName.textContent = '참여 학생이 없습니다.'; spotlightNote.textContent = '학생 제외 메뉴에서 최소 한 명은 포함해 주세요.'; return; }
        chips.forEach((chip, index) => {
          const name = visibleNames[index];
          if (!name) { chip.innerHTML = ''; chip.classList.remove('compact'); chip.style.opacity = '0'; return; }
          const left = 14 + Math.random() * 72, top = 18 + Math.random() * 56, rotate = -18 + Math.random() * 36, scale = 0.9 + Math.random() * 0.18, zIndex = 10 + Math.round((100 - top) + index);
          placeChip(chip, escapeHtml(name), left + '%', top + '%', rotate, scale.toFixed(2), zIndex, false);
          chip.dataset.tone = String((index + Math.floor(Math.random() * 4)) % 4);
        });
        spotlightName.textContent = visibleNames[0];
        spotlightNote.textContent = '이름을 섞는 중입니다. 잠시 후 오른쪽에 최종 순서가 정리됩니다.';
      }
      function renderFinalChipLayout(order) {
        const finalColumns = getFinalColumns();
        const visibleNames = order.slice(0, getFinalVisibleCount(order));
        if (!visibleNames.length) { clearBoard(); return; }
        const boardPadding = window.innerWidth <= 720 ? 16 : 18;
        const gapX = window.innerWidth <= 720 ? 8 : 10;
        const gapY = 10;
        const cardHeight = window.innerWidth <= 720 ? 38 : 42;
        const startY = window.innerWidth <= 720 ? 74 : 82;
        const totalRows = Math.ceil(visibleNames.length / finalColumns);
        const requiredHeight = startY + (totalRows * cardHeight) + ((totalRows - 1) * gapY) + 18;
        board.style.height = Math.max(board.clientHeight || 0, window.innerWidth <= 980 ? 320 : 340, requiredHeight) + 'px';
        chips.forEach((chip, index) => {
          const name = visibleNames[index];
          if (!name) { chip.innerHTML = ''; chip.classList.remove('compact'); chip.style.opacity = '0'; return; }
          const cardWidth = Math.floor((board.clientWidth - (boardPadding * 2) - (gapX * (finalColumns - 1))) / finalColumns);
          const column = index % finalColumns, row = Math.floor(index / finalColumns);
          const left = (boardPadding + (cardWidth / 2) + (column * (cardWidth + gapX))) + 'px';
          const top = (startY + (cardHeight / 2) + (row * (cardHeight + gapY))) + 'px';
          const compactMarkup = '<span class="chip-order">' + (index + 1) + '</span><span class="chip-label">' + escapeHtml(name) + '</span>';
          placeChip(chip, compactMarkup, left, top, 0, 1, 40 - row, true, cardWidth + 'px');
          chip.dataset.tone = String(row % 4);
        });
      }
      function renderResults(order) {
        if (!order.length) { resultList.innerHTML = ''; resultsEmpty.classList.remove('hide'); resultCount.textContent = '0'; return; }
        resultList.innerHTML = order.map((name, index) => '<li class="result" data-result-item style="animation-delay:' + (index * 50) + 'ms"><span class="num">' + (index + 1) + '</span><span class="name">' + escapeHtml(name) + '</span></li>').join('');
        resultsEmpty.classList.add('hide');
        resultCount.textContent = String(order.length);
      }
      function renderRoster() {
        rosterList.innerHTML = students.map((name, index) => {
          const off = excludedStudents.has(name);
          return '<li class="row' + (off ? ' off' : '') + '"><span class="rnum">' + (index + 1) + '</span><span class="rinfo"><span class="name">' + escapeHtml(name) + '</span>' + (off ? '<span class="badge">이번 추첨에서 제외</span>' : '') + '</span><label class="toggle"><input type="checkbox" data-action="toggle-exclusion" data-index="' + index + '"' + (off ? ' checked' : '') + (mixIntervalId !== null ? ' disabled' : '') + '><span>제외</span></label></li>';
        }).join('');
      }
      function updateSummary() {
        const activeStudentCount = getActiveStudents().length, excludedStudentCount = excludedStudents.size;
        activeCount.textContent = String(activeStudentCount);
        excludedCount.textContent = String(excludedStudentCount);
        modalActiveCount.textContent = String(activeStudentCount);
        modalExcludedCount.textContent = String(excludedStudentCount);
        resultTotal.textContent = String(activeStudentCount);
        startButton.disabled = mixIntervalId !== null || activeStudentCount === 0;
        openExclusionsButton.disabled = mixIntervalId !== null;
        resetExclusionsButton.disabled = mixIntervalId !== null || excludedStudentCount === 0;
        copyButton.disabled = mixIntervalId !== null || !hasDrawnResult || !finalOrder.length;
        if (mixIntervalId === null) startButton.textContent = activeStudentCount === 0 ? '참여 학생 없음' : (hasDrawnResult ? '다시 뽑기' : '순서 뽑기');
      }
      function updateIdlePreview() {
        const activeStudents = getActiveStudents();
        if (!activeStudents.length) { clearBoard(); spotlightName.textContent = '참여 학생이 없습니다.'; spotlightNote.textContent = '학생 제외 메뉴에서 최소 한 명은 포함해 주세요.'; return; }
        renderFinalChipLayout(activeStudents);
        if (excludedStudents.size) { spotlightName.textContent = '현재 ' + activeStudents.length + '명이 추첨에 참여합니다.'; spotlightNote.textContent = '제외 학생 ' + excludedStudents.size + '명은 이번 발표 순서에서 빠집니다.'; return; }
        spotlightName.textContent = '버튼을 눌러 발표 순서를 뽑아 주세요.';
        spotlightNote.textContent = '왼쪽 화면에서 이름이 섞이고, 오른쪽에 최종 발표 순서가 바로 정리됩니다.';
      }
      function resetDrawState() {
        if (copyResetId !== null) { window.clearTimeout(copyResetId); copyResetId = null; }
        finalOrder = []; hasDrawnResult = false; copyButton.textContent = '결과 복사'; renderResults([]); setProgress(0); setStatus('ready'); updateSummary(); updateIdlePreview();
      }
      function finishDraw() {
        if (mixIntervalId !== null) { window.clearInterval(mixIntervalId); mixIntervalId = null; }
        hasDrawnResult = true; renderFinalChipLayout(finalOrder); renderResults(finalOrder); setProgress(1); setStatus('complete'); spotlightName.textContent = '1번 ' + finalOrder[0]; spotlightNote.textContent = '셔플 존에는 앞 순서가 번호와 함께 촘촘하게 표시됩니다.'; renderRoster(); updateSummary();
      }
      function startDraw() {
        const activeStudents = getActiveStudents();
        if (mixIntervalId !== null || !activeStudents.length) return;
        if (copyResetId !== null) { window.clearTimeout(copyResetId); copyResetId = null; }
        finalOrder = shuffle(activeStudents); hasDrawnResult = false; copyButton.textContent = '결과 복사'; renderResults([]); setProgress(0); setStatus('mixing'); renderRoster(); updateSummary(); renderMixFrame(activeStudents);
        const startedAt = performance.now();
        mixIntervalId = window.setInterval(() => { const elapsed = performance.now() - startedAt; const progress = elapsed / mixDurationMs; setProgress(Math.min(progress, 0.96)); renderMixFrame(progress > 0.58 ? finalOrder : activeStudents); if (elapsed >= mixDurationMs) finishDraw(); }, mixFrameMs);
      }
      async function copyResult() {
        if (!finalOrder.length) return;
        try { await navigator.clipboard.writeText(finalOrder.map((name, index) => (index + 1) + '. ' + name).join('\n')); copyButton.textContent = '복사 완료'; }
        catch (error) { copyButton.textContent = '복사 실패'; }
        if (copyResetId !== null) window.clearTimeout(copyResetId);
        copyResetId = window.setTimeout(() => { copyButton.textContent = '결과 복사'; }, 1400);
      }
      function openModal() { if (mixIntervalId !== null) return; lastFocusedElement = document.activeElement; modal.classList.add('open'); modal.setAttribute('aria-hidden', 'false'); document.body.style.overflow = 'hidden'; closeExclusionsButton.focus(); }
      function closeModal() { modal.classList.remove('open'); modal.setAttribute('aria-hidden', 'true'); document.body.style.overflow = ''; if (lastFocusedElement instanceof HTMLElement) lastFocusedElement.focus(); }
      function handleRosterChange(event) {
        const target = event.target;
        if (!(target instanceof HTMLInputElement) || target.dataset.action !== 'toggle-exclusion') return;
        const studentName = students[Number(target.dataset.index)];
        if (target.checked) excludedStudents.add(studentName); else excludedStudents.delete(studentName);
        renderRoster(); resetDrawState();
      }
      function resetExclusions() { if (!excludedStudents.size || mixIntervalId !== null) return; excludedStudents.clear(); renderRoster(); resetDrawState(); }
      function handleResize() {
        if (mixIntervalId !== null) return;
        if (hasDrawnResult && finalOrder.length) { renderFinalChipLayout(finalOrder); return; }
        updateIdlePreview();
      }
      renderRoster(); renderResults([]); setProgress(0); setStatus('ready'); updateSummary(); updateIdlePreview();
      startButton.addEventListener('click', startDraw);
      copyButton.addEventListener('click', copyResult);
      openExclusionsButton.addEventListener('click', openModal);
      closeExclusionsButton.addEventListener('click', closeModal);
      resetExclusionsButton.addEventListener('click', resetExclusions);
      rosterList.addEventListener('change', handleRosterChange);
      modal.addEventListener('click', (event) => { if (event.target === modal) closeModal(); });
      document.addEventListener('keydown', (event) => { if (event.key === 'Escape' && modal.classList.contains('open')) closeModal(); });
      window.addEventListener('resize', handleResize);
    })();
  </script>
</body>
