<script>
'use strict';

const VOCAB_WORDS = [
    "살이 찌다/빠지다",
    "힘이 세다/약하다",
    "자세가 좋다/나쁘다",
    "몸이 무겁다/가볍다",
    "숨이 차다",
    "땀이 나다",
    "쥐가 나다",
    "지치다",
    "기분이 상쾌하다",
    "기운이 나다",
    "몸이 좋아지다",
    "근육이 생기다",
    "(목을) 돌리다",
    "(옆구리를) 굽히다",
    "(가슴을) 펴다",
    "(몸을) 젖히다",
    "(손을 허리에) 대다",
    "(팔을) 뻗다",
    "(다리를) 벌리다",
    "(발뒤꿈치를) 들다",
];

const CHOSUNG_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function extractChosung(text) {
    return text.split('').map(ch => {
        const code = ch.charCodeAt(0);
        if (code >= 0xAC00 && code <= 0xD7A3) {
            return { type: 'cs', char: CHOSUNG_LIST[Math.floor((code - 0xAC00) / 588)] };
        }
        if (ch === ' ') return { type: 'sp' };
        if (ch === '/' || ch === '(' || ch === ')') return { type: 'sep', char: ch };
        return { type: 'other', char: ch };
    });
}

function renderChosung(text) {
    const row = document.getElementById('chosung-row');
    row.innerHTML = '';
    const tokens = extractChosung(text);
    tokens.forEach(t => {
        if (t.type === 'cs') {
            const el = document.createElement('span');
            el.className = 'cs-block';
            el.textContent = t.char;
            row.appendChild(el);
        } else if (t.type === 'sp') {
            const el = document.createElement('span');
            el.style.cssText = 'display:inline-block;width:10px';
            row.appendChild(el);
        } else if (t.type === 'sep' || t.type === 'other') {
            const el = document.createElement('span');
            el.className = 'cs-sep';
            el.textContent = t.char;
            row.appendChild(el);
        }
    });
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let micActive = false;
let speechCooldown = false;

function initSpeech() {
    if (!SR) {
        document.getElementById('no-speech-notice').style.display = 'block';
        return;
    }
    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 5;

    recognition.onstart = () => {
        micActive = true;
        setSpeechStatus('listening', '듣는 중...');
        document.getElementById('mic-btn').classList.add('active');
        document.getElementById('mic-label').textContent = '듣는 중';
    };

    recognition.onend = () => {
        micActive = false;
        document.getElementById('mic-btn').classList.remove('active');
        document.getElementById('mic-label').textContent = '말하기';
        if (!gameState || gameState.over) return;
        setSpeechStatus('', '마이크 버튼을 누르고 말하세요');
    };

    recognition.onerror = (e) => {
        micActive = false;
        document.getElementById('mic-btn').classList.remove('active');
        document.getElementById('mic-label').textContent = '말하기';
        let msg = '다시 시도하세요';
        if (e.error === 'not-allowed') msg = '마이크 권한이 필요합니다';
        else if (e.error === 'no-speech') msg = '음성이 감지되지 않았습니다';
        setSpeechStatus('error', msg);
    };

    recognition.onresult = (e) => {
        if (!gameState || gameState.over || speechCooldown) return;
        const transcripts = [];
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const res = e.results[i];
            for (let j = 0; j < res.length; j++) {
                transcripts.push(res[j].transcript.trim());
            }
        }
        handleSpeech(transcripts);
    };
}

function setSpeechStatus(cls, text) {
    const el = document.getElementById('speech-status');
    el.className = 'speech-status ' + cls;
    document.getElementById('status-text').textContent = text;
}

function startMic() {
    if (!recognition || micActive || !gameState || gameState.over) return;
    try {
        recognition.start();
    } catch(e) {}
}

function stopMic() {
    if (!recognition || !micActive) return;
    try { recognition.stop(); } catch(e) {}
}

function stripSpecial(text) {
    return text.replace(/[\s()/]/g, '');
}

function speechMatch(transcript, invaderText) {
    const t = stripSpecial(transcript);
    if (t.length < 2) return false;
    const variants = [invaderText, ...invaderText.split('/')].map(v => stripSpecial(v)).filter(v => v.length >= 2);
    return variants.some(v => t.includes(v) || v.includes(t));
}

function handleSpeech(transcripts) {
    if (!gameState || speechCooldown) return;
    const gs = gameState;

    const display = transcripts[0] || '';
    setSpeechStatus('heard', `"${display}"`);

    let matchedInv = null;
    outer:
    for (const tr of transcripts) {
        for (const inv of gs.invaders) {
            if (!inv.alive) continue;
            if (speechMatch(tr, inv.text)) {
                matchedInv = inv;
                break outer;
            }
        }
    }

    if (!matchedInv) return;

    speechCooldown = true;
    setTimeout(() => { speechCooldown = false; }, 1200);

    const bx = gs.player.x + gs.player.w / 2 - 2;
    const by = gs.player.y;
    const tx = matchedInv.x + matchedInv.w / 2 - 2;
    const ty = matchedInv.y + matchedInv.h / 2;
    const dx = tx - bx, dy = ty - by;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const speed = 9;
    gs.voiceBullet = {
        x: bx, y: by,
        vx: dx / dist * speed,
        vy: dy / dist * speed,
        target: matchedInv,
    };
}

const DIFF = {
    easy:   { invSpeed: 0.08, dropAmt: 4 },
    normal: { invSpeed: 0.14, dropAmt: 5 },
    hard:   { invSpeed: 0.22, dropAmt: 6 },
};

let selectedDiff = 'normal';
let gameState = null;
let animId = null;
let canvas, ctx;

const PLAYER_H = 38;
const BULLET_W = 4, BULLET_H = 14;

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function selectDiff(btn) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDiff = btn.dataset.diff;
}

function flashScreen(color) {
    const el = document.getElementById('flash');
    el.className = 'flash-overlay ' + color + ' show';
    setTimeout(() => el.classList.remove('show'), 180);
}

function updateHUD() {
    const gs = gameState;
    document.getElementById('hud-score').textContent = gs.score;
    document.getElementById('hud-wave').textContent = gs.wave;
    const lv = document.getElementById('hud-lives');
    lv.innerHTML = Array.from({length: gs.lives}, () => '<span class="heart">❤️</span>').join('');
}

function setupCanvas() {
    canvas = document.getElementById('game-canvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
}

function resizeCanvas() {
    const w = document.getElementById('canvas-wrapper');
    canvas.width = w.clientWidth;
    canvas.height = w.clientHeight;
    if (gameState) {
        gameState.player.y = canvas.height - PLAYER_H - 6;
        gameState.stars = null;
    }
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function buildWave() {
    const gs = gameState;
    const answer = gs.queue[gs.qIdx];

    const pool = VOCAB_WORDS.filter(w => w !== answer);
    const distractors = shuffle(pool).slice(0, 3);
    const options = shuffle([answer, ...distractors]);

    const W = canvas.width;
    const cols = W >= 460 ? 4 : 2;
    const rows = Math.ceil(options.length / cols);
    const pad = 12;
    const invW = Math.min(Math.floor((W - pad * (cols + 1)) / cols), 200);
    const invH = 50;
    const totalW = cols * invW + (cols - 1) * pad;
    const startX = (W - totalW) / 2;
    const startY = 24;

    gs.invaders = options.map((text, i) => ({
        x: startX + (i % cols) * (invW + pad),
        y: startY + Math.floor(i / cols) * (invH + 14),
        w: invW, h: invH,
        text,
        isAnswer: text === answer,
        alive: true,
        flashFrames: 0,
        flashColor: '',
    }));

    gs.invDir = 1;
    gs.dropLeft = 0;
    gs.voiceBullet = null;
    speechCooldown = false;

    renderChosung(answer);
    setSpeechStatus('', '마이크 버튼을 누르고 말하세요');
}

function startGame() {
    if (animId) cancelAnimationFrame(animId);
    stopMic();
    initSpeech();
    showScreen('game-screen');
    setupCanvas();

    const queue = shuffle([...VOCAB_WORDS]);
    const diff = DIFF[selectedDiff];

    gameState = {
        lives: 3, score: 0, wave: 1,
        queue, qIdx: 0,
        invaders: [], invDir: 1, dropLeft: 0,
        player: { x: 0, y: canvas.height - PLAYER_H - 6, w: 50, h: PLAYER_H },
        keys: { left: false, right: false },
        voiceBullet: null,
        hits: 0, misses: 0,
        diff, tick: 0,
        over: false, win: false,
        stars: null,
    };
    gameState.player.x = canvas.width / 2 - 25;

    buildWave();
    updateHUD();
    setupControls();
    loop();
}

function loop() {
    update();
    draw();
    if (!gameState.over) {
        animId = requestAnimationFrame(loop);
    } else {
        showEnd();
    }
}

function update() {
    const gs = gameState;
    if (gs.over) return;
    gs.tick++;
    const W = canvas.width;
    const H = canvas.height;

    const spd = 4.5;
    if (gs.keys.left)  gs.player.x = Math.max(0, gs.player.x - spd);
    if (gs.keys.right) gs.player.x = Math.min(W - gs.player.w, gs.player.x + spd);
    gs.player.y = H - PLAYER_H - 6;

    if (gs.voiceBullet) {
        const vb = gs.voiceBullet;
        vb.x += vb.vx;
        vb.y += vb.vy;

        if (vb.target && vb.target.alive &&
            vb.x < vb.target.x + vb.target.w &&
            vb.x + BULLET_W > vb.target.x &&
            vb.y < vb.target.y + vb.target.h &&
            vb.y + BULLET_H > vb.target.y
        ) {
            gs.voiceBullet = null;
            const inv = vb.target;
            if (inv.isAnswer) {
                inv.alive = false;
                gs.invaders.forEach(i => i.alive = false);
                gs.score += 100 + (gs.wave - 1) * 20;
                gs.hits++;
                flashScreen('g');
                updateHUD();
                setSpeechStatus('', '✅ 정답!');
            } else {
                inv.flashFrames = 16;
                inv.flashColor = '#ef4444';
                gs.lives--;
                gs.misses++;
                flashScreen('r');
                updateHUD();
                setSpeechStatus('error', '❌ 오답');
                if (gs.lives <= 0) { gs.over = true; return; }
            }
        }

        if (vb.y < -20 || vb.y > H + 20 || vb.x < -20 || vb.x > W + 20) {
            gs.voiceBullet = null;
        }
    }

    const alive = gs.invaders.filter(i => i.alive);
    if (alive.length === 0) {
        gs.qIdx++;
        if (gs.qIdx >= gs.queue.length) { gs.over = true; gs.win = true; return; }
        gs.wave++;
        buildWave();
        updateHUD();
        return;
    }

    const dspd = gs.diff.invSpeed;
    let minX = Infinity, maxX = -Infinity;
    alive.forEach(inv => {
        minX = Math.min(minX, inv.x);
        maxX = Math.max(maxX, inv.x + inv.w);
    });

    if (maxX + dspd * gs.invDir > W - 8) {
        gs.invDir = -1;
        gs.dropLeft = gs.diff.dropAmt;
    }
    if (minX + dspd * gs.invDir < 8) {
        gs.invDir = 1;
        gs.dropLeft = gs.diff.dropAmt;
    }

    gs.invaders.forEach(inv => {
        if (!inv.alive) return;
        inv.x += dspd * gs.invDir;
        if (gs.dropLeft > 0) inv.y += 0.5;
        if (inv.flashFrames > 0) inv.flashFrames--;
    });

    if (gs.dropLeft > 0) gs.dropLeft--;

    const playerTop = gs.player.y - 8;
    for (const inv of alive) {
        if (inv.y + inv.h >= playerTop) {
            gs.lives--;
            gs.invaders.forEach(i => i.alive = false);
            flashScreen('r');
            updateHUD();
            if (gs.lives <= 0) { gs.over = true; return; }
            buildWave();
            break;
        }
    }
}

function draw() {
    const gs = gameState;
    const W = canvas.width, H = canvas.height;

    ctx.fillStyle = '#07071a';
    ctx.fillRect(0, 0, W, H);

    if (!gs.stars) {
        gs.stars = Array.from({length: 55}, () => ({
            x: Math.random() * W, y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3, a: Math.random()
        }));
    }
    gs.stars.forEach(s => {
        ctx.globalAlpha = s.a * (0.4 + 0.4 * Math.sin(gs.tick * 0.025 + s.x));
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.textBaseline = 'middle';
    gs.invaders.forEach(inv => {
        if (!inv.alive) return;
        const fl = inv.flashFrames > 0;

        const g = ctx.createLinearGradient(inv.x, inv.y, inv.x, inv.y + inv.h);
        g.addColorStop(0, fl ? '#3b0a0a' : '#1c1a3e');
        g.addColorStop(1, fl ? '#7f1d1d' : '#2e2a5e');
        ctx.fillStyle = g;
        ctx.beginPath();
        roundRect(ctx, inv.x, inv.y, inv.w, inv.h, 8);
        ctx.fill();

        ctx.strokeStyle = fl ? '#f87171' : 'rgba(129,140,248,0.55)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        roundRect(ctx, inv.x, inv.y, inv.w, inv.h, 8);
        ctx.stroke();

        ctx.font = '14px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('👾', inv.x + 7, inv.y + 14);

        ctx.fillStyle = fl ? '#fca5a5' : '#e2e8f0';
        ctx.font = `bold ${inv.w < 100 ? 11 : 12}px 'Noto Sans KR', sans-serif`;
        ctx.textAlign = 'center';
        wrapText(inv.text, inv.x + inv.w / 2, inv.y + inv.h / 2 + 5, inv.w - 18, 14);
    });

    const p = gs.player;
    const eg = ctx.createRadialGradient(p.x + p.w / 2, p.y + p.h, 0, p.x + p.w / 2, p.y + p.h, 18);
    eg.addColorStop(0, 'rgba(139,92,246,0.7)');
    eg.addColorStop(1, 'transparent');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.arc(p.x + p.w / 2, p.y + p.h, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#6366f1';
    ctx.beginPath();
    ctx.moveTo(p.x + p.w / 2, p.y + 2);
    ctx.lineTo(p.x + p.w - 2, p.y + p.h);
    ctx.lineTo(p.x + 2, p.y + p.h);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#a5b4fc';
    ctx.beginPath();
    ctx.arc(p.x + p.w / 2, p.y + p.h * 0.5, 6, 0, Math.PI * 2);
    ctx.fill();

    if (gs.voiceBullet) {
        const vb = gs.voiceBullet;
        const bg = ctx.createLinearGradient(vb.x, vb.y, vb.x, vb.y + BULLET_H);
        bg.addColorStop(0, '#fff');
        bg.addColorStop(1, '#818cf8');
        ctx.fillStyle = bg;
        ctx.beginPath();
        roundRect(ctx, vb.x, vb.y, BULLET_W, BULLET_H, 2);
        ctx.fill();
    }

    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#6366f1';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H - 2);
    ctx.lineTo(W, H - 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, r) {
    if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); return; }
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function wrapText(text, cx, cy, maxW, lineH) {
    const words = text.split(/\s+/);
    if (words.length === 1 || ctx.measureText(text).width <= maxW) {
        ctx.fillText(text, cx, cy);
        return;
    }
    const lines = [];
    let line = '';
    words.forEach(word => {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) {
            lines.push(line);
            line = word;
        } else {
            line = test;
        }
    });
    if (line) lines.push(line);
    const total = lines.length * lineH;
    lines.forEach((l, i) => ctx.fillText(l, cx, cy - total / 2 + i * lineH + lineH / 2));
}

function setupControls() {
    const gs = gameState;

    const kd = e => {
        if (e.code === 'ArrowLeft')  { e.preventDefault(); gs.keys.left = true; }
        if (e.code === 'ArrowRight') { e.preventDefault(); gs.keys.right = true; }
    };
    const ku = e => {
        if (e.code === 'ArrowLeft')  gs.keys.left = false;
        if (e.code === 'ArrowRight') gs.keys.right = false;
    };
    document.addEventListener('keydown', kd);
    document.addEventListener('keyup', ku);

    const holdBtn = (id, key) => {
        const btn = document.getElementById(id);
        const on = () => gs.keys[key] = true;
        const off = () => gs.keys[key] = false;
        btn.addEventListener('pointerdown', on);
        btn.addEventListener('pointerup', off);
        btn.addEventListener('pointerleave', off);
        btn.addEventListener('pointercancel', off);
    };
    holdBtn('btn-left', 'left');
    holdBtn('btn-right', 'right');

    const micBtn = document.getElementById('mic-btn');
    micBtn.addEventListener('pointerdown', e => {
        e.preventDefault();
        if (micActive) stopMic();
        else startMic();
    });

    const spaceHandler = e => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (micActive) stopMic();
            else startMic();
        }
    };
    document.addEventListener('keydown', spaceHandler);

    gs._cleanup = () => {
        document.removeEventListener('keydown', kd);
        document.removeEventListener('keyup', ku);
        document.removeEventListener('keydown', spaceHandler);
    };
}

function showEnd() {
    const gs = gameState;
    stopMic();
    if (gs._cleanup) gs._cleanup();

    document.getElementById('result-emoji').textContent = gs.win ? '🎉' : '💫';
    document.getElementById('result-title').textContent = gs.win ? '완전 클리어!' : '게임 오버';
    document.getElementById('result-score').textContent = gs.score;
    document.getElementById('stat-hits').textContent = gs.hits;
    document.getElementById('stat-miss').textContent = gs.misses;
    document.getElementById('stat-wave').textContent = gs.wave;
    showScreen('end-screen');
}

function retryGame() {
    if (animId) cancelAnimationFrame(animId);
    startGame();
}

function goHome() {
    if (animId) cancelAnimationFrame(animId);
    stopMic();
    gameState = null;
    showScreen('start-screen');
}

if (!SR) {
    document.getElementById('no-speech-notice').style.display = 'block';
}
