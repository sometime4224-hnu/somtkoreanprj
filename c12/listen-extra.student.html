<!DOCTYPE html>
<html lang="ko">
<head>
        <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-NB76SV96');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12과 듣기 Extra 문제 전용</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/listen-extra.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="listen-extra-page student-mode">
        <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <nav class="listen-topbar" aria-label="상단 이동">
        <a href="../index.html">메인</a>
        <span class="listen-topbar__divider">|</span>
        <a href="index.html">12과 목록</a>
    </nav>

    <main class="listen-shell listen-shell--student">
        <section class="listen-hero listen-hero--minimal">
            <h1>12과 듣기: 건강과 운동</h1>
        </section>

        <section id="student-question-view" class="exam-layout">
            <article class="exam-card exam-card--student">
                <div class="exam-card__meta">
                    <div class="meta-left">
                        <span id="student-question-pill" class="pill pill--accent">문제 1 / 11</span>
                    </div>
                    <div class="meta-right">
                        <span id="student-save-pill" class="pill pill--save">자동 저장</span>
                    </div>
                </div>

                <div class="progress-track" aria-hidden="true">
                    <div id="student-progress-fill" class="progress-fill"></div>
                </div>

                <div class="exam-card__head">
                    <div>
                        <h2 id="student-question-prompt">문제 불러오는 중</h2>
                        <p id="student-question-subprompt">문항 정보</p>
                    </div>
                </div>

                <div id="student-choice-list" class="choice-list" aria-live="polite"></div>

                <div class="student-nav">
                    <div class="pager-wrap">
                        <button id="student-prev-btn" type="button" class="pager-btn pager-btn--strong pager-btn--bilingual">
                            <span class="pager-ko">이전 문제</span>
                            <span class="pager-vi">Trang trước</span>
                        </button>
                        <button id="student-next-btn" type="button" class="pager-btn pager-btn--strong pager-btn--bilingual">
                            <span class="pager-ko">다음 문제</span>
                            <span class="pager-vi">Trang sau</span>
                        </button>
                        <button id="student-results-btn" type="button" class="pager-btn pager-btn--strong pager-btn--bilingual hidden">
                            <span class="pager-ko">결과 보기</span>
                            <span class="pager-vi">Xem kết quả</span>
                        </button>
                    </div>
                </div>
            </article>
        </section>

        <section id="student-result-view" class="exam-layout hidden">
            <article id="student-capture-area" class="result-card">
                <div class="exam-card__meta">
                    <div class="meta-left">
                        <span class="pill pill--accent">자동 채점 결과</span>
                    </div>
                    <div class="meta-right">
                        <span class="pill">12과 듣기 Extra</span>
                    </div>
                </div>

                <div class="progress-track" aria-hidden="true">
                    <div class="progress-fill" style="width:100%;"></div>
                </div>

                <div class="exam-card__head">
                    <div>
                        <h2>채점이 완료되었습니다.</h2>
                        <p id="student-result-summary">결과를 계산하는 중입니다.</p>
                    </div>
                </div>

                <div class="score-grid">
                    <div class="score-box">
                        <span>Score</span>
                        <strong id="student-score-value">0 / 11</strong>
                    </div>
                    <div class="score-box">
                        <span>Percent</span>
                        <strong id="student-score-percent">0%</strong>
                    </div>
                    <div class="score-box">
                        <span>Correct</span>
                        <strong id="student-score-correct">0문항</strong>
                    </div>
                    <div class="score-box">
                        <span>Wrong</span>
                        <strong id="student-score-wrong">0문항</strong>
                    </div>
                </div>
            </article>

            <article class="student-result-list">
                <h3>틀린 문제 피드백</h3>
                <p class="inline-note">내가 선택한 답, 정답, 핵심 설명을 함께 확인할 수 있습니다.</p>
                <div id="student-feedback-list" class="feedback-list"></div>
            </article>

            <div class="result-actions">
                <button id="student-result-back-btn" type="button" class="result-btn">문제로 돌아가기</button>
                <button id="student-capture-btn" type="button" class="result-btn">결과 스크린샷 저장</button>
                <button id="student-reset-btn" type="button" class="result-btn">다시 풀기</button>
            </div>
        </section>
    </main>

    <script src="listen-extra.data.js"></script>
    <script src="../shared/listen-extra-student.js"></script>
</body>
</html>
