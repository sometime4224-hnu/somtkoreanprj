    <style>
        :root{--line:#dbeafe;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--orange:#f97316}
        *{box-sizing:border-box}
        body{margin:0;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(14,165,233,.16),transparent 24%),radial-gradient(circle at top right,rgba(249,115,22,.14),transparent 24%),linear-gradient(180deg,#f7fbff 0%,#eef4ff 42%,#f8fafc 100%)}
        .panel{background:rgba(255,255,255,.94);border:1px solid rgba(148,163,184,.24);border-radius:28px;box-shadow:0 24px 56px rgba(15,23,42,.08);backdrop-filter:blur(14px)}
        .eyebrow{margin:0;font-size:11px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#0284c7}
        .top-nav{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid rgba(191,219,254,.75)}
        .top-nav a{text-decoration:none;color:var(--blue);font-size:14px;font-weight:800}.divider{color:#cbd5e1;font-weight:800}
        .phase-btn,.action-btn,.token-chip{transition:transform .15s ease,border-color .15s ease,background .15s ease,box-shadow .15s ease}
        .phase-btn:hover:not(:disabled),.action-btn:hover:not(:disabled),.token-chip:hover:not(:disabled){transform:translateY(-1px)}
        .phase-btn{width:100%;border:1px solid var(--line);background:#f8fbff;border-radius:18px;padding:14px 12px;text-align:left;color:#1e40af;cursor:pointer}.phase-btn.active{background:linear-gradient(135deg,rgba(37,99,235,.12),rgba(2,132,199,.08));border-color:rgba(37,99,235,.45);box-shadow:0 16px 28px rgba(37,99,235,.14)}.phase-btn.done{border-color:rgba(34,197,94,.35);background:#f0fdf4;color:#166534}.phase-btn:disabled,.action-btn:disabled,.token-chip:disabled{opacity:.45;cursor:not-allowed}
        .action-btn{border-radius:18px;border:1px solid var(--line);background:#fff;color:var(--text);padding:13px 16px;font-size:14px;font-weight:800;cursor:pointer}.action-primary{background:linear-gradient(135deg,#2563eb,#0f5fd8);color:#fff;border-color:#2563eb;box-shadow:0 16px 28px rgba(37,99,235,.22)}.action-soft{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.action-ghost{background:#fff7ed;color:#c2410c;border-color:#fed7aa}.action-danger{background:#dc2626;color:#fff;border-color:#dc2626}
        .token-chip{border-radius:999px;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;padding:10px 14px;font-size:14px;font-weight:800;cursor:pointer}
        .focus-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:13px;font-weight:700}
        .guide{border-radius:22px;border:1px solid rgba(251,191,36,.55);background:linear-gradient(135deg,rgba(255,251,235,.95),rgba(255,247,237,.9));color:#92400e}
        .sentence-box{border-radius:22px;border:1px solid #bfdbfe;background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(239,246,255,.84))}
        .feedback{border-radius:22px;padding:18px;border:1px solid transparent}.feedback.exact,.feedback.accepted{background:#ecfdf5;border-color:#86efac;color:#166534}.feedback.guided,.feedback.support,.feedback.model{background:#fff7ed;border-color:#fdba74;color:#9a3412}.feedback.error{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
        .warning{border-radius:20px;border:1px solid #fcd34d;background:#fffbeb;color:#92400e}.readout{border-radius:18px;border:1px solid #e2e8f0;background:#fff;padding:16px 18px;font-size:18px;line-height:1.8;font-weight:800;word-break:keep-all}
        .metric{border-radius:18px;border:1px solid #e2e8f0;background:#fff;padding:14px 16px}.metric-label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}.metric-value{font-size:28px;line-height:1;font-weight:900}
        .feedback-copy{border-radius:18px;padding:16px 18px;font-size:16px;line-height:1.8;font-weight:700}.feedback-copy.high{background:#dcfce7;color:#166534;border:1px solid #86efac}.feedback-copy.mid{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}.feedback-copy.low{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
        .syllables{display:flex;flex-wrap:wrap;gap:6px}.cell{min-width:36px;padding:6px 4px;border-radius:10px;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:800}.cell i{font-size:9px;line-height:1;font-style:normal}.cell b{font-size:15px;line-height:1}.cell span{font-size:8px;line-height:1;padding:2px 4px;border-radius:999px}.exact-cell{background:#dcfce7;border-color:#86efac;color:#166534}.close-cell{background:#fef9c3;border-color:#fde047;color:#854d0e}.miss-cell{background:#fee2e2;border-color:#fca5a5;color:#991b1b}.empty-cell{background:#f1f5f9;border-color:#cbd5e1;color:#64748b}.extra-cell{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8;border-style:dashed}
        .transcript{border-radius:18px;border:1px dashed #bfdbfe;background:rgba(239,246,255,.82);color:#1e40af}.is-recording{animation:mic-pulse 1s ease-out infinite}
        @keyframes mic-pulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.32)}100%{box-shadow:0 0 0 16px rgba(220,38,38,0)}}
    </style>

    <main class="mx-auto w-[min(1100px,calc(100%-20px))] py-4 pb-12">
        <section id="hero" class="panel px-4 py-4 sm:px-5 sm:py-5"></section>

    <script>
        const SCENARIOS = [
            {title:'상황 1 · 몸이 무겁고 기운이 없어요',note:'부드럽게 권유하는 표현으로 친구의 몸 상태를 돌보는 말을 만들어 보세요.',emoji:'😩',hint:'기운이 없고 몸이 무거워요.',question:'너무 강하지 않게, 먼저 가볍게 해 볼 수 있는 운동을 권해 보세요.',pattern:'-는 게 어때요?',coach:'몸이 무거울 때는 명령보다 부드러운 제안을 먼저 꺼내는 흐름이 잘 어울립니다.',target:'가볍게 스트레칭을 하는 게 어때요?',accepted:['가볍게 스트레칭하는 게 어때요?','가볍게 스트레칭을 해 보는 게 어때요?'],quick:['가볍게','스트레칭을','하는','게','어때요?'],focus:['스트레칭','가볍게','-는 게 어때요?'],validation:{groups:[['스트레칭'],['가볍'],['어때']],endings:['게어때요','게어때']}},
            {title:'상황 2 · 재채기가 나고 콧물이 흘러요',note:'건강 조언 상황에서는 정중한 권유형을 써 보면 자연스럽습니다.',emoji:'🤧',hint:'재채기가 나고 콧물이 흘러요.',question:'상대를 배려하는 말투로 몸을 돌보는 행동을 권해 보세요.',pattern:'-으세요 / -세요',coach:'감기 증상처럼 몸이 아플 때는 공손한 권유형으로 조심스럽게 말하는 것이 좋습니다.',target:'따뜻한 물을 많이 드세요.',accepted:['따뜻한 물을 많이 마시세요.','따뜻한 물을 자주 드세요.'],quick:['따뜻한','물을','많이','드세요.'],focus:['따뜻한 물','많이','-세요'],validation:{groups:[['따뜻'],['물'],['많이','자주'],['드시','마시']],endings:['드세요','마시세요']}},
            {title:'상황 3 · 시험 때문에 스트레스를 많이 받아요',note:'걱정을 줄이고 휴식을 제안하는 부드러운 권유 문장을 만들어 보세요.',emoji:'🤯',hint:'시험 때문에 스트레스를 많이 받아요.',question:'마음을 진정시키는 방향으로 조언해 보세요.',pattern:'-는 게 좋겠어요',coach:'정서적인 상태를 다루는 상황이라면 “좋겠어요” 같은 완곡한 표현이 잘 맞습니다.',target:'너무 걱정하지 말고 잠깐 쉬는 게 좋겠어요.',accepted:['걱정하지 말고 잠깐 쉬는 게 좋겠어요.','너무 걱정하지 말고 좀 쉬는 게 좋겠어요.'],quick:['너무','걱정하지','말고','잠깐','쉬는','게','좋겠어요.'],focus:['걱정하지 말고','쉬는 게 좋겠어요'],validation:{groups:[['걱정하지'],['말고'],['쉬'],['좋겠']],endings:['좋겠어요']}},
            {title:'상황 4 · 머리가 너무 아파요',note:'단계가 있는 권유를 할 때는 행동을 순서대로 연결하면 좋습니다.',emoji:'🤕',hint:'머리가 너무 아파요.',question:'먼저 할 일과 이어서 할 일을 차례대로 권해 보세요.',pattern:'-고 ... -도록 하세요',coach:'약을 먹고 쉬는 것처럼 순서를 가진 조언은 연결형과 권유형을 함께 쓰면 자연스럽습니다.',target:'약을 먹고 좀 쉬도록 하세요.',accepted:['약을 먹고 푹 쉬도록 하세요.','약을 먹고 좀 쉬세요.'],quick:['약을','먹고','좀','쉬도록','하세요.'],focus:['약을 먹고','쉬도록 하세요'],validation:{groups:[['약'],['먹고'],['쉬'],['하세','세요']],endings:['하도록하세요','쉬세요','하세요']}},
            {title:'상황 5 · 커피를 많이 마셔서 잠을 못 잤어요',note:'하지 말아야 할 행동과 대신 하면 좋은 행동을 함께 권해 보세요.',emoji:'☕️😵',hint:'커피를 많이 마셔서 잠을 못 잤어요.',question:'하지 말아야 할 행동과 대신 하면 좋은 행동을 함께 넣어 보세요.',pattern:'-지 말고',coach:'나쁜 습관을 끊고 다른 행동을 권할 때는 “-지 말고” 패턴이 매우 자주 쓰입니다.',target:'오늘은 커피를 마시지 말고 일찍 자요.',accepted:['오늘은 커피를 마시지 말고 일찍 자세요.','커피를 마시지 말고 오늘은 일찍 자요.'],quick:['오늘은','커피를','마시지','말고','일찍','자요.'],focus:['마시지 말고','일찍 자요'],validation:{groups:[['커피'],['마시지'],['말고'],['일찍'],['자']],endings:['자요','자세요']}}
        ];
        const FEEDBACK = {
            exact:{title:'좋아요! 상황에 딱 맞는 권유 문장을 만들었어요.',body:'핵심 어휘와 권유 표현이 모두 자연스럽습니다. 이 문장을 그대로 말하기 단계에서 연습하면 됩니다.'},
            accepted:{title:'좋아요! 상황에 맞는 정답이에요.',body:'표현이 조금 달라도 권유의 방향과 핵심 어휘가 맞으면 정답으로 인정합니다. 말하기 단계는 목표 문장으로 통일해 연습합니다.'},
            guided:{title:'문장 틀은 잘 잡았어요.',body:'권유 방향은 맞고 핵심 표현도 들어 있습니다. 이번 활동에서는 아래 목표 문장으로 리듬을 맞춰 말하기까지 이어 가겠습니다.'},
            support:{title:'핵심 아이디어는 잘 잡았어요.',body:'조언의 방향은 맞지만 목표 문장으로 한 번 더 정리해 두면 말하기가 더 안정적입니다.'},
            model:{title:'모범 문장을 불러왔어요.',body:'이번 상황은 이 문장을 기준으로 말하기까지 연결합니다. 발음 연습도 같은 문장으로 진행해 보세요.'},
            error:{title:'상황과 권유 표현을 한 번 더 맞춰 볼까요?',body:'먼저 목표 문장을 확인한 뒤, 같은 문장으로 말하기 단계까지 이어 가면 학습 흐름이 더 안정적으로 잡힙니다.'}
        };
        const state = { index:0, phase:'build', screen:'practice', results:createResults(), recognition:null, isRecording:false, transcript:'' };
        const refs = { hero:document.getElementById('hero'), progress:document.getElementById('progress'), workspace:document.getElementById('workspace') };
        const hasRecognition = Boolean(window.SpeechRecognition || window.webkitSpeechRecognition);
        let latestTranscript = '', finalTranscript = '';

        init();

        function createResults() {
            return SCENARIOS.map(() => ({
                draft:'', checked:false, status:'pending', exact:false, accepted:false, grammarOk:false, usedModel:false,
                speaking:{attempts:0, bestScore:null, lastScore:null, accuracy:0, completeness:0, spoken:'', listened:false, slow:false}
            }));
        }
        function currentScenario() { return SCENARIOS[state.index]; }
        function currentResult() { return state.results[state.index]; }
        function init() {
            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
            renderApp();
        }
        function renderApp() {
            renderHero();
            renderProgress();
            if (state.screen === 'summary') renderSummary();
            else renderPractice();
        }
        function renderHero() {
            refs.hero.innerHTML = `<div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between"><div><p class="eyebrow">Conversation Speaking</p><h1 class="mt-2 text-2xl font-black leading-tight text-slate-900 sm:text-3xl">친구에게 자연스럽게 권유하기</h1><p class="mt-2 max-w-3xl text-sm leading-7 text-slate-600 sm:text-base">상황 보기 → 권유 문장 만들기 → 실제 말하기까지 한 흐름으로 연습합니다.</p></div><div class="flex flex-wrap gap-2 text-xs font-black text-slate-700"><span class="rounded-full border border-slate-200 bg-white px-3 py-2">빠른 문장 만들기</span><span class="rounded-full border border-slate-200 bg-white px-3 py-2">즉시 피드백</span><span class="rounded-full border border-slate-200 bg-white px-3 py-2">말하기 연습</span></div></div>`;
        }
        function renderProgress() {
            if (state.screen === 'summary') {
                refs.progress.innerHTML = `<div class="grid gap-4 lg:grid-cols-2"><article class="rounded-[24px] border border-slate-200 bg-white/90 p-4"><p class="eyebrow">Practice Summary</p><h2 class="mt-2 text-xl font-black text-slate-900 sm:text-2xl">권유하기 회화 연습을 모두 마쳤어요.</h2><p class="mt-2 text-sm leading-7 text-slate-600">문장 만들기와 말하기 결과를 함께 확인하고 필요한 상황만 다시 복습해 보세요.</p><div class="mt-4 h-2 overflow-hidden rounded-full bg-slate-100"><div class="h-full rounded-full bg-gradient-to-r from-blue-500 to-orange-500" style="width:100%"></div></div></article><article class="rounded-[24px] border border-slate-200 bg-white/90 p-4"><p class="eyebrow">Completed Steps</p><div class="mt-3 grid gap-2 sm:grid-cols-2"><div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">문장 만들기 완료</div><div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">말하기 완료</div></div></article></div>`;
                return;
            }
            const checked = state.results.filter((r) => r.checked).length;
            const direct = state.results.filter((r) => r.exact || r.accepted).length;
            const spoken = state.results.filter((r) => r.speaking.bestScore !== null).length;
            const progress = ((state.index + 1) / SCENARIOS.length) * 100;
            const s = currentScenario();
            refs.progress.innerHTML = `<div class="grid gap-4 lg:grid-cols-[1.02fr_0.98fr]"><article class="rounded-[24px] border border-slate-200 bg-white/90 p-4"><p class="eyebrow">Current Scenario</p><h2 class="mt-2 text-xl font-black text-slate-900 sm:text-2xl">${escapeHtml(s.title)}</h2><p class="mt-2 text-sm leading-7 text-slate-600">${escapeHtml(s.note)}</p><div class="mt-4 flex items-center justify-between gap-3 text-sm font-bold text-slate-500"><span>${state.index + 1} / ${SCENARIOS.length}</span><span>${state.phase === 'build' ? '문장 만들기' : '말하기 연습'}</span></div><div class="mt-2 h-2 overflow-hidden rounded-full bg-slate-100"><div class="h-full rounded-full bg-gradient-to-r from-blue-500 via-sky-500 to-orange-500" style="width:${progress}%"></div></div></article><article class="rounded-[24px] border border-slate-200 bg-white/90 p-4"><p class="eyebrow">Current Status</p><div class="mt-3 grid gap-3 sm:grid-cols-3"><div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3"><span class="block text-xs font-bold text-slate-500">문장 확인</span><strong class="mt-2 block text-2xl font-black text-blue-700">${checked}</strong></div><div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3"><span class="block text-xs font-bold text-slate-500">직접 맞춤</span><strong class="mt-2 block text-2xl font-black text-emerald-600">${direct}</strong></div><div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3"><span class="block text-xs font-bold text-slate-500">말하기 기록</span><strong class="mt-2 block text-2xl font-black text-orange-600">${spoken}</strong></div></div></article></div>`;
        }
        function renderPractice() {
            const s = currentScenario(), r = currentResult(), sp = r.speaking;

                    state.transcript = event.error === 'not-allowed' ? '마이크 권한이 필요합니다. 브라우저에서 허용해 주세요.' : '음성이 감지되지 않았습니다. 천천히 다시 말해 보세요.';
                    renderApp();
                };
                state.recognition.onend = () => {
                    if (!state.isRecording) return;
                    if (!finalReceived && restartCount < maxRestarts) {
                        restartCount += 1;
                        setTimeout(() => { if (state.isRecording) begin(); }, 220);
                    } else {
                        finishRecording();
                        renderApp();
                    }
                };
                try { state.recognition.start(); } catch (error) { finishRecording(); renderApp(); }
            };
            begin();
        }
        function finishRecording() {
            state.isRecording = false;
            if (state.recognition) {
                try { state.recognition.stop(); } catch (error) {}
                state.recognition.onresult = null; state.recognition.onerror = null; state.recognition.onend = null; state.recognition = null;
            }
        }
        function stopRecognitionLoop() { finishRecording(); }
        function updateTranscript() {
            const el = document.getElementById('liveTranscript');
            if (!el) return;
            if (!state.transcript) { el.classList.add('hidden'); el.textContent = ''; return; }
            el.classList.remove('hidden'); el.textContent = state.transcript;
        }
        function analyzeSpeech(raw) {
            const sp = currentResult().speaking;
            const res = jamoAnalyze(norm(raw), norm(currentScenario().target));
            sp.attempts += 1; sp.lastScore = res.score; sp.accuracy = res.accuracy; sp.completeness = res.completeness; sp.spoken = raw;
            if (sp.bestScore === null || res.score > sp.bestScore) sp.bestScore = res.score;
            state.transcript = raw;
            renderApp();
        }
        function goNext() {
            if (state.isRecording) finishRecording();
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            if (state.index >= SCENARIOS.length - 1) { state.screen = 'summary'; renderApp(); return; }
            state.index += 1; state.phase = 'build'; state.transcript = ''; renderApp();
        }
        function restart() {
            if (state.isRecording) finishRecording();
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            state.index = 0; state.phase = 'build'; state.screen = 'practice'; state.results = createResults(); state.transcript = '';
            latestTranscript = ''; finalTranscript = '';
            renderApp();
        }
        function summaryComment(direct, model) {
            if (direct >= 4) return '상황에 맞는 권유 문장을 대부분 스스로 만들었습니다. 표현 선택이 안정적으로 잡혀 있습니다.';
            if (model >= 3) return '모범 문장을 여러 번 참고하며 흐름을 익혔습니다. 다음에는 같은 틀로 어휘만 바꿔 직접 다시 써 보면 더 좋습니다.';
            return '권유 문장의 기본 틀은 잡혔습니다. 이제 상황에 맞는 핵심 어휘를 더 정확하게 넣는 연습이 필요합니다.';
        }
        function speakingComment(avg) {
            if (avg >= 85) return '말하기 점수가 안정적입니다. 같은 리듬으로 새로운 상황에서도 충분히 확장할 수 있습니다.';
            if (avg >= 70) return '핵심 어휘는 잘 전달됩니다. 천천히 듣기로 리듬을 한 번 더 익히면 점수가 더 올라갈 수 있습니다.';
            return '먼저 듣기와 천천히 듣기를 통해 문장 덩어리를 익힌 뒤, 끝까지 이어 말하는 연습이 필요합니다.';
        }
        function grammarState(r) {
            if (r.exact) return '목표 문장 정확 일치';
            if (r.accepted) return '직접 정답';
            if (r.status === 'guided') return '문장 틀 적절';
            if (r.status === 'support') return '핵심 방향 확인';
            if (r.usedModel) return '모범 문장 사용';
            return '검토 필요';
        }
        function buildSpeechFeedback(score, accuracy, completeness, focus) {
            const notes = [];
            if (score >= 85) notes.push('문장 전체가 안정적으로 잘 들렸어요.');
            else if (score >= 65) notes.push('핵심 표현은 잘 들렸지만 몇 음절이 살짝 흔들렸어요.');
            else notes.push('문장 전체를 조금 더 또렷하게 이어서 말할 필요가 있어요.');
            if (completeness < 75) notes.push('문장 끝부분이 빠지지 않도록 끝까지 이어서 말해 보세요.');
            if (accuracy < 70) notes.push(`특히 "${focus.join(', ')}" 부분을 의식해서 한 번 더 말해 보세요.`);
            else if (score >= 85) notes.push('이제 다음 상황으로 넘어가도 좋습니다.');
            else notes.push('천천히 듣기 후 같은 리듬으로 다시 따라 말해 보세요.');
            return { body: notes.join(' ') };
        }
        function feedbackTone(score) { if (score >= 85) return 'high'; if (score >= 65) return 'mid'; return 'low'; }
        function isSecureContextOrLocalhost() { return location.protocol === 'https:' || ['localhost', '127.0.0.1'].includes(location.hostname); }
        function norm(value) { return String(value || '').replace(/[\s.,!?~"'`()\[\]{}:;/\\-]/g, ''); }
        function lcs(a, b) {
            const m = a.length, n = b.length, dp = Array.from({ length:m + 1 }, () => new Array(n + 1).fill(0));
            for (let i = 1; i <= m; i += 1) for (let j = 1; j <= n; j += 1) dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
            return dp[m][n];
        }
        function decompose(value) {
            const CHO='ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ', JUNG='ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ', JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            let out = '';
            for (const ch of value) {
                const code = ch.charCodeAt(0);
                if (code >= 0xAC00 && code <= 0xD7A3) {
                    const offset = code - 0xAC00, jong = offset % 28, jung = ((offset - jong) / 28) % 21, cho = Math.floor((offset - jong) / 28 / 21);
                    out += CHO[cho] + JUNG[jung] + (jong ? JONG[jong] : '');
                } else out += ch;
            }
            return out;
        }
        function jamoAnalyze(spoken, target) {
            const t = decompose(target), s = decompose(spoken);
            if (!t.length) return { accuracy:0, completeness:0, score:0 };
            const matched = lcs(t, s), accuracy = Math.round((matched / t.length) * 100), completeness = Math.round((matched / Math.max(t.length, s.length || 1)) * 100), score = Math.round((accuracy * 0.65) + (completeness * 0.35));
            return { accuracy, completeness, score };
        }
        function syllableSim(targetChar, spokenChar) {
            if (!spokenChar) return 0;
            if (targetChar === spokenChar) return 1;
            const t = decompose(targetChar), s = decompose(spokenChar);
            return t.length ? lcs(t, s) / t.length : 0;
        }
        function buildSyllableBlocks(target, spoken) {
            const t = [...target], s = [...spoken];
            let html = '';
            for (let i = 0; i < t.length; i += 1) {
                const sim = syllableSim(t[i], s[i] || '');
                if (!s[i]) { html += syllableCell('empty-cell', '🔇', t[i], ''); continue; }
                if (sim >= 0.99) { html += syllableCell('exact-cell', '✅', t[i], ''); continue; }
                if (sim >= 0.55) { html += syllableCell('close-cell', '⚠️', t[i], s[i]); continue; }
                html += syllableCell('miss-cell', '❌', t[i], s[i]);
            }
            for (let i = t.length; i < s.length; i += 1) html += syllableCell('extra-cell', '➕', s[i], '');
            return html;
        }
        function syllableCell(cls, icon, main, sub) { return `<div class="cell ${cls}"><i>${icon}</i><b>${escapeHtml(main)}</b>${sub ? `<span>${escapeHtml(sub)}</span>` : ''}</div>`; }
        function escapeHtml(value) { return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }
    </script>
