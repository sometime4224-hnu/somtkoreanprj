  <meta charset="UTF-8">

  <title>c12 「여러분의 목 건강은 어떠십니까?」 컷 쓰기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f7ef;
      --surface: #ffffff;
      --line: #d9ddcf;
      --text: #1f2937;
      --muted: #667085;
      --accent: #c97b12;
      --accent-soft: #fff1d8;
      --accent-strong: #8f4f08;
      --mint: #0f766e;
      --mint-soft: #dff7f1;
      --success: #166534;
      --success-soft: #dcfce7;
      --warn: #9a6700;
      --warn-soft: #fff4ce;
      --wrong: #b42318;
      --wrong-soft: #fee4e2;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius-lg: 28px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(251, 191, 36, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(45, 212, 191, 0.12), transparent 26%),
        linear-gradient(180deg, #fbfcf8 0%, var(--bg) 100%);
    }

    body.passage-open {
      overflow: hidden;
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    img { max-width: 100%; display: block; }

    .global-nav {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(217, 221, 207, 0.92);
    }

    .global-nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .global-nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      transition: 0.18s ease;
    }

    .global-nav a:hover,
    .global-nav a:focus-visible,
    .global-nav a[aria-current="page"] {
      color: var(--accent-strong);
      background: var(--accent-soft);
      outline: none;
    }

    .global-nav-passage-btn {
      display: none;
      margin-left: auto;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid #f2be7d;
      background: linear-gradient(135deg, #fffdf6, #fef3c7);
      color: var(--accent-strong);
      font-size: 0.88rem;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(180, 120, 16, 0.18);
    }

    .global-nav-passage-btn:focus-visible {
      outline: 3px solid rgba(201, 123, 18, 0.24);
      outline-offset: 2px;
    }

    .page-header { padding: 22px 16px 18px; }

    .header-card {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 34px;
      border: 1px solid rgba(201, 123, 18, 0.18);
      background:
        linear-gradient(135deg, rgba(255, 247, 221, 0.98), rgba(255, 255, 255, 0.98)),
        linear-gradient(120deg, rgba(255, 255, 255, 0.4), rgba(223, 247, 241, 0.3));
      box-shadow: var(--shadow);
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-soft), var(--mint-soft));
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 0.84rem;
    }

    .header-card h1 {
      margin: 14px 0 10px;
      font-size: clamp(1.95rem, 4vw, 3rem);
      line-height: 1.1;
    }

    .header-card p {
      margin: 0;
      max-width: 760px;
      color: #475467;
      line-height: 1.7;
    }

    .page-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 16px 42px;
    }

    .app-root { min-height: 65vh; }

    .progress-card,
    .panel,
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .progress-card { padding: 22px; margin-bottom: 18px; }
    .panel, .summary-card { padding: 20px; }

    .progress-top, .panel-head, .actions {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .progress-top { margin-bottom: 16px; }
    .panel-head { margin-bottom: 16px; }

    .eyebrow, .header-badge, .highlight-tag, .focus-chip, .support-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .eyebrow {
      color: var(--accent-strong);
      font-size: 0.85rem;
      font-weight: 800;
    }

    .progress-title { margin: 8px 0 6px; font-size: clamp(1.25rem, 3vw, 1.75rem); }
    .progress-desc, .panel-head p, .image-caption, .summary-item p { color: var(--muted); line-height: 1.6; }
    .panel-head h3 { margin: 0; font-size: 1.14rem; }
    .panel-head p, .summary-item p { margin: 6px 0 0; }

    .focus-chip {
      flex-shrink: 0;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      font-size: 0.9rem;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(217, 119, 6, 0.22);
    }

    .top-tools {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .passage-open-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      min-height: 52px;
      padding: 10px 16px;
      border-radius: 18px;
      border: 1px solid #b8ddd3;
      background: linear-gradient(135deg, #ecfdf7, #ffffff);
      color: var(--mint);
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(13, 148, 136, 0.12);
    }

    .passage-open-btn:focus-visible {
      outline: 3px solid rgba(20, 184, 166, 0.26);
      outline-offset: 3px;
    }

    .passage-open-btn__label {
      font-size: 0.98rem;
      line-height: 1.2;
    }

    .passage-open-btn__hint {
      font-size: 0.8rem;
      font-weight: 700;
      color: #0f766e;
      line-height: 1.35;
    }

    .highlight-tag {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 0.82rem;
    }

    .step-pills, .cut-pills, .summary-metrics, .fill-grid {
      display: grid;
      gap: 10px;
    }

    .step-pills, .summary-metrics { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .cut-pills { grid-template-columns: repeat(5, minmax(0, 1fr)); margin-top: 12px; }
    .fill-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 14px; }

    .step-pill, .cut-pill {
      padding: 11px 10px;
      border-radius: 18px;
      border: 1px solid #e6e8de;
      background: #fbfcf8;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.86rem;
    }

    .step-pill.done, .cut-pill.done {
      color: var(--success);
      border-color: #a7f3d0;
      background: #f0fdf9;
    }

    .step-pill.active, .cut-pill.active {
      color: var(--accent-strong);
      border-color: #f7c36d;
      background: linear-gradient(180deg, #fff8ea 0%, #ffe6bf 100%);
      box-shadow: 0 12px 24px rgba(201, 123, 18, 0.14);
      transform: translateY(-1px);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.08fr);
      gap: 18px;
    }

    .activity-layout {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .floating-image-preview {
      position: fixed;
      top: calc(68px + env(safe-area-inset-top, 0px));
      left: 50%;
      z-index: 45;
      display: none;
      align-items: center;
      gap: 10px;
      width: min(260px, calc(100vw - 24px));
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(201, 123, 18, 0.24);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 32px rgba(15, 23, 42, 0.16);
      transform: translate(-50%, -12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      text-align: left;
    }

    .floating-image-preview.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    .floating-image-preview img {
      width: 78px;
      height: 52px;
      flex-shrink: 0;
      border-radius: 12px;
      border: 1px solid rgba(217, 221, 207, 0.92);
      object-fit: cover;
      background: #f9faf7;
    }

    .floating-image-preview__copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .floating-image-preview__copy strong {
      color: var(--accent-strong);
      font-size: 0.88rem;
      line-height: 1.2;
    }

    .floating-image-preview__copy span {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .image-wrap {
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid #ebe6d8;
      background: #f9faf7;
    }

    .image-wrap img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
    .support-row, .choice-list, .word-bank, .order-row, .action-group, .summary-list { display: flex; gap: 10px; }
    .support-row, .word-bank, .order-row, .action-group { flex-wrap: wrap; }
    .choice-list, .summary-list { flex-direction: column; }
    .support-row { margin-top: 14px; }

    .support-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--mint-soft);
      color: var(--mint);
      font-weight: 700;
      font-size: 0.84rem;
    }

    .instruction-card, .guide-zone, .template-box, .arranged-box, .fill-preview {
      border-radius: 20px;
      padding: 16px;
    }

    .instruction-card {
      margin-bottom: 14px;
      background: linear-gradient(135deg, rgba(255, 247, 221, 0.62), rgba(255, 255, 255, 0.98));
      border: 1px solid rgba(201, 123, 18, 0.16);
    }

    .instruction-card strong { display: block; margin-bottom: 4px; color: var(--accent-strong); }
    .instruction-card span { color: #475467; line-height: 1.55; }

    .guide-zone {
      position: relative;
      margin-top: 14px;
    }

    .guide-zone.compact {
      margin-top: 0;
      width: 100%;
      max-width: 320px;
    }

    .guide-zone.compact .guide-callout {
      margin-left: 6px;
    }

    .guide-zone.compact .nav-btn,
    .guide-zone.compact .ghost-btn {
      width: 100%;
    }

    .guide-zone > :not(.guide-callout) {
      position: relative;
      z-index: 2;
    }

    .guide-zone.primary::before,
    .guide-zone.primary::after,
    .guide-zone.success::before,
    .guide-zone.success::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 24px;
      pointer-events: none;
      z-index: 1;
    }

    .guide-zone.primary::before,
    .guide-zone.primary::after {
      border: 3px solid rgba(245, 158, 11, 0.72);
      box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.26);
    }

    .guide-zone.success::before,
    .guide-zone.success::after {
      border: 3px solid rgba(34, 197, 94, 0.7);
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.24);
    }

    .guide-zone.primary::before,
    .guide-zone.success::before {
      animation: guideWave 1.9s ease-out infinite;
    }

    .guide-zone.primary::after,
    .guide-zone.success::after {
      animation: guideWave 1.9s ease-out 0.95s infinite;
    }

    .guide-callout {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px 10px;
      padding: 9px 14px;
      border-radius: 999px;
      color: white;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      z-index: 3;
      animation: guideFloat 1.6s ease-in-out infinite;
      box-shadow: 0 14px 24px rgba(15, 23, 42, 0.18);
    }

    .guide-callout::after {
      content: '';
      position: absolute;
      left: 22px;
      bottom: -6px;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      border-radius: 3px;
      background: inherit;
    }

    .guide-callout.primary {
      background: linear-gradient(135deg, #f59e0b, #f97316);
    }

    .guide-callout.success {
      background: linear-gradient(135deg, #22c55e, #15803d);
    }

    .template-box, .arranged-box, .fill-preview {
      border: 1px dashed #d0d5c6;
      background: #fcfdf9;
    }

    .template-line, .arranged-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      line-height: 1.8;
      font-size: 1rem;
    }

    .choice-btn, .drop-slot, .word-chip, .order-chip, .ghost-btn, .reset-btn, .nav-btn {
      transition: 0.18s ease;
      border-radius: 999px;
      font-weight: 700;
    }

    .choice-btn {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid #d9ddcf;
      background: white;
      text-align: left;
      color: var(--text);
      line-height: 1.6;
    }

    .choice-btn.selected { border-color: #f3b34b; background: #fff8ea; }
    .choice-btn.correct { border-color: #86efac; background: #f0fdf4; color: var(--success); }
    .choice-btn.wrong { border-color: #fda29b; background: #fff1f0; color: var(--wrong); }

    .drop-slot, .word-chip, .order-chip {
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid #d4d8cb;
      background: white;
      color: var(--text);
    }

    .drop-slot.active { border-color: #f3b34b; background: #fff8ea; }
    .drop-slot.filled { border-color: #a7f3d0; background: #f0fdf9; color: var(--success); }
    .word-chip.used { opacity: 0.45; cursor: not-allowed; }

    .blank-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 0.88rem;
    }

    .fill-field label, .fullwrite-box label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 700;
    }

    .fill-field input, .fullwrite-box textarea {
      width: 100%;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid #cfd4c3;
      background: white;
      color: var(--text);
    }

    .fullwrite-box textarea { min-height: 120px; resize: vertical; line-height: 1.7; }

    .feedback {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .feedback strong { display: block; margin-bottom: 10px; }
    .feedback-body,
    .feedback-extra {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
    }

    .feedback-body + .feedback-body,
    .feedback-body + .feedback-extra,
    .feedback-extra + .feedback-extra {
      margin-top: 10px;
    }

    .feedback-label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.77rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      opacity: 0.82;
    }

    .feedback-body--vi {
      font-size: 0.92rem;
    }

    .feedback.correct { border: 1px solid #86efac; background: var(--success-soft); color: var(--success); }
    .feedback.warn { border: 1px solid #facc15; background: var(--warn-soft); color: var(--warn); }
    .feedback.wrong { border: 1px solid #fda29b; background: var(--wrong-soft); color: var(--wrong); }

    .actions { flex-wrap: wrap; margin-top: 18px; }
    .ghost-btn, .reset-btn, .nav-btn { min-height: 48px; padding: 0 18px; }
    .ghost-btn, .reset-btn { border: 1px solid #d4d8cb; background: white; color: #475467; }
    .nav-btn { background: linear-gradient(135deg, #d97706, #ea580c); color: white; box-shadow: 0 14px 28px rgba(217, 119, 6, 0.18); }
    button:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .metric {
      padding: 16px;
      border-radius: 20px;
      background: white;
      border: 1px solid #e8ebdf;
      box-shadow: var(--shadow);
    }

    .metric strong { display: block; font-size: 1.5rem; margin-bottom: 6px; }
    .metric span { color: var(--muted); font-size: 0.9rem; }

    .summary-item {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #e6e8de;
      background: white;
    }

    .summary-item strong { display: block; margin-bottom: 6px; }

    .passage-modal {
      position: fixed;
      inset: 50% auto auto 50%;
      z-index: 60;
      width: min(760px, calc(100vw - 32px));
      max-height: min(82vh, 860px);
      transform: translate(-50%, -50%);
      border-radius: 28px;
      border: 1px solid rgba(217, 221, 207, 0.96);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.22);
      overflow: hidden;
    }

    .passage-backdrop {
      position: fixed;
      inset: 0;
      z-index: 55;
      background: rgba(15, 23, 42, 0.38);
      backdrop-filter: blur(4px);
    }

    .passage-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 20px 22px 14px;
      border-bottom: 1px solid #ebe6d8;
      background: linear-gradient(135deg, rgba(255, 247, 221, 0.92), rgba(223, 247, 241, 0.72));
    }

    .passage-title {
      margin: 6px 0 0;
      font-size: clamp(1.2rem, 3vw, 1.65rem);
    }

    .passage-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .passage-body {
      padding: 18px 22px 22px;
      overflow: auto;
      max-height: calc(min(82vh, 860px) - 92px);
      overscroll-behavior: contain;
    }

    .passage-card {
      padding: 16px 18px;
      border-radius: 22px;
      border: 1px solid #ebe6d8;
      background: #fffdfa;
    }

    .passage-overview {
      background: linear-gradient(180deg, rgba(255, 249, 237, 0.96), rgba(255, 255, 255, 0.98));
      border-color: rgba(201, 123, 18, 0.2);
    }

    .passage-card + .passage-card {
      margin-top: 12px;
    }

    .passage-card strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent-strong);
      font-size: 1rem;
    }

    .passage-card p {
      margin: 0;
      color: #344054;
      line-height: 1.8;
      white-space: pre-line;
    }

    .passage-copy + .passage-copy {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed #e7dcc6;
    }

    .passage-section-label {
      margin: 18px 0 10px;
    }

    @keyframes guideWave {
      0% {
        opacity: 0.95;
        transform: scale(0.99);
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.24);
      }
      70% {
        opacity: 0.2;
        transform: scale(1.015);
        box-shadow: 0 0 0 18px rgba(245, 158, 11, 0);
      }
      100% {
        opacity: 0;
        transform: scale(1.03);
        box-shadow: 0 0 0 24px rgba(245, 158, 11, 0);
      }
    }

    @keyframes guideFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @media (max-width: 960px) {
      .activity-primary {
        order: 1;
      }

      .activity-secondary {
        order: 2;
      }

      .workspace, .summary-metrics { grid-template-columns: 1fr; }

      .floating-image-preview { display: flex; }
    }

    @media (max-width: 720px) {
      .global-nav {
        gap: 8px;
        overflow: visible;
        white-space: normal;
      }
      .global-nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        flex: 1 1 auto;
        overflow-x: auto;
        white-space: nowrap;
        scrollbar-width: none;
      }
      .global-nav-links::-webkit-scrollbar { display: none; }
