<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목 건강 읽기 - 컷 쓰기 활동</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts: Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #f97316;
      --orange-light: #fff7ed;
      --orange-mid: #fed7aa;
      --orange-dark: #ea580c;
      --green: #16a34a;
      --green-light: #dcfce7;
      --red: #dc2626;
      --red-light: #fee2e2;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 0;
      color: #1e293b;
    }

    /* ── Global Nav ── */
    .global-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .global-nav a {
      font-size: 0.82rem;
      color: #64748b;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .global-nav a:hover { background: #f1f5f9; color: var(--orange); }
    .global-nav .nav-sep { color: #cbd5e1; font-size: 0.9rem; }

    /* ── Page Header ── */
    .page-header {
      background: linear-gradient(135deg, var(--orange) 0%, #fb923c 100%);
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
    }
    .page-header .badge {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .page-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 4px;
      line-height: 1.4;
    }
    .page-header p {
      font-size: 0.82rem;
      margin: 0;
      opacity: 0.88;
    }

    /* ── Phase Indicator ── */
    .phase-indicator {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: white;
      border-bottom: 1px solid #f1f5f9;
    }
    .phase-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      border: 2px solid #e2e8f0;
      color: #94a3b8;
      background: white;
      transition: all 0.3s;
    }
    .phase-dot.active {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
      box-shadow: 0 2px 8px rgba(249,115,22,0.4);
    }
    .phase-dot.done {
      background: var(--orange-mid);
      border-color: var(--orange);
      color: var(--orange-dark);
    }
    .phase-line {
      flex: 1;
      max-width: 32px;
      height: 2px;
      background: #e2e8f0;
    }
    .phase-line.done { background: var(--orange-mid); }

    /* ── Main Content ── */
    .main-content {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ── Phase Card ── */
    .phase-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 12px rgba(0,0,0,0.06);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .phase-card-header {
      background: var(--orange-light);
      border-bottom: 1px solid var(--orange-mid);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .phase-card-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--orange-dark);
      margin: 0;
    }
    .cut-progress {
      font-size: 0.78rem;
      color: var(--orange);
      font-weight: 600;
      background: white;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--orange-mid);
    }
    .phase-card-body { padding: 16px; }

    /* ── Cut Image ── */
    .cut-image-wrap {
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .cut-image-wrap img {
      width: 100%;
      display: block;
      aspect-ratio: 4/3;
      object-fit: cover;
    }

    /* ── Placeholder Cut ── */
    .placeholder-cut {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--orange-light);
      border: 2px dashed var(--orange);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      gap: 8px;
      margin-bottom: 14px;
    }
    .placeholder-icon { font-size: 2.5rem; }
    .placeholder-label {
      font-size: 0.75rem;
      color: var(--orange);
      font-weight: 600;
    }
    .placeholder-desc {
      font-size: 0.72rem;
      color: #92400e;
      line-height: 1.5;
      max-width: 260px;
    }

    /* ── Textarea ── */
    .writing-area {
      width: 100%;
      min-height: 90px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      line-height: 1.7;
      resize: vertical;
      transition: border-color 0.2s;
      background: #fafafa;
    }
    .writing-area:focus {
      outline: none;
      border-color: var(--orange);
      background: white;
    }

    /* ── Save indicator ── */
    .save-indicator {
      font-size: 0.72rem;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
      text-align: right;
      margin-top: 4px;
      min-height: 18px;
    }
    .save-indicator.show { opacity: 1; }

    /* ── Hint ── */
    .hint-section { margin: 10px 0; }
    .hint-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px solid var(--orange-mid);
      color: var(--orange);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .hint-toggle-btn:hover { background: var(--orange-light); }
    .hint-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .hint-pill {
      background: var(--orange-light);
      border: 1px solid var(--orange-mid);
      color: var(--orange-dark);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    /* ── Model Answer ── */
    .model-answer-box {
      background: var(--green-light);
      border: 1.5px solid #86efac;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 10px;
    }
    .model-answer-box .label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 4px;
    }
    .model-answer-box .sentence {
      font-size: 0.95rem;
      color: #14532d;
      font-weight: 500;
      line-height: 1.6;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-orange {
      background: var(--orange);
      color: white;
    }
    .btn-orange:hover:not(:disabled) { background: var(--orange-dark); }
    .btn-outline {
      background: white;
      border: 1.5px solid #e2e8f0;
      color: #475569;
    }
    .btn-outline:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
    .btn-green {
      background: var(--green);
      color: white;
    }
    .btn-green:hover:not(:disabled) { background: #15803d; }
    .btn-full { width: 100%; }

    /* ── Nav row ── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      gap: 8px;
    }
    .nav-row .btn { flex: 1; }

    /* ── Phase 2: Grid ── */
    .cuts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .cut-grid-item {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      background: #fafafa;
    }
    .cut-grid-item .cut-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      background: var(--orange);
      padding: 3px 8px;
      text-align: center;
    }
    .cut-grid-item .cut-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .cut-grid-item .placeholder-cut-small {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--orange-light);
      border-bottom: 1px dashed var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .cut-grid-item .student-sentence {
      padding: 8px 10px;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #1e293b;
      border-top: 1px solid #f1f5f9;
    }
    .cut-grid-item .student-sentence.empty {
      color: #94a3b8;
      font-style: italic;
    }

    /* ── Phase 3: Thumbnail Row ── */
    .phase3-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }
    .thumb-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .thumb-item {
      flex: 0 0 calc(16.66% - 5px);
      min-width: 56px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #e2e8f0;
      position: relative;
    }
    .thumb-item.blank-slot {
      border: 2px dashed var(--orange);
      background: var(--orange-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-item img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .thumb-item .thumb-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--orange-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }
    .blank-q {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--orange);
    }
    .thumb-index {
      position: absolute;
      top: 2px;
      left: 2px;
      background: rgba(249,115,22,0.85);
      color: white;
      font-size: 0.55rem;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 4px;
      line-height: 1.4;
    }

    /* ── Phase 3: Choices ── */
    .choices-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .image-choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .image-choice-btn {
      border: 2.5px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      position: relative;
    }
    .image-choice-btn:hover { border-color: var(--orange); }
    .image-choice-btn.selected {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
    }
    .image-choice-btn.correct { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,0.2); }
    .image-choice-btn.wrong { border-color: var(--red); box-shadow: 0 0 0 3px rgba(220,38,38,0.2); }
    .image-choice-btn img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .image-choice-label {
      padding: 5px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      text-align: center;
      background: #f8fafc;
      border-top: 1px solid #f1f5f9;
    }
    .choice-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }
    .choice-badge.show { display: flex; }
    .choice-badge.correct { background: var(--green); color: white; }
    .choice-badge.wrong { background: var(--red); color: white; }

    /* ── Phase 4: Sentence Choices ── */
    .sentence-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .sentence-choice-btn {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: white;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      line-height: 1.6;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sentence-choice-btn:hover { border-color: var(--orange); background: var(--orange-light); }
    .sentence-choice-btn.selected { border-color: var(--orange); background: var(--orange-light); }
    .sentence-choice-btn.correct { border-color: var(--green); background: var(--green-light); color: #14532d; font-weight: 600; }
    .sentence-choice-btn.wrong { border-color: var(--red); background: var(--red-light); color: #7f1d1d; }

    /* ── Feedback ── */
    .feedback-box {
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
      margin-bottom: 10px;
      align-items: center;
      gap: 8px;
    }
    .feedback-box.show { display: flex; }
    .feedback-box.correct { background: var(--green-light); color: var(--green); border: 1.5px solid #86efac; }
    .feedback-box.wrong { background: var(--red-light); color: var(--red); border: 1.5px solid #fca5a5; }

    /* ── Phase 4 big image ── */
    .phase4-image-wrap {
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 2px solid var(--orange-mid);
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }
    .phase4-image-wrap img {
      width: 100%;
      display: block;
    }

    /* ── Congrats ── */
    .congrats-box {
      text-align: center;
      padding: 24px 16px;
    }
    .congrats-emoji { font-size: 3rem; margin-bottom: 10px; }
    .congrats-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--orange-dark);
      margin-bottom: 6px;
    }
    .congrats-sub {
      font-size: 0.88rem;
      color: #64748b;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .score-badge {
      display: inline-block;
      background: var(--orange);
      color: white;
      font-size: 1.2rem;
      font-weight: 900;
      padding: 10px 28px;
      border-radius: 50px;
      margin-bottom: 16px;
    }

    /* ── Animation ── */
    .fade-in { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Hidden utility ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<!-- ── Global Nav ── -->
<nav class="global-nav">
  <a href="../index.html"><i class="fas fa-home"></i> 메인으로</a>
  <span class="nav-sep">›</span>
  <a href="index.html"><i class="fas fa-book-open"></i> 단원 홈</a>
</nav>

<!-- ── Page Header ── -->
<div class="page-header">
  <div class="badge">12과 · 목 건강</div>
  <h1>목 건강 읽기 - 컷 쓰기 활동</h1>
  <p>그림을 보고 한국어 문장을 써 보세요 ✏️</p>
</div>

<!-- ── Phase Indicator ── -->
<div class="phase-indicator" id="phaseIndicator">
  <div class="phase-dot active" id="dot1">1</div>
  <div class="phase-line" id="line1"></div>
  <div class="phase-dot" id="dot2">2</div>
  <div class="phase-line" id="line2"></div>
  <div class="phase-dot" id="dot3">3</div>
  <div class="phase-line" id="line3"></div>
  <div class="phase-dot" id="dot4">4</div>
</div>

<!-- ══════════════════════════════════════════
     PHASE 1: Write sentences
════════════════════════════════════════════ -->
<div class="main-content" id="phase1">

  <div class="phase-card fade-in">
    <div class="phase-card-header">
      <h2>✏️ 문장 쓰기</h2>
      <span class="cut-progress" id="cutProgress">컷 1 / 6</span>
    </div>
    <div class="phase-card-body">

      <!-- Image area -->
      <div id="cutImageArea"></div>

      <!-- Textarea -->
      <textarea
        class="writing-area"
        id="writingTextarea"
        placeholder="이 그림을 한국어 문장으로 써 보세요..."
        rows="3"
      ></textarea>
      <div class="save-indicator" id="saveIndicator">저장됨 ✓</div>

      <!-- Hint -->
      <div class="hint-section">
        <button class="hint-toggle-btn" id="hintToggleBtn" onclick="toggleHint()">
          <i class="fas fa-lightbulb"></i> 힌트 보기
        </button>
        <div class="hint-pills hidden" id="hintPills"></div>
      </div>

      <!-- Check button -->
      <button class="btn btn-orange btn-full" style="margin-top:10px;" onclick="checkAnswer()">
        <i class="fas fa-check-circle"></i> 확인
      </button>

      <!-- Model answer -->
      <div class="model-answer-box hidden" id="modelAnswerBox">
        <div class="label"><i class="fas fa-star"></i> 모범 답안</div>
        <div class="sentence" id="modelAnswerText"></div>
      </div>

      <!-- Navigation -->
      <div class="nav-row">
        <button class="btn btn-outline" id="prevBtn" onclick="prevCut()">
          <i class="fas fa-chevron-left"></i> 이전
        </button>
        <button class="btn btn-orange" id="nextBtn" onclick="nextCut()">
          다음 <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <!-- After all 6 done -->
      <div class="hidden" id="resultBtnWrap" style="margin-top:10px;">
        <button class="btn btn-green btn-full" onclick="goToPhase2()">
          내 결과 보기 <i class="fas fa-arrow-right"></i>
        </button>
      </div>

    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     PHASE 2: Review all cuts
════════════════════════════════════════════ -->
<div class="main-content hidden" id="phase2">

  <div class="phase-card fade-in">
    <div class="phase-card-header">
      <h2>✏️ 내가 쓴 문장</h2>
    </div>
    <div class="phase-card-body">
      <div class="cuts-grid" id="cutsGrid"></div>
      <div style="margin-top:16px;">
        <button class="btn btn-orange btn-full" onclick="goToPhase3()">
          빈칸 그림 찾기 <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     PHASE 3: Find the blank image
════════════════════════════════════════════ -->
<div class="main-content hidden" id="phase3">

  <div class="phase-card fade-in">
    <div class="phase-card-header">
      <h2>🔍 빈칸 그림 찾기</h2>
    </div>
    <div class="phase-card-body">
      <p class="phase3-title">빈칸에 알맞은 그림을 찾아보세요</p>

      <!-- Thumbnail row -->
      <div class="thumb-row" id="thumbRow"></div>

      <!-- Choices -->
      <div class="choices-label">보기</div>
      <div class="image-choices-grid" id="imageChoicesGrid"></div>

      <!-- Feedback -->
      <div class="feedback-box" id="p3Feedback"></div>

      <!-- Buttons -->
      <button class="btn btn-orange btn-full" id="p3CheckBtn" onclick="checkPhase3()">
        <i class="fas fa-check-circle"></i> 확인
      </button>
      <div style="margin-top:8px;">
        <button class="btn btn-green btn-full hidden" id="p3NextBtn" onclick="goToPhase4()">
          다음 <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     PHASE 4: Find the blank sentence
════════════════════════════════════════════ -->
<div class="main-content hidden" id="phase4">

  <div class="phase-card fade-in">
    <div class="phase-card-header">
      <h2>📝 빈칸 문장 고르기</h2>
    </div>
    <div class="phase-card-body">
      <p class="phase3-title">빈칸에 알맞은 문장을 골라 보세요</p>

      <!-- Big image of the blank cut -->
      <div class="phase4-image-wrap">
        <img src="../assets/c12/misc/images/split-variants-35/full/n13.webp" alt="고개를 천천히 돌리는 사람">
      </div>

      <!-- Sentence choices -->
      <div class="sentence-choices" id="sentenceChoices"></div>

      <!-- Feedback -->
      <div class="feedback-box" id="p4Feedback"></div>

      <!-- Buttons -->
      <button class="btn btn-orange btn-full" id="p4CheckBtn" onclick="checkPhase4()">
        <i class="fas fa-check-circle"></i> 확인
      </button>
      <div style="margin-top:8px;">
        <button class="btn btn-orange btn-full hidden" id="p4DoneBtn" onclick="showCongrats()">
          🎉 완료!
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     CONGRATS
════════════════════════════════════════════ -->
<div class="main-content hidden" id="congratsSection">

  <div class="phase-card fade-in">
    <div class="phase-card-body">
      <div class="congrats-box">
        <div class="congrats-emoji">🎉</div>
        <div class="congrats-title">활동 완료!</div>
        <div class="congrats-sub">
          모든 단계를 마쳤습니다. 수고했어요!<br>
          목 건강에 관한 표현을 잘 익혔나요?
        </div>
        <div class="score-badge" id="scoreDisplay">2 / 2 정답</div>
        <div style="display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto;">
          <button class="btn btn-orange btn-full" onclick="restartAll()">
            <i class="fas fa-redo"></i> 다시 하기
          </button>
          <a href="index.html" class="btn btn-outline btn-full">
            <i class="fas fa-book-open"></i> 단원 홈으로
          </a>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- spacer -->
<div style="height:40px;"></div>

<script src="../shared/site-copyright.js"></script>

<script>
// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
const IMG_BASE = '../assets/c12/misc/images/split-variants-35/full/';
const LS_KEY = 'writing_cut_c12_v1';

const cuts = [
  {
    imgFile: null,
    placeholderLabel: '컴퓨터를 보며 거북목 자세를 하는 사람 [img: c12-cut01.webp]',
    alt: null,
    sentence: '거북처럼 목을 앞으로 빼고 컴퓨터를 봅니다.',
    hints: ['거북처럼', '목', '컴퓨터']
  },
  {
    imgFile: null,
    placeholderLabel: '목과 어깨가 아픈 사람 [img: c12-cut02.webp]',
    alt: null,
    sentence: '목과 어깨가 아프고 두통이 생길 수 있습니다.',
    hints: ['목', '어깨', '두통']
  },
  {
    imgFile: 'n31.webp',
    alt: '걷기 운동을 하는 사람',
    sentence: '걷기 운동을 하면 자세를 교정하는 데 도움이 됩니다.',
    hints: ['걷기 운동', '자세', '교정']
  },
  {
    imgFile: null,
    placeholderLabel: '두 손을 허리에 대고 뒤로 젖히는 사람 [img: c12-cut04.webp]',
    alt: null,
    sentence: '먼저, 두 손을 허리에 대고 몸을 뒤로 젖힙니다.',
    hints: ['먼저', '허리', '뒤로 젖히다']
  },
  {
    imgFile: null,
    placeholderLabel: '오른손을 왼쪽 귀에 대고 누르는 사람 [img: c12-cut05.webp]',
    alt: null,
    sentence: '그다음에, 오른손을 왼쪽 귀에 대고 눌러 줍니다.',
    hints: ['그다음에', '귀', '눌러 주다']
  },
  {
    imgFile: 'n13.webp',
    alt: '고개를 천천히 돌리는 사람',
    sentence: '마지막으로, 고개를 천천히 돌립니다.',
    hints: ['마지막으로', '고개', '돌리다']
  }
];

// Phase 3 choices (blank = index 5)
const BLANK_CUT_INDEX = 5;
const phase3Choices = [
  { imgFile: 'n13.webp', label: '고개 돌리기', isCorrect: true },
  { imgFile: 'n31.webp', label: '걷기 운동', isCorrect: false },
  { imgFile: 'n24.webp', label: '스트레칭', isCorrect: false },
  { imgFile: 'n25.webp', label: '운동하기', isCorrect: false }
];

// Phase 4 sentence choices
const phase4Sentences = [
  { text: '마지막으로, 고개를 천천히 돌립니다.', isCorrect: true },
  { text: '그다음에, 오른손을 왼쪽 귀에 대고 눌러 줍니다.', isCorrect: false },
  { text: '먼저, 두 손을 허리에 대고 몸을 뒤로 젖힙니다.', isCorrect: false },
  { text: '걷기 운동을 하면 자세를 교정하는 데 도움이 됩니다.', isCorrect: false }
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentCut = 0;
let hintVisible = false;
let answerRevealed = false;
let allChecked = false; // whether user has clicked check on all cuts
let p3Selected = null;
let p4Selected = null;
let p3Correct = false;
let p4Correct = false;

// Load saved sentences
function loadSaved() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function saveSentences(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

let savedSentences = loadSaved(); // { 0: "text", 1: "text", ... }

// ══════════════════════════════════════════
//  PHASE INDICATOR
// ══════════════════════════════════════════
function updatePhaseIndicator(phase) {
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.remove('active', 'done');
    if (i < phase) dot.classList.add('done');
    else if (i === phase) dot.classList.add('active');
  }
  for (let i = 1; i <= 3; i++) {
    const line = document.getElementById('line' + i);
    line.classList.toggle('done', i < phase);
  }
}

// ══════════════════════════════════════════
//  RENDER CUT IMAGE
// ══════════════════════════════════════════
function renderCutImage(cut, container) {
  container.innerHTML = '';
  if (cut.imgFile) {
    const wrap = document.createElement('div');
    wrap.className = 'cut-image-wrap';
    const img = document.createElement('img');
    img.src = IMG_BASE + cut.imgFile;
    img.alt = cut.alt || '';
    img.onerror = function() {
      // fallback to placeholder if image fails
      wrap.replaceWith(buildPlaceholder(cut.imgFile + ' (로드 오류)'));
    };
    wrap.appendChild(img);
    container.appendChild(wrap);
  } else {
    container.appendChild(buildPlaceholder(cut.placeholderLabel));
  }
}

function buildPlaceholder(desc) {
  const div = document.createElement('div');
  div.className = 'placeholder-cut';
  div.innerHTML = `
    <div class="placeholder-icon">🖼️</div>
    <div class="placeholder-label">[준비 중] 이미지를 추후 첨부해 주세요</div>
    <div class="placeholder-desc">${desc}</div>
  `;
  return div;
}

// ══════════════════════════════════════════
//  PHASE 1 LOGIC
// ══════════════════════════════════════════
let saveTimer = null;

function renderCut(index) {
  currentCut = index;
  const cut = cuts[index];

  // Progress
  document.getElementById('cutProgress').textContent = `컷 ${index + 1} / 6`;

  // Image
  const imageArea = document.getElementById('cutImageArea');
  renderCutImage(cut, imageArea);

  // Textarea
  const ta = document.getElementById('writingTextarea');
  ta.value = savedSentences[index] || '';

  // Reset hint
  hintVisible = false;
  const hintPills = document.getElementById('hintPills');
  hintPills.classList.add('hidden');
  document.getElementById('hintToggleBtn').innerHTML = '<i class="fas fa-lightbulb"></i> 힌트 보기';

  // Reset answer
  answerRevealed = false;
  document.getElementById('modelAnswerBox').classList.add('hidden');

  // Save indicator
  document.getElementById('saveIndicator').classList.remove('show');

  // Nav buttons
  document.getElementById('prevBtn').disabled = (index === 0);
  const nextBtn = document.getElementById('nextBtn');
  if (index === cuts.length - 1) {
    nextBtn.classList.add('hidden');
  } else {
    nextBtn.classList.remove('hidden');
  }

  // Result button
  checkAllWritten();
}

function checkAllWritten() {
  // Show result button if all cuts visited (has answer or checked)
  const resultWrap = document.getElementById('resultBtnWrap');
  // Show after all 6 have been visited at least once (checked or written)
  const doneAll = Object.keys(savedSentences).length >= 6 || allChecked;
  resultWrap.classList.toggle('hidden', !doneAll);
}

// Textarea input
document.getElementById('writingTextarea').addEventListener('input', function() {
  savedSentences[currentCut] = this.value;
  saveSentences(savedSentences);
  const indicator = document.getElementById('saveIndicator');
  indicator.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => indicator.classList.remove('show'), 1500);
  checkAllWritten();
});

function toggleHint() {
  hintVisible = !hintVisible;
  const pills = document.getElementById('hintPills');
  const btn = document.getElementById('hintToggleBtn');
  if (hintVisible) {
    pills.classList.remove('hidden');
    btn.innerHTML = '<i class="fas fa-lightbulb"></i> 힌트 숨기기';
    // Render pills
    const cut = cuts[currentCut];
    pills.innerHTML = cut.hints.map(h => `<span class="hint-pill">${h}</span>`).join('');
  } else {
    pills.classList.add('hidden');
    btn.innerHTML = '<i class="fas fa-lightbulb"></i> 힌트 보기';
  }
}

function checkAnswer() {
  answerRevealed = true;
  const box = document.getElementById('modelAnswerBox');
  box.classList.remove('hidden');
  document.getElementById('modelAnswerText').textContent = cuts[currentCut].sentence;
  // Mark this cut as checked
  if (!savedSentences[currentCut]) {
    savedSentences[currentCut] = '';
    saveSentences(savedSentences);
  }
  allChecked = (Object.keys(savedSentences).length >= 6);
  checkAllWritten();
}

function prevCut() {
  if (currentCut > 0) renderCut(currentCut - 1);
}

function nextCut() {
  if (currentCut < cuts.length - 1) renderCut(currentCut + 1);
}

function goToPhase2() {
  document.getElementById('phase1').classList.add('hidden');
  document.getElementById('phase2').classList.remove('hidden');
  updatePhaseIndicator(2);
  buildPhase2();
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════
//  PHASE 2 LOGIC
// ══════════════════════════════════════════
function buildPhase2() {
  const grid = document.getElementById('cutsGrid');
  grid.innerHTML = '';
  cuts.forEach((cut, i) => {
    const item = document.createElement('div');
    item.className = 'cut-grid-item';

    const numDiv = document.createElement('div');
    numDiv.className = 'cut-num';
    numDiv.textContent = `컷 ${i + 1}`;

    let mediaEl;
    if (cut.imgFile) {
      const img = document.createElement('img');
      img.src = IMG_BASE + cut.imgFile;
      img.alt = cut.alt || '';
      img.className = 'cut-thumb';
      mediaEl = img;
    } else {
      const ph = document.createElement('div');
      ph.className = 'cut-grid-item placeholder-cut-small';
      ph.innerHTML = '🖼️';
      mediaEl = ph;
    }

    const sentDiv = document.createElement('div');
    const written = savedSentences[i];
    if (written && written.trim()) {
      sentDiv.className = 'student-sentence';
      sentDiv.textContent = written.trim();
    } else {
      sentDiv.className = 'student-sentence empty';
      sentDiv.textContent = '(작성 안 함)';
    }

    item.appendChild(numDiv);
    item.appendChild(mediaEl);
    item.appendChild(sentDiv);
    grid.appendChild(item);
  });
}

// ══════════════════════════════════════════
//  PHASE 3 LOGIC
// ══════════════════════════════════════════
function goToPhase3() {
  document.getElementById('phase2').classList.add('hidden');
  document.getElementById('phase3').classList.remove('hidden');
  updatePhaseIndicator(3);
  buildPhase3();
  window.scrollTo(0, 0);
}

function buildPhase3() {
  // Thumbnail row
  const thumbRow = document.getElementById('thumbRow');
  thumbRow.innerHTML = '';
  cuts.forEach((cut, i) => {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (i === BLANK_CUT_INDEX ? ' blank-slot' : '');

    const idxBadge = document.createElement('div');
    idxBadge.className = 'thumb-index';
    idxBadge.textContent = i + 1;

    if (i === BLANK_CUT_INDEX) {
      const q = document.createElement('div');
      q.className = 'blank-q';
      q.textContent = '?';
      item.appendChild(q);
    } else if (cut.imgFile) {
      const img = document.createElement('img');
      img.src = IMG_BASE + cut.imgFile;
      img.alt = cut.alt || '';
      item.appendChild(img);
      item.appendChild(idxBadge);
    } else {
      const ph = document.createElement('div');
      ph.className = 'thumb-placeholder';
      ph.innerHTML = '🖼️';
      item.appendChild(ph);
      item.appendChild(idxBadge);
    }

    thumbRow.appendChild(item);
  });

  // Shuffle choices
  const shuffled = [...phase3Choices].sort(() => Math.random() - 0.5);

  const grid = document.getElementById('imageChoicesGrid');
  grid.innerHTML = '';
  shuffled.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'image-choice-btn';
    btn.dataset.idx = i;
    btn.dataset.correct = choice.isCorrect ? 'true' : 'false';
    btn.onclick = () => selectImageChoice(btn);

    const img = document.createElement('img');
    img.src = IMG_BASE + choice.imgFile;
    img.alt = choice.label;

    const label = document.createElement('div');
    label.className = 'image-choice-label';
    label.textContent = choice.label;

    const badge = document.createElement('div');
    badge.className = 'choice-badge';

    btn.appendChild(img);
    btn.appendChild(label);
    btn.appendChild(badge);
    grid.appendChild(btn);
  });

  p3Selected = null;
  p3Correct = false;
  document.getElementById('p3Feedback').className = 'feedback-box';
  document.getElementById('p3Feedback').innerHTML = '';
  document.getElementById('p3CheckBtn').classList.remove('hidden');
  document.getElementById('p3NextBtn').classList.add('hidden');
}

function selectImageChoice(btn) {
  // Deselect all
  document.querySelectorAll('#imageChoicesGrid .image-choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  p3Selected = btn;
}

function checkPhase3() {
  if (!p3Selected) {
    alert('그림을 선택해 주세요.');
    return;
  }
  const isCorrect = p3Selected.dataset.correct === 'true';
  p3Correct = isCorrect;

  document.querySelectorAll('#imageChoicesGrid .image-choice-btn').forEach(btn => {
    const badge = btn.querySelector('.choice-badge');
    if (btn.dataset.correct === 'true') {
      btn.classList.add('correct');
      badge.classList.add('show', 'correct');
      badge.innerHTML = '<i class="fas fa-check"></i>';
    } else if (btn === p3Selected && !isCorrect) {
      btn.classList.add('wrong');
      badge.classList.add('show', 'wrong');
      badge.innerHTML = '<i class="fas fa-times"></i>';
    }
  });

  const feedback = document.getElementById('p3Feedback');
  feedback.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'wrong');
  feedback.innerHTML = isCorrect
    ? '<i class="fas fa-check-circle"></i> 정답이에요! 잘했어요! 👏'
    : '<i class="fas fa-times-circle"></i> 다시 생각해 보세요. 정답을 확인했어요!';

  document.getElementById('p3CheckBtn').classList.add('hidden');
  document.getElementById('p3NextBtn').classList.remove('hidden');
}

// ══════════════════════════════════════════
//  PHASE 4 LOGIC
// ══════════════════════════════════════════
function goToPhase4() {
  document.getElementById('phase3').classList.add('hidden');
  document.getElementById('phase4').classList.remove('hidden');
  updatePhaseIndicator(4);
  buildPhase4();
  window.scrollTo(0, 0);
}

function buildPhase4() {
  const shuffled = [...phase4Sentences].sort(() => Math.random() - 0.5);
  const container = document.getElementById('sentenceChoices');
  container.innerHTML = '';
  shuffled.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sentence-choice-btn';
    btn.dataset.correct = s.isCorrect ? 'true' : 'false';
    btn.textContent = s.text;
    btn.onclick = () => selectSentenceChoice(btn);
    container.appendChild(btn);
  });

  p4Selected = null;
  p4Correct = false;
  document.getElementById('p4Feedback').className = 'feedback-box';
  document.getElementById('p4Feedback').innerHTML = '';
  document.getElementById('p4CheckBtn').classList.remove('hidden');
  document.getElementById('p4DoneBtn').classList.add('hidden');
}

function selectSentenceChoice(btn) {
  document.querySelectorAll('#sentenceChoices .sentence-choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  p4Selected = btn;
}

function checkPhase4() {
  if (!p4Selected) {
    alert('문장을 선택해 주세요.');
    return;
  }
  const isCorrect = p4Selected.dataset.correct === 'true';
  p4Correct = isCorrect;

  document.querySelectorAll('#sentenceChoices .sentence-choice-btn').forEach(btn => {
    if (btn.dataset.correct === 'true') {
      btn.classList.remove('selected');
      btn.classList.add('correct');
    } else if (btn === p4Selected && !isCorrect) {
      btn.classList.remove('selected');
      btn.classList.add('wrong');
    }
    btn.disabled = true;
  });

  const feedback = document.getElementById('p4Feedback');
  feedback.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'wrong');
  feedback.innerHTML = isCorrect
    ? '<i class="fas fa-check-circle"></i> 정답이에요! 아주 잘했어요! 🎉'
    : '<i class="fas fa-times-circle"></i> 틀렸어요. 정답을 확인해 보세요!';

  document.getElementById('p4CheckBtn').classList.add('hidden');
  document.getElementById('p4DoneBtn').classList.remove('hidden');
}

// ══════════════════════════════════════════
//  CONGRATS
// ══════════════════════════════════════════
function showCongrats() {
  document.getElementById('phase4').classList.add('hidden');
  document.getElementById('congratsSection').classList.remove('hidden');
  updatePhaseIndicator(5); // all done

  // Score: phase 3 + phase 4
  const score = (p3Correct ? 1 : 0) + (p4Correct ? 1 : 0);
  document.getElementById('scoreDisplay').textContent = `${score} / 2 정답`;
  window.scrollTo(0, 0);
}

function restartAll() {
  savedSentences = {};
  saveSentences(savedSentences);
  allChecked = false;
  p3Selected = null;
  p4Selected = null;
  p3Correct = false;
  p4Correct = false;

  // Hide all phases, show phase 1
  document.getElementById('congratsSection').classList.add('hidden');
  document.getElementById('phase4').classList.add('hidden');
  document.getElementById('phase3').classList.add('hidden');
  document.getElementById('phase2').classList.add('hidden');
  document.getElementById('phase1').classList.remove('hidden');

  updatePhaseIndicator(1);
  renderCut(0);
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
updatePhaseIndicator(1);
renderCut(0);
</script>
