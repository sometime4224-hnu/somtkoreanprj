        function grammarGuideState(stepKey) {

                    icon:'fa-microphone',
                    primary:'mic',
                    ko:'지금은 문장을 끝까지 또렷하게 말하세요.',

                    primary:'next',
                    ko: state.speakingIndex === 0

        function currentCycle() { return CYCLES[state.cycleIndex]; }
        function currentStepKey() { return ['grammar1', 'grammar2', 'speaking'][state.stepIndex]; }

        function completedStageCount() {
            let count = 0;
            state.results.forEach((cycle) => {
                if (cycle.grammar1.checked) count += 1;
                if (cycle.grammar2.checked) count += 1;
                if (cycle.speaking.every((item) => item.completed || item.attempts > 0)) count += 1;
            });
            return count;
        }

        function renderApp() {

                renderSummary();

            if (currentStepKey() === 'speaking') renderSpeakingStep();
            else renderGrammarStep(currentStepKey());
        }

        function renderTopStatus() {
            const total = CYCLES.length * 3;
            const done = completedStageCount();
            const pct = Math.round(done / total * 100);
            refs.cycleTitle.textContent = currentCycle().title;
            refs.cycleNote.textContent = currentCycle().note;
            refs.overallProgress.style.width = `${pct}%`;
            refs.overallProgressText.textContent = `전체 ${total}단계 중 ${done}단계 완료 · 진행률 ${pct}%`;

            const cycleResult = state.results[state.cycleIndex];
            const stepMeta = [
                { key:'grammar1', text:'1단계 · 문법 1', done:cycleResult.grammar1.checked },
                { key:'grammar2', text:'2단계 · 문법 2', done:cycleResult.grammar2.checked },
                { key:'speaking', text:'3단계 · 말하기', done:cycleResult.speaking.every((item) => item.completed || item.attempts > 0) }
            ];
            refs.stepTabs.innerHTML = stepMeta.map((item, idx) => {
                const classes = idx === state.stepIndex

                    : 'tab-btn rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-black text-slate-500';
                const badge = idx === state.stepIndex

                return `<div class="${classes}"><div class="flex items-center justify-between gap-2"><span>${item.text}</span>${badge}</div></div>`;
            }).join('');
        }

        function renderGrammarStep(stepKey) {

                            </span>

        function bindGrammarStep(stepKey) {
            const result = state.results[state.cycleIndex][stepKey];

            });
            document.getElementById('checkDraftBtn').addEventListener('click', () => {
                const evalResult = evaluateGrammar(stepKey, result.draft, step);
                result.writingActive = false; result.checked = true; result.exact = evalResult.exact; result.accepted = evalResult.accepted; result.grammarOk = evalResult.grammarOk; result.usedModel = false; result.status = evalResult.status;
                renderGrammarStep(stepKey);

                accepted: { cls:'border-emerald-200 bg-emerald-50', title:'좋아요! 그림과 문법에 맞는 정답이에요.', body:'부사나 세부 표현이 조금 달라도 그림과 문법이 맞으면 정답으로 인정합니다. 말하기 단계는 아래 목표 문장으로 통일해서 연습합니다.', viTitle:VI_TEXT.feedback.accepted.title, viBody:VI_TEXT.feedback.accepted.body },
                guided: { cls:'border-amber-200 bg-amber-50', title:'문법 틀은 잘 잡았어요.', body:'의미는 비슷하지만 이번 활동에서는 아래 목표 문장으로 통일해서 말하기 연습을 진행합니다.', viTitle:VI_TEXT.feedback.guided.title, viBody:VI_TEXT.feedback.guided.body },
                model: { cls:'border-orange-200 bg-orange-50', title:'모범 문장을 불러왔어요.', body:'이 문장을 기준으로 다음 단계 말하기 연습을 진행합니다. 나중에 이미지를 교체해도 그대로 활용할 수 있는 목표 문장입니다.', viTitle:VI_TEXT.feedback.model.title, viBody:VI_TEXT.feedback.model.body },
                support: { cls:'border-orange-200 bg-orange-50', title:'핵심 표현을 한 번 더 확인해 볼까요?', body:'문장 의미는 맞는 방향이지만, 이번 활동에서는 목표 문장을 기준으로 다음 단계를 이어 갑니다.', viTitle:VI_TEXT.feedback.support.title, viBody:VI_TEXT.feedback.support.body },
                error: { cls:'border-rose-200 bg-rose-50', title:'문장 틀을 다시 확인해 보세요.', body:'이번 단계의 목표 문장을 먼저 확인한 뒤, 같은 문장으로 말하기 연습을 해 보면 더 안정적으로 연결됩니다.', viTitle:VI_TEXT.feedback.error.title, viBody:VI_TEXT.feedback.error.body }
            };
            const feedback = map[result.status] || map.error;
            return `
                <div class="mt-4 rounded-3xl border p-4 ${feedback.cls}">

        }

        function evaluateGrammar(stepKey, draft, step) {
            const text = draft.trim();
            if (!text) return { status:'error', exact:false, accepted:false, grammarOk:false };
            const normalized = normalizeSentence(text);
            const exact = normalized === normalizeSentence(step.target);
            const grammarOk = matchesGrammarPattern(stepKey, text);
            const semanticText = buildSemanticMatchText(text);
            const requiredGroups = step.validation?.requiredGroups || [];
            const groupMatches = requiredGroups.map((group) => group.some((keyword) => semanticText.includes(keyword)));
            const groupHitCount = groupMatches.filter(Boolean).length;
            const pivot = Math.ceil(requiredGroups.length / 2);
            const frontHitCount = groupMatches.slice(0, pivot).filter(Boolean).length;
            const backHitCount = groupMatches.slice(pivot).filter(Boolean).length;
            const balancedMeaning = requiredGroups.length <= 2
                ? groupHitCount >= 1
                : frontHitCount > 0 && backHitCount > 0;
            const accepted = grammarOk && requiredGroups.length > 0 && (
                groupHitCount === requiredGroups.length ||
                (requiredGroups.length >= 4 && balancedMeaning && groupHitCount >= requiredGroups.length - 1)
            );

            if (exact) return { status:'exact', exact:true, accepted:true, grammarOk:true };
            if (accepted) return { status:'accepted', exact:false, accepted:true, grammarOk:true };
            if (grammarOk && balancedMeaning && groupHitCount >= Math.max(2, requiredGroups.length - 2)) return { status:'guided', exact:false, accepted:false, grammarOk:true };
            if (grammarOk) return { status:'support', exact:false, accepted:false, grammarOk:true };
            return { status:'error', exact:false, accepted:false, grammarOk:false };
        }

        function matchesGrammarPattern(stepKey, text) {
            return stepKey === 'grammar1'
                ? /(았더니|었더니|했더니|더니|고\s*나니)/.test(text)
                : /얼마나/.test(text) && /(ㄴ지|는지|은지)\s*(몰라요|몰라|모르겠어요|모르겠다|모르겠어)/.test(text);
        }

        function buildSemanticMatchText(text) {
            const normalized = normalizeSentence(text);
            let enriched = normalized;
            const aliasGroups = [
                { canonical:'펴', patterns:[/펴/, /펼/, /폈/, /펴고/, /펴서/] },
                { canonical:'자세', patterns:[/자세/, /허리/, /등/, /반듯/, /곧아/, /바르/] },
                { canonical:'좋아졌', patterns:[/좋아졌/, /좋아진/, /건강해졌/, /튼튼해졌/, /나아졌/, /개선됐/] },
                { canonical:'몸', patterns:[/몸/, /건강/, /컨디션/] },
                { canonical:'가벼', patterns:[/가벼/, /개운/, /편안/, /편해/, /산뜻/] },
                { canonical:'돌리', patterns:[/돌리/, /돌렸/, /돌리고/, /스트레칭/] },
                { canonical:'기분', patterns:[/기분/, /느낌/, /컨디션/, /몸이/] },
                { canonical:'상쾌', patterns:[/상쾌/, /개운/, /시원/, /후련/] },
                { canonical:'꾸준히', patterns:[/꾸준/, /계속/, /열심히/, /매일/, /규칙적/] },
                { canonical:'운동', patterns:[/운동/, /조깅/, /요가/, /헬스/, /스트레칭/] },
                { canonical:'뻗', patterns:[/뻗/, /쭉/, /펴/] },
                { canonical:'땀', patterns:[/땀/, /땀이/] },
                { canonical:'났', patterns:[/났/, /나는/, /나요/, /흘렀/, /줄줄/] },
                { canonical:'발뒤꿈치', patterns:[/발뒤꿈치/, /까치발/, /발끝/] },
                { canonical:'들었', patterns:[/들었/, /들고/, /들면/, /올렸/, /세웠/] },
                { canonical:'힘', patterns:[/힘/, /근력/, /다리/] },
                { canonical:'세졌', patterns:[/세졌/, /강해졌/, /튼튼해졌/] }
            ];

            aliasGroups.forEach(({ canonical, patterns }) => {
                if (patterns.some((pattern) => pattern.test(normalized))) enriched += canonical;
            });
            return enriched;
        }

        function nextStage() {
            if (state.isRecording) finishRecording();
            if (state.stepIndex < 2) {
                state.stepIndex += 1;
                if (state.stepIndex === 2) state.speakingIndex = 0;
            } else {

                state.stepIndex = 0;
                state.speakingIndex = 0;
            }
            renderApp();

        function renderSpeakingStep() {

            const speechState = cycleResult.speaking[state.speakingIndex];

            refs.workspace.innerHTML = `

                        ${renderVi(VI_TEXT.speakingTitle)}
                        <p class="mt-2 text-sm leading-7 text-slate-600">모범 발음을 듣고, 천천히 듣고, 직접 말한 뒤 즉시 피드백을 확인할 수 있습니다.</p>

                    <span class="inline-flex items-center gap-2 rounded-full bg-blue-100 px-4 py-2 text-sm font-black text-blue-700"><i class="fa-solid fa-microphone"></i>사이클 말하기</span>
                </div>

                <div class="mt-4" id="actionGuideSlot">${renderActionGuide(speakingGuideState(speechState))}</div>

                <div class="mt-5 grid gap-4 lg:grid-cols-[300px_1fr]">
                    <div class="grid gap-3">
                        ${speechItems.map((item, idx) => {
                            const itemState = cycleResult.speaking[idx];
                            const active = idx === state.speakingIndex;
                            const done = itemState.attempts > 0;
                            return `
                                <button type="button" class="tab-btn rounded-3xl border px-4 py-4 text-left ${active ? 'border-blue-300 bg-blue-50' : done ? 'border-emerald-300 bg-emerald-50' : 'border-slate-200 bg-white'}" data-speech-index="${idx}">
                                    <small class="text-xs font-black uppercase tracking-[0.12em] ${active ? 'text-blue-700' : done ? 'text-emerald-700' : 'text-slate-500'}">${escapeHtml(item.label)}</small>

                                        <span>${itemState.bestScore === null ? '점수 없음' : `최고 ${itemState.bestScore}점`}</span>
                                    </div>
                                </button>
                            `;
                        }).join('')}
                    </div>

                    <div class="rounded-[24px] border border-slate-200 bg-white/90 p-4">
                        <div class="rounded-3xl border border-blue-200 bg-gradient-to-b from-white to-blue-50 p-5">
                            <p class="text-sm font-bold text-slate-500">${escapeHtml(currentItem.fullLabel)}</p>
                            <h3 class="mt-3 text-2xl font-black leading-10 text-slate-900">${escapeHtml(currentItem.sentence)}</h3>
                            <div class="mt-4 flex flex-wrap gap-2">
                                ${currentItem.focus.map((word) => `<span class="rounded-full border border-blue-200 bg-white px-3 py-2 text-sm font-black text-blue-700"><i class="fa-solid fa-tag mr-1 text-[11px]"></i>${escapeHtml(word)}</span>`).join('')}
                            </div>
                        </div>

                        ${speechWarning()}

                        <div class="mt-4 grid gap-2 sm:grid-cols-4">
                            <button type="button" class="nav-btn rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-black text-slate-700" id="listenBtn"><i class="fa-solid fa-volume-high mr-1"></i>${renderButtonLabel('모범 듣기', 'Nghe mẫu', 'text-slate-500')}</button>
                            <button type="button" class="nav-btn rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-black text-slate-700" id="slowBtn"><i class="fa-solid fa-gauge-low mr-1"></i>${renderButtonLabel('천천히', 'Nghe chậm', 'text-slate-500')}</button>
                            <button type="button" class="nav-btn rounded-2xl border border-orange-500 bg-orange-500 px-4 py-3 text-sm font-black text-white ${state.isRecording ? 'is-recording' : ''}" id="micBtn" ${hasRecognition ? '' : 'disabled'}>
                                <i class="fa-solid ${state.isRecording ? 'fa-stop' : 'fa-microphone'} mr-1"></i>${state.isRecording ? renderButtonLabel('말하기 종료', 'Dừng nói', 'text-orange-100') : renderButtonLabel('말하기 시작', 'Bắt đầu nói', 'text-orange-100')}
                            </button>
                            <button type="button" class="nav-btn rounded-2xl border border-blue-700 bg-blue-700 px-4 py-3 text-sm font-black text-white ${allowNext ? '' : 'opacity-40'}" id="nextSpeechBtn" ${allowNext ? '' : 'disabled'}>
                                ${state.speakingIndex === 0
                                    ? renderButtonLabel('다음 문장', 'Câu tiếp theo', 'text-blue-100')
                                    : (state.cycleIndex === CYCLES.length - 1
                                        ? renderButtonLabel('종합 피드백 보기', 'Xem phản hồi tổng hợp', 'text-blue-100')
                                        : renderButtonLabel('다음 사이클', 'Chu kỳ tiếp theo', 'text-blue-100'))}
                            </button>
                        </div>

                        <div class="mt-4 rounded-2xl border ${state.isRecording ? 'border-rose-200 bg-rose-50' : 'border-slate-200 bg-slate-50'} px-4 py-3">
                            <div class="text-sm font-semibold leading-7 text-slate-600">${speechStatus(speechState)}</div>
                            <div class="mt-2 text-base font-bold text-slate-900">${escapeHtml(state.transcript || (state.isRecording ? '인식 중...' : ''))}</div>
                        </div>

                        ${speechState.lastScore === null ? '' : speechResultBox(speechState)}
                    </div>
                </div>
            `;
            bindSpeakingStep();
            applySpeakingGuideUI(speechState);
        }

        function speechWarning() {
            if (!hasRecognition) {
                return `<div class="mt-4 rounded-2xl border border-orange-200 bg-orange-50 px-4 py-3 text-sm leading-7 text-orange-800"><div><i class="fa-solid fa-triangle-exclamation mr-2"></i>이 브라우저에서는 음성 인식을 사용할 수 없습니다. 모범 발음을 들은 뒤 오른쪽 버튼으로 수동 진행할 수 있습니다.</div>${renderVi(VI_TEXT.speechNoRecognition)}</div>`;
            }
            if (!isSecureContextOrLocalhost()) {
                return `<div class="mt-4 rounded-2xl border border-orange-200 bg-orange-50 px-4 py-3 text-sm leading-7 text-orange-800"><div><i class="fa-solid fa-lock mr-2"></i>마이크 사용은 보통 HTTPS 또는 localhost 환경에서 가장 안정적으로 동작합니다.</div>${renderVi(VI_TEXT.speechSecure)}</div>`;
            }
            return '';
        }

        function speechStatus(speechState) {
            if (state.isRecording) return `<p>지금 문장을 또렷하게 말해 보세요. 끝까지 말하면 자동으로 분석합니다.</p>${renderVi(VI_TEXT.statusRecording)}`;
            if (speechState.attempts === 0) return `<p>모범 발음을 한 번 듣고, 마이크 버튼을 눌러 문장을 말해 보세요.</p>${renderVi(VI_TEXT.statusReady)}`;
            return `<p>최근 시도 ${speechState.lastScore}점 · 최고 ${speechState.bestScore}점입니다. 더 연습하고 싶으면 다시 말해 보세요.</p>${renderVi(VI_TEXT.statusRetry(speechState.lastScore, speechState.bestScore))}`;
        }

        function speechResultBox(speechState) {
            return `
                <div class="mt-4 rounded-3xl border border-slate-200 bg-white p-4">
                    <strong class="block text-base font-black text-slate-900">즉시 피드백</strong>
                    <div class="mt-4 grid gap-3 sm:grid-cols-2">
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4"><span class="block text-xs font-bold text-slate-500">정확도</span><strong class="mt-2 block text-3xl font-black text-emerald-600">${speechState.accuracy}%</strong></div>
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4"><span class="block text-xs font-bold text-slate-500">완성도</span><strong class="mt-2 block text-3xl font-black text-blue-600">${speechState.completeness}%</strong></div>
                    </div>
                    <div class="mt-4 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold leading-8 text-slate-900">인식한 문장: ${speechState.spoken ? escapeHtml(speechState.spoken) : '-'}</div>
                    <div class="mt-4 flex flex-wrap gap-2">${buildSyllableBlocks(normalizeSentence(currentSpeakingSentence()), normalizeSentence(speechState.spoken || ''))}</div>
                </div>
            `;
        }

        function bindSpeakingStep() {
            const speechState = state.results[state.cycleIndex].speaking[state.speakingIndex];
            document.querySelectorAll('[data-speech-index]').forEach((button) => {
                button.addEventListener('click', () => {
                    if (state.isRecording) finishRecording();
                    state.speakingIndex = Number(button.dataset.speechIndex);
                    state.transcript = '';
                    renderSpeakingStep();
                });
            });
            document.getElementById('listenBtn').addEventListener('click', () => {
                speechState.listened = true;
                speakText(currentSpeakingSentence(), 0.9);
                renderSpeakingStep();
            });
            document.getElementById('slowBtn').addEventListener('click', () => {
                speechState.listened = true;
                speechState.slowListened = true;
                speakText(currentSpeakingSentence(), 0.68);
                renderSpeakingStep();
            });
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.addEventListener('click', toggleRecording);
            document.getElementById('nextSpeechBtn').addEventListener('click', () => {
                if (state.isRecording) finishRecording();
                if (state.speakingIndex === 0) {
                    state.speakingIndex = 1;
                    state.transcript = '';
                    renderSpeakingStep();
                    return;
                }
                state.results[state.cycleIndex].speaking.forEach((item) => { if (!item.completed) item.completed = item.attempts > 0 || !hasRecognition; });
                nextStage();
            });
        }

        function currentSpeakingSentence() {
            const cycle = currentCycle();
            return state.speakingIndex === 0 ? cycle.grammar1.target : cycle.grammar2.target;
        }

        function toggleRecording() {
            if (!hasRecognition) return;
            if (state.isRecording) {
                finishRecording();
                renderSpeakingStep();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            const RecognitionClass = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!RecognitionClass) return;
            const targetSentence = currentSpeakingSentence();
            let finalReceived = false;
            let restartCount = 0;
            const maxRestarts = 5;
            state.transcript = '';
            state.isRecording = true;
            renderSpeakingStep();

            const begin = () => {
                state.recognition = new RecognitionClass();
                state.recognition.lang = 'ko-KR';
                state.recognition.interimResults = true;
                state.recognition.maxAlternatives = 3;
                state.recognition.onresult = (event) => {
                    let interim = '', spokenFinal = '';
                    for (let i = event.resultIndex; i < event.results.length; i += 1) {
                        if (event.results[i].isFinal) {
                            const targetNorm = normalizeSentence(targetSentence);
                            let bestAlt = event.results[i][0].transcript;
                            let bestScore = jamoAnalyze(normalizeSentence(bestAlt), targetNorm).score;
                            for (let a = 1; a < event.results[i].length; a += 1) {
                                const altText = event.results[i][a].transcript;
                                const altScore = jamoAnalyze(normalizeSentence(altText), targetNorm).score;
                                if (altScore > bestScore) { bestAlt = altText; bestScore = altScore; }
                            }
                            spokenFinal += `${bestAlt} `;
                        } else interim += event.results[i][0].transcript;
                    }
                    state.transcript = (spokenFinal || interim).trim();
                    if (spokenFinal.trim()) {
                        finalReceived = true;
                        finishRecording();
                        analyzeSpeech(spokenFinal.trim());
                    }
                };
                state.recognition.onerror = (event) => {
                    if (event.error === 'no-speech' && state.isRecording && restartCount < maxRestarts) {
                        restartCount += 1;
                        setTimeout(() => { if (state.isRecording) begin(); }, 220);
                        return;
                    }
                    finishRecording();
                    state.transcript = event.error === 'not-allowed' ? '마이크 권한이 필요합니다.' : '음성이 감지되지 않았습니다. 다시 시도해 보세요.';
                    renderSpeakingStep();
                };
                state.recognition.onend = () => {
                    if (!state.isRecording) return;
                    if (!finalReceived && restartCount < maxRestarts) {
                        restartCount += 1;
                        setTimeout(() => { if (state.isRecording) begin(); }, 220);
                    } else {
                        finishRecording();
                        renderSpeakingStep();
                    }
                };
                try { state.recognition.start(); } catch (error) { finishRecording(); renderSpeakingStep(); }
            };
            begin();
        }

        function finishRecording() {
            state.isRecording = false;
            if (state.recognition) { try { state.recognition.stop(); } catch (error) {} }
        }

        function analyzeSpeech(spoken) {
            const target = normalizeSentence(currentSpeakingSentence());
            const spokenNorm = normalizeSentence(spoken);
            const { accuracy, completeness, score } = jamoAnalyze(spokenNorm, target);
            const speechState = state.results[state.cycleIndex].speaking[state.speakingIndex];
            speechState.attempts += 1;
            speechState.lastScore = score;
            speechState.accuracy = accuracy;
            speechState.completeness = completeness;
            speechState.spoken = spoken;
            speechState.completed = true;
            if (speechState.bestScore === null || score > speechState.bestScore) speechState.bestScore = score;
            state.logs.push({ cycleTitle:currentCycle().title, shortLabel:state.speakingIndex===0?'문법 1 문장':'문법 2 문장', sentence:currentSpeakingSentence(), spoken, accuracy, completeness, score });
            state.transcript = '';
            renderSpeakingStep();
        }

        function renderSummary() {
            const grammarFlat = [];
            const bestScores = [];
            state.results.forEach((cycle) => {
                grammarFlat.push(cycle.grammar1, cycle.grammar2);
                cycle.speaking.forEach((item) => { if (item.bestScore !== null) bestScores.push(item.bestScore); });
            });
            const acceptedCount = grammarFlat.filter((item) => item.accepted || item.exact).length;
            const exactCount = grammarFlat.filter((item) => item.exact).length;
            const grammarOkCount = grammarFlat.filter((item) => item.grammarOk).length;
            const modelCount = grammarFlat.filter((item) => item.usedModel).length;
            const totalAttempts = state.logs.length;
            const avgBest = bestScores.length ? Math.round(bestScores.reduce((a, b) => a + b, 0) / bestScores.length) : 0;
            const strongLogs = [...state.logs].sort((a,b) => b.score - a.score).slice(0, 2);
            const weakLogs = [...state.logs].sort((a,b) => a.score - b.score).slice(0, 3);

            refs.cycleTitle.textContent = '종합 피드백';
            refs.cycleNote.textContent = '5사이클을 모두 마쳤습니다. 문법 사용과 말하기 결과를 함께 확인해 보세요.';
            refs.overallProgress.style.width = '100%';
            refs.overallProgressText.textContent = `전체 ${CYCLES.length * 3}단계를 모두 완료했습니다.`;
            refs.stepTabs.innerHTML = '<div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">문법 1 완료</div><div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">문법 2 완료</div><div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">말하기 완료</div>';

            refs.workspace.innerHTML = `
                <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                    <div>
                        <p class="text-xs font-black uppercase tracking-[0.14em] text-orange-700">Final Feedback</p>
                        <h2 class="mt-2 text-2xl font-black text-slate-900">문법과 말하기 결과를 한 번에 정리했습니다.</h2>
                        <p class="mt-2 text-sm leading-7 text-slate-600">그림과 문법에 맞아 정답으로 인정된 문장 수, 목표 문장 정확 일치 수, 말하기 최고 점수를 함께 확인할 수 있습니다.</p>
                    </div>
                    <button type="button" class="nav-btn rounded-2xl border border-blue-700 bg-blue-700 px-4 py-3 text-sm font-black text-white" id="restartBtn"><i class="fa-solid fa-rotate-right mr-1"></i>처음부터 다시</button>
                </div>

                <div class="mt-5 grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
                    <div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">정답 인정</span><strong class="mt-2 block text-3xl font-black text-emerald-600">${acceptedCount}/10</strong></div>
                    <div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">목표 문장 정확 일치</span><strong class="mt-2 block text-3xl font-black text-blue-600">${exactCount}/10</strong></div>
                    <div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">말하기 총 시도</span><strong class="mt-2 block text-3xl font-black text-orange-600">${totalAttempts}</strong></div>
                    <div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">말하기 평균 최고 점수</span><strong class="mt-2 block text-3xl font-black text-violet-600">${avgBest}점</strong></div>
                </div>

                <div class="mt-4 grid gap-4 lg:grid-cols-2">
                    <div class="rounded-3xl border border-slate-200 bg-white p-4">
                        <strong class="block text-base font-black text-slate-900">종합 코멘트</strong>
                        <ul class="mt-3 list-disc space-y-2 pl-5 text-sm leading-7 text-slate-700">
                            <li>${grammarComment(acceptedCount, exactCount, grammarOkCount, modelCount)}</li>
                            <li>${speakingComment(avgBest)}</li>
                            <li>${modelCount > 0 ? `모범 문장을 ${modelCount}번 불러와 다음 단계로 연결했습니다.` : '모든 단계에서 직접 문장을 검토하며 활동을 진행했습니다.'}</li>
                        </ul>
                    </div>
                    <div class="rounded-3xl border border-slate-200 bg-white p-4">
                        <strong class="block text-base font-black text-slate-900">다시 연습하면 좋은 문장</strong>
                        <ul class="mt-3 list-disc space-y-2 pl-5 text-sm leading-7 text-slate-700">
                            ${weakLogs.length ? weakLogs.map((item) => `<li>${escapeHtml(item.shortLabel)} · ${escapeHtml(item.sentence)} (${item.score}점)</li>`).join('') : '<li>말하기 기록이 아직 없습니다.</li>'}
                        </ul>
                    </div>
                </div>

                <div class="mt-4 grid gap-4 lg:grid-cols-2">
                    <div class="rounded-3xl border border-slate-200 bg-white p-4">
                        <strong class="block text-base font-black text-slate-900">가장 안정적으로 말한 문장</strong>
                        <ul class="mt-3 list-disc space-y-2 pl-5 text-sm leading-7 text-slate-700">
                            ${strongLogs.length ? strongLogs.map((item) => `<li>${escapeHtml(item.shortLabel)} · ${escapeHtml(item.sentence)} (${item.score}점)</li>`).join('') : '<li>말하기 기록이 아직 없습니다.</li>'}
                        </ul>
                    </div>
                    <div class="rounded-3xl border border-slate-200 bg-white p-4">
                        <strong class="block text-base font-black text-slate-900">권장 복습 순서</strong>
                        <ul class="mt-3 list-disc space-y-2 pl-5 text-sm leading-7 text-slate-700">
                            <li>문법 1은 행동 뒤 결과가 나오는 흐름을 다시 확인하세요.</li>
                            <li>문법 2는 얼마나, -지 몰라요를 꼭 함께 넣어 강조를 분명히 하세요.</li>
                            <li>말하기는 최고 점수가 80점 미만인 문장부터 천천히 다시 들어 보세요.</li>
                        </ul>
                    </div>
                </div>

                <div class="mt-4 grid gap-4 lg:grid-cols-2">
                    ${CYCLES.map((cycle, idx) => cycleSummary(cycle, state.results[idx])).join('')}
                </div>
            `;
            document.getElementById('restartBtn').addEventListener('click', restartActivity);
        }

        function grammarComment(acceptedCount, exactCount, grammarOkCount, modelCount) {
            if (acceptedCount >= 9) return '그림과 문법에 맞는 답을 매우 안정적으로 만들었습니다. 세부 표현이 달라도 핵심 의미를 잘 잡고 있습니다.';
            if (exactCount >= 8) return '목표 문장까지 매우 안정적으로 맞췄습니다. 문장 구성 감각이 잘 잡혀 있습니다.';
            if (grammarOkCount >= 8) return '핵심 문법 틀은 대체로 잘 사용했습니다. 이제는 어휘 선택과 순서를 조금 더 다듬으면 더 좋아집니다.';
            if (modelCount >= 3) return '모범 문장을 여러 번 참고하며 흐름을 익혔습니다. 다음에는 같은 틀로 직접 다시 써 보면 더 좋습니다.';
            return '문법 형태는 조금 더 반복이 필요합니다. 특히 문법 1은 결과 연결, 문법 2는 강조 표현을 다시 확인해 보세요.';
        }

        function speakingComment(avgBest) {
            if (avgBest >= 85) return '말하기 수행이 안정적입니다. 주요 목표 문장을 또렷하게 발화했습니다.';
            if (avgBest >= 70) return '핵심 표현은 전달되었고, 몇 문장만 더 또렷하게 연습하면 안정감이 높아집니다.';
            return '먼저 천천히 듣기 버튼으로 문장 리듬을 익힌 뒤 다시 시도하는 것이 좋습니다.';
        }

        function cycleSummary(cycle, result) {
            return `
                <div class="rounded-3xl border border-slate-200 bg-white p-4">
                    <h3 class="text-lg font-black text-slate-900">${escapeHtml(cycle.title)}</h3>
                    <div class="mt-3 space-y-3">
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-3"><strong class="block text-sm font-black text-slate-800">문법 1</strong><p class="mt-1 text-sm leading-7 text-slate-700">${escapeHtml(cycle.grammar1.target)}</p><small class="mt-1 block text-xs font-bold text-slate-500">작성 상태: ${grammarStateText(result.grammar1)}</small></div>
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-3"><strong class="block text-sm font-black text-slate-800">문법 2</strong><p class="mt-1 text-sm leading-7 text-slate-700">${escapeHtml(cycle.grammar2.target)}</p><small class="mt-1 block text-xs font-bold text-slate-500">작성 상태: ${grammarStateText(result.grammar2)}</small></div>
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-3"><strong class="block text-sm font-black text-slate-800">말하기</strong><p class="mt-1 text-sm leading-7 text-slate-700">문법 1 문장 최고 ${result.speaking[0].bestScore === null ? '기록 없음' : `${result.speaking[0].bestScore}점`} · 문법 2 문장 최고 ${result.speaking[1].bestScore === null ? '기록 없음' : `${result.speaking[1].bestScore}점`}</p><small class="mt-1 block text-xs font-bold text-slate-500">시도 횟수: ${result.speaking[0].attempts + result.speaking[1].attempts}회</small></div>
                    </div>
                </div>
            `;
        }

        function grammarStateText(item) {
            if (item.exact) return '목표 문장 정확 일치';
            if (item.accepted) return '정답 인정';
            if (item.usedModel) return '모범 문장 사용';
            if (item.grammarOk) return '문법 틀 사용 성공';
            return '검토 필요';
        }

        function restartActivity() {
            if (state.isRecording) finishRecording();
            state.cycleIndex = 0;
            state.stepIndex = 0;
            state.speakingIndex = 0;
            state.results = createInitialResults();
            state.logs = [];
            state.transcript = '';
            state.isRecording = false;
            renderApp();
        }

        function appendToken(current, token) { return current.trim() ? `${current.trim()} ${token}` : token; }
        function removeLastToken(current) { return current.trim().split(/\s+/).slice(0, -1).join(' '); }
        function normalizeSentence(value) { return value.replace(/[\s.,!?。]/g, ''); }
        function countMatchedGroups(text, groups) {
            return groups.filter((group) => group.some((keyword) => text.includes(keyword))).length;
        }
        function isSecureContextOrLocalhost() { return window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1'; }
        function pickKoreanVoice() { return window.speechSynthesis.getVoices().find((voice) => voice.lang && voice.lang.toLowerCase().startsWith('ko')); }
        function speakText(text, rate) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'ko-KR'; u.rate = rate; const v = pickKoreanVoice(); if (v) u.voice = v; window.speechSynthesis.speak(u); }

        function lcs(a, b) {
            const dp = Array.from({ length:a.length + 1 }, () => new Array(b.length + 1).fill(0));
            for (let i = 1; i <= a.length; i += 1) for (let j = 1; j <= b.length; j += 1) dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
            return dp[a.length][b.length];
        }

        function decomposeHangul(str) {
            const cho = 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
            const jung = 'ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ';
            const jong = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
            let out = '';
            for (const ch of str) {
                const code = ch.charCodeAt(0);
                if (code >= 0xAC00 && code <= 0xD7A3) {
                    const off = code - 0xAC00, j = off % 28, g = ((off - j) / 28) % 21, c = Math.floor((off - j) / 28 / 21);
                    out += cho[c] + jung[g] + (j ? jong[j] : '');
                } else out += ch;
            }
            return out;
        }

        function jamoAnalyze(spoken, target) {
            const jt = decomposeHangul(target), js = decomposeHangul(spoken);
            if (!jt.length) return { accuracy:0, completeness:0, score:0 };
            const common = lcs(jt, js);
            const accuracy = Math.round(common / jt.length * 100);
            const completeness = Math.round(common / Math.max(jt.length, js.length || 1) * 100);
            return { accuracy, completeness, score:Math.round(accuracy * .65 + completeness * .35) };
        }

        function syllableSimilarity(a, b) { if (!b) return 0; if (a === b) return 1; const da = decomposeHangul(a), db = decomposeHangul(b); return da.length ? lcs(da, db) / da.length : 0; }

        function buildSyllableBlocks(target, spoken) {
            const t = [...target], s = [...spoken];
            const base = t.map((tc, i) => {
                const sc = s[i] || ''; const sim = syllableSimilarity(tc, sc);
                let cls = 'syllable-empty', icon = '🔇', sub = '';
                if (!sc) { cls = 'syllable-empty'; icon = '🔇'; }
                else if (sim >= .99) { cls = 'syllable-exact'; icon = '✅'; }
                else if (sim >= .55) { cls = 'syllable-close'; icon = '⚠️'; sub = `<span class="rounded-full bg-amber-50 px-1 text-[8px] text-amber-800">${escapeHtml(sc)}</span>`; }
                else { cls = 'syllable-miss'; icon = '❌'; sub = `<span class="rounded-full bg-rose-50 px-1 text-[8px] text-rose-800">${escapeHtml(sc)}</span>`; }
                return `<div class="syllable-cell ${cls}"><span class="text-[10px]">${icon}</span><span class="text-[15px] leading-none">${escapeHtml(tc)}</span>${sub}</div>`;
            });
            return base.concat(s.slice(t.length).map((sc) => `<div class="syllable-cell syllable-extra"><span class="text-[10px]">➕</span><span class="text-[15px] leading-none">${escapeHtml(sc)}</span></div>`)).join('');
        }

        function escapeHtml(value) { return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        function escapeAttr(value) { return escapeHtml(value); }
    </script>
