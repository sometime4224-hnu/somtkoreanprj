    <title>15과 문법 1 보조 게임 | -게 하다</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --line: #dbe2ea;
            --text: #0f172a;
            --muted: #64748b;
            --blue: #2563eb;
            --blue-soft: #dbeafe;
            --green: #047857;
            --green-soft: #d1fae5;
            --orange: #ea580c;
            --orange-soft: #ffedd5;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        button {
            font: inherit;
        }

        .app {
            width: min(100%, 720px);
            margin: 0 auto;
            padding: 10px 8px calc(18px + env(safe-area-inset-bottom));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 4px 2px 10px;
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(248, 250, 252, 0.92));
            backdrop-filter: blur(8px);
        }

        .back-link {
            color: var(--blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 800;
        }

        .progress {
            color: var(--muted);
            font-size: 14px;
            font-weight: 900;
        }

        .mission {
            padding: 6px 4px 10px;
        }

        #missionText {
            margin: 0;
            font-size: clamp(23px, 6vw, 33px);
            line-height: 1.32;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .stage {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .zone.is-hidden {
            display: none;
        }

        .zone {
            position: relative;
            overflow: hidden;
            padding: 0;
            border: 0;
            border-radius: 18px;
            background: var(--panel);
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
            transform-origin: center bottom;
        }

        .zone::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 2px dashed rgba(148, 163, 184, 0.8);
            border-radius: 18px;
            pointer-events: none;
            transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
        }

        .zone.is-hover::after,
        .zone:active::after {
            border-color: var(--blue);
            background: rgba(219, 234, 254, 0.18);
        }

        .zone.is-correct::after {
            border-color: var(--green);
            background: rgba(209, 250, 229, 0.24);
        }

        .zone.is-wrong::after {
            border-color: var(--orange);
            background: rgba(255, 237, 213, 0.26);
        }

        .zone.is-celebrating {
            animation: zoneCelebrateDance 0.95s ease-in-out both;
        }

        .zone.is-shaking {
            animation: zoneShake 0.58s ease both;
        }

        .zone img {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
        }

        .zone-name {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            padding: 5px 9px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            color: #334155;
            font-size: 13px;
            font-weight: 900;
            box-shadow: 0 4px 8px rgba(15, 23, 42, 0.08);
            pointer-events: none;
        }

        .feedback {
            min-height: 56px;
            margin-top: 8px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel);
            color: var(--muted);
            font-size: 16px;
            font-weight: 800;
            line-height: 1.45;
        }

        .feedback__label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .feedback__answer {
            display: block;
            font-size: 18px;
            font-weight: 900;
            line-height: 1.3;
            word-break: keep-all;
        }

        .feedback__meta {
            display: block;
            margin-top: 8px;
            font-size: 15px;
            font-weight: 800;
            line-height: 1.35;
        }

        .feedback.is-correct {
            border-color: #86efac;
            border-width: 2px;
            background: linear-gradient(180deg, #ecfdf5 0%, #d1fae5 100%);
            color: var(--green);
            text-align: center;
            box-shadow: 0 12px 24px rgba(4, 120, 87, 0.12);
        }

        .feedback.is-correct .feedback__label {
            margin-bottom: 6px;
            font-size: 13px;
            color: #047857;
        }

        .feedback.is-correct .feedback__answer {
            font-size: clamp(25px, 6vw, 33px);
            font-weight: 900;
            line-height: 1.16;
            letter-spacing: -0.03em;
            color: #065f46;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
        }

        .feedback.is-wrong {
            border-color: #fdba74;
            background: var(--orange-soft);
            color: var(--orange);
        }

        .feedback.is-wrong .feedback__answer {
            font-size: 17px;
        }

        .feedback.is-summary {
            border-color: #93c5fd;
            border-width: 2px;
            background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
            color: var(--blue);
            text-align: center;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.12);
        }

        .feedback.is-summary .feedback__label {
            margin-bottom: 6px;
            font-size: 13px;
            color: #1d4ed8;
        }

        .feedback.is-summary .feedback__answer {
            font-size: clamp(27px, 6vw, 35px);
            line-height: 1.15;
            color: #1d4ed8;
            letter-spacing: -0.03em;
        }

        .feedback.is-summary .feedback__meta {
            color: #1e40af;
        }

        .composer {
            position: sticky;
            bottom: 0;
            z-index: 30;
            margin-top: 10px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            box-shadow: 0 -4px 18px rgba(15, 23, 42, 0.06);
        }

        .preview {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 58px;
            margin-bottom: 8px;
            padding: 10px 12px;
            border: 1px solid #93c5fd;
            border-radius: 16px;
            background: #eff6ff;
            color: var(--blue);
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            user-select: none;
            cursor: grab;
            touch-action: manipulation;
        }

        .preview:active {
            cursor: grabbing;
        }

        .preview__icon {
            flex: 0 0 auto;
            font-size: 24px;
            line-height: 1;
        }

        .preview__icon.is-hidden {
            display: none;
        }

        .preview__text {
            min-width: 0;
            line-height: 1.3;
            word-break: keep-all;
        }

        .token-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .token-row::-webkit-scrollbar {
            display: none;
        }

        .token-row + .token-row {
            margin-top: 8px;
        }

        .token-row.is-muted {
            opacity: 0.45;
        }

        .token {
            flex: 0 0 auto;
            appearance: none;
            min-height: 44px;
            padding: 10px 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #ffffff;
            color: #334155;
            font-size: 16px;
            font-weight: 800;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .token--noun,
        .token--verb {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 78px;
            min-height: 76px;
            padding: 10px 12px;
            border-radius: 18px;
            white-space: normal;
        }

        .token__icon {
            display: block;
            font-size: 24px;
            line-height: 1;
        }

        .token__text {
            display: block;
            font-size: 14px;
            line-height: 1.15;
        }

        .token.is-selected {
            border-color: #60a5fa;
            background: var(--blue-soft);
            color: var(--blue);
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .control-btn {
            flex: 1 1 0;
            appearance: none;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #ffffff;
            color: #334155;
            font-size: 15px;
            font-weight: 900;
            touch-action: manipulation;
        }

        .control-btn.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        .flying-icon {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 80;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 88px;
            height: 88px;
            border: 2px solid rgba(147, 197, 253, 0.95);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 18px 36px rgba(37, 99, 235, 0.22);
            font-size: 56px;
            line-height: 1;
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes zoneCelebrateDance {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            18% { transform: translateY(-8px) rotate(-3deg) scale(1.02); }
            36% { transform: translateY(0) rotate(3deg) scale(1.03); }
            54% { transform: translateY(-10px) rotate(-2deg) scale(1.04); }
            72% { transform: translateY(0) rotate(2deg) scale(1.02); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }

        @keyframes zoneShake {
            0% { transform: translateX(0) rotate(0deg); }
            18% { transform: translateX(-10px) rotate(-2deg); }
            36% { transform: translateX(9px) rotate(2deg); }
            54% { transform: translateX(-8px) rotate(-1.5deg); }
            72% { transform: translateX(6px) rotate(1deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (min-width: 721px) {
            .app {
                padding-inline: 14px;
            }

            .topbar {
                padding-top: 10px;
            }

            .zone-name {
                font-size: 14px;
            }

            .composer {
                padding: 10px;
            }
        }

        @media (max-width: 420px) {
            .token--noun,
            .token--verb {
                min-width: 72px;
                min-height: 72px;
                padding-inline: 10px;
            }

            .token__icon {
                font-size: 22px;
            }
        }
    </style>
</head>

                <button class="token token--noun" type="button" data-kind="noun" data-value="책" data-particle="을" data-icon="📘"><span class="token__icon" aria-hidden="true">📘</span><span class="token__text">책</span></button>

                <button class="token token--noun" type="button" data-kind="noun" data-value="영화" data-particle="를" data-icon="🎬"><span class="token__icon" aria-hidden="true">🎬</span><span class="token__text">영화</span></button>

    <script>
        (function () {
            const NO_OBJECT_VERBS = new Set(["웃다", "울다"]);
            const AUTO_ADVANCE_DELAY = 1500;
            const PHASE_BREAK_SECONDS = 5;
            const FLIGHT_DURATION = 520;

            const castAssets = {
                self: {
                    normal: "../assets/c15/grammar/images/ge-hada-cast/self_main_01.webp",
                    bad: "../assets/c15/grammar/images/ge-hada-cast-bad/self_main_01_bad.webp",
                    laugh: "../assets/c15/grammar/images/ge-hada-cast-laugh/self_main_01_laugh.webp",

                friend: {
                    normal: "../assets/c15/grammar/images/ge-hada-cast/friend_female_01.webp",
                    bad: "../assets/c15/grammar/images/ge-hada-cast-bad/friend_female_01_bad.webp",
                    laugh: "../assets/c15/grammar/images/ge-hada-cast-laugh/friend_female_01_laugh.webp",
                    sad: "../assets/c15/grammar/images/ge-hada-cast-sad/friend_female_01_sad.webp",
                    alt: "친구 캐릭터"
                },
                sibling: {
                    normal: "../assets/c15/grammar/images/ge-hada-cast/boy_02.webp",
                    bad: "../assets/c15/grammar/images/ge-hada-cast-bad/boy_02_bad.webp",
                    laugh: "../assets/c15/grammar/images/ge-hada-cast-laugh/boy_02_laugh.webp",
                    sad: "../assets/c15/grammar/images/ge-hada-cast-sad/boy_02_sad.webp",
                    alt: "동생 캐릭터"
                },
                staff: {
                    normal: "../assets/c15/grammar/images/ge-hada-cast/office_man_glasses_01.webp",
                    bad: "../assets/c15/grammar/images/ge-hada-cast-bad/office_man_glasses_01_bad.webp",
                    laugh: "../assets/c15/grammar/images/ge-hada-cast-laugh/office_man_glasses_01_laugh.webp",
                    sad: "../assets/c15/grammar/images/ge-hada-cast-sad/office_man_glasses_01_sad.webp",
                    alt: "부하직원 캐릭터"
                }
            };

            const characters = {
                self: { label: "나", cast: "self" },
                friend: { label: "친구", cast: "friend" },
                sibling: { label: "동생", cast: "sibling" },
                staff: { label: "부하직원", cast: "staff" }
            };

            const phases = [
                {
                    id: 1,
                    board: "duo",
                    missions: [
                        { prompt: "친구가 케이크를 먹게 하세요.", target: "friend", pair: "friend", noun: "케이크", verb: "먹다" },
                        { prompt: "물을 마시세요.", target: "self", pair: "friend", noun: "물", verb: "마시다" },
                        { prompt: "동생이 책을 읽게 하세요.", target: "sibling", pair: "sibling", noun: "책", verb: "읽다" },
                        { prompt: "동생을 울게 하세요.", target: "sibling", pair: "sibling", noun: null, verb: "울다" },
                        { prompt: "영화를 보세요.", target: "self", pair: "friend", noun: "영화", verb: "보다" },
                        { prompt: "책을 고르세요.", target: "self", pair: "friend", noun: "책", verb: "고르다" },
                        { prompt: "친구가 케이크를 사게 하세요.", target: "friend", pair: "friend", noun: "케이크", verb: "사다" },
                        { prompt: "부하직원이 신문을 읽게 하세요.", target: "staff", pair: "staff", noun: "신문", verb: "읽다" },
                        { prompt: "친구가 드라마를 보게 하세요.", target: "friend", pair: "friend", noun: "드라마", verb: "보다" }
                    ]
                },
                {
                    id: 2,
                    board: "quad",
                    missions: [
                        { prompt: "친구가 빵을 먹게 하세요.", target: "friend", noun: "빵", verb: "먹다" },
                        { prompt: "동생이 드라마를 보게 하세요.", target: "sibling", noun: "드라마", verb: "보다" },
                        { prompt: "부하직원이 물을 마시게 하세요.", target: "staff", noun: "물", verb: "마시다" },
                        { prompt: "밥을 먹으세요.", target: "self", noun: "밥", verb: "먹다" },
                        { prompt: "친구를 웃게 하세요.", target: "friend", noun: null, verb: "웃다" },
                        { prompt: "부하직원을 울게 하세요.", target: "staff", noun: null, verb: "울다" },
                        { prompt: "동생이 케이크를 사게 하세요.", target: "sibling", noun: "케이크", verb: "사다" },
                        { prompt: "신문을 읽으세요.", target: "self", noun: "신문", verb: "읽다" },
                        { prompt: "부하직원이 책을 고르게 하세요.", target: "staff", noun: "책", verb: "고르다" }
                    ]
                }
            ];

            const totalMissionCount = phases.reduce(function (sum, phase) {
                return sum + phase.missions.length;
            }, 0);

            const missionText = document.getElementById("missionText");
            const progressText = document.getElementById("progressText");
            const stageBoard = document.getElementById("stageBoard");
            const feedbackBox = document.getElementById("feedbackBox");
            const composer = document.getElementById("composer");
            const actionPreview = document.getElementById("actionPreview");
            const previewNounIcon = document.getElementById("previewNounIcon");
            const previewVerbIcon = document.getElementById("previewVerbIcon");
            const actionPreviewText = document.getElementById("actionPreviewText");
            const resetBtn = document.getElementById("resetBtn");
            const nounRow = document.getElementById("nounRow");
            const nounButtons = Array.from(document.querySelectorAll('[data-kind="noun"]'));
            const verbButtons = Array.from(document.querySelectorAll('[data-kind="verb"]'));
            const zoneRefs = {
                self: {
                    zone: document.getElementById("selfZone"),
                    image: document.getElementById("selfImage"),
                    name: document.getElementById("selfName")
                },
                friend: {
                    zone: document.getElementById("friendZone"),
                    image: document.getElementById("friendImage"),
                    name: document.getElementById("friendName")
                },
                sibling: {
                    zone: document.getElementById("siblingZone"),
                    image: document.getElementById("siblingImage"),
                    name: document.getElementById("siblingName")
                },
                staff: {
                    zone: document.getElementById("staffZone"),
                    image: document.getElementById("staffImage"),
                    name: document.getElementById("staffName")
                }
            };
            const zoneKeys = Object.keys(zoneRefs);

            let currentPhaseIndex = 0;
            let missionIndex = 0;
            let selectedNoun = nounButtons[0];
            let selectedVerb = verbButtons[0];
            let moodOverride = {};
            let autoAdvanceTimer = null;
            let countdownInterval = null;
            let countdownTimeout = null;
            let isLocked = false;
            let totalCorrect = 0;
            let phaseScores = phases.map(function () {
                return 0;
            });

            function getSubjectParticle(word) {
                const text = String(word || "").trim();
                if (!text) {
                    return "가";
                }

                const lastChar = text.charCodeAt(text.length - 1);
                const hangulBase = 0xac00;
                const hangulLast = 0xd7a3;

                if (lastChar < hangulBase || lastChar > hangulLast) {
                    return "가";
                }

                return ((lastChar - hangulBase) % 28) === 0 ? "가" : "이";
            }

            function getObjectParticle(word) {
                const text = String(word || "").trim();
                if (!text) {
                    return "를";
                }

                const lastChar = text.charCodeAt(text.length - 1);
                const hangulBase = 0xac00;
                const hangulLast = 0xd7a3;

                if (lastChar < hangulBase || lastChar > hangulLast) {
                    return "를";
                }

                return ((lastChar - hangulBase) % 28) === 0 ? "를" : "을";
            }

            function currentPhase() {
                return phases[currentPhaseIndex];
            }

            function currentMission() {
                return currentPhase().missions[missionIndex];
            }

            function isObjectlessVerb(verbValue) {
                return NO_OBJECT_VERBS.has(verbValue);
            }

            function currentActionText() {
                if (isObjectlessVerb(selectedVerb.dataset.value)) {
                    return selectedVerb.dataset.value;
                }
                return selectedNoun.dataset.value + selectedNoun.dataset.particle + " " + selectedVerb.dataset.value;
            }

            function clearZoneState() {
                zoneKeys.forEach(function (key) {
                    zoneRefs[key].zone.classList.remove("is-hover", "is-correct", "is-wrong", "is-celebrating", "is-shaking");
                });
            }

            function clearFeedback() {
                clearZoneState();
                feedbackBox.classList.remove("is-correct", "is-wrong", "is-summary");
                feedbackBox.replaceChildren();
                feedbackBox.textContent = "행동을 고르고 인물을 탭하세요.";
            }

            function setFeedbackMessage(label, message, meta) {
                feedbackBox.replaceChildren();

                const labelNode = document.createElement("span");
                labelNode.className = "feedback__label";
                labelNode.textContent = label;

                const answerNode = document.createElement("span");
                answerNode.className = "feedback__answer";
                answerNode.textContent = message;

                feedbackBox.append(labelNode, answerNode);

                if (meta) {
                    const metaNode = document.createElement("span");
                    metaNode.className = "feedback__meta";
                    metaNode.textContent = meta;
                    feedbackBox.append(metaNode);
                }
            }

            function clearAutoAdvance() {
                if (!autoAdvanceTimer) {
                    return;
                }

                window.clearTimeout(autoAdvanceTimer);
                autoAdvanceTimer = null;
            }

            function clearBreakCountdown() {
                if (countdownInterval) {
                    window.clearInterval(countdownInterval);
                    countdownInterval = null;
                }

                if (countdownTimeout) {
                    window.clearTimeout(countdownTimeout);
                    countdownTimeout = null;
                }
            }

            function clearTimers() {
                clearAutoAdvance();
                clearBreakCountdown();
            }

            function clearFlyingIcons() {
                document.querySelectorAll(".flying-icon").forEach(function (node) {
                    node.remove();
                });
            }

            function getNounButtonByValue(value) {
                return nounButtons.find(function (button) {
                    return button.dataset.value === value;
                }) || null;
            }

            function getVerbButtonByValue(value) {
                return verbButtons.find(function (button) {
                    return button.dataset.value === value;
                }) || null;
            }

            function getCurrentVisibleZoneKeys() {
                const phase = currentPhase();
                const mission = currentMission();

                if (phase.board === "quad") {
                    return zoneKeys;
                }

                return ["self", mission.pair || (mission.target === "self" ? "friend" : mission.target)];
            }

            function updateZoneVisibility() {
                const visibleKeys = getCurrentVisibleZoneKeys();
                stageBoard.classList.toggle("is-expanded", currentPhase().board === "quad");
                zoneKeys.forEach(function (key) {
                    zoneRefs[key].zone.classList.toggle("is-hidden", visibleKeys.indexOf(key) === -1);
                });
            }

            function buildSelfResultMessage(nounValue, verbValue) {
                const verbButton = getVerbButtonByValue(verbValue);
                if (!verbButton) {
                    return "제가 직접 했어요.";
                }

                if (isObjectlessVerb(verbValue) || nounValue == null) {
                    return "제가 직접 " + verbButton.dataset.present;
                }

                const nounButton = getNounButtonByValue(nounValue);
                const nounText = nounButton
                    ? nounButton.dataset.value + nounButton.dataset.particle + " "
                    : nounValue + " ";

                return "제가 직접 " + nounText + verbButton.dataset.present;
            }

            function buildOtherResultMessage(targetKey, nounValue, verbValue, mode) {
                const targetLabel = characters[targetKey].label;
                const verbButton = getVerbButtonByValue(verbValue);
                const tail = mode === "done" ? " 했어요." : " 해야 해요.";

                if (!verbButton) {
                    return targetLabel;
                }

                if (isObjectlessVerb(verbValue) || nounValue == null) {
                    return targetLabel + getObjectParticle(targetLabel) + " " + verbButton.dataset.ge + tail;
                }

                const nounButton = getNounButtonByValue(nounValue);
                const nounText = nounButton
                    ? nounButton.dataset.value + nounButton.dataset.particle + " "
                    : nounValue + " ";

                return targetLabel + getSubjectParticle(targetLabel) + " " + nounText + verbButton.dataset.ge + tail;
            }

            function setSummaryMessage(label, scoreText, metaText) {
                feedbackBox.classList.remove("is-correct", "is-wrong");
                feedbackBox.classList.add("is-summary");
                setFeedbackMessage(label, scoreText, metaText);
            }

            function schedulePostAnswerAdvance() {
                clearAutoAdvance();
                autoAdvanceTimer = window.setTimeout(function () {
                    autoAdvanceTimer = null;
                    handlePostAnswerAdvance();
                }, AUTO_ADVANCE_DELAY);
            }

            function updatePreview() {
                const nounIcon = isObjectlessVerb(selectedVerb.dataset.value) ? "" : (selectedNoun.dataset.icon || "");
                previewNounIcon.textContent = nounIcon;
                previewNounIcon.classList.toggle("is-hidden", !nounIcon);
                previewVerbIcon.textContent = selectedVerb.dataset.icon || "";
                actionPreviewText.textContent = currentActionText();
            }

            function updateNounRowState() {
                nounRow.classList.toggle("is-muted", isObjectlessVerb(selectedVerb.dataset.value));
            }

            function setSelected(buttons, picked) {
                buttons.forEach(function (button) {
                    button.classList.toggle("is-selected", button === picked);
                });
            }

            function updateCastMood() {
                zoneKeys.forEach(function (key) {
                    const character = characters[key];
                    const cast = castAssets[character.cast];
                    const mood = moodOverride[key] || "normal";

                    zoneRefs[key].image.src = cast[mood] || cast.normal;
                    zoneRefs[key].image.alt = cast.alt;
                    zoneRefs[key].name.textContent = character.label;
                    zoneRefs[key].zone.setAttribute("aria-label", character.label + "에게 놓기");
                });
            }

            function getSuccessMoodOverride(targetKey, verbValue) {
                const mood = verbValue === "울다" ? "sad" : "laugh";
                return { [targetKey]: mood };
            }

            function getWrongMoodOverride(targetKey) {
                return { [targetKey]: "bad" };
            }

            function loadMission() {
                const phase = currentPhase();
                const mission = currentMission();
                clearTimers();
                clearFlyingIcons();
                moodOverride = {};
                isLocked = false;
                composer.hidden = false;
                missionText.textContent = mission.prompt;
                progressText.textContent = phase.id + "단계 " + (missionIndex + 1) + " / " + phase.missions.length;
                updateZoneVisibility();
                updateCastMood();
                clearFeedback();
            }

            function openPhaseBreak() {
                const currentScore = phaseScores[currentPhaseIndex];
                const phase = currentPhase();
                const nextPhase = phases[currentPhaseIndex + 1];
                let secondsLeft = PHASE_BREAK_SECONDS;

                clearTimers();
                clearFlyingIcons();
                clearZoneState();
                moodOverride = {};
                isLocked = true;
                composer.hidden = true;
                updateZoneVisibility();
                updateCastMood();
                progressText.textContent = phase.id + "단계 결과";
                missionText.textContent = phase.id + "단계 9문제를 마쳤어요.";

                function renderBreakMessage() {
                    setSummaryMessage(
                        phase.id + "단계 점수",
                        currentScore + " / " + phase.missions.length,
                        secondsLeft + "초 후 " + nextPhase.id + "단계가 시작돼요."
                    );
                }

                renderBreakMessage();
                countdownInterval = window.setInterval(function () {
                    secondsLeft -= 1;
                    if (secondsLeft > 0) {
                        renderBreakMessage();
                    }
                }, 1000);

                countdownTimeout = window.setTimeout(function () {
                    clearBreakCountdown();
                    currentPhaseIndex += 1;
                    missionIndex = 0;
                    loadMission();
                }, PHASE_BREAK_SECONDS * 1000);
            }

            function openFinalSummary() {
                clearTimers();
                clearFlyingIcons();
                clearZoneState();
                moodOverride = {};
                isLocked = true;
                composer.hidden = true;
                updateZoneVisibility();
                updateCastMood();
                progressText.textContent = "최종 점수";
                missionText.textContent = "18문제를 모두 마쳤어요.";
                setSummaryMessage("최종 점수", totalCorrect + " / " + totalMissionCount, "처음 버튼을 누르면 처음부터 다시 할 수 있어요.");
            }

            function handlePostAnswerAdvance() {
                if (missionIndex >= currentPhase().missions.length - 1) {
                    if (currentPhaseIndex < phases.length - 1) {
                        openPhaseBreak();
                    } else {
                        openFinalSummary();
                    }
                    return;
                }

                missionIndex += 1;
                loadMission();
            }

            function showCorrect(targetKey) {
                const mission = currentMission();
                const zone = zoneRefs[targetKey].zone;
                const message = targetKey === "self"
                    ? buildSelfResultMessage(mission.noun, mission.verb)
                    : buildOtherResultMessage(targetKey, mission.noun, mission.verb, "done");

                clearAutoAdvance();
                isLocked = true;
                moodOverride = getSuccessMoodOverride(targetKey, mission.verb);
                updateCastMood();
                clearZoneState();
                zone.classList.add("is-correct", "is-celebrating");
                feedbackBox.classList.remove("is-wrong", "is-summary");
                feedbackBox.classList.add("is-correct");
                setFeedbackMessage("정답", message);
                schedulePostAnswerAdvance();
            }

            function showWrong(targetKey, reason) {
                const zone = zoneRefs[targetKey].zone;

                clearAutoAdvance();
                isLocked = true;
                moodOverride = getWrongMoodOverride(targetKey);
                updateCastMood();
                clearZoneState();
                zone.classList.add("is-wrong", "is-shaking");
                feedbackBox.classList.remove("is-correct", "is-summary");
                feedbackBox.classList.add("is-wrong");
                setFeedbackMessage("오답", reason);
                schedulePostAnswerAdvance();
            }

            function animateNounFlight(zone) {
                if (isObjectlessVerb(selectedVerb.dataset.value)) {
                    return;
                }

                const icon = selectedNoun.dataset.icon || "";
                if (!icon) {
                    return;
                }

                const startRect = previewNounIcon.getBoundingClientRect();
                const zoneRect = zone.getBoundingClientRect();

                if (!startRect.width || !startRect.height || !zoneRect.width || !zoneRect.height) {
                    return;
                }

                const flyer = document.createElement("span");
                flyer.className = "flying-icon";
                flyer.setAttribute("aria-hidden", "true");
                flyer.textContent = icon;
                document.body.appendChild(flyer);

                const flyerRect = flyer.getBoundingClientRect();
                const startX = startRect.left + (startRect.width / 2) - (flyerRect.width / 2);
                const startY = startRect.top + (startRect.height / 2) - (flyerRect.height / 2);
                const midX = startX + ((zoneRect.left + zoneRect.width * 0.5) - startRect.left) * 0.55;
                const midY = startY - 54;
                const endX = zoneRect.left + (zoneRect.width * 0.5) - (flyerRect.width / 2);
                const endY = zoneRect.top + (zoneRect.height * 0.4) - (flyerRect.height / 2);

                const cleanup = function () {
                    flyer.remove();
                };

                if (typeof flyer.animate === "function") {
                    const motion = flyer.animate([
                        { transform: "translate(" + startX + "px, " + startY + "px) scale(0.92)", opacity: 1 },
                        { transform: "translate(" + midX + "px, " + midY + "px) scale(1.18)", opacity: 1, offset: 0.5 },
                        { transform: "translate(" + endX + "px, " + endY + "px) scale(0.72)", opacity: 0.15 }
                    ], {
                        duration: FLIGHT_DURATION,
                        easing: "cubic-bezier(0.22, 1, 0.36, 1)",
                        fill: "forwards"
                    });
                    motion.onfinish = cleanup;
                    motion.oncancel = cleanup;
                    return;
                }

                flyer.style.transform = "translate(" + endX + "px, " + endY + "px) scale(0.72)";
                flyer.style.opacity = "0.15";
                window.setTimeout(cleanup, FLIGHT_DURATION);
            }

            function submitToZone(targetKey) {
                if (isLocked) {
                    return;
                }

                const zone = zoneRefs[targetKey].zone;
                zone.classList.remove("is-hover");
                animateNounFlight(zone);
                evaluate(targetKey);
            }

            function evaluate(targetKey) {
                if (isLocked) {
                    return;
                }

                const mission = currentMission();
                const nounOk = mission.noun == null ? true : selectedNoun.dataset.value === mission.noun;
                const verbOk = selectedVerb.dataset.value === mission.verb;
                const targetOk = mission.target === targetKey;

                if (nounOk && verbOk && targetOk) {
                    totalCorrect += 1;
                    phaseScores[currentPhaseIndex] += 1;
                    showCorrect(targetKey);
                    return;
                }

                if (!nounOk || !verbOk) {
                    showWrong(targetKey, "행동이 맞지 않아요.");
                    return;
                }

                if (mission.target === "self") {
                    showWrong(targetKey, "이번에는 내가 직접 해야 해요.");
                } else {
                    showWrong(targetKey, "이번에는 " + buildOtherResultMessage(mission.target, mission.noun, mission.verb, "need"));
                }
            }

            nounButtons.forEach(function (button) {
                button.addEventListener("click", function () {
                    if (isLocked) {
                        return;
                    }

                    selectedNoun = button;
                    setSelected(nounButtons, button);
                    updatePreview();
                    clearFeedback();
                });
            });

            verbButtons.forEach(function (button) {
                button.addEventListener("click", function () {
                    if (isLocked) {
                        return;
                    }

                    selectedVerb = button;
                    setSelected(verbButtons, button);
                    updatePreview();
                    updateNounRowState();
                    clearFeedback();
                });
            });

            actionPreview.addEventListener("dragstart", function (event) {
                if (isLocked) {
                    event.preventDefault();
                    return;
                }

                event.dataTransfer.setData("text/plain", currentActionText());
            });

            zoneKeys.forEach(function (key) {
                const zone = zoneRefs[key].zone;

                zone.addEventListener("dragover", function (event) {
                    if (isLocked) {
                        return;
                    }

                    event.preventDefault();
                    zone.classList.add("is-hover");
                });

                zone.addEventListener("dragleave", function () {
                    zone.classList.remove("is-hover");
                });

                zone.addEventListener("drop", function (event) {
                    if (isLocked) {
                        return;
                    }

                    event.preventDefault();
                    submitToZone(key);
                });

                zone.addEventListener("click", function () {
                    submitToZone(key);
                });
            });

            function resetGame() {
                clearTimers();
                clearFlyingIcons();
                clearZoneState();
                currentPhaseIndex = 0;
                missionIndex = 0;
                totalCorrect = 0;
                phaseScores = phases.map(function () {
                    return 0;
                });
                selectedNoun = nounButtons[0];
                selectedVerb = verbButtons[0];
                setSelected(nounButtons, selectedNoun);
                setSelected(verbButtons, selectedVerb);
                updatePreview();
                updateNounRowState();
                loadMission();
            }

            resetBtn.addEventListener("click", resetGame);

            resetGame();
        })();
    </script>
</body>
</html>
