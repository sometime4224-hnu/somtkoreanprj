  <style>
    :root {
      --bg: #eff6ff;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #64748b;
      --line: #dbe7e7;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --accent-soft: #ccfbf1;
      --orange: #f97316;
      --orange-soft: #ffedd5;
      --success: #15803d;
      --wrong: #b42318;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(249, 115, 22, 0.13), transparent 26%),
        radial-gradient(circle at 88% 12%, rgba(20, 184, 166, 0.15), transparent 30%),
        linear-gradient(180deg, #f0fdfa 0%, var(--bg) 48%, #f8fafc 100%);
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    img { display: block; max-width: 100%; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(153, 246, 228, 0.72);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
    }

    .topbar a,
    .topbar span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--accent-dark);
      font-size: 0.9rem;
      font-weight: 900;
      text-decoration: none;
    }

    .topbar a:hover,
    .topbar a[aria-current="page"] {
      background: var(--accent-soft);
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 48px;
    }

    .hero,
    .panel {
      border: 1px solid rgba(219, 231, 231, 0.9);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .hero h1 {
      margin: 4px 0 8px;
      font-size: clamp(1.75rem, 4vw, 2.8rem);
      line-height: 1.12;
    }

    .eyebrow {
      color: var(--accent-dark);
      font-size: 0.84rem;
      font-weight: 900;
    }

    .hero p,
    .lesson-summary,
    .caption,
    .help {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .lesson-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .lesson-tab,
    .action-btn,
    .ghost-btn,
    .frame-btn,
    .quiz-option {
      border-radius: 999px;
      font-weight: 900;
      transition: 0.18s ease;
    }

    .lesson-tab {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid #a7f3d0;
      background: white;
      color: var(--accent-dark);
    }

    .lesson-tab.is-active {
      background: linear-gradient(135deg, #0f766e, #0891b2);
      color: white;
      box-shadow: 0 12px 26px rgba(15, 118, 110, 0.24);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.82fr);
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .panel {
      padding: 18px;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel h2,
    .panel h3 {
      margin: 0;
      line-height: 1.25;
    }

    .visual-card {
      position: relative;
    }

    .film {
      overflow: hidden;
      position: relative;
      aspect-ratio: var(--film-ratio, 1.08 / 1);
      min-height: 320px;
      border: 1px solid #d8e8e5;
      border-radius: 20px;
      background: #f8fafc;
    }

    .film img {
      position: absolute;
      top: 0;
      left: 0;
      max-width: none;
      transform-origin: top left;
      will-change: transform;
      transition: transform 0.42s ease;
    }

    .film-focus {
      position: absolute;
      top: 0;
      left: 0;
      border: 4px solid rgba(249, 115, 22, 0.86);
      border-radius: 16px;
      box-shadow: 0 0 0 999px rgba(15, 23, 42, 0.18);
      pointer-events: none;
      transition: transform 0.42s ease, width 0.42s ease, height 0.42s ease;
    }

    .caption {
      min-height: 62px;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #f0fdfa;
      border: 1px solid #c4f1e9;
    }

    .caption strong {
      display: block;
      color: var(--accent-dark);
      margin-bottom: 4px;
    }

    .frame-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .frame-btn {
      min-width: 42px;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid #d6dedc;
      background: white;
      color: #475569;
    }

    .frame-btn.is-active {
      border-color: #f97316;
      background: var(--orange-soft);
      color: #9a3412;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.16);
    }

    .listen-panel {
      display: grid;
      gap: 12px;
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ecfdf5, #eff6ff);
      border: 1px solid #c7e8e3;
    }

    .audio-row,
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .audio-row input[type="file"] {
      width: min(100%, 360px);
      padding: 9px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: white;
      color: #334155;
      font-weight: 700;
    }

    audio {
      width: 100%;
      min-height: 42px;
    }

    .action-btn,
    .ghost-btn {
      min-height: 44px;
      padding: 0 15px;
    }

    .action-btn {
      background: linear-gradient(135deg, #0f766e, #0891b2);
      color: white;
      box-shadow: 0 12px 24px rgba(15, 118, 110, 0.2);
    }

    .ghost-btn {
      border: 1px solid #cbd5e1;
      background: white;
      color: #475569;
    }

    .quiz-list {
      display: grid;
      gap: 12px;
    }

    .quiz-card {
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: white;
    }

    .quiz-card strong {
      display: block;
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .quiz-options {
      display: grid;
      gap: 8px;
    }

    .quiz-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #d8dedc;
      background: #fbfefa;
      color: #263247;
      line-height: 1.5;
    }

    .quiz-option input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .quiz-card.is-correct {
      border-color: #86efac;
      background: #f0fdf4;
    }

    .quiz-card.is-wrong {
      border-color: #fda29b;
      background: #fff1f0;
    }

    .feedback {
      display: none;
      margin-top: 10px;
      color: #475569;
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .quiz-card.is-correct .feedback,
    .quiz-card.is-wrong .feedback {
      display: block;
    }

    .score {
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f8fafc;
      color: #475569;
      font-weight: 800;
      line-height: 1.5;
    }

    .score[data-tone="success"] {
      background: #dcfce7;
      color: var(--success);
    }

    .score[data-tone="warn"] {
      background: #fff7ed;
      color: #9a3412;
    }

    .mobile-image-overlay {
      position: fixed;
      top: calc(54px + env(safe-area-inset-top, 0px));
      left: 50%;
      z-index: 46;
      display: none;
      width: min(360px, calc(100vw - 18px));
      padding: 8px;
      border: 1px solid rgba(15, 118, 110, 0.24);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.22);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -12px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .mobile-image-overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    .mobile-image-overlay .film {
      min-height: 118px;
      max-height: 148px;
      border-radius: 14px;
      aspect-ratio: 2.42 / 1;
    }

    .mobile-image-overlay .film-focus {
      border-width: 3px;
      border-radius: 12px;
      box-shadow: 0 0 0 999px rgba(15, 23, 42, 0.1);
    }

    .mobile-image-overlay__label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 4px 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .mobile-image-overlay__label strong {
      color: var(--accent-dark);
      font-size: 0.86rem;
    }

    @media (max-width: 880px) {
      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .mobile-image-overlay {
        display: block;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: calc(100% - 18px);
        margin-top: 12px;
      }

      .topbar {
        overflow-x: auto;
        white-space: nowrap;
      }

      .hero,
      .panel {
        border-radius: 20px;
        padding: 14px;
      }

      .film {
        min-height: 288px;
      }

      .lesson-tab {
        flex: 1 1 150px;
      }
    }
  </style>
</head>

    const elements = {
      tabs: document.getElementById("lesson-tabs"),
      lessonLabel: document.getElementById("lesson-label"),
      lessonTitle: document.getElementById("lesson-title"),
      lessonSummary: document.getElementById("lesson-summary"),
      mainFilm: document.getElementById("main-film"),
      filmImage: document.getElementById("film-image"),
      filmFocus: document.getElementById("film-focus"),
      caption: document.getElementById("frame-caption"),
      frameStrip: document.getElementById("frame-strip"),
      expectedFile: document.getElementById("expected-file"),
      audioFile: document.getElementById("audio-file"),
      audio: document.getElementById("lesson-audio"),
      playAudio: document.getElementById("play-audio"),
      playTts: document.getElementById("play-tts"),
      stopAudio: document.getElementById("stop-audio"),
      audioHelp: document.getElementById("audio-help"),
      quizList: document.getElementById("quiz-list"),
      checkQuiz: document.getElementById("check-quiz"),
      resetQuiz: document.getElementById("reset-quiz"),
      quizScore: document.getElementById("quiz-score"),
      visualCard: document.getElementById("visual-card"),
      overlay: document.getElementById("mobile-overlay"),
      overlayFilm: document.getElementById("overlay-film"),
      overlayImage: document.getElementById("overlay-image"),
      overlayFocus: document.getElementById("overlay-focus"),
      overlayTitle: document.getElementById("overlay-title")
    };

    let activeLessonIndex = 0;
    let activeFrameIndex = 0;
    let audioObjectUrl = "";
    let rafId = 0;
    let ttsStopped = false;
    let overlayObserver = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getLesson() {
      return lessons[activeLessonIndex];
    }

    function getExpectedAudioFile(lesson) {
      return `Seoul Univ_3B_Trk_${String(lesson.track).padStart(2, "0")}.mp3`;
    }

    function getFrameIndexByTime(lesson, time) {
      const safeTime = Number.isFinite(time) ? time : 0;
      const index = lesson.frames.findIndex((frame) => safeTime >= frame.start && safeTime < frame.end);
      if (index >= 0) return index;
      return safeTime < lesson.frames[0].start ? 0 : lesson.frames.length - 1;
    }

    function setFrame(index, force = false) {
      const lesson = getLesson();
      activeFrameIndex = Math.max(0, Math.min(index, lesson.frames.length - 1));
      const frame = lesson.frames[activeFrameIndex];
      applyFrame(elements.mainFilm, elements.filmImage, elements.filmFocus, frame, force);
      applyFrame(elements.overlayFilm, elements.overlayImage, elements.overlayFocus, frame, force);
      elements.caption.innerHTML = `<strong>${escapeHtml(frame.label)}. ${escapeHtml(frame.title)}</strong><span>${escapeHtml(frame.caption)}</span>`;
      elements.overlayTitle.textContent = `현재 그림 ${frame.label}`;
      elements.frameStrip.querySelectorAll("[data-frame-index]").forEach((button) => {
        button.classList.toggle("is-active", Number(button.dataset.frameIndex) === activeFrameIndex);
      });
    }

    function applyFrame(viewport, image, focus, frame, force = false) {
      if (!viewport || !image || !focus || !image.complete || !image.naturalWidth || !image.naturalHeight) return;
      const viewportWidth = viewport.clientWidth;
      const viewportHeight = viewport.clientHeight;
      if (!viewportWidth || !viewportHeight) return;
      const scale = Math.min(viewportWidth / frame.width, viewportHeight / frame.height);
      const translateX = ((viewportWidth - frame.width * scale) / 2) - frame.x * scale;
      const translateY = ((viewportHeight - frame.height * scale) / 2) - frame.y * scale;
      const focusX = frame.x * scale + translateX;
      const focusY = frame.y * scale + translateY;
      if (force) image.style.transition = "none";
      image.style.width = `${image.naturalWidth}px`;
      image.style.height = `${image.naturalHeight}px`;
      image.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
      focus.style.width = `${frame.width * scale}px`;
      focus.style.height = `${frame.height * scale}px`;
      focus.style.transform = `translate(${focusX}px, ${focusY}px)`;
      if (force) requestAnimationFrame(() => { image.style.transition = ""; });
    }

    function renderTabs() {
      elements.tabs.innerHTML = lessons.map((lesson, index) => `
        <button type="button" class="lesson-tab${index === activeLessonIndex ? " is-active" : ""}" data-lesson-index="${index}">
          ${escapeHtml(lesson.label)} · ${index + 1}번
        </button>
      `).join("");
    }

    function renderFrameButtons() {
      const lesson = getLesson();
      elements.frameStrip.innerHTML = lesson.frames.map((frame, index) => `
        <button type="button" class="frame-btn${index === activeFrameIndex ? " is-active" : ""}" data-frame-index="${index}">
          ${escapeHtml(frame.label)}
        </button>
      `).join("");
    }

    function renderQuiz() {
      const lesson = getLesson();
      const tfMarkup = lesson.tfQuestions.map((question, index) => `
        <article class="quiz-card" data-quiz-card data-type="tf" data-index="${index}" data-answer="${question.answer ? "O" : "X"}">
          <strong>O/X ${index + 1}. ${escapeHtml(question.statement)}</strong>
          <div class="quiz-options">
            <label class="quiz-option"><input type="radio" name="${lesson.id}-tf-${index}" value="O"> O</label>
            <label class="quiz-option"><input type="radio" name="${lesson.id}-tf-${index}" value="X"> X</label>
          </div>
          <div class="feedback">${escapeHtml(question.explanation)}</div>
        </article>
      `).join("");
      const choiceMarkup = lesson.questions.map((question, index) => `
        <article class="quiz-card" data-quiz-card data-type="choice" data-index="${index}" data-answer="${escapeHtml(question.answer)}">
          <strong>문제 ${index + 1}. ${escapeHtml(question.prompt)}</strong>
          <div class="quiz-options">
            ${question.options.map((option) => `
              <label class="quiz-option">
                <input type="radio" name="${lesson.id}-choice-${index}" value="${escapeHtml(option.value)}">
                ${escapeHtml(option.value)}. ${escapeHtml(option.label)}
              </label>
            `).join("")}
          </div>
          <div class="feedback">${escapeHtml(question.explanation)}</div>
        </article>
      `).join("");
      elements.quizList.innerHTML = tfMarkup + choiceMarkup;
      elements.quizScore.textContent = "문제를 풀고 정답 확인을 누르세요.";
      elements.quizScore.dataset.tone = "info";
    }

    function clearAudioObjectUrl() {
      if (audioObjectUrl) URL.revokeObjectURL(audioObjectUrl);
      audioObjectUrl = "";
    }

    function stopPlayback() {
      cancelAnimationFrame(rafId);
      rafId = 0;
      elements.audio.pause();
      if ("speechSynthesis" in window) {
        ttsStopped = true;
        window.speechSynthesis.cancel();
      }
    }

    function syncFromAudio() {
      const lesson = getLesson();
      const nextFrameIndex = getFrameIndexByTime(lesson, elements.audio.currentTime);
      if (nextFrameIndex !== activeFrameIndex) setFrame(nextFrameIndex);
      if (!elements.audio.paused && !elements.audio.ended) {
        rafId = requestAnimationFrame(syncFromAudio);
      }
    }

    function speakLine(line) {
      return new Promise((resolve) => {
        if (!("speechSynthesis" in window) || ttsStopped) {
          resolve();
          return;
        }
        const utterance = new SpeechSynthesisUtterance(line.text);
        utterance.lang = "ko-KR";
        utterance.rate = 0.92;
        utterance.pitch = line.speaker === "남" ? 0.88 : 1.06;
        utterance.onend = resolve;
        utterance.onerror = resolve;
        window.speechSynthesis.speak(utterance);
      });
    }

    async function playTts() {
      stopPlayback();
      ttsStopped = false;
      const lesson = getLesson();
      for (const line of lesson.transcript) {
        if (ttsStopped) break;
        setFrame(getFrameIndexByTime(lesson, line.start));
        await speakLine(line);
      }
    }

    function checkQuiz() {
      const cards = [...elements.quizList.querySelectorAll("[data-quiz-card]")];
      let score = 0;
      cards.forEach((card) => {
        const checked = card.querySelector("input:checked");
        const correct = Boolean(checked && checked.value === card.dataset.answer);
        card.classList.toggle("is-correct", correct);
        card.classList.toggle("is-wrong", !correct);
        if (correct) score += 1;
      });
      elements.quizScore.textContent = `${cards.length}문제 중 ${score}문제를 맞혔습니다.`;
      elements.quizScore.dataset.tone = score === cards.length ? "success" : "warn";
    }

    function resetQuiz() {
      elements.quizList.querySelectorAll("input").forEach((input) => { input.checked = false; });
      elements.quizList.querySelectorAll("[data-quiz-card]").forEach((card) => {
        card.classList.remove("is-correct", "is-wrong");
      });
      elements.quizScore.textContent = "문제를 풀고 정답 확인을 누르세요.";
      elements.quizScore.dataset.tone = "info";
    }

    function setupOverlayObserver() {
      if (overlayObserver) overlayObserver.disconnect();
      elements.overlay.classList.remove("is-visible");
      if (!("IntersectionObserver" in window)) return;
      overlayObserver = new IntersectionObserver((entries) => {
        const entry = entries[0];
        const show = !entry.isIntersecting && entry.boundingClientRect.top < 0;
        elements.overlay.classList.toggle("is-visible", show);
      }, { threshold: [0, 0.2, 0.6, 1], rootMargin: "-64px 0px 0px 0px" });
      overlayObserver.observe(elements.visualCard);
    }

    function loadLesson(index) {
      stopPlayback();
      clearAudioObjectUrl();
      activeLessonIndex = index;
      activeFrameIndex = 0;
      const lesson = getLesson();
      renderTabs();
      elements.lessonLabel.textContent = lesson.label;
      elements.lessonTitle.textContent = lesson.title;
      elements.lessonSummary.textContent = lesson.summary;
      elements.expectedFile.textContent = getExpectedAudioFile(lesson);
      elements.audio.removeAttribute("src");
      elements.audio.load();
      elements.audioFile.value = "";
      elements.audioHelp.textContent = "원음 파일이 없으면 브라우저 음성으로 대화를 들으며 그림 흐름을 확인할 수 있습니다.";
      elements.mainFilm.style.setProperty("--film-ratio", lesson.aspectRatio);
      elements.overlayFilm.style.setProperty("--film-ratio", "2.42 / 1");
      elements.filmImage.src = lesson.image;
      elements.overlayImage.src = lesson.image;
      elements.filmImage.alt = `${lesson.title} 그림`;
      elements.overlayImage.alt = "";
      renderFrameButtons();
      renderQuiz();
      setFrame(0, true);
      setupOverlayObserver();
    }

    elements.tabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-lesson-index]");
      if (!button) return;
      loadLesson(Number(button.dataset.lessonIndex));
    });

    elements.frameStrip.addEventListener("click", (event) => {
      const button = event.target.closest("[data-frame-index]");
      if (!button) return;
      setFrame(Number(button.dataset.frameIndex));
    });

    elements.audioFile.addEventListener("change", () => {
      stopPlayback();
      clearAudioObjectUrl();
      const file = elements.audioFile.files && elements.audioFile.files[0];
      if (!file) return;
      audioObjectUrl = URL.createObjectURL(file);
      elements.audio.src = audioObjectUrl;
      elements.audio.load();
      elements.audioHelp.textContent = `${file.name} 파일을 연결했습니다. 재생하면 그림 장면이 함께 움직입니다.`;
    });

    elements.audio.addEventListener("play", () => {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(syncFromAudio);
    });

    ["timeupdate", "seeked", "loadedmetadata"].forEach((eventName) => {
      elements.audio.addEventListener(eventName, () => {
        setFrame(getFrameIndexByTime(getLesson(), elements.audio.currentTime));
      });
    });

    elements.playAudio.addEventListener("click", () => {
      if (!elements.audio.src) {
        elements.audioHelp.textContent = "먼저 교재 MP3를 선택하거나, 음원 없이 대화 듣기를 사용하세요.";
        playTts();
        return;
      }
      stopPlayback();
      elements.audio.currentTime = 0;
      elements.audio.play().catch(() => {
        elements.audioHelp.textContent = "브라우저가 자동 재생을 막았습니다. 오디오 플레이어의 재생 버튼을 눌러 주세요.";
      });
    });

    elements.playTts.addEventListener("click", playTts);
    elements.stopAudio.addEventListener("click", stopPlayback);
    elements.checkQuiz.addEventListener("click", checkQuiz);
    elements.resetQuiz.addEventListener("click", resetQuiz);
    elements.overlay.addEventListener("click", () => {
      elements.visualCard.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    window.addEventListener("resize", () => setFrame(activeFrameIndex, true));
    elements.filmImage.addEventListener("load", () => setFrame(activeFrameIndex, true));
    elements.overlayImage.addEventListener("load", () => setFrame(activeFrameIndex, true));

    loadLesson(0);
  </script>
