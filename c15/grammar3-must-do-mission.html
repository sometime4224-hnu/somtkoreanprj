    <title>15과 문법 3 보조 활동 | 꼭 해야 해! 생활 조건 미션</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../shared/project-topbar-compact.css" />
    <style>
        :root {
            --bg-top: #ecfdf5;
            --bg-bottom: #fffaf0;
            --surface: rgba(255, 255, 255, 0.94);
            --surface-strong: #ffffff;
            --surface-soft: #f8fafc;
            --line: rgba(148, 163, 184, 0.22);
            --line-strong: rgba(16, 185, 129, 0.28);
            --text: #0f172a;
            --muted: #475569;
            --green: #059669;
            --green-strong: #047857;
            --green-soft: #ecfdf5;
            --green-line: #86efac;
            --amber: #f59e0b;
            --amber-soft: #fff7ed;
            --amber-line: #fdba74;
            --slate-soft: #f8fafc;
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            --vocab-accent: #047857;
            --vocab-soft: rgba(16, 185, 129, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(16, 185, 129, 0.12), transparent 30%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        }

        button,
        a {
            font: inherit;
        }

        .global-nav {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px max(16px, env(safe-area-inset-left)) 12px max(16px, env(safe-area-inset-right));
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .global-nav a,
        .global-nav span {
            color: #1e293b;
            text-decoration: none;
            font-size: 0.94rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .nav-divider {
            color: #94a3b8;
        }

        .shell {
            width: min(1120px, calc(100% - 16px));
            margin: 10px auto 36px;
        }

        .panel {
            background: var(--surface);
            border-radius: 22px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .hud-card {
            padding: 16px;
        }

        .hud-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .eyebrow {
            margin: 0;
            font-size: 0.74rem;
            font-weight: 900;
            color: var(--green-strong);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 4px 0 0;
            font-size: clamp(1.44rem, 3vw, 2.32rem);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }

        .hud-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .hud-dashboard {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(250px, 0.8fr);
            gap: 12px;
            margin-top: 14px;
            align-items: stretch;
        }

        .hud-status {
            display: grid;
            gap: 10px;
            min-width: 0;
        }

        .pill-btn,
        .footer-link {
            appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(255, 255, 255, 0.92);
            color: #334155;
            font-size: 0.84rem;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .pill-btn:hover,
        .footer-link:hover {
            transform: translateY(-1px);
            border-color: rgba(16, 185, 129, 0.28);
            background: rgba(236, 253, 245, 0.96);
        }

        .hud-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 0;
        }

        .stat-pill {
            min-height: 52px;
            padding: 10px 12px;
            border-radius: 16px;
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            border: 1px solid rgba(148, 163, 184, 0.18);
            display: grid;
            place-items: center;
            text-align: center;
        }

        .stat-pill strong {
            display: block;
            font-size: 1rem;
            font-weight: 900;
            color: #0f172a;
        }

        .stat-pill span {
            display: block;
            margin-top: 2px;
            font-size: 0.76rem;
            font-weight: 700;
            color: #64748b;
        }

        .progress {
            margin-top: 0;
            height: 8px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, #10b981, #f59e0b);
            transition: width 0.24s ease;
        }

        .flow-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 0;
        }

        .flow-step {
            min-height: 48px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #64748b;
            font-size: 0.8rem;
            font-weight: 800;
            text-align: center;
            display: grid;
            place-items: center;
            line-height: 1.3;
            position: relative;
            overflow: hidden;
        }

        .hud-dashboard .flow-strip {
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .hud-dashboard .flow-step {
            min-height: 0;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
        }

        .flow-step.is-active {
            background: var(--green-soft);
            border-color: rgba(16, 185, 129, 0.24);
            color: var(--green-strong);
            box-shadow: 0 10px 22px rgba(16, 185, 129, 0.14);
        }

        .flow-step.is-active::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 18%, rgba(255, 255, 255, 0.54) 48%, transparent 82%);
            transform: translateX(-120%);
            pointer-events: none;
            animation: flowScan 2.2s ease-in-out infinite;
        }

        .flow-step.is-done {
            background: #fffbeb;
            border-color: #fcd34d;
            color: #92400e;
        }

        .mission-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.55fr) minmax(280px, 0.95fr);
            gap: 12px;
            margin-top: 12px;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.18fr) minmax(320px, 0.82fr);
            grid-template-areas:
                "choice builder"
                "choice result";
            gap: 12px;
            margin-top: 12px;
            align-items: start;
        }

        .scene-panel,
        .mission-panel,
        .task-panel,
        .result-card,
        .summary {
            padding: 16px;
        }

        .scene-head,
        .section-bar,
        .result-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            position: relative;
        }

        .scene-tag,
        .state-badge,
        .task-badge,
        .result-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            padding: 0 12px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.01em;
        }

        .scene-tag {
            background: rgba(16, 185, 129, 0.14);
            color: var(--green-strong);
        }

        .state-badge,
        .task-badge {
            background: rgba(148, 163, 184, 0.12);
            color: #475569;
        }

        .state-badge.is-open,
        .task-badge.is-active {
            background: #ecfdf5;
            color: #166534;
        }

        .state-badge.is-done,
        .result-badge {
            background: #fffbeb;
            color: #92400e;
        }

        .scene-wrap {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            margin-top: 10px;
        }

        .scene-icon {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, #d1fae5, #fef3c7);
            color: var(--green-strong);
            font-size: 1.2rem;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .scene-title {
            margin: 0;
            font-size: 1.18rem;
            font-weight: 900;
            line-height: 1.25;
        }

        .scene-prompt {
            margin: 6px 0 0;
            color: #334155;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.56;
        }

        .scene-vi,
        .mission-vi,
        .result-vi {
            margin: 6px 0 0;
            color: #0f766e;
            font-size: 0.82rem;
            line-height: 1.6;
        }

        .notice-card {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            border: 1px solid rgba(16, 185, 129, 0.18);
        }

        .notice-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 900;
            color: var(--green-strong);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .notice-title {
            margin: 6px 0 0;
            font-size: 1rem;
            font-weight: 900;
        }

        .notice-body {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.58;
        }

        .mission-lock {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 12px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .mission-lock.is-open {
            background: #ecfdf5;
            border-color: #86efac;
        }

        .mission-lock.is-done {
            background: #fffbeb;
            border-color: #fcd34d;
        }

        .lock-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.92);
            color: var(--green-strong);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .lock-copy strong {
            display: block;
            font-size: 0.88rem;
            font-weight: 900;
        }

        .lock-copy span {
            display: block;
            margin-top: 3px;
            color: #64748b;
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1.45;
        }

        .mission-target {
            margin-top: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(248, 250, 252, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .mini-label {
            margin: 0 0 6px;
            color: var(--green-strong);
            font-size: 0.73rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .mission-target p {
            margin: 0;
            color: #334155;
            font-size: 0.93rem;
            font-weight: 700;
            line-height: 1.64;
        }

        .compact-feedback {
            min-height: 50px;
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(248, 250, 252, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.12);
            color: #475569;
            font-size: 0.84rem;
            font-weight: 800;
            line-height: 1.45;
            display: flex;
            align-items: center;
        }

        .compact-feedback.is-positive {
            background: #ecfdf5;
            border-color: #86efac;
            color: #166534;
        }

        .compact-feedback.is-negative {
            background: #fff7ed;
            border-color: #fdba74;
            color: #9a3412;
        }

        .task-panel,
        .result-card,
        .summary {
            position: relative;
            margin-top: 12px;
            overflow: visible;
            isolation: isolate;
            transition: transform 0.24s ease, opacity 0.24s ease, filter 0.24s ease, box-shadow 0.24s ease;
        }

        .activity-grid > .task-panel,
        .activity-grid > .result-card {
            margin-top: 0;
        }

        #choiceSection {
            grid-area: choice;
        }

        #builderSection {
            grid-area: builder;
        }

        #resultCard {
            grid-area: result;
        }

        .task-panel.is-rest,
        .result-card.is-rest {
            opacity: 0.62;
            filter: saturate(0.84);
            transform: scale(0.994);
        }

        .task-panel.is-current,
        .result-card.is-current {
            border-color: rgba(16, 185, 129, 0.28);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12), 0 24px 60px rgba(15, 23, 42, 0.08);
            transform: translateY(-2px);
        }

        .task-panel.is-current::before,
        .result-card.is-current::before {
            content: "↓ " attr(data-focus);
            position: absolute;
            top: -12px;
            right: 18px;
            z-index: 2;
            padding: 6px 12px;
            border-radius: 999px;
            background: linear-gradient(135deg, #047857, #10b981);
            color: #ffffff;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            box-shadow: 0 10px 22px rgba(16, 185, 129, 0.22);
            animation: focusFlag 1.5s ease-in-out infinite;
        }

        .task-panel.is-current::after,
        .result-card.is-current::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 24px;
            border: 1px solid rgba(16, 185, 129, 0.42);
            pointer-events: none;
            animation: pulseRing 1.8s ease-out infinite;
        }

        .section-bar h3 {
            margin: 0;
            font-size: 1.08rem;
            font-weight: 900;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            position: relative;
        }

        #choiceSection.is-current .choice-grid::before,
        #choiceSection.is-current .choice-grid::after,
        #builderSection.is-current .chunk-bank::before,
        #builderSection.is-current .chunk-bank::after {
            position: absolute;
            color: var(--green-strong);
            font-size: 1.12rem;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
            pointer-events: none;
        }

        #choiceSection.is-current .choice-grid::before,
        #builderSection.is-current .chunk-bank::before {
            content: "↓";
            top: -20px;
            left: 14px;
            animation: guideArrowDrop 1.05s ease-in-out infinite;
        }

        #choiceSection.is-current .choice-grid::after,
        #builderSection.is-current .chunk-bank::after {
            content: "↓";
            top: -8px;
            left: 32px;
            opacity: 0.76;
            animation: guideArrowDrop 1.05s ease-in-out infinite 0.18s;
        }

        .choice-card {
            appearance: none;
            width: 100%;
            min-height: 104px;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: left;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        #choiceSection.is-current .choice-card:not(.is-wrong):not(.is-correct) {
            border-color: #86efac;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
            animation: choiceFloat 2.8s ease-in-out infinite;
            animation-delay: calc(var(--i, 0) * 0.08s);
        }

        #choiceSection.is-current .choice-card:not(.is-wrong):not(.is-correct) .choice-icon {
            animation: iconPulse 1.5s ease-in-out infinite;
        }

        .choice-card:hover {
            transform: translateY(-1px);
            border-color: rgba(16, 185, 129, 0.26);
        }

        .choice-card.is-correct {
            background: #ecfdf5;
            border-color: #34d399;
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.12);
        }

        .choice-card.is-wrong {
            background: #fff7ed;
            border-color: #fb923c;
        }

        .choice-card.is-dim {
            opacity: 0.68;
        }

        .choice-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: #f0fdf4;
            color: var(--green-strong);
            font-size: 0.92rem;
            flex-shrink: 0;
        }

        .choice-copy strong {
            display: block;
            font-size: 0.9rem;
            font-weight: 900;
            line-height: 1.4;
            color: #0f172a;
        }

        .choice-copy span {
            display: block;
            margin-top: 4px;
            color: #64748b;
            font-size: 0.79rem;
            font-weight: 700;
            line-height: 1.38;
        }

        .feedback-box {
            margin-top: 10px;
            padding: 11px 12px;
            border-radius: 16px;
            font-size: 0.86rem;
            font-weight: 800;
            line-height: 1.52;
        }

        .feedback-box.is-positive {
            background: #ecfdf5;
            border: 1px solid #86efac;
            color: #166534;
        }

        .feedback-box.is-negative {
            background: #fff7ed;
            border: 1px solid #fdba74;
            color: #9a3412;
        }

        .sentence-preview {
            min-height: 64px;
            padding: 12px;
            border-radius: 18px;
            border: 1px dashed rgba(148, 163, 184, 0.7);
            background: #f8fafc;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sentence-placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 800;
        }

        .preview-chip,
        .chunk-btn {
            appearance: none;
            min-height: 38px;
            padding: 9px 12px;
            border-radius: 999px;
            font-size: 0.83rem;
            font-weight: 800;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .preview-chip {
            border: 1px solid var(--green-line);
            background: var(--green-soft);
            color: var(--green-strong);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .chunk-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            position: relative;
        }

        .chunk-btn {
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: #ffffff;
            color: #334155;
            cursor: pointer;
        }

        .chunk-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(16, 185, 129, 0.26);
            background: #f0fdf4;
        }

        .chunk-btn:disabled {
            cursor: not-allowed;
            opacity: 0.44;
            transform: none;
            background: #f8fafc;
        }

        #builderSection.is-current .sentence-preview {
            border-color: #86efac;
            background: linear-gradient(180deg, #ffffff, #ecfdf5);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.8), 0 14px 30px rgba(15, 23, 42, 0.05);
        }

        #builderSection.is-current .sentence-placeholder {
            color: var(--green-strong);
            animation: softBlink 1.2s ease-in-out infinite;
        }

        #builderSection.is-current .preview-chip {
            box-shadow: 0 10px 24px rgba(16, 185, 129, 0.14);
        }

        #builderSection.is-current .chunk-btn:not(:disabled) {
            border-color: #86efac;
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
            animation: chunkWave 2.2s ease-in-out infinite;
            animation-delay: calc(var(--i, 0) * 0.08s);
        }

        .section-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .primary-btn,
        .ghost-btn {
            appearance: none;
            min-height: 42px;
            padding: 0 14px;
            border-radius: 12px;
            font-size: 0.86rem;
            font-weight: 900;
            cursor: pointer;
        }

        .primary-btn {
            border: none;
            background: linear-gradient(135deg, #059669, #10b981);
            color: #ffffff;
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.22);
        }

        .primary-btn:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            box-shadow: none;
        }

        .primary-btn.is-current {
            position: relative;
            isolation: isolate;

            0% {

            25% {

            }
            100% {

            0%, 100% {

            }
            50% {
                transform: translateY(-2px);
            }
        }

        @keyframes guideArrowDrop {
            0%, 100% {
                transform: translateY(-3px);
                opacity: 0.5;
            }
            50% {
                transform: translateY(6px);
                opacity: 1;
            }
        }

            }
        }

        @keyframes focusFlag {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }

            }
            50% {

            }

        @keyframes iconPulse {

            }
            50% {
                transform: scale(1.08);
            }
        }

        @keyframes chunkWave {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }

        @keyframes softBlink {
            0%, 100% {
                opacity: 0.58;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes cueBlink {
            0%, 100% {
                transform: translateY(0);
                opacity: 1;
            }
            50% {
                transform: translateY(-2px);
                opacity: 0.9;
            }
        }

        @keyframes resultGlow {
            0%, 100% {
                text-shadow: 0 0 0 rgba(245, 158, 11, 0);
            }
            50% {
                text-shadow: 0 0 16px rgba(245, 158, 11, 0.26);
            }

        @media (max-width: 980px) {

            }

            .footer-links .footer-link {
                flex: 1 1 calc(50% - 5px);
            }
        }

                "비용": "chi phí, khoản tiền",
                "해결": "giải quyết, xử lý xong",
                "복구": "khôi phục, sửa lại như cũ",
                "면접": "phỏng vấn, buổi tuyển chọn",
                "복장": "trang phục, quần áo mặc",
                "공지": "thông báo, tin báo",
                "신입생": "tân sinh viên, sinh viên mới",
                "최소": "tối thiểu, ít nhất",
                "기준": "tiêu chuẩn, mức chuẩn",
                "개론": "nhập môn, tổng quan cơ bản",
                "미납": "chưa nộp, còn nợ",
                "필수": "bắt buộc, nhất thiết cần có",
                "규정": "quy định, điều lệ",
                "충족": "đáp ứng đủ, làm cho đủ",
                "황사": "bụi vàng, cát bụi sa mạc",
                "보호": "bảo vệ, che chắn",
                "현실적": "thực tế, sát với hoàn cảnh"
            };

            const vocabTerms = Object.keys(vocabGlossary).sort(function (a, b) {
                return b.length - a.length;
            });

            const refs = {
                page: document.getElementById("page"),
                viToggleBtn: document.getElementById("viToggleBtn"),
                restartBtn: document.getElementById("restartBtn"),
                restartSummaryBtn: document.getElementById("restartSummaryBtn"),
                missionCount: document.getElementById("missionCount"),
                solvedCount: document.getElementById("solvedCount"),
                attemptCount: document.getElementById("attemptCount"),
                progressFill: document.getElementById("progressFill"),
                flowStep1: document.getElementById("flowStep1"),
                flowStep2: document.getElementById("flowStep2"),
                flowStep3: document.getElementById("flowStep3"),
                missionStage: document.getElementById("missionStage"),
                sceneTag: document.getElementById("sceneTag"),
                sceneState: document.getElementById("sceneState"),
                sceneIcon: document.getElementById("sceneIcon"),
                sceneTitle: document.getElementById("sceneTitle"),
                scenePrompt: document.getElementById("scenePrompt"),
                scenePromptVi: document.getElementById("scenePromptVi"),
                noticeCard: document.getElementById("noticeCard"),
                missionLock: document.getElementById("missionLock"),
                lockIcon: document.getElementById("lockIcon"),
                lockTitle: document.getElementById("lockTitle"),
                lockCopy: document.getElementById("lockCopy"),
                missionNeed: document.getElementById("missionNeed"),
                missionNeedVi: document.getElementById("missionNeedVi"),
                missionFeedback: document.getElementById("missionFeedback"),
                choiceSection: document.getElementById("choiceSection"),
                choiceStatus: document.getElementById("choiceStatus"),
                choiceGrid: document.getElementById("choiceGrid"),
                choiceFeedback: document.getElementById("choiceFeedback"),
                builderSection: document.getElementById("builderSection"),
                builderStatus: document.getElementById("builderStatus"),
                sentencePreview: document.getElementById("sentencePreview"),
                chunkBank: document.getElementById("chunkBank"),
                checkSentenceBtn: document.getElementById("checkSentenceBtn"),
                resetSentenceBtn: document.getElementById("resetSentenceBtn"),
                builderFeedback: document.getElementById("builderFeedback"),
                resultCard: document.getElementById("resultCard"),
                resultSentence: document.getElementById("resultSentence"),
                resultSentenceVi: document.getElementById("resultSentenceVi"),
                resultTip: document.getElementById("resultTip"),
                nextMissionBtn: document.getElementById("nextMissionBtn"),
                summarySection: document.getElementById("summarySection"),
                summarySolved: document.getElementById("summarySolved"),
                summaryAttempts: document.getElementById("summaryAttempts"),
                summaryFirstClear: document.getElementById("summaryFirstClear"),
                summaryList: document.getElementById("summaryList"),
                vocabCard: document.getElementById("vocabCard"),
                vocabCloseBtn: document.getElementById("vocabCloseBtn"),
                vocabTerm: document.getElementById("vocabTerm"),
                vocabMeaning: document.getElementById("vocabMeaning")
            };

            function createBaseState() {
                return {
                    viOn: false,
                    currentIndex: 0,
                    totalAttempts: 0,
                    clearedCount: 0,
                    choiceCorrect: false,
                    sentenceSolved: false,
                    wrongChoiceIndexes: [],
                    selectedChunks: [],
                    chunkPool: [],
                    choiceFeedback: null,
                    builderFeedback: null,
                    logs: [],
                    summaryMode: false,
                    choiceAttemptCount: 0,
                    sentenceAttemptCount: 0
                };
            }

            let state = createBaseState();
            let activeVocabToken = null;

            function shuffle(items) {
                const cloned = items.slice();
                for (let i = cloned.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const temp = cloned[i];
                    cloned[i] = cloned[j];
                    cloned[j] = temp;
                }
                return cloned;
            }

            function currentMission() {
                return missions[state.currentIndex];
            }

            function resetMissionState() {
                const mission = currentMission();
                state.choiceCorrect = false;
                state.sentenceSolved = false;
                state.wrongChoiceIndexes = [];
                state.selectedChunks = [];
                state.chunkPool = shuffle(
                    mission.chunks.map(function (chunk, index) {
                        return { id: mission.id + "-chunk-" + index, text: chunk };
                    })
                );
                state.choiceFeedback = null;
                state.builderFeedback = null;
                state.choiceAttemptCount = 0;
                state.sentenceAttemptCount = 0;
                refs.resultCard.classList.add("hidden");
            }

            function hideFeedback(el) {
                el.className = "feedback-box hidden";
                el.innerHTML = "";
            }

            function setFeedback(el, type, text) {
                el.className = "feedback-box " + (type === "positive" ? "is-positive" : "is-negative");
                el.innerHTML = annotateText(text);
            }

            function setMissionFeedback(type, text) {
                refs.missionFeedback.className = "compact-feedback" + (type ? " is-" + type : "");
                refs.missionFeedback.innerHTML = annotateText(text);
            }

            function escapeHtml(text) {
                return String(text == null ? "" : text)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function annotateText(text) {
                const raw = String(text == null ? "" : text);
                let html = "";
                let index = 0;

                while (index < raw.length) {
                    const term = vocabTerms.find(function (item) {
                        return raw.slice(index, index + item.length) === item;
                    });

                    if (term) {
                        html += '<span class="vocab-token" role="button" tabindex="0" data-term="' + escapeHtml(term) + '" data-vi="' + escapeHtml(vocabGlossary[term]) + '">' + escapeHtml(term) + "</span>";
                        index += term.length;
                        continue;
                    }

                    html += escapeHtml(raw[index]);
                    index += 1;
                }

                return html;
            }

            function hideVocabCard() {
                if (activeVocabToken) {
                    activeVocabToken.classList.remove("is-active");
                }
                activeVocabToken = null;
                refs.vocabCard.classList.remove("is-visible");
                refs.vocabCard.setAttribute("aria-hidden", "true");
            }

            function syncVocabCard() {
                if (activeVocabToken && activeVocabToken.isConnected) {
                    return;
                }
                hideVocabCard();
            }

            function toggleVocabCard(token) {
                if (activeVocabToken === token && refs.vocabCard.classList.contains("is-visible")) {
                    hideVocabCard();
                    return;
                }

                if (activeVocabToken) {
                    activeVocabToken.classList.remove("is-active");
                }

                activeVocabToken = token;
                activeVocabToken.classList.add("is-active");
                refs.vocabTerm.textContent = token.dataset.term || token.textContent.trim();
                refs.vocabMeaning.textContent = token.dataset.vi || "";
                refs.vocabCard.classList.add("is-visible");
                refs.vocabCard.setAttribute("aria-hidden", "false");
            }

            function scrollToTarget(target) {
                window.requestAnimationFrame(function () {
                    target.scrollIntoView({ behavior: "smooth", block: "nearest" });
                });
            }

            function pulseCurrentButton() {
                refs.checkSentenceBtn.classList.remove("is-current");
                refs.nextMissionBtn.classList.remove("is-current");
                refs.checkSentenceBtn.removeAttribute("data-hint");
                refs.nextMissionBtn.removeAttribute("data-hint");
                if (!state.choiceCorrect) {
                    return;
                }
                if (!state.sentenceSolved && !refs.checkSentenceBtn.disabled) {
                    refs.checkSentenceBtn.classList.add("is-current");
                    refs.checkSentenceBtn.dataset.hint = "지금 확인";
                } else if (state.sentenceSolved) {
                    refs.nextMissionBtn.classList.add("is-current");
                    refs.nextMissionBtn.dataset.hint = "다음 이동";
                }
            }

            function renderHud() {
                const missionNumber = Math.min(state.currentIndex + 1, missions.length);
                refs.missionCount.textContent = missionNumber + " / " + missions.length;
                refs.solvedCount.textContent = state.clearedCount + "개";
                refs.attemptCount.textContent = state.totalAttempts + "번";
                refs.progressFill.style.width = ((state.summaryMode ? missions.length : state.currentIndex) / missions.length * 100) + "%";
                refs.page.classList.toggle("vi-on", state.viOn);
                refs.viToggleBtn.innerHTML = state.viOn
                    ? '<i class="fa-solid fa-language"></i>VI ON'
                    : '<i class="fa-solid fa-language"></i>VI OFF';
            }

            function renderFlow() {
                refs.flowStep1.className = "flow-step";
                refs.flowStep2.className = "flow-step";
                refs.flowStep3.className = "flow-step";

                if (state.summaryMode) {
                    refs.flowStep1.classList.add("is-done");
                    refs.flowStep2.classList.add("is-done");
                    refs.flowStep3.classList.add("is-done");
                    return;
                }

                refs.flowStep1.classList.add(state.choiceCorrect ? "is-done" : "is-active");
                if (state.choiceCorrect && !state.sentenceSolved) {
                    refs.flowStep2.classList.add("is-active");
                } else if (state.sentenceSolved) {
                    refs.flowStep2.classList.add("is-done");
                }
                if (state.sentenceSolved) {
                    refs.flowStep3.classList.add("is-active");
                }
            }

            function renderScene() {
                const mission = currentMission();
                refs.sceneTag.textContent = mission.tag;
                refs.sceneTitle.innerHTML = annotateText(mission.title);
                refs.scenePrompt.innerHTML = annotateText(mission.prompt);
                refs.scenePromptVi.textContent = mission.promptVi;
                refs.sceneIcon.innerHTML = '<i class="fa-solid fa-' + mission.icon + '"></i>';
                refs.noticeCard.innerHTML =
                    '<span class="notice-label"><i class="fa-solid fa-bell"></i>' + escapeHtml(mission.noticeLabel) + "</span>" +
                    '<p class="notice-title">' + annotateText(mission.noticeTitle) + "</p>" +
                    '<p class="notice-body">' + annotateText(mission.noticeBody) + "</p>";

                if (state.sentenceSolved) {
                    refs.sceneState.className = "state-badge is-done";
                    refs.sceneState.textContent = "해결 완료";
                } else if (state.choiceCorrect) {
                    refs.sceneState.className = "state-badge is-open";
                    refs.sceneState.textContent = "문장 완성";
                } else {
                    refs.sceneState.className = "state-badge";
                    refs.sceneState.textContent = "필수 조건 찾기";
                }

                refs.missionNeed.innerHTML = annotateText(mission.need);
                refs.missionNeedVi.textContent = mission.needVi;

                if (state.sentenceSolved) {
                    refs.missionLock.className = "mission-lock is-done";
                    refs.lockIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                    refs.lockTitle.textContent = "해결 완료";
                    refs.lockCopy.innerHTML = annotateText("필수 행동과 문장을 모두 맞혀서 미션을 끝냈어요.");
                    setMissionFeedback("positive", "이 미션은 해결 완료예요. 다음 상황으로 넘어갈 수 있어요.");
                } else if (state.choiceCorrect) {
                    refs.missionLock.className = "mission-lock is-open";
                    refs.lockIcon.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
                    refs.lockTitle.textContent = "문장만 남았어요";
                    refs.lockCopy.innerHTML = annotateText("이제 문장을 완성하면 해결이 열립니다.");
                    setMissionFeedback("positive", "필수 행동을 찾았어요. 아래에서 문장을 완성해 보세요.");
                } else if (state.choiceFeedback && state.choiceFeedback.type === "negative") {
                    refs.missionLock.className = "mission-lock";
                    refs.lockIcon.innerHTML = '<i class="fa-solid fa-lock"></i>';
                    refs.lockTitle.textContent = "아직 잠겨 있어요";
                    refs.lockCopy.innerHTML = annotateText("필수 조건이 아닌 행동을 고르면 해결이 열리지 않아요.");
                    setMissionFeedback("negative", "아직 해결 조건이 아니에요. 다시 골라 보세요.");
                } else {
                    refs.missionLock.className = "mission-lock";
                    refs.lockIcon.innerHTML = '<i class="fa-solid fa-lock"></i>';
                    refs.lockTitle.textContent = "해결 잠금";
                    refs.lockCopy.innerHTML = annotateText("필수 행동과 문장을 모두 맞히면 해결됩니다.");
                    setMissionFeedback("", "지금은 해결 조건을 찾는 단계예요.");
                }
            }

            function renderChoices() {
                const mission = currentMission();
                refs.choiceStatus.className = "task-badge" + (state.choiceCorrect ? " is-active" : "");
                refs.choiceStatus.textContent = state.choiceCorrect ? "선택 완료" : "Step 1";
                refs.choiceGrid.innerHTML = mission.options.map(function (option, index) {
                    let classes = "choice-card";
                    if (state.choiceCorrect && option.correct) {
                        classes += " is-correct";
                    } else if (state.wrongChoiceIndexes.indexOf(index) > -1) {
                        classes += " is-wrong";
                    } else if (state.choiceCorrect && !option.correct) {
                        classes += " is-dim";
                    }

                    return (
                        '<button type="button" class="' + classes + '" data-choice-index="' + index + '" style="--i:' + index + '">' +
                        '<div class="choice-icon" aria-hidden="true"><i class="fa-solid fa-' + escapeHtml(option.icon) + '"></i></div>' +
                        '<div class="choice-copy"><strong>' + annotateText(option.text) + '</strong><span>' + annotateText(option.detail) + "</span></div>" +
                        "</button>"
                    );
                }).join("");

                refs.choiceGrid.querySelectorAll("[data-choice-index]").forEach(function (button) {
                    button.addEventListener("click", function (event) {
                        if (event.target.closest(".vocab-token")) {
                            return;
                        }
                        const index = Number(button.dataset.choiceIndex);
                        handleChoice(index);
                    });
                });

                if (!state.choiceFeedback) {
                    hideFeedback(refs.choiceFeedback);
                    return;
                }
                setFeedback(refs.choiceFeedback, state.choiceFeedback.type, state.choiceFeedback.text);
            }

            function renderBuilder() {
                const mission = currentMission();
                refs.builderStatus.className = "task-badge" + (state.choiceCorrect && !state.sentenceSolved ? " is-active" : "");
                refs.builderStatus.textContent = state.sentenceSolved ? "완성됨" : (state.choiceCorrect ? "Step 2" : "대기");

                if (!state.selectedChunks.length) {
                    refs.sentencePreview.innerHTML = '<span class="sentence-placeholder">문장 조각을 순서대로 눌러서 완성하세요.</span>';
                } else {
                    refs.sentencePreview.innerHTML = state.selectedChunks.map(function (chunk, index) {
                        return '<button type="button" class="preview-chip" data-preview-index="' + index + '">' +
                            escapeHtml(chunk.text) + ' <i class="fa-solid fa-rotate-left" aria-hidden="true"></i></button>';
                    }).join("");
                }

                refs.sentencePreview.querySelectorAll("[data-preview-index]").forEach(function (button) {
                    button.addEventListener("click", function () {
                        if (state.sentenceSolved) {
                            return;
                        }
                        const index = Number(button.dataset.previewIndex);
                        state.chunkPool.push(state.selectedChunks[index]);
                        state.selectedChunks.splice(index, 1);
                        render();
                    });
                });

                refs.chunkBank.innerHTML = state.chunkPool.map(function (chunk, index) {
                    return '<button type="button" class="chunk-btn" data-chunk-index="' + index + '" style="--i:' + index + '"' +
                        (!state.choiceCorrect || state.sentenceSolved ? " disabled" : "") + ">" +
                        escapeHtml(chunk.text) + "</button>";
                }).join("");

                refs.chunkBank.querySelectorAll("[data-chunk-index]").forEach(function (button) {
                    button.addEventListener("click", function () {
                        if (!state.choiceCorrect || state.sentenceSolved) {
                            return;
                        }
                        const index = Number(button.dataset.chunkIndex);
                        state.selectedChunks.push(state.chunkPool[index]);
                        state.chunkPool.splice(index, 1);
                        render();
                    });
                });

                refs.checkSentenceBtn.disabled = !state.choiceCorrect || state.sentenceSolved || state.selectedChunks.length !== mission.chunks.length;

                if (!state.builderFeedback) {
                    hideFeedback(refs.builderFeedback);
                    return;
                }
                setFeedback(refs.builderFeedback, state.builderFeedback.type, state.builderFeedback.text);
            }

            function renderCurrentSections() {
                [refs.choiceSection, refs.builderSection, refs.resultCard].forEach(function (section) {
                    section.classList.remove("is-current", "is-rest");
                    section.removeAttribute("data-focus");
                });

                if (state.summaryMode) {
                    return;
                }
                if (!state.choiceCorrect) {
                    refs.choiceSection.classList.add("is-current");
                    refs.choiceSection.dataset.focus = "지금 선택";
                    refs.builderSection.classList.add("is-rest");
                } else if (!state.sentenceSolved) {
                    refs.builderSection.classList.add("is-current");
                    refs.builderSection.dataset.focus = "지금 조합";
                    refs.choiceSection.classList.add("is-rest");
                } else {
                    refs.resultCard.classList.add("is-current");
                    refs.resultCard.dataset.focus = "지금 다음";
                    refs.choiceSection.classList.add("is-rest");
                    refs.builderSection.classList.add("is-rest");
                }
            }

            function renderResult() {
                const mission = currentMission();
                if (!state.sentenceSolved) {
                    refs.resultCard.classList.add("hidden");
                    return;
                }

                refs.resultCard.classList.remove("hidden");
                refs.resultSentence.innerHTML = annotateText(mission.answer);
                refs.resultSentenceVi.textContent = mission.answerVi;
                refs.resultTip.innerHTML = annotateText(mission.tip);
                refs.nextMissionBtn.textContent = state.currentIndex === missions.length - 1 ? "결과 보기" : "다음 미션";
            }

            function renderSummary() {
                const firstClearCount = state.logs.filter(function (log) {
                    return log && log.wrongChoices === 0 && log.wrongSentence === 0;
                }).length;

                refs.summarySolved.textContent = String(state.clearedCount);
                refs.summaryAttempts.textContent = String(state.totalAttempts);
                refs.summaryFirstClear.textContent = String(firstClearCount);
                refs.summaryList.innerHTML = state.logs.map(function (log) {
                    return (
                        '<div class="summary-item">' +
                        '<div class="summary-item-top"><strong>' + escapeHtml(log.title) + '</strong>' +
                        '<span class="summary-pill">시도 ' + escapeHtml(String(log.attempts)) + "번</span></div>" +
                        '<p class="summary-answer">' + annotateText(log.answer) + "</p>" +
                        "</div>"
                    );
                }).join("");
            }

            function render() {
                renderHud();
                renderFlow();

                if (state.summaryMode) {
                    refs.missionStage.classList.add("hidden");
                    refs.summarySection.classList.remove("hidden");
                    renderSummary();
                    syncVocabCard();
                    return;
                }

                refs.missionStage.classList.remove("hidden");
                refs.summarySection.classList.add("hidden");
                renderScene();
                renderChoices();
                renderBuilder();
                renderResult();
                renderCurrentSections();
                pulseCurrentButton();
                syncVocabCard();
            }

            function handleChoice(index) {
                const mission = currentMission();
                const option = mission.options[index];
                if (state.choiceCorrect || state.summaryMode) {
                    return;
                }

                state.totalAttempts += 1;
                state.choiceAttemptCount += 1;

                if (option.correct) {
                    state.choiceCorrect = true;
                    state.choiceFeedback = {
                        type: "positive",
                        text: option.reason + " 문장 완성으로 바로 이어 가세요."
                    };
                    render();
                    scrollToTarget(refs.builderSection);
                    return;
                }

                if (state.wrongChoiceIndexes.indexOf(index) === -1) {
                    state.wrongChoiceIndexes.push(index);
                }
                state.choiceFeedback = {
                    type: "negative",
                    text: option.reason
                };
                render();
                scrollToTarget(refs.choiceSection);
            }

            function checkSentence() {
                const mission = currentMission();
                if (!state.choiceCorrect || state.sentenceSolved || state.selectedChunks.length !== mission.chunks.length) {
                    return;
                }

                state.totalAttempts += 1;
                state.sentenceAttemptCount += 1;

                const selected = state.selectedChunks.map(function (chunk) { return chunk.text; });
                const correct = selected.every(function (text, index) {
                    return text === mission.chunks[index];
                });

                if (!correct) {
                    state.builderFeedback = {
                        type: "negative",
                        text: "순서를 조금 바꾸면 돼요. 문장 덩어리를 다시 맞춰 보세요."
                    };
                    render();
                    scrollToTarget(refs.builderSection);
                    return;
                }

                state.sentenceSolved = true;
                state.clearedCount += 1;
                state.builderFeedback = {
                    type: "positive",
                    text: "문장이 완성됐어요. 이제 실제 상황에서도 그대로 쓸 수 있어요."
                };
                state.logs[state.currentIndex] = {
                    title: mission.title,
                    answer: mission.answer,
                    attempts: state.choiceAttemptCount + state.sentenceAttemptCount,
                    wrongChoices: state.wrongChoiceIndexes.length,
                    wrongSentence: state.sentenceAttemptCount - 1
                };
                render();
                scrollToTarget(refs.resultCard);
            }

            function resetSentenceBuilder() {
                if (state.sentenceSolved) {
                    return;
                }
                state.chunkPool = shuffle(state.chunkPool.concat(state.selectedChunks));
                state.selectedChunks = [];
                state.builderFeedback = null;
                render();
            }

            function showSummary() {
                state.summaryMode = true;
                render();
                scrollToTarget(refs.summarySection);
            }

            function nextMission() {
                if (!state.sentenceSolved) {
                    return;
                }

                if (state.currentIndex === missions.length - 1) {
                    showSummary();
                    return;
                }

                state.currentIndex += 1;
                resetMissionState();
                render();
                scrollToTarget(refs.missionStage);
            }

            function restartSession() {
                if (state.totalAttempts > 0 && !window.confirm("문법 3 보조 활동을 처음부터 다시 시작할까요?")) {
                    return;
                }
                state = createBaseState();
                resetMissionState();
                render();
                scrollToTarget(refs.page);
            }

            refs.viToggleBtn.addEventListener("click", function () {
                state.viOn = !state.viOn;
                renderHud();
            });

            refs.restartBtn.addEventListener("click", restartSession);
            refs.restartSummaryBtn.addEventListener("click", restartSession);
            refs.checkSentenceBtn.addEventListener("click", checkSentence);
            refs.resetSentenceBtn.addEventListener("click", resetSentenceBuilder);
            refs.nextMissionBtn.addEventListener("click", nextMission);
            refs.vocabCloseBtn.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                hideVocabCard();
            });

            document.addEventListener("click", function (event) {
                const token = event.target.closest(".vocab-token");
                if (token) {
                    event.preventDefault();
                    event.stopPropagation();
                    toggleVocabCard(token);
                    return;
                }
                if (!event.target.closest("#vocabCard")) {
                    hideVocabCard();
                }
            });

            document.addEventListener("keydown", function (event) {
                const token = event.target.closest(".vocab-token");
                if (token && (event.key === "Enter" || event.key === " ")) {
                    event.preventDefault();
                    toggleVocabCard(token);
                    return;
                }
                if (event.key === "Escape") {
                    hideVocabCard();
                }
            });

            resetMissionState();
            render();
        })();
    </script>
</body>
</html>
