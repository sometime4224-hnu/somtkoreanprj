<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>15과 문법 1 교사용 | 응급 상황 조치</title>
    <style>
        :root {
            --bg: #fff8f2;
            --panel: #ffffff;
            --line: #ecd9ca;
            --text: #1f2937;
            --muted: #7c6f64;
            --red: #dc2626;
            --red-soft: #fee2e2;
            --blue: #2563eb;
            --blue-soft: #dbeafe;
            --green: #047857;
            --green-soft: #d1fae5;
            --orange: #ea580c;
            --orange-soft: #ffedd5;
            --shadow: 0 14px 30px rgba(31, 41, 55, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            background:
                radial-gradient(circle at top, rgba(254, 226, 226, 0.92), rgba(255, 248, 242, 0.65) 34%, rgba(255, 248, 242, 1) 62%),
                #fff8f2;
            color: var(--text);
            font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        button {
            font: inherit;
        }

        [hidden] {
            display: none !important;
        }

        .app {
            width: min(100%, 760px);
            margin: 0 auto;
            padding: 10px 8px calc(24px + env(safe-area-inset-bottom));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 4px 2px 10px;
            background: linear-gradient(180deg, rgba(255, 248, 242, 0.98), rgba(255, 248, 242, 0.92));
            backdrop-filter: blur(8px);
        }

        .back-link,
        .reset-btn {
            appearance: none;
            border: 0;
            background: none;
            padding: 0;
            color: var(--blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
        }

        .progress {
            color: var(--muted);
            font-size: 14px;
            font-weight: 900;
            white-space: nowrap;
        }

        .scene {
            padding: 6px 4px 4px;
        }

        .scene__title {
            margin: 0;
            font-size: clamp(24px, 6vw, 36px);
            line-height: 1.28;
            font-weight: 900;
            letter-spacing: -0.03em;
        }

        .scene__board {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 148px));
            justify-content: center;
            align-items: start;
            gap: 8px;
            margin-top: 10px;
        }

        .scene-card {
            position: relative;
            align-self: start;
            overflow: hidden;
            border-radius: 22px;
            background: var(--panel);
            box-shadow: var(--shadow);
            isolation: isolate;
        }

        .scene-card::before {
            content: "";
            position: absolute;
            inset: 8px;
            z-index: 0;
            border-radius: 18px;
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
        }

        .scene-card::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 4;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 22px;
            pointer-events: none;
        }

        .scene-card img {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: auto;
        }

        .scene-card__icon {
            position: relative;
            z-index: 1;
            display: grid;
            place-items: center;
            width: 100%;
            aspect-ratio: 1 / 1;
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0) 30%),
                linear-gradient(180deg, #fff1f2 0%, #fee2e2 100%);
            font-size: clamp(52px, 16vw, 110px);
            line-height: 1;
        }

        .scene-card__burst {
            position: absolute;
            z-index: 3;
            display: grid;
            place-items: center;
            width: 46px;
            height: 46px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.14);
            font-size: 27px;
            line-height: 1;
            animation: emergencyBurst 1.25s ease-in-out infinite;
        }

        .scene-card__burst--a {
            top: 10px;
            right: 10px;
        }

        .scene-card__burst--b {
            left: 10px;
            bottom: 10px;
            animation-delay: 0.36s;
        }

        .scene-card__icon.is-calm {
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0) 30%),
                linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
        }

        .scene-card.is-heat::before {
            opacity: 1;
            transform: scale(1);
            background:
                radial-gradient(circle at 26% 18%, rgba(255, 245, 157, 0.96), rgba(255, 245, 157, 0) 34%),
                radial-gradient(circle at 70% 75%, rgba(251, 146, 60, 0.88), rgba(251, 146, 60, 0) 38%),
                linear-gradient(180deg, rgba(254, 240, 138, 0.38) 0%, rgba(251, 146, 60, 0.34) 100%);
            animation: heatGlow 1.1s ease-in-out infinite;
        }

        .scene-card.is-heat img,
        .scene-card.is-heat .scene-card__icon {
            transform-origin: center 82%;
            animation: heatSway 1.3s ease-in-out infinite;
            filter: saturate(1.08) contrast(1.04);
        }

        .scene-card.is-fire::before {
            opacity: 1;
            transform: scale(1);
            background:
                radial-gradient(circle at 24% 28%, rgba(254, 226, 226, 0.94), rgba(254, 226, 226, 0) 28%),
                radial-gradient(circle at 72% 72%, rgba(239, 68, 68, 0.86), rgba(239, 68, 68, 0) 40%),
                linear-gradient(180deg, rgba(255, 237, 213, 0.42) 0%, rgba(248, 113, 113, 0.42) 100%);
            animation: firePulse 0.88s ease-in-out infinite;
        }

        .scene-card.is-fire img,
        .scene-card.is-fire .scene-card__icon {
            animation: fireHop 0.95s ease-in-out infinite;
            filter: drop-shadow(0 0 18px rgba(239, 68, 68, 0.3));
        }

        .scene-card.is-sick::before {
            opacity: 1;
            transform: scale(1);
            background:
                radial-gradient(circle at 28% 22%, rgba(191, 219, 254, 0.94), rgba(191, 219, 254, 0) 34%),
                radial-gradient(circle at 74% 74%, rgba(96, 165, 250, 0.76), rgba(96, 165, 250, 0) 42%),
                linear-gradient(180deg, rgba(224, 242, 254, 0.52) 0%, rgba(191, 219, 254, 0.4) 100%);
            animation: sickPulse 1.5s ease-in-out infinite;
        }

        .scene-card.is-sick img,
        .scene-card.is-sick .scene-card__icon {
            transform-origin: center 80%;
            animation: sickTilt 1.7s ease-in-out infinite;
            filter: saturate(0.92) contrast(1.02);
        }

        .scene-card.is-injury::before {
            opacity: 1;
            transform: scale(1);
            background:
                radial-gradient(circle at 26% 18%, rgba(254, 226, 226, 0.94), rgba(254, 226, 226, 0) 32%),
                radial-gradient(circle at 74% 76%, rgba(251, 146, 60, 0.8), rgba(251, 146, 60, 0) 40%),
                linear-gradient(180deg, rgba(255, 237, 213, 0.38) 0%, rgba(254, 226, 226, 0.44) 100%);
            animation: injuryPulse 0.96s ease-in-out infinite;
        }

        .scene-card.is-injury img,
        .scene-card.is-injury .scene-card__icon {
            transform-origin: center 82%;
            animation: injuryJolt 1.06s ease-in-out infinite;
            filter: saturate(1.02) contrast(1.04);
        }

        .scene-card__label {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 5;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.94);
            font-size: 13px;
            font-weight: 900;
            color: #334155;
            box-shadow: 0 5px 10px rgba(31, 41, 55, 0.1);
        }

        .callline {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 134px;
            margin-top: 10px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--shadow);
        }

        .callline__messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .callline__row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            width: 100%;
        }

        .callline__row.is-self {
            justify-content: flex-end;
        }

        .callline__role {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
            max-width: 96px;
            padding: 7px 10px;
            border-radius: 999px;
            background: var(--red-soft);
            color: var(--red);
            font-size: 13px;
            font-weight: 900;
            line-height: 1.2;
            text-align: center;
        }

        .callline__row.is-self .callline__role {
            background: var(--blue-soft);
            color: var(--blue);
        }

        .callline__bubble {
            max-width: min(100%, 540px);
            padding: 13px 16px;
            border-radius: 22px;
            background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
            box-shadow: 0 10px 22px rgba(234, 88, 12, 0.08);
            color: #9a3412;
            font-size: clamp(22px, 5.8vw, 32px);
            font-weight: 900;
            line-height: 1.3;
            word-break: keep-all;
        }

        .callline__row.is-self .callline__bubble {
            background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.08);
            color: #1d4ed8;
        }

        .answer {
            margin-top: 10px;
            padding: 14px 16px;
            border: 2px solid #86efac;
            border-radius: 22px;
            background: linear-gradient(180deg, #ecfdf5 0%, #d1fae5 100%);
            text-align: center;
            box-shadow: 0 14px 28px rgba(4, 120, 87, 0.12);
        }

        .answer.is-wrong {
            border-color: #fdba74;
            background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
            box-shadow: 0 14px 28px rgba(234, 88, 12, 0.12);
        }

        .answer__label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 900;
            color: #047857;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .answer.is-wrong .answer__label {
            color: var(--orange);
        }

        .answer__text {
            display: block;
            font-size: clamp(25px, 6vw, 34px);
            font-weight: 900;
            line-height: 1.18;
            letter-spacing: -0.03em;
            color: #065f46;
        }

        .answer.is-wrong .answer__text {
            color: #9a3412;
        }

        .quiz {
            margin-top: 10px;
            padding: 16px 14px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: var(--shadow);
        }

        .quiz__question {
            margin: 0 0 12px;
            font-size: clamp(26px, 7vw, 38px);
            font-weight: 900;
            line-height: 1.18;
            letter-spacing: -0.03em;
            text-align: center;
        }

        .quiz__options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .quiz__options[data-count="3"],
        .quiz__options[data-count="4"] {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .option {
            appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 84px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: #ffffff;
            color: #334155;
            font-size: 20px;
            font-weight: 900;
            line-height: 1.3;
            text-align: center;
            word-break: keep-all;
            touch-action: manipulation;
            transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease, color 0.14s ease;
        }

        .option:active {
            transform: scale(0.98);
        }

        .option.is-correct {
            border-color: #10b981;
            background: var(--green-soft);
            color: var(--green);
        }

        .option.is-wrong {
            border-color: #fb923c;
            background: var(--orange-soft);
            color: var(--orange);
        }

        .option.is-disabled {
            opacity: 0.5;
        }

        .timer {
            position: sticky;
            bottom: calc(8px + env(safe-area-inset-bottom));
            z-index: 25;
            width: min(100%, 188px);
            margin: 12px 0 0 auto;
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            border-radius: 18px;
            background: rgba(31, 41, 55, 0.94);
            color: #ffffff;
            box-shadow: 0 10px 24px rgba(31, 41, 55, 0.18);
            text-align: center;
            pointer-events: none;
        }

        .timer[hidden],
        .answer[hidden] {
            display: none !important;
        }

        .timer__value {
            display: inline-block;
            min-width: 1.2em;
            font-size: clamp(32px, 10vw, 54px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            animation: timerPulse 0.96s ease-in-out infinite;
        }

        .timer__label {
            display: block;
            margin-top: 1px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.74);
        }

        .timer__bar {
            margin-top: 7px;
            width: 100%;
            height: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            overflow: hidden;
        }

        .timer__fill {
            display: block;
            height: 100%;
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #fbbf24 0%, #f97316 48%, #ef4444 100%);
            transform-origin: left center;
            transition: transform 0.2s linear;
        }

        .summary {
            margin-top: 10px;
            padding: 16px 14px;
            border-radius: 24px;
            border: 2px solid #93c5fd;
            background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.12);
            text-align: center;
        }

        .summary__label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #1d4ed8;
        }

        .summary__score {
            display: block;
            font-size: clamp(28px, 8vw, 44px);
            font-weight: 900;
            line-height: 1.1;
            color: #1d4ed8;
            letter-spacing: -0.04em;
        }

        .summary__meta {
            display: block;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 800;
            line-height: 1.4;
            color: #1e3a8a;
        }

        @keyframes timerPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes emergencyBurst {
            0% { transform: translateY(0) scale(0.96) rotate(-7deg); }
            50% { transform: translateY(-7px) scale(1.1) rotate(6deg); }
            100% { transform: translateY(0) scale(0.96) rotate(-7deg); }
        }

        @keyframes heatGlow {
            0% { opacity: 0.72; }
            50% { opacity: 1; }
            100% { opacity: 0.72; }
        }

        @keyframes heatSway {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(2px) rotate(-2deg) scale(1.01); }
            50% { transform: translateY(0) rotate(2.4deg) scale(1.03); }
            75% { transform: translateY(2px) rotate(-1.6deg) scale(1.01); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }

        @keyframes firePulse {
            0% { opacity: 0.7; }
            33% { opacity: 1; }
            66% { opacity: 0.84; }
            100% { opacity: 0.7; }
        }

        @keyframes fireHop {
            0% { transform: translateY(0) scale(1) rotate(-1deg); }
            30% { transform: translateY(-4px) scale(1.05) rotate(1deg); }
            55% { transform: translateY(1px) scale(1.02) rotate(-1.2deg); }
            100% { transform: translateY(0) scale(1) rotate(-1deg); }
        }

        @keyframes sickPulse {
            0% { opacity: 0.64; }
            50% { opacity: 0.96; }
            100% { opacity: 0.64; }
        }

        @keyframes sickTilt {
            0% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(-2.2deg) translateY(2px); }
            50% { transform: rotate(1.6deg) translateY(0); }
            75% { transform: rotate(-1.8deg) translateY(2px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        @keyframes injuryPulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        @keyframes injuryJolt {
            0% { transform: translateX(0) rotate(0deg); }
            16% { transform: translateX(-2px) rotate(-1.8deg); }
            32% { transform: translateX(2px) rotate(1.6deg); }
            48% { transform: translateX(-3px) rotate(-2deg); }
            64% { transform: translateX(2px) rotate(1.4deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        @media (max-width: 520px) {
            .app {
                padding-bottom: calc(24px + env(safe-area-inset-bottom));
            }

            .scene__board {
                grid-template-columns: repeat(2, minmax(0, 132px));
                gap: 6px;
            }

            .callline__bubble {
                font-size: 24px;
            }

            .quiz__options {
                grid-template-columns: 1fr;
            }

            .option {
                min-height: 78px;
                font-size: 19px;
            }

            .timer {
                width: min(100%, 156px);
                padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
            }

            .timer__value {
                font-size: clamp(28px, 9vw, 42px);
            }
        }
    </style>

                </div>
                <div class="scene-card" id="sceneCard">
                    <img
                        id="sceneImage"
                        src="../assets/c15/grammar/images/ge-hada-cast-bad/friend_female_01_bad.webp"

                        width="1012"

                    />
                    <div class="scene-card__icon" id="sceneIcon" hidden>🏠🔥</div>

                    <span class="scene-card__label" id="sceneLabel">친구</span>

        <section class="callline" id="callLine">
            <div class="callline__messages" id="callMessages">
                <div class="callline__row is-help">
                    <span class="callline__role">🚑 119</span>
                    <span class="callline__bubble">먼저 친구가 물을 마시게 하세요!</span>
                </div>
                <div class="callline__row is-self">
                    <span class="callline__bubble">알겠어요!</span>
                    <span class="callline__role">나</span>

        <section class="answer" id="answerBox" hidden>

        <section class="quiz" id="quizBox">

        </section>

        <section class="timer" id="timerBox" hidden>
            <span class="timer__value" id="timerValue">6</span>
            <span class="timer__label">초</span>
            <div class="timer__bar">
                <span class="timer__fill" id="timerFill"></span>
            </div>
        </section>

    <script>
        (function () {

            function getSubjectParticle(word) {
                const text = String(word || "").trim();
                if (!text) {
                    return "가";
                }

                const lastChar = text.charCodeAt(text.length - 1);
                const hangulBase = 0xac00;
                const hangulLast = 0xd7a3;

                if (lastChar < hangulBase || lastChar > hangulLast) {
                    return "가";
                }

                return ((lastChar - hangulBase) % 28) === 0 ? "가" : "이";
            }

                return scenarios[scenarioIndex];

                return currentScenario().steps[stepIndex];
            }

                let total = 0;
                for (let i = 0; i < scenarioIndex; i += 1) {

                return total + stepIndex;

                callMessages.replaceChildren();

                    row.className = "callline__row is-" + (message.tone || "help");

                    const role = document.createElement("span");
                    role.className = "callline__role";
                    role.textContent = message.role;

                    const bubble = document.createElement("span");
                    bubble.className = "callline__bubble";
                    bubble.textContent = message.text;

                    if (message.tone === "self") {
                        row.replaceChildren(bubble, role);
                    } else {
                        row.replaceChildren(role, bubble);
                    }

                    callMessages.append(row);
                });
            }

            function clearCardEffect(card, burstA, burstB) {
                emergencyEffectClasses.forEach(function (effectClass) {
                    card.classList.remove(effectClass);

                burstA.hidden = true;

                burstA.textContent = "";
                burstB.textContent = "";
            }

            function applyCardEffect(card, burstA, burstB, effect) {
                clearCardEffect(card, burstA, burstB);

                if (!effect || !effect.name) {
                    return;
                }

                card.classList.add(effect.name);

                if (effect.bursts && effect.bursts[0]) {
                    burstA.textContent = effect.bursts[0];
                    burstA.hidden = false;
                }

                if (effect.bursts && effect.bursts[1]) {
                    burstB.textContent = effect.bursts[1];
                    burstB.hidden = false;
                }
            }

                const actor = actorText(step.whoAnswer);
                const action = step.whatOptions.find(function (option) {

                });

                if (step.answerText) {
                    return step.answerText;

                if (!action) {
                    return "";

                if (step.whoAnswer === "self") {
                    return "제가 " + action.label + ".";
                }

                return actor + getSubjectParticle(actor) + " " + action.label + ".";
            }

                    return;

                timerBox.hidden = false;

            }

            function hideTimer() {
                if (!HAS_TIMER) {
                    timerBox.hidden = true;
                    return;
                }
                stopCountdown();
                timerBox.hidden = true;
            }

            function startCountdown(onExpire) {
                if (!HAS_TIMER) {
                    return;
                }
                let remain = QUESTION_SECONDS;
                const startedAt = Date.now();

                showTimer(remain);
                countdownInterval = window.setInterval(function () {
                    const elapsed = (Date.now() - startedAt) / 1000;
                    const nextRemain = Math.max(0, Math.ceil(QUESTION_SECONDS - elapsed));
                    timerValue.textContent = String(nextRemain || 0);
                    timerFill.style.transform = "scaleX(" + Math.max(0, 1 - (elapsed / QUESTION_SECONDS)) + ")";
                }, 80);

                countdownTimeout = window.setTimeout(function () {
                    stopCountdown();
                    timerValue.textContent = "0";
                    timerFill.style.transform = "scaleX(0)";
                    onExpire();
                }, QUESTION_SECONDS * 1000);
            }

            function disableOptionButtons() {
                optionList.querySelectorAll(".option").forEach(function (button) {
                    button.classList.add("is-disabled");

            function markChoice(correctValue, pickedValue) {
                optionList.querySelectorAll(".option").forEach(function (button) {
                    if (button.dataset.value === correctValue) {
                        button.classList.add("is-correct");
                    } else if (pickedValue && button.dataset.value === pickedValue) {
                        button.classList.add("is-wrong");
                    }
                });
            }

            function askWho() {
                const step = currentStep();
                const key = ++questionKey;

                hideAnswer();
                questionText.textContent = "누가 해요?";
                renderOptions(step.whoOptions.map(function (value) {
                    return {
                        value: value,
                        label: actorText(value)
                    };
                }), function (button, pickedValue) {
                    if (key !== questionKey) {
                        return;
                    }

                    isLocked = true;
                    stopCountdown();
                    selectedWho = step.whoAnswer;
                    if (pickedValue !== step.whoAnswer) {
                        stepPerfect = false;
                    }
                    markChoice(step.whoAnswer, pickedValue);
                    disableOptionButtons();
                    feedbackTimer = window.setTimeout(function () {
                        askWhat();

                isLocked = false;
                startCountdown(function () {
                    if (key !== questionKey) {
                        return;

                    isLocked = true;
                    stepPerfect = false;

                    feedbackTimer = window.setTimeout(function () {

                const step = currentStep();

                questionText.textContent = "무엇을 해요?";
                renderOptions(step.whatOptions.map(function (option) {

                        label: option.label
                    };
                }), function (button, pickedValue) {
                    if (key !== questionKey) {
                        return;
                    }

                    isLocked = true;
                    stopCountdown();
                    const correct = pickedValue === step.whatAnswer;
                    if (!correct) {
                        stepPerfect = false;
                    }
                    markChoice(step.whatAnswer, pickedValue);
                    disableOptionButtons();
                    finishStep();
                });

                isLocked = false;
                startCountdown(function () {
                    if (key !== questionKey) {
                        return;
                    }

                    isLocked = true;
                    stepPerfect = false;
                    markChoice(step.whatAnswer, null);
                    disableOptionButtons();
                    finishStep();
                });
            }

            function finishStep() {
                if (stepPerfect) {
                    score += 1;
                }
                hideTimer();
                showAnswer(stepPerfect);
                feedbackTimer = window.setTimeout(function () {
                    advance();
                }, FEEDBACK_DELAY);
            }

            function showSummary() {
                hideTimer();
                quizBox.hidden = true;
                summaryBox.hidden = false;
                answerBox.hidden = true;
                renderChat([
                    { role: "끝", text: "응급 상황 조치를 모두 끝냈어요.", tone: "help" }
                ]);
                summaryScore.textContent = score + " / " + totalSteps;
                summaryMeta.textContent = score === totalSteps
                    ? "아주 잘했어요. 응급 상황 지시를 모두 이해했어요."
                    : "처음 버튼을 누르면 다시 연습할 수 있어요.";
                progressText.textContent = "완료";
                isLocked = true;
            }

            function advance() {
                const scenario = currentScenario();

                if (stepIndex < scenario.steps.length - 1) {
                    stepIndex += 1;
                    startCurrentStep();
                    return;
                }

                if (scenarioIndex < scenarios.length - 1) {
                    scenarioIndex += 1;
                    stepIndex = 0;
                    startCurrentStep();
                    return;
                }

                showSummary();
            }

            async function startCurrentStep() {
                const scenario = currentScenario();
                const step = currentStep();

                clearTimers();
                hideTimer();
                hideAnswer();
                summaryBox.hidden = true;
                quizBox.hidden = false;
                optionList.replaceChildren();
                questionText.textContent = "";
                stepPerfect = true;
                selectedWho = null;
                isLocked = true;
                setScene();
                updateProgress();

                if (stepIndex === 0) {
                    renderChat([
                        { role: "나", text: scenario.callText, tone: "self" }
                    ]);
                    await wait(CALL_DELAY);
                }

                renderChat([
                    { role: scenario.contact, text: step.instruction, tone: "help" }
                ]);
                await wait(INSTRUCTION_DELAY);
                renderChat([
                    { role: scenario.contact, text: step.instruction, tone: "help" },
                    { role: "나", text: "알겠어요!", tone: "self" }
                ]);
                await wait(ACK_DELAY);
                askWho();
            }

            function resetGame() {
                clearTimers();
                scenarioIndex = 0;
                stepIndex = 0;
                score = 0;
                questionKey += 1;
                summaryBox.hidden = true;
                quizBox.hidden = false;
                startCurrentStep();
            }

            resetBtn.addEventListener("click", resetGame);
            resetGame();
        })();
    </script>
</body>
</html>
