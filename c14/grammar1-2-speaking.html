        function summary(){const flat=[],scores=[];state.results.forEach(r=>{flat.push(r.grammar1,r.grammar2);r.speaking.forEach(s=>{if(s.best!==null)scores.push(s.best)})});const accepted=flat.filter(x=>x.accepted||x.exact).length,exact=flat.filter(x=>x.exact).length,model=flat.filter(x=>x.usedModel).length,attempts=state.logs.length,avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0,weak=[...state.logs].sort((a,b)=>a.score-b.score).slice(0,3),strong=[...state.logs].sort((a,b)=>b.score-a.score).slice(0,3);refs.title.textContent='종합 피드백';refs.note.textContent='5사이클을 모두 마쳤습니다. 문법과 말하기 결과를 한 번에 정리해 보세요.';refs.bar.style.width='100%';refs.text.textContent=`전체 ${CYCLES.length*3}단계를 모두 완료했습니다.`;refs.tabs.innerHTML='<div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">문법 1 완료</div><div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">문법 2 완료</div><div class="rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">말하기 완료</div>';refs.workspace.innerHTML=`<div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between"><div><p class="text-xs font-black uppercase tracking-[0.14em] text-orange-700">Final Feedback</p><h2 class="mt-2 text-2xl font-black text-slate-900">13과 문법1·2 융합 말하기를 모두 마쳤어요.</h2><p class="mt-2 text-sm leading-7 text-slate-600">걱정 표현과 현재 장면 묘사를 차례로 만들고 직접 말한 결과를 함께 정리했습니다.</p></div><button type="button" class="ui-btn rounded-2xl border border-slate-900 bg-slate-900 px-4 py-3 text-sm font-black text-white" id="restartBtn"><i class="fa-solid fa-rotate-right mr-1"></i>처음부터 다시</button></div><div class="mt-5 grid gap-3 sm:grid-cols-2 xl:grid-cols-4"><div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">정답 인정</span><strong class="mt-2 block text-3xl font-black text-emerald-600">${accepted}/10</strong></div><div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">목표 문장 일치</span><strong class="mt-2 block text-3xl font-black text-blue-600">${exact}/10</strong></div><div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">말하기 총 시도</span><strong class="mt-2 block text-3xl font-black text-orange-600">${attempts}</strong></div><div class="rounded-3xl border border-slate-200 bg-white p-4"><span class="block text-xs font-bold text-slate-500">말하기 평균 최고 점수</span><strong class="mt-2 block text-3xl font-black text-violet-600">${avg}점</strong></div></div><div class="mt-4 grid gap-4 lg:grid-cols-2"><div class="rounded-3xl border border-slate-200 bg-white p-4"><strong class="block text-base font-black text-slate-900">종합 코멘트</strong><ul class="mt-3 list-disc space-y-2 pl-5 text-sm leading-7 text-slate-700"><li>${accepted>=9?'두 문법을 매우 안정적으로 만들었어요.':exact>=7?'목표 문장에 가깝게 구조를 잘 익혔어요.':model>=3?'모범 문장을 참고해 흐름을 익혔어요.':'특히 -(으)ㄹ까 봐 뒤의 예방 행동과 -고 있는의 현재 상태를 다시 확인하면 더 좋아집니다.'}</li><li>${avg>=85?'말하기 발화가 또렷하고 안정적이었어요.':avg>=70?'핵심 표현은 잘 들렸어요. 조금만 더 또박또박 말해 보세요.':'문장을 끊지 않고 끝까지 말하는 연습을 조금 더 해 보세요.'}</li></ul></div><div class="rounded-3xl border border-slate-200 bg-white p-4"><strong class="block text-base font-black text-slate-900">다시 연습하면 좋은 문장</strong><ul class="mt-3 list-disc space-y-2 pl-5 text-sm leading-7 text-slate-700">${weak.length?weak.map(x=>`<li>${esc(x.short)} · ${esc(x.sentence)} (${x.score}점)</li>`).join(''):'<li>말하기 기록이 아직 없습니다.</li>'}</ul></div></div><div class="mt-4 grid gap-4 lg:grid-cols-2"><div class="rounded-3xl border border-slate-200 bg-white p-4"><strong class="block text-base font-black text-slate-900">가장 안정적으로 말한 문장</strong><ul class="mt-3 list-disc space-y-2 pl-5 text-sm leading-7 text-slate-700">${strong.length?strong.map(x=>`<li>${esc(x.short)} · ${esc(x.sentence)} (${x.score}점)</li>`).join(''):'<li>말하기 기록이 아직 없습니다.</li>'}</ul></div><div class="rounded-3xl border border-slate-200 bg-white p-4"><strong class="block text-base font-black text-slate-900">사이클별 기록</strong><div class="mt-3 space-y-3">${CYCLES.map((c,i)=>{const r=state.results[i];return`<div class="rounded-2xl border border-slate-200 bg-slate-50 p-3"><strong class="block text-sm font-black text-slate-900">${esc(c.title)}</strong><p class="mt-2 text-sm leading-6 text-slate-700">문법 1: ${r.grammar1.exact?'목표 문장 일치':r.grammar1.accepted?'정답 인정':r.grammar1.usedModel?'모범 문장 사용':r.grammar1.checked?'재확인 필요':'미완료'}</p><p class="mt-1 text-sm leading-6 text-slate-700">문법 2: ${r.grammar2.exact?'목표 문장 일치':r.grammar2.accepted?'정답 인정':r.grammar2.usedModel?'모범 문장 사용':r.grammar2.checked?'재확인 필요':'미완료'}</p><p class="mt-1 text-sm leading-6 text-slate-700">말하기 최고: ${r.speaking[0].best===null&&r.speaking[1].best===null?'기록 없음':`문법1 ${r.speaking[0].best??'-'}점 · 문법2 ${r.speaking[1].best??'-'}점`}</p></div>`}).join('')}</div></div></div>`;
            document.getElementById('restartBtn').addEventListener('click',()=>{if(state.isRecording)finishRec();state.cycle=0;state.step=0;state.speaking=0;state.results=createResults();state.logs=[];state.transcript='';state.isRecording=false;render()});
        }
        function nextStage(){if(state.isRecording)finishRec();state.transcript='';if(state.step<2){state.step+=1;if(state.step===2)state.speaking=0}else{state.cycle+=1;state.step=0;state.speaking=0}render()}
        function currentSentence(){const c=current();return state.speaking===0?c.grammar1.target:c.grammar2.target}
        function speak(text,rate){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=rate;const v=window.speechSynthesis.getVoices().find(x=>x.lang&&x.lang.toLowerCase().startsWith('ko'));if(v)u.voice=v;window.speechSynthesis.speak(u)}
        function lcs(a,b){const dp=Array.from({length:a.length+1},()=>new Array(b.length+1).fill(0));for(let i=1;i<=a.length;i+=1)for(let j=1;j<=b.length;j+=1)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);return dp[a.length][b.length]}
        function decompose(str){const cho=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'],jung=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'],jong=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];let out='';for(const ch of str){const code=ch.charCodeAt(0);if(code>=0xAC00&&code<=0xD7A3){const off=code-0xAC00,j=off%28,g=((off-j)/28)%21,c=Math.floor((off-j)/28/21);out+=cho[c]+jung[g]+(j?jong[j]:'')}else out+=ch}return out}
        function analyzeJamo(spoken,target){const jt=decompose(target),js=decompose(spoken);if(!jt.length)return{accuracy:0,completeness:0,score:0};const common=lcs(jt,js),accuracy=Math.round(common/jt.length*100),completeness=Math.round(common/Math.max(jt.length,js.length||1)*100);return{accuracy,completeness,score:Math.round(accuracy*.65+completeness*.35)}}
        function analyzeSpeech(spoken){const r=state.results[state.cycle].speaking[state.speaking],a=analyzeJamo(norm(spoken),norm(currentSentence()));r.attempts+=1;r.last=a.score;r.best=r.best===null?a.score:Math.max(r.best,a.score);r.accuracy=a.accuracy;r.completeness=a.completeness;r.spoken=spoken;r.completed=true;state.logs.push({short:state.speaking===0?'문법 1 문장':'문법 2 문장',sentence:currentSentence(),score:a.score});state.transcript='';renderSpeak()}
        function finishRec(){state.isRecording=false;if(state.recognition)try{state.recognition.stop()}catch(e){}}
        function startRec(){const R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R)return;const target=currentSentence();let final=false,restart=0,max=5;state.transcript='';state.isRecording=true;renderSpeak();const begin=()=>{state.recognition=new R();state.recognition.lang='ko-KR';state.recognition.interimResults=true;state.recognition.maxAlternatives=3;state.recognition.onresult=e=>{let interim='',spoken='';for(let i=e.resultIndex;i<e.results.length;i+=1){if(e.results[i].isFinal){const targetNorm=norm(target);let best=e.results[i][0].transcript,bestScore=analyzeJamo(norm(best),targetNorm).score;for(let a=1;a<e.results[i].length;a+=1){const alt=e.results[i][a].transcript,score=analyzeJamo(norm(alt),targetNorm).score;if(score>bestScore){best=alt;bestScore=score}}spoken+=`${best} `}else interim+=e.results[i][0].transcript}state.transcript=(spoken||interim).trim();if(spoken.trim()){final=true;finishRec();analyzeSpeech(spoken.trim())}};state.recognition.onerror=e=>{if(e.error==='no-speech'&&state.isRecording&&restart<max){restart+=1;setTimeout(()=>{if(state.isRecording)begin()},220);return}finishRec();state.transcript=e.error==='not-allowed'?'마이크 권한이 필요합니다.':'음성이 감지되지 않았습니다. 다시 시도해 보세요.';renderSpeak()};state.recognition.onend=()=>{if(!state.isRecording)return;if(!final&&restart<max){restart+=1;setTimeout(()=>{if(state.isRecording)begin()},220)}else{finishRec();renderSpeak()}};try{state.recognition.start()}catch(e){finishRec();renderSpeak()}};begin()}
        function toggleRec(){if(!hasRecognition)return;if(state.isRecording){finishRec();renderSpeak()}else startRec()}
        function render(){if(state.cycle>=CYCLES.length){summary();return}renderTop();if(stepKey()==='speaking')renderSpeak();else renderWrite(stepKey())}
        render();
        if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices()}
    </script>
