<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>14과 문법 1 보조자료 2 | 그림 말하기 퀴즈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-1: #fff8ec;
            --bg-2: #eef7ff;
            --panel: rgba(255, 255, 255, 0.84);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --ink: #14243e;
            --muted: #65748b;
            --line: rgba(148, 163, 184, 0.18);
            --orange: #f97316;
            --orange-soft: rgba(249, 115, 22, 0.11);
            --sky: #0ea5e9;
            --sky-soft: rgba(14, 165, 233, 0.11);
            --emerald: #10b981;
            --emerald-soft: rgba(16, 185, 129, 0.12);
            --amber: #f59e0b;
            --amber-soft: rgba(245, 158, 11, 0.12);
            --rose: #f43f5e;
            --rose-soft: rgba(244, 63, 94, 0.12);
            --shadow: 0 30px 70px rgba(15, 23, 42, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(249, 115, 22, 0.16), transparent 24%),
                radial-gradient(circle at 86% 10%, rgba(14, 165, 233, 0.16), transparent 28%),
                radial-gradient(circle at 84% 88%, rgba(16, 185, 129, 0.12), transparent 24%),
                linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .app-shell {
            width: min(1160px, calc(100% - 24px));
            margin: 16px auto 36px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.64);
            color: #c2410c;
            text-decoration: none;
            font-weight: 900;
            backdrop-filter: blur(16px);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 112px;
            padding: 12px 16px;
            border-radius: 999px;
            background: var(--panel-strong);
            border: 1px solid rgba(148, 163, 184, 0.16);
            color: #334155;
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.08em;
        }

        .status-pill.is-listening {
            background: rgba(244, 63, 94, 0.14);
            color: #be123c;
            border-color: rgba(244, 63, 94, 0.18);
        }

        .stage {
            padding: 20px;
            border-radius: 34px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
        }

        .metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .metric {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            border-radius: 999px;
            background: var(--panel-strong);
            border: 1px solid rgba(148, 163, 184, 0.16);
            font-size: 0.92rem;
            font-weight: 900;
            color: #344256;
        }

        .metric strong {
            color: var(--ink);
        }

        .metric--hidden {
            display: none;
        }

        .progress-track {
            margin-top: 14px;
            height: 8px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(226, 232, 240, 0.82);
        }

        .progress-fill {
            width: 0;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--orange), var(--sky), var(--emerald));
            transition: width 0.24s ease;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(320px, 0.95fr) minmax(340px, 1.05fr);
            gap: 18px;
            margin-top: 18px;
        }

        .scene-panel,
        .quiz-panel,
        .summary-panel {
            border-radius: 28px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
        }

        .scene-panel {
            position: relative;
            overflow: hidden;
            min-height: 100%;
            padding: 16px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 249, 239, 0.84));
        }

        .scene-panel::after {
            content: "";
            position: absolute;
            inset: auto -60px -70px auto;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.18), rgba(249, 115, 22, 0));
            pointer-events: none;
        }

        .scene-frame {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
        }

        .scene-frame img {
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .scene-counter {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 54px;
            height: 40px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.72);
            color: #fff;
            font-size: 0.86rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            backdrop-filter: blur(10px);
        }

        .quiz-panel {
            display: grid;
            gap: 16px;
            padding: 16px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 250, 252, 0.88));
        }

        .cue-flow {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            gap: 12px;
            align-items: stretch;
            padding: 18px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.08), rgba(14, 165, 233, 0.08));
            border: 1px solid rgba(148, 163, 184, 0.14);
        }

        .cue-group {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 122px;
            padding: 18px 18px 18px 22px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.88);
        }

        .cue-group::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 6px;
            border-radius: 22px 0 0 22px;
        }

        .cue-group--lead::before {
            background: linear-gradient(180deg, var(--orange), #fb923c);
        }

        .cue-group--tail::before {
            background: linear-gradient(180deg, var(--sky), #38bdf8);
        }

        .cue-prefix {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            min-width: 60px;
            min-height: 60px;
            padding: 0 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--orange), #fb7185);
            color: #fff;
            font-size: 1rem;
            font-weight: 900;
            box-shadow: 0 16px 22px rgba(249, 115, 22, 0.18);
        }

        .word-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .word-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: -0.01em;
            animation: rise-in 0.35s ease both;
        }

        .word-pill--lead {
            color: #c2410c;
            background: var(--orange-soft);
            box-shadow: inset 0 0 0 1px rgba(249, 115, 22, 0.12);
        }

        .word-pill--tail {
            color: #0369a1;
            background: var(--sky-soft);
            box-shadow: inset 0 0 0 1px rgba(14, 165, 233, 0.12);
        }

        .connector {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 86px;
        }

        .connector-word {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 104px;
            min-height: 56px;
            padding: 0 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.14), rgba(14, 165, 233, 0.22));
            color: #0369a1;
            font-size: 0.96rem;
            font-weight: 900;
            box-shadow: inset 0 0 0 1px rgba(14, 165, 233, 0.14);
        }

        .connector-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            color: #64748b;
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: visible;
            isolation: isolate;
            gap: 9px;
            min-height: 56px;
            padding: 14px 18px;
            border: 1px solid transparent;
            border-radius: 18px;
            font: inherit;
            font-size: 0.96rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .btn::after {
            content: "";
            position: absolute;
            inset: -8px;
            border-radius: 24px;
            opacity: 0;
            pointer-events: none;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.42;
            cursor: not-allowed;
        }

        .btn--accent {
            --focus-ring: rgba(249, 115, 22, 0.28);
            min-width: 168px;
            background: linear-gradient(135deg, var(--orange), #fb7185);
            color: #fff;
            box-shadow: 0 20px 28px rgba(249, 115, 22, 0.2);
        }

        .btn--accent.is-listening {
            background: linear-gradient(135deg, #e11d48, #fb7185);
            animation: pulse 1.1s infinite ease-out;
        }

        .btn--primary {
            --focus-ring: rgba(21, 36, 61, 0.24);
            background: #15243d;
            color: #fff;
            box-shadow: 0 18px 24px rgba(15, 23, 42, 0.14);
        }

        .btn--ghost {
            background: rgba(255, 255, 255, 0.9);
            color: #334155;
            border-color: rgba(148, 163, 184, 0.18);
        }

        .btn.is-focus {
            transform: translateY(-1px) scale(1.02);
            box-shadow:
                0 0 0 4px var(--focus-ring, rgba(14, 165, 233, 0.2)),
                0 18px 32px rgba(15, 23, 42, 0.16);
        }

        .btn.is-focus::after {
            opacity: 1;
            border: 2px solid var(--focus-ring, rgba(14, 165, 233, 0.2));
            animation: wave-ring 1.75s infinite ease-out;
        }

        .voice-stack {
            display: grid;
            gap: 12px;
        }

        .transcript-box,
        .feedback-box,
        .model-wrap,
        .manual-tools {
            padding: 18px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(248, 250, 252, 0.92);
        }

        .transcript-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .transcript-head::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(14, 165, 233, 1), rgba(14, 165, 233, 0.2));
            box-shadow: 0 0 0 8px rgba(14, 165, 233, 0.08);
            flex: 0 0 auto;
        }

        .transcript-meta {
            margin-left: auto;
            color: #7b8799;
            font-size: 0.88rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .transcript-text {
            min-height: 56px;
            margin: 0;
            font-size: 1.12rem;
            font-weight: 700;
            line-height: 1.75;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .transcript-text.is-placeholder {
            color: #9aa5b8;
            font-weight: 600;
        }

        .feedback-box.hidden,
        .model-wrap.hidden,
        .summary-panel.hidden {
            display: none;
        }

        .feedback-box {
            display: grid;
            gap: 10px;
        }

        .feedback-box.good {
            background: var(--emerald-soft);
            border-color: rgba(16, 185, 129, 0.22);
        }

        .feedback-box.mid {
            background: var(--amber-soft);
            border-color: rgba(245, 158, 11, 0.22);
        }

        .feedback-box.bad {
            background: var(--rose-soft);
            border-color: rgba(244, 63, 94, 0.22);
        }

        .feedback-box__headline {
            margin: 0;
            font-size: 1rem;
            font-weight: 900;
        }

        .feedback-box__body {
            margin: 0;
            color: #344256;
            font-size: 1rem;
            line-height: 1.7;
        }

        .feedback-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .feedback-metrics span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.7);
            font-size: 0.84rem;
            font-weight: 800;
        }

        .model-wrap {
            border-left: 5px solid rgba(16, 185, 129, 0.34);
            background: rgba(255, 255, 255, 0.94);
        }

        .model-wrap p {
            margin: 0;
            font-size: 1.04rem;
            font-weight: 800;
            line-height: 1.7;
        }

        .manual-tools summary {
            cursor: pointer;
            font-weight: 900;
            color: #344256;
            list-style: none;
        }

        .manual-tools summary::-webkit-details-marker {
            display: none;
        }

        .manual-tools textarea {
            width: 100%;
            min-height: 96px;
            margin-top: 14px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 18px;
            font: inherit;
            font-size: 1rem;
            color: var(--ink);
            resize: vertical;
            background: rgba(255, 255, 255, 0.92);
        }

        .summary-panel {
            margin-top: 18px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.86);
        }

        .summary-head {
            display: flex;
            justify-content: flex-end;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .summary-stat {
            display: grid;
            gap: 12px;
            padding: 18px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(248, 250, 252, 0.92);
        }

        .summary-stat span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--muted);
            font-size: 1rem;
        }

        .summary-stat strong {
            display: block;
            font-size: 2rem;
            line-height: 1;
        }

        .summary-list {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .summary-item {
            display: grid;
            grid-template-columns: 92px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
            padding: 14px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(248, 250, 252, 0.92);
        }

        .summary-item img {
            width: 92px;
            height: 92px;
            border-radius: 18px;
            object-fit: cover;
            border: 1px solid rgba(148, 163, 184, 0.14);
        }

        .summary-item__title,
        .summary-item__spoken {
            margin: 0;
            line-height: 1.7;
        }

        .summary-item__title {
            font-weight: 900;
        }

        .summary-item__spoken {
            margin-top: 4px;
            color: #7a879a;
            font-size: 0.9rem;
        }

        .summary-item--clear {
            grid-template-columns: 1fr;
            place-items: center;
            min-height: 132px;
            text-align: center;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(14, 165, 233, 0.12));
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.18); }
            100% { box-shadow: 0 0 0 18px rgba(225, 29, 72, 0); }
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes wave-ring {
            0% {
                transform: scale(0.94);
                opacity: 0.9;
            }
            100% {
                transform: scale(1.12);
                opacity: 0;
            }
        }

        @media (max-width: 960px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .cue-flow {
                grid-template-columns: 1fr;
            }

            .connector {
                flex-direction: row;
                min-width: 0;
            }

            .cue-group {
                min-height: 0;
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                width: min(100% - 14px, 1160px);
                margin-top: 12px;
            }

            .topbar {
                align-items: stretch;
            }

            .topbar,
            .metrics,
            .action-row {
                flex-direction: column;
            }

            .back-link,
            .status-pill,
            .metric,
            .btn {
                width: 100%;
            }

            .stage,
            .scene-panel,
            .quiz-panel,
            .summary-panel,
            .cue-flow {
                padding: 16px;
                border-radius: 26px;
            }

            .summary-grid,
            .summary-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96"

    <main class="app-shell">
        <header class="topbar">
            <a class="back-link" href="grammar1.html"><i class="fa-solid fa-arrow-left"></i> 문법 1</a>
            <span id="statusPill" class="status-pill">READY</span>
        </header>

        <section class="stage">
            <div class="metrics">
                <span class="metric"><i class="fa-solid fa-flag-checkered"></i><strong id="progressText">1 / 16</strong></span>
                <span class="metric"><i class="fa-solid fa-circle-check"></i><strong id="correctCount">0</strong></span>
                <span class="metric metric--hidden"><i class="fa-solid fa-list-check"></i><strong id="attemptCount">0</strong></span>
            </div>

            <div class="progress-track">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <p id="supportNote" class="sr-only"></p>

            <div class="workspace">
                <article class="scene-panel">
                    <h2 id="sceneTitle" class="sr-only">그림 카드</h2>
                    <div class="scene-frame">
                        <span id="promptText" class="scene-counter">01</span>
                        <img id="sceneImage" src="" alt="" />
                    </div>
                </article>

                <article class="quiz-panel">
                    <section class="cue-flow">
                        <div class="cue-group cue-group--lead">
                            <span class="cue-prefix">하도</span>
                            <div id="leadWords" class="word-pills"></div>
                        </div>
                        <div class="connector">
                            <span class="connector-word">-아서/어서</span>
                            <span class="connector-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                        </div>
                        <div class="cue-group cue-group--tail">
                            <div id="tailWords" class="word-pills"></div>
                        </div>
                    </section>

                    <div class="action-row">
                        <button id="micBtn" class="btn btn--accent" type="button">
                            <i class="fa-solid fa-microphone"></i>
                            <span id="micBtnText">말하기 시작</span>
                        </button>
                        <button id="exampleBtn" class="btn btn--ghost" type="button" disabled>
                            <i class="fa-solid fa-volume-high"></i>
                            정답 듣기
                        </button>
                        <button id="retryBtn" class="btn btn--ghost" type="button">
                            <i class="fa-solid fa-rotate-left"></i>
                            다시
                        </button>
                        <button id="nextBtn" class="btn btn--primary" type="button" disabled>
                            <i class="fa-solid fa-arrow-right"></i>
                            다음
                        </button>
                    </div>

                    <div class="voice-stack">
                        <div class="transcript-box">
                            <div class="transcript-head">
                                <span id="speechMeta" class="transcript-meta">READY</span>
                            </div>
                            <p id="transcriptBox" class="transcript-text is-placeholder">...</p>
                        </div>

                        <div id="feedbackBox" class="feedback-box hidden"></div>

                        <div id="modelWrap" class="model-wrap hidden">
                            <p id="modelSentence"></p>
                        </div>

                        <details class="manual-tools">
                            <summary><i class="fa-solid fa-keyboard"></i> 직접 입력</summary>
                            <textarea id="manualInput" placeholder="문장을 입력하세요."></textarea>
                            <div class="action-row">
                                <button id="manualCheckBtn" class="btn btn--ghost" type="button">
                                    <i class="fa-solid fa-check"></i>
                                    확인
                                </button>
                            </div>
                        </details>
                    </div>
                </article>
            </div>

            <section id="summaryPanel" class="summary-panel hidden">
                <div class="summary-head">
                    <button id="restartBtn" class="btn btn--primary" type="button">
                        <i class="fa-solid fa-rotate-right"></i>
                        처음부터
                    </button>
                </div>
                <div class="summary-grid">
                    <article class="summary-stat">
                        <span><i class="fa-solid fa-circle-check"></i></span>
                        <strong id="summaryCorrect">0 / 16</strong>
                    </article>
                    <article class="summary-stat">
                        <span><i class="fa-solid fa-chart-simple"></i></span>
                        <strong id="summaryRate">0%</strong>
                    </article>
                </div>
                <div id="summaryRetry" class="summary-list"></div>
            </section>
        </section>
    </main>

    <script src="grammar1-picture-quiz.js"></script>
</body>
</html>
