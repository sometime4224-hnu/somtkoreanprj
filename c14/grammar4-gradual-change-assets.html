<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>14과 문법 4 보조 활동 | 공용 에셋 점진 변화</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-start: #fff9ef;
            --bg-end: #eef7ff;
            --ink: #16324a;
            --muted: #617388;
            --line: rgba(148, 163, 184, 0.2);
            --panel: rgba(255, 255, 255, 0.9);
            --shadow: 0 24px 54px rgba(15, 23, 42, 0.1);
            --grow: #0ea5e9;
            --grow-soft: rgba(14, 165, 233, 0.12);
            --shrink: #f97316;
            --shrink-soft: rgba(249, 115, 22, 0.12);
            --rise: #ef4444;
            --rise-soft: rgba(239, 68, 68, 0.12);
            --fall: #2563eb;
            --fall-soft: rgba(37, 99, 235, 0.12);
            --increase: #16a34a;
            --increase-soft: rgba(22, 163, 74, 0.12);
            --decrease: #e11d48;
            --decrease-soft: rgba(225, 29, 72, 0.12);
            --mint: #10b981;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(249, 115, 22, 0.18), transparent 24%),
                radial-gradient(circle at 90% 16%, rgba(14, 165, 233, 0.18), transparent 24%),
                linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
        }

        .global-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.84);
            border-bottom: 1px solid rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
        }

        .global-nav a {
            color: #1d4ed8;
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 800;
        }

        .nav-divider {
            color: #cbd5e1;
            font-weight: 800;
        }

        .shell {
            width: min(1180px, calc(100% - 24px));
            margin: 18px auto 42px;
        }

        .section {
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.84);
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .metric,
        .mode-tag,
        .stage-chip,
        .scene-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-weight: 800;
        }

        .section {
            margin-top: 0;
            padding: 22px;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .metric {
            min-height: 44px;
            padding: 10px 16px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(255, 255, 255, 0.92);
            color: #334155;
            font-size: 0.92rem;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 12px 18px;
            border: none;
            border-radius: 16px;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.54;
            cursor: not-allowed;
        }

        .btn-soft {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #334155;
        }

        .btn-dark {
            background: linear-gradient(135deg, #0f172a, #1f2937);
            color: #fff;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 18px;
            margin-top: 18px;
        }

        .motion-card {
            position: relative;
            overflow: hidden;
            padding: 18px;
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.94));
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.06);
        }

        .motion-card::after {
            content: "";
            position: absolute;
            inset: auto -44px -58px auto;
            width: 180px;
            height: 180px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(14, 165, 233, calc(0.06 + var(--energy, 0) * 0.1)), rgba(14, 165, 233, 0));
            pointer-events: none;
        }

        .motion-card[data-direction="shrink"]::after {
            background: radial-gradient(circle, rgba(249, 115, 22, calc(0.06 + var(--energy, 0) * 0.1)), rgba(249, 115, 22, 0));
        }

        .motion-card[data-direction="rise"]::after {
            inset: -54px -42px auto auto;
            background: radial-gradient(circle, rgba(239, 68, 68, calc(0.08 + var(--energy, 0) * 0.18)), rgba(239, 68, 68, 0));
        }

        .motion-card[data-direction="fall"]::after {
            inset: auto auto -58px -42px;
            background: radial-gradient(circle, rgba(37, 99, 235, calc(0.08 + var(--energy, 0) * 0.18)), rgba(37, 99, 235, 0));
        }

        .motion-card[data-direction="increase"]::after {
            background: radial-gradient(circle, rgba(22, 163, 74, calc(0.08 + var(--energy, 0) * 0.18)), rgba(22, 163, 74, 0));
        }

        .motion-card[data-direction="decrease"]::after {
            background: radial-gradient(circle, rgba(225, 29, 72, calc(0.08 + var(--energy, 0) * 0.18)), rgba(225, 29, 72, 0));
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .mode-tag,
        .stage-chip,
        .scene-chip {
            min-height: 34px;
            padding: 8px 12px;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .mode-tag--grow {
            background: rgba(14, 165, 233, 0.12);
            color: #0369a1;
        }

        .mode-tag--shrink {
            background: rgba(249, 115, 22, 0.12);
            color: #c2410c;
        }

        .mode-tag--rise {
            background: var(--rise-soft);
            color: #b91c1c;
        }

        .mode-tag--fall {
            background: var(--fall-soft);
            color: #1d4ed8;
        }

        .mode-tag--increase {
            background: var(--increase-soft);
            color: #15803d;
        }

        .mode-tag--decrease {
            background: var(--decrease-soft);
            color: #be123c;
        }

        .stage-chip {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.16);
            color: #475569;
        }

        .media-frame {
            position: relative;
            overflow: hidden;
            min-height: 330px;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.14);
            background: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.46);
        }

        .asset-frame {
            isolation: isolate;
            background:
                linear-gradient(180deg, #bfe7ff 0%, #effaff 38%, #f6ffe7 38%, #d9f0ad 56%, #a8d973 100%);
        }

        .asset-frame::before,
        .asset-frame::after {
            content: "";
            position: absolute;
            pointer-events: none;
        }

        .asset-frame::before {
            left: -8%;
            right: -8%;
            bottom: 39%;
            z-index: 0;
            height: 26%;
            background:
                radial-gradient(ellipse at 17% 100%, rgba(96, 165, 250, 0.2) 0 42%, transparent 43%),
                radial-gradient(ellipse at 68% 100%, rgba(34, 197, 94, 0.18) 0 47%, transparent 48%),
                linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.34) 100%);
        }

        .asset-frame::after {
            left: -5%;
            right: -5%;
            bottom: 0;
            z-index: 0;
            height: 46%;
            background:
                repeating-linear-gradient(172deg, rgba(101, 163, 13, 0.12) 0 2px, transparent 2px 22px),
                linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(101, 163, 13, 0.08));
            opacity: 0.76;
        }

        .asset-frame--garden {
            background:
                linear-gradient(180deg, #c8edff 0%, #fff9ed 39%, #f2f9d8 39%, #caee97 58%, #9bd66f 100%);
        }

        .asset-frame--field {
            background:
                linear-gradient(180deg, #c1e8ff 0%, #f8fdff 37%, #f0f9d8 37%, #c8e887 58%, #9fcd5f 100%);
        }

        .asset-frame--orchard {
            background:
                linear-gradient(180deg, #bee6ff 0%, #f8fdff 42%, #f3f8d8 42%, #c4df87 60%, #95c761 100%);
        }

        .asset-frame--pasture {
            background:
                linear-gradient(180deg, #bde5ff 0%, #f8fdff 41%, #ecf8d1 41%, #bbdf83 59%, #86c95d 100%);
        }

        .asset-scenery {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .asset-fence {
            position: absolute;
            left: 6%;
            right: 6%;
            bottom: 39%;
            height: 42px;
            opacity: 0.42;
            background:
                linear-gradient(180deg, transparent 0 11px, rgba(146, 97, 56, 0.5) 11px 16px, transparent 16px 26px, rgba(146, 97, 56, 0.42) 26px 31px, transparent 31px),
                repeating-linear-gradient(90deg, rgba(120, 80, 45, 0.55) 0 5px, transparent 5px 58px);
            transform: perspective(320px) rotateX(58deg);
            transform-origin: bottom center;
        }

        .asset-path {
            position: absolute;
            left: 40%;
            bottom: -4%;
            width: 24%;
            height: 48%;
            border-radius: 50% 50% 0 0;
            background: linear-gradient(180deg, rgba(252, 211, 77, 0.12), rgba(180, 133, 67, 0.18));
            transform: skewX(-8deg);
            opacity: 0.62;
        }

        .asset-tree-line {
            position: absolute;
            left: 6%;
            right: 6%;
            bottom: 42%;
            height: 34px;
            opacity: 0.36;
            background:
                repeating-linear-gradient(90deg, transparent 0 22px, rgba(21, 128, 61, 0.34) 22px 30px, transparent 30px 54px);
            clip-path: polygon(0 100%, 4% 45%, 8% 100%, 14% 28%, 19% 100%, 25% 42%, 31% 100%, 38% 30%, 45% 100%, 52% 38%, 60% 100%, 67% 22%, 74% 100%, 82% 42%, 89% 100%, 95% 34%, 100% 100%);
        }

        .asset-ground-line {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 30%;
            z-index: 2;
            height: 1px;
            background: rgba(22, 101, 52, 0.16);
        }

        .asset-field-row {
            position: absolute;
            left: -4%;
            right: -4%;
            z-index: 2;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(101, 163, 13, 0.22), transparent);
            transform: rotate(-2deg);
        }

        .asset-field-row:nth-child(1) {
            bottom: 22%;
        }

        .asset-field-row:nth-child(2) {
            bottom: 34%;
        }

        .asset-field-row:nth-child(3) {
            bottom: 46%;
        }

        .asset-feature {
            position: absolute;
            z-index: 3;
            display: grid;
            place-items: center;
            opacity: 0.98;
            transform: translate(-50%, -50%) scale(var(--feature-scale, 1));
            transform-origin: center bottom;
            transition: transform 0.34s cubic-bezier(.2,.9,.2,1), opacity 0.24s ease;
            filter: drop-shadow(0 20px 22px rgba(15, 23, 42, 0.12));
        }

        .asset-feature img {
            display: block;
            width: 100%;
            height: auto;
        }

        .asset-feature-label {
            position: absolute;
            left: 50%;
            bottom: -12px;
            transform: translateX(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.86);
            color: #166534;
            font-size: 0.72rem;
            font-weight: 900;
            white-space: nowrap;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .asset-pair-bridge {
            position: absolute;
            left: 50%;
            top: 47%;
            z-index: 2;
            width: min(38%, 170px);
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(34, 197, 94, 0.06), rgba(34, 197, 94, 0.58), rgba(34, 197, 94, 0.08));
            transform: translateX(-50%) scaleX(calc(0.28 + var(--energy, 0) * 0.72));
            transform-origin: center;
            transition: transform 0.34s ease;
            box-shadow: 0 6px 18px rgba(22, 163, 74, 0.16);
        }

        .asset-pair-bridge::after {
            content: "";
            position: absolute;
            right: -6px;
            top: 50%;
            width: 12px;
            height: 12px;
            border-top: 4px solid rgba(34, 197, 94, 0.66);
            border-right: 4px solid rgba(34, 197, 94, 0.66);
            transform: translateY(-50%) rotate(45deg);
        }

        .scene-base {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .frame-top-mask {
            position: absolute;
            inset: 0 0 auto 0;
            height: 92px;
            background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.9) 52%, rgba(255,255,255,0) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .frame-top-rim {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.58);
            pointer-events: none;
            z-index: 5;
        }

        .scene-chip {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 3;
            background: rgba(15, 23, 42, 0.84);
            color: #fff;
            letter-spacing: 0.02em;
            font-size: 0.84rem;
            text-transform: none;
        }

        .object-layer {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
        }

        .object-patch {
            position: absolute;
            opacity: 0;
            transform: translate(-50%, -50%) rotate(var(--rotate, 0deg)) scale(calc(var(--patch-scale, 1) * 0.86));
            transform-origin: center center;
            transition: opacity 0.32s ease, transform 0.32s ease;
            filter: drop-shadow(0 10px 16px rgba(15, 23, 42, 0.12));
        }

        .object-patch.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%) rotate(var(--rotate, 0deg)) scale(var(--patch-scale, 1));
        }

        .object-patch img {
            display: block;
            width: 100%;
            height: auto;
        }

        .word-burst {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 8;
            display: grid;
            place-items: center;
            pointer-events: none;
            opacity: 0.82;
            animation: wordBurstFloat 0.74s cubic-bezier(.2,.9,.2,1) both;
        }

        .word-burst::before,
        .word-burst::after {
            content: "";
            position: absolute;
            width: 108%;
            height: 108%;
            border-radius: 999px;
            border: 1px solid currentColor;
            opacity: 0.14;
            animation: wordBurstWave 0.74s ease-out both;
        }

        .word-burst::after {
            width: 126%;
            height: 126%;
            animation-delay: 0.08s;
        }

        .word-burst span {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 74px;
            padding: 8px 12px 9px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.64);
            background: rgba(15, 23, 42, 0.54);
            color: #fff;
            font-size: clamp(0.96rem, 2.2vw, 1.28rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.03em;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.14);
            text-shadow: 0 2px 8px rgba(15, 23, 42, 0.18);
            white-space: nowrap;
            backdrop-filter: blur(6px);
        }

        .word-burst--grow,
        .word-burst--increase {
            color: #16a34a;
        }

        .word-burst--rise {
            color: #ef4444;
        }

        .word-burst--fall {
            color: #2563eb;
        }

        .word-burst--decrease,
        .word-burst--shrink {
            color: #e11d48;
        }

        .word-burst--increase span,
        .word-burst--grow span {
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.68), rgba(20, 184, 166, 0.64));
        }

        .word-burst--rise span {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.68), rgba(239, 68, 68, 0.64));
        }

        .word-burst--fall span {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.68), rgba(56, 189, 248, 0.64));
        }

        .word-burst--decrease span,
        .word-burst--shrink span {
            background: linear-gradient(135deg, rgba(251, 113, 133, 0.68), rgba(249, 115, 22, 0.62), rgba(225, 29, 72, 0.64));
        }

        @keyframes wordBurstFloat {
            0% {
                opacity: 0;
                transform: translate(14px, -8px) scale(0.9) rotate(-2deg);
                filter: blur(1px);
            }
            22% {
                opacity: 0.86;
                transform: translate(0, 0) scale(1.03) rotate(1deg);
                filter: blur(0);
            }
            72% {
                opacity: 0.78;
                transform: translate(-4px, -8px) scale(1) rotate(0);
            }
            100% {
                opacity: 0;
                transform: translate(-10px, -20px) scale(0.96) rotate(2deg);
            }
        }

        @keyframes wordBurstWave {
            0% {
                opacity: 0.18;
                transform: scale(0.82);
            }
            100% {
                opacity: 0;
                transform: scale(1.18);
            }
        }

        .effect-frame {
            isolation: isolate;
            background:
                radial-gradient(circle at 50% 16%, rgba(255, 255, 255, 0.88), transparent 28%),
                linear-gradient(180deg, #fff7ed 0%, #e0f2fe 100%);
        }

        .effect-frame--fall {
            background:
                radial-gradient(circle at 50% 84%, rgba(255, 255, 255, 0.9), transparent 28%),
                linear-gradient(180deg, #e0f2fe 0%, #eff6ff 54%, #f8fafc 100%);
        }

        .effect-orbit {
            position: absolute;
            inset: 22px auto auto 50%;
            z-index: 2;
            width: 98px;
            height: 98px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.74);
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.12);
            transform: translateX(-50%) translateY(calc(var(--energy, 0) * -18px));
            transition: transform 0.32s ease;
        }

        .effect-frame--fall .effect-orbit {
            inset: auto auto 22px 50%;
            transform: translateX(-50%) translateY(calc(var(--energy, 0) * 18px));
        }

        .effect-orbit span {
            font-size: 3.2rem;
            filter: drop-shadow(0 8px 12px rgba(15, 23, 42, 0.12));
        }

        .effect-track {
            position: absolute;
            z-index: 2;
            left: 50%;
            top: 72px;
            bottom: 42px;
            width: 86px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.84);
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.12), 0 18px 40px rgba(15, 23, 42, 0.12);
            transform: translateX(-50%);
            overflow: hidden;
        }

        .effect-scale {
            position: absolute;
            inset: 18px 16px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .effect-scale span {
            height: 2px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.18);
        }

        .effect-fill {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: calc(12% + var(--level, 0) * 6.8%);
            border-radius: 999px 999px 0 0;
            background: linear-gradient(180deg, #facc15, #fb923c 48%, #ef4444);
            box-shadow: 0 -10px 30px rgba(239, 68, 68, 0.36);
            transition: height 0.36s cubic-bezier(.2,.9,.2,1);
        }

        .effect-frame--fall .effect-fill {
            top: 0;
            bottom: auto;
            border-radius: 0 0 999px 999px;
            background: linear-gradient(180deg, #2563eb, #38bdf8 58%, #bae6fd);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }

        .effect-marker {
            position: absolute;
            z-index: 4;
            left: 50%;
            bottom: calc(8% + var(--level, 0) * 6.6%);
            display: grid;
            place-items: center;
            width: 58px;
            height: 58px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 16px 28px rgba(15, 23, 42, 0.16);
            font-size: 2rem;
            transform: translate(-50%, 50%);
            transition: bottom 0.36s cubic-bezier(.2,.9,.2,1), top 0.36s cubic-bezier(.2,.9,.2,1);
        }

        .effect-frame--fall .effect-marker {
            top: calc(8% + var(--level, 0) * 6.6%);
            bottom: auto;

        .effect-frame--fall .effect-arrow {
            color: rgba(37, 99, 235, calc(0.18 + var(--energy, 0) * 0.24));

        @keyframes riseParticle {
            0% {
                transform: translate3d(0, 0, 0) scale(0.72);

            }
            18% {
                opacity: calc(0.42 + var(--energy, 0) * 0.48);
            }

                transform: translate3d(var(--drift, 0), -360px, 0) scale(1.08);

        @keyframes fallParticle {
            0% {

                opacity: 0;
            }
            18% {
                opacity: calc(0.42 + var(--energy, 0) * 0.48);

        @keyframes amountPop {
