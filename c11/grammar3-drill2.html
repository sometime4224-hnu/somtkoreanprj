    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%); }
        .c11-global-nav {
            position: sticky; top: 0; z-index: 1000; height: 58px; width: 100%;

        }

</head>
<body>

<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96"

    <main id="page" class="max-w-md mx-auto px-4 py-4 pb-10 space-y-3">
        <section class="bg-white border border-blue-100 rounded-2xl p-4 shadow-sm">
            <div class="flex items-start justify-between gap-2">
                <div>
                    <p class="text-xs font-bold text-blue-600">보조 연습 3-2</p>
                    <h1 class="text-xl font-black text-slate-800 mt-1">명사 + (이)든지 / 도</h1>
                    <p class="text-sm text-slate-600 mt-1 safe">명사 받침에 맞게 -(이)든지 선택하기</p>
                    <p class="vi-text text-xs text-blue-700 mt-1 safe">Chọn -(이)든지 theo 받침 của danh từ.</p>
                </div>
                <button id="viToggle" class="shrink-0 px-3 py-2 rounded-xl border border-slate-300 text-xs font-bold text-slate-700">Tiếng Việt OFF</button>
            </div>
        </section>

        <section class="bg-amber-50 border border-amber-200 rounded-2xl p-4 shadow-sm">
            <h2 class="text-sm font-bold text-amber-800">헷갈림 비교</h2>
            <p class="text-sm text-slate-700 mt-2 safe">받침 O 명사 + <b>이든지</b>, 받침 X 명사 + <b>든지</b>, 부정문은 <b>도</b>.</p>
            <p class="vi-text text-xs text-blue-700 mt-1 safe">Danh từ có 받침 + 이든지, không 받침 + 든지, câu phủ định dùng 도.</p>
        </section>

        <section class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
            <div class="flex items-center justify-between text-xs">
                <span id="progress" class="font-bold text-blue-600"></span>
                <span id="scoreNow" class="text-slate-500"></span>
            </div>
            <p id="question" class="mt-2 text-base font-bold text-slate-800 safe"></p>
            <p id="hintKo" class="mt-2 text-xs text-slate-600 safe"></p>
            <p id="hintVi" class="vi-text text-xs text-blue-700 mt-1 safe"></p>

            <div class="mt-3">
                <p class="text-xs font-bold text-slate-500">1) 명사 선택</p>
                <div id="nounWrap" class="mt-1 grid grid-cols-2 gap-2"></div>
            </div>

            <div class="mt-3">
                <p class="text-xs font-bold text-slate-500">2) 조사 선택</p>
                <div id="suffixWrap" class="mt-1 grid grid-cols-2 gap-2"></div>
            </div>

            <button id="checkBtn" class="mt-3 w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-bold" type="button">확인</button>
            <div id="feedback" class="hidden mt-3 rounded-xl border p-3"></div>
            <button id="nextBtn" class="hidden mt-2 w-full bg-slate-800 text-white py-3 rounded-xl text-sm font-bold" type="button">다음 문제</button>
        </section>

        <section id="result" class="hidden bg-white border border-slate-200 rounded-2xl p-4 shadow-sm"></section>

        <section class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
            <div class="flex items-center justify-between">
                <h2 class="text-sm font-bold text-slate-800">최근 기록</h2>
                <button id="clearLog" class="text-xs px-2 py-1 rounded border border-slate-300 text-slate-600" type="button">삭제</button>
            </div>
            <div id="historyList" class="mt-2 space-y-2"></div>
        </section>
    </main>

    <script>
        const KEY = 'c11.g32.history.v1';
        const data = [
            { q: '배가 고파요. 무슨 ____ 다 좋아요.', hintKo: '긍정/허용', hintVi: 'Cho phép', noun: '음식', suffix: '든지', options: ['음식', '사람', '책', '문제'] },
            { q: '너무 늦어서 거리에는 ____ 없었어요.', hintKo: '전면 부정', hintVi: 'Phủ định hoàn toàn', noun: '사람', suffix: '도', options: ['사람', '영화', '가게', '요일'] },
            { q: '저는 무슨 ____ 재미있게 봐요.', hintKo: '긍정/허용', hintVi: 'Cho phép', noun: '영화', suffix: '든지', options: ['학생', '영화', '문제', '선물'] },
            { q: '몸이 아파서 ____ 할 수 없어요.', hintKo: '전면 부정', hintVi: 'Phủ định hoàn toàn', noun: '일', suffix: '도', options: ['일', '과일', '노래', '요리'] },
            { q: '도서관에는 무슨 ____ 다 있어요.', hintKo: '긍정/허용', hintVi: 'Cho phép', noun: '책', suffix: '든지', options: ['책', '사람', '문', '방'] },
            { q: '휴일이라서 문 연 ____ 없었어요.', hintKo: '전면 부정', hintVi: 'Phủ định hoàn toàn', noun: '가게', suffix: '도', options: ['가게', '학생', '날씨', '음악'] },
            { q: '지민 씨는 무슨 ____ 잘 불러요.', hintKo: '긍정/허용', hintVi: 'Cho phép', noun: '노래', suffix: '든지', options: ['노래', '일', '문제', '수업'] },
            { q: '문제가 너무 어려워서 ____ 풀지 못했어요.', hintKo: '전면 부정', hintVi: 'Phủ định hoàn toàn', noun: '학생', suffix: '도', options: ['학생', '책', '음식', '과일'] },
            { q: '저는 무슨 ____ 잘 먹어요.', hintKo: '긍정/허용', hintVi: 'Cho phép', noun: '과일', suffix: '든지', options: ['과일', '사람', '교실', '의자'] },
            { q: '완벽하게 준비해서 ____ 없었어요.', hintKo: '전면 부정', hintVi: 'Phủ định hoàn toàn', noun: '문제', suffix: '도', options: ['문제', '노래', '가게', '요리'] }
        ];

        const state = { idx: 0, score: 0, selectedNoun: '', selectedSuffix: '', answered: false, logs: [] };
        const suffixList = ['든지', '도'];

        const page = document.getElementById('page');
        const viToggle = document.getElementById('viToggle');
        const progress = document.getElementById('progress');
        const scoreNow = document.getElementById('scoreNow');
        const question = document.getElementById('question');
        const hintKo = document.getElementById('hintKo');
        const hintVi = document.getElementById('hintVi');
        const nounWrap = document.getElementById('nounWrap');
        const suffixWrap = document.getElementById('suffixWrap');
        const checkBtn = document.getElementById('checkBtn');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('nextBtn');
        const result = document.getElementById('result');
        const historyList = document.getElementById('historyList');
        const clearLog = document.getElementById('clearLog');

        let viOn = false;

        function esc(text) {
            return String(text == null ? '' : text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function shuffle(arr) {
            const c = arr.slice();
            for (let i = c.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = c[i]; c[i] = c[j]; c[j] = t;
            }
            return c;
        }

        function hasBatchim(word) {
            if (!word) return false;
            const ch = word.charCodeAt(word.length - 1);
            return (ch - 44032) % 28 > 0;
        }

        function combine(noun, suffix) {
            if (!noun || !suffix) return '_____';
            if (suffix === '든지') return hasBatchim(noun) ? noun + '이든지' : noun + '든지';
            return noun + '도';
        }

        function loadHistory() {
            try {
                const raw = localStorage.getItem(KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(item) {
            const h = loadHistory();
            h.unshift(item);
            if (h.length > 20) h.length = 20;
            localStorage.setItem(KEY, JSON.stringify(h));
        }

        function renderHistory() {
            const h = loadHistory();
            if (!h.length) {
                historyList.innerHTML = '<p class="text-xs text-slate-500">기록이 없습니다.</p>';
                return;
            }
            historyList.innerHTML = h.map(function (x, i) {
                return '<div class="rounded-xl border border-slate-200 px-3 py-2">' +
                    '<p class="text-[11px] text-slate-500">' + (i + 1) + '회 · ' + esc(x.time) + '</p>' +
                    '<p class="text-sm font-bold text-slate-800">' + x.score + ' / ' + x.total + ' (' + x.percent + '%)</p>' +
                    '</div>';
            }).join('');
        }

        let questions = shuffle(data);

        function renderPicks() {
            const current = questions[state.idx];
            nounWrap.innerHTML = current.options.map(function (x) {
                const selected = state.selectedNoun === x ? 'selected' : '';
                return '<button type="button" class="pick border border-slate-300 rounded-xl py-2 text-sm font-bold ' + selected + '" data-noun="' + x + '">' + x + '</button>';
            }).join('');

            suffixWrap.innerHTML = suffixList.map(function (x) {
                const selected = state.selectedSuffix === x ? 'selected' : '';
                const label = x === '든지' ? '-(이)든지' : '-도';
                return '<button type="button" class="pick border border-slate-300 rounded-xl py-2 text-sm font-bold ' + selected + '" data-suffix="' + x + '">' + label + '</button>';
            }).join('');
        }

        function renderQuestion() {
            if (state.idx >= questions.length) {
                renderResult();
                return;
            }
            const q = questions[state.idx];
            progress.textContent = (state.idx + 1) + ' / ' + questions.length;
            scoreNow.textContent = '점수 ' + state.score;
            question.textContent = q.q;
            hintKo.textContent = '상황: ' + q.hintKo;
            hintVi.textContent = 'Tình huống: ' + q.hintVi;
            state.selectedNoun = '';
            state.selectedSuffix = '';
            state.answered = false;
            feedback.classList.add('hidden');
            feedback.innerHTML = '';
            nextBtn.classList.add('hidden');
            renderPicks();
        }

        function answer() {
            if (state.answered) return;
            if (!state.selectedNoun || !state.selectedSuffix) return;
            const q = questions[state.idx];
            const user = combine(state.selectedNoun, state.selectedSuffix);
            const correct = combine(q.noun, q.suffix);
            const ok = state.selectedNoun === q.noun && state.selectedSuffix === q.suffix;
            state.answered = true;
            if (ok) state.score += 1;
            state.logs.push({ q: q.q, user: user, correct: correct, ok: ok });

            feedback.classList.remove('hidden');
            feedback.className = 'mt-3 rounded-xl border p-3 ' + (ok ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200');
            feedback.innerHTML = '' +
                '<p class="text-sm font-bold ' + (ok ? 'text-emerald-700' : 'text-rose-700') + '">' + (ok ? '정답입니다.' : '오답입니다.') + ' <span class="text-xs">(' + (ok ? 'Đúng' : 'Sai') + ')</span></p>' +
                '<p class="text-xs text-slate-700 mt-2"><b>내 답:</b> ' + esc(user) + '</p>' +
                '<p class="text-xs text-slate-700 mt-1"><b>정답:</b> ' + esc(correct) + '</p>' +
                '<p class="text-xs text-slate-700 mt-2 safe"><b>설명(KO):</b> ' + (q.suffix === '든지' ? '허용/선택 의미라 -(이)든지를 씁니다.' : '전면 부정 문맥이라 -도를 씁니다.') + '</p>' +
                '<p class="text-xs text-blue-700 mt-1 safe"><b>Giải thích (VI):</b> ' + (q.suffix === '든지' ? 'Ngữ cảnh chấp nhận lựa chọn nên dùng -(이)든지.' : 'Ngữ cảnh phủ định hoàn toàn nên dùng -도.') + '</p>';

            nextBtn.classList.remove('hidden');
        }

        function renderResult() {
            const percent = Math.round((state.score / questions.length) * 100);
            const wrong = state.logs.filter(function (x) { return !x.ok; });
            saveHistory({
                time: new Date().toLocaleString('ko-KR'),
                score: state.score,
                total: questions.length,
                percent: percent
            });

            result.classList.remove('hidden');
            result.innerHTML = '' +
                '<div class="rounded-xl border border-blue-200 bg-blue-50 p-4 text-center">' +
                '<p class="text-xs font-bold text-blue-700">완료</p>' +
                '<h3 class="text-2xl font-black text-slate-800 mt-1">' + state.score + ' / ' + questions.length + '</h3>' +
                '<p class="text-sm text-slate-600 mt-1">정답률 ' + percent + '%</p>' +
                '<button id="restartBtn" class="mt-3 px-4 py-2 rounded-lg bg-slate-800 text-white text-sm font-bold" type="button">다시 시작</button>' +
                '</div>' +
                '<div class="mt-3 space-y-2">' +
                (wrong.length ? wrong.map(function (w, i) {
                    return '<article class="rounded-xl border border-rose-200 bg-rose-50 p-3">' +
                        '<p class="text-xs font-bold text-rose-700">오답 ' + (i + 1) + '</p>' +
                        '<p class="text-sm text-slate-800 mt-1 safe">' + esc(w.q) + '</p>' +
                        '<p class="text-xs text-slate-700 mt-2">내 답: ' + esc(w.user) + '</p>' +
                        '<p class="text-xs text-slate-700 mt-1">정답: ' + esc(w.correct) + '</p>' +
                        '</article>';
                }).join('') : '<p class="text-sm text-emerald-700">모든 문항 정답입니다.</p>') +
                '</div>';

            document.getElementById('restartBtn').addEventListener('click', function () {
                state.idx = 0;
                state.score = 0;
                state.logs = [];
                questions = shuffle(data);
                result.classList.add('hidden');
                renderQuestion();
                renderHistory();
            });

            renderHistory();
        }

        viToggle.addEventListener('click', function () {
            viOn = !viOn;
            page.classList.toggle('vi-on', viOn);
            viToggle.textContent = viOn ? 'Tiếng Việt ON' : 'Tiếng Việt OFF';
        });

        nounWrap.addEventListener('click', function (event) {
            const t = event.target;
            if (!t || !t.dataset || !t.dataset.noun || state.answered) return;
            state.selectedNoun = t.dataset.noun;
            renderPicks();
        });

        suffixWrap.addEventListener('click', function (event) {
            const t = event.target;
            if (!t || !t.dataset || !t.dataset.suffix || state.answered) return;
            state.selectedSuffix = t.dataset.suffix;
            renderPicks();
        });

        checkBtn.addEventListener('click', answer);
        nextBtn.addEventListener('click', function () {
            state.idx += 1;
            renderQuestion();
        });

        clearLog.addEventListener('click', function () {
            localStorage.removeItem(KEY);
            renderHistory();
        });

        renderQuestion();
        renderHistory();
    </script>
    <script src="../shared/learning-enhancements.js"></script>
    <script src="../shared/site-copyright.js"></script>
