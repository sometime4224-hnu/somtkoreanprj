            let currentQuizData = [];
            let currentQuestionIndex = 0;
            let totalScore = 0;
            let combo = 0;
            let quizResults = [];
            let currentQuizMode = 'normal';

            const colorMap = {
                indigo: { bg: 'bg-indigo-50', text: 'text-indigo-800', cardBack: 'bg-indigo-500', button: 'bg-indigo-500' },
                green: { bg: 'bg-green-50', text: 'text-green-800', cardBack: 'bg-green-500', button: 'bg-green-500' },
                blue: { bg: 'bg-blue-50', text: 'text-blue-800', cardBack: 'bg-blue-500', button: 'bg-blue-500' },
                red: { bg: 'bg-red-50', text: 'text-red-800', cardBack: 'bg-red-500', button: 'bg-red-500' }
            };

            const koreanCardImageMap = {
                "아르바이트": "../assets/c11/images/split/c11_02_TL.jpg",
                "근무 시간": "../assets/c11/images/split/c11_02_TR.jpg",
                "업무": "../assets/c11/images/split/c11_02_BL.jpg",
                "시급": "../assets/c11/images/split/c11_02_BR.jpg",
                "성별": "../assets/c11/images/split/c11_03_TL.jpg",
                "연령": "../assets/c11/images/split/c11_03_TR.jpg",
                "성실하다": "../assets/c11/images/split/c11_03_BL.jpg",
                "꼼꼼하다": "../assets/c11/images/split/c11_03_BR.jpg",
                "경험이 많다": "../assets/c11/images/split/c11_04_TL.jpg",
                "실력이 있다": "../assets/c11/images/split/c11_04_TR.jpg",
                "이해가 빠르다": "../assets/c11/images/split/c11_04_BL.jpg",
                "최선을 다하다": "../assets/c11/images/split/c11_04_BR.jpg",
                "보고서 작성을 잘하다": "../assets/c11/images/split/c11_05_TL.jpg",
                "대인 관계가 원만하다": "../assets/c11/images/split/c11_05_TR.jpg",
                "신입 사원": "../assets/c11/images/split/c11_05_BL.jpg",
                "동료": "../assets/c11/images/split/c11_05_BR.jpg",
                "직장 상사": "../assets/c11/images/split/c11_06_TL.jpg",
                "부하 직원": "../assets/c11/images/split/c11_06_TR.jpg",
                "대리": "../assets/c11/images/split/c11_06_BL.jpg",
                "과장": "../assets/c11/images/split/c11_06_BR.jpg",
                "부장": "../assets/c11/images/split/c11_01_TL.jpg",
                "대기업": "../assets/c11/images/split/c11_01_TR.jpg",
                "중소기업": "../assets/c11/images/split/c11_01_BL.jpg",
                "연봉이 높다": "../assets/c11/images/split/c11_01_BR.jpg",
                "출퇴근 시간이 자유롭다": "../assets/c11/images/split/c11_07_TL.jpg",
                "승진 기회가 많다": "../assets/c11/images/split/c11_07_TR.jpg",
                "휴가가 길다": "../assets/c11/images/split/c11_07_BL.jpg"
            };

            const koreanChoseongImageMap = Object.fromEntries(
                Object.entries(koreanCardImageMap).map(([word, imagePath]) => [word, imagePath.replace('/split/', '/choseong/')])
            );
            const koreanMaskedImageMap = Object.fromEntries(
                Object.entries(koreanCardImageMap).map(([word, imagePath]) => [
                    word,
                    imagePath.replace('/split/', '/masked/').replace('.jpg', '_masked.jpg')
                ])
            );

            // Fisher-Yates shuffle algorithm
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            // Function to save quiz result to local storage
            function saveQuizResult() {
                try {
                    const resultData = {
                        score: totalScore,
                        totalQuestions: allVocabulary[currentLang].data.length,
                        date: new Date().toLocaleDateString('ko-KR'),
                        mode: currentQuizMode
                    };
                    localStorage.setItem(`quizResult_${currentLang}`, JSON.stringify(resultData));
                    displayLastScore();
                } catch (e) {
                    console.error("Local storage save failed:", e);
                }
            }

            // Function to load and display the last score
            function displayLastScore() {
                try {
                    const savedData = localStorage.getItem(`quizResult_${currentLang}`);
                    if (savedData) {
                        const result = JSON.parse(savedData);
                        const modeLabelMap = { normal: '일반퀴즈', choseong: '초성퀴즈', image: '그림퀴즈' };
                        const modeLabel = modeLabelMap[result.mode] || '일반퀴즈';
                        lastScoreDisplayEl.textContent = `최근 점수(${modeLabel}): ${result.score}점 (총 ${result.totalQuestions}문제)`;
                        lastScoreDisplayEl.classList.remove('hidden');
                    } else {
                        lastScoreDisplayEl.classList.add('hidden');
                    }
                } catch (e) {
                    console.error("Local storage load failed:", e);
                }
            }
            
            // Function to switch views
            function showView(view) {
                cardView.classList.add('hidden');
                quizView.classList.add('hidden');
                resultView.classList.add('hidden');
                document.getElementById(view).classList.remove('hidden');
            }

            function activateLanguageButton(language) {
                langButtons.forEach(btn => {
                    if (btn.dataset.lang === language) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }

            function startQuiz(mode) {
                currentQuizMode = mode;

                if ((mode === 'choseong' || mode === 'image') && currentLang !== 'korean') {
                    currentLang = 'korean';
                    activateLanguageButton('korean');
                    createCardBoard(currentLang);
                }

                const sourceData = mode === 'normal'
                    ? allVocabulary[currentLang].data
                    : allVocabulary.korean.data;

                currentQuizData = [...sourceData];
                shuffleArray(currentQuizData);
                currentQuestionIndex = 0;
                totalScore = 0;
                combo = 0;
                quizResults = [];
                showView('quiz-view');
                showQuizQuestion();
            }

            // Renders the vocabulary cards
            function createCardBoard(language) {
                gameBoard.innerHTML = '';
                const langData = allVocabulary[language];
                const vocabulary = langData.data;
                const colors = colorMap[langData.themeColor];
                const isKoreanMode = language === 'korean';
                
                body.className = `min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-500 ${colors.bg}`;
                
                vocabulary.forEach(item => {
                    const cardContainer = document.createElement('div');
                    cardContainer.className = 'card-container h-48';
                    const cardInner = document.createElement('div');
                    cardInner.className = 'card-inner';

                    const cardFront = document.createElement('div');
                    if (isKoreanMode) {
                        cardFront.className = 'card-front image-card-front';
                        const imagePath = koreanCardImageMap[item.korean];
                        if (imagePath) {
                            const imageEl = document.createElement('img');
                            imageEl.src = imagePath;
                            imageEl.alt = `${item.korean} 그림 카드`;
                            imageEl.loading = 'lazy';
                            imageEl.decoding = 'async';
                            cardFront.appendChild(imageEl);
                        } else {
                            const fallbackText = document.createElement('h2');
                            fallbackText.className = `text-2xl font-bold ${colors.text}`;
                            fallbackText.textContent = item.korean;
                            cardFront.appendChild(fallbackText);
                        }
                    } else {
                        cardFront.className = `card-front bg-white ${colors.text}`;
                        const koreanText = document.createElement('h2');
                        koreanText.className = 'text-2xl font-bold';
                        koreanText.textContent = item.korean;
                        cardFront.appendChild(koreanText);
                    }

                    const cardBack = document.createElement('div');
                    cardBack.className = `card-back text-white ${colors.cardBack}`;
                    if (isKoreanMode) {
                        const koreanAnswer = document.createElement('h2');
                        koreanAnswer.className = 'text-2xl font-bold';
                        koreanAnswer.textContent = item.korean;
                        cardBack.appendChild(koreanAnswer);
                    } else {
                        const foreignText = document.createElement('p');
                        foreignText.className = 'text-lg font-semibold';
                        foreignText.textContent = item.foreign;
                        cardBack.appendChild(foreignText);
                    }
                    
                    cardInner.appendChild(cardFront);
                    cardInner.appendChild(cardBack);
                    cardContainer.appendChild(cardInner);
                    gameBoard.appendChild(cardContainer);

                    cardContainer.addEventListener('click', () => cardContainer.classList.toggle('flipped'));
                });
            }

            // Generates and displays a single quiz question
            function showQuizQuestion() {
                const totalQuestions = currentQuizData.length;
                if (currentQuestionIndex >= totalQuestions) {
                    showQuizResult();
                    return;
                }

                const currentItem = currentQuizData[currentQuestionIndex];
                let correctAnswer = '';
                let options = [];

                if (currentQuizMode === 'choseong' || currentQuizMode === 'image') {
                    const allItems = allVocabulary.korean.data;
                    const distractors = [];
                    while (distractors.length < 2) {
                        const randomIndex = Math.floor(Math.random() * allItems.length);
                        const randomItem = allItems[randomIndex];
                        if (randomItem.korean !== currentItem.korean && !distractors.includes(randomItem.korean)) {
                            distractors.push(randomItem.korean);
                        }
                    }

                    correctAnswer = currentItem.korean;
                    options = [correctAnswer, ...distractors];

                    const isChoseongMode = currentQuizMode === 'choseong';
                    quizModeLabelEl.textContent = isChoseongMode ? '초성퀴즈' : '그림퀴즈';
                    quizModeLabelEl.classList.remove('hidden');
                    quizImageBoxEl.classList.remove('hidden');
                    const imageMap = isChoseongMode ? koreanChoseongImageMap : koreanMaskedImageMap;
                    quizImageEl.src = imageMap[currentItem.korean] || koreanCardImageMap[currentItem.korean] || '';
                    quizImageEl.alt = `${currentItem.korean} ${isChoseongMode ? '초성' : '마스킹'} 그림`;
                    quizQuestionEl.textContent = isChoseongMode
                        ? '초성 그림의 어휘는 무엇일까요?'
                        : '그림만 보고 어휘를 맞혀 보세요.';
                } else {
                    const allItems = allVocabulary[currentLang].data;
                    const distractors = [];
                    while (distractors.length < 2) {
                        const randomIndex = Math.floor(Math.random() * allItems.length);
                        const randomItem = allItems[randomIndex];
                        if (randomItem.foreign !== currentItem.foreign && !distractors.includes(randomItem.foreign)) {
                            distractors.push(randomItem.foreign);
                        }
                    }

                    correctAnswer = currentItem.foreign;
                    options = [correctAnswer, ...distractors];

                    quizModeLabelEl.textContent = '일반퀴즈';
                    quizModeLabelEl.classList.remove('hidden');
                    quizImageBoxEl.classList.add('hidden');
                    quizImageEl.removeAttribute('src');
                    quizQuestionEl.textContent = currentItem.korean;
                }

                shuffleArray(options);

                // Update UI
                quizQuestionNumberEl.textContent = `${currentQuestionIndex + 1} / ${totalQuestions}`;
                quizOptionsEl.innerHTML = '';
                quizFeedbackEl.textContent = ''; // Clear feedback
                quizComboEl.textContent = (combo > 0) ? `✨ ${combo} 콤보! ✨` : '';

                options.forEach(option => {
                    const optionBtn = document.createElement('button');
                    optionBtn.className = `w-full px-4 py-4 text-lg font-semibold rounded-lg shadow-md transition-all duration-300 text-gray-800 bg-gray-100 hover:bg-gray-200`;
                    optionBtn.textContent = option;
                    optionBtn.addEventListener('click', () => handleAnswer(option, correctAnswer, optionBtn));
                    quizOptionsEl.appendChild(optionBtn);
                });
            }

            // Handles user's answer
            function handleAnswer(selectedAnswer, correctAnswer, selectedBtn) {
                const isCorrect = selectedAnswer === correctAnswer;
                
                // Disable all buttons after selection
                Array.from(quizOptionsEl.children).forEach(btn => btn.disabled = true);

                let pointsGained = 0;
                if (isCorrect) {
                    combo++;
                    pointsGained = 10 + combo; // Basic point + combo bonus
                    totalScore += pointsGained;
                    selectedBtn.classList.add('bg-green-300', 'text-white');
                    quizFeedbackEl.textContent = '정답입니다! 🎉';
                    quizFeedbackEl.classList.add('correct');
                } else {
                    combo = 0;
                    pointsGained = 0;
                    selectedBtn.classList.add('bg-red-300', 'text-white');
                    quizFeedbackEl.textContent = `아쉽네요. 정답은 '${correctAnswer}' 입니다.`;
                    quizFeedbackEl.classList.add('wrong');
                    
                    // Highlight the correct answer
                    Array.from(quizOptionsEl.children).forEach(btn => {
                        if (btn.textContent === correctAnswer) {
                            btn.classList.add('bg-green-300', 'text-white');
                        }
                    });
                }
                
                // Track result
                quizResults.push({
                    question: currentQuizMode === 'choseong'
                        ? `초성 그림 ${currentQuestionIndex + 1}`
                        : currentQuizMode === 'image'
                            ? `그림 퀴즈 ${currentQuestionIndex + 1}`
                            : currentQuizData[currentQuestionIndex].korean,
                    userAnswer: selectedAnswer,
                    correctAnswer: correctAnswer,
                    isCorrect: isCorrect,
                    points: pointsGained
                });
                
                // Move to the next question after a short delay
                setTimeout(() => {
                    currentQuestionIndex++;
                    quizFeedbackEl.classList.remove('correct', 'wrong');
                    showQuizQuestion();
                }, 1500);
            }

            // Shows the quiz results page
            function showQuizResult() {
                showView('result-view');
                resultTitleEl.textContent = currentQuizMode === 'choseong'
                    ? '초성퀴즈 완료!'
                    : currentQuizMode === 'image'
                        ? '그림퀴즈 완료!'
                        : '퀴즈 완료!';
                resultScoreEl.textContent = `총 점수: ${totalScore}점`;
                resultTableBodyEl.innerHTML = '';
                
                quizResults.forEach(result => {
                    const row = document.createElement('tr');
                    const correctClass = result.isCorrect ? 'correct-answer' : 'wrong-answer';
                    row.className = correctClass;
                    
                    row.innerHTML = `
                        <td class="p-3 border-b-2 font-medium">${result.question}</td>
                        <td class="p-3 border-b-2 text-gray-700">${result.correctAnswer}</td>
                        <td class="p-3 border-b-2 font-bold">${result.isCorrect ? 'O' : 'X'}</td>
                        <td class="p-3 border-b-2 text-right">${result.points}점</td>
                    `;
                    resultTableBodyEl.appendChild(row);
                });

                saveQuizResult();
            }

            // Event Listeners
            langButtons.forEach(button => {
                button.addEventListener('click', () => {
                    activateLanguageButton(button.dataset.lang);
                    currentLang = button.dataset.lang;
                    createCardBoard(currentLang);
                    displayLastScore();
                    showView('card-view');
                });
            });

            startQuizBtn.addEventListener('click', () => {
                startQuiz('normal');
            });

            startChoseongQuizBtn.addEventListener('click', () => {
                startQuiz('choseong');
            });
            startImageQuizBtn.addEventListener('click', () => {
                startQuiz('image');
            });

            restartQuizBtn.addEventListener('click', () => {
                startQuiz(currentQuizMode);
            });

            backToCardsBtn.addEventListener('click', () => {
                createCardBoard(currentLang);
                showView('card-view');
            });

            captureBtn.addEventListener('click', () => {
                // Hide buttons before capture
                const buttons = document.querySelectorAll('#result-view button');
                buttons.forEach(btn => btn.style.display = 'none');
                
                captureText.textContent = '캡처 중...';
                
                html2canvas(resultContentToCapture, {
                    scale: 2, // Capture at a higher resolution
                    useCORS: true
                }).then(canvas => {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `quiz_result_${new Date().toLocaleDateString('ko-KR')}.png`;
                    a.click();
                    
                    // Show buttons again after capture
                    buttons.forEach(btn => btn.style.display = '');
                    captureText.textContent = '결과 캡처하기';
                });
            });

            // Initial setup
            activateLanguageButton('korean');
            createCardBoard('korean');
            displayLastScore();
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
