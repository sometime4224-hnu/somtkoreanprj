    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10~12과 통합 어휘 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --nav-height: 56px;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
            color: #0f172a;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 20;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid #dbeafe;
            backdrop-filter: blur(10px);
        }

        .top-nav a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
        }

        .divider {
            color: #cbd5e1;
            font-weight: 700;
        }

        .shell {
            max-width: 760px;
            margin: 0 auto;
            padding: 18px 16px 56px;
        }

        #app {
            min-height: calc(100dvh - var(--nav-height) - 40px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #dbeafe;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
        }

        .question-screen {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: calc(100dvh - var(--nav-height) - 40px);
        }

        .quiz-body {
            flex: 1;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #2563eb;
            text-transform: uppercase;
        }

        .stage-chip {
            border-radius: 999px;
            padding: 8px 12px;
            border: 1px solid #dbeafe;
            background: #f8fafc;
            color: #64748b;
            font-size: 12px;
            font-weight: 800;
        }

        .stage-chip.active {
            background: #dbeafe;
            border-color: #93c5fd;
            color: #1d4ed8;
        }

        .stage-chip.done {
            background: #dcfce7;
            border-color: #86efac;
            color: #166534;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: #fff;
            padding: 14px 15px;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: #93c5fd;
            background: #f8fbff;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background: #dcfce7;
            border-color: #86efac;
            color: #166534;
        }

        .option-btn.wrong {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #991b1b;
        }

        .option-btn.dimmed {
            opacity: 0.55;
        }

        .next-btn {
            width: 100%;
            border: none;
            border-radius: 18px;
            background: #2563eb;
            color: #fff;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 800;
        }

        .ghost-btn {
            width: 100%;
            border-radius: 18px;
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #334155;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 800;
        }

        .feedback-box {
            border-radius: 18px;
            padding: 16px;
            font-size: 15px;
            line-height: 1.75;
            font-weight: 700;
        }

        .feedback-box.ok {
            background: #dcfce7;
            border: 1px solid #86efac;
            color: #166534;
        }

        .feedback-box.no {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }

        .progress-fill {
            background: linear-gradient(90deg, #2563eb 0%, #22c55e 100%);
            transition: width 0.35s ease;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .metric-chip {
            min-width: 108px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: #fff;
            padding: 10px 12px;
        }

        .metric-chip span {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
        }

        .metric-chip strong {
            display: block;
            margin-top: 4px;
            font-size: 18px;
            line-height: 1;
            color: #0f172a;
        }

        .metric-chip.live {
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .metric-chip.streak-hot {
            background: #eff6ff;
            border-color: #93c5fd;
            animation: chipPulse 1.8s ease-in-out infinite;
        }

        .question-card {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .question-card > * {
            position: relative;
            z-index: 1;
        }

        .question-card.reward::before,
        .question-card.reward::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 50%;
            height: 120px;
            pointer-events: none;
            opacity: 0;
            z-index: 0;
        }

        .question-card.reward::before {
            left: 2%;
            background-image:
                radial-gradient(circle, rgba(96, 165, 250, 0.92) 0 3px, transparent 3.5px),
                radial-gradient(circle, rgba(34, 197, 94, 0.9) 0 3px, transparent 3.5px),
                radial-gradient(circle, rgba(250, 204, 21, 0.92) 0 3px, transparent 3.5px),
                radial-gradient(circle, rgba(251, 146, 60, 0.9) 0 2.5px, transparent 3px),
                radial-gradient(circle, rgba(167, 139, 250, 0.9) 0 3px, transparent 3.5px),
                radial-gradient(circle, rgba(244, 114, 182, 0.9) 0 2.5px, transparent 3px);
            background-size: 18px 18px, 18px 18px, 18px 18px, 16px 16px, 18px 18px, 16px 16px;
            background-position: 6% 10%, 28% 0%, 47% 16%, 68% 2%, 82% 12%, 94% 4%;
            background-repeat: no-repeat;
            animation: confettiLeft 0.85s ease-out;
        }

        .question-card.reward::after {
            right: 2%;
            background-image:
                radial-gradient(circle, rgba(59, 130, 246, 0.9) 0 3px, transparent 3.5px),
                radial-gradient(circle, rgba(16, 185, 129, 0.9) 0 3px, transparent 3.5px),
                radial-gradient(circle, rgba(250, 204, 21, 0.92) 0 2.5px, transparent 3px),
                radial-gradient(circle, rgba(248, 113, 113, 0.88) 0 2.5px, transparent 3px),
                radial-gradient(circle, rgba(192, 132, 252, 0.88) 0 3px, transparent 3.5px),
                radial-gradient(circle, rgba(45, 212, 191, 0.9) 0 2.5px, transparent 3px);
            background-size: 18px 18px, 18px 18px, 16px 16px, 16px 16px, 18px 18px, 16px 16px;
            background-position: 8% 4%, 24% 16%, 42% 2%, 62% 14%, 78% 0%, 92% 12%;
            background-repeat: no-repeat;
            animation: confettiRight 0.85s ease-out;
        }

        .reaction-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: -0.01em;
        }

        .reaction-pill.ok {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #166534;
        }

        .reaction-pill.no {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
        }

        .reaction-pill i {
            font-size: 12px;
        }

        .feedback-title {
            font-size: 18px;
            font-weight: 900;
        }

        .feedback-sub {
            margin-top: 4px;
            font-size: 14px;
            line-height: 1.65;
        }

        .insight-note {
            margin-top: 12px;
            border-radius: 16px;
            border: 1px solid #dbeafe;
            background: #f8fbff;
            padding: 11px 13px;
            font-size: 13px;
            line-height: 1.6;
            font-weight: 700;
            color: #2563eb;
        }

        .score-card {
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #e2e8f0;
        }

        .score-card.blue {
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .score-card.slate {
            background: #f8fafc;
            border-color: #e2e8f0;
        }

        .score-card.green {
            background: #ecfdf5;
            border-color: #a7f3d0;
        }

        @keyframes confettiLeft {
            0% {
                opacity: 0;
                transform: translateY(-12px) rotate(-10deg);
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(82px) rotate(10deg);
            }
        }

        @keyframes confettiRight {
            0% {
                opacity: 0;
                transform: translateY(-10px) rotate(10deg);
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(86px) rotate(-8deg);
            }
        }

        @keyframes chipPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.06);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.12);
            }
        }

        @media (max-width: 640px) {
            :root {
                --nav-height: 48px;
            }

            .top-nav {
                height: var(--nav-height);
                gap: 8px;
                padding: 0 12px;
            }

            .top-nav a,
            .top-nav .text-sm {
                font-size: 13px;
            }

            .shell {
                padding: 10px 10px 16px;
            }

            #app,
            .question-screen {
                min-height: calc(100dvh - var(--nav-height) - 18px);
            }

            .question-screen {
                gap: 10px;
            }

            .panel {
                border-radius: 18px;
                box-shadow: 0 14px 28px rgba(15, 23, 42, 0.05);
            }

            .quiz-head {
                padding: 12px !important;
                margin-bottom: 0 !important;
            }

            .quiz-body,
            .result-screen {
                padding: 14px !important;
            }

            .quiz-body {
                min-height: 0;
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }

            .result-screen {
                min-height: calc(100dvh - var(--nav-height) - 18px);
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }

            .eyebrow {
                font-size: 10px;
            }

            .stage-chip {
                padding: 6px 10px;
                font-size: 11px;
            }

            .meta-row {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
                margin-top: 10px;
            }

            .metric-chip {
                min-width: 0;
                border-radius: 14px;
                padding: 8px 8px;
            }

            .metric-chip span {
                font-size: 10px;
            }

            .metric-chip strong {
                margin-top: 3px;
                font-size: 15px;
            }

            .stage-badge {
                margin-top: 10px !important;
                padding: 6px 10px !important;
                font-size: 11px !important;
            }

            .question-text {
                margin-top: 12px !important;
                font-size: 20px !important;
                line-height: 1.35 !important;
            }

            .question-translation {
                margin-top: 6px !important;
                font-size: 12px !important;
                line-height: 1.45 !important;
            }

            .option-list {
                display: grid;
                margin-top: 12px !important;
                gap: 8px !important;
            }

            .option-btn {
                border-radius: 14px;
                padding: 11px 12px;
                font-size: 14px;
            }

            .reaction-wrap {
                margin-top: 12px !important;
            }

            .reaction-pill {
                width: 100%;
                justify-content: center;
                padding: 8px 10px;
                font-size: 12px;
            }

            .feedback-box {
                margin-top: 10px !important;
                border-radius: 14px;
                padding: 12px 13px;
                font-size: 14px;
                line-height: 1.55;
            }

            .feedback-title {
                font-size: 16px;
            }

            .feedback-sub {
                font-size: 13px;
                line-height: 1.5;
            }

            .insight-note {
                margin-top: 10px;
                border-radius: 14px;
                padding: 10px 11px;
                font-size: 12px;
                line-height: 1.5;
            }

            .next-btn,
            .ghost-btn {
                border-radius: 14px;
                padding: 12px 14px;
                font-size: 15px;
            }

            .score-grid {
                gap: 8px !important;
            }

            .score-card {
                border-radius: 16px;
                padding: 12px 8px;
            }

            .score-card .text-3xl {
                font-size: 1.5rem !important;
                line-height: 1.1 !important;
            }
        }

        @media (max-width: 640px) and (max-height: 780px) {
            .quiz-head .text-2xl,
            .result-screen .text-2xl {
                font-size: 1.35rem !important;
            }

            .quiz-head .mt-4,
            .result-screen .mt-5,
            .result-screen .mt-6 {
                margin-top: 0.75rem !important;
            }

            .question-text {
                font-size: 18px !important;
            }

            .option-btn {
                padding: 10px 11px;
                font-size: 13px;
            }
        }
    </style>
</head>

    <script>

                    { ch: '10과', p: '서로 좋아해서 만나면 ____.', v: 'Nếu hai người thích nhau và bắt đầu gặp gỡ thì là ____.', o: ['사귀다', '선보다', '어깨에 기대다', '얼굴이 빨개지다'], a: '사귀다' },

                    { ch: '12과', p: '계단을 빨리 올라가면 ____.', v: 'Nếu leo cầu thang nhanh thì sẽ ____.', o: ['숨이 차다', '기운이 나다', '몸이 좋아지다', '기분이 상쾌하다'], a: '숨이 차다' },

                ]

            {

                    { ch: '12과', p: "'힘이 세다'와 반대되는 말은?", v: "Từ trái nghĩa với 'khỏe, mạnh' là gì?", o: ['힘이 약하다', '힘이 세다', '근육이 생기다', '기운이 나다'], a: '힘이 약하다' },
                    { ch: '12과', p: "'자세가 나쁘다'와 반대되는 말은?", v: "Từ trái nghĩa với 'tư thế xấu' là gì?", o: ['자세가 좋다', '자세가 나쁘다', '(몸을) 젖히다', '(가슴을) 펴다'], a: '자세가 좋다' },
                    { ch: '12과', p: "'살이 찌다'와 반대되는 말은?", v: "Từ trái nghĩa với 'tăng cân' là gì?", o: ['살이 찌다', '살이 빠지다', '땀이 나다', '기분이 상쾌하다'], a: '살이 빠지다' }
                ]

        const state = {
            runStages: [],
            stageIndex: 0,
            questionIndex: 0,
            answered: false,
            selected: '',
            lastCorrect: false,
            streak: 0,
            bestStreak: 0,
            totalCorrect: 0,
            stageScores: [],
            masteredWords: new Set()
        };

        const app = document.getElementById('app');

        restartQuiz();

        function restartQuiz() {
            state.runStages = STAGES.map((stage) => ({
                ...stage,
                questions: shuffle(stage.questions.map((question) => ({
                    ...question,
                    o: shuffle([...question.o])
                })))
            }));
            state.stageIndex = 0;
            state.questionIndex = 0;
            state.answered = false;
            state.selected = '';
            state.lastCorrect = false;
            state.streak = 0;
            state.bestStreak = 0;
            state.totalCorrect = 0;
            state.stageScores = STAGES.map(() => 0);
            state.masteredWords = new Set();
            render();
        }

        function render() {
            if (state.stageIndex >= state.runStages.length) {
                renderFinal();
                return;
            }

            const stage = currentStage();
            if (state.questionIndex >= stage.questions.length) {
                renderStageSummary();
                return;
            }

            renderQuestion();
        }

        function renderQuestion() {
            const stage = currentStage();
            const question = currentQuestion();
            const progress = ((state.questionIndex + 1) / stage.questions.length) * 100;
            const overallCurrent = currentQuestionNumber();
            const feedback = state.answered ? feedbackCopy(question) : null;

            app.innerHTML = `
                <div class="question-screen">
                    <section class="panel p-5 sm:p-6 mb-4 quiz-head">

                        <div class="flex flex-wrap gap-2 mt-3">${renderStageChips()}</div>
                        <h1 class="text-2xl sm:text-3xl font-black mt-4">${escapeHtml(stage.title)}</h1>
                        <p class="text-sm text-slate-500 mt-2">${escapeHtml(stage.desc)}</p>
                        <div class="meta-row">
                            <div class="metric-chip live">
                                <span>전체 복습</span>
                                <strong>${overallCurrent} / ${totalQuestionCount()}</strong>
                            </div>
                            <div class="metric-chip ${state.streak >= 3 ? 'streak-hot' : ''}">
                                <span>연속 정답</span>
                                <strong>${state.streak}</strong>
                            </div>
                            <div class="metric-chip">
                                <span>익힌 표현</span>
                                <strong>${state.masteredWords.size}</strong>
                            </div>
                        </div>
                    </section>

                    <section class="panel p-5 sm:p-6 question-card quiz-body ${state.answered && state.lastCorrect ? 'reward' : ''}">
                        <div class="flex items-center justify-between gap-3 text-sm text-slate-500">
                            <span>${state.questionIndex + 1} / ${stage.questions.length}</span>
                            <span>${escapeHtml(question.ch)}</span>
                        </div>
                        <div class="mt-2 h-2 rounded-full bg-slate-100 overflow-hidden">
                            <div class="progress-fill h-full rounded-full bg-blue-500" style="width:${progress}%"></div>
                        </div>

                        <div class="stage-badge mt-5 inline-flex items-center gap-2 rounded-full bg-blue-50 border border-blue-100 px-3 py-1 text-xs font-bold text-blue-700">
                            <i class="fa-solid fa-layer-group"></i>${escapeHtml(stage.title.split('·')[1].trim())}
                        </div>

                        <p class="question-text mt-4 text-xl sm:text-2xl font-black leading-snug">${escapeHtml(question.p)}</p>
                        <p class="question-translation mt-2 text-sm leading-6 text-slate-500">${escapeHtml(question.v || '')}</p>

                        <div class="option-list mt-5 space-y-3">
                            ${question.o.map((option, index) => `
                                <button type="button" class="option-btn ${optionState(option, question)}" ${state.answered ? 'disabled' : ''} onclick="chooseOption(${index})">
                                    ${escapeHtml(option)}
                                </button>
                            `).join('')}
                        </div>

                        ${state.answered ? `
                            <div class="reaction-wrap mt-5">
                                ${reactionMarkup()}
                            </div>
                            <div class="feedback-box ${state.lastCorrect ? 'ok' : 'no'} mt-5">
                                <p class="feedback-title">${escapeHtml(feedback.title)}</p>
                                <p class="feedback-sub">${escapeHtml(feedback.body)}</p>
                            </div>
                            <div class="insight-note">${escapeHtml(stageTip(stage.key, state.lastCorrect))}</div>
                            <button type="button" class="next-btn mt-4" onclick="goNext()">
                                ${state.questionIndex === stage.questions.length - 1 ? '이 단계 마무리하기' : '다음 문제'}
                            </button>
                        ` : ''}
                    </section>
                </div>
            `;
        }

        function renderStageSummary() {
            const stage = currentStage();
            const score = state.stageScores[state.stageIndex];
            const total = stage.questions.length;
            const isLast = state.stageIndex === state.runStages.length - 1;

            app.innerHTML = `
                <section class="panel p-6 text-center result-screen">
                    <p class="eyebrow">단계 완료</p>
                    <div class="flex flex-wrap justify-center gap-2 mt-3">${renderStageChips(true)}</div>
                    <h2 class="text-2xl sm:text-3xl font-black mt-5">${escapeHtml(stage.title)} 완료</h2>
                    <p class="text-slate-500 mt-2">${total}문항 중 ${score}문항 정답</p>
                    <p class="text-sm font-bold text-blue-700 mt-3">${escapeHtml(stageSummaryMessage(score, total))}</p>
                    <div class="score-grid grid grid-cols-3 gap-3 mt-6">
                        <div class="score-card blue">
                            <p class="text-xs font-bold text-blue-700">정답 수</p>
                            <p class="text-3xl font-black text-blue-700 mt-2">${score}</p>
                        </div>
                        <div class="score-card slate">
                            <p class="text-xs font-bold text-slate-600">정확도</p>
                            <p class="text-3xl font-black text-slate-800 mt-2">${Math.round((score / total) * 100)}%</p>
                        </div>
                        <div class="score-card green">
                            <p class="text-xs font-bold text-emerald-700">최고 연속</p>
                            <p class="text-3xl font-black text-emerald-700 mt-2">${state.bestStreak}</p>
                        </div>
                    </div>
                    <p class="text-sm text-slate-600 mt-4">지금까지 익힌 표현 ${state.masteredWords.size}개</p>
                    <button type="button" class="next-btn mt-6" onclick="${isLast ? 'finishQuiz()' : 'nextStage()'}">
                        ${isLast ? '최종 결과 보기' : '다음 단계 시작'}
                    </button>
                </section>
            `;
        }

        function renderFinal() {
            const totalQuestions = state.runStages.reduce((sum, stage) => sum + stage.questions.length, 0);
            app.innerHTML = `
                <section class="panel p-6 text-center result-screen">
                    <p class="eyebrow">퀴즈 완료</p>
                    <h1 class="text-2xl sm:text-3xl font-black mt-3">10~12과 통합 복습 끝!</h1>
                    <p class="text-slate-500 mt-2">총 ${totalQuestions}문항 중 ${state.totalCorrect}문항 정답</p>
                    <p class="text-sm font-bold text-blue-700 mt-3">${escapeHtml(finalSummaryMessage(totalQuestions))}</p>

                    <div class="score-grid grid grid-cols-3 gap-3 mt-6">
                        <div class="score-card blue">
                            <p class="text-xs font-bold text-blue-700">전체 정확도</p>
                            <p class="text-3xl font-black text-blue-700 mt-2">${Math.round((state.totalCorrect / totalQuestions) * 100)}%</p>
                        </div>
                        <div class="score-card green">
                            <p class="text-xs font-bold text-emerald-700">익힌 표현</p>
                            <p class="text-3xl font-black text-emerald-700 mt-2">${state.masteredWords.size}</p>
                        </div>
                        <div class="score-card slate">
                            <p class="text-xs font-bold text-slate-600">최고 연속</p>
                            <p class="text-3xl font-black text-slate-800 mt-2">${state.bestStreak}</p>
                        </div>
                    </div>

                    <div class="grid gap-3 mt-6">
                        ${state.runStages.map((stage, index) => `
                            <div class="panel p-4 bg-slate-50 border-slate-200 shadow-none text-left">
                                <p class="text-xs font-bold text-blue-700">${escapeHtml(stage.title)}</p>
                                <p class="text-lg font-black text-slate-800 mt-2">${state.stageScores[index]} / ${stage.questions.length}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="grid gap-3 mt-6">
                        <button type="button" class="next-btn" onclick="restartQuiz()">다시 풀기</button>
                        <a href="index.html" class="ghost-btn text-center no-underline inline-flex items-center justify-center">복습 허브로 돌아가기</a>
                    </div>
                </section>
            `;
        }

        function chooseOption(index) {
            if (state.answered) {
                return;
            }
            const question = currentQuestion();
            state.selected = question.o[index];
            state.answered = true;
            state.lastCorrect = state.selected === question.a;
            if (state.lastCorrect) {
                state.streak += 1;
                state.bestStreak = Math.max(state.bestStreak, state.streak);
                state.totalCorrect += 1;
                state.stageScores[state.stageIndex] += 1;
                state.masteredWords.add(question.a);
            } else {
                state.streak = 0;
            }
            render();
        }

        function goNext() {
            state.questionIndex += 1;
            state.answered = false;
            state.selected = '';
            render();
        }

        function nextStage() {
            state.stageIndex += 1;
            state.questionIndex = 0;
            state.answered = false;
            state.selected = '';
            render();
        }

        function finishQuiz() {
            state.stageIndex = state.runStages.length;
            render();
        }

        function currentStage() {
            return state.runStages[state.stageIndex];
        }

        function currentQuestion() {
            return currentStage().questions[state.questionIndex];
        }

        function renderStageChips(completeCurrent = false) {
            return STAGES.map((stage, index) => {
                let className = 'stage-chip';
                if (index < state.stageIndex || (completeCurrent && index === state.stageIndex)) {
                    className += ' done';
                } else if (index === state.stageIndex) {
                    className += ' active';
                }
                return `<span class="${className}">${index + 1}단계</span>`;
            }).join('');
        }

        function optionState(option, question) {
            if (!state.answered) {
                return '';
            }
            if (option === question.a) {
                return 'correct';
            }
            if (option === state.selected) {
                return 'wrong';
            }
            return 'dimmed';
        }

        function currentQuestionNumber() {
            let count = 0;
            for (let i = 0; i < state.stageIndex; i += 1) {
                count += state.runStages[i].questions.length;
            }
            return count + state.questionIndex + 1;
        }

        function totalQuestionCount() {
            return state.runStages.reduce((sum, stage) => sum + stage.questions.length, 0);
        }

        function feedbackCopy(question) {
            if (state.lastCorrect) {
                if (state.streak >= 5) {
                    return {
                        title: '흐름이 아주 좋습니다.',
                        body: `연속 정답 ${state.streak}개째예요. "${question.a}" 표현도 안정적으로 기억하고 있어요.`
                    };
                }
                if (state.streak >= 3) {
                    return {
                        title: '좋아요, 리듬이 붙었습니다.',
                        body: `연속 정답 ${state.streak}개예요. "${question.a}" 표현이 더 또렷해지고 있어요.`
                    };
                }
                return {
                    title: '정답입니다.',
                    body: `"${question.a}" 표현을 정확하게 골랐어요.`
                };
            }

            return {
                title: `정답은 "${question.a}"입니다.`,
                body: '괜찮아요. 정답을 한 번 더 보고 다음 문제로 가면 충분해요.'
            };
        }

        function stageTip(stageKey, isCorrect) {
            if (stageKey === 'blank') {
                return isCorrect
                    ? '문장 앞뒤를 함께 본 흐름이 좋았어요. 빈칸 문제는 문맥을 먼저 보면 더 빨라집니다.'
                    : '빈칸 앞뒤 말을 먼저 보면 정답 후보가 금방 줄어들어요.';
            }

            if (stageKey === 'similar') {
                return isCorrect
                    ? '설명 속 핵심 뜻을 잘 잡았어요. 비슷한 말 문제는 중심 낱말 하나만 잡아도 쉬워집니다.'
                    : '설명에서 가장 중요한 뜻 하나만 먼저 찾으면 비슷한 말 문제를 더 쉽게 풀 수 있어요.';
            }

            return isCorrect
                ? '기준 표현과 거리를 잘 비교했어요. 대조 문제는 가장 반대되는 느낌을 먼저 찾으면 편해집니다.'
                : '대조 문제는 기준 표현과 가장 멀리 있는 말을 먼저 지우면 정답이 더 잘 보여요.';
        }

        function reactionMarkup() {
            if (state.lastCorrect) {
                return `
                    <div class="reaction-pill ok">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>정답! 감이 잘 잡히고 있어요.</span>
                    </div>
                `;
            }

            return `
                <div class="reaction-pill no">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>오답이에요. 지금 고치면 더 오래 기억돼요.</span>
                </div>
            `;
        }

        function stageSummaryMessage(score, total) {
            const rate = score / total;
            if (rate >= 0.9) {
                return '대부분의 어휘가 안정적으로 기억되고 있어요.';
            }
            if (rate >= 0.7) {
                return '핵심 어휘가 잘 잡혀 있어요. 한 단계씩 자신감 있게 가면 됩니다.';
            }
            return '어려운 표현도 방향은 잘 잡고 있어요. 한 번 더 풀면 훨씬 편해집니다.';
        }

        function finalSummaryMessage(totalQuestions) {
            const rate = state.totalCorrect / totalQuestions;
            if (rate >= 0.9) {
                return '10~12과 어휘가 전반적으로 아주 탄탄합니다.';
            }
            if (rate >= 0.7) {
                return '핵심 어휘가 잘 정리되어 있어요. 복습 효과가 분명히 보입니다.';
            }
            return '중요 어휘를 넓게 다시 본 것만으로도 큰 진전이에요. 한 번 더 풀면 정확도가 빠르게 올라갑니다.';
        }

        function shuffle(items) {
            const array = [...items];
            for (let i = array.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
