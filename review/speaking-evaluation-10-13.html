<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-NB76SV96');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3B 수행 말하기 실시</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/speaking-evaluation.css">
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <main class="se-shell">
        <nav class="se-panel se-topbar" aria-label="상단 이동">
            <div class="se-topbar__links">
                <a href="index.html" class="se-link">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>리뷰 허브</span>
                </a>
                <a href="speaking-bank-10-13.html" class="se-soft-link">
                    <i class="fa-solid fa-book-open"></i>
                    <span>준비 페이지</span>
                </a>
            </div>
            <div class="se-topbar__links">
                <a href="../3B  수행 말하기 문제.pdf" class="se-soft-link" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-file-pdf"></i>
                    <span>문제 PDF</span>
                </a>
            </div>
        </nav>

        <section class="se-panel se-stage">
            <aside class="se-panel se-control-panel" aria-label="평가 컨트롤 패널">
                <button type="button" class="se-control-btn" id="modeToggleBtn">
                    <span>단/장</span>
                </button>
                <button type="button" class="se-control-btn se-control-btn--accent" id="randomPickBtn">
                    <span>뽑기</span>
                </button>
                <button type="button" class="se-control-btn" id="listToggleBtn">
                    <span>목록</span>
                </button>
                <div class="se-control-state" aria-live="polite">
                    <span class="se-control-state__label">현재 범위</span>
                    <strong id="modeLabel">단문</strong>
                    <p id="rangeLabel">1~15번</p>
                </div>
            </aside>

            <section class="se-panel se-display-panel" aria-label="학생용 평가 패널">
                <header class="se-display-head">
                    <div class="se-question-meta">
                        <div class="se-number-wrap">
                            <span class="se-kicker">번호</span>
                            <strong class="se-number" id="questionNumber">01</strong>
                        </div>
                        <div class="se-grammar-wrap">
                            <span class="se-kicker">문법</span>
                            <h1 id="questionGrammar">문항을 불러오는 중입니다.</h1>
                        </div>
                    </div>
                    <div class="se-display-status">
                        <span class="se-mode-chip" id="modeChip">단문</span>
                        <span class="se-status-pill" id="speechStatus">
                            <i class="fa-solid fa-wave-square"></i>
                            <span>STT 대기</span>
                        </span>
                    </div>
                </header>

                <section class="se-prompt-panel">
                    <span class="se-section-label">질문</span>
                    <p class="se-prompt-text" id="questionPrompt">문항을 불러오는 중입니다.</p>
                    <p class="se-prompt-support" id="questionSupport"></p>
                </section>

                <section class="se-answer-panel">
                    <div class="se-answer-head">
                        <div>
                            <span class="se-section-label">학생 대답</span>
                            <h2>음성인식 결과</h2>
                        </div>
                        <div class="se-answer-actions">
                            <button type="button" class="se-mini-btn se-mini-btn--primary" id="startSpeechBtn">인식 시작</button>
                            <button type="button" class="se-mini-btn" id="stopSpeechBtn">중지</button>
                            <button type="button" class="se-mini-btn" id="clearTranscriptBtn">지우기</button>
                        </div>
                    </div>
                    <div class="se-transcript-box is-placeholder" id="transcriptBox">학생이 말하면 음성인식 결과가 여기에 표시됩니다.</div>
                    <p class="se-answer-note" id="transcriptMeta">브라우저와 마이크 상태를 확인하는 중입니다.</p>
                </section>
            </section>
        </section>
    </main>

    <div class="se-drawer se-hidden" id="listDrawer" role="dialog" aria-modal="true" aria-labelledby="listDrawerTitle">
        <button type="button" class="se-drawer__backdrop" id="listBackdrop" aria-label="목록 닫기"></button>
        <div class="se-drawer__panel">
            <div class="se-drawer__head">
                <div>
                    <span class="se-section-label">목록</span>
                    <h2 id="listDrawerTitle">전체 문항 선택</h2>
                </div>
                <button type="button" class="se-drawer__close" id="listCloseBtn" aria-label="목록 닫기">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="se-drawer__body">
                <section class="se-list-section">
                    <div class="se-list-section__head">
                        <strong>단문 말하기</strong>
                        <span>1~15번</span>
                    </div>
                    <div class="se-list-grid" id="shortQuestionList"></div>
                </section>
                <section class="se-list-section">
                    <div class="se-list-section__head">
                        <strong>장문 말하기</strong>
                        <span>16~17번</span>
                    </div>
                    <div class="se-list-grid" id="longQuestionList"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="../shared/speaking-evaluation.js"></script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
