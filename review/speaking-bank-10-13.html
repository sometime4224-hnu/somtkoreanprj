<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-NB76SV96');</script>
    <!-- End Google Tag Manager -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3B 수행 말하기 준비</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/speaking-bank.css">
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <main class="sb-shell">
        <nav class="sb-panel sb-nav" aria-label="상단 이동">
            <div class="sb-nav__links">
                <a href="index.html" class="sb-link">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>리뷰 허브로</span>
                </a>
                <a href="../3B  수행 말하기 문제.pdf" class="sb-soft-link" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-file-pdf"></i>
                    <span>원본 문제 PDF</span>
                </a>
            </div>
            <div class="sb-nav__links">
                <button type="button" class="sb-lang-btn is-active" id="langKoBtn">KO</button>
                <button type="button" class="sb-lang-btn" id="langViBtn">VI</button>
            </div>
        </nav>

        <section class="sb-panel sb-hero">
            <div class="sb-hero__top">
                <div>
                    <span class="sb-badge">
                        <i class="fa-solid fa-microphone-lines"></i>
                        <span>3B 수행 말하기 문제 은행</span>
                    </span>
                    <h1>문항 고르기 · 답안 저장 · 말하기 연습</h1>
                </div>
                <div class="sb-action-row">
                    <button type="button" class="sb-btn sb-btn--ghost" id="pageIntroBtn">
                        <i class="fa-solid fa-circle-info"></i>
                        <span>도움</span>
                    </button>
                    <button type="button" class="sb-btn sb-btn--primary" id="randomQuestionBtn">
                        <i class="fa-solid fa-shuffle"></i>
                        <span>랜덤 문항</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="sb-panel sb-controls">
            <div class="sb-controls__row">
                <div>
                    <span class="sb-section-label">Filter</span>
                    <div class="sb-filter-group" id="typeFilters" aria-label="문항 유형 필터"></div>
                </div>
                <div>
                    <span class="sb-section-label">Unit</span>
                    <div class="sb-filter-group" id="unitFilters" aria-label="과별 필터"></div>
                </div>
                <div class="sb-filter-caption" id="filterCaption">전체 문항</div>
            </div>
            <div class="sb-question-strip" id="questionList" aria-label="문항 목록"></div>
            <div class="sb-mobile-question-nav" id="mobileQuestionNav" aria-label="모바일 문항 이동">
                <div class="sb-mobile-question-nav__row">
                    <button type="button" class="sb-btn sb-btn--soft sb-mobile-question-nav__button" id="mobilePrevQuestionBtn">
                        <i class="fa-solid fa-chevron-left"></i>
                        <span>이전</span>
                    </button>
                    <div class="sb-mobile-question-status" id="mobileQuestionStatus" aria-live="polite"></div>
                    <button type="button" class="sb-btn sb-btn--soft sb-mobile-question-nav__button" id="mobileNextQuestionBtn">
                        <span>다음</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                <button type="button" class="sb-btn sb-btn--primary sb-mobile-question-nav__overview" id="mobileQuestionOverviewBtn">
                    <i class="fa-solid fa-table-cells-large"></i>
                    <span>모두 보기</span>
                </button>
            </div>
        </section>

        <section class="sb-workspace">
            <article class="sb-panel sb-card">
                <span class="sb-section-label">문항</span>
                <h2 class="sb-card__title" id="questionTitle">문항을 불러오는 중입니다.</h2>
                <div class="sb-meta-row" id="questionMeta"></div>
                <div class="sb-button-row">
                    <button type="button" class="sb-btn sb-btn--ghost" id="questionPromptBtn">
                        <i class="fa-solid fa-comment-dots"></i>
                        <span>질문 보기</span>
                    </button>
                    <button type="button" class="sb-btn sb-btn--ghost" id="questionGrammarBtn">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>문법 보기</span>
                    </button>
                    <button type="button" class="sb-btn sb-btn--ghost" id="questionChecklistBtn">
                        <i class="fa-solid fa-list-check"></i>
                        <span>체크 보기</span>
                    </button>
                    <button type="button" class="sb-btn sb-btn--ghost" id="questionSampleBtn">
                        <i class="fa-solid fa-lightbulb"></i>
                        <span>예시 답</span>
                    </button>
                </div>
            </article>

            <article class="sb-panel sb-editor-card">
                <div class="sb-card-head">
                    <div>
                        <span class="sb-section-label">답안</span>
                        <h3 class="sb-subsection-title">내 답 저장</h3>
                    </div>
                    <div class="sb-mini-actions">
                        <button type="button" class="sb-mini-btn" id="revisionHelpBtn">
                            <i class="fa-solid fa-circle-info"></i>
                            <span>도움말</span>
                        </button>
                        <button type="button" class="sb-mini-btn" id="coachHelpBtn">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                            <span>코치</span>
                        </button>
                        <div class="sb-coach-score" id="coachScore">준비 점검 전</div>
                        <span class="sb-stamp" id="revisedSavedAt">저장 기록 없음</span>
                    </div>
                </div>
                <textarea id="revisedInput" class="sb-textarea" placeholder="시험에서 말할 최종 문장을 적어 두세요."></textarea>
                <div class="sb-button-row">
                    <button type="button" class="sb-btn sb-btn--secondary" id="saveRevisedBtn">
                        <i class="fa-solid fa-check"></i>
                        <span>최종 답안 저장</span>
                    </button>
                    <button type="button" class="sb-btn sb-btn--ghost" id="useTranscriptBtn">
                        <i class="fa-solid fa-arrow-down-short-wide"></i>
                        <span>인식문 가져오기</span>
                    </button>
                </div>
            </article>

            <article class="sb-panel sb-speech-card">
                <div class="sb-card-head">
                    <div>
                        <span class="sb-section-label">말하기</span>
                        <h3 class="sb-subsection-title">말하기 연습</h3>
                    </div>
                    <div class="sb-mini-actions">
                        <button type="button" class="sb-mini-btn" id="speechHelpBtn">
                            <i class="fa-solid fa-circle-info"></i>
                            <span>도움말</span>
                        </button>
                        <span class="sb-status-badge" id="speechStatusBadge">
                            <i class="fa-solid fa-wave-square"></i>
                            <span>대기 중</span>
                        </span>
                    </div>
                </div>
                <div class="sb-button-row">
                    <button type="button" class="sb-btn sb-btn--primary" id="startSpeechBtn">
                        <i class="fa-solid fa-microphone"></i>
                        <span>음성 인식 시작</span>
                    </button>
                    <button type="button" class="sb-btn sb-btn--danger" id="stopSpeechBtn">
                        <i class="fa-solid fa-stop"></i>
                        <span>중지</span>
                    </button>
                </div>
                <div class="sb-timer" id="speechTimer">00:00</div>
                <div class="sb-transcript-box is-placeholder" id="transcriptBox">아직 없음</div>
                <p class="sb-helper-note" id="transcriptMeta">브라우저 확인 중</p>
                <div class="sb-button-row">
                    <button type="button" class="sb-btn sb-btn--ghost" id="clearTranscriptBtn">
                        <i class="fa-solid fa-trash-can"></i>
                        <span>인식문 지우기</span>
                    </button>
                </div>
            </article>
        </section>

        <section class="sb-hidden" aria-hidden="true">
            <div id="savedCount"></div>
            <div id="savedCountNote"></div>
            <div id="completedCount"></div>
            <div id="speechCount"></div>
            <div id="speechSupportNote"></div>
            <button type="button" id="pageStructureBtn"></button>
            <button type="button" id="pageUseBtn"></button>
            <button type="button" id="questionOverviewBtn"></button>
            <button type="button" id="draftHelpBtn"></button>
            <button type="button" id="saveDraftBtn"></button>
            <button type="button" id="loadSampleBtn"></button>
            <button type="button" id="speakPromptBtn"></button>
            <button type="button" id="speakRevisedBtn"></button>
            <button type="button" id="toggleDoneBtn"></button>
            <button type="button" id="saveTranscriptBtn"></button>
            <button type="button" id="saveNoteBtn"></button>
            <button type="button" id="exportAnswersBtn"></button>
            <button type="button" id="clearCurrentBtn"></button>
            <div id="expressionChips"></div>
            <div id="frameList"></div>
            <span id="draftSavedAt"></span>
            <span id="noteSavedAt"></span>
            <textarea id="draftInput"></textarea>
            <textarea id="noteInput"></textarea>
            <ul id="attemptList"></ul>
            <p id="compareTranscript"></p>
            <p id="compareRevised"></p>
            <p id="questionLead"></p>
            <ul id="promptList"></ul>
            <p id="grammarGuide"></p>
            <ul id="checkList"></ul>
            <p id="sampleAnswerText"></p>
            <p id="focusText"></p>
            <ul id="coachList"></ul>
        </section>
    </main>

    <div class="sb-popup sb-hidden" id="popupModal" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
        <button type="button" class="sb-popup__backdrop" id="popupBackdrop" aria-label="닫기"></button>
        <div class="sb-popup__panel">
            <div class="sb-popup__head">
                <strong id="popupTitle">설명</strong>
                <button type="button" class="sb-popup__close" id="popupCloseBtn" aria-label="닫기">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="sb-popup__body" id="popupBody"></div>
        </div>
    </div>

    <div class="sb-toast" id="toast"></div>

    <script src="../shared/speaking-bank.js"></script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
