  <meta charset="UTF-8">

  <title>악기 연주 어휘 | 16과</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #201a17;
      --paper: #fff8ec;
      --red: #d7483f;
      --teal: #0f8a83;
      --brass: #d99b24;
      --violet: #6551b4;
      --green: #238757;
      --stage: #15120f;
      --line: rgba(255, 255, 255, 0.22);
      --nav-height: 48px;
      --controls-height: 78px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--paper);
      background: var(--stage);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: grid;
      grid-template-rows: var(--nav-height) minmax(0, 1fr);
    }

    .topbar {
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      height: var(--nav-height);
      padding: 0 12px;
      background: rgba(255, 248, 236, 0.94);
      border-bottom: 1px solid rgba(71, 49, 34, 0.14);
      color: var(--ink);
    }

    .topbar__links {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      white-space: nowrap;
    }

    .topbar a,
    .mode-btn,
    .sound-btn,
    .mic-btn {
      min-height: 34px;
      border: 0;
      border-radius: 8px;
      background: rgba(32, 26, 23, 0.07);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    .mode-btn.is-on,
    .sound-btn.is-on,
    .mic-btn.is-on {
      background: #1f7a54;
      color: #fffdf7;
    }

    .mic-btn {
      display: none;
    }

    body[data-instrument="trumpet"] .mic-btn {
      display: inline-flex;
    }

    .verb-pill {
      justify-self: center;
      min-width: min(280px, 44vw);
      height: 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 8px 0 16px;
      border-radius: 999px;
      background: #201a17;
      color: #fff8ec;
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.34),
        inset 0 0 0 1px rgba(255, 248, 236, 0.18);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px) scale(0.94);
      transition: opacity 0.16s ease, transform 0.16s ease, visibility 0.16s ease;
    }

    .verb-pill.is-active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .verb-pill__instrument {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.82rem;
      font-weight: 800;
      color: rgba(255, 248, 236, 0.82);
    }

    .verb-pill__verb {
      min-width: 76px;
      padding: 4px 12px;
      border-radius: 999px;
      background: var(--brass);
      color: #1c1205;
      text-align: center;
      font-size: 1.22rem;
      font-weight: 900;
      line-height: 1;
      transform-origin: center;
      box-shadow: 0 0 24px rgba(255, 248, 236, 0.3);
    }

    .verb-pill.pulse .verb-pill__verb {
      animation: verbPulse 0.34s ease-out;
    }

    @keyframes verbPulse {
      0% { transform: scale(0.88); }
      55% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 248, 236, 0.08) 0%, transparent 24%),
        linear-gradient(135deg, #17130f 0%, #2d2320 45%, #15120f 100%);
    }

    #instrumentCanvas {
      position: absolute;
      inset: 0 0 calc(var(--controls-height) + var(--safe-bottom)) 0;
      display: block;
      width: 100%;
      height: calc(100% - var(--controls-height) - var(--safe-bottom));
      cursor: crosshair;
      touch-action: none;
    }

    .instrument-rail {
      position: absolute;
      z-index: 3;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: calc(var(--controls-height) + var(--safe-bottom));
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 10px calc(10px + var(--safe-bottom));
      overflow-x: auto;
      background: rgba(15, 13, 11, 0.88);
      border-top: 1px solid rgba(255, 248, 236, 0.12);
      backdrop-filter: blur(12px);
      scrollbar-width: none;
    }

    .instrument-rail::-webkit-scrollbar {
      display: none;
    }

    .instrument-btn {
      flex: 1 0 112px;
      min-height: 52px;
      border: 1px solid rgba(255, 248, 236, 0.16);
      border-radius: 8px;
      background: rgba(255, 248, 236, 0.08);
      color: #fff8ec;
      font: inherit;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .instrument-btn[aria-selected="true"] {
      transform: translateY(-2px);
      background: #fff8ec;
      color: var(--ink);
      border-color: #fff8ec;
    }

    .gesture-strip {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateX(-50%);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.16s ease, visibility 0.16s ease;
    }

    .gesture-strip.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .gesture-chip {
      min-width: 66px;
      padding: 6px 10px;
      border: 1px solid rgba(255, 248, 236, 0.16);
      border-radius: 999px;
      background: rgba(32, 26, 23, 0.58);
      color: rgba(255, 248, 236, 0.78);
      text-align: center;
      font-size: 0.72rem;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }

    .gesture-chip.is-active {
      background: var(--paper);
      color: var(--ink);
    }

    .toast {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: calc(var(--controls-height) + var(--safe-bottom) + 14px);
      width: max-content;
      max-width: min(92vw, 520px);
      padding: 9px 13px;
      border-radius: 8px;
      background: rgba(255, 248, 236, 0.95);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1.35;
      transform: translate(-50%, 12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 720px) {
      :root {
        --nav-height: 44px;
        --controls-height: 70px;
      }

      .topbar {
        grid-template-columns: auto 1fr auto;
        gap: 6px;
        padding: 0 7px;
      }

      .topbar a,
      .mode-btn,
      .sound-btn,
      .mic-btn {
        min-height: 32px;
        padding: 0 8px;
        font-size: 0.72rem;
      }

      .topbar__links a:nth-child(2) {
        display: none;
      }

      .verb-pill {
        min-width: 0;
        width: 100%;
        height: 32px;
        padding-left: 10px;
        gap: 5px;
      }

      .verb-pill__instrument {
        font-size: 0.72rem;
      }

      .verb-pill__verb {
        min-width: 58px;
        padding: 4px 8px;
        font-size: 0.94rem;
      }

      .instrument-rail {
        gap: 7px;
        padding: 8px 8px calc(8px + var(--safe-bottom));
      }

      .instrument-btn {
        flex-basis: 86px;
        min-height: 50px;
        font-size: 0.84rem;
      }

      .gesture-strip {
        top: 8px;
        gap: 5px;
      }

      .gesture-chip {
        min-width: 52px;
        padding: 5px 8px;
        font-size: 0.66rem;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const canvas = document.getElementById('instrumentCanvas');
      const ctx = canvas.getContext('2d');
      const body = document.body;
      const verbPill = document.getElementById('verbPill');
      const verbLabel = document.getElementById('verbLabel');
      const instrumentLabel = document.getElementById('instrumentLabel');
      const modeBtn = document.getElementById('modeBtn');
      const soundBtn = document.getElementById('soundBtn');
      const micBtn = document.getElementById('micBtn');
      const toast = document.getElementById('toast');
      const gestureStrip = document.getElementById('gestureStrip');
      const instrumentButtons = Array.from(document.querySelectorAll('.instrument-btn'));

      const instruments = {
        piano: {
          name: '피아노',
          verb: '치다',
          color: '#d7483f',
          gestures: ['짧게', '길게', '드래그']
        },
        violin: {

          color: '#6551b4',
          gestures: ['드래그', '길게', '흔들기']
        },
        trumpet: {
          name: '트럼펫',
          verb: '불다',
          color: '#d99b24',
          gestures: ['길게', '마이크', '드래그']
        },
        guitar: {
          name: '기타',

          gestures: ['짧게', '드래그', '길게']
        },

          verb: '치다',
          color: '#238757',
          gestures: ['짧게', '연타', '길게']
        }
      };

      const noteNames = ['도', '레', '미', '파', '솔', '라', '시', '도'];
      const pianoWhite = [
        { name: '도', freq: 261.63 },
        { name: '레', freq: 293.66 },
        { name: '미', freq: 329.63 },
        { name: '파', freq: 349.23 },
        { name: '솔', freq: 392.00 },
        { name: '라', freq: 440.00 },
        { name: '시', freq: 493.88 },
        { name: '도', freq: 523.25 }
      ];
      const pianoBlack = [
        { after: 0, name: '도#', freq: 277.18 },
        { after: 1, name: '레#', freq: 311.13 },
        { after: 3, name: '파#', freq: 369.99 },
        { after: 4, name: '솔#', freq: 415.30 },
        { after: 5, name: '라#', freq: 466.16 }
      ];
      const guitarStrings = [
        { name: '미', freq: 329.63 },
        { name: '시', freq: 246.94 },
        { name: '솔', freq: 196.00 },
        { name: '레', freq: 146.83 },
        { name: '라', freq: 110.00 },
        { name: '미', freq: 82.41 }
      ];
      const violinStrings = [
        { name: '미', freq: 659.25 },
        { name: '라', freq: 440.00 },
        { name: '레', freq: 293.66 },
        { name: '솔', freq: 196.00 }
      ];

      const state = {
        activeInstrument: 'piano',
        textMode: 'verb',
        width: 0,
        height: 0,
        dpr: 1,
        lastTime: performance.now(),
        effects: [],
        pointers: new Map(),
        layout: {},
        hideVerbTimer: null,
        hideGestureTimer: null,
        lastWordAt: 0,
        heldPiano: new Map(),
        pianoPress: new Map(),
        drumHits: new Map(),
        funObjectHits: new Map(),
        funObjectMotion: new Map(),
        stringImpulse: new Map(),
        guitarGrabs: new Map(),
        violinBow: null,
        violinLastBowAt: 0,
        trumpetAir: 0,
        trumpetValves: new Set(),
        trumpetHead: null,
        trumpetLastBreathAt: 0,
        sparkleSeed: 1
      };

      const actionSentences = {
        piano: {
          '치다': '피아노를 치다',
          '누르다': '건반을 누르다'
        },
        violin: {
          '켜다': '바이올린을 켜다'
        },
        trumpet: {
          '불다': '트럼펫을 불다'
        },
        guitar: {
          '튕기다': '기타를 튕기다'
        },
        drums: {
          '치다': '드럼을 치다'
        }
      };

      const audio = {
        ctx: null,
        master: null,
        muted: false,
        enabled: false,
        activePiano: new Map(),
        violinVoice: null,
        trumpetVoice: null,
        micStream: null,
        micAnalyser: null,
        micData: null,
        micEnabled: false,
        micAvailable: false,
        lastMicBlow: 0
      };

      const pointerColors = ['#fff1a8', '#8de7dd', '#ffb0a8', '#b9a7ff', '#a7e5b9'];
      const supportsPointer = 'PointerEvent' in window;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function distance(a, b, c, d) {
        return Math.hypot(a - c, b - d);
      }

      function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lengthSq = dx * dx + dy * dy || 1;
        const t = clamp(((px - x1) * dx + (py - y1) * dy) / lengthSq, 0, 1);
        return distance(px, py, x1 + dx * t, y1 + dy * t);
      }

      function drawTouchableGlow(x, y, r, color, now, alpha = 0.28) {
        const pulse = 0.5 + Math.sin(now * 0.004 + x * 0.01) * 0.5;
        ctx.save();
        ctx.globalAlpha = alpha * (0.55 + pulse * 0.45);
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(2, r * 0.05);
        ctx.shadowColor = color;
        ctx.shadowBlur = r * 0.32;
        ctx.beginPath();
        ctx.arc(x, y, r * (1 + pulse * 0.08), 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function roundedRect(ctx, x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function drawSoftEllipseShadow(x, y, rx, ry, alpha = 0.22) {
        ctx.save();
        const shadow = ctx.createRadialGradient(x, y, 0, x, y, rx);
        shadow.addColorStop(0, `rgba(0, 0, 0, ${alpha})`);
        shadow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = shadow;
        ctx.beginPath();
        ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawWoodGrainRect(x, y, w, h, radius, alpha = 0.22) {
        ctx.save();
        roundedRect(ctx, x, y, w, h, radius);
        ctx.clip();
        ctx.globalAlpha = alpha;
        ctx.lineCap = 'round';
        for (let i = 0; i < 13; i += 1) {
          const yy = y + h * (0.1 + i * 0.07);
          ctx.strokeStyle = i % 2 ? 'rgba(255, 219, 143, 0.42)' : 'rgba(64, 24, 15, 0.42)';
          ctx.lineWidth = 1 + (i % 3) * 0.45;
          ctx.beginPath();
          ctx.moveTo(x + w * 0.04, yy);
          ctx.bezierCurveTo(
            x + w * 0.25,
            yy + Math.sin(i * 1.8) * h * 0.035,
            x + w * 0.72,
            yy - Math.cos(i * 1.2) * h * 0.04,
            x + w * 0.96,
            yy + Math.sin(i * 0.9) * h * 0.02
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawWoodGrainOval(cx, cy, rx, ry, angle = 0, alpha = 0.22) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
        ctx.clip();
        ctx.globalAlpha = alpha;
        ctx.lineCap = 'round';
        for (let i = -5; i <= 5; i += 1) {
          const yy = (i / 6) * ry;
          ctx.strokeStyle = i % 2 ? 'rgba(255, 225, 156, 0.5)' : 'rgba(82, 30, 16, 0.5)';
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(-rx * 0.9, yy);
          ctx.bezierCurveTo(-rx * 0.45, yy - ry * 0.12, rx * 0.1, yy + ry * 0.14, rx * 0.9, yy - ry * 0.04);
          ctx.stroke();
        }
        for (let i = 0; i < 3; i += 1) {
          ctx.strokeStyle = 'rgba(255, 238, 188, 0.2)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(-rx * 0.24 + i * rx * 0.16, -ry * 0.04 + i * ry * 0.1, rx * (0.22 + i * 0.04), ry * 0.18, 0.12, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function strokeMetalPath(pathFn, width, base = '#d99b24', shade = '#87500d', shine = '#fff1a8') {
        ctx.save();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.42)';
        ctx.shadowBlur = width * 1.2;
        ctx.shadowOffsetY = width * 0.7;
        ctx.strokeStyle = shade;
        ctx.lineWidth = width * 1.18;
        pathFn();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = base;
        ctx.lineWidth = width;
        pathFn();
        ctx.stroke();
        ctx.strokeStyle = shine;
        ctx.globalAlpha = 0.46;
        ctx.lineWidth = width * 0.25;
        pathFn();
        ctx.stroke();
        ctx.restore();
      }

      function drawText(text, x, y, size, color, align = 'center', weight = 900) {
        ctx.save();
        ctx.font = `${weight} ${size}px "Noto Sans KR", "Malgun Gothic", sans-serif`;
        ctx.textAlign = align;
        ctx.textBaseline = 'middle';
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
        ctx.restore();
      }

      function addEffect(effect) {
        state.effects.push({
          age: 0,
          duration: 520,
          color: instruments[state.activeInstrument].color,
          ...effect
        });
      }

      function seededRandom() {
        state.sparkleSeed = (state.sparkleSeed * 1664525 + 1013904223) >>> 0;
        return state.sparkleSeed / 4294967296;
      }

      function objectPhrase(noun) {
        const last = noun.charCodeAt(noun.length - 1);
        const hasBatchim = last >= 0xac00 && last <= 0xd7a3 && (last - 0xac00) % 28 !== 0;
        return `${noun}${hasBatchim ? '을' : '를'}`;
      }

      function sentenceForAction(verb, instrumentName, requestedText) {
        if (requestedText && requestedText !== verb) return requestedText;
        const instrumentKey = state.activeInstrument;
        return actionSentences[instrumentKey]?.[verb]
          || `${objectPhrase(instrumentName || instruments[instrumentKey].name)} ${verb}`;
      }

      function outputTextForAction(verb, instrumentName, requestedText) {
        return state.textMode === 'sentence'
          ? sentenceForAction(verb, instrumentName, requestedText)
          : verb;
      }

      function setTextMode(mode) {
        state.textMode = mode === 'sentence' ? 'sentence' : 'verb';
        const isSentence = state.textMode === 'sentence';
        modeBtn.textContent = isSentence ? '문장' : '동사';
        modeBtn.classList.toggle('is-on', isSentence);
        modeBtn.setAttribute('aria-pressed', String(isSentence));
      }

      function updateVerb(verb, instrumentName, color, outputText = null) {
        if (state.textMode === 'sentence' && outputText?.includes(' ')) {
          const parts = outputText.split(' ');
          instrumentLabel.textContent = parts.slice(0, -1).join(' ');
          verbLabel.textContent = parts[parts.length - 1];
        } else {
          verbLabel.textContent = verb;
          instrumentLabel.textContent = instrumentName || instruments[state.activeInstrument].name;
        }
        verbLabel.style.background = color || instruments[state.activeInstrument].color;
        verbPill.classList.add('is-active');
        verbPill.classList.remove('pulse');
        void verbPill.offsetWidth;
        verbPill.classList.add('pulse');
        scheduleVerbHide(900);
      }

      function scheduleVerbHide(delay = 700) {
        clearTimeout(state.hideVerbTimer);
        state.hideVerbTimer = setTimeout(() => {
          if (!hasActivePlaying()) {
            verbPill.classList.remove('is-active');
          }
        }, delay);
      }

      function hasActivePlaying() {
        return state.pointers.size > 0
          || audio.micEnabled && state.trumpetAir > 0.14
          || state.trumpetHead?.blowing;
      }

      function flashVerb(verb, x, y, instrumentName, color, force = false, displayText = null, options = {}) {
        const now = performance.now();
        const outputText = outputTextForAction(verb, instrumentName, displayText);
        updateVerb(verb, instrumentName, color, outputText);
        if (!force && now - state.lastWordAt < 230) return;
        state.lastWordAt = now;
        const baseTextSize = outputText.length > 4
          ? clamp(state.width / (outputText.length * 1.45), 36, 104)
          : clamp(state.width * 0.105, 48, 104);
        const textSize = baseTextSize * (options.sizeScale || 1);
        const halfTextWidth = outputText.length * textSize * 0.58;
        const safeX = halfTextWidth > state.width * 0.46
          ? state.width / 2
          : clamp(x, halfTextWidth + 12, state.width - halfTextWidth - 12);
        addEffect({
          type: 'word',
          text: outputText,
          phrase: outputText.includes(' ')
            ? {
                prefix: outputText.split(' ').slice(0, -1).join(' '),
                verb: outputText.split(' ').slice(-1)[0]
              }
            : null,
          x: safeX,
          y: clamp(y, state.height * 0.15, state.height * 0.76),
          duration: options.duration || 680,
          color: color || instruments[state.activeInstrument].color,
          size: textSize
        });
      }

      function setGestureActive(label, reveal = true) {
        Array.from(gestureStrip.children).forEach((node) => {
          node.classList.toggle('is-active', node.textContent === label);
        });
        if (!reveal) {
          gestureStrip.classList.remove('is-visible');
          return;
        }
        gestureStrip.classList.add('is-visible');
        scheduleGestureHide(900);
      }

      function scheduleGestureHide(delay = 700) {
        clearTimeout(state.hideGestureTimer);
        state.hideGestureTimer = setTimeout(() => {
          if (!hasActivePlaying()) {
            gestureStrip.classList.remove('is-visible');
          }
        }, delay);
      }

      function renderGestureStrip() {
        gestureStrip.innerHTML = '';
        instruments[state.activeInstrument].gestures.forEach((gesture) => {
          const chip = document.createElement('span');
          chip.className = 'gesture-chip';
          chip.textContent = gesture;
          gestureStrip.appendChild(chip);
        });
      }

      function showToast(message, duration = 1500) {
        toast.textContent = message;
        toast.classList.add('is-visible');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove('is-visible'), duration);
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        state.width = Math.max(320, rect.width);
        state.height = Math.max(260, rect.height);
        state.dpr = dpr;
        canvas.width = Math.round(state.width * dpr);
        canvas.height = Math.round(state.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function setInstrument(key) {
        if (!instruments[key]) return;
        stopSustainedVoices();
        state.activeInstrument = key;
        body.dataset.instrument = key;
        instrumentButtons.forEach((btn) => {
          btn.setAttribute('aria-selected', String(btn.dataset.instrument === key));
        });
        state.pointers.clear();
        state.effects = [];
        state.guitarGrabs.clear();
        state.layout.funObjects = [];
        state.funObjectMotion.clear();
        if (key === 'trumpet' || key === 'guitar' || key === 'drums') {
          setFunObjectLayout(key);
        }
        if (key === 'violin') {
          state.violinBow = null;
        }
        state.trumpetValves.clear();
        if (key === 'trumpet') {
          resetTrumpetHead();
        }
        clearTimeout(state.hideVerbTimer);
        clearTimeout(state.hideGestureTimer);
        instrumentLabel.textContent = instruments[key].name;
        verbLabel.textContent = instruments[key].verb;
        verbLabel.style.background = instruments[key].color;
        verbPill.classList.remove('is-active', 'pulse');
        renderGestureStrip();
        setGestureActive(instruments[key].gestures[0], false);
      }

      function ensureAudio() {
        if (audio.muted) return null;
        if (!audio.ctx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) {
            showToast('이 브라우저에서는 오디오를 사용할 수 없어요.');
            return null;
          }
          audio.ctx = new AudioContext();
          audio.master = audio.ctx.createGain();
          audio.master.gain.value = 0.72;
          const compressor = audio.ctx.createDynamicsCompressor();
          compressor.threshold.value = -20;
          compressor.knee.value = 24;
          compressor.ratio.value = 8;
          compressor.attack.value = 0.004;
          compressor.release.value = 0.18;
          audio.master.connect(compressor);
          compressor.connect(audio.ctx.destination);
        }
        if (audio.ctx.state === 'suspended') {
          audio.ctx.resume();
        }
        audio.enabled = true;
        soundBtn.classList.add('is-on');
        soundBtn.setAttribute('aria-pressed', 'true');
        return audio.ctx;
      }

      function setAudioMuted(nextMuted) {
        audio.muted = nextMuted;
        if (audio.master) {
          audio.master.gain.setTargetAtTime(nextMuted ? 0 : 0.72, audio.ctx.currentTime, 0.02);
        }
        soundBtn.classList.toggle('is-on', !nextMuted && audio.enabled);
        soundBtn.setAttribute('aria-pressed', String(!nextMuted && audio.enabled));
      }

      function noiseBuffer(seconds = 0.5) {
        const ctx = ensureAudio();
        if (!ctx) return null;
        const length = Math.max(1, Math.floor(ctx.sampleRate * seconds));
        const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < length; i += 1) {
          data[i] = Math.random() * 2 - 1;
        }
        return buffer;
      }

      function playNote(freq, options = {}) {
        const ctx = ensureAudio();
        if (!ctx) return null;
        const now = ctx.currentTime;
        const gain = ctx.createGain();
        const osc = ctx.createOscillator();
        const bodyOsc = ctx.createOscillator();
        const filter = ctx.createBiquadFilter();
        const attack = options.attack ?? 0.006;
        const decay = options.decay ?? 0.7;
        const sustain = options.sustain ?? 0.0001;
        const velocity = options.velocity ?? 0.78;
        osc.type = options.type || 'triangle';
        bodyOsc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        bodyOsc.frequency.setValueAtTime(freq * 2.003, now);
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(options.filter ?? 3400, now);
        filter.Q.value = 0.6;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.2 * velocity, now + attack);
        gain.gain.exponentialRampToValueAtTime(sustain, now + decay);
        osc.connect(filter);
        bodyOsc.connect(filter);
        filter.connect(gain);
        gain.connect(audio.master);
        osc.start(now);
        bodyOsc.start(now);
        if (!options.hold) {
          osc.stop(now + decay + 0.04);
          bodyOsc.stop(now + decay + 0.04);
        }
        return { osc, bodyOsc, gain, filter, started: now };
      }

      function releaseVoice(voice, timeConstant = 0.035) {
        if (!voice || !audio.ctx) return;
        const now = audio.ctx.currentTime;
        voice.gain.gain.cancelScheduledValues(now);
        voice.gain.gain.setTargetAtTime(0.0001, now, timeConstant);
        try {
          voice.osc.stop(now + timeConstant * 8);
          if (voice.bodyOsc) voice.bodyOsc.stop(now + timeConstant * 8);
          if (voice.noise) voice.noise.stop(now + timeConstant * 8);
        } catch (error) {
          // Voices may already be stopped by their envelope.
        }
      }

      function startPianoVoice(pointerId, key) {
        const voice = playNote(key.freq, { hold: true, sustain: 0.08, decay: 1.6, filter: 4200, velocity: 0.82 });
        if (voice) {
          audio.activePiano.set(pointerId, voice);
        }
      }

      function releasePianoVoice(pointerId) {
        const voice = audio.activePiano.get(pointerId);
        releaseVoice(voice);
        audio.activePiano.delete(pointerId);
      }

      function playPluck(freq, velocity = 0.8) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const gain = ctx.createGain();
        const osc = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const filter = ctx.createBiquadFilter();
        osc.type = 'sawtooth';
        osc2.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.996, now + 0.24);
        osc2.frequency.setValueAtTime(freq * 2.01, now);
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(4600, now);
        filter.frequency.exponentialRampToValueAtTime(900, now + 0.8);
        filter.Q.value = 2.4;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.23 * velocity, now + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
        osc.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(audio.master);
        osc.start(now);
        osc2.start(now);
        osc.stop(now + 1.24);
        osc2.stop(now + 1.24);
      }

      function playDrum(kind, velocity = 1) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        if (kind === 'kick') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(145, now);
          osc.frequency.exponentialRampToValueAtTime(46, now + 0.28);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.55 * velocity, now + 0.006);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
          osc.connect(gain);
          gain.connect(audio.master);
          osc.start(now);
          osc.stop(now + 0.45);
          return;
        }

        const buffer = noiseBuffer(kind === 'crash' ? 1.2 : 0.42);
        if (!buffer) return;
        const noise = ctx.createBufferSource();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        noise.buffer = buffer;
        filter.type = kind === 'snare' ? 'bandpass' : 'highpass';
        filter.frequency.value = kind === 'hihat' ? 6800 : kind === 'crash' ? 3200 : 1900;
        filter.Q.value = kind === 'snare' ? 1.4 : 0.7;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime((kind === 'crash' ? 0.25 : 0.22) * velocity, now + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + (kind === 'crash' ? 1.1 : kind === 'hihat' ? 0.18 : 0.36));
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audio.master);
        noise.start(now);
        noise.stop(now + (kind === 'crash' ? 1.15 : 0.4));

        if (kind === 'tom') {
          const osc = ctx.createOscillator();
          const toneGain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(196, now);
          osc.frequency.exponentialRampToValueAtTime(126, now + 0.26);
          toneGain.gain.setValueAtTime(0.0001, now);
          toneGain.gain.exponentialRampToValueAtTime(0.34 * velocity, now + 0.005);
          toneGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
          osc.connect(toneGain);
          toneGain.connect(audio.master);
          osc.start(now);
          osc.stop(now + 0.52);
        }
      }

      function playWindBurst(intensity = 0.72, duration = 0.72) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const buffer = noiseBuffer(duration + 0.1);
        if (!buffer) return;
        const now = ctx.currentTime;
        const noise = ctx.createBufferSource();
        const highpass = ctx.createBiquadFilter();
        const lowpass = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        noise.buffer = buffer;
        highpass.type = 'highpass';
        highpass.frequency.setValueAtTime(240, now);
        lowpass.type = 'lowpass';
        lowpass.frequency.setValueAtTime(1800 + intensity * 900, now);
        lowpass.frequency.exponentialRampToValueAtTime(520, now + duration);
        lowpass.Q.value = 0.55;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.18 * intensity, now + 0.045);
        gain.gain.setTargetAtTime(0.0001, now + duration * 0.42, duration * 0.18);
        noise.connect(highpass);
        highpass.connect(lowpass);
        lowpass.connect(gain);
        gain.connect(audio.master);
        noise.start(now);
        noise.stop(now + duration + 0.12);
      }

      function playFunTone(freq, options = {}) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const duration = options.duration ?? 0.28;
        const delay = options.delay ?? 0;
        const attack = options.attack ?? 0.006;
        const volume = options.volume ?? 0.1;
        const now = ctx.currentTime + delay;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = options.filter ? ctx.createBiquadFilter() : null;
        osc.type = options.type || 'sine';
        osc.frequency.setValueAtTime(Math.max(1, freq), now);
        if (options.endFreq) {
          osc.frequency.exponentialRampToValueAtTime(Math.max(1, options.endFreq), now + duration);
        }
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume, now + attack);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        if (filter) {
          filter.type = options.filter.type || 'lowpass';
          filter.frequency.setValueAtTime(options.filter.frequency || 1800, now);
          if (options.filter.endFrequency) {
            filter.frequency.exponentialRampToValueAtTime(options.filter.endFrequency, now + duration);
          }
          filter.Q.value = options.filter.q ?? 0.8;
          osc.connect(filter);
          filter.connect(gain);
        } else {
          osc.connect(gain);
        }
        gain.connect(audio.master);
        osc.start(now);
        osc.stop(now + duration + 0.04);
      }

      function playFunNoise(options = {}) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const duration = options.duration ?? 0.16;
        const delay = options.delay ?? 0;
        const buffer = noiseBuffer(duration + 0.05);
        if (!buffer) return;
        const now = ctx.currentTime + delay;
        const noise = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        noise.buffer = buffer;
        filter.type = options.filterType || 'bandpass';
        filter.frequency.setValueAtTime(options.frequency || 1600, now);
        if (options.endFrequency) {
          filter.frequency.exponentialRampToValueAtTime(options.endFrequency, now + duration);
        }
        filter.Q.value = options.q ?? 1.1;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(options.volume ?? 0.08, now + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audio.master);
        noise.start(now);
        noise.stop(now + duration + 0.04);
      }

      function playFunObjectSound(object) {
        if (object.kind === 'pinwheel') {
          playWindBurst(0.74, 0.62);
          [760, 980, 1240].forEach((freq, index) => {
            playFunTone(freq, { type: 'triangle', duration: 0.08, volume: 0.035, delay: 0.05 + index * 0.075 });
          });
        } else if (object.kind === 'bubbles') {
          playFunTone(720, { endFreq: 1180, type: 'sine', duration: 0.22, volume: 0.075 });
          playFunTone(1260, { endFreq: 940, type: 'triangle', duration: 0.16, volume: 0.045, delay: 0.08 });
          playFunNoise({ duration: 0.08, volume: 0.025, filterType: 'highpass', frequency: 5200, delay: 0.04 });
        } else if (object.kind === 'feather') {
          playWindBurst(0.36, 0.58);
          playFunTone(460, { endFreq: 260, type: 'triangle', duration: 0.42, volume: 0.035, filter: { type: 'lowpass', frequency: 1200, endFrequency: 520 } });
        } else if (object.kind === 'basketball') {
          playFunTone(148, { endFreq: 74, type: 'sine', duration: 0.24, volume: 0.16 });
          playFunNoise({ duration: 0.055, volume: 0.045, filterType: 'lowpass', frequency: 520 });
        } else if (object.kind === 'rubberband') {
          playPluck(238, 0.38);
          playFunTone(540, { endFreq: 360, type: 'sawtooth', duration: 0.24, volume: 0.052, filter: { type: 'lowpass', frequency: 1900, endFrequency: 780 } });
        } else if (object.kind === 'spring') {
          playFunTone(240, { endFreq: 430, type: 'sine', duration: 0.22, volume: 0.08 });
          playFunTone(520, { endFreq: 310, type: 'triangle', duration: 0.34, volume: 0.06, delay: 0.055 });
        } else if (object.kind === 'bell') {
          playFunTone(1046, { type: 'sine', duration: 0.78, volume: 0.09 });
          playFunTone(1568, { type: 'sine', duration: 0.66, volume: 0.045 });
          playFunTone(2093, { type: 'triangle', duration: 0.42, volume: 0.024 });
        } else if (object.kind === 'ball') {
          playDrum('tom', 0.36);
          playFunTone(285, { endFreq: 168, type: 'sine', duration: 0.18, volume: 0.07, delay: 0.015 });
        } else if (object.kind === 'button') {
          playFunNoise({ duration: 0.05, volume: 0.04, filterType: 'highpass', frequency: 2800 });
          playFunTone(520, { endFreq: 360, type: 'square', duration: 0.08, volume: 0.035 });
          playFunTone(260, { type: 'sine', duration: 0.09, volume: 0.025, delay: 0.055 });
        }
      }

      function startViolin(freq, volume = 0.12) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        if (!audio.violinVoice) {
          const osc = ctx.createOscillator();
          const osc2 = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          const vibrato = ctx.createOscillator();
          const vibratoGain = ctx.createGain();
          osc.type = 'sawtooth';
          osc2.type = 'triangle';
          filter.type = 'lowpass';
          filter.frequency.value = 2600;
          filter.Q.value = 1.1;
          vibrato.type = 'sine';
          vibrato.frequency.value = 5.4;
          vibratoGain.gain.value = 4;
          vibrato.connect(vibratoGain);
          vibratoGain.connect(osc.frequency);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.setTargetAtTime(volume, now, 0.06);
          osc.connect(filter);
          osc2.connect(filter);
          filter.connect(gain);
          gain.connect(audio.master);
          osc.start(now);
          osc2.start(now);
          vibrato.start(now);
          audio.violinVoice = { osc, bodyOsc: osc2, gain, filter, vibrato, vibratoGain };
        }
        audio.violinVoice.osc.frequency.setTargetAtTime(freq, now, 0.025);
        audio.violinVoice.bodyOsc.frequency.setTargetAtTime(freq * 2.002, now, 0.025);
        audio.violinVoice.gain.gain.setTargetAtTime(volume, now, 0.035);
      }

      function stopViolin() {
        if (!audio.violinVoice || !audio.ctx) return;
        const voice = audio.violinVoice;
        const now = audio.ctx.currentTime;
        voice.gain.gain.setTargetAtTime(0.0001, now, 0.045);
        try {
          voice.osc.stop(now + 0.42);
          voice.bodyOsc.stop(now + 0.42);
          voice.vibrato.stop(now + 0.42);
        } catch (error) {
          // Already stopped.
        }
        audio.violinVoice = null;
      }

      function trumpetFrequency() {
        const pressed = state.trumpetValves;
        let semitone = 0;
        if (pressed.has(0)) semitone -= 2;
        if (pressed.has(1)) semitone -= 1;
        if (pressed.has(2)) semitone -= 3;
        return 466.16 * Math.pow(2, semitone / 12);
      }

      function startTrumpet(volume = 0.17) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const freq = trumpetFrequency();
        if (!audio.trumpetVoice) {
          const osc = ctx.createOscillator();
          const osc2 = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          osc.type = 'sawtooth';
          osc2.type = 'square';
          filter.type = 'bandpass';
          filter.frequency.value = 1100;
          filter.Q.value = 1.7;
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.setTargetAtTime(volume, now, 0.045);
          osc.connect(filter);
          osc2.connect(filter);
          filter.connect(gain);
          gain.connect(audio.master);
          osc.start(now);
          osc2.start(now);
          audio.trumpetVoice = { osc, bodyOsc: osc2, gain, filter };
        }
        audio.trumpetVoice.osc.frequency.setTargetAtTime(freq, now, 0.018);
        audio.trumpetVoice.bodyOsc.frequency.setTargetAtTime(freq * 2.01, now, 0.018);
        audio.trumpetVoice.gain.gain.setTargetAtTime(volume, now, 0.035);
        audio.trumpetVoice.filter.frequency.setTargetAtTime(900 + volume * 4200, now, 0.04);
      }

      function stopTrumpet() {
        if (!audio.trumpetVoice || !audio.ctx) return;
        releaseVoice(audio.trumpetVoice, 0.055);
        audio.trumpetVoice = null;
      }

      function stopSustainedVoices() {
        audio.activePiano.forEach((voice) => releaseVoice(voice));
        audio.activePiano.clear();
        stopViolin();
        if (state.violinBow) {
          state.violinBow.dragging = false;
          state.violinBow.active = false;
        }
        if (state.trumpetHead) {
          state.trumpetHead.blowing = false;
          state.trumpetHead.dragging = false;
        }
        stopTrumpet();
      }

      async function enableMic() {
        if (audio.micEnabled) {
          stopMic();
          return;
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.isSecureContext) {
          showToast('마이크 대신 길게 터치해서 불어요.');
          micBtn.textContent = '터치';
          return;
        }
        try {
          ensureAudio();
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: false,
              noiseSuppression: false,
              autoGainControl: false
            }
          });
          const source = audio.ctx.createMediaStreamSource(stream);
          const analyser = audio.ctx.createAnalyser();
          analyser.fftSize = 1024;
          source.connect(analyser);
          audio.micStream = stream;
          audio.micAnalyser = analyser;
          audio.micData = new Uint8Array(analyser.fftSize);
          audio.micEnabled = true;
          audio.micAvailable = true;
          micBtn.classList.add('is-on');
          micBtn.setAttribute('aria-pressed', 'true');
          micBtn.textContent = '마이크';
          showToast('마이크로 불기');
          setInstrument('trumpet');
        } catch (error) {
          audio.micAvailable = false;
          micBtn.textContent = '터치';
          showToast('길게 터치해서 불어요.');
        }
      }

      function stopMic() {
        if (audio.micStream) {
          audio.micStream.getTracks().forEach((track) => track.stop());
        }
        audio.micStream = null;
        audio.micAnalyser = null;
        audio.micData = null;
        audio.micEnabled = false;
        micBtn.classList.remove('is-on');
        micBtn.setAttribute('aria-pressed', 'false');
        stopTrumpet();
      }

      function pollMic(now) {
        if (!audio.micEnabled || !audio.micAnalyser || state.activeInstrument !== 'trumpet') return;
        audio.micAnalyser.getByteTimeDomainData(audio.micData);
        let sum = 0;
        for (let i = 0; i < audio.micData.length; i += 1) {
          const centered = (audio.micData[i] - 128) / 128;
          sum += centered * centered;
        }
        const rms = Math.sqrt(sum / audio.micData.length);
        const blow = clamp((rms - 0.045) / 0.18, 0, 1);
        if (blow > 0.04) {
          state.trumpetAir = Math.max(state.trumpetAir, blow);
          audio.lastMicBlow = now;
          startTrumpet(0.08 + blow * 0.22);
          setGestureActive('마이크');
          const activeBell = state.layout.trumpet?.bell;
          flashVerb(
            '불다',
            activeBell ? activeBell.x + activeBell.r * 0.34 : state.width * 0.66,
            activeBell ? activeBell.y - activeBell.r * 0.72 : state.height * 0.35,
            '트럼펫',
            instruments.trumpet.color
          );
          if (now % 90 < 16) {
            const bell = state.layout.trumpet?.bell;
            if (bell) {
              addEffect({
                type: 'air',
                x: bell.x + bell.r * 0.5,
                y: bell.y + (seededRandom() - 0.5) * bell.r,
                vx: 2.4 + blow * 3,
                vy: (seededRandom() - 0.5) * 1.6,
                duration: 650,
                color: '#fff1a8'
              });
            }
          }
        } else if (now - audio.lastMicBlow > 180 && !hasTrumpetPointer()) {
          stopTrumpet();
        }
      }

      function hasTrumpetPointer(exceptId) {
        for (const pointer of state.pointers.values()) {
          if (pointer.id !== exceptId && pointer.instrument === 'trumpet') return true;
        }
        return false;
      }

      function getTrumpetHead() {
        const r = clamp(Math.min(state.width, state.height) * 0.065, 26, 44);
        const homeX = clamp(state.width * 0.13, r + 16, r + 78);
        const homeY = clamp(state.height * 0.17, r + 24, r + 92);
        if (!state.trumpetHead) {
          state.trumpetHead = {
            x: homeX,
            y: homeY,
            r,
            homeX,
            homeY,
            attached: false,
            blowing: false,
            dragging: false,
            dragOffsetX: 0,
            dragOffsetY: 0,
            attachedAt: 0
          };
        }
        const head = state.trumpetHead;
        head.r = r;
        head.homeX = homeX;
        head.homeY = homeY;
        if (!head.attached && !head.dragging) {
          head.x = homeX;
          head.y = homeY;
        }
        return head;
      }

      function resetTrumpetHead() {
        state.trumpetHead = null;
        state.trumpetLastBreathAt = 0;
        getTrumpetHead();
        stopTrumpet();
      }

      function trumpetMouthPoint(head = getTrumpetHead()) {
        return {
          x: head.x + head.r * 0.78,
          y: head.y + head.r * 0.08
        };
      }

      function trumpetLockPoint() {
        const layout = state.layout.trumpet;
        const head = getTrumpetHead();
        if (!layout?.mouthpiece) {
          return { x: head.homeX, y: head.homeY };
        }
        return {
          x: clamp(layout.mouthpiece.x - head.r * 0.78, head.r + 8, state.width - head.r - 8),
          y: clamp(layout.mouthpiece.y - head.r * 0.08, head.r + 8, state.height - head.r - 8)
        };
      }

      function hitTrumpetHead(x, y) {
        const head = getTrumpetHead();
        return distance(x, y, head.x, head.y) <= head.r * 1.28;
      }

      function trumpetWindEmojiPoint(head = getTrumpetHead()) {
        return {
          x: head.homeX,
          y: head.homeY,
          r: head.r * 0.96
        };
      }

      function hitTrumpetWindEmoji(x, y) {
        const head = getTrumpetHead();
        if (!head.attached) return false;
        const wind = trumpetWindEmojiPoint(head);
        return distance(x, y, wind.x, wind.y) <= wind.r * 1.38;
      }

      function triggerTrumpetWindEmoji(forceVerb = false) {
        const head = getTrumpetHead();
        const wind = trumpetWindEmojiPoint(head);
        playWindBurst(0.78, 0.72);
        flashVerb('불다', wind.x + wind.r * 1.45, wind.y - wind.r * 1.25, '바람', '#8de7dd', forceVerb, '바람을 불다', {
          sizeScale: 0.5,
          duration: 560
        });
        setGestureActive('길게');
        addEffect({ type: 'funGust', x: wind.x + wind.r * 0.4, y: wind.y, duration: 620, color: '#dff8ff', strength: 1.1 });
        emitTrumpetBreath(
          {
            x: wind.x - wind.r * 0.28,
            y: wind.y - wind.r * 0.04,
            r: wind.r
          },
          { x: wind.x + wind.r * 2.2, y: wind.y + (seededRandom() - 0.5) * wind.r * 0.4 },
          0.9
        );
      }

      function setTrumpetHeadBlowing(isBlowing, forceVerb = false) {
        const head = getTrumpetHead();
        head.blowing = isBlowing;
        if (isBlowing) {
          state.trumpetAir = Math.max(state.trumpetAir, 1);
          startTrumpet(0.2);
          setGestureActive('길게');
          flashVerb('불다', head.x + head.r * 3.1, head.y - head.r * 1.75, '트럼펫', instruments.trumpet.color, forceVerb);
        } else {
          stopTrumpet();
          scheduleVerbHide(220);
          scheduleGestureHide(220);
        }
      }

      function attachTrumpetHead() {
        const head = getTrumpetHead();
        const lock = trumpetLockPoint();
        head.x = lock.x;
        head.y = lock.y;
        head.attached = true;
        head.dragging = false;
        head.attachedAt = performance.now();
        setTrumpetHeadBlowing(true, true);
      }

      function emitTrumpetBreath(fromHead = getTrumpetHead(), toPoint = state.layout.trumpet?.mouthpiece, intensity = 1) {
        const mouth = trumpetMouthPoint(fromHead);
        const target = toPoint || { x: mouth.x + fromHead.r * 2.8, y: mouth.y };
        addEffect({
          type: 'breath',
          x: mouth.x,
          y: mouth.y,
          tx: target.x,
          ty: target.y,
          wobble: (seededRandom() - 0.5) * fromHead.r * 0.55,
          duration: 500 + intensity * 220,
          color: '#dff8ff'
        });
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left) * (state.width / rect.width),
          y: (event.clientY - rect.top) * (state.height / rect.height)
        };
      }

      function handlePointerDown(event) {
        if (!supportsPointer && event.type.startsWith('pointer')) return;
        event.preventDefault();
        ensureAudio();
        canvas.setPointerCapture?.(event.pointerId);
        const point = canvasPoint(event);
        const pointer = {
          id: event.pointerId ?? 1,
          x: point.x,
          y: point.y,
          startX: point.x,
          startY: point.y,
          lastX: point.x,
          lastY: point.y,
          startTime: performance.now(),
          lastAction: 0,
          color: pointerColors[state.pointers.size % pointerColors.length],
          instrument: state.activeInstrument
        };
        state.pointers.set(pointer.id, pointer);
        dispatchInstrumentDown(pointer);
      }

      function handlePointerMove(event) {
        const pointer = state.pointers.get(event.pointerId ?? 1);
        if (!pointer) return;
        event.preventDefault();
        const point = canvasPoint(event);
        pointer.lastX = pointer.x;
        pointer.lastY = pointer.y;
        pointer.x = point.x;
        pointer.y = point.y;
        dispatchInstrumentMove(pointer);
      }

      function handlePointerUp(event) {
        const pointer = state.pointers.get(event.pointerId ?? 1);
        if (!pointer) return;
        event.preventDefault();
        dispatchInstrumentUp(pointer);
        state.pointers.delete(pointer.id);
        scheduleVerbHide(260);
        scheduleGestureHide(260);
      }

      function funObjectSpecs(instrument) {
        const w = state.width;
        const h = state.height;
        const r = clamp(Math.min(w, h) * 0.052, 22, 40);
        const keepTop = Math.max(r + 22, h * 0.14);
        const keepBottom = Math.min(h - r - 26, h * 0.82);
        const keepLeft = r + 24;
        const keepRight = w - r - 24;
        if (instrument === 'trumpet') {
          return [
            { id: 'pinwheel', kind: 'pinwheel', name: '바람개비', verb: '불다', color: '#e6b84d', x: keepRight - r * 1.6, y: keepTop + r * 0.8, r },
            { id: 'bubbles', kind: 'bubbles', name: '비눗방울', verb: '불다', color: '#8de7dd', x: keepLeft + r * 1.6, y: keepBottom - r * 0.8, r: r * 0.86 },
            { id: 'feather', kind: 'feather', name: '깃털', verb: '불다', color: '#dff8ff', x: keepRight - r * 2.6, y: keepBottom - r * 0.7, r: r * 0.86 }
          ];
        }
        if (instrument === 'guitar') {
          return [
            { id: 'basketball', kind: 'basketball', name: '농구공', verb: '튕기다', color: '#e28d40', x: keepLeft + r * 1.4, y: keepTop + r * 0.9, r },
            { id: 'rubberband', kind: 'rubberband', name: '고무줄', verb: '튕기다', color: '#75d0c8', x: keepLeft + r * 1.8, y: keepBottom - r * 0.7, r: r * 0.92 },
            { id: 'spring', kind: 'spring', name: '스프링', verb: '튕기다', color: '#b9a7ff', x: keepRight - r * 1.7, y: keepTop + r * 0.65, r: r * 0.9 }
          ];
        }
        if (instrument === 'drums') {
          return [
            { id: 'bell', kind: 'bell', name: '종', verb: '치다', color: '#d9b548', x: keepLeft + r * 1.55, y: keepTop + r * 1.1, r },
            { id: 'ball', kind: 'ball', name: '공', verb: '치다', color: '#6fc08d', x: keepRight - r * 1.55, y: keepTop + r * 1.05, r: r * 0.92 },
            { id: 'button', kind: 'button', name: '버튼', verb: '치다', color: '#4fb8d1', x: keepRight - r * 1.85, y: keepBottom - r * 0.9, r: r * 0.88 }
          ];
        }
        return [];
      }

      function setFunObjectLayout(instrument) {
        state.layout.funObjects = funObjectSpecs(instrument).map((object) => ({
          ...object,
          hitR: object.r * 1.35
        }));
      }

      function hitFunObject(x, y) {
        const objects = state.layout.funObjects || [];
        for (let i = objects.length - 1; i >= 0; i -= 1) {
          const object = objects[i];
          if (distance(x, y, object.x, object.y) <= object.hitR) return object;
        }
        return null;
      }

      function triggerFunObjectMotion(object) {
        const durations = {
          pinwheel: 1180,
          bubbles: 920,
          feather: 1050,
          basketball: 820,
          rubberband: 760,
          spring: 880,
          bell: 980,
          ball: 720,
          button: 430
        };
        state.funObjectMotion.set(object.id, {
          kind: object.kind,
          age: 0,
          duration: durations[object.kind] || 720,
          seed: seededRandom()
        });
      }

      function interactFunObject(pointer, object) {
        pointer.funObject = object;
        state.funObjectHits.set(object.id, 1);
        triggerFunObjectMotion(object);
        const phrase = `${objectPhrase(object.name)} ${object.verb}`;
        flashVerb(object.verb, object.x, object.y - object.r * 1.25, object.name, object.color, true, phrase, {
          sizeScale: 0.46,
          duration: 520
        });

        addFunObjectEffect(object);
        playFunObjectSound(object);
        setGestureActive(['pinwheel', 'bubbles', 'feather'].includes(object.kind) ? '\uAE38\uAC8C' : '\uC9E7\uAC8C');
      }

      function addFunObjectEffect(object) {
        if (object.kind === 'pinwheel') {
          addEffect({ type: 'funGust', x: object.x - object.r * 0.4, y: object.y, duration: 650, color: object.color, strength: 1.2 });
          addEffect({ type: 'spinSpark', x: object.x, y: object.y, duration: 520, color: '#fff8ec', radius: object.r * 0.9 });
        } else if (object.kind === 'bubbles') {
          addEffect({ type: 'funBubbles', x: object.x, y: object.y, duration: 860, color: object.color, radius: object.r });
        } else if (object.kind === 'feather') {
          addEffect({ type: 'funFeather', x: object.x, y: object.y, duration: 820, color: object.color, radius: object.r });
          addEffect({ type: 'funGust', x: object.x - object.r * 0.35, y: object.y, duration: 620, color: '#dff8ff', strength: 0.8 });
        } else if (object.kind === 'basketball') {
          addEffect({ type: 'funBounce', x: object.x, y: object.y + object.r * 0.64, duration: 540, color: object.color, radius: object.r });
          addEffect({ type: 'impactDust', x: object.x, y: object.y + object.r * 0.58, duration: 420, color: '#ffd28d', radius: object.r });
        } else if (object.kind === 'ball') {
          addEffect({ type: 'funBounce', x: object.x, y: object.y + object.r * 0.64, duration: 540, color: object.color, radius: object.r });
          addEffect({ type: 'impactDust', x: object.x, y: object.y + object.r * 0.55, duration: 390, color: object.color, radius: object.r * 0.82 });
        } else if (object.kind === 'rubberband') {
          addEffect({ type: 'funStretch', x: object.x, y: object.y, duration: 520, color: object.color, radius: object.r });
          addEffect({ type: 'pluck', x: object.x, y: object.y, duration: 420, color: object.color });
        } else if (object.kind === 'spring') {
          addEffect({ type: 'funSpring', x: object.x, y: object.y, duration: 560, color: object.color, radius: object.r });
          addEffect({ type: 'pluck', x: object.x, y: object.y, duration: 420, color: object.color });
        } else if (object.kind === 'bell') {
          addEffect({ type: 'funChime', x: object.x, y: object.y, duration: 650, color: object.color, radius: object.r });
          addEffect({ type: 'ring', x: object.x, y: object.y, radius: object.r * 0.42, duration: 480, color: object.color });
        } else if (object.kind === 'button') {
          addEffect({ type: 'funButton', x: object.x, y: object.y, duration: 460, color: object.color, radius: object.r });
        }
      }

      function dispatchInstrumentDown(pointer) {
        const funObject = hitFunObject(pointer.x, pointer.y);
        if (funObject) {
          interactFunObject(pointer, funObject);
          return;
        }
        if (state.activeInstrument === 'piano') return pianoDown(pointer);
        if (state.activeInstrument === 'violin') return violinDown(pointer);
        if (state.activeInstrument === 'trumpet') return trumpetDown(pointer);
        if (state.activeInstrument === 'guitar') return guitarDown(pointer);
        if (state.activeInstrument === 'drums') return drumsDown(pointer);
      }

      function dispatchInstrumentMove(pointer) {
        if (pointer.instrument !== state.activeInstrument) return;
        if (pointer.funObject) return;
        if (state.activeInstrument === 'piano') return pianoMove(pointer);
        if (state.activeInstrument === 'violin') return violinMove(pointer);
        if (state.activeInstrument === 'trumpet') return trumpetMove(pointer);
        if (state.activeInstrument === 'guitar') return guitarMove(pointer);
      }

      function dispatchInstrumentUp(pointer) {
        if (pointer.instrument !== state.activeInstrument) return;
        if (pointer.funObject) {
          pointer.funObject = null;
          return;
        }
        if (state.activeInstrument === 'piano') return pianoUp(pointer);
        if (state.activeInstrument === 'violin') return violinUp(pointer);
        if (state.activeInstrument === 'trumpet') return trumpetUp(pointer);
        if (state.activeInstrument === 'guitar') return guitarUp(pointer);
        if (state.activeInstrument === 'drums') return drumsUp(pointer);
      }

      function hitPianoKey(x, y) {
        const layout = state.layout.piano;
        if (!layout) return null;
        for (const key of layout.blackKeys) {
          if (x >= key.x && x <= key.x + key.w && y >= key.y && y <= key.y + key.h) {
            return key;
          }
        }
        for (const key of layout.whiteKeys) {
          if (x >= key.x && x <= key.x + key.w && y >= key.y && y <= key.y + key.h) {
            return key;
          }
        }
        return null;
      }

      function findPianoKeyById(id) {
        const layout = state.layout.piano;
        if (!layout) return null;
        return [...layout.blackKeys, ...layout.whiteKeys].find((key) => key.id === id) || null;
      }

      function pianoDown(pointer) {
        const key = hitPianoKey(pointer.x, pointer.y);
        if (!key) return;
        pointer.keyId = key.id;
        pointer.lastKeyId = key.id;
        pointer.pianoDownAt = performance.now();
        pointer.pianoLongFired = false;
        pointer.pianoMoved = false;
        startPianoVoice(pointer.id, key);
        state.pianoPress.set(key.id, { amount: 1, label: key.name, color: key.black ? '#201a17' : '#d7483f' });
        setGestureActive('짧게');
        addEffect({ type: 'burst', x: key.x + key.w / 2, y: key.y + key.h * 0.35, duration: 460, color: '#ffd36a' });
      }

      function pianoMove(pointer) {
        const key = hitPianoKey(pointer.x, pointer.y);
        if (!key || key.id === pointer.lastKeyId) return;
        releasePianoVoice(pointer.id);
        pointer.lastKeyId = key.id;
        pointer.pianoDownAt = performance.now();
        pointer.pianoLongFired = false;
        pointer.pianoMoved = true;
        startPianoVoice(pointer.id, key);
        state.pianoPress.set(key.id, { amount: 1, label: key.name, color: key.black ? '#201a17' : '#d7483f' });
        flashVerb('치다', key.x + key.w / 2, key.y - 18, '피아노', instruments.piano.color, false, '피아노를 치다');
        setGestureActive('드래그');
        addEffect({ type: 'spark', x: key.x + key.w / 2, y: key.y + key.h * 0.26, duration: 380, color: '#fff1a8' });
      }

      function pianoUp(pointer) {
        releasePianoVoice(pointer.id);
        const held = performance.now() - (pointer.pianoDownAt || pointer.startTime);
        const key = findPianoKeyById(pointer.lastKeyId);
        if (key && !pointer.pianoLongFired && held < 430) {
          flashVerb('치다', key.x + key.w / 2, key.y - 18, '피아노', instruments.piano.color, true, '피아노를 치다');
          setGestureActive('짧게');
        }
        if (pointer.lastKeyId) {
          const pressed = state.pianoPress.get(pointer.lastKeyId);
          if (pressed) pressed.amount = Math.min(pressed.amount, 0.45);
        }
      }

      function hitDrum(x, y) {
        const drums = state.layout.drums || [];
        for (let i = drums.length - 1; i >= 0; i -= 1) {
          const drum = drums[i];
          if (distance(x, y, drum.x, drum.y) <= drum.r) return drum;
        }
        return null;
      }

      function hitDrumZone(drum, pointer, velocity = 1) {
        if (!drum) return;
        playDrum(drum.kind, velocity);
        state.drumHits.set(drum.id, 1);
        flashVerb('치다', drum.x, drum.y - drum.r * 0.8, '드럼', instruments.drums.color, velocity > 0.9);
        setGestureActive('짧게');
        addEffect({ type: 'ring', x: drum.x, y: drum.y, radius: drum.r * 0.42, duration: 520, color: drum.color });
        addEffect({ type: 'sticks', x: pointer.x, y: pointer.y, duration: 340, color: '#fff8ec' });
      }

      function drumsDown(pointer) {
        const drum = hitDrum(pointer.x, pointer.y);
        pointer.drumId = drum?.id;
        pointer.drumKind = drum?.kind;
        pointer.rollAt = performance.now();
        hitDrumZone(drum, pointer, 1);
      }

      function drumsUp(pointer) {
        pointer.drumId = null;
      }

      function hitGuitarString(x, y) {
        const layout = state.layout.guitar;
        if (!layout) return null;
        const withinX = x >= layout.stringStart && x <= layout.stringEnd;
        if (!withinX) return null;
        let nearest = null;
        let minDistance = Infinity;
        layout.strings.forEach((string) => {
          const d = Math.abs(y - string.y);
          if (d < minDistance) {
            minDistance = d;
            nearest = string;
          }
        });
        return minDistance <= layout.stringGap * 0.58 ? nearest : null;
      }

      function pluckString(string, x, velocity = 0.84) {
        if (!string) return;
        playPluck(string.freq, velocity);
        state.stringImpulse.set(`g${string.index}`, Math.min(1.6, velocity * 1.3));
        flashVerb('튕기다', x, string.y - 28, '기타', instruments.guitar.color, velocity > 0.75);
        addEffect({ type: 'pluck', x, y: string.y, duration: 540, color: '#8de7dd' });
      }

      function guitarDown(pointer) {
        const string = hitGuitarString(pointer.x, pointer.y);
        if (string) {
          const grab = {
            pointerId: pointer.id,
            stringIndex: string.index,
            freq: string.freq,
            anchorX: pointer.x,
            anchorY: string.y,
            currentX: pointer.x,
            currentY: string.y,
            pull: 0,
            hasPulled: false,
            startedAt: performance.now()
          };
          pointer.guitarGrab = grab;
          pointer.lastStringIndex = string.index;
          state.guitarGrabs.set(pointer.id, grab);
          setGestureActive('길게');
        } else {
          pointer.lastStringIndex = undefined;
        }
      }

      function guitarMove(pointer) {
        const layout = state.layout.guitar;
        if (!layout) return;
        const moved = distance(pointer.x, pointer.y, pointer.lastX, pointer.lastY);
        if (moved < 2) return;

        if (pointer.guitarGrab) {
          const grab = pointer.guitarGrab;
          grab.currentX = clamp(pointer.x, layout.stringStart, layout.stringEnd);
          grab.currentY = clamp(pointer.y, grab.anchorY - layout.stringGap * 4.2, grab.anchorY + layout.stringGap * 4.2);
          grab.pull = distance(grab.currentX, grab.currentY, grab.anchorX, grab.anchorY);
          grab.hasPulled = grab.hasPulled || grab.pull > layout.stringGap * 0.38;
          setGestureActive(grab.hasPulled ? '드래그' : '길게');
          return;
        }

        const minY = Math.min(pointer.y, pointer.lastY);
        const maxY = Math.max(pointer.y, pointer.lastY);
        const candidates = layout.strings.filter((string) => string.y >= minY - 2 && string.y <= maxY + 2);
        if (candidates.length) {
          const direction = pointer.y > pointer.lastY ? 1 : -1;
          const ordered = candidates.sort((a, b) => direction * (a.y - b.y));
          ordered.forEach((string) => {
            if (string.index !== pointer.lastStringIndex || moved > 12) {
              pluckString(string, pointer.x, clamp(moved / 18, 0.55, 1));
            }
          });
          pointer.lastStringIndex = ordered[ordered.length - 1].index;
          setGestureActive('드래그');
        }
      }

      function guitarUp(pointer) {
        if (pointer.guitarGrab) {
          const grab = pointer.guitarGrab;
          const layout = state.layout.guitar;
          const string = layout?.strings[grab.stringIndex];
          const releasePull = grab.pull;
          state.guitarGrabs.delete(pointer.id);
          pointer.guitarGrab = null;
          if (string && releasePull > layout.stringGap * 0.5) {
            const bend = clamp((grab.anchorY - grab.currentY) / 260, -0.08, 0.08);
            const velocity = clamp(releasePull / (layout.stringGap * 3.2), 0.38, 1);
            playPluck(grab.freq * (1 + bend), velocity);
            state.stringImpulse.set(`g${string.index}`, Math.min(1.7, 0.7 + velocity));
            flashVerb('튕기다', grab.currentX, grab.currentY - 30, '기타', instruments.guitar.color, true);
            setGestureActive('드래그');
            addEffect({ type: 'pluck', x: grab.currentX, y: grab.currentY, duration: 620, color: '#8de7dd' });
          }
        }
      }

      function nearestViolinString(x, y) {
        const layout = state.layout.violin;
        if (!layout) return null;
        let nearest = null;
        let minDistance = Infinity;
        layout.strings.forEach((string) => {
          const d = Math.abs(x - string.x) + Math.max(0, layout.bridgeTop - y, y - layout.bridgeBottom) * 0.35;
          if (d < minDistance) {
            minDistance = d;
            nearest = string;
          }
        });
        return minDistance <= layout.stringGap * 0.82 ? nearest : null;
      }

      function getViolinBowTool() {
        const length = clamp(Math.min(state.width, state.height) * 0.38, 150, 270);
        const homeX = clamp(state.width * 0.84, length * 0.55 + 16, state.width - length * 0.55 - 16);
        const homeY = clamp(state.height * 0.48, 86, state.height - 120);
        const thickness = clamp(length * 0.045, 7, 13);
        if (!state.violinBow) {
          state.violinBow = {
            x: homeX,
            y: homeY,
            homeX,
            homeY,
            length,
            thickness,
            angle: -0.18,
            dragging: false,
            active: false,
            pressure: 0.28,
            dragOffsetX: 0,
            dragOffsetY: 0
          };
        }
        const bow = state.violinBow;
        bow.homeX = homeX;
        bow.homeY = homeY;
        bow.length = length;
        bow.thickness = thickness;
        if (!bow.dragging && !bow.active) {
          bow.x = homeX;
          bow.y = homeY;
          bow.angle = -0.18;
        }
        return bow;
      }

      function violinBowEnds(bow = getViolinBowTool()) {
        const dx = Math.cos(bow.angle) * bow.length * 0.5;
        const dy = Math.sin(bow.angle) * bow.length * 0.5;
        return {
          x1: bow.x - dx,
          y1: bow.y - dy,
          x2: bow.x + dx,
          y2: bow.y + dy
        };
      }

      function violinBowContact(bow = getViolinBowTool()) {
        const ends = violinBowEnds(bow);
        return {
          x: lerp(ends.x1, ends.x2, 0.48),
          y: lerp(ends.y1, ends.y2, 0.48)
        };
      }

      function hitViolinBow(x, y) {
        const bow = getViolinBowTool();
        const ends = violinBowEnds(bow);
        return pointToSegmentDistance(x, y, ends.x1, ends.y1, ends.x2, ends.y2) <= bow.thickness * 2.7;
      }

      function violinDown(pointer) {
        const bow = getViolinBowTool();
        if (!hitViolinBow(pointer.x, pointer.y)) return;
        pointer.violinTarget = 'bow';
        pointer.lastAction = performance.now();
        bow.dragging = true;
        bow.active = false;
        bow.dragOffsetX = pointer.x - bow.x;
        bow.dragOffsetY = pointer.y - bow.y;
        setGestureActive('드래그');
      }

      function violinMove(pointer) {
        if (pointer.violinTarget !== 'bow') return;
        const bow = getViolinBowTool();
        const speed = distance(pointer.x, pointer.y, pointer.lastX, pointer.lastY);
        bow.dragging = true;
        bow.x = clamp(pointer.x - bow.dragOffsetX, bow.length * 0.25, state.width - bow.length * 0.18);
        bow.y = clamp(pointer.y - bow.dragOffsetY, 42, state.height - 42);
        bow.angle = -0.18 + clamp((pointer.y - pointer.lastY) / 90, -0.16, 0.16);
        bow.pressure = clamp(speed / 18, 0.28, 1);
        const contact = violinBowContact(bow);
        const string = nearestViolinString(contact.x, contact.y);
        if (string) {
          bow.active = true;
          startViolin(string.freq, 0.05 + clamp(speed / 28, 0, 1) * 0.16);
          state.stringImpulse.set(`v${string.index}`, Math.min(1.2, 0.45 + speed / 16));
          flashVerb('켜다', contact.x, contact.y - 58, '바이올린', instruments.violin.color);
          setGestureActive(speed > 8 ? '드래그' : '길게');
          if (speed > 5 && performance.now() - state.violinLastBowAt > 70) {
            state.violinLastBowAt = performance.now();
            addEffect({ type: 'rosin', x: contact.x, y: contact.y, duration: 480, color: '#fff4c7' });
          }
        } else {
          bow.active = false;
          stopViolin();
        }
      }

      function violinUp(pointer) {
        if (pointer.violinTarget !== 'bow') return;
        stopViolin();
        const bow = getViolinBowTool();
        bow.dragging = false;
        bow.active = false;
        bow.x = bow.homeX;
        bow.y = bow.homeY;
        bow.angle = -0.18;
        pointer.violinTarget = null;
      }

      function hitTrumpetValve(x, y) {
        const layout = state.layout.trumpet;
        if (!layout) return null;
        for (const valve of layout.valves) {
          if (distance(x, y, valve.x, valve.y) <= valve.r) return valve;
        }
        return null;
      }

      function trumpetDown(pointer) {
        const head = getTrumpetHead();
        if (hitTrumpetWindEmoji(pointer.x, pointer.y)) {
          pointer.trumpetTarget = 'windEmoji';
          pointer.lastWindEmojiAt = performance.now();
          triggerTrumpetWindEmoji(true);
          return;
        }
        if (hitTrumpetHead(pointer.x, pointer.y)) {
          pointer.trumpetTarget = 'head';
          pointer.headWasAttached = head.attached;
          pointer.headStartX = pointer.x;
          pointer.headStartY = pointer.y;
          pointer.attachedDuringDrag = false;
          if (!head.attached) {
            head.dragging = true;
            head.dragOffsetX = pointer.x - head.x;
            head.dragOffsetY = pointer.y - head.y;
            emitTrumpetBreath(head, null, 0.8);
            setGestureActive('드래그');
          }
          return;
        }

        const valve = hitTrumpetValve(pointer.x, pointer.y);
        if (valve) {
          pointer.trumpetTarget = 'valve';
          state.trumpetValves.add(valve.index);
          pointer.valveIndex = valve.index;
          if (head.blowing) {
            startTrumpet(0.2);
          }
          return;
        }
      }

      function trumpetMove(pointer) {
        const head = getTrumpetHead();
        if (pointer.trumpetTarget === 'windEmoji') {
          const now = performance.now();
          if (now - (pointer.lastWindEmojiAt || 0) > 120) {
            pointer.lastWindEmojiAt = now;
            const wind = trumpetWindEmojiPoint(head);
            playWindBurst(0.38, 0.36);
            addEffect({ type: 'funGust', x: wind.x + wind.r * 0.4, y: wind.y, duration: 420, color: '#dff8ff', strength: 0.7 });
          }
          return;
        }
        if (pointer.trumpetTarget === 'head') {
          if (!head.attached) {
            head.dragging = true;
            head.x = clamp(pointer.x - head.dragOffsetX, head.r + 8, state.width - head.r - 8);
            head.y = clamp(pointer.y - head.dragOffsetY, head.r + 8, state.height - head.r - 8);
            setGestureActive('드래그');
            const mouthpiece = state.layout.trumpet?.mouthpiece;
            if (mouthpiece && distance(trumpetMouthPoint(head).x, trumpetMouthPoint(head).y, mouthpiece.x, mouthpiece.y) < head.r * 1.45) {
              pointer.attachedDuringDrag = true;
              attachTrumpetHead();
            }
          }
          return;
        }

        const valve = hitTrumpetValve(pointer.x, pointer.y);
        if (pointer.valveIndex !== undefined && (!valve || valve.index !== pointer.valveIndex)) {
          state.trumpetValves.delete(pointer.valveIndex);
          pointer.valveIndex = undefined;
        }
        if (valve) {
          state.trumpetValves.add(valve.index);
          pointer.valveIndex = valve.index;
        }
        const speed = distance(pointer.x, pointer.y, pointer.lastX, pointer.lastY);
        if (head.blowing) {
          startTrumpet(0.16 + clamp(speed / 40, 0, 1) * 0.1);
          state.trumpetAir = Math.max(state.trumpetAir, 0.5 + speed / 24);
        }
      }

      function trumpetUp(pointer) {
        const head = getTrumpetHead();
        if (pointer.trumpetTarget === 'windEmoji') {
          pointer.trumpetTarget = null;
          return;
        }
        if (pointer.trumpetTarget === 'head') {
          const moved = distance(pointer.x, pointer.y, pointer.headStartX, pointer.headStartY);
          if (head.attached && !pointer.attachedDuringDrag && moved < head.r * 0.42) {
            setTrumpetHeadBlowing(!head.blowing, true);
          }
          if (!head.attached) {
            head.dragging = false;
          }
          return;
        }

        if (pointer.valveIndex !== undefined) {
          state.trumpetValves.delete(pointer.valveIndex);
        }
        if (!head.blowing && !hasTrumpetPointer(pointer.id)) {
          stopTrumpet();
        }
      }

      function updateHeldGestures(now) {
        for (const pointer of state.pointers.values()) {
          const held = now - pointer.startTime;
          if (pointer.instrument === 'drums' && pointer.drumId && held > 420 && now - pointer.rollAt > 135) {
            const drum = (state.layout.drums || []).find((item) => item.id === pointer.drumId);
            pointer.rollAt = now;
            setGestureActive('연타');
            hitDrumZone(drum, pointer, 0.62);
          }
          if (pointer.instrument === 'guitar' && pointer.guitarGrab && held > 420 && now - pointer.lastAction > 180) {
            pointer.lastAction = now;
            setGestureActive(pointer.guitarGrab.hasPulled ? '드래그' : '길게');
          }
          if (pointer.instrument === 'piano' && pointer.lastKeyId && held > 430) {
            if (!pointer.pianoLongFired) {
              const key = findPianoKeyById(pointer.lastKeyId);
              if (key) {
                flashVerb('누르다', key.x + key.w / 2, key.y - 18, '피아노', instruments.piano.color, true, '건반을 누르다');
              }
              pointer.pianoLongFired = true;
            }
            setGestureActive('길게');
          }
        }

        if (state.activeInstrument === 'trumpet' && state.trumpetHead) {
          const head = getTrumpetHead();
          if ((head.dragging || head.blowing) && now - state.trumpetLastBreathAt > 115) {
            state.trumpetLastBreathAt = now;
            emitTrumpetBreath(head, head.attached ? state.layout.trumpet?.mouthpiece : null, head.blowing ? 1 : 0.65);
            if (head.blowing) {
              const bell = state.layout.trumpet?.bell;
              if (bell) {
                addEffect({
                  type: 'air',
                  x: bell.x + bell.r * 0.34,
                  y: bell.y + (seededRandom() - 0.5) * bell.r * 0.7,
                  vx: 2.8,
                  vy: (seededRandom() - 0.5) * 1.1,
                  duration: 620,
                  color: '#fff1a8'
                });
              }
            }
          }
          if (head.blowing) {
            state.trumpetAir = Math.max(state.trumpetAir, 0.9);
            startTrumpet(0.2);
            setGestureActive('길게');
          }
        }
      }

      function drawBackground(now) {
        const w = state.width;
        const h = state.height;
        const gradient = ctx.createLinearGradient(0, 0, w, h);
        gradient.addColorStop(0, '#211912');
        gradient.addColorStop(0.46, '#34221f');
        gradient.addColorStop(1, '#13110f');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.globalAlpha = 0.08;
        ctx.strokeStyle = '#fff8ec';
        ctx.lineWidth = 1;
        const spacing = Math.max(34, Math.min(58, w / 16));
        for (let x = -spacing; x < w + spacing; x += spacing) {
          ctx.beginPath();
          ctx.moveTo(x + Math.sin(now * 0.0004 + x) * 4, 0);
          ctx.lineTo(x - h * 0.18, h);
          ctx.stroke();
        }
        ctx.restore();
