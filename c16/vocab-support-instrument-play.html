        const spotlight = ctx.createRadialGradient(w * 0.52, h * 0.5, 20, w * 0.52, h * 0.5, Math.max(w, h) * 0.68);
        spotlight.addColorStop(0, 'rgba(255, 248, 236, 0.18)');
        spotlight.addColorStop(0.55, 'rgba(255, 248, 236, 0.05)');
        spotlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = spotlight;
        ctx.fillRect(0, 0, w, h);
      }

      function funObjectTransform(object) {
        const motion = state.funObjectMotion.get(object.id);
        const transform = {
          dx: 0,
          dy: 0,
          rotation: 0,
          scaleX: 1,
          scaleY: 1,
          extraSpin: 0
        };
        if (!motion) return transform;

        const t = clamp(motion.age / motion.duration, 0, 1);
        const fade = 1 - t;
        const pulse = Math.sin(t * Math.PI);
        const out = 1 - Math.pow(1 - t, 3);
        const wobble = Math.sin(t * Math.PI * 5 + motion.seed * Math.PI) * fade;

        if (object.kind === 'pinwheel') {
          transform.extraSpin = fade * Math.PI * 8.5;
          transform.rotation = wobble * 0.08;
          transform.scaleX = 1 + pulse * 0.08;
          transform.scaleY = 1 + pulse * 0.08;
        } else if (object.kind === 'bubbles') {
          transform.dx = Math.sin(t * Math.PI * 2.5 + motion.seed * 3) * object.r * 0.1 * fade;
          transform.dy = -pulse * object.r * 0.36;
          transform.scaleX = 1 + pulse * 0.18;
          transform.scaleY = 1 + pulse * 0.18;
        } else if (object.kind === 'feather') {
          transform.dx = out * object.r * 0.5;
          transform.dy = -pulse * object.r * 0.58;
          transform.rotation = -0.12 + Math.sin(t * Math.PI * 2.4) * 0.32 * fade;
        } else if (object.kind === 'basketball') {
          const hop = Math.abs(Math.sin(t * Math.PI * 1.55)) * fade;
          const land = Math.max(0, (t - 0.62) / 0.38);
          const squash = Math.sin(land * Math.PI) * 0.22;
          transform.dy = -hop * object.r * 1.16;
          transform.rotation = out * Math.PI * 1.8;
          transform.scaleX = 1 + squash;
          transform.scaleY = 1 - squash * 0.55;
        } else if (object.kind === 'rubberband') {
          const stretch = Math.abs(Math.sin(t * Math.PI * 2.25)) * fade;
          transform.rotation = Math.sin(t * Math.PI * 4.5) * 0.12 * fade;
          transform.scaleX = 1 + stretch * 0.44;
          transform.scaleY = 1 - stretch * 0.2;
        } else if (object.kind === 'spring') {
          const boing = Math.sin(t * Math.PI * 5.2) * fade;
          transform.dx = Math.sin(t * Math.PI * 7) * object.r * 0.08 * fade;
          transform.scaleX = 1 + boing * 0.24;
          transform.scaleY = 1 - boing * 0.18;
        } else if (object.kind === 'bell') {
          transform.rotation = Math.sin(t * Math.PI * 7.2) * 0.38 * fade;
          transform.dx = Math.sin(t * Math.PI * 4) * object.r * 0.05 * fade;
        } else if (object.kind === 'ball') {
          const hop = Math.sin(t * Math.PI) * fade;
          const squash = Math.sin(Math.max(0, t - 0.52) / 0.48 * Math.PI) * 0.18;
          transform.dy = -hop * object.r * 0.78;
          transform.rotation = out * Math.PI * 1.15;
          transform.scaleX = 1 + squash;
          transform.scaleY = 1 - squash * 0.5;
        } else if (object.kind === 'button') {
          const press = Math.max(0, 1 - t * 3.2);
          transform.dy = press * object.r * 0.16;
          transform.scaleX = 1 + press * 0.08;
          transform.scaleY = 1 - press * 0.14;
        }
        return transform;
      }

      function drawFunObjects(now) {
        const objects = state.layout.funObjects || [];
        objects.forEach((object) => {
          const hit = state.funObjectHits.get(object.id) || 0;
          const motion = funObjectTransform(object);
          const wobble = Math.sin(now * 0.006 + object.x * 0.02) * object.r * 0.04;
          const scale = 1 + hit * 0.12;
          drawTouchableGlow(object.x, object.y, object.hitR * 0.72, object.color, now, 0.09 + hit * 0.14);

          ctx.save();
          ctx.translate(object.x + motion.dx, object.y + motion.dy + wobble - hit * object.r * 0.12);
          ctx.rotate(motion.rotation);
          ctx.scale(scale * motion.scaleX, scale * motion.scaleY);
          ctx.shadowColor = 'rgba(0, 0, 0, 0.34)';
          ctx.shadowBlur = object.r * 0.5;
          ctx.shadowOffsetY = object.r * 0.18;

          if (object.kind === 'pinwheel') {
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.62)';
            ctx.lineWidth = Math.max(2, object.r * 0.08);
            ctx.beginPath();
            ctx.moveTo(0, object.r * 0.1);
            ctx.lineTo(0, object.r * 1.45);
            ctx.stroke();
            ctx.rotate(now * 0.004 + hit * 1.3 + motion.extraSpin);
            ['#e75d4f', '#f4c64b', '#55bfa3', '#7b91e8'].forEach((color, index) => {
              ctx.rotate(Math.PI / 2);
              ctx.fillStyle = color;
              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.quadraticCurveTo(object.r * 0.46, -object.r * 0.14, object.r * 0.86, -object.r * 0.58);
              ctx.quadraticCurveTo(object.r * 0.42, -object.r * 0.3, object.r * 0.1, 0);
              ctx.fill();
            });
            ctx.fillStyle = '#fff8ec';
            ctx.beginPath();
            ctx.arc(0, 0, object.r * 0.16, 0, Math.PI * 2);
            ctx.fill();
          } else if (object.kind === 'bubbles') {
            ctx.shadowBlur = 0;
            for (let i = 0; i < 4; i += 1) {
              const angle = i * 1.7 + now * 0.0015;
              const bx = Math.cos(angle) * object.r * (0.16 + i * 0.12);
              const by = Math.sin(angle) * object.r * (0.2 + i * 0.1) - hit * object.r * 0.28;
              const br = object.r * (0.22 + (i % 2) * 0.08);
              ctx.strokeStyle = 'rgba(223, 248, 255, 0.78)';
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(bx, by, br, 0, Math.PI * 2);
              ctx.stroke();
              ctx.fillStyle = 'rgba(141, 231, 221, 0.12)';
              ctx.fill();
            }
          } else if (object.kind === 'feather') {
            ctx.rotate(-0.42 + hit * 0.35);
            ctx.strokeStyle = '#fff8ec';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-object.r * 0.65, object.r * 0.58);
            ctx.quadraticCurveTo(0, -object.r * 0.05, object.r * 0.72, -object.r * 0.66);
            ctx.stroke();
            const feather = ctx.createLinearGradient(-object.r, object.r, object.r, -object.r);
            feather.addColorStop(0, '#9edee6');
            feather.addColorStop(1, '#fff8ec');
            ctx.fillStyle = feather;
            ctx.beginPath();
            ctx.ellipse(0, -object.r * 0.08, object.r * 0.28, object.r * 0.82, -0.82, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(45, 72, 80, 0.42)';
            ctx.lineWidth = 1;
            for (let i = -3; i <= 3; i += 1) {
              ctx.beginPath();
              ctx.moveTo(i * object.r * 0.05, -object.r * 0.08);
              ctx.lineTo(i * object.r * 0.18, -object.r * 0.46 + Math.abs(i) * object.r * 0.08);
              ctx.stroke();
            }
          } else if (object.kind === 'basketball') {
            const ball = ctx.createRadialGradient(-object.r * 0.24, -object.r * 0.3, 2, 0, 0, object.r);
            ball.addColorStop(0, '#ffd28d');
            ball.addColorStop(0.42, '#e9862d');
            ball.addColorStop(1, '#8d3f16');
            ctx.fillStyle = ball;
            ctx.beginPath();
            ctx.arc(0, 0, object.r * 0.72, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#4c2214';
            ctx.lineWidth = Math.max(2, object.r * 0.06);
            ctx.beginPath();
            ctx.arc(0, 0, object.r * 0.72, 0, Math.PI * 2);
            ctx.moveTo(-object.r * 0.7, 0);
            ctx.lineTo(object.r * 0.7, 0);
            ctx.moveTo(0, -object.r * 0.7);
            ctx.lineTo(0, object.r * 0.7);
            ctx.ellipse(-object.r * 0.28, 0, object.r * 0.28, object.r * 0.72, 0, 0, Math.PI * 2);
            ctx.ellipse(object.r * 0.28, 0, object.r * 0.28, object.r * 0.72, 0, 0, Math.PI * 2);
            ctx.stroke();
          } else if (object.kind === 'rubberband') {
            ctx.rotate(-0.15 + hit * 0.25);
            ctx.strokeStyle = '#75d0c8';
            ctx.lineWidth = Math.max(5, object.r * 0.14);
            ctx.beginPath();
            ctx.ellipse(0, 0, object.r * 0.92 + hit * object.r * 0.16, object.r * 0.38 - hit * object.r * 0.04, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.58)';
            ctx.lineWidth = 2;
            ctx.stroke();
          } else if (object.kind === 'spring') {
            ctx.strokeStyle = '#d9ccff';
            ctx.lineWidth = Math.max(3, object.r * 0.09);
            ctx.lineCap = 'round';
            ctx.beginPath();
            for (let i = 0; i <= 28; i += 1) {
              const t = i / 28;
              const x = lerp(-object.r * 0.8, object.r * 0.8, t);
              const y = Math.sin(t * Math.PI * 9 + hit * 1.6) * object.r * 0.28;
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.fillStyle = '#b9a7ff';
            ctx.beginPath();
            ctx.arc(-object.r * 0.92, 0, object.r * 0.12, 0, Math.PI * 2);
            ctx.arc(object.r * 0.92, 0, object.r * 0.12, 0, Math.PI * 2);
            ctx.fill();
          } else if (object.kind === 'bell') {
            const bell = ctx.createRadialGradient(-object.r * 0.18, -object.r * 0.28, 2, 0, 0, object.r);
            bell.addColorStop(0, '#fff1a8');
            bell.addColorStop(0.52, '#d9b548');
            bell.addColorStop(1, '#86540b');
            ctx.fillStyle = bell;
            ctx.beginPath();
            ctx.moveTo(-object.r * 0.5, object.r * 0.34);
            ctx.quadraticCurveTo(-object.r * 0.34, -object.r * 0.52, 0, -object.r * 0.56);
            ctx.quadraticCurveTo(object.r * 0.34, -object.r * 0.52, object.r * 0.5, object.r * 0.34);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.58)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#6d3a08';
            ctx.beginPath();
            ctx.arc(0, object.r * 0.44 + hit * object.r * 0.08, object.r * 0.14, 0, Math.PI * 2);
            ctx.fill();
          } else if (object.kind === 'ball') {
            const ball = ctx.createRadialGradient(-object.r * 0.28, -object.r * 0.32, 2, 0, 0, object.r);
            ball.addColorStop(0, '#fff8ec');
            ball.addColorStop(0.45, '#6fc08d');
            ball.addColorStop(1, '#1d6f4c');
            ctx.fillStyle = ball;
            ctx.beginPath();
            ctx.arc(0, 0, object.r * 0.68, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.66)';
            ctx.lineWidth = Math.max(2, object.r * 0.06);
            ctx.beginPath();
            ctx.arc(0, 0, object.r * 0.68, 0, Math.PI * 2);
            ctx.moveTo(-object.r * 0.58, -object.r * 0.2);
            ctx.quadraticCurveTo(0, object.r * 0.18, object.r * 0.58, -object.r * 0.2);
            ctx.stroke();
          } else if (object.kind === 'button') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
            ctx.beginPath();
            ctx.ellipse(0, object.r * 0.22, object.r * 0.78, object.r * 0.32, 0, 0, Math.PI * 2);
            ctx.fill();
            const button = ctx.createRadialGradient(-object.r * 0.22, -object.r * 0.26, 2, 0, 0, object.r);
            button.addColorStop(0, '#dff8ff');
            button.addColorStop(0.48, '#4fb8d1');
            button.addColorStop(1, '#176177');
            ctx.fillStyle = button;
            ctx.beginPath();
            ctx.arc(0, -hit * object.r * 0.16, object.r * 0.58, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.64)';
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          ctx.restore();
        });
      }

      function drawPiano(now) {
        const w = state.width;
        const h = state.height;
        const boardW = Math.min(w * 0.94, 980);
        const boardH = Math.min(h * 0.48, 330);
        const x = (w - boardW) / 2;
        const y = h * 0.28;
        const keyH = boardH * 0.72;
        const keyY = y + boardH * 0.2;
        const whiteW = boardW / pianoWhite.length;

        state.layout.piano = { whiteKeys: [], blackKeys: [] };

        drawSoftEllipseShadow(x + boardW * 0.5, y + boardH + 40, boardW * 0.58, boardH * 0.16, 0.24);

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.36)';
        ctx.shadowBlur = 32;
        ctx.shadowOffsetY = 18;
        roundedRect(ctx, x - 20, y - 44, boardW + 40, boardH + 70, 24);
        const caseGradient = ctx.createLinearGradient(x, y - 40, x, y + boardH);
        caseGradient.addColorStop(0, '#7d2e2a');
        caseGradient.addColorStop(0.5, '#361c18');
        caseGradient.addColorStop(1, '#18100d');
        ctx.fillStyle = caseGradient;
        ctx.fill();
        ctx.restore();

        drawWoodGrainRect(x - 18, y - 42, boardW + 36, boardH + 66, 24, 0.24);

        ctx.save();
        const lidGradient = ctx.createLinearGradient(x, y - 28, x, y + boardH * 0.2);
        lidGradient.addColorStop(0, '#18110e');
        lidGradient.addColorStop(0.55, '#0e0c0b');
        lidGradient.addColorStop(1, '#24120f');
        ctx.fillStyle = lidGradient;
        roundedRect(ctx, x + 18, y - 18, boardW - 36, boardH * 0.2, 12);
        ctx.fill();
        ctx.globalAlpha = 0.64;
        ctx.strokeStyle = '#b78545';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + 30, y + boardH * 0.15);
        ctx.lineTo(x + boardW - 30, y + boardH * 0.15);
        ctx.stroke();
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = '#fff1a8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + 42, y - 2);
        ctx.bezierCurveTo(x + boardW * 0.3, y - 20, x + boardW * 0.78, y - 8, x + boardW - 42, y - 12);
        ctx.stroke();
        ctx.restore();

        const keyBedGradient = ctx.createLinearGradient(x, keyY - 16, x, keyY + keyH);
        keyBedGradient.addColorStop(0, '#3a1c16');
        keyBedGradient.addColorStop(0.28, '#17110f');
        keyBedGradient.addColorStop(1, '#070605');
        ctx.fillStyle = keyBedGradient;
        roundedRect(ctx, x - 4, keyY - 16, boardW + 8, keyH + 24, 14);
        ctx.fill();

        ctx.save();
        ctx.globalAlpha = 0.16 + Math.sin(now * 0.004) * 0.04;
        ctx.strokeStyle = '#fff1a8';
        ctx.lineWidth = 3;
        roundedRect(ctx, x + 4, keyY + 3, boardW - 8, keyH - 6, 12);
        ctx.stroke();
        ctx.restore();

        for (let i = 0; i < pianoWhite.length; i += 1) {
          const press = state.pianoPress.get(`w${i}`)?.amount || 0;
          const keyX = x + i * whiteW;
          const key = {
            ...pianoWhite[i],
            id: `w${i}`,
            x: keyX + 2,
            y: keyY + press * 8,
            w: whiteW - 4,
            h: keyH - press * 8,
            black: false
          };
          state.layout.piano.whiteKeys.push(key);
          const gradient = ctx.createLinearGradient(0, key.y, 0, key.y + key.h);
          gradient.addColorStop(0, press ? '#fff0c2' : '#fffdf7');
          gradient.addColorStop(0.62, press ? '#f6dda7' : '#eee8dc');
          gradient.addColorStop(1, press ? '#f0d19a' : '#d8cfc0');
          ctx.save();
          ctx.shadowColor = press ? 'rgba(255, 241, 168, 0.42)' : 'rgba(0, 0, 0, 0.22)';
          ctx.shadowBlur = press ? 14 : 7;
          ctx.shadowOffsetY = press ? 2 : 5;
          ctx.fillStyle = gradient;
          roundedRect(ctx, key.x, key.y, key.w, key.h, 8);
          ctx.fill();
          ctx.strokeStyle = 'rgba(44, 30, 22, 0.24)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.globalAlpha = 0.55;
          ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
          roundedRect(ctx, key.x + key.w * 0.12, key.y + key.h * 0.06, key.w * 0.2, key.h * 0.72, key.w * 0.08);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.fillStyle = press ? 'rgba(141, 82, 36, 0.28)' : 'rgba(74, 44, 25, 0.18)';
          roundedRect(ctx, key.x + 1, key.y + key.h - 18, key.w - 2, 18, 5);
          ctx.fill();
          ctx.restore();
        }

        pianoBlack.forEach((black, index) => {
          const press = state.pianoPress.get(`b${index}`)?.amount || 0;
          const keyW = whiteW * 0.58;
          const keyX = x + (black.after + 1) * whiteW - keyW / 2;
          const key = {
            ...black,
            id: `b${index}`,
            x: keyX,
            y: keyY + press * 6,
            w: keyW,
            h: keyH * 0.62,
            black: true
          };
          state.layout.piano.blackKeys.push(key);
          const gradient = ctx.createLinearGradient(0, key.y, 0, key.y + key.h);
          gradient.addColorStop(0, press ? '#4a3029' : '#1e1815');
          gradient.addColorStop(0.5, press ? '#211410' : '#0f0d0c');
          gradient.addColorStop(1, press ? '#0b0908' : '#050505');
          ctx.save();
          ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
          ctx.shadowBlur = 12;
          ctx.shadowOffsetY = 8;
          ctx.fillStyle = gradient;
          roundedRect(ctx, key.x, key.y, key.w, key.h, 7);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = 'rgba(255,255,255,0.14)';
          ctx.stroke();
          ctx.fillStyle = 'rgba(255, 248, 236, 0.18)';
          roundedRect(ctx, key.x + key.w * 0.18, key.y + key.h * 0.08, key.w * 0.18, key.h * 0.68, 4);
          ctx.fill();
          ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
          roundedRect(ctx, key.x + 2, key.y + key.h - 16, key.w - 4, 16, 4);
          ctx.fill();
          ctx.restore();
        });

        if (h > 560) {
          ctx.save();
          ctx.strokeStyle = 'rgba(231, 190, 112, 0.72)';
          ctx.lineWidth = Math.max(3, boardH * 0.012);
          ctx.lineCap = 'round';
          for (let i = -1; i <= 1; i += 1) {
            const px = x + boardW * (0.5 + i * 0.055);
            ctx.beginPath();
            ctx.moveTo(px, y + boardH + 16);
            ctx.quadraticCurveTo(px + i * 7, y + boardH + 44, px - i * 4, y + boardH + 66);
            ctx.stroke();
            ctx.fillStyle = '#d8a64d';
            ctx.beginPath();
            ctx.ellipse(px - i * 4, y + boardH + 70, boardH * 0.025, boardH * 0.012, -0.18, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function drawDrums(now) {
        const w = state.width;
        const h = state.height;
        const centerX = w / 2;
        const centerY = h * 0.56;
        const scale = Math.min(w / 900, h / 560);
        const r = clamp(72 * scale, 44, 92);
        const drums = [
          { id: 'crash', kind: 'crash', x: centerX - r * 2.8, y: centerY - r * 1.55, r: r * 0.86, color: '#d99b24', label: '치다' },
          { id: 'hat', kind: 'hihat', x: centerX + r * 2.75, y: centerY - r * 1.45, r: r * 0.72, color: '#e7c95d', label: '치다' },
          { id: 'snare', kind: 'snare', x: centerX - r * 1.45, y: centerY, r, color: '#d7483f', label: '치다' },
          { id: 'tom', kind: 'tom', x: centerX + r * 1.35, y: centerY - r * 0.08, r: r * 0.98, color: '#238757', label: '치다' },
          { id: 'kick', kind: 'kick', x: centerX, y: centerY + r * 1.25, r: r * 1.32, color: '#6551b4', label: '치다' }
        ];
        state.layout.drums = drums;

        function drawChromeLine(x1, y1, x2, y2, width = r * 0.045) {
          ctx.save();
          ctx.lineCap = 'round';
          ctx.lineWidth = width;
          ctx.strokeStyle = 'rgba(255, 248, 236, 0.28)';
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.lineWidth = width * 0.42;
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.42)';
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.restore();
        }

        function drawFloorShadow(x, y, rx, ry, alpha = 0.2) {
          ctx.save();
          const shadow = ctx.createRadialGradient(x, y, 0, x, y, rx);
          shadow.addColorStop(0, `rgba(0, 0, 0, ${alpha})`);
          shadow.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = shadow;
          ctx.beginPath();
          ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawCymbal(drum) {
          const hit = state.drumHits.get(drum.id) || 0;
          const wobble = Math.sin(now * 0.034) * hit * drum.r * 0.05;
          const tilt = drum.kind === 'crash' ? -0.08 : 0.05;
          if (hit < 0.08) {
            drawTouchableGlow(drum.x, drum.y, drum.r * 0.82, '#ffe28a', now, 0.13);
          }
          drawChromeLine(drum.x, drum.y + drum.r * 0.28, drum.x, h * 0.88, r * 0.052);
          drawChromeLine(drum.x, drum.y + drum.r * 0.52, drum.x - drum.r * 0.38, h * 0.9, r * 0.034);
          drawChromeLine(drum.x, drum.y + drum.r * 0.52, drum.x + drum.r * 0.38, h * 0.9, r * 0.034);

          ctx.save();
          ctx.translate(drum.x, drum.y + wobble);
          ctx.rotate(tilt);
          ctx.scale(1 + hit * 0.05, 1 - hit * 0.08);
          ctx.shadowColor = 'rgba(0, 0, 0, 0.42)';
          ctx.shadowBlur = 22;
          ctx.shadowOffsetY = 10;
          const metal = ctx.createRadialGradient(-drum.r * 0.22, -drum.r * 0.12, 2, 0, 0, drum.r);
          metal.addColorStop(0, '#fff7b8');
          metal.addColorStop(0.22, '#f1c545');
          metal.addColorStop(0.64, drum.color);
          metal.addColorStop(1, '#7e4a08');
          ctx.fillStyle = metal;
          ctx.beginPath();
          ctx.ellipse(0, 0, drum.r, drum.r * 0.28, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          for (let i = 1; i <= 4; i += 1) {
            ctx.strokeStyle = `rgba(255, 248, 236, ${0.26 - i * 0.035})`;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.ellipse(0, 0, drum.r * (0.26 + i * 0.14), drum.r * (0.07 + i * 0.04), 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          const bell = ctx.createRadialGradient(-drum.r * 0.05, -drum.r * 0.06, 2, 0, 0, drum.r * 0.28);
          bell.addColorStop(0, '#fff8d8');
          bell.addColorStop(0.55, '#df9c19');
          bell.addColorStop(1, '#8a5209');
          ctx.fillStyle = bell;
          ctx.beginPath();
          ctx.ellipse(0, -drum.r * 0.02, drum.r * 0.24, drum.r * 0.12, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255, 248, 236, 0.64)';
          ctx.lineWidth = Math.max(2, drum.r * 0.035);
          ctx.stroke();
          ctx.restore();
        }

        function drawDrumShell(drum) {
          const hit = state.drumHits.get(drum.id) || 0;
          const squash = 1 - hit * 0.1;
          const isKick = drum.kind === 'kick';
          const headH = isKick ? drum.r * 1.02 : drum.r * 0.68;
          const shellH = isKick ? drum.r * 1.56 : drum.r * 1.08;
          const shellY = isKick ? drum.y + drum.r * 0.02 : drum.y + drum.r * 0.22;
          const shellColor = drum.color;
          if (hit < 0.08) {
            drawTouchableGlow(drum.x, drum.y, drum.r * (isKick ? 0.82 : 0.92), shellColor, now, 0.14);
          }
          drawFloorShadow(drum.x, drum.y + shellH * 0.54, drum.r * 1.45, drum.r * 0.34, isKick ? 0.28 : 0.18);

          ctx.save();
          ctx.translate(drum.x, drum.y);
          ctx.scale(1 + hit * 0.035, squash);
          ctx.shadowColor = 'rgba(0, 0, 0, 0.42)';
          ctx.shadowBlur = 28;
          ctx.shadowOffsetY = 16;

          const shell = ctx.createLinearGradient(-drum.r, -drum.r * 0.35, drum.r, shellH * 0.58);
          shell.addColorStop(0, '#2a1614');
          shell.addColorStop(0.18, shellColor);
          shell.addColorStop(0.54, '#241310');
          shell.addColorStop(1, '#120c0a');
          ctx.fillStyle = shell;
          ctx.beginPath();
          ctx.ellipse(0, isKick ? 0 : drum.r * 0.2, drum.r * (isKick ? 0.98 : 0.96), shellH * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowBlur = 0;
          const rim = ctx.createRadialGradient(-drum.r * 0.24, -headH * 0.2, 2, 0, 0, drum.r * 1.1);
          rim.addColorStop(0, '#fff8ec');
          rim.addColorStop(0.18, '#d6c8b6');
          rim.addColorStop(0.38, shellColor);
          rim.addColorStop(1, '#16100f');
          ctx.fillStyle = rim;
          ctx.beginPath();
          ctx.ellipse(0, 0, drum.r, headH * 0.55, 0, 0, Math.PI * 2);
          ctx.fill();

          const head = ctx.createRadialGradient(-drum.r * 0.22, -headH * 0.18, 2, 0, 0, drum.r * 0.94);
          head.addColorStop(0, hit > 0.08 ? '#fff6d5' : '#fffdf7');
          head.addColorStop(0.58, '#d8d1c4');
          head.addColorStop(1, '#8b8175');
          ctx.fillStyle = head;
          ctx.beginPath();
          ctx.ellipse(0, 0, drum.r * 0.76, headH * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();

          if (isKick) {
            ctx.fillStyle = 'rgba(18, 12, 10, 0.82)';
            ctx.beginPath();
            ctx.ellipse(drum.r * 0.27, drum.r * 0.1, drum.r * 0.2, drum.r * 0.27, 0, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.strokeStyle = 'rgba(255, 248, 236, 0.76)';
          ctx.lineWidth = Math.max(3, drum.r * 0.055);
          ctx.beginPath();
          ctx.ellipse(0, 0, drum.r, headH * 0.55, 0, 0, Math.PI * 2);
          ctx.stroke();

          ctx.strokeStyle = 'rgba(255, 248, 236, 0.34)';
          ctx.lineWidth = Math.max(1.4, drum.r * 0.018);
          for (let i = 0; i < 8; i += 1) {
            const angle = (Math.PI * 2 * i) / 8;
            const lugX = Math.cos(angle) * drum.r * 0.86;
            const lugY = Math.sin(angle) * headH * 0.45;
            ctx.beginPath();
            ctx.moveTo(lugX, lugY);
            ctx.lineTo(lugX * 0.88, lugY + (isKick ? drum.r * 0.28 : drum.r * 0.18));
            ctx.stroke();
            ctx.fillStyle = '#e7d8bd';
            roundedRect(ctx, lugX - drum.r * 0.045, lugY - drum.r * 0.035, drum.r * 0.09, drum.r * 0.07, drum.r * 0.02);
            ctx.fill();
          }

          if (hit > 0.12) {
            ctx.globalAlpha = Math.min(0.75, hit);
            ctx.strokeStyle = '#fff1a8';
            ctx.lineWidth = Math.max(2, drum.r * 0.04);
            ctx.beginPath();
            ctx.ellipse(0, 0, drum.r * (0.45 + hit * 0.28), headH * (0.22 + hit * 0.16), 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();

          if (!isKick) {
            drawChromeLine(drum.x - drum.r * 0.35, drum.y + drum.r * 0.66, drum.x - drum.r * 0.68, h * 0.9, r * 0.03);
            drawChromeLine(drum.x + drum.r * 0.35, drum.y + drum.r * 0.66, drum.x + drum.r * 0.68, h * 0.9, r * 0.03);
          } else {
            drawChromeLine(drum.x - drum.r * 0.62, drum.y + drum.r * 0.48, drum.x - drum.r * 1.02, h * 0.88, r * 0.035);
            drawChromeLine(drum.x + drum.r * 0.62, drum.y + drum.r * 0.48, drum.x + drum.r * 1.02, h * 0.88, r * 0.035);
          }
        }

        drawFloorShadow(centerX, h * 0.86, r * 4.2, r * 0.52, 0.18);
        drums.filter((drum) => drum.kind !== 'crash' && drum.kind !== 'hihat').forEach(drawDrumShell);
        drums.filter((drum) => drum.kind === 'crash' || drum.kind === 'hihat').forEach(drawCymbal);
        setFunObjectLayout('drums');
        drawFunObjects(now);

      }

      function drawGuitar(now) {
        const w = state.width;
        const h = state.height;
        const centerX = w * 0.46;
        const centerY = h * 0.55;
        const bodyW = Math.min(w * 0.46, h * 0.64, 430);
        const bodyH = bodyW * 0.82;
        const neckW = Math.min(w * 0.44, 410);
        const neckH = bodyH * 0.24;
        const neckX = centerX + bodyW * 0.22;
        const neckY = centerY - neckH / 2;
        const stringStart = centerX - bodyW * 0.28;
        const stringEnd = Math.min(w - 48, neckX + neckW);
        const stringGap = bodyH * 0.072;
        const stringBaseY = centerY - stringGap * 2.5;
        const strings = guitarStrings.map((string, index) => ({
          ...string,
          index,
          y: stringBaseY + index * stringGap
        }));
        state.layout.guitar = { stringStart, stringEnd, strings, stringGap };

        const headW = Math.max(48, neckH * 0.9);
        const headX = Math.min(w - headW - 18, stringEnd - headW * 0.38);
        const bodyPath = () => {
          ctx.beginPath();
          ctx.moveTo(centerX - bodyW * 0.42, centerY - bodyH * 0.18);
          ctx.bezierCurveTo(centerX - bodyW * 0.53, centerY - bodyH * 0.48, centerX - bodyW * 0.16, centerY - bodyH * 0.58, centerX + bodyW * 0.02, centerY - bodyH * 0.34);
          ctx.bezierCurveTo(centerX + bodyW * 0.14, centerY - bodyH * 0.2, centerX + bodyW * 0.18, centerY - bodyH * 0.18, centerX + bodyW * 0.31, centerY - bodyH * 0.28);
          ctx.bezierCurveTo(centerX + bodyW * 0.62, centerY - bodyH * 0.5, centerX + bodyW * 0.66, centerY + bodyH * 0.08, centerX + bodyW * 0.36, centerY + bodyH * 0.34);
          ctx.bezierCurveTo(centerX + bodyW * 0.18, centerY + bodyH * 0.52, centerX - bodyW * 0.24, centerY + bodyH * 0.58, centerX - bodyW * 0.42, centerY + bodyH * 0.28);
          ctx.bezierCurveTo(centerX - bodyW * 0.56, centerY + bodyH * 0.06, centerX - bodyW * 0.52, centerY - bodyH * 0.02, centerX - bodyW * 0.42, centerY - bodyH * 0.18);
          ctx.closePath();
        };

        drawSoftEllipseShadow(centerX + bodyW * 0.12, centerY + bodyH * 0.5, bodyW * 0.72, bodyH * 0.18, 0.24);

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.42)';
        ctx.shadowBlur = 30;
        ctx.shadowOffsetY = 18;
        const neckGradient = ctx.createLinearGradient(neckX, neckY, neckX, neckY + neckH);
        neckGradient.addColorStop(0, '#8a4a28');
        neckGradient.addColorStop(0.48, '#512617');
        neckGradient.addColorStop(1, '#24110c');
        ctx.fillStyle = neckGradient;
        roundedRect(ctx, neckX, neckY, neckW, neckH, 9);
        ctx.fill();
        ctx.restore();

        drawWoodGrainRect(neckX, neckY, neckW, neckH, 9, 0.28);

        ctx.save();
        ctx.fillStyle = '#3b1e14';
        roundedRect(ctx, headX + headW * 0.14, neckY - neckH * 0.2, headW, neckH * 1.4, 12);
        ctx.fill();
        drawWoodGrainRect(headX + headW * 0.14, neckY - neckH * 0.2, headW, neckH * 1.4, 12, 0.22);
        for (let i = 0; i < 3; i += 1) {
          const pegY = neckY + neckH * (0.02 + i * 0.44);
          [-1, 1].forEach((side) => {
            ctx.strokeStyle = '#d8c7a4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(headX + headW * (side < 0 ? 0.18 : 1.08), pegY);
            ctx.lineTo(headX + headW * (side < 0 ? -0.1 : 1.36), pegY + side * 2);
            ctx.stroke();
            ctx.fillStyle = '#f0d083';
            ctx.beginPath();
            ctx.ellipse(headX + headW * (side < 0 ? -0.14 : 1.4), pegY + side * 2, headW * 0.1, headW * 0.06, 0, 0, Math.PI * 2);
            ctx.fill();
          });
        }
        ctx.restore();

        for (let i = 1; i <= 8; i += 1) {
          const fretX = neckX + i * (neckW / 9);
          ctx.strokeStyle = 'rgba(255,248,236,0.34)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(fretX, neckY + 4);
          ctx.lineTo(fretX, neckY + neckH - 4);
          ctx.stroke();
        }
        [3, 5, 7].forEach((fret) => {
          ctx.fillStyle = 'rgba(255, 241, 168, 0.46)';
          ctx.beginPath();
          ctx.arc(neckX + (fret + 0.5) * (neckW / 9), centerY, Math.max(3, neckH * 0.055), 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.42)';
        ctx.shadowBlur = 34;
        ctx.shadowOffsetY = 18;
        const bodyGradient = ctx.createRadialGradient(centerX - bodyW * 0.2, centerY - bodyH * 0.22, 8, centerX, centerY, bodyW * 0.72);
        bodyGradient.addColorStop(0, '#ffbf68');
        bodyGradient.addColorStop(0.38, '#c8652e');
        bodyGradient.addColorStop(0.72, '#6f321d');
        bodyGradient.addColorStop(1, '#2b120f');
        ctx.fillStyle = bodyGradient;
        bodyPath();
        ctx.fill();
        ctx.restore();

        ctx.save();
        bodyPath();
        ctx.clip();
        drawWoodGrainOval(centerX - bodyW * 0.08, centerY + bodyH * 0.03, bodyW * 0.58, bodyH * 0.45, -0.05, 0.34);
        ctx.globalAlpha = 0.32;
        ctx.fillStyle = '#fff2c2';
        ctx.beginPath();
        ctx.ellipse(centerX - bodyW * 0.18, centerY - bodyH * 0.25, bodyW * 0.2, bodyH * 0.07, -0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = 'rgba(255, 231, 175, 0.58)';
        ctx.lineWidth = Math.max(3, bodyW * 0.018);
        bodyPath();
        ctx.stroke();
        ctx.strokeStyle = 'rgba(54, 23, 14, 0.54)';
        ctx.lineWidth = Math.max(1.5, bodyW * 0.008);
        bodyPath();
        ctx.stroke();
        ctx.restore();

        ctx.beginPath();
        ctx.arc(centerX, centerY, bodyH * 0.13, 0, Math.PI * 2);
        ctx.fillStyle = '#251512';
        ctx.fill();
        for (let i = 0; i < 3; i += 1) {
          ctx.strokeStyle = i % 2 ? 'rgba(95, 43, 22, 0.78)' : 'rgba(255,248,236,0.52)';
          ctx.lineWidth = Math.max(2, bodyH * (0.012 - i * 0.002));
          ctx.beginPath();
          ctx.arc(centerX, centerY, bodyH * (0.15 + i * 0.025), 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.save();
        ctx.fillStyle = 'rgba(54, 21, 14, 0.58)';
        ctx.beginPath();
        ctx.moveTo(centerX + bodyW * 0.08, centerY + bodyH * 0.06);
        ctx.bezierCurveTo(centerX + bodyW * 0.3, centerY + bodyH * 0.06, centerX + bodyW * 0.32, centerY + bodyH * 0.26, centerX + bodyW * 0.12, centerY + bodyH * 0.3);
        ctx.bezierCurveTo(centerX + bodyW * 0.02, centerY + bodyH * 0.22, centerX + bodyW * 0.02, centerY + bodyH * 0.12, centerX + bodyW * 0.08, centerY + bodyH * 0.06);
        ctx.fill();
        ctx.restore();

        ctx.save();
        const bridgeW = bodyW * 0.24;
        const bridgeH = bodyH * 0.1;
        ctx.fillStyle = '#3b1a12';
        roundedRect(ctx, stringStart - bridgeW * 0.42, centerY - bridgeH * 0.5, bridgeW, bridgeH, 8);
        ctx.fill();
        ctx.fillStyle = '#f2d8a4';
        roundedRect(ctx, stringStart - bridgeW * 0.38, centerY - bridgeH * 0.16, bridgeW * 0.82, bridgeH * 0.22, 5);
        ctx.fill();
        strings.forEach((string) => {
          ctx.fillStyle = '#d8c7a4';
          ctx.beginPath();
          ctx.arc(stringStart - bridgeW * 0.22, string.y, Math.max(2, stringGap * 0.12), 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();

        const activeGuitarGrabs = Array.from(state.guitarGrabs.values());
        if (!activeGuitarGrabs.length) {
          ctx.save();
          ctx.globalAlpha = 0.16 + Math.sin(now * 0.004) * 0.04;
          ctx.strokeStyle = '#8de7dd';
          ctx.lineWidth = 8;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(stringStart, stringBaseY - stringGap * 0.45);
          ctx.lineTo(stringStart, stringBaseY + stringGap * 5.45);
          ctx.stroke();
          ctx.restore();
        }
        strings.forEach((string, index) => {
          const impulse = state.stringImpulse.get(`g${index}`) || 0;
          const grab = activeGuitarGrabs.find((item) => item.stringIndex === index);
          ctx.beginPath();
          ctx.lineWidth = Math.max(1.2, 3.6 - index * 0.28) + (grab ? 1.4 : 0);
          ctx.strokeStyle = grab ? '#fff1a8' : index < 3 ? '#efe3c4' : '#b7d8d4';
          const segments = 32;
          for (let i = 0; i <= segments; i += 1) {
            const t = i / segments;
            const x = lerp(stringStart, stringEnd, t);
            const wave = Math.sin(t * Math.PI * 8 + now * 0.032) * impulse * 8;
            let y = string.y + wave;
            if (grab) {
              const reach = Math.max(bodyW * 0.12, Math.abs(stringEnd - stringStart) * 0.22);
              const influence = Math.max(0, 1 - Math.abs(x - grab.currentX) / reach);
              y += (grab.currentY - string.y) * influence * influence;
            }
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.shadowColor = impulse > 0.05 || grab ? 'rgba(255, 241, 168, 0.5)' : 'transparent';
          ctx.shadowBlur = impulse > 0.05 || grab ? 10 : 0;
          ctx.stroke();
          ctx.shadowBlur = 0;
        });

        activeGuitarGrabs.forEach((grab) => {
          ctx.save();
          ctx.shadowColor = 'rgba(255, 241, 168, 0.7)';
          ctx.shadowBlur = 18;
          ctx.fillStyle = '#fff1a8';
          ctx.strokeStyle = '#3b2318';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(grab.currentX, grab.currentY, Math.max(9, stringGap * 0.45), 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        });

        setFunObjectLayout('guitar');
        drawFunObjects(now);
      }

      function drawViolinBowTool(now) {
        const bow = getViolinBowTool();
        const ends = violinBowEnds(bow);
        const contact = violinBowContact(bow);

        drawTouchableGlow(
          bow.dragging || bow.active ? contact.x : bow.x,
          bow.dragging || bow.active ? contact.y : bow.y,
          bow.dragging || bow.active ? bow.thickness * 2.7 : bow.thickness * 3.4,
          bow.active ? '#fff4c7' : '#b9a7ff',
          now,
          bow.dragging || bow.active ? 0.35 : 0.24
        );

        ctx.save();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const normalX = -Math.sin(bow.angle);
        const normalY = Math.cos(bow.angle);
        const alongX = Math.cos(bow.angle);
        const alongY = Math.sin(bow.angle);

        ctx.shadowColor = bow.active ? 'rgba(255, 244, 199, 0.85)' : 'rgba(185, 167, 255, 0.42)';
        ctx.shadowBlur = bow.active ? 18 : 10;
        ctx.strokeStyle = '#5b2d1f';
        ctx.lineWidth = bow.thickness * 0.72;
        ctx.beginPath();
        ctx.moveTo(ends.x1 - normalX * bow.thickness * 0.95, ends.y1 - normalY * bow.thickness * 0.95);
        ctx.quadraticCurveTo(bow.x - normalX * bow.thickness * 1.4, bow.y - normalY * bow.thickness * 1.4, ends.x2 - normalX * bow.thickness * 0.95, ends.y2 - normalY * bow.thickness * 0.95);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255, 198, 116, 0.55)';
        ctx.lineWidth = Math.max(1.4, bow.thickness * 0.16);
        ctx.beginPath();
        ctx.moveTo(ends.x1 - normalX * bow.thickness * 1.15, ends.y1 - normalY * bow.thickness * 1.15);
        ctx.quadraticCurveTo(bow.x - normalX * bow.thickness * 1.58, bow.y - normalY * bow.thickness * 1.58, ends.x2 - normalX * bow.thickness * 1.15, ends.y2 - normalY * bow.thickness * 1.15);
        ctx.stroke();

        ctx.shadowColor = bow.active ? 'rgba(255, 244, 199, 0.85)' : 'rgba(185, 167, 255, 0.42)';
        ctx.shadowBlur = bow.active ? 18 : 8;
        ctx.strokeStyle = bow.active ? 'rgba(255, 248, 236, 0.98)' : 'rgba(255, 248, 236, 0.86)';
        ctx.lineWidth = 4 + bow.pressure * 2.4;
        ctx.beginPath();
        ctx.moveTo(ends.x1 + normalX * bow.thickness * 0.55, ends.y1 + normalY * bow.thickness * 0.55);
        ctx.lineTo(ends.x2 + normalX * bow.thickness * 0.55, ends.y2 + normalY * bow.thickness * 0.55);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255, 244, 199, 0.65)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ends.x1 + normalX * bow.thickness * 1.05, ends.y1 + normalY * bow.thickness * 1.05);
        ctx.lineTo(ends.x2 + normalX * bow.thickness * 1.05, ends.y2 + normalY * bow.thickness * 1.05);
        ctx.stroke();

        ctx.fillStyle = '#26120d';
        roundedRect(
          ctx,
          ends.x1 + alongX * bow.thickness * 0.4 - bow.thickness * 0.65,
          ends.y1 + alongY * bow.thickness * 0.4 - bow.thickness * 0.65,
          bow.thickness * 1.35,
          bow.thickness * 1.35,
          bow.thickness * 0.28
        );
        ctx.fill();
        ctx.fillStyle = '#d7b06a';
        ctx.beginPath();
        ctx.arc(ends.x1 + alongX * bow.thickness * 2.5, ends.y1 + alongY * bow.thickness * 2.5, bow.thickness * 0.42, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = bow.active ? '#fff1a8' : '#b9a7ff';
        ctx.beginPath();
        ctx.arc(contact.x, contact.y, bow.thickness * 0.72, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawViolin(now) {
        const w = state.width;
        const h = state.height;
        const centerX = w / 2;
        const centerY = h * 0.59;
        const bodyH = Math.min(h * 0.56, w * 0.58, 400);
        const bodyW = bodyH * 0.48;
        const topY = centerY - bodyH * 0.58;
        const bottomY = centerY + bodyH * 0.54;
        const stringGap = bodyW * 0.12;
        const strings = violinStrings.map((string, index) => ({
          ...string,
          index,
          x: centerX + (index - 1.5) * stringGap
        }));
        state.layout.violin = {
          strings,
          stringGap,
          bridgeTop: topY + bodyH * 0.18,
          bridgeBottom: bottomY - bodyH * 0.1
        };

        const bodyPath = () => {
          ctx.beginPath();
          ctx.moveTo(centerX, topY + bodyH * 0.05);
          ctx.bezierCurveTo(centerX - bodyW * 0.52, topY + bodyH * 0.06, centerX - bodyW * 0.5, centerY - bodyH * 0.22, centerX - bodyW * 0.22, centerY - bodyH * 0.14);
          ctx.bezierCurveTo(centerX - bodyW * 0.48, centerY - bodyH * 0.02, centerX - bodyW * 0.58, centerY + bodyH * 0.4, centerX, bottomY);
          ctx.bezierCurveTo(centerX + bodyW * 0.58, centerY + bodyH * 0.4, centerX + bodyW * 0.48, centerY - bodyH * 0.02, centerX + bodyW * 0.22, centerY - bodyH * 0.14);
          ctx.bezierCurveTo(centerX + bodyW * 0.5, centerY - bodyH * 0.22, centerX + bodyW * 0.52, topY + bodyH * 0.06, centerX, topY + bodyH * 0.05);
          ctx.closePath();
        };

        drawSoftEllipseShadow(centerX, bottomY + bodyH * 0.04, bodyW * 0.84, bodyH * 0.12, 0.25);

        ctx.save();
        const neckGradient = ctx.createLinearGradient(centerX - bodyW * 0.1, topY - bodyH * 0.34, centerX + bodyW * 0.1, topY + bodyH * 0.2);
        neckGradient.addColorStop(0, '#5f2f1d');
        neckGradient.addColorStop(0.58, '#341811');
        neckGradient.addColorStop(1, '#160b08');
        ctx.fillStyle = neckGradient;
        roundedRect(ctx, centerX - bodyW * 0.09, topY - bodyH * 0.34, bodyW * 0.18, bodyH * 0.56, 12);
        ctx.fill();
        ctx.fillStyle = '#21100c';
        roundedRect(ctx, centerX - bodyW * 0.18, topY - bodyH * 0.41, bodyW * 0.36, bodyH * 0.12, 16);
        ctx.fill();
        for (let i = 0; i < 4; i += 1) {
          const side = i % 2 ? 1 : -1;
          const pegY = topY - bodyH * (0.36 - Math.floor(i / 2) * 0.055);
          ctx.strokeStyle = '#d6b16b';
          ctx.lineWidth = Math.max(2, bodyW * 0.018);
          ctx.beginPath();
          ctx.moveTo(centerX + side * bodyW * 0.13, pegY);
          ctx.lineTo(centerX + side * bodyW * 0.29, pegY - bodyH * 0.015);
          ctx.stroke();
          ctx.fillStyle = '#4a2216';
          ctx.beginPath();
          ctx.ellipse(centerX + side * bodyW * 0.32, pegY - bodyH * 0.015, bodyW * 0.065, bodyW * 0.035, 0.15 * side, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.44)';
        ctx.shadowBlur = 34;
        ctx.shadowOffsetY = 20;
        const bodyGradient = ctx.createRadialGradient(centerX - bodyW * 0.17, centerY - bodyH * 0.22, 6, centerX, centerY, bodyW * 0.95);
        bodyGradient.addColorStop(0, '#f3a86c');
        bodyGradient.addColorStop(0.42, '#a84b2d');
        bodyGradient.addColorStop(0.74, '#5b2418');
        bodyGradient.addColorStop(1, '#24100d');
        ctx.fillStyle = bodyGradient;
        bodyPath();
        ctx.fill();
        ctx.restore();

        ctx.save();
        bodyPath();
        ctx.clip();
        drawWoodGrainOval(centerX, centerY + bodyH * 0.04, bodyW * 0.48, bodyH * 0.54, Math.PI * 0.5, 0.36);
        ctx.globalAlpha = 0.34;
        ctx.strokeStyle = '#fff1a8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(centerX, topY + bodyH * 0.08);
        ctx.lineTo(centerX, bottomY - bodyH * 0.05);
        ctx.stroke();
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = '#fff8dc';
        ctx.beginPath();
        ctx.ellipse(centerX - bodyW * 0.16, centerY - bodyH * 0.2, bodyW * 0.12, bodyH * 0.24, -0.28, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = 'rgba(255, 224, 163, 0.58)';
        ctx.lineWidth = Math.max(3, bodyW * 0.022);
        bodyPath();
        ctx.stroke();
        ctx.strokeStyle = 'rgba(42, 16, 11, 0.72)';
        ctx.lineWidth = Math.max(1.4, bodyW * 0.01);
        bodyPath();
        ctx.stroke();
        ctx.restore();

        function drawFHole(side) {
          ctx.save();
          ctx.translate(centerX + side * bodyW * 0.25, centerY + bodyH * 0.01);
          ctx.scale(side, 1);
          ctx.strokeStyle = 'rgba(37, 15, 10, 0.82)';
          ctx.lineWidth = Math.max(3, bodyW * 0.028);
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(0, -bodyH * 0.13);
          ctx.bezierCurveTo(-bodyW * 0.12, -bodyH * 0.08, bodyW * 0.12, bodyH * 0.02, -bodyW * 0.04, bodyH * 0.13);
          ctx.stroke();
          ctx.fillStyle = 'rgba(33, 13, 9, 0.92)';
          ctx.beginPath();
          ctx.ellipse(-bodyW * 0.045, -bodyH * 0.155, bodyW * 0.035, bodyH * 0.018, -0.35, 0, Math.PI * 2);
          ctx.ellipse(bodyW * 0.035, bodyH * 0.155, bodyW * 0.035, bodyH * 0.018, -0.35, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        drawFHole(-1);
        drawFHole(1);

        ctx.save();
        const bridgeY = centerY + bodyH * 0.02;
        const bridgeW = bodyW * 0.5;
        const bridgeH = bodyH * 0.13;
        const bridgeGradient = ctx.createLinearGradient(centerX, bridgeY - bridgeH, centerX, bridgeY + bridgeH);
        bridgeGradient.addColorStop(0, '#ffe0ad');
        bridgeGradient.addColorStop(0.58, '#c98d4f');
        bridgeGradient.addColorStop(1, '#7b3a20');
        ctx.fillStyle = bridgeGradient;
        ctx.beginPath();
        ctx.moveTo(centerX - bridgeW * 0.5, bridgeY + bridgeH * 0.26);
        ctx.quadraticCurveTo(centerX, bridgeY - bridgeH * 0.65, centerX + bridgeW * 0.5, bridgeY + bridgeH * 0.26);
        ctx.lineTo(centerX + bridgeW * 0.38, bridgeY + bridgeH * 0.54);
        ctx.lineTo(centerX - bridgeW * 0.38, bridgeY + bridgeH * 0.54);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(62, 25, 13, 0.44)';
        ctx.beginPath();
        ctx.ellipse(centerX - bridgeW * 0.16, bridgeY + bridgeH * 0.12, bridgeW * 0.07, bridgeH * 0.15, 0, 0, Math.PI * 2);
        ctx.ellipse(centerX + bridgeW * 0.16, bridgeY + bridgeH * 0.12, bridgeW * 0.07, bridgeH * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        const tailY = bottomY - bodyH * 0.12;
        const tailGradient = ctx.createLinearGradient(centerX, tailY - bodyH * 0.08, centerX, tailY + bodyH * 0.14);
        tailGradient.addColorStop(0, '#3a1911');
        tailGradient.addColorStop(1, '#100807');
        ctx.fillStyle = tailGradient;
        ctx.beginPath();
        ctx.moveTo(centerX - bodyW * 0.17, tailY - bodyH * 0.02);
        ctx.quadraticCurveTo(centerX, tailY - bodyH * 0.12, centerX + bodyW * 0.17, tailY - bodyH * 0.02);
        ctx.lineTo(centerX + bodyW * 0.1, tailY + bodyH * 0.17);
        ctx.quadraticCurveTo(centerX, tailY + bodyH * 0.22, centerX - bodyW * 0.1, tailY + bodyH * 0.17);
        ctx.closePath();
        ctx.fill();
        for (let i = 0; i < 4; i += 1) {
          ctx.fillStyle = '#d8b46a';
          ctx.beginPath();
          ctx.arc(centerX + (i - 1.5) * stringGap, tailY + bodyH * 0.045, Math.max(2, stringGap * 0.13), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        strings.forEach((string, index) => {
          const impulse = state.stringImpulse.get(`v${index}`) || 0;
          ctx.beginPath();
          ctx.lineWidth = 2.5 - index * 0.14;
          ctx.strokeStyle = index < 2 ? '#fff5da' : '#d9e7e5';
          ctx.shadowColor = impulse > 0.05 ? 'rgba(255, 241, 168, 0.55)' : 'transparent';
          ctx.shadowBlur = impulse > 0.05 ? 10 : 0;
          const segments = 30;
          for (let i = 0; i <= segments; i += 1) {
            const t = i / segments;
            const y = lerp(topY - bodyH * 0.3, bottomY - bodyH * 0.02, t);
            const wave = Math.sin(t * Math.PI * 10 + now * 0.04) * impulse * 4;
            const x = string.x + wave;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
          ctx.shadowBlur = 0;
        });

        drawViolinBowTool(now);
      }

      function drawTrumpetHead(now) {
        const head = getTrumpetHead();
        if (head.attached) {
          const lock = trumpetLockPoint();
          head.x = lock.x;
          head.y = lock.y;
        }

        if (head.attached) {
          const wind = trumpetWindEmojiPoint(head);
          drawTouchableGlow(wind.x, wind.y, wind.r * 1.08, '#8de7dd', now, 0.18);
          ctx.save();
          ctx.translate(wind.x, wind.y);
          const breathPulse = 1 + Math.sin(now * 0.008) * 0.035;
          ctx.scale(breathPulse, breathPulse);
          ctx.shadowColor = 'rgba(141, 231, 221, 0.55)';
          ctx.shadowBlur = wind.r * 0.42;
          ctx.fillStyle = 'rgba(223, 248, 255, 0.18)';
          ctx.beginPath();
          ctx.arc(0, 0, wind.r * 1.08, 0, Math.PI * 2);
          ctx.fill();
          ctx.font = `${wind.r * 1.58}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🌬️', 0, wind.r * 0.02);
          ctx.shadowBlur = 0;
          ctx.strokeStyle = 'rgba(223, 248, 255, 0.58)';
          ctx.lineWidth = Math.max(1.6, wind.r * 0.045);
          ctx.lineCap = 'round';
          for (let i = 0; i < 3; i += 1) {
            const y = (i - 1) * wind.r * 0.26 + Math.sin(now * 0.005 + i) * 2;
            ctx.beginPath();
            ctx.moveTo(wind.r * 0.42, y);
            ctx.quadraticCurveTo(wind.r * 0.82, y - wind.r * 0.22, wind.r * 1.22, y + wind.r * 0.02);
            ctx.stroke();
          }
          ctx.restore();
        }

        const mouth = trumpetMouthPoint(head);
        const puff = (head.blowing || head.dragging) ? 1 + Math.sin(now * 0.012) * 0.04 : 1;
        const faceEmoji = (head.blowing || head.dragging) ? '😮' : '🙂';

        ctx.save();
        ctx.translate(head.x, head.y);
        ctx.scale(puff, puff);
        ctx.shadowColor = 'rgba(0, 0, 0, 0.42)';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetY = 10;

        ctx.fillStyle = 'rgba(255, 248, 236, 0.24)';
        ctx.beginPath();
        ctx.arc(0, 0, head.r * 1.06, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = head.blowing ? 'rgba(217, 155, 36, 0.6)' : 'rgba(255, 248, 236, 0.28)';
        ctx.shadowBlur = head.blowing ? 18 : 8;
        ctx.shadowOffsetY = 0;
        ctx.font = `${head.r * 1.72}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(faceEmoji, 0, head.r * 0.03);

        ctx.restore();

        if (!head.attached && state.layout.trumpet?.mouthpiece) {
          const mouthpiece = state.layout.trumpet.mouthpiece;
          const proximity = clamp(1 - distance(mouth.x, mouth.y, mouthpiece.x, mouthpiece.y) / (head.r * 4.2), 0, 1);
          ctx.save();
          ctx.globalAlpha = 0.28 + proximity * 0.42;
          ctx.strokeStyle = proximity > 0.55 ? '#fff1a8' : '#dff8ff';
          ctx.lineWidth = 3;
          ctx.setLineDash([8, 7]);
          ctx.beginPath();
          ctx.arc(mouthpiece.x, mouthpiece.y, head.r * (1.12 + Math.sin(now * 0.006) * 0.08), 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawTrumpet(now) {
        const w = state.width;
        const h = state.height;
        const centerX = w * 0.5;
        const centerY = h * 0.52;
        const length = Math.min(w * 0.72, 860);
        const height = Math.min(h * 0.42, w * 0.4, 250);
        const startX = centerX - length * 0.48;
        const bellX = centerX + length * 0.43;
        const tubeY = centerY;
        const valveR = Math.max(22, Math.min(38, length * 0.04));
        const mouthpiece = { x: startX - 24, y: tubeY, r: Math.max(18, height * 0.13) };
        const valves = [0, 1, 2].map((index) => ({
          index,
          x: centerX - length * 0.04 + index * valveR * 1.55,
          y: tubeY - height * 0.24,
          r: valveR
        }));
        state.layout.trumpet = {
          bell: { x: bellX, y: tubeY, r: height * 0.38 },
          valves,
          mouthpiece
        };

        const tubeW = Math.max(15, height * 0.105);
        drawSoftEllipseShadow(centerX + length * 0.06, tubeY + height * 0.34, length * 0.44, height * 0.12, 0.24);

        if (!getTrumpetHead().attached) {
          drawTouchableGlow(mouthpiece.x, mouthpiece.y, mouthpiece.r * 1.05, '#fff1a8', now, 0.13);
        }

        strokeMetalPath(() => {
          ctx.beginPath();
          ctx.moveTo(startX, tubeY);
          ctx.lineTo(bellX - height * 0.22, tubeY);
        }, tubeW, '#d99b24', '#7c3f08', '#fff6bb');

        strokeMetalPath(() => {
          ctx.beginPath();
          ctx.moveTo(startX + length * 0.18, tubeY + height * 0.17);
          ctx.quadraticCurveTo(centerX - length * 0.04, tubeY + height * 0.43, bellX - height * 0.22, tubeY + height * 0.12);
        }, Math.max(10, height * 0.066), '#c47c17', '#6f3608', '#ffe4a0');

        strokeMetalPath(() => {
          ctx.beginPath();
          ctx.moveTo(startX + length * 0.12, tubeY - height * 0.15);
          ctx.quadraticCurveTo(centerX + length * 0.05, tubeY - height * 0.34, centerX + length * 0.22, tubeY - height * 0.06);
        }, Math.max(8, height * 0.046), '#efb63e', '#84500b', '#fff2b5');

        ctx.save();
        ctx.strokeStyle = 'rgba(255, 239, 178, 0.58)';
        ctx.lineWidth = Math.max(3, height * 0.018);
        ctx.lineCap = 'round';
        [
          [startX + length * 0.22, tubeY - height * 0.02, startX + length * 0.22, tubeY + height * 0.17],
          [centerX + length * 0.15, tubeY - height * 0.01, centerX + length * 0.18, tubeY + height * 0.18],
          [bellX - height * 0.33, tubeY - height * 0.01, bellX - height * 0.27, tubeY + height * 0.12]
        ].forEach(([x1, y1, x2, y2]) => {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        });
        ctx.restore();

        const bellGradient = ctx.createRadialGradient(bellX - height * 0.12, tubeY - height * 0.08, 6, bellX, tubeY, height * 0.52);
        bellGradient.addColorStop(0, '#fff1a8');
        bellGradient.addColorStop(0.34, '#e3a32c');
        bellGradient.addColorStop(0.68, '#b66b12');
        bellGradient.addColorStop(1, '#633006');
        ctx.fillStyle = bellGradient;
        ctx.beginPath();
        ctx.ellipse(bellX, tubeY, height * 0.36 + state.trumpetAir * 4, height * 0.45 + state.trumpetAir * 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 246, 187, 0.78)';
        ctx.lineWidth = Math.max(5, height * 0.034);
        ctx.stroke();
        ctx.save();
        ctx.globalAlpha = 0.42;
        ctx.strokeStyle = '#fff8d2';
        ctx.lineWidth = Math.max(2, height * 0.012);
        ctx.beginPath();
        ctx.ellipse(bellX - height * 0.06, tubeY - height * 0.08, height * 0.2, height * 0.28, -0.1, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
        const innerBell = ctx.createRadialGradient(bellX + height * 0.04, tubeY, 4, bellX + height * 0.04, tubeY, height * 0.28);
        innerBell.addColorStop(0, '#110805');
        innerBell.addColorStop(0.62, '#3d1b08');
        innerBell.addColorStop(1, '#b16a13');
        ctx.fillStyle = innerBell;
        ctx.beginPath();
        ctx.ellipse(bellX + height * 0.04, tubeY, height * 0.19, height * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 232, 152, 0.46)';
        ctx.lineWidth = Math.max(2, height * 0.012);
        ctx.stroke();

        const mouthGradient = ctx.createLinearGradient(startX - 38, tubeY - height * 0.12, startX + height * 0.18, tubeY + height * 0.12);
        mouthGradient.addColorStop(0, '#fff1a8');
        mouthGradient.addColorStop(0.38, '#d99b24');
        mouthGradient.addColorStop(1, '#7c3f08');
        ctx.fillStyle = mouthGradient;
        roundedRect(ctx, startX - 38, tubeY - height * 0.105, height * 0.33, height * 0.21, 8);
        ctx.fill();
        ctx.fillStyle = 'rgba(43, 22, 8, 0.72)';
        ctx.beginPath();
        ctx.ellipse(startX - 34, tubeY, height * 0.055, height * 0.105, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 248, 213, 0.58)';
        ctx.lineWidth = 2;
        ctx.stroke();

        valves.forEach((valve) => {
          ctx.save();
          const casingGradient = ctx.createLinearGradient(valve.x - valve.r, tubeY - height * 0.18, valve.x + valve.r, tubeY + height * 0.08);
          casingGradient.addColorStop(0, '#fff0a8');
          casingGradient.addColorStop(0.34, '#d99b24');
          casingGradient.addColorStop(1, '#7b3f08');
          ctx.fillStyle = casingGradient;
          roundedRect(ctx, valve.x - valve.r * 0.46, tubeY - height * 0.24, valve.r * 0.92, height * 0.3, valve.r * 0.18);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255, 246, 199, 0.42)';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        });

        valves.forEach((valve) => {
          const pressed = state.trumpetValves.has(valve.index);
          if (!pressed) {
            drawTouchableGlow(valve.x, valve.y - valve.r * 0.9, valve.r * 0.85, '#fff1a8', now, 0.16);
          }
          ctx.save();
          ctx.translate(valve.x, valve.y + (pressed ? valve.r * 0.18 : 0));
          const valveGradient = ctx.createLinearGradient(-valve.r, -valve.r * 1.5, valve.r, valve.r * 0.5);
          valveGradient.addColorStop(0, pressed ? '#fff8ec' : '#ffe18a');
          valveGradient.addColorStop(0.42, pressed ? '#fff1a8' : '#d99b24');
          valveGradient.addColorStop(1, '#7c3f08');
          ctx.fillStyle = valveGradient;
          roundedRect(ctx, -valve.r * 0.54, -valve.r * 1.48, valve.r * 1.08, valve.r * 1.9, 9);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255, 248, 213, 0.42)';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, -valve.r * 1.44, valve.r * 0.72, 0, Math.PI * 2);
          const capGradient = ctx.createRadialGradient(-valve.r * 0.18, -valve.r * 1.6, 2, 0, -valve.r * 1.44, valve.r * 0.76);
          capGradient.addColorStop(0, '#fff8ec');
          capGradient.addColorStop(0.56, pressed ? '#ffe9a8' : '#c78218');
          capGradient.addColorStop(1, '#74400b');
          ctx.fillStyle = capGradient;
          ctx.fill();
          ctx.strokeStyle = 'rgba(255, 248, 213, 0.52)';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        });

        drawTrumpetHead(now);
        setFunObjectLayout('trumpet');
        drawFunObjects(now);
      }

      function drawEffects(dt) {
        for (const effect of state.effects) {
          const t = clamp(effect.age / effect.duration, 0, 1);
          ctx.save();
          ctx.globalAlpha = 1 - t;
          if (effect.type === 'ring') {
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 5 * (1 - t);
            ctx.beginPath();
            ctx.arc(effect.x, effect.y, effect.radius + t * 72, 0, Math.PI * 2);
            ctx.stroke();
          } else if (effect.type === 'burst' || effect.type === 'spark') {
            for (let i = 0; i < 9; i += 1) {
              const angle = (Math.PI * 2 * i) / 9;
              const length = 16 + t * 46;
              ctx.strokeStyle = i % 2 ? effect.color : '#fff8ec';
              ctx.lineWidth = 2.2;
              ctx.beginPath();
              ctx.moveTo(effect.x + Math.cos(angle) * length * 0.3, effect.y + Math.sin(angle) * length * 0.3);
              ctx.lineTo(effect.x + Math.cos(angle) * length, effect.y + Math.sin(angle) * length);
              ctx.stroke();
            }
          } else if (effect.type === 'pluck') {
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(effect.x, effect.y, 12 + t * 42, -Math.PI * 0.4, Math.PI * 0.4);
            ctx.stroke();
          } else if (effect.type === 'word') {
            const pop = t < 0.22 ? lerp(0.72, 1.18, t / 0.22) : lerp(1.18, 1, (t - 0.22) / 0.78);
            const lift = -34 * t;
            ctx.translate(effect.x, effect.y + lift);
            ctx.scale(pop, pop);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.lineJoin = 'round';
            if (effect.phrase) {
              const prefixSize = effect.size * 0.72;
              const verbSize = effect.size * 1.16;
              const gap = effect.size * 0.12;
              ctx.font = `900 ${prefixSize}px "Noto Sans KR", "Malgun Gothic", sans-serif`;
              const prefixWidth = ctx.measureText(effect.phrase.prefix).width;
              ctx.font = `900 ${verbSize}px "Noto Sans KR", "Malgun Gothic", sans-serif`;
              const verbWidth = ctx.measureText(effect.phrase.verb).width;
              const startX = -(prefixWidth + gap + verbWidth) / 2;

              function drawPhrasePart(text, x, size, fillColor, glowColor, yOffset = 0) {
                ctx.font = `900 ${size}px "Noto Sans KR", "Malgun Gothic", sans-serif`;
                ctx.textAlign = 'left';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.55)';
                ctx.shadowBlur = 14;
                ctx.shadowOffsetY = 7;
                ctx.strokeStyle = 'rgba(255, 248, 236, 0.94)';
                ctx.lineWidth = Math.max(4, size * 0.09);
                ctx.strokeText(text, x, yOffset);
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = size * 0.32;
                ctx.shadowOffsetY = 0;
                ctx.fillStyle = '#15110e';
                ctx.fillText(text, x, yOffset);
                ctx.shadowBlur = 0;
                ctx.fillStyle = fillColor;
                ctx.fillText(text, x, yOffset - size * 0.02);
              }

              drawPhrasePart(effect.phrase.prefix, startX, prefixSize, '#fff1a8', '#fff1a8', effect.size * 0.04);
              drawPhrasePart(effect.phrase.verb, startX + prefixWidth + gap, verbSize, effect.color, effect.color, 0);
            } else {
              ctx.font = `900 ${effect.size}px "Noto Sans KR", "Malgun Gothic", sans-serif`;
              ctx.shadowColor = 'rgba(0, 0, 0, 0.55)';
              ctx.shadowBlur = 18;
              ctx.shadowOffsetY = 8;
              ctx.strokeStyle = 'rgba(255, 248, 236, 0.98)';
              ctx.lineWidth = Math.max(6, effect.size * 0.09);
              ctx.strokeText(effect.text, 0, 0);
              ctx.shadowColor = effect.color;
              ctx.shadowBlur = 24;
              ctx.shadowOffsetY = 0;
              ctx.fillStyle = '#15110e';
              ctx.fillText(effect.text, 0, 0);
              ctx.shadowBlur = 0;
              ctx.fillStyle = effect.color;
              ctx.globalAlpha *= 0.9;
              ctx.fillText(effect.text, 0, -effect.size * 0.02);
            }
          } else if (effect.type === 'rosin') {
            ctx.fillStyle = effect.color;
            for (let i = 0; i < 8; i += 1) {
              const angle = i * 0.82 + effect.x * 0.01;
              ctx.beginPath();
              ctx.arc(effect.x + Math.cos(angle) * t * 36, effect.y + Math.sin(angle) * t * 18, 2.8 * (1 - t), 0, Math.PI * 2);
              ctx.fill();
            }
          } else if (effect.type === 'breath') {
            const sx = effect.x;
            const sy = effect.y;
            const ex = effect.tx;
            const ey = effect.ty;
            const cx = lerp(sx, ex, 0.52);
            const cy = lerp(sy, ey, 0.52) + effect.wobble * Math.sin(t * Math.PI);
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 3.2 * (1 - t) + 0.8;
            ctx.lineCap = 'round';
            for (let i = 0; i < 3; i += 1) {
              const offset = (i - 1) * 8 * (1 - t);
              ctx.beginPath();
              ctx.moveTo(lerp(sx, cx, t * 0.24), sy + offset);
              ctx.quadraticCurveTo(cx, cy + offset, lerp(cx, ex, Math.min(1, t + 0.16)), lerp(cy, ey, Math.min(1, t + 0.16)) + offset);
              ctx.stroke();
            }
            ctx.fillStyle = effect.color;
            ctx.beginPath();
            ctx.arc(lerp(sx, ex, t), lerp(sy, ey, t) + Math.sin(t * 8) * 6, 4.5 * (1 - t), 0, Math.PI * 2);
            ctx.fill();
          } else if (effect.type === 'air') {
            effect.x += (effect.vx || 2.4) * dt * 0.06;
            effect.y += (effect.vy || 0) * dt * 0.06;
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(effect.x - t * 58, effect.y + Math.sin(t * 8) * 10);
            ctx.quadraticCurveTo(effect.x - t * 26, effect.y - 16, effect.x + t * 60, effect.y + Math.sin(t * 11) * 14);
            ctx.stroke();
          } else if (effect.type === 'funGust') {
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 2.6 * (1 - t) + 0.8;
            ctx.lineCap = 'round';
            const strength = effect.strength || 1;
            for (let i = 0; i < 4; i += 1) {
              const y = effect.y + (i - 1.5) * 9 + Math.sin(t * 10 + i) * 8;
              const startX = effect.x - t * 18;
              const endX = effect.x + (48 + i * 12) * t * strength;
              ctx.beginPath();
              ctx.moveTo(startX, y);
              ctx.quadraticCurveTo(effect.x + 18 * t, y - 18 * Math.sin(t * Math.PI + i), endX, y + Math.sin(t * 12 + i) * 10);
              ctx.stroke();
            }
          } else if (effect.type === 'spinSpark') {
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 2.2 * (1 - t);
            ctx.lineCap = 'round';
            for (let i = 0; i < 8; i += 1) {
              const angle = i * Math.PI * 0.25 + t * Math.PI * 1.8;
              const radius = (effect.radius || 28) * (0.36 + t * 0.75);
              ctx.beginPath();
              ctx.moveTo(effect.x + Math.cos(angle) * radius * 0.75, effect.y + Math.sin(angle) * radius * 0.75);
              ctx.lineTo(effect.x + Math.cos(angle) * radius, effect.y + Math.sin(angle) * radius);
              ctx.stroke();
            }
          } else if (effect.type === 'funBubbles') {
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 2;
            for (let i = 0; i < 7; i += 1) {
              const drift = Math.sin(i * 1.7 + t * 5) * (effect.radius || 28) * 0.34;
              const x = effect.x + drift + (i - 3) * 4;
              const y = effect.y - t * (46 + i * 9) - i * 2;
              const r = (effect.radius || 28) * (0.12 + (i % 3) * 0.035) * (1 - t * 0.35);
              ctx.beginPath();
              ctx.arc(x, y, r, 0, Math.PI * 2);
              ctx.stroke();
              ctx.fillStyle = 'rgba(223, 248, 255, 0.12)';
              ctx.fill();
            }
          } else if (effect.type === 'funFeather') {
            ctx.save();
            ctx.translate(effect.x + t * 52, effect.y - Math.sin(t * Math.PI) * 34);
            ctx.rotate(-0.45 + t * 1.1);
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.65)';
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.moveTo(-(effect.radius || 26) * 0.45, (effect.radius || 26) * 0.32);
            ctx.lineTo((effect.radius || 26) * 0.55, -(effect.radius || 26) * 0.32);
            ctx.stroke();
            ctx.fillStyle = effect.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, (effect.radius || 26) * 0.16, (effect.radius || 26) * 0.46, -0.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          } else if (effect.type === 'funBounce') {
            const radius = effect.radius || 30;
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 3 * (1 - t);
            ctx.beginPath();
            ctx.ellipse(effect.x, effect.y, radius * (0.42 + t * 0.6), radius * (0.15 + t * 0.16), 0, 0, Math.PI * 2);
            ctx.stroke();
            for (let i = -1; i <= 1; i += 1) {
              ctx.beginPath();
              ctx.moveTo(effect.x + i * radius * 0.28, effect.y - radius * (0.28 + t * 0.16));
              ctx.lineTo(effect.x + i * radius * 0.44, effect.y - radius * (0.74 + t * 0.2));
              ctx.stroke();
            }
          } else if (effect.type === 'impactDust') {
            const radius = effect.radius || 28;
            ctx.fillStyle = effect.color;
            for (let i = 0; i < 7; i += 1) {
              const spread = radius * (0.18 + t * 0.9);
              const x = effect.x + (i - 3) * radius * 0.16 + Math.cos(i * 1.7) * spread;
              const y = effect.y + Math.sin(i * 1.3) * radius * 0.08 + t * radius * 0.12;
              ctx.globalAlpha = (1 - t) * (0.22 + (i % 2) * 0.08);
              ctx.beginPath();
              ctx.ellipse(x, y, radius * (0.05 + i * 0.006), radius * 0.028, 0, 0, Math.PI * 2);
              ctx.fill();
            }
          } else if (effect.type === 'funStretch') {
            const radius = effect.radius || 28;
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 4 * (1 - t) + 1;
            ctx.beginPath();
            ctx.ellipse(effect.x, effect.y, radius * (0.82 + t * 0.58), radius * (0.32 - t * 0.08), -0.15, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.65)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(effect.x - radius * (0.85 + t * 0.4), effect.y);
            ctx.lineTo(effect.x + radius * (0.85 + t * 0.4), effect.y);
            ctx.stroke();
          } else if (effect.type === 'funSpring') {
            const radius = effect.radius || 28;
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 3 * (1 - t) + 1;
            ctx.lineCap = 'round';
            ctx.beginPath();
            for (let i = 0; i <= 26; i += 1) {
              const p = i / 26;
              const x = effect.x - radius * 0.9 + p * radius * (1.8 + t * 0.8);
              const y = effect.y + Math.sin(p * Math.PI * 8 + t * Math.PI * 2) * radius * (0.24 + t * 0.2);
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();
          } else if (effect.type === 'funChime') {
            const radius = effect.radius || 28;
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 2.5 * (1 - t) + 0.8;
            for (let i = 0; i < 3; i += 1) {
              ctx.beginPath();
              ctx.arc(effect.x, effect.y, radius * (0.55 + i * 0.26 + t * 0.55), -Math.PI * 0.78, -Math.PI * 0.22);
              ctx.stroke();
              ctx.beginPath();
              ctx.arc(effect.x, effect.y, radius * (0.55 + i * 0.26 + t * 0.55), Math.PI * 0.22, Math.PI * 0.78);
              ctx.stroke();
            }
          } else if (effect.type === 'funButton') {
            const radius = effect.radius || 28;
            ctx.fillStyle = effect.color;
            ctx.beginPath();
            ctx.arc(effect.x, effect.y, radius * (0.35 + t * 0.55), 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 248, 236, 0.75)';
            ctx.lineWidth = 2 * (1 - t) + 1;
            ctx.beginPath();
            ctx.arc(effect.x, effect.y, radius * (0.6 + t * 0.58), 0, Math.PI * 2);
            ctx.stroke();
          } else if (effect.type === 'sticks') {
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(effect.x - 30 + t * 18, effect.y - 42 + t * 30);
            ctx.lineTo(effect.x + 2, effect.y - 6);
            ctx.moveTo(effect.x + 30 - t * 18, effect.y - 42 + t * 30);
            ctx.lineTo(effect.x - 2, effect.y - 6);
            ctx.stroke();
          }
          ctx.restore();
          effect.age += dt;
        }
        state.effects = state.effects.filter((effect) => effect.age < effect.duration);
      }

      function decayState(dt) {
        const factor = Math.pow(0.88, dt / 16.67);
        state.pianoPress.forEach((value, key) => {
          value.amount *= factor;
          if (value.amount < 0.02) state.pianoPress.delete(key);
        });
        state.drumHits.forEach((value, key) => {
          const next = value * Math.pow(0.82, dt / 16.67);
          if (next < 0.02) state.drumHits.delete(key);
          else state.drumHits.set(key, next);
        });
        state.funObjectHits.forEach((value, key) => {
          const next = value * Math.pow(0.8, dt / 16.67);
          if (next < 0.02) state.funObjectHits.delete(key);
          else state.funObjectHits.set(key, next);
        });
        state.funObjectMotion.forEach((motion, key) => {
          motion.age += dt;
          if (motion.age >= motion.duration) state.funObjectMotion.delete(key);
        });
        state.stringImpulse.forEach((value, key) => {
          const next = value * Math.pow(0.86, dt / 16.67);
          if (next < 0.02) state.stringImpulse.delete(key);
          else state.stringImpulse.set(key, next);
        });
        state.trumpetAir *= Math.pow(0.9, dt / 16.67);
      }

      function drawFrame(now) {
        const dt = Math.min(50, now - state.lastTime);
        state.lastTime = now;
        decayState(dt);
        updateHeldGestures(now);
        pollMic(now);
        drawBackground(now);
        if (state.activeInstrument === 'piano') drawPiano(now);
        if (state.activeInstrument === 'violin') drawViolin(now);
        if (state.activeInstrument === 'trumpet') drawTrumpet(now);
        if (state.activeInstrument === 'guitar') drawGuitar(now);
        if (state.activeInstrument === 'drums') drawDrums(now);
        drawEffects(dt);
        requestAnimationFrame(drawFrame);
      }

      instrumentButtons.forEach((button) => {
        button.addEventListener('click', () => setInstrument(button.dataset.instrument));
      });

      modeBtn.addEventListener('click', () => {
        setTextMode(state.textMode === 'sentence' ? 'verb' : 'sentence');
      });

      soundBtn.addEventListener('click', () => {
        if (!audio.ctx || audio.muted) {
          audio.muted = false;
          ensureAudio();
          setAudioMuted(false);
        } else {
          setAudioMuted(!audio.muted);
        }
      });

      micBtn.addEventListener('click', enableMic);

      canvas.addEventListener('pointerdown', handlePointerDown);
      canvas.addEventListener('pointermove', handlePointerMove);
      canvas.addEventListener('pointerup', handlePointerUp);
      canvas.addEventListener('pointercancel', handlePointerUp);
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('pagehide', () => {
        stopSustainedVoices();
        stopMic();
      });

      if (!supportsPointer) {
        canvas.addEventListener('touchstart', (event) => {
          Array.from(event.changedTouches).forEach((touch) => handlePointerDown({ ...touch, pointerId: touch.identifier, preventDefault: () => event.preventDefault() }));
        }, { passive: false });
        canvas.addEventListener('touchmove', (event) => {
          Array.from(event.changedTouches).forEach((touch) => handlePointerMove({ ...touch, pointerId: touch.identifier, preventDefault: () => event.preventDefault() }));
        }, { passive: false });
        canvas.addEventListener('touchend', (event) => {
          Array.from(event.changedTouches).forEach((touch) => handlePointerUp({ ...touch, pointerId: touch.identifier, preventDefault: () => event.preventDefault() }));
        }, { passive: false });
      }

      resizeCanvas();
      setTextMode('verb');
      setInstrument('piano');
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.isSecureContext) {
        micBtn.textContent = '터치';
      }
      requestAnimationFrame(drawFrame);
    })();
  </script>
  <script src="../shared/site-copyright.js"></script>
</body>
</html>
