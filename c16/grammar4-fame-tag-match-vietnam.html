    <style>
        :root {
            --bg: #eef2ff;
            --surface: rgba(255, 255, 255, 0.96);
            --ink: #0f172a;
            --muted: #64748b;
            --line: #cbd5e1;
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-soft: #dbeafe;
            --green: #059669;
            --green-dark: #047857;
            --green-soft: #dcfce7;
            --amber: #d97706;
            --amber-soft: #fff7ed;
            --shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at 10% 8%, rgba(37, 99, 235, 0.16), transparent 26%),
                radial-gradient(circle at 92% 6%, rgba(16, 185, 129, 0.18), transparent 27%),
                linear-gradient(180deg, #f8fafc 0%, var(--bg) 54%, #ffffff 100%);
        }

        button {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 14px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.2);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            font-size: 13px;
            font-weight: 800;
        }

        .topbar a {
            color: var(--blue-dark);
            text-decoration: none;
        }

        .topbar strong {
            min-width: 0;
            overflow: hidden;
            color: #334155;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .shell {
            width: min(1180px, calc(100% - 24px));
            margin: 0 auto;
            padding: 12px 0 32px;
        }

        .panel {
            border: 1px solid rgba(148, 163, 184, 0.46);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .sentence-panel {
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .status-row,
        .chip-row,
        .footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .status-row {
            justify-content: space-between;
        }

        .badge,
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            border-radius: 999px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;
        }

        .badge {
            border: 1px solid #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .badge.is-warn {
            border-color: #fed7aa;
            background: var(--amber-soft);
            color: #9a3412;
        }

        .chip {
            border: 1px solid #bfdbfe;
            background: var(--blue-soft);
            color: #1d4ed8;
        }

        .chip.is-form {
            border-color: #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .sentence {
            margin: 0;
            font-size: clamp(25px, 3.8vw, 40px);
            font-weight: 900;
            line-height: 1.28;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .region-bar {
            display: flex;
            gap: 7px;
            overflow-x: auto;
            margin-top: 10px;
            padding-bottom: 2px;
        }

        .region-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: max-content;
            min-height: 34px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 0 11px;
            background: #ffffff;
            color: #1d4ed8;
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .region-button.is-active {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        .board {
            display: grid;
            grid-template-columns: minmax(310px, 0.74fr) minmax(0, 1fr);
            gap: 12px;
            margin-top: 12px;
            align-items: start;
        }

        .pick-panel {
            display: grid;
            gap: 9px;
            padding: 10px;
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 28px;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
        }

        .panel-title span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .target-grid,
        .tag-grid,
        .recommend-grid {
            display: grid;
            gap: 8px;
        }

        .target-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .recommend-grid,
        .tag-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .target-button,
        .tag-button {
            min-width: 0;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            text-align: left;
        }

        .target-button {
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 8px;
            align-items: center;
            min-height: 66px;
            padding: 8px;
        }

        .target-button.is-active,
        .tag-button.is-active {
            border-color: var(--blue);
            background: #eff6ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .target-button.is-fit,
        .tag-button.is-fit {
            border-color: var(--green);
            background: #ecfdf5;
        }

        .target-icon {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: #f1f5f9;
            color: var(--blue);
        }

        .target-copy,
        .target-copy small,
        .tag-button small {
            display: block;
        }

        .target-button strong,
        .tag-button strong {
            display: block;
            font-size: 13px;
            font-weight: 900;
        }

        .tag-tile {
            position: relative;
            min-width: 0;
        }

        .tag-tile .tag-button {
            width: 100%;
            height: 100%;
            padding-right: 40px;
        }

        .map-link,
        .photo-link {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid #fed7aa;
            border-radius: 999px;
            background: #fff7ed;
            color: #c2410c;
            text-decoration: none;
            box-shadow: 0 6px 14px rgba(194, 65, 12, 0.12);
        }

        .photo-link {
            border-color: #c7d2fe;
            background: #eef2ff;
            color: #4338ca;
            box-shadow: 0 6px 14px rgba(67, 56, 202, 0.12);
        }

        .tag-actions {
            position: absolute;
            top: 7px;
            right: 7px;
            display: grid;
            gap: 4px;
        }

        .tag-actions .map-link,
        .tag-actions .photo-link {
            width: 26px;
            height: 26px;
            font-size: 11px;
        }

        .map-link:hover,
        .map-link:focus-visible {
            border-color: #fb923c;
            background: #ffedd5;
            color: #9a3412;
        }

        .photo-link:hover,
        .photo-link:focus-visible {
            border-color: #818cf8;
            background: #e0e7ff;
            color: #3730a3;
        }

        .output-map-link[hidden],
        .output-photo-link[hidden] {
            display: none;
        }

        .target-copy small,
        .tag-button small {
            margin-top: 2px;
            color: #64748b;
            font-size: 11px;
            font-weight: 800;
            line-height: 1.35;
        }

        .tag-section {
            display: grid;
            gap: 8px;
        }

        .tag-section + .tag-section {
            margin-top: 2px;
        }

        .tag-section-title {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #475569;
            font-size: 12px;
            font-weight: 900;
        }

        .tag-scroll {
            max-height: 466px;
            overflow: auto;
            padding-right: 2px;
        }

        .tag-button {
            display: grid;
            gap: 3px;
            min-height: 54px;
            padding: 8px;
        }

        .footer {
            justify-content: space-between;
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 38px;
            border: 1px solid #93c5fd;
            border-radius: 8px;
            padding: 0 12px;
            background: #ffffff;
            color: var(--blue-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .btn.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        @media (max-width: 900px) {
            .board {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .shell {
                width: min(100% - 14px, 1180px);
                padding-top: 7px;
            }

            .sentence-panel {
                position: sticky;
                top: 44px;
                z-index: 20;
                padding: 10px;
            }

            .target-grid,
            .recommend-grid,
            .tag-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .target-button {
                grid-template-columns: 1fr;
                min-height: 84px;
            }

            .target-icon {
                width: 30px;
                height: 30px;
            }

            .tag-scroll {
                max-height: none;
                overflow: visible;
            }

            .footer {
                position: sticky;
                bottom: 0;
                z-index: 20;
                border-top: 1px solid rgba(37, 99, 235, 0.18);
                padding: 8px 0;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(10px);
            }
        }

        function hasBatchim(text) {
            const code = text.charCodeAt(text.length - 1);
            if (code < 0xac00 || code > 0xd7a3) return false;
            return (code - 0xac00) % 28 !== 0;
        }

        function jong(text) {
            const code = text.charCodeAt(text.length - 1);
            if (code < 0xac00 || code > 0xd7a3) return 0;
            return (code - 0xac00) % 28;
        }

        function topicParticle(text) {
            return hasBatchim(text) ? '은' : '는';
        }

        function roParticle(text) {
            const final = jong(text);
            return final === 0 || final === 8 ? '로' : '으로';
        }

        function icon(name) {
            return `<i class="fa-solid ${name}" aria-hidden="true"></i>`;
        }

        function getTarget() {
            return targets.find((target) => target.id === state.targetId);
        }

        function filteredTargets() {
            return state.region === 'all'
                ? targets
                : targets.filter((target) => target.region === state.region);
        }

        function regionLabel(id) {
            return regions.find((region) => region.id === id).label;
        }

        function buildSentence(target, tagId) {
            const tag = nounTags[tagId];
            return `${target.name}${topicParticle(target.name)} ${tag}${roParticle(tag)} 유명해요.`;
        }

        function mapsUrl(target, tagId) {
            const query = mapQueries[tagId];
            if (!query || !target.tags.includes(tagId)) return '';
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${query}, ${target.vi}, Vietnam`)}`;
        }

        function mapLink(target, tagId) {
            const href = mapsUrl(target, tagId);
            if (!href) return '';
            const label = `${target.name} ${nounTags[tagId]} 구글맵에서 보기`;
            return `<a class="map-link" href="${href}" target="_blank" rel="noopener noreferrer" aria-label="${label}" title="구글맵에서 보기"><i class="fa-solid fa-map-location-dot"></i></a>`;
        }

        function photosUrl(target, tagId) {
            const query = foodPhotoQueries[tagId];
            if (!query || !target.tags.includes(tagId)) return '';
            return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(`${query}, ${target.vi}, Vietnam food`)}`;
        }

        function photoLink(target, tagId) {
            const href = photosUrl(target, tagId);
            if (!href) return '';
            const label = `${target.name} ${nounTags[tagId]} 음식 사진 보기`;
            return `<a class="photo-link" href="${href}" target="_blank" rel="noopener noreferrer" aria-label="${label}" title="음식 사진 보기"><i class="fa-solid fa-image"></i></a>`;
        }

        function tagActions(target, tagId) {
            const links = [mapLink(target, tagId), photoLink(target, tagId)].filter(Boolean).join('');
            return links ? `<span class="tag-actions">${links}</span>` : '';
        }

        function renderRegions() {
            regionBar.innerHTML = regions.map((region) => `
                <button class="region-button ${region.id === state.region ? 'is-active' : ''}" type="button" data-region="${region.id}">
                    ${icon(region.icon)} ${region.label}
                </button>
            `).join('');

            regionBar.querySelectorAll('[data-region]').forEach((button) => {
                button.addEventListener('click', () => {
                    state.region = button.dataset.region;
                    const list = filteredTargets();
                    if (!list.some((target) => target.id === state.targetId)) {
                        state.targetId = list[0].id;
                        state.tagId = list[0].tags[0];
                    }
                    render();
                });
            });
        }

        function renderTargets() {
            const list = filteredTargets();
            targetGrid.innerHTML = list.map((target) => {
                const isActive = target.id === state.targetId;

                        <span class="target-copy">

                button.addEventListener('click', () => {
                    state.targetId = button.dataset.target;
                    const target = getTarget();
                    if (!target.tags.includes(state.tagId)) {
                        state.tagId = target.tags[0];
                    }
                    render();
                });
            });
        }

        function tagButton(tagId, compact) {
            const target = getTarget();
            const isActive = tagId === state.tagId;
            const isFit = target.tags.includes(tagId);
            return `
                <div class="tag-tile">
                    <button class="tag-button ${isActive ? 'is-active' : ''} ${isFit ? 'is-fit' : ''}" type="button" data-tag="${tagId}">
                        <strong>${nounTags[tagId]}</strong>
                        <small>${compact ? '추천' : 'N(으)로'}</small>
                    </button>
                    ${tagActions(target, tagId)}
                </div>
            `;
        }

        function renderTags() {
            const target = getTarget();
            const allTagIds = Object.keys(nounTags);
            recommendGrid.innerHTML = target.tags.map((tagId) => tagButton(tagId, true)).join('');
            tagGrid.innerHTML = allTagIds.map((tagId) => tagButton(tagId, false)).join('');
            tagCount.textContent = `${allTagIds.length}개`;

            document.querySelectorAll('[data-tag]').forEach((button) => {
                button.addEventListener('click', () => {
                    state.tagId = button.dataset.tag;
                    render();
                });
            });
        }

        function renderOutput() {
            const target = getTarget();
            const isFit = target.tags.includes(state.tagId);
            sentenceText.textContent = buildSentence(target, state.tagId);
            fitBadge.className = `badge ${isFit ? '' : 'is-warn'}`;
            fitBadge.innerHTML = isFit
                ? `${icon('fa-circle-check')} 좋은 매칭`
                : `${icon('fa-triangle-exclamation')} 내용 재선택`;
            regionBadge.textContent = regionLabel(target.region);
            targetChip.innerHTML = `${icon(target.icon)} ${target.name}`;
            tagChip.textContent = nounTags[state.tagId];
            const mapHref = mapsUrl(target, state.tagId);
            mapAction.hidden = !mapHref;
            if (mapHref) {
                mapAction.href = mapHref;
                mapAction.setAttribute('aria-label', `${target.name} ${nounTags[state.tagId]} 구글맵에서 보기`);
            } else {
                mapAction.removeAttribute('href');
            }
            const photoHref = photosUrl(target, state.tagId);
            photoAction.hidden = !photoHref;
            if (photoHref) {
                photoAction.href = photoHref;
                photoAction.setAttribute('aria-label', `${target.name} ${nounTags[state.tagId]} 음식 사진 보기`);
            } else {
                photoAction.removeAttribute('href');
            }

            const list = filteredTargets();
            targetCount.textContent = `${list.indexOf(target) + 1} / ${list.length}`;
        }

        function render() {
            renderRegions();
            renderOutput();
            renderTargets();
            renderTags();
        }

        render();
    </script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
