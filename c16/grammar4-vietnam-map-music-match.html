    <title>16과 문법 4 보조자료 | 베트남 지도 음악 태그 매칭</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #ecfeff;
            --surface: rgba(255, 255, 255, 0.96);
            --ink: #0f172a;
            --muted: #64748b;
            --line: #bae6fd;
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-soft: #dbeafe;
            --green: #059669;
            --green-dark: #047857;
            --green-soft: #dcfce7;
            --amber: #d97706;
            --amber-soft: #fff7ed;
            --shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at 12% 9%, rgba(37, 99, 235, 0.15), transparent 26%),
                radial-gradient(circle at 90% 6%, rgba(16, 185, 129, 0.18), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, var(--bg) 58%, #ffffff 100%);
        }

        button {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 14px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.2);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            font-size: 13px;
            font-weight: 800;
        }

        .topbar a {
            color: var(--blue-dark);
            text-decoration: none;
        }

        .topbar strong {
            min-width: 0;
            overflow: hidden;
            color: #334155;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .shell {
            width: min(1180px, calc(100% - 24px));
            margin: 0 auto;
            padding: 12px 0 32px;
        }

        .panel {
            border: 1px solid rgba(148, 163, 184, 0.42);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .sentence-panel {
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .status-row,
        .chip-row,
        .region-bar,
        .footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .status-row,
        .footer {
            justify-content: space-between;
        }

        .badge,
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            border-radius: 999px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;
        }

        .badge {
            border: 1px solid #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .chip {
            border: 1px solid #bfdbfe;
            background: var(--blue-soft);
            color: #1d4ed8;
        }

        .chip.is-form {
            border-color: #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .sentence {
            margin: 0;
            font-size: clamp(25px, 3.7vw, 40px);
            font-weight: 900;
            line-height: 1.28;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .region-bar {
            overflow-x: auto;
            margin-top: 10px;
            padding-bottom: 2px;
        }

        .region-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: max-content;
            min-height: 34px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 0 11px;
            background: #ffffff;
            color: #1d4ed8;
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .region-button.is-active {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(360px, 0.9fr) minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            margin-top: 12px;
        }

        .map-panel {
            display: grid;
            gap: 8px;
            padding: 10px;
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 28px;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
        }

        .panel-title span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .map-canvas {
            position: relative;
            width: min(100%, 430px);
            aspect-ratio: 1086 / 1448;
            margin: 0 auto;
            overflow: hidden;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            background: #ffffff;
        }

        .map-layer {
            position: absolute;
            inset: 0;
            transform-origin: 0 0;
            transition: transform 220ms ease;
        }

        .map-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            user-select: none;
            pointer-events: none;
        }

        .map-tools {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .zoom-controls {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 3px;
            background: #ffffff;
        }

        .zoom-button {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: 0;
            border-radius: 999px;
            background: #eff6ff;
            color: var(--blue-dark);
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .zoom-button:disabled {
            cursor: default;
            opacity: 0.38;
        }

        .zoom-level {
            min-width: 42px;
            color: #334155;
            font-size: 11px;
            font-weight: 900;
            text-align: center;
        }

        .pin {
            position: absolute;
            left: var(--x);
            top: var(--y);
            z-index: 5;
            display: grid;
            place-items: center;
            width: 25px;
            height: 25px;
            border: 2px solid #ffffff;
            border-radius: 50% 50% 50% 8px;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 9px 18px rgba(15, 23, 42, 0.22);
            transform: translate(-50%, -50%) rotate(-45deg);
            transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
        }

        .pin i {
            font-size: 10px;
            transform: rotate(45deg);
        }

        .pin:hover,
        .pin:focus-visible {
            transform: translate(-50%, -56%) rotate(-45deg) scale(1.08);
            outline: none;
        }

        .pin.is-active {
            z-index: 8;
            background: var(--green);
            transform: translate(-50%, -58%) rotate(-45deg) scale(1.18);
        }

        .pin.has-music {
            border-color: #ddd6fe;
            background: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.14), 0 9px 18px rgba(15, 23, 42, 0.22);
        }

        .pin.is-muted {
            opacity: 0.28;
        }

        .pin-label {
            position: absolute;
            left: calc(var(--x) + 15px);
            top: calc(var(--y) - 10px);
            z-index: 6;
            max-width: 98px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.92);
            color: #1e293b;
            font-size: 11px;
            font-weight: 900;
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .pin.is-active + .pin-label,
        .pin:hover + .pin-label,
        .pin:focus-visible + .pin-label {
            opacity: 1;
            transform: translateY(0);
        }

        .side {
            display: grid;
            gap: 12px;
        }

        .place-card {
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 10px;
            align-items: center;
            padding: 12px;
        }

        .place-icon {
            display: grid;
            place-items: center;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: var(--blue-soft);
            color: var(--blue-dark);
            font-size: 20px;
        }

        .place-card strong {
            display: block;
            font-size: 20px;
            font-weight: 900;
        }

        .place-card span {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .tag-grid,
        .mini-grid {
            display: grid;
            gap: 8px;
        }

        .tag-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .mini-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .tag-button,
        .mini-button {
            min-width: 0;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            text-align: left;
        }

        .tag-button {
            min-height: 62px;
            padding: 9px;
        }

        .tag-tile {
            position: relative;
            min-width: 0;
        }

        .tag-tile .tag-button {
            width: 100%;
            height: 100%;
            padding-right: 40px;
        }

        .map-link,
        .photo-link {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid #fed7aa;
            border-radius: 999px;
            background: #fff7ed;
            color: #c2410c;
            text-decoration: none;
            box-shadow: 0 6px 14px rgba(194, 65, 12, 0.12);
        }

        .photo-link {
            border-color: #c7d2fe;
            background: #eef2ff;
            color: #4338ca;
            box-shadow: 0 6px 14px rgba(67, 56, 202, 0.12);
        }

        .tag-actions {
            position: absolute;
            top: 7px;
            right: 7px;
            display: grid;
            gap: 4px;
        }

        .tag-actions .map-link,
        .tag-actions .photo-link {
            width: 26px;
            height: 26px;
            font-size: 11px;
        }

        .map-link:hover,
        .map-link:focus-visible {
            border-color: #fb923c;
            background: #ffedd5;
            color: #9a3412;
        }

        .photo-link:hover,
        .photo-link:focus-visible {
            border-color: #818cf8;
            background: #e0e7ff;
            color: #3730a3;
        }

        .output-map-link[hidden],
        .output-photo-link[hidden] {
            display: none;
        }

        .tag-button.is-active,
        .mini-button.is-active {
            border-color: var(--green);
            background: #ecfdf5;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
        }

        .tag-button strong,
        .mini-button strong {
            display: block;
            font-size: 13px;
            font-weight: 900;
        }

        .tag-button span,
        .mini-button span {
            display: block;
            margin-top: 4px;
            color: #64748b;
            font-size: 11px;
            font-weight: 800;
        }

        .mini-panel {
            padding: 10px;
        }

        .mini-grid {
            margin-top: 8px;
        }

        .mini-button {
            min-height: 54px;
            padding: 8px;
        }

        .music-panel {
            display: grid;
            gap: 9px;
            padding: 10px;
        }

        .music-summary {
            display: grid;
            gap: 3px;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            padding: 9px;
            background: linear-gradient(135deg, #f5f3ff 0%, #eef2ff 100%);
        }

        .music-summary strong {
            color: #4c1d95;
            font-size: 14px;
            font-weight: 900;
        }

        .music-summary span {
            color: #475569;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.45;
        }

        .music-controls,
        .music-city-grid {
            display: grid;
            gap: 6px;
        }

        .music-controls {
            grid-template-columns: 1fr 1fr;
        }

        .music-city-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .music-button,
        .music-city-button {
            min-width: 0;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            background: #ffffff;
            color: #312e81;
            cursor: pointer;
            font-weight: 900;
        }

        .music-button {
            min-height: 36px;
            padding: 0 10px;
        }

        .music-button.is-playing,
        .music-city-button.is-playing {
            border-color: #7c3aed;
            background: #ede9fe;
            color: #5b21b6;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
        }

        .music-city-button {
            display: grid;
            gap: 3px;
            min-height: 52px;
            padding: 8px;
            text-align: left;
        }

        .music-city-button strong,
        .music-city-button span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .music-city-button strong {
            font-size: 12px;
        }

        .music-city-button span {
            color: #64748b;
            font-size: 10.5px;
        }

        .footer {
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 38px;
            border: 1px solid #93c5fd;
            border-radius: 8px;
            padding: 0 12px;
            background: #ffffff;
            color: var(--blue-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .btn.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .map-canvas {
                width: min(100%, 390px);
            }
        }

        @media (max-width: 560px) {
            .shell {
                width: min(100% - 14px, 1180px);
                padding-top: 7px;
            }

            .sentence-panel {
                position: sticky;
                top: 44px;
                z-index: 25;
                padding: 10px;
            }

            .map-canvas {
                width: 100%;
            }

            .pin {
                width: 24px;
                height: 24px;
            }

            .place-card {
                grid-template-columns: 40px 1fr;
                padding: 10px;
            }

            .place-icon {
                width: 40px;
                height: 40px;
            }

            .tag-grid,
            .mini-grid,
            .music-city-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .footer {
                position: sticky;
                bottom: 0;
                z-index: 20;
                border-top: 1px solid rgba(37, 99, 235, 0.18);
                padding: 8px 0;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(10px);
            }
        }
    </style>

    <main class="shell">
        <section class="sentence-panel panel" aria-live="polite">
            <div class="status-row">
                <span class="badge" id="regionBadge">북부</span>
                <span class="badge">지도 기반</span>

            <div class="chip-row">
                <span class="chip" id="placeChip"></span>
                <span class="chip" id="tagChip"></span>

                <a class="photo-link output-photo-link" id="photoAction" target="_blank" rel="noopener noreferrer" aria-label="음식 사진 보기" title="음식 사진 보기" hidden><i class="fa-solid fa-image"></i></a>
                <span class="chip is-form">N(으)로 유명해요</span>

                <div class="panel-title">

                        <span class="zoom-controls" aria-label="지도 확대 조절">
                            <button class="zoom-button" type="button" id="zoomOutBtn" aria-label="지도 축소"><i class="fa-solid fa-minus"></i></button>
                            <span class="zoom-level" id="zoomLevel">100%</span>
                            <button class="zoom-button" type="button" id="zoomInBtn" aria-label="지도 확대"><i class="fa-solid fa-plus"></i></button>
                            <button class="zoom-button" type="button" id="zoomResetBtn" aria-label="지도 원위치"><i class="fa-solid fa-rotate-left"></i></button>
                        </span>
                    </span>
                </div>
                <div class="map-canvas" id="mapCanvas">
                    <div class="map-layer" id="mapLayer">

                    <div class="music-summary">
                        <strong id="musicTitle">음악 도시를 선택하세요</strong>
                        <span id="musicNote">버튼을 누르면 실제 음원 대신 저작권 문제가 없는 짧은 Web Audio 큐가 재생됩니다.</span>
                    </div>
                    <div class="music-controls">

                    </div>
                    <div class="music-city-grid" id="musicCityGrid"></div>
                </section>

                <section class="map-panel panel">

                        <span id="tagCount"></span>
                    </div>
                    <div class="tag-grid" id="tagGrid"></div>

                    <div class="panel-title">

                    <div class="mini-grid" id="nearGrid"></div>

    <script>
        const regions = [
            { id: 'all', label: '전체', icon: 'fa-globe-asia' },
            { id: 'north', label: '북부', icon: 'fa-mountain-sun' },
            { id: 'central', label: '중부', icon: 'fa-landmark' },
            { id: 'south', label: '남부', icon: 'fa-city' },
            { id: 'east', label: '동부 해안', icon: 'fa-water' },
            { id: 'west', label: '서부', icon: 'fa-tree' }
        ];

        const nounTags = {
            oldQuarter: '구시가지',
            hoanKiem: '호안끼엠 호수',
            waterPuppet: '수상 인형극',

            bentre: ['coconutCandy', 'banhXeo', 'coconut'],
            nhatrang: ['bunCaNhaTrang', 'nemNuongNhaTrang', 'banhCan'],
            camranh: ['lobster', 'banhCan', 'seafood'],
            muine: ['banhCan', 'lauTha', 'goiCaMai'],
            phanthiet: ['lauTha', 'goiCaMai', 'banhCan'],
            vungtau: ['banhKhot', 'stingrayHotpot', 'saltedEggSpongeCake'],
            phanrang: ['banhCan', 'banhCanhChaCa', 'goatMeat'],
            phuyen: ['tunaEye', 'banhHoiLongHeo'],
            tuyhoa: ['tunaEye', 'banhHoiLongHeo'],
            dienbien: ['paPinhTop', 'comLam', 'fiveColorStickyRice'],
            maichau: ['comLam', 'grilledChicken'],
            mocchau: ['beChao', 'freshMilk', 'tea'],
            dalat: ['banhTrangNuong', 'avocadoIceCream', 'artichokeTea'],
            buonmathuot: ['coffee', 'redNoodle', 'comLam'],
            pleiku: ['phoKhoGiaLai', 'bunCuaThoi', 'oneSunDriedBeef'],
            chaudoc: ['bunCaChauDoc', 'mamChauDoc', 'palmSugar'],

        };

        targets.forEach((target) => {
            (extraFoodTagsByTarget[target.id] || []).forEach((tagId) => {
                if (!target.tags.includes(tagId)) target.tags.push(tagId);
            });
        });

        const musicCatalog = {
            hanoi: { title: '까쭈 Ca trù', note: '하노이의 시가·실내악 전통을 떠올리는 맑고 절제된 선율', tempo: 92, wave: 'triangle', base: 392, pattern: [0, 4, 7, 9, 7, 4, 2, null], harmony: 7 },
            bacninh: { title: '관호 Quan họ', note: '박닌·박장 지역의 남녀 교답 민요를 상징하는 두 성부 선율', tempo: 84, wave: 'sine', base: 440, pattern: [0, 2, 4, 7, 4, 2, 0, null], harmony: 4 },
            hue: { title: '냐냑 Nhã nhạc / 까후에', note: '후에 궁중음악의 느리고 장중한 의례감을 살린 낮은 울림', tempo: 68, wave: 'sine', base: 330, pattern: [0, null, 5, 7, null, 5, 2, null], gong: true },
            hoian: { title: '바이쪼이 Bài chòi', note: '중부 베트남의 놀이·노래 전통을 밝은 리듬으로 축약', tempo: 112, wave: 'square', base: 392, pattern: [0, 2, 5, 7, 9, 7, 5, 2], click: true },
            hcmc: { title: '남부 Đờn ca tài tử', note: '호찌민시의 남부 도시 감각과 전통 현악 선율을 결합', tempo: 98, wave: 'triangle', base: 349.23, pattern: [0, 3, 5, 7, 10, 7, 5, 3], harmony: 12 },
            cantho: { title: '미엔떠이 Đờn ca tài tử', note: '껀터와 메콩 델타의 유려한 남부 선율을 상징', tempo: 88, wave: 'triangle', base: 329.63, pattern: [0, 2, 5, 7, 5, 2, -2, null], harmony: 7 },
            baclieu: { title: 'Dạ cổ hoài lang / vọng cổ', note: '박리에우의 상징적 vọng cổ 계열을 느린 남부 선율로 표현', tempo: 62, wave: 'sine', base: 293.66, pattern: [0, null, 3, 5, 7, null, 5, 3, 0, null], harmony: 12 },
            buonmathuot: { title: '중부고원 공 Cồng chiêng', note: '부온마투옷·떠이응우옌의 공 문화에서 착안한 낮은 반복 울림', tempo: 76, wave: 'sine', base: 196, pattern: [0, null, 7, null, 5, null, 10, null], gong: true }
        };

        const musicTargetIds = ['hanoi', 'bacninh', 'hue', 'hoian', 'hcmc', 'cantho', 'baclieu', 'buonmathuot'];
        const musicTargets = musicTargetIds.map((id) => targets.find((target) => target.id === id)).filter(Boolean);

        const state = {
            region: 'north',
            targetId: 'hanoi',
            tagId: 'oldQuarter',
            zoomIndex: 0,
            musicId: 'hanoi',
            isPlaying: false
        };

        const regionBar = document.getElementById('regionBar');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapLayer = document.getElementById('mapLayer');
        const pinLayer = document.getElementById('pinLayer');
        const sentenceText = document.getElementById('sentenceText');
        const regionBadge = document.getElementById('regionBadge');
        const placeChip = document.getElementById('placeChip');
        const tagChip = document.getElementById('tagChip');
        const mapAction = document.getElementById('mapAction');
        const photoAction = document.getElementById('photoAction');
        const pinCount = document.getElementById('pinCount');
        const placeIcon = document.getElementById('placeIcon');
        const placeName = document.getElementById('placeName');
        const placeMeta = document.getElementById('placeMeta');
        const tagGrid = document.getElementById('tagGrid');
        const tagCount = document.getElementById('tagCount');
        const nearGrid = document.getElementById('nearGrid');
        const nearCount = document.getElementById('nearCount');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomResetBtn = document.getElementById('zoomResetBtn');
        const zoomLevel = document.getElementById('zoomLevel');
        const musicStatus = document.getElementById('musicStatus');
        const musicTitle = document.getElementById('musicTitle');
        const musicNote = document.getElementById('musicNote');
        const musicPlayBtn = document.getElementById('musicPlayBtn');
        const musicStopBtn = document.getElementById('musicStopBtn');
        const musicCityGrid = document.getElementById('musicCityGrid');
        const zoomSteps = [1, 1.35, 1.7, 2.15, 2.6];
        let audioContext = null;
        let musicTimer = null;
        let musicStep = 0;

        function hasBatchim(text) {
            const code = text.charCodeAt(text.length - 1);
            if (code < 0xac00 || code > 0xd7a3) return false;
            return (code - 0xac00) % 28 !== 0;
        }

        function jong(text) {
            const code = text.charCodeAt(text.length - 1);
            if (code < 0xac00 || code > 0xd7a3) return 0;
            return (code - 0xac00) % 28;
        }

        function topicParticle(text) {
            return hasBatchim(text) ? '은' : '는';
        }

        function roParticle(text) {
            const final = jong(text);
            return final === 0 || final === 8 ? '로' : '으로';
        }

        function icon(name) {
            return `<i class="fa-solid ${name}" aria-hidden="true"></i>`;
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function getTarget() {
            return targets.find((target) => target.id === state.targetId);
        }

        function filteredTargets() {
            return state.region === 'all'
                ? targets
                : targets.filter((target) => target.region === state.region);
        }

        function regionLabel(id) {
            return regions.find((region) => region.id === id).label;
        }

        function selectTarget(targetId) {
            const target = targets.find((item) => item.id === targetId);
            if (!target) return;
            state.targetId = target.id;
            state.region = target.region;
            state.tagId = target.tags[0];
            if (musicCatalog[target.id]) state.musicId = target.id;
            if (!musicCatalog[target.id] && state.isPlaying) {
                clearInterval(musicTimer);
                musicTimer = null;
                state.isPlaying = false;
            }
            render();
        }

        function buildSentence(target, tagId) {
            const tag = nounTags[tagId];
            return `${target.name}${topicParticle(target.name)} ${tag}${roParticle(tag)} 유명해요.`;
        }

        function mapsUrl(target, tagId) {
            const query = mapQueries[tagId];
            if (!query) return '';
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${query}, ${target.vi}, Vietnam`)}`;
        }

        function mapLink(target, tagId) {
            const href = mapsUrl(target, tagId);
            if (!href) return '';
            const label = `${target.name} ${nounTags[tagId]} 구글맵에서 보기`;
            return `<a class="map-link" href="${href}" target="_blank" rel="noopener noreferrer" aria-label="${label}" title="구글맵에서 보기"><i class="fa-solid fa-map-location-dot"></i></a>`;
        }

        function photosUrl(target, tagId) {
            const query = foodPhotoQueries[tagId];
            if (!query || !target.tags.includes(tagId)) return '';
            return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(`${query}, ${target.vi}, Vietnam food`)}`;
        }

        function photoLink(target, tagId) {
            const href = photosUrl(target, tagId);
            if (!href) return '';
            const label = `${target.name} ${nounTags[tagId]} 음식 사진 보기`;
            return `<a class="photo-link" href="${href}" target="_blank" rel="noopener noreferrer" aria-label="${label}" title="음식 사진 보기"><i class="fa-solid fa-image"></i></a>`;
        }

        function tagActions(target, tagId) {
            const links = [mapLink(target, tagId), photoLink(target, tagId)].filter(Boolean).join('');
            return links ? `<span class="tag-actions">${links}</span>` : '';
        }

        function ensureAudioContext() {
            const AudioCtor = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtor) return null;
            if (!audioContext) audioContext = new AudioCtor();
            if (audioContext.state === 'suspended') audioContext.resume();
            return audioContext;
        }

        function midiLike(base, semitone) {
            return base * Math.pow(2, semitone / 12);
        }

        function playTone(frequency, duration, wave, volume, delay = 0) {
            const ctx = ensureAudioContext();
            if (!ctx) return;
            const start = ctx.currentTime + delay;
            const oscillator = ctx.createOscillator();
            const gain = ctx.createGain();
            oscillator.type = wave;
            oscillator.frequency.setValueAtTime(frequency, start);
            gain.gain.setValueAtTime(0, start);
            gain.gain.linearRampToValueAtTime(volume, start + 0.025);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            oscillator.connect(gain).connect(ctx.destination);
            oscillator.start(start);
            oscillator.stop(start + duration + 0.03);
        }

        function playClick(delay = 0) {
            const ctx = ensureAudioContext();
            if (!ctx) return;
            const start = ctx.currentTime + delay;
            const oscillator = ctx.createOscillator();
            const gain = ctx.createGain();
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(880, start);
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.exponentialRampToValueAtTime(0.06, start + 0.005);
            gain.gain.exponentialRampToValueAtTime(0.001, start + 0.08);
            oscillator.connect(gain).connect(ctx.destination);
            oscillator.start(start);
            oscillator.stop(start + 0.09);
        }

        function playMusicStep() {
            const music = musicCatalog[state.musicId];
            if (!music) return;
            const note = music.pattern[musicStep % music.pattern.length];
            const beat = 60 / music.tempo;

            if (note !== null) {
                const frequency = midiLike(music.base, note);
                playTone(frequency, Math.min(beat * 0.82, 0.72), music.wave, 0.075);
                if (music.harmony !== undefined) {
                    playTone(midiLike(music.base, note + music.harmony), Math.min(beat * 0.7, 0.6), 'sine', 0.035, 0.03);
                }
            }

            if (music.gong && musicStep % 2 === 0) {
                playTone(music.base / 2, Math.min(beat * 1.4, 1.2), 'sine', 0.08);
            }

            if (music.click && musicStep % 2 === 0) {
                playClick(0.01);
            }

            musicStep += 1;
        }

        function stopMusic() {
            if (musicTimer) {
                clearInterval(musicTimer);
                musicTimer = null;
            }
            state.isPlaying = false;
            renderMusicPanel();
        }

        function startMusic(cityId = state.targetId) {
            if (!musicCatalog[cityId]) return;
            state.musicId = cityId;
            state.isPlaying = true;
            musicStep = 0;
            if (musicTimer) clearInterval(musicTimer);
            ensureAudioContext();
            playMusicStep();
            musicTimer = setInterval(playMusicStep, 60000 / musicCatalog[cityId].tempo);
            renderMusicPanel();
        }

        function renderMusicPanel() {
            const target = getTarget();
            const selectedMusic = musicCatalog[target.id] || musicCatalog[state.musicId];
            const selectedCity = musicTargets.find((item) => item.id === (musicCatalog[target.id] ? target.id : state.musicId));
            const targetHasMusic = Boolean(musicCatalog[target.id]);

            musicStatus.textContent = state.isPlaying ? '재생 중' : '시범 합성음';
            musicTitle.textContent = targetHasMusic
                ? `${target.name} · ${selectedMusic.title}`
                : `${target.name}은 아직 음악 큐가 없습니다`;
            musicNote.textContent = targetHasMusic
                ? selectedMusic.note
                : '아래 음악 도시 버튼을 누르면 해당 도시로 이동하고 짧은 음악 큐가 재생됩니다.';
            musicPlayBtn.disabled = !targetHasMusic;
            musicPlayBtn.classList.toggle('is-playing', state.isPlaying && state.musicId === target.id);

            musicCityGrid.innerHTML = musicTargets.map((item) => {
                const music = musicCatalog[item.id];
                const isPlaying = state.isPlaying && state.musicId === item.id;
                const isSelected = selectedCity && selectedCity.id === item.id;
                return `
                    <button class="music-city-button ${isPlaying || isSelected ? 'is-playing' : ''}" type="button" data-music-city="${item.id}">
                        <strong>${item.name}</strong>
                        <span>${music.title}</span>
                    </button>
                `;
            }).join('');

            musicCityGrid.querySelectorAll('[data-music-city]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectTarget(button.dataset.musicCity);
                    startMusic(button.dataset.musicCity);
                });
            });
        }

        function updateZoomControls() {
            const scale = zoomSteps[state.zoomIndex];
            zoomLevel.textContent = `${Math.round(scale * 100)}%`;
            zoomOutBtn.disabled = state.zoomIndex === 0;
            zoomInBtn.disabled = state.zoomIndex === zoomSteps.length - 1;
            zoomResetBtn.disabled = state.zoomIndex === 0;
        }

        function updateMapTransform() {
            const scale = zoomSteps[state.zoomIndex];
            const target = getTarget();
            const rect = mapCanvas.getBoundingClientRect();
            let panX = 0;
            let panY = 0;

            if (scale > 1 && rect.width > 0 && rect.height > 0) {
                panX = (rect.width / 2) - ((rect.width * target.x / 100) * scale);
                panY = (rect.height / 2) - ((rect.height * target.y / 100) * scale);
                panX = clamp(panX, rect.width * (1 - scale), 0);
                panY = clamp(panY, rect.height * (1 - scale), 0);
            }

            mapLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            updateZoomControls();
        }

        function setZoomIndex(index) {
            state.zoomIndex = clamp(index, 0, zoomSteps.length - 1);
            updateMapTransform();
        }

        function renderRegions() {
            regionBar.innerHTML = regions.map((region) => `
                <button class="region-button ${region.id === state.region ? 'is-active' : ''}" type="button" data-region="${region.id}">
                    ${icon(region.icon)} ${region.label}
                </button>
            `).join('');

            regionBar.querySelectorAll('[data-region]').forEach((button) => {
                button.addEventListener('click', () => {
                    state.region = button.dataset.region;
                    const list = filteredTargets();
                    if (!list.some((target) => target.id === state.targetId)) {
                        state.targetId = list[0].id;
                        state.tagId = list[0].tags[0];
                    }
                    render();
                });
            });
        }

        function renderPins() {
            const visible = filteredTargets();
            pinLayer.innerHTML = targets.map((target) => {
                const isVisible = state.region === 'all' || target.region === state.region;
                const isActive = target.id === state.targetId;
                const hasMusic = Boolean(musicCatalog[target.id]);
                return `
                    <button class="pin ${isActive ? 'is-active' : ''} ${isVisible ? '' : 'is-muted'} ${hasMusic ? 'has-music' : ''}" type="button" data-target="${target.id}" style="--x:${target.x}%; --y:${target.y}%;" aria-label="${target.name}">
                        ${icon(target.icon)}
                    </button>
                    <span class="pin-label" style="--x:${target.x}%; --y:${target.y}%;">${target.name}</span>
                `;
            }).join('');

            pinLayer.querySelectorAll('[data-target]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectTarget(button.dataset.target);
                });
            });

            pinCount.textContent = `${visible.length} / ${targets.length}`;
        }

        function renderTags() {
            const target = getTarget();
            tagGrid.innerHTML = target.tags.map((tagId) => `
                <div class="tag-tile">
                    <button class="tag-button ${tagId === state.tagId ? 'is-active' : ''}" type="button" data-tag="${tagId}">
                        <strong>${nounTags[tagId]}</strong>
                        <span>N(으)로</span>
                    </button>
                    ${tagActions(target, tagId)}
                </div>
            `).join('');

            tagGrid.querySelectorAll('[data-tag]').forEach((button) => {
                button.addEventListener('click', () => {
                    state.tagId = button.dataset.tag;
                    render();
                });
            });

            tagCount.textContent = `${target.tags.length}개`;
        }

        function renderNearPlaces() {
            const target = getTarget();
            const near = targets
                .filter((item) => item.region === target.region && item.id !== target.id)
                .slice(0, 6);

            nearGrid.innerHTML = near.map((item) => `
                <button class="mini-button" type="button" data-near="${item.id}">
                    <strong>${item.name}</strong>
                    <span>${item.hint}</span>
                </button>
            `).join('');

            nearGrid.querySelectorAll('[data-near]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectTarget(button.dataset.near);
                });
            });

            nearCount.textContent = `${near.length}곳`;
        }

        function renderOutput() {
            const target = getTarget();
            const tag = nounTags[state.tagId];
            sentenceText.textContent = buildSentence(target, state.tagId);
            regionBadge.textContent = regionLabel(target.region);
            placeChip.innerHTML = `${icon(target.icon)} ${target.name}`;
            tagChip.textContent = tag;
            const mapHref = mapsUrl(target, state.tagId);
            mapAction.hidden = !mapHref;
            if (mapHref) {
                mapAction.href = mapHref;
                mapAction.setAttribute('aria-label', `${target.name} ${tag} 구글맵에서 보기`);
            } else {
                mapAction.removeAttribute('href');
            }
            const photoHref = photosUrl(target, state.tagId);
            photoAction.hidden = !photoHref;
            if (photoHref) {
                photoAction.href = photoHref;
                photoAction.setAttribute('aria-label', `${target.name} ${tag} 음식 사진 보기`);
            } else {
                photoAction.removeAttribute('href');
            }
            placeIcon.innerHTML = icon(target.icon);
            placeName.textContent = target.name;
            placeMeta.textContent = `${target.vi} · ${target.hint}`;
        }

        function render() {
            renderRegions();
            renderOutput();
            renderPins();
            renderTags();
            renderNearPlaces();
            renderMusicPanel();
            updateMapTransform();
        }

        zoomOutBtn.addEventListener('click', () => setZoomIndex(state.zoomIndex - 1));
        zoomInBtn.addEventListener('click', () => setZoomIndex(state.zoomIndex + 1));
        zoomResetBtn.addEventListener('click', () => setZoomIndex(0));
        musicPlayBtn.addEventListener('click', () => startMusic(state.targetId));
        musicStopBtn.addEventListener('click', stopMusic);
        window.addEventListener('resize', updateMapTransform);

        render();
    </script>
    <script src="../shared/site-copyright.js"></script>
