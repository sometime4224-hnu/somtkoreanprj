            function toInitialsVariantPath(imagePath) {

            function buildBalancedGenderSelection() {
                const words = Object.keys(koreanHumanGenderVariantMap);
                const shuffledWords = [...words];
                shuffleArray(shuffledWords);
                const femaleCount = Math.random() < 0.5
                    ? Math.floor(words.length / 2)
                    : Math.ceil(words.length / 2);
                const femaleWords = new Set(shuffledWords.slice(0, femaleCount));
                return Object.fromEntries(
                    words.map((word) => [word, femaleWords.has(word) ? 'female' : 'male'])
                );
            }

            function rebuildSessionImageMaps() {
                const selection = buildBalancedGenderSelection();
                koreanCardImageMap = { ...koreanDefaultCardImageMap };

                Object.entries(koreanHumanGenderVariantMap).forEach(([word, variants]) => {
                    const selectedGender = selection[word] || 'male';
                    koreanCardImageMap[word] = variants[selectedGender] || koreanDefaultCardImageMap[word];
                });

                koreanChoseongImageMap = Object.fromEntries(
                    Object.entries(koreanCardImageMap).map(([word, imagePath]) => [
                        word,
                        toInitialsVariantPath(imagePath)
                    ])
                );

                koreanMaskedImageMap = Object.fromEntries(

                    ])
                );

            function extractInitialConsonants(text) {
                const initials = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
                return [...text].map((char) => {
                    if (char === ' ') {
                        return ' ';
                    }
                    const code = char.charCodeAt(0);
                    if (code >= 0xac00 && code <= 0xd7a3) {
                        return initials[Math.floor((code - 0xac00) / 588)];
                    }
                    return char;
                }).join('');
            }

            function calculateChoseongSimilarity(targetWord, candidateWord) {
                const targetInitials = extractInitialConsonants(targetWord);
                const candidateInitials = extractInitialConsonants(candidateWord);

                if (targetInitials === candidateInitials) {
                    return 10000;
                }

                let score = 0;
                const minLength = Math.min(targetInitials.length, candidateInitials.length);

                if (targetInitials.length === candidateInitials.length) {
                    score += 20;
                }

                for (let i = 0; i < minLength; i++) {
                    if (targetInitials[i] === candidateInitials[i]) {
                        score += i === 0 ? 50 : 12;
                        if (i < 3) {
                            score += 8;
                        }
                    }
                }

                const targetParts = targetInitials.split(' ');
                const candidateParts = candidateInitials.split(' ');

                if (targetParts.length === candidateParts.length) {
                    score += 10;
                }

                if (targetParts[0] === candidateParts[0]) {
                    score += 40;
                } else if (targetParts[0]?.[0] && targetParts[0][0] === candidateParts[0]?.[0]) {
                    score += 15;
                }

                return score;
            }

            function getChoseongDistractors(correctWord, count = 2) {
                const targetInitials = extractInitialConsonants(correctWord);
                const candidates = allVocabulary.korean.data
                    .map((item) => item.korean)
                    .filter((word) => word !== correctWord);

                shuffleArray(candidates);

                const selected = candidates.filter((word) => extractInitialConsonants(word) === targetInitials).slice(0, count);

                if (selected.length < count) {
                    const similarCandidates = candidates
                        .filter((word) => !selected.includes(word))
                        .map((word) => ({ word, score: calculateChoseongSimilarity(correctWord, word) }))
                        .sort((a, b) => b.score - a.score);

                    for (const { word } of similarCandidates) {
                        if (selected.length >= count) {
                            break;
                        }
                        selected.push(word);
                    }
                }

                return selected.slice(0, count);
            }

                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

                            const fallbackText = document.createElement('h2');
                            fallbackText.className = `text-xl font-bold ${colors.text}`;
                            fallbackText.textContent = item.korean;
                            cardFront.appendChild(fallbackText);
                        }
                    } else {
                        cardFront.className = `card-front bg-white ${colors.text}`;
                        const koreanText = document.createElement('h2');
                        koreanText.className = 'text-xl font-bold';
                        koreanText.textContent = item.korean;
                        cardFront.appendChild(koreanText);
                    }

                    const cardBack = document.createElement('div');
                    cardBack.className = `card-back text-white ${colors.cardBack}`;
                    if (isKoreanMode) {
                        const imagePath = koreanCardImageMap[item.korean];
                        if (imagePath) {
                            const koreanAnswer = document.createElement('h2');
                            koreanAnswer.className = 'text-xl font-bold';
                            koreanAnswer.textContent = item.korean;
                            cardBack.appendChild(koreanAnswer);
                        } else {
                            const koreanExplanation = document.createElement('p');
                            koreanExplanation.className = 'text-lg font-semibold';
                            koreanExplanation.textContent = item.foreign;
                            cardBack.appendChild(koreanExplanation);
                        }
                    } else {
                        const foreignText = document.createElement('p');
                        foreignText.className = 'text-lg font-semibold';
                        foreignText.textContent = item.foreign;
                        cardBack.appendChild(foreignText);
                    }
                    
                    cardInner.appendChild(cardFront);
                    cardInner.appendChild(cardBack);
                    cardContainer.appendChild(cardInner);
                    gameBoard.appendChild(cardContainer);

                    cardContainer.addEventListener('click', () => cardContainer.classList.toggle('flipped'));
                });
            }

            function showQuizQuestion() {
                const totalQuestions = currentQuizData.length;
                if (currentQuestionIndex >= totalQuestions) {
                    showQuizResult();
                    return;
                }

                const currentItem = currentQuizData[currentQuestionIndex];
                let correctAnswer = '';
                let options = [];

                if (currentQuizMode === 'choseong' || currentQuizMode === 'image') {
                    const allItems = allVocabulary.korean.data;
                    const distractors = currentQuizMode === 'choseong'
                        ? getChoseongDistractors(currentItem.korean, 2)
                        : [];

                    if (currentQuizMode === 'image') {
                        while (distractors.length < 2) {
                            const randomIndex = Math.floor(Math.random() * allItems.length);
                            const randomItem = allItems[randomIndex];
                            if (randomItem.korean !== currentItem.korean && !distractors.includes(randomItem.korean)) {
                                distractors.push(randomItem.korean);
                            }
                        }
                    }

                    correctAnswer = currentItem.korean;
                    options = [correctAnswer, ...distractors];

                    const isChoseongMode = currentQuizMode === 'choseong';
                    quizModeLabelEl.textContent = isChoseongMode ? '초성퀴즈' : '그림퀴즈';
                    quizModeLabelEl.classList.remove('hidden');
                    quizImageBoxEl.classList.remove('hidden');
                    const imageMap = isChoseongMode ? koreanChoseongImageMap : koreanMaskedImageMap;
                    quizImageEl.src = imageMap[currentItem.korean] || koreanCardImageMap[currentItem.korean] || '';
                    quizImageEl.alt = `${currentItem.korean} ${isChoseongMode ? '초성' : '마스킹'} 그림`;
                    quizQuestionEl.textContent = isChoseongMode
                        ? '초성 그림의 어휘는 무엇일까요?'
                        : '그림만 보고 어휘를 맞혀 보세요.';
                } else {
                    const allItems = allVocabulary[currentLang].data;
                    const distractors = [];
                    while (distractors.length < 2) {
                        const randomIndex = Math.floor(Math.random() * allItems.length);
                        const randomItem = allItems[randomIndex];
                        if (randomItem.foreign !== currentItem.foreign && !distractors.includes(randomItem.foreign)) {
                            distractors.push(randomItem.foreign);
                        }
                    }

                    correctAnswer = currentItem.foreign;
                    options = [correctAnswer, ...distractors];
                    quizModeLabelEl.textContent = '일반퀴즈';
                    quizModeLabelEl.classList.remove('hidden');
                    quizImageBoxEl.classList.add('hidden');
                    quizImageEl.removeAttribute('src');
                    quizQuestionEl.textContent = currentItem.korean;
                }

                shuffleArray(options);

                quizQuestionNumberEl.textContent = `${currentQuestionIndex + 1} / ${totalQuestions}`;
                quizOptionsEl.innerHTML = '';
                quizFeedbackEl.textContent = '';
                quizComboEl.textContent = (combo > 0) ? `✨ ${combo} 콤보! ✨` : '';

                options.forEach(option => {
                    const optionBtn = document.createElement('button');
                    optionBtn.className = 'w-full px-4 py-4 text-lg font-semibold rounded-lg shadow-md transition-all duration-300 text-gray-800 bg-gray-100 hover:bg-gray-200';
                    optionBtn.textContent = option;
                    optionBtn.addEventListener('click', () => handleAnswer(option, correctAnswer, optionBtn));
                    quizOptionsEl.appendChild(optionBtn);
                });
            }

            function handleAnswer(selectedAnswer, correctAnswer, selectedBtn) {
                const isCorrect = selectedAnswer === correctAnswer;
                Array.from(quizOptionsEl.children).forEach(btn => btn.disabled = true);

                let pointsGained = 0;
                if (isCorrect) {
                    combo++;
                    pointsGained = 10 + combo;
                    totalScore += pointsGained;
                    selectedBtn.classList.remove('bg-gray-100', 'hover:bg-gray-200');
                    selectedBtn.classList.add('bg-green-500', 'text-white');
                    quizFeedbackEl.textContent = '정답입니다! 🎉';
                    quizFeedbackEl.classList.add('correct');
                } else {
                    combo = 0;
                    selectedBtn.classList.remove('bg-gray-100', 'hover:bg-gray-200');
                    selectedBtn.classList.add('bg-red-500', 'text-white');
                    quizFeedbackEl.textContent = `아쉽네요. 정답은 '${correctAnswer}' 입니다.`;
                    quizFeedbackEl.classList.add('wrong');
                    
                    Array.from(quizOptionsEl.children).forEach(btn => {
                        if (btn.textContent === correctAnswer) {
                           btn.classList.remove('bg-gray-100', 'hover:bg-gray-200');
                           btn.classList.add('bg-green-500', 'text-white');
                        }
                    });
                }

                const questionLabel = currentQuizMode === 'choseong'
                    ? `초성퀴즈 ${currentQuestionIndex + 1}`
                    : currentQuizMode === 'image'
                        ? `그림퀴즈 ${currentQuestionIndex + 1}`
                        : currentItemLabel();

                quizResults.push({
                    question: questionLabel,
                    userAnswer: selectedAnswer,
                    correctAnswer,
                    isCorrect,
                    points: pointsGained
                });
                
                setTimeout(() => {
                    currentQuestionIndex++;
                    quizFeedbackEl.classList.remove('correct', 'wrong');
                    showQuizQuestion();
                }, 1500);
            }

            function currentItemLabel() {
                return currentQuizData[currentQuestionIndex]?.korean || '';
            }

            function showQuizResult() {
                showView('result-view');
                resultTitleEl.textContent = currentQuizMode === 'choseong'
                    ? '초성퀴즈 완료!'
                    : currentQuizMode === 'image'
                        ? '그림퀴즈 완료!'
                        : '퀴즈 완료!';
                resultScoreEl.textContent = `총 점수: ${totalScore}점`;
                resultTableBodyEl.innerHTML = '';
                
                quizResults.forEach(result => {
                    const row = document.createElement('tr');
                    const correctClass = result.isCorrect ? 'correct-answer' : 'wrong-answer';
                    row.className = correctClass;
                    
                    row.innerHTML = `
                        <td class="p-3 border-b-2 font-medium">${result.question}</td>
                        <td class="p-3 border-b-2 text-gray-700">${result.correctAnswer}</td>
                        <td class="p-3 border-b-2 font-bold">${result.isCorrect ? 'O' : 'X'}</td>
                        <td class="p-3 border-b-2 text-right">${result.points}점</td>
                    `;
                    resultTableBodyEl.appendChild(row);
                });

                saveQuizResult();
            }

            // Event Listeners
            langButtons.forEach(button => {
                button.addEventListener('click', () => {
                    activateLanguageButton(button.dataset.lang);
                    currentLang = button.dataset.lang;
                    createCardBoard(currentLang);
                    displayLastScore();
                    showView('card-view');
                });
            });

            startQuizBtn.addEventListener('click', () => {
                startQuiz('normal');
            });

            startChoseongQuizBtn.addEventListener('click', () => {
                startQuiz('choseong');
            });

            startImageQuizBtn.addEventListener('click', () => {
                startQuiz('image');
            });

            restartQuizBtn.addEventListener('click', () => {
                startQuiz(currentQuizMode);
            });

            backToCardsBtn.addEventListener('click', () => {
                createCardBoard(currentLang);
                showView('card-view');
            });

            captureBtn.addEventListener('click', () => {
                const buttonsContainer = captureBtn.parentElement;
                buttonsContainer.style.display = 'none';
                
                captureText.textContent = '캡처 중...';
                
                html2canvas(resultContentToCapture, {
                    scale: 2,
                    useCORS: true
                }).then(canvas => {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `quiz_result_${currentQuizMode}_${new Date().toLocaleDateString('ko-KR')}.png`;
                    a.click();
                    
                    buttonsContainer.style.display = 'flex';
                    captureText.textContent = '결과 캡처하기';
                }).catch(err => {
                    console.error("Capture failed:", err);
                    buttonsContainer.style.display = 'flex';
                    captureText.textContent = '결과 캡처하기';
                });
            });

            // Initial setup
            rebuildSessionImageMaps();
            syncImageQuizAvailability();
            activateLanguageButton('korean');
            createCardBoard('korean');
            displayLastScore();
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
