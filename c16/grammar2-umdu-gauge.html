<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>16과 문법 2 보조자료 | 엄두 게이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #fff7ed;
            --paper: #ffffff;
            --paper-soft: #fffaf5;
            --ink: #111827;
            --muted: #64748b;
            --line: #fed7aa;
            --line-strong: #fb923c;
            --accent: #ea580c;
            --accent-dark: #9a3412;
            --blue: #2563eb;
            --blue-soft: #eff6ff;
            --teal: #0f766e;
            --teal-soft: #ecfdf5;
            --rose: #e11d48;
            --rose-soft: #fff1f2;
            --shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", sans-serif;
            background: linear-gradient(180deg, var(--bg) 0%, #f8fafc 58%, #ffffff 100%);
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 46px;
            padding: 0 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            font-size: 13px;
            font-weight: 800;
        }

        .topbar a {
            color: var(--accent);
            text-decoration: none;
        }

        .topbar strong {
            min-width: 0;
            overflow: hidden;
            color: #334155;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .shell {
            width: min(1180px, calc(100% - 20px));
            margin: 0 auto;
            padding: 10px 0 30px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            margin-top: 14px;
            padding: 22px;
            border: 1px solid rgba(251, 146, 60, 0.32);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1,
        h2,
        h3,
        p {
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        h1 {
            margin: 0;
            font-size: 38px;
            line-height: 1.16;
            letter-spacing: 0;
        }

        h2 {
            margin: 0;
            font-size: 22px;
            line-height: 1.3;
            letter-spacing: 0;
        }

        h3 {
            margin: 0;
            font-size: 17px;
            line-height: 1.35;
            letter-spacing: 0;
        }

        .lead {
            max-width: 720px;
            margin: 10px 0 0;
            color: #475569;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.75;
        }

        .hero-meter {
            display: grid;
            grid-template-columns: repeat(3, 112px);
            gap: 8px;
        }

        .meter-chip {
            display: grid;
            gap: 6px;
            min-height: 86px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            text-align: center;
        }

        .meter-chip strong {
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
        }

        .meter-chip span {
            color: #475569;
            font-size: 12px;
            font-weight: 900;
            line-height: 1.35;
        }

        .meter-chip[data-level="0"] strong {
            color: var(--teal);
        }

        .meter-chip[data-level="1"] strong {
            color: var(--blue);
        }

        .meter-chip[data-level="2"] strong {
            color: var(--rose);
        }

        .activity {
            display: grid;
            grid-template-columns: 92px minmax(0, 1fr);
            gap: 10px;
            margin-top: 10px;
            align-items: start;
        }

        .deck {
            display: grid;
            gap: 6px;
        }

        .deck-button {
            display: grid;
            gap: 4px;
            justify-items: center;
            align-items: center;
            width: 100%;
            min-height: 48px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.92);
            color: #334155;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.16s, background 0.16s, transform 0.16s;
        }

        .deck-button:hover {
            border-color: #fdba74;
            background: #fff7ed;
            transform: translateY(-1px);
        }

        .deck-button.is-active {
            border-color: var(--accent);
            background: #ffedd5;
            color: var(--accent-dark);
        }

        .deck-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 8px;
            background: #ffffff;
            color: var(--accent);
            font-size: 12px;
            box-shadow: inset 0 0 0 1px rgba(251, 146, 60, 0.24);
        }

        .deck-button span:last-child {
            display: block;
            width: 100%;
            overflow: hidden;
            font-size: 10px;
            font-weight: 900;
            line-height: 1.15;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 0.84fr) minmax(0, 1.16fr);
            gap: 10px;
            min-width: 0;
        }

        .activity-panel {
            border: 1px solid rgba(251, 146, 60, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--shadow);
        }

        .panel-head {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 16px 0;
        }

        .panel-head__title {
            min-width: 0;
        }

        .panel-head__title p {
            margin: 0 0 7px;
        }

        .panel-head__action {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 36px;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 0 11px;
            background: var(--blue-soft);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .panel-tools {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .view-toggle {
            display: inline-grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            overflow: hidden;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            background: #ffffff;
        }

        .view-toggle__button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 82px;
            min-height: 36px;
            border: 0;
            border-right: 1px solid #fed7aa;
            padding: 0 10px;
            background: transparent;
            color: #9a3412;
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .view-toggle__button:last-child {
            border-right: 0;
        }

        .view-toggle__button.is-active {
            background: #ffedd5;
            color: #c2410c;
        }

        .image-stage {
            padding: 10px 10px 8px;
        }

        .source-image {
            display: block;
            width: 100%;
            aspect-ratio: 42 / 23;
            object-fit: contain;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            cursor: pointer;
        }

        .source-image[hidden] {
            display: none;
        }

        .scene-fallback {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 7px;
            width: 100%;
        }

        .scene-fallback[hidden] {
            display: none;
        }

        .scene-panel {
            display: grid;
            grid-template-rows: 1fr auto;
            min-height: 168px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            text-align: left;
            transition: border-color 0.16s, box-shadow 0.16s, transform 0.16s;
        }

        .scene-panel:hover {
            transform: translateY(-1px);
            border-color: #fdba74;
            box-shadow: 0 14px 26px rgba(15, 23, 42, 0.08);
        }

        .scene-panel.is-selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.2);
        }

        .scene-panel[data-level="0"] .scene-art {
            background: linear-gradient(180deg, #ecfdf5 0%, #ffffff 100%);
        }

        .scene-panel[data-level="1"] .scene-art {
            background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
        }

        .scene-panel[data-level="2"] .scene-art {
            background: linear-gradient(180deg, #fff1f2 0%, #ffffff 100%);
        }

        .scene-art {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 112px;
            padding: 12px;
        }

        .scene-art::before {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 26px;
            height: 8px;
            border-radius: 8px;
            background: rgba(148, 163, 184, 0.2);
        }

        .scene-main-icon {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            color: #334155;
            font-size: 25px;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
        }

        .scene-panel[data-level="0"] .scene-main-icon {
            color: var(--teal);
        }

        .scene-panel[data-level="1"] .scene-main-icon {
            color: var(--blue);
        }

        .scene-panel[data-level="2"] .scene-main-icon {
            color: var(--rose);
        }

        .scene-badge {
            position: absolute;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 8px;
            background: #ffffff;
            color: #475569;
            font-size: 11px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .scene-badge:nth-child(2) {
            top: 18px;
            left: 18px;
        }

        .scene-badge:nth-child(3) {
            top: 28px;
            right: 20px;
        }

        .scene-badge:nth-child(4) {
            bottom: 42px;
            left: 36px;
        }

        .scene-badge:nth-child(5) {
            bottom: 46px;
            right: 34px;
        }

        .scene-caption {
            min-height: 48px;
            padding: 7px;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
        }

        .scene-level {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 20px;
            border-radius: 8px;
            margin-bottom: 4px;
            color: #ffffff;
            font-size: 10px;
            font-weight: 900;
        }

        .scene-panel[data-level="0"] .scene-level {
            background: var(--teal);
        }

        .scene-panel[data-level="1"] .scene-level {
            background: var(--blue);
        }

        .scene-panel[data-level="2"] .scene-level {
            background: var(--rose);
        }

        .scene-caption strong {
            display: block;
            overflow: hidden;
            font-size: 11px;
            font-weight: 900;
            line-height: 1.25;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .scene-caption span:not(.scene-level) {
            display: none;
            margin-top: 3px;
            color: #64748b;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.45;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            padding: 0 10px 10px;
        }

        .level-button {
            display: grid;
            place-items: center;
            min-height: 40px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 6px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.16s, background 0.16s, transform 0.16s;
        }

        .level-button:hover {
            transform: translateY(-1px);
            border-color: #fdba74;
            background: #fff7ed;
        }

        .level-button.is-selected {
            border-color: var(--accent);
            background: #ffedd5;
        }

        .level-button strong {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 13px;
            font-weight: 900;
        }

        .level-button span {
            display: none;
        }

        .output {
            min-width: 0;
        }

        .sentence-panel,
        .drill-panel {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
        }

        .sentence-panel {
            min-height: 100%;
            padding: 14px;
        }

        .result-label {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            border-radius: 8px;
            padding: 0 10px;
            background: #f8fafc;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
        }

        .result-label[data-level="0"] {
            background: var(--teal-soft);
            color: #047857;
        }

        .result-label[data-level="1"] {
            background: var(--blue-soft);
            color: #1d4ed8;
        }

        .result-label[data-level="2"] {
            background: var(--rose-soft);
            color: #be123c;
        }

        .result-sentence {
            margin: 10px 0 0;
            color: #111827;
            font-size: 22px;
            font-weight: 900;
            line-height: 1.42;
        }

        .result-note {
            display: none;
            margin: 12px 0 0;
            color: #64748b;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.7;
        }

        .build-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .build-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            padding: 0 8px;
            background: #fff7ed;
            color: var(--accent-dark);
            font-size: 12px;
            font-weight: 900;
        }

        .drill-panel {
            display: none;
            align-content: space-between;
            gap: 12px;
            padding: 16px;
        }

        .drill-panel p {
            margin: 0;
            color: #475569;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.6;
        }

        .progress-list {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            gap: 5px;
        }

        .progress-dot {
            height: 8px;
            border-radius: 8px;
            background: #e2e8f0;
        }

        .progress-dot.is-seen {
            background: #fdba74;
        }

        .nav-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
            grid-column: 1 / -1;
            margin-top: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 42px;
            border: 1px solid #fdba74;
            border-radius: 8px;
            padding: 0 14px;
            background: #ffffff;
            color: var(--accent-dark);
            cursor: pointer;
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .btn.primary {
            background: var(--accent);
            color: #ffffff;
        }

        .btn.ghost {
            border-color: #cbd5e1;
            color: #475569;
        }

        .footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
            margin-top: 10px;
        }

        .floating-view-toggle {
            position: fixed;
            right: 12px;
            bottom: 12px;
            z-index: 60;
            grid-template-columns: repeat(2, 34px);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        }

        .floating-view-toggle .view-toggle__button {
            min-width: 34px;
            min-height: 34px;
            padding: 0;
        }

        @media (max-width: 940px) {
            .hero,
            .activity {
                grid-template-columns: 1fr;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .hero-meter {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .deck {
                grid-template-columns: repeat(8, minmax(0, 1fr));
            }

            .deck-button {
                grid-template-columns: 1fr;
                min-height: 44px;
                text-align: center;
            }

            .deck-icon {
                margin: 0 auto;
            }
        }

        @media (max-width: 720px) {
            .shell {
                width: min(100% - 16px, 1120px);
                padding-top: 8px;
            }

            .hero {
                padding: 16px;
            }

            h1 {
                font-size: 30px;
            }

            h2 {
                font-size: 20px;
            }

            .lead {
                font-size: 14px;
            }

            .scene-panel {
                min-height: 140px;
            }

            .scene-art {
                min-height: 92px;
            }

            .deck {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            .source-image {
                aspect-ratio: 42 / 25;
            }

            .hero-meter {
                grid-template-columns: 1fr;
            }

            .result-sentence {
                font-size: 20px;
            }
        }
    </style>

</head>

    <main class="shell">

            <div class="workspace">
                <section class="output" aria-live="polite">

                        <p class="result-sentence" id="resultSentence"></p>

                <section class="activity-panel" aria-labelledby="cardTitle">
                    <div class="panel-head">
                        <div class="panel-head__title">
                            <p class="eyebrow" id="cardCategory">Situation</p>
                            <h2 id="cardTitle"></h2>
                        </div>
                        <div class="panel-tools">
                            <span class="panel-head__action" id="cardAction"></span>
                        </div>
                    </div>
                    <div class="image-stage">
                        <img id="sourceImage" class="source-image" alt="" hidden />
                        <div id="sceneFallback" class="scene-fallback"></div>
                    </div>
                    <div id="levelControls" class="control-grid"></div>
                </section>

                <div class="nav-actions">
                    <button class="btn ghost" type="button" id="prevBtn"><i class="fa-solid fa-arrow-left"></i> 이전 카드</button>
                    <button class="btn primary" type="button" id="nextBtn">다음 카드 <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
        </section>

        <div class="view-toggle floating-view-toggle" role="group" aria-label="상황 카드 보기 방식">
            <button class="view-toggle__button" type="button" data-view="image" aria-label="이미지 보기" title="이미지" aria-pressed="true">
                <i class="fa-solid fa-image"></i>
            </button>
            <button class="view-toggle__button" type="button" data-view="icon" aria-label="아이콘 보기" title="아이콘" aria-pressed="false">
                <i class="fa-solid fa-icons"></i>
            </button>
        </div>

        <nav class="footer" aria-label="문법 이동">
            <a class="btn" href="grammar2.html"><i class="fa-solid fa-arrow-left"></i> 문법 2</a>

        <section class="hero">
            <div>

        const levelMeta = [
            { label: '0단계', mode: '할 수 있어요', icon: 'fa-circle-check' },
            { label: '1단계', mode: '하기 어려워요', icon: 'fa-circle-minus' },
            { label: '2단계', mode: '생각도 못 해요', icon: 'fa-ban' }
        ];

        const viewStorageKey = 'c16-grammar2-umdu-gauge-view';

        const state = {
            cardIndex: 0,
            level: 2,
            viewMode: localStorage.getItem(viewStorageKey) === 'icon' ? 'icon' : 'image',
            seen: new Set()
        };

        const deckEl = document.getElementById('deck');
        const cardCategoryEl = document.getElementById('cardCategory');
        const cardTitleEl = document.getElementById('cardTitle');
        const cardActionEl = document.getElementById('cardAction');
        const sourceImageEl = document.getElementById('sourceImage');
        const sceneFallbackEl = document.getElementById('sceneFallback');
        const levelControlsEl = document.getElementById('levelControls');
        const viewButtons = document.querySelectorAll('[data-view]');
        const resultLabelEl = document.getElementById('resultLabel');
        const resultSentenceEl = document.getElementById('resultSentence');
        const resultNoteEl = document.getElementById('resultNote');
        const buildRowEl = document.getElementById('buildRow');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function iconMarkup(name) {
            return `<i class="fa-solid ${name}" aria-hidden="true"></i>`;
        }

        function usesImage(card) {
            return state.viewMode === 'image' && Boolean(card.image);
        }

        function renderViewToggle(card) {
            if (state.viewMode === 'image' && !card.image) {
                state.viewMode = 'icon';
            }

            viewButtons.forEach((button) => {
                const isActive = button.dataset.view === state.viewMode;
                button.classList.toggle('is-active', isActive);
                button.setAttribute('aria-pressed', String(isActive));
                button.disabled = button.dataset.view === 'image' && !card.image;
            });
        }

        function renderDeck() {
            deckEl.innerHTML = cards.map((card, index) => `
                <button class="deck-button ${index === state.cardIndex ? 'is-active' : ''}" type="button" data-card="${index}" aria-label="${card.category} ${card.title}" title="${card.category}: ${card.title}">
                    <span class="deck-icon">${iconMarkup(card.icon)}</span>
                    <span>${card.category}</span>
                </button>
            `).join('');

            deckEl.querySelectorAll('[data-card]').forEach((button) => {
                button.addEventListener('click', () => {
                    state.cardIndex = Number(button.dataset.card);
                    state.level = 2;
                    render();
                });
            });
        }

        function renderImage(card) {
            sourceImageEl.onload = null;
            sourceImageEl.onerror = null;
            sourceImageEl.hidden = true;
            sourceImageEl.removeAttribute('src');

            if (!usesImage(card)) {
                return;
            }

            const cardId = card.id;
            sourceImageEl.alt = `${card.title} 상황 카드`;
            sourceImageEl.onload = () => {
                if (usesImage(card) && cards[state.cardIndex].id === cardId) {
                    sourceImageEl.hidden = false;
                    sceneFallbackEl.hidden = true;
                }
            };
            sourceImageEl.onerror = () => {
                sourceImageEl.hidden = true;
                sceneFallbackEl.hidden = false;
            };
            sourceImageEl.src = card.image;
        }

        function renderScene(card) {
            sceneFallbackEl.innerHTML = card.levels.map((level, index) => {
                const badges = level.icons.slice(1, 5).map((name) => `<span class="scene-badge">${iconMarkup(name)}</span>`).join('');
                return `
                    <button class="scene-panel ${index === state.level ? 'is-selected' : ''}" type="button" data-level="${index}">
                        <span class="scene-art">
                            <span class="scene-main-icon">${iconMarkup(level.icons[0])}</span>
                            ${badges}
                        </span>
                        <span class="scene-caption">
                            <span class="scene-level">${index}</span>
                            <strong>${level.label}</strong>
                            <span>${level.detail}</span>
                        </span>
                    </button>
                `;
            }).join('');

            sceneFallbackEl.querySelectorAll('[data-level]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectLevel(Number(button.dataset.level));
                });
            });

            sceneFallbackEl.hidden = usesImage(card);
        }

        function renderControls(card) {
            levelControlsEl.innerHTML = card.levels.map((level, index) => {
                const meta = levelMeta[index];
                return `
                    <button class="level-button ${index === state.level ? 'is-selected' : ''}" type="button" data-level="${index}" aria-label="${meta.label} ${meta.mode}: ${level.label}" title="${level.label}">
                        <strong>${iconMarkup(meta.icon)} ${index}</strong>
                    </button>
                `;
            }).join('');

            levelControlsEl.querySelectorAll('[data-level]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectLevel(Number(button.dataset.level));
                });
            });
        }

        function renderOutput(card) {
            const level = card.levels[state.level];
            const meta = levelMeta[state.level];
            resultLabelEl.dataset.level = String(state.level);
            resultLabelEl.innerHTML = `${iconMarkup(meta.icon)} ${meta.label} · ${meta.mode}`;
            resultSentenceEl.textContent = level.expression;
            resultNoteEl.textContent = level.note;

            const chips = level.chips || [level.label, card.action, meta.mode];
            buildRowEl.innerHTML = chips.map((chip) => `<span class="build-chip">${chip}</span>`).join('');
        }

        function selectLevel(level) {
            state.level = level;
            state.seen.add(cards[state.cardIndex].id);
            const card = cards[state.cardIndex];
            renderScene(card);
            renderControls(card);
            renderOutput(card);
        }

        function render() {
            const card = cards[state.cardIndex];
            state.seen.add(card.id);
            cardCategoryEl.textContent = card.category;
            cardTitleEl.textContent = card.title;
            cardActionEl.innerHTML = `${iconMarkup('fa-pen')} ${card.action}`;

            renderViewToggle(card);
            renderDeck();
            renderImage(card);
            renderScene(card);
            renderControls(card);
            renderOutput(card);
        }

        prevBtn.addEventListener('click', () => {
            state.cardIndex = (state.cardIndex - 1 + cards.length) % cards.length;
            state.level = 2;
            render();
        });

        nextBtn.addEventListener('click', () => {
            state.cardIndex = (state.cardIndex + 1) % cards.length;
            state.level = 2;
            render();
        });

        sourceImageEl.addEventListener('click', (event) => {
            if (sourceImageEl.hidden) return;
            const rect = sourceImageEl.getBoundingClientRect();
            const ratio = (event.clientX - rect.left) / rect.width;
            const level = Math.max(0, Math.min(2, Math.floor(ratio * 3)));
            selectLevel(level);
        });

        viewButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const nextViewMode = button.dataset.view;
                if (nextViewMode === 'image' && !cards[state.cardIndex].image) return;
                state.viewMode = nextViewMode;
                localStorage.setItem(viewStorageKey, nextViewMode);
                render();
            });
        });

        render();
    </script>
