    <title>16과 문법 4 보조자료 | 베트남 과거와 현재 지도 비교</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #ecfeff;
            --surface: rgba(255, 255, 255, 0.96);
            --ink: #0f172a;
            --muted: #64748b;
            --line: #bae6fd;
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-soft: #dbeafe;
            --green: #059669;
            --green-dark: #047857;
            --green-soft: #dcfce7;
            --amber: #d97706;
            --amber-soft: #fff7ed;
            --shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at 12% 9%, rgba(37, 99, 235, 0.15), transparent 26%),
                radial-gradient(circle at 90% 6%, rgba(16, 185, 129, 0.18), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, var(--bg) 58%, #ffffff 100%);
        }

        button {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 14px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.2);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            font-size: 13px;
            font-weight: 800;
        }

        .topbar a {
            color: var(--blue-dark);
            text-decoration: none;
        }

        .topbar strong {
            min-width: 0;
            overflow: hidden;
            color: #334155;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .shell {
            width: min(1180px, calc(100% - 24px));
            margin: 0 auto;
            padding: 12px 0 32px;
        }

        .panel {
            border: 1px solid rgba(148, 163, 184, 0.42);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .sentence-panel {
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .status-row,
        .chip-row,
        .region-bar,
        .footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .status-row,
        .footer {
            justify-content: space-between;
        }

        .badge,
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            border-radius: 999px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;
        }

        .badge {
            border: 1px solid #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .chip {
            border: 1px solid #bfdbfe;
            background: var(--blue-soft);
            color: #1d4ed8;
        }

        .chip.is-form {
            border-color: #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .sentence {
            margin: 0;
            font-size: clamp(25px, 3.7vw, 40px);
            font-weight: 900;
            line-height: 1.28;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .region-bar {
            overflow-x: auto;
            margin-top: 10px;
            padding-bottom: 2px;
        }

        .region-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: max-content;
            min-height: 34px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 0 11px;
            background: #ffffff;
            color: #1d4ed8;
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .region-button.is-active {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(360px, 0.9fr) minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            margin-top: 12px;
        }

        .map-panel {
            display: grid;
            gap: 8px;
            padding: 10px;
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 28px;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
        }

        .panel-title span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .map-canvas {
            position: relative;
            width: min(100%, 430px);
            aspect-ratio: 1086 / 1448;
            margin: 0 auto;
            overflow: hidden;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            background: #ffffff;
        }

        .map-layer {
            position: absolute;
            inset: 0;
            transform-origin: 0 0;
            transition: transform 220ms ease;
        }

        .map-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            user-select: none;
            pointer-events: none;
        }

        .map-tools {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .zoom-controls {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 3px;
            background: #ffffff;
        }

        .zoom-button {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: 0;
            border-radius: 999px;
            background: #eff6ff;
            color: var(--blue-dark);
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .zoom-button:disabled {
            cursor: default;
            opacity: 0.38;
        }

        .zoom-level {
            min-width: 42px;
            color: #334155;
            font-size: 11px;
            font-weight: 900;
            text-align: center;
        }

        .pin {
            position: absolute;
            left: var(--x);
            top: var(--y);
            z-index: 5;
            display: grid;
            place-items: center;
            width: 25px;
            height: 25px;
            border: 2px solid #ffffff;
            border-radius: 50% 50% 50% 8px;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 9px 18px rgba(15, 23, 42, 0.22);
            transform: translate(-50%, -50%) rotate(-45deg);
            transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
        }

        .pin i {
            font-size: 10px;
            transform: rotate(45deg);
        }

        .pin:hover,
        .pin:focus-visible {
            transform: translate(-50%, -56%) rotate(-45deg) scale(1.08);
            outline: none;
        }

        .pin.is-active {
            z-index: 8;
            background: var(--green);
            transform: translate(-50%, -58%) rotate(-45deg) scale(1.18);
        }

        .pin.is-muted {
            opacity: 0.28;
        }

        .pin-label {
            position: absolute;
            left: calc(var(--x) + 15px);
            top: calc(var(--y) - 10px);
            z-index: 6;
            max-width: 98px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.92);
            color: #1e293b;
            font-size: 11px;
            font-weight: 900;
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .pin.is-active + .pin-label,
        .pin:hover + .pin-label,
        .pin:focus-visible + .pin-label {
            opacity: 1;
            transform: translateY(0);
        }

        .side {
            display: grid;
            gap: 12px;
        }

        .place-card {
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 10px;
            align-items: center;
            padding: 12px;
        }

        .place-icon {
            display: grid;
            place-items: center;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: var(--blue-soft);
            color: var(--blue-dark);
            font-size: 20px;
        }

        .place-card strong {
            display: block;
            font-size: 20px;
            font-weight: 900;
        }

        .place-card span {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .tag-grid,
        .mini-grid {
            display: grid;
            gap: 8px;
        }

        .tag-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .mini-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .tag-button,
        .mini-button {
            min-width: 0;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            text-align: left;
        }

        .tag-button {
            min-height: 62px;
            padding: 9px;
        }

        .tag-tile {
            position: relative;
            min-width: 0;
        }

        .tag-tile .tag-button {
            width: 100%;
            height: 100%;
            padding-right: 40px;
        }

        .map-link,
        .photo-link {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid #fed7aa;
            border-radius: 999px;
            background: #fff7ed;
            color: #c2410c;
            text-decoration: none;
            box-shadow: 0 6px 14px rgba(194, 65, 12, 0.12);
        }

        .photo-link {
            border-color: #c7d2fe;
            background: #eef2ff;
            color: #4338ca;
            box-shadow: 0 6px 14px rgba(67, 56, 202, 0.12);
        }

        .tag-actions {
            position: absolute;
            top: 7px;
            right: 7px;
            display: grid;
            gap: 4px;
        }

        .tag-actions .map-link,
        .tag-actions .photo-link {
            width: 26px;
            height: 26px;
            font-size: 11px;
        }

        .map-link:hover,
        .map-link:focus-visible {
            border-color: #fb923c;
            background: #ffedd5;
            color: #9a3412;
        }

        .photo-link:hover,
        .photo-link:focus-visible {
            border-color: #818cf8;
            background: #e0e7ff;
            color: #3730a3;
        }

        .output-map-link[hidden],
        .output-photo-link[hidden] {
            display: none;
        }

        .era-card {
            display: grid;
            gap: 10px;
            min-height: 190px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 12px;
            background: #ffffff;
        }

        .era-card.is-past {
            background: #fff7ed;
            border-color: #fed7aa;
        }

        .era-card.is-now {
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .era-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 13px;
            font-weight: 900;
        }

        .era-title span {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .era-card p {
            margin: 0;
            color: #334155;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.55;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .era-note {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            font-size: 11px;
            font-weight: 900;
        }

        .tag-button.is-active,
        .mini-button.is-active {
            border-color: var(--green);
            background: #ecfdf5;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
        }

        .tag-button strong,
        .mini-button strong {
            display: block;
            font-size: 13px;
            font-weight: 900;
        }

        .tag-button span,
        .mini-button span {
            display: block;
            margin-top: 4px;
            color: #64748b;
            font-size: 11px;
            font-weight: 800;
        }

        .mini-panel {
            padding: 10px;
        }

        .mini-grid {
            margin-top: 8px;
        }

        .mini-button {
            min-height: 54px;
            padding: 8px;
        }

        .footer {
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 38px;
            border: 1px solid #93c5fd;
            border-radius: 8px;
            padding: 0 12px;
            background: #ffffff;
            color: var(--blue-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .btn.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .map-canvas {
                width: min(100%, 390px);
            }
        }

        @media (max-width: 560px) {
            .shell {
                width: min(100% - 14px, 1180px);
                padding-top: 7px;
            }

            .sentence-panel {
                position: sticky;
                top: 44px;
                z-index: 25;
                padding: 10px;
            }

            .map-canvas {
                width: 100%;
            }

            .pin {
                width: 24px;
                height: 24px;
            }

            .place-card {
                grid-template-columns: 40px 1fr;
                padding: 10px;
            }

            .place-icon {
                width: 40px;
                height: 40px;
            }

            .tag-grid,
            .mini-grid {
                grid-template-columns: 1fr;
            }

            .footer {
                position: sticky;
                bottom: 0;
                z-index: 20;
                border-top: 1px solid rgba(37, 99, 235, 0.18);
                padding: 8px 0;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(10px);
            }
        }
    </style>

            phanrang: { focus: '참 문화와 건조 지대', past: '과거에는 참탑, 포도밭, 소금밭이 있는 건조한 해안 지역으로 알려졌어요.', now: '지금은 풍력·태양광, 해안 여행, 참 문화 관광이 함께 커지고 있어요.' },
            phuyen: { focus: '해안 발견', past: '예전에는 조용한 농어촌 해안과 바위 지형이 중심이었어요.', now: '지금은 현무암 해안, 영화 촬영지, 해변 여행지로 인지도가 높아졌어요.' },
            tuyhoa: { focus: '해안 도시 정비', past: '과거에는 푸옌의 조용한 행정·해안 도시 이미지가 컸어요.', now: '지금은 해안 공원, 공항, 주변 자연 명소를 잇는 거점이 되었어요.' },
            dienbien: { focus: '전투 기억과 산악 도시', past: '과거에는 디엔비엔푸 전투 유적과 산악 분지의 이미지가 강했어요.', now: '지금은 역사 교육, 국경 교류, 북서부 여행의 거점으로 보입니다.' },
            maichau: { focus: '마을 체류 여행', past: '예전에는 산골 마을과 논, 전통 가옥의 생활 풍경이 중심이었어요.', now: '지금은 홈스테이와 트레킹을 즐기는 가까운 산악 휴양지가 되었어요.' },
            mocchau: { focus: '고원 농업과 휴양', past: '과거에는 차밭과 목장이 있는 고원 농업 지역 이미지가 컸어요.', now: '지금은 꽃, 유제품, 글램핑과 산악 휴양이 결합된 여행지가 되었어요.' },
            dalat: { focus: '고원 휴양 도시', past: '예전 달랏은 프랑스풍 건물, 호수, 서늘한 휴양지 이미지가 강했어요.', now: '지금은 카페, 야시장, 농장 체험, 젊은 여행 문화가 활발한 고원 도시예요.' },
            buonmathuot: { focus: '커피 수도', past: '과거에는 커피 농장과 고원 도시의 생활권 이미지가 중심이었어요.', now: '지금은 커피 박물관, 축제, 고원 생태 관광을 내세우는 도시예요.' },
            pleiku: { focus: '고원 생활권', past: '예전에는 호수와 소나무 언덕, 고원 농업이 도시 풍경을 만들었어요.', now: '지금은 커피, 차밭, 고원 문화 관광이 결합된 내륙 도시예요.' },
            chaudoc: { focus: '국경 강변 도시', past: '과거에는 수상 마을과 시장, 삼산 순례가 중심이었어요.', now: '지금은 짜스 숲, 국경 관광, 메콩 문화가 함께 보이는 도시예요.' },
            hatien: { focus: '국경 해안 관문', past: '예전에는 국경 도시와 작은 해안 항구의 분위기가 컸어요.', now: '지금은 섬 여행, 국경 이동, 석회암 산 풍경을 잇는 관문이 되었어요.' }
        };

        const state = {
            region: 'north',
            targetId: 'hanoi',
            tagId: 'oldQuarter',
            zoomIndex: 0
        };

        const regionBar = document.getElementById('regionBar');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapLayer = document.getElementById('mapLayer');
        const pinLayer = document.getElementById('pinLayer');
        const sentenceText = document.getElementById('sentenceText');
        const regionBadge = document.getElementById('regionBadge');
        const placeChip = document.getElementById('placeChip');
        const tagChip = document.getElementById('tagChip');
        const mapAction = document.getElementById('mapAction');
        const photoAction = document.getElementById('photoAction');
        const pinCount = document.getElementById('pinCount');
        const placeIcon = document.getElementById('placeIcon');
        const placeName = document.getElementById('placeName');
        const placeMeta = document.getElementById('placeMeta');
        const tagGrid = document.getElementById('tagGrid');
        const tagCount = document.getElementById('tagCount');
        const nearGrid = document.getElementById('nearGrid');
        const nearCount = document.getElementById('nearCount');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomResetBtn = document.getElementById('zoomResetBtn');
        const zoomLevel = document.getElementById('zoomLevel');
        const zoomSteps = [1, 1.35, 1.7, 2.15, 2.6];

        function hasBatchim(text) {
            const code = text.charCodeAt(text.length - 1);
            if (code < 0xac00 || code > 0xd7a3) return false;
            return (code - 0xac00) % 28 !== 0;
        }

        function jong(text) {
            const code = text.charCodeAt(text.length - 1);
            if (code < 0xac00 || code > 0xd7a3) return 0;
            return (code - 0xac00) % 28;
        }

        function topicParticle(text) {
            return hasBatchim(text) ? '은' : '는';
        }

        function roParticle(text) {
            const final = jong(text);
            return final === 0 || final === 8 ? '로' : '으로';
        }

        function icon(name) {
            return `<i class="fa-solid ${name}" aria-hidden="true"></i>`;
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function getTarget() {
            return targets.find((target) => target.id === state.targetId);
        }

        function filteredTargets() {
            return state.region === 'all'
                ? targets
                : targets.filter((target) => target.region === state.region);
        }

        function regionLabel(id) {
            return regions.find((region) => region.id === id).label;
        }

        function comparisonFor(target) {
            return cityComparisons[target.id] || {
                focus: target.hint,
                past: `20~30년 전 ${target.name}${subjectParticle(target.name)} 지역 생활권과 전통 경관이 더 크게 보이던 도시였어요.`,
                now: `지금은 교통, 관광, 상업 기능이 더해지며 ${regionLabel(target.region)}의 변화가 드러나는 도시예요.`
            };
        }

        function buildSentence(target) {
            const comparison = comparisonFor(target);
            return `${target.name}${topicParticle(target.name)} 20~30년 전의 모습과 지금의 모습을 비교해 볼 수 있어요.`;
        }

        function eraPhotoUrl(target, era) {
            const suffix = era === 'past'
                ? 'Vietnam 1990s old photos city street'
                : 'Vietnam today city skyline street photos';
            return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(`${target.vi} ${suffix}`)}`;
        }

        function eraPhotoLink(target, era) {
            const href = eraPhotoUrl(target, era);
            const label = era === 'past' ? '과거 사진 보기' : '현재 사진 보기';
            const iconName = era === 'past' ? 'fa-clock-rotate-left' : 'fa-image';
            const klass = era === 'past' ? 'map-link' : 'photo-link';
            return `<a class="${klass}" href="${href}" target="_blank" rel="noopener noreferrer" aria-label="${target.name} ${label}" title="${label}"><i class="fa-solid ${iconName}"></i></a>`;
        }

        function updateZoomControls() {
            const scale = zoomSteps[state.zoomIndex];
            zoomLevel.textContent = `${Math.round(scale * 100)}%`;
            zoomOutBtn.disabled = state.zoomIndex === 0;
            zoomInBtn.disabled = state.zoomIndex === zoomSteps.length - 1;
            zoomResetBtn.disabled = state.zoomIndex === 0;
        }

        function updateMapTransform() {
            const scale = zoomSteps[state.zoomIndex];
            const target = getTarget();
            const rect = mapCanvas.getBoundingClientRect();
            let panX = 0;
            let panY = 0;

            if (scale > 1 && rect.width > 0 && rect.height > 0) {
                panX = (rect.width / 2) - ((rect.width * target.x / 100) * scale);
                panY = (rect.height / 2) - ((rect.height * target.y / 100) * scale);
                panX = clamp(panX, rect.width * (1 - scale), 0);
                panY = clamp(panY, rect.height * (1 - scale), 0);
            }

            mapLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            updateZoomControls();
        }

        function setZoomIndex(index) {
            state.zoomIndex = clamp(index, 0, zoomSteps.length - 1);
            updateMapTransform();
        }

        function renderRegions() {
            regionBar.innerHTML = regions.map((region) => `
                <button class="region-button ${region.id === state.region ? 'is-active' : ''}" type="button" data-region="${region.id}">
                    ${icon(region.icon)} ${region.label}
                </button>
            `).join('');

            regionBar.querySelectorAll('[data-region]').forEach((button) => {
                button.addEventListener('click', () => {
                    state.region = button.dataset.region;
                    const list = filteredTargets();
                    if (!list.some((target) => target.id === state.targetId)) {
                        state.targetId = list[0].id;
                    }
                    render();
                });
            });
        }

        function renderPins() {
            const visible = filteredTargets();
            pinLayer.innerHTML = targets.map((target) => {
                const isVisible = state.region === 'all' || target.region === state.region;
                const isActive = target.id === state.targetId;
                return `
                    <button class="pin ${isActive ? 'is-active' : ''} ${isVisible ? '' : 'is-muted'}" type="button" data-target="${target.id}" style="--x:${target.x}%; --y:${target.y}%;" aria-label="${target.name}">
                        ${icon(target.icon)}
                    </button>
                    <span class="pin-label" style="--x:${target.x}%; --y:${target.y}%;">${target.name}</span>
                `;
            }).join('');

            pinLayer.querySelectorAll('[data-target]').forEach((button) => {
                button.addEventListener('click', () => {
                    const target = targets.find((item) => item.id === button.dataset.target);
                    state.targetId = target.id;
                    state.region = target.region;
                    render();
                });
            });

            pinCount.textContent = `${visible.length} / ${targets.length}`;
        }

        function renderTags() {
            const target = getTarget();
            const comparison = comparisonFor(target);
            tagGrid.innerHTML = `
                <article class="era-card is-past">
                    <div class="era-title">
                        <span><i class="fa-solid fa-clock-rotate-left"></i> 20~30년 전</span>
                        ${eraPhotoLink(target, 'past')}
                    </div>
                    <p>${comparison.past}</p>
                    <span class="era-note"><i class="fa-solid fa-magnifying-glass"></i> 과거 사진 검색</span>
                </article>
                <article class="era-card is-now">
                    <div class="era-title">
                        <span><i class="fa-solid fa-camera"></i> 지금</span>
                        ${eraPhotoLink(target, 'now')}
                    </div>
                    <p>${comparison.now}</p>
                    <span class="era-note"><i class="fa-solid fa-magnifying-glass"></i> 현재 사진 검색</span>
                </article>
            `;

            tagCount.textContent = '2개 시점';
        }

        function renderNearPlaces() {
            const target = getTarget();
            const near = targets
                .filter((item) => item.region === target.region && item.id !== target.id)
                .slice(0, 6);

            nearGrid.innerHTML = near.map((item) => `
                <button class="mini-button" type="button" data-near="${item.id}">
                    <strong>${item.name}</strong>
                    <span>${item.hint}</span>
                </button>
            `).join('');

            nearGrid.querySelectorAll('[data-near]').forEach((button) => {
                button.addEventListener('click', () => {
                    const next = targets.find((item) => item.id === button.dataset.near);
                    state.targetId = next.id;
                    state.region = next.region;
                    render();
                });
            });

            nearCount.textContent = `${near.length}곳`;
        }

        function renderOutput() {
            const target = getTarget();
            const comparison = comparisonFor(target);
            sentenceText.textContent = buildSentence(target);
            regionBadge.textContent = regionLabel(target.region);
            placeChip.innerHTML = `${icon(target.icon)} ${target.name}`;
            tagChip.textContent = comparison.focus;
            mapAction.hidden = false;
            mapAction.href = eraPhotoUrl(target, 'past');
            mapAction.setAttribute('aria-label', `${target.name} 과거 사진 보기`);
            photoAction.hidden = false;
            photoAction.href = eraPhotoUrl(target, 'now');
            photoAction.setAttribute('aria-label', `${target.name} 현재 사진 보기`);
            placeIcon.innerHTML = icon(target.icon);
            placeName.textContent = target.name;
            placeMeta.textContent = `${target.vi} · ${target.hint} · ${comparison.focus}`;
        }

        function render() {
            renderRegions();
            renderOutput();
            renderPins();
            renderTags();
            renderNearPlaces();
            updateMapTransform();
        }

        zoomOutBtn.addEventListener('click', () => setZoomIndex(state.zoomIndex - 1));
        zoomInBtn.addEventListener('click', () => setZoomIndex(state.zoomIndex + 1));
        zoomResetBtn.addEventListener('click', () => setZoomIndex(0));
        window.addEventListener('resize', updateMapTransform);

        render();
    </script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
