    <title>16과 문법 4 보조자료 | 한국 과거와 현재 지도 비교</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #eef6f2;
            --surface: rgba(255, 255, 255, 0.96);
            --ink: #0f172a;
            --muted: #64748b;
            --line: #cbd5e1;
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-soft: #dbeafe;
            --green: #059669;
            --green-dark: #047857;
            --green-soft: #dcfce7;
            --amber: #d97706;
            --amber-soft: #fff7ed;
            --shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 62%, #ffffff 100%);
        }

        button {
            font: inherit;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.34);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            font-size: 13px;
            font-weight: 800;
        }

        .topbar a {
            color: #1d4ed8;
            text-decoration: none;
        }

        .topbar strong {
            overflow: hidden;
            color: #0f172a;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .shell {
            width: min(1180px, calc(100% - 24px));
            margin: 0 auto;
            padding: 12px 0 32px;
        }

        .panel {
            border: 1px solid rgba(148, 163, 184, 0.42);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .sentence-panel {
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .status-row,
        .chip-row,
        .region-bar,
        .footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .status-row,
        .footer {
            justify-content: space-between;
        }

        .badge,
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            border-radius: 999px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;
        }

        .badge {
            border: 1px solid #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .chip {
            border: 1px solid #bfdbfe;
            background: var(--blue-soft);
            color: #1d4ed8;
        }

        .chip.is-form {
            border-color: #86efac;
            background: var(--green-soft);
            color: var(--green-dark);
        }

        .sentence {
            margin: 0;
            font-size: clamp(24px, 3.6vw, 39px);
            font-weight: 900;
            line-height: 1.28;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .region-bar {
            overflow-x: auto;
            margin-top: 10px;
            padding-bottom: 2px;
        }

        .region-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: max-content;
            min-height: 34px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 0 11px;
            background: #ffffff;
            color: #1d4ed8;
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .region-button.is-active {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(360px, 0.9fr) minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            margin-top: 12px;
        }

        .map-panel {
            display: grid;
            gap: 8px;
            padding: 10px;
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 28px;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
        }

        .panel-title span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .map-canvas {
            position: relative;
            width: min(100%, 450px);
            aspect-ratio: 1217 / 1500;
            margin: 0 auto;
            overflow: hidden;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            background: #ffffff;
        }

        .map-layer {
            position: absolute;
            inset: 0;
            transform-origin: 0 0;
            transition: transform 220ms ease;
        }

        .map-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        .map-tools {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .zoom-controls {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 3px;
            background: #ffffff;
        }

        .zoom-button {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: 0;
            border-radius: 999px;
            background: #eff6ff;
            color: var(--blue-dark);
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
        }

        .zoom-button:disabled {
            cursor: default;
            opacity: 0.38;
        }

        .zoom-level {
            min-width: 42px;
            color: #334155;
            font-size: 11px;
            font-weight: 900;
            text-align: center;
        }

        .pin {
            position: absolute;
            left: var(--x);
            top: var(--y);
            z-index: 5;
            display: grid;
            place-items: center;
            width: 25px;
            height: 25px;
            border: 2px solid #ffffff;
            border-radius: 50% 50% 50% 8px;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.22);
            transform: translate(-50%, -92%) rotate(-45deg);
        }

        .pin i {
            transform: rotate(45deg);
        }

        .pin.is-active {
            z-index: 8;
            background: #f97316;
            box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.18), 0 10px 20px rgba(15, 23, 42, 0.2);
        }

        .pin.is-muted {
            opacity: 0.32;
        }

        .pin-label {
            position: absolute;
            left: var(--x);
            top: var(--y);
            z-index: 4;
            display: inline-flex;
            max-width: 82px;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 999px;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.92);
            color: #334155;
            font-size: 10px;
            font-weight: 900;
            line-height: 1.2;
            text-align: center;
            transform: translate(-50%, 8px);
            pointer-events: none;
        }

        .side {
            display: grid;
            gap: 10px;
            min-width: 0;
        }

        .place-card {
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 10px;
            align-items: center;
            min-width: 0;
            padding: 12px;
        }

        .place-icon {
            display: grid;
            place-items: center;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: #eff6ff;
            color: var(--blue);
            font-size: 22px;
        }

        .place-card strong {
            display: block;
            font-size: 18px;
            font-weight: 900;
        }

        .place-card span {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .compare-grid,
        .mini-grid {
            display: grid;
            gap: 8px;
        }

        .compare-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .mini-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .era-card {
            display: grid;
            gap: 10px;
            min-height: 188px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 12px;
            background: #ffffff;
        }

        .era-card.is-past {
            background: #fff7ed;
            border-color: #fed7aa;
        }

        .era-card.is-now {
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .era-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 13px;
            font-weight: 900;
        }

        .era-title span {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .era-card p {
            margin: 0;
            color: #334155;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.55;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .era-note {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            font-size: 11px;
            font-weight: 900;
        }

        .photo-link,
        .past-link {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid #fed7aa;
            border-radius: 999px;
            background: #fff7ed;
            color: #c2410c;
            text-decoration: none;
            box-shadow: 0 6px 14px rgba(194, 65, 12, 0.12);
        }

        .photo-link {
            border-color: #c7d2fe;
            background: #eef2ff;
            color: #4338ca;
            box-shadow: 0 6px 14px rgba(67, 56, 202, 0.12);
        }

        .past-link:hover,
        .past-link:focus-visible {
            border-color: #fb923c;
            background: #ffedd5;
            color: #9a3412;
        }

        .photo-link:hover,
        .photo-link:focus-visible {
            border-color: #818cf8;
            background: #e0e7ff;
            color: #3730a3;
        }

        .mini-panel {
            padding: 10px;
        }

        .mini-grid {
            margin-top: 8px;
        }

        .mini-button {
            min-width: 0;
            min-height: 54px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 8px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            text-align: left;
        }

        .mini-button.is-active {
            border-color: var(--green);
            background: #ecfdf5;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
        }

        .mini-button strong {
            display: block;
            font-size: 13px;
            font-weight: 900;
        }

        .mini-button span {
            display: block;
            margin-top: 4px;
            color: #64748b;
            font-size: 11px;
            font-weight: 800;
        }

        .footer {
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 36px;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 0 13px;
            background: #ffffff;
            color: #1d4ed8;
            text-decoration: none;
            font-size: 12px;
            font-weight: 900;
        }

        .btn.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #ffffff;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .map-canvas {
                width: min(100%, 480px);
            }
        }

        @media (max-width: 560px) {
            .shell {
                width: min(100% - 14px, 1180px);
                padding-top: 7px;
            }

            .sentence-panel {
                position: sticky;
                top: 44px;
                z-index: 25;
                padding: 10px;
            }

            .map-canvas {
                width: 100%;
            }

            .pin {
                width: 24px;
                height: 24px;
            }

            .place-card {
                grid-template-columns: 40px 1fr;
                padding: 10px;
            }

            .place-icon {
                width: 40px;
                height: 40px;
            }

            .compare-grid,
            .mini-grid {
                grid-template-columns: 1fr;
            }

            .footer {
                position: sticky;
                bottom: 0;
                z-index: 20;
                border-top: 1px solid rgba(37, 99, 235, 0.18);
                padding: 8px 0;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(10px);
            }
        }
    </style>

        ];

        const cityComparisons = {
            seoul: { focus: '대도시 재구성', past: '20~30년 전 서울은 낮은 상가, 오래된 주거지, 버스와 지하철 중심의 빠른 생활 풍경이 더 크게 보였어요.', now: '지금은 고층 업무지구, 복합 문화공간, 한강변 정비, 디지털 서비스가 결합된 초대형 도시예요.' },
            incheon: { focus: '항구에서 국제 관문으로', past: '과거 인천은 항구, 공단, 원도심 시장의 이미지가 강했어요.', now: '지금은 국제공항, 송도 신도시, 항만 물류와 원도심 재생이 함께 보이는 관문 도시예요.' },
            suwon: { focus: '성곽 도시와 광역 생활권', past: '예전 수원은 화성과 전통 시장, 수도권 남부 생활도시의 느낌이 컸어요.', now: '지금은 광역교통, 반도체 산업권, 신도시 생활권이 함께 커진 도시예요.' },
            chuncheon: { focus: '호수 관광과 교통 변화', past: '20~30년 전 춘천은 호수, 닭갈비 골목, 완행 열차 여행의 이미지가 강했어요.', now: '지금은 ITX, 레저 관광, 카페와 문화 공간이 더해진 수도권 근교 여행지가 되었어요.' },
            gangneung: { focus: '동해 도시의 관광 확장', past: '과거 강릉은 바다, 경포대, 전통시장 중심의 조용한 동해안 도시였어요.', now: '지금은 KTX, 올림픽 유산, 커피 거리와 해변 관광이 결합된 도시예요.' },
            cheongju: { focus: '내륙 거점과 산업', past: '예전 청주는 교육, 인쇄 문화, 내륙 행정 도시의 이미지가 컸어요.', now: '지금은 공항, 바이오 산업, 산업단지가 더해진 충청권 거점 도시예요.' },
            sejong: { focus: '농촌에서 행정중심도시로', past: '20~30년 전 이 지역은 연기군 일대의 농촌과 작은 읍면 생활권에 가까웠어요.', now: '지금은 정부청사, 넓은 도로, 공원과 아파트 단지가 계획적으로 배치된 행정중심도시예요.' },
            daejeon: { focus: '과학 도시의 성장', past: '과거 대전은 철도 교통, 엑스포, 연구단지의 이미지가 강했어요.', now: '지금은 과학벨트, 스타트업, 지하철과 광역 교통이 함께 움직이는 중부권 중심 도시예요.' },
            jeonju: { focus: '한옥마을 관광화', past: '예전 전주는 전통 한옥, 시장, 지역 음식 문화가 생활 속에 남아 있는 도시였어요.', now: '지금은 한옥마을, 음식 관광, 문화 행사로 전국적인 방문지가 되었어요.' },
            gwangju: { focus: '민주 기억과 문화도시', past: '20~30년 전 광주는 원도심, 민주화의 기억, 예술과 교육 도시 이미지가 강했어요.', now: '지금은 국립아시아문화전당, 문화산업, 광역 교통이 더해진 호남의 중심 도시예요.' },
            mokpo: { focus: '항구와 해양 관광', past: '과거 목포는 항구, 여객선, 수산시장과 원도심 언덕길이 먼저 떠오르는 도시였어요.', now: '지금은 KTX, 해상케이블카, 근대역사거리와 섬 관광의 거점으로 바뀌고 있어요.' },
            daegu: { focus: '섬유 산업에서 미래 산업으로', past: '예전 대구는 섬유산업, 서문시장, 더운 분지 도시의 인상이 컸어요.', now: '지금은 의료, 로봇, 미래차, 공연 문화가 함께 성장하는 내륙 대도시예요.' },
            pohang: { focus: '철강 도시의 전환', past: '과거 포항은 제철소, 항만, 산업 도시 이미지가 매우 강했어요.', now: '지금은 철강과 함께 배터리, 해안 관광, 도시 재생이 함께 보이는 도시예요.' },
            ulsan: { focus: '산업 도시와 생태 회복', past: '20~30년 전 울산은 자동차, 조선, 석유화학 공업도시 이미지가 압도적이었어요.', now: '지금은 산업 기반 위에 태화강 국가정원, 수소 산업, 해안 관광이 더해졌어요.' },
            busan: { focus: '항구에서 해양 대도시로', past: '예전 부산은 항구, 자갈치시장, 오래된 산복도로와 해수욕장 풍경이 강했어요.', now: '지금은 마린시티, 북항 재개발, 영화·관광·물류가 결합된 해양 대도시예요.' },
            changwon: { focus: '계획 산업도시의 변화', past: '과거 창원은 넓은 도로와 공단이 계획적으로 배치된 기계산업 도시였어요.', now: '지금은 스마트 제조, 마산·진해 생활권, 해양 관광을 함께 품은 통합 도시예요.' },
            jeju: { focus: '섬 관광의 확장', past: '20~30년 전 제주는 감귤밭, 해안 마을, 신혼여행지 이미지가 강했어요.', now: '지금은 국제 관광, 카페와 숙박 산업, 전기차와 자연 보전 이슈가 함께 보이는 섬이에요.' }
        };

        const state = {
            region: 'capital',
            targetId: 'seoul',
            zoomIndex: 0
        };

        const regionBar = document.getElementById('regionBar');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapLayer = document.getElementById('mapLayer');
        const pinLayer = document.getElementById('pinLayer');
        const sentenceText = document.getElementById('sentenceText');
        const regionBadge = document.getElementById('regionBadge');
        const placeChip = document.getElementById('placeChip');
        const focusChip = document.getElementById('focusChip');
        const pastAction = document.getElementById('pastAction');
        const nowAction = document.getElementById('nowAction');
        const pinCount = document.getElementById('pinCount');
        const placeIcon = document.getElementById('placeIcon');
        const placeName = document.getElementById('placeName');
        const placeMeta = document.getElementById('placeMeta');
        const compareGrid = document.getElementById('compareGrid');
        const nearGrid = document.getElementById('nearGrid');
        const nearCount = document.getElementById('nearCount');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomResetBtn = document.getElementById('zoomResetBtn');
        const zoomLevel = document.getElementById('zoomLevel');
        const zoomSteps = [1, 1.35, 1.7, 2.15, 2.6];

        function hasBatchim(text) {
            const code = text.charCodeAt(text.length - 1);
            if (code < 0xac00 || code > 0xd7a3) return false;
            return (code - 0xac00) % 28 !== 0;
        }

        function topicParticle(text) {
            return hasBatchim(text) ? '은' : '는';
        }

        function icon(name) {
            return `<i class="fa-solid ${name}" aria-hidden="true"></i>`;
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function getTarget() {
            return targets.find((target) => target.id === state.targetId);
        }

        function filteredTargets() {
            return state.region === 'all'
                ? targets
                : targets.filter((target) => target.region === state.region);
        }

        function regionLabel(id) {
            return regions.find((region) => region.id === id).label;
        }

        function comparisonFor(target) {
            return cityComparisons[target.id];
        }

        function buildSentence(target) {
            return `${target.name}${topicParticle(target.name)} 20~30년 전의 모습과 지금의 모습을 비교해 볼 수 있어요.`;
        }

        function eraPhotoUrl(target, era) {
            const suffix = era === 'past'
                ? '1990년대 2000년대 초반 옛날 사진 도시 거리'
                : '현재 도시 풍경 사진';
            return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(`${target.ko} ${suffix}`)}`;
        }

        function eraPhotoLink(target, era) {
            const href = eraPhotoUrl(target, era);
            const label = era === 'past' ? '과거 사진 보기' : '현재 사진 보기';
            const iconName = era === 'past' ? 'fa-clock-rotate-left' : 'fa-image';
            const klass = era === 'past' ? 'past-link' : 'photo-link';
            return `<a class="${klass}" href="${href}" target="_blank" rel="noopener noreferrer" aria-label="${target.name} ${label}" title="${label}"><i class="fa-solid ${iconName}"></i></a>`;
        }

        function updateZoomControls() {
            const scale = zoomSteps[state.zoomIndex];
            zoomLevel.textContent = `${Math.round(scale * 100)}%`;
            zoomOutBtn.disabled = state.zoomIndex === 0;
            zoomInBtn.disabled = state.zoomIndex === zoomSteps.length - 1;
            zoomResetBtn.disabled = state.zoomIndex === 0;
        }

        function updateMapTransform() {
            const scale = zoomSteps[state.zoomIndex];
            const target = getTarget();
            const rect = mapCanvas.getBoundingClientRect();
            let panX = 0;
            let panY = 0;

            if (scale > 1 && rect.width > 0 && rect.height > 0) {
                panX = (rect.width / 2) - ((rect.width * target.x / 100) * scale);
                panY = (rect.height / 2) - ((rect.height * target.y / 100) * scale);
                panX = clamp(panX, rect.width * (1 - scale), 0);
                panY = clamp(panY, rect.height * (1 - scale), 0);
            }

            mapLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            updateZoomControls();
        }

        function setZoomIndex(index) {
            state.zoomIndex = clamp(index, 0, zoomSteps.length - 1);
            updateMapTransform();
        }

        function renderRegions() {
            regionBar.innerHTML = regions.map((region) => `
                <button class="region-button ${region.id === state.region ? 'is-active' : ''}" type="button" data-region="${region.id}">
                    ${icon(region.icon)} ${region.label}
                </button>
            `).join('');

            regionBar.querySelectorAll('[data-region]').forEach((button) => {
                button.addEventListener('click', () => {
                    state.region = button.dataset.region;
                    const list = filteredTargets();
                    if (!list.some((target) => target.id === state.targetId)) {
                        state.targetId = list[0].id;
                    }
                    render();
                });
            });
        }

        function renderPins() {
            const visible = filteredTargets();
            pinLayer.innerHTML = targets.map((target) => {
                const isVisible = state.region === 'all' || target.region === state.region;
                const isActive = target.id === state.targetId;
                return `
                    <button class="pin ${isActive ? 'is-active' : ''} ${isVisible ? '' : 'is-muted'}" type="button" data-target="${target.id}" style="--x:${target.x}%; --y:${target.y}%;" aria-label="${target.name}">
                        ${icon(target.icon)}
                    </button>
                    <span class="pin-label" style="--x:${target.x}%; --y:${target.y}%;">${target.name}</span>
                `;
            }).join('');

            pinLayer.querySelectorAll('[data-target]').forEach((button) => {
                button.addEventListener('click', () => {
                    const target = targets.find((item) => item.id === button.dataset.target);
                    state.targetId = target.id;
                    state.region = target.region;
                    render();
                });
            });

            pinCount.textContent = `${visible.length} / ${targets.length}`;
        }

        function renderCompare() {
            const target = getTarget();
            const comparison = comparisonFor(target);
            compareGrid.innerHTML = `
                <article class="era-card is-past">
                    <div class="era-title">
                        <span><i class="fa-solid fa-clock-rotate-left"></i> 20~30년 전</span>
                        ${eraPhotoLink(target, 'past')}
                    </div>
                    <p>${comparison.past}</p>
                    <span class="era-note"><i class="fa-solid fa-magnifying-glass"></i> 과거 사진 검색</span>
                </article>
                <article class="era-card is-now">
                    <div class="era-title">
                        <span><i class="fa-solid fa-camera"></i> 지금</span>
                        ${eraPhotoLink(target, 'now')}
                    </div>
                    <p>${comparison.now}</p>
                    <span class="era-note"><i class="fa-solid fa-magnifying-glass"></i> 현재 사진 검색</span>
                </article>
            `;
        }

        function renderNearPlaces() {
            const target = getTarget();
            const near = targets
                .filter((item) => item.region === target.region && item.id !== target.id)
                .slice(0, 6);

            nearGrid.innerHTML = near.map((item) => `
                <button class="mini-button" type="button" data-near="${item.id}">
                    <strong>${item.name}</strong>
                    <span>${item.hint}</span>
                </button>
            `).join('');

            nearGrid.querySelectorAll('[data-near]').forEach((button) => {
                button.addEventListener('click', () => {
                    const next = targets.find((item) => item.id === button.dataset.near);
                    state.targetId = next.id;
                    state.region = next.region;
                    render();
                });
            });

            nearCount.textContent = `${near.length}곳`;
        }

        function renderOutput() {
            const target = getTarget();
            const comparison = comparisonFor(target);
            sentenceText.textContent = buildSentence(target);
            regionBadge.textContent = regionLabel(target.region);
            placeChip.innerHTML = `${icon(target.icon)} ${target.name}`;
            focusChip.textContent = comparison.focus;
            pastAction.href = eraPhotoUrl(target, 'past');
            pastAction.setAttribute('aria-label', `${target.name} 과거 사진 보기`);
            nowAction.href = eraPhotoUrl(target, 'now');
            nowAction.setAttribute('aria-label', `${target.name} 현재 사진 보기`);
            placeIcon.innerHTML = icon(target.icon);
            placeName.textContent = target.name;
            placeMeta.textContent = `${target.ko} · ${target.hint} · ${comparison.focus}`;
        }

        function render() {
            renderRegions();
            renderOutput();
            renderPins();
            renderCompare();
            renderNearPlaces();
            updateMapTransform();
        }

        zoomOutBtn.addEventListener('click', () => setZoomIndex(state.zoomIndex - 1));
        zoomInBtn.addEventListener('click', () => setZoomIndex(state.zoomIndex + 1));
        zoomResetBtn.addEventListener('click', () => setZoomIndex(0));
        window.addEventListener('resize', updateMapTransform);

        render();
    </script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
