<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>모양, 형태, 촉감 설명하기 | 16과 어휘 보조자료2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1f2528;
      --muted: #667479;
      --paper: #fffdf8;
      --page: #f4f7f2;
      --line: rgba(31, 37, 40, 0.14);
      --shape: #db5f44;
      --shape-soft: #fff0eb;
      --form: #237f7a;
      --form-soft: #e9f8f5;
      --touch: #8a6d1f;
      --touch-soft: #fff7dc;
      --good: #1f8b4c;
      --bad: #c24137;
      --topbar-height: 44px;
      --bottom-bank-height: 164px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--page);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, #fffdf8 0%, #f4f7f2 42%, #eef5f4 100%);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--topbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      background: rgba(255, 253, 248, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar__links {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .topbar a {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(31, 37, 40, 0.06);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .topbar__title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      font-size: 0.86rem;
      font-weight: 900;
    }

    .title-strip {
      border-bottom: 1px solid rgba(31, 37, 40, 0.08);
      background: rgba(255, 253, 248, 0.7);
    }

    .title-strip__inner {
      width: min(1024px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
    }

    .eyebrow {
      margin: 0 0 2px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.08rem, 2.6vw, 1.7rem);
      line-height: 1.2;
      font-weight: 900;
    }

    .score-pill {
      min-width: 88px;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid rgba(35, 127, 122, 0.2);
      border-radius: 8px;
      background: #effaf7;
      color: #17645f;
      font-weight: 900;
      white-space: nowrap;
    }

    .word-bank {
      z-index: 24;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.96);
      backdrop-filter: blur(14px);
    }

    .word-bank--bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: calc(var(--bottom-bank-height) + var(--safe-bottom));
      display: flex;
      align-items: center;
      padding-bottom: var(--safe-bottom);
      border-top: 1px solid var(--line);
      border-bottom: 0;
      box-shadow: 0 -12px 28px rgba(31, 37, 40, 0.08);
    }

    .word-bank__inner {
      width: min(1024px, 100%);
      margin: 0 auto;
      padding: 8px 12px;
    }

    .bank-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      overflow-x: auto;
      padding: 2px 0;
      border-radius: 10px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .bank-row + .bank-row {
      margin-top: 4px;
    }

    .bank-row::-webkit-scrollbar {
      display: none;
    }

    .bank-row.is-category-guide {
      outline: 2px solid rgba(31, 37, 40, 0.1);
      outline-offset: 3px;
      animation: guideBankPulse 1.65s ease-in-out infinite;
    }

    #shapeBank.is-category-guide {
      background: linear-gradient(90deg, rgba(219, 95, 68, 0.08), transparent 78%);
      outline-color: rgba(219, 95, 68, 0.22);
    }

    #formBank.is-category-guide {
      background: linear-gradient(90deg, rgba(35, 127, 122, 0.08), transparent 78%);
      outline-color: rgba(35, 127, 122, 0.22);
    }

    #touchBank.is-category-guide {
      background: linear-gradient(90deg, rgba(138, 109, 31, 0.09), transparent 78%);
      outline-color: rgba(138, 109, 31, 0.22);
    }

    .bank-label {
      flex: 0 0 auto;
      min-width: 42px;
      padding: 6px 8px;
      border-radius: 8px;
      color: #fff;
      text-align: center;
      font-size: 0.73rem;
      font-weight: 900;
    }

    .bank-label--shape {
      background: var(--shape);
    }

    .bank-label--form {
      background: var(--form);
    }

    .bank-label--touch {
      background: var(--touch);
    }

    .chip {
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
      min-height: 40px;
      min-width: 74px;
      border: 1px solid rgba(31, 37, 40, 0.12);
      border-radius: 8px;
      padding: 0 13px;
      color: var(--ink);
      background: #fff;
      font-size: 0.92rem;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease, color 0.12s ease;
    }

    .chip:active {
      transform: scale(0.97);
    }

    .chip[aria-pressed="true"] {
      color: #fff;
      border-color: transparent;
    }

    .chip[data-category="shape"][aria-pressed="true"] {
      background: var(--shape);
    }

    .chip[data-category="form"][aria-pressed="true"] {
      background: var(--form);
    }

    .chip[data-category="touch"][aria-pressed="true"] {
      background: var(--touch);
    }

    .chip.is-correct {
      outline: 3px solid rgba(31, 139, 76, 0.24);
    }

    .chip.is-wrong {
      outline: 3px solid rgba(194, 65, 55, 0.24);
    }

    .game {
      width: min(1024px, 100%);
      margin: 0 auto;
      padding: 12px 14px calc(var(--bottom-bank-height) + var(--safe-bottom) + 18px);
    }

    .game-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      gap: 12px;
      align-items: stretch;
    }

    .photo-panel,
    .side-panel {
      border: 1px solid rgba(31, 37, 40, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 12px 28px rgba(31, 37, 40, 0.06);
    }

    .photo-panel {
      overflow: hidden;
    }

    .round-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(31, 37, 40, 0.1);
      background: rgba(255, 253, 248, 0.82);
    }

    .round-tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 8px;
      background: #f0f3ed;
      color: #415052;
      font-size: 0.8rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .progress-track {
      position: relative;
      flex: 1 1 auto;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(31, 37, 40, 0.1);
    }

    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 10%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--shape), var(--form), #c4a12e);
      transition: width 0.2s ease;
    }

    .photo-frame {
      position: relative;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(45deg, rgba(31, 37, 40, 0.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(31, 37, 40, 0.04) 25%, transparent 25%),
        #fff;
      background-size: 22px 22px;
      min-height: 300px;
    }

    .photo-frame img {
      display: block;
      width: 100%;
      max-height: min(58vh, 570px);
      object-fit: contain;
      background: #fff;
    }

    .guide-layer,
    .success-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .guide-layer {
      opacity: 0;
      transition: opacity 0.18s ease;
      filter: drop-shadow(0 8px 16px rgba(31, 37, 40, 0.18));
    }

    .photo-panel.is-guided:not(.is-solved) .guide-layer {
      opacity: 1;
    }

    .guide-outline {
      fill: rgba(219, 95, 68, 0.08);
      stroke: var(--shape);
      stroke-width: 1.15;
      stroke-linejoin: round;
      stroke-dasharray: 4 3;
      animation: guideTrace 2.4s ease-in-out infinite;
    }

    .guide-point {
      fill: rgba(35, 127, 122, 0.12);
      stroke: var(--form);
      stroke-width: 1.1;
      transform-box: fill-box;
      transform-origin: center;
      animation: guidePulse 1.55s ease-out infinite;
    }

    .guide-wave {
      fill: none;
      stroke: var(--touch);
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-dasharray: 9 8;
      animation: guideWave 1.35s linear infinite;
    }

    .guide-label {
      paint-order: stroke;
      stroke: rgba(31, 37, 40, 0.82);
      stroke-width: 2.6px;
      stroke-linejoin: round;
      fill: #fff;
      font-size: 4px;
      font-weight: 900;
    }

    .success-layer {
      display: grid;
      place-items: center;
      overflow: hidden;
      opacity: 0;
    }

    .success-badge {
      position: relative;
      z-index: 2;
      min-width: 94px;
      padding: 12px 18px;
      border-radius: 8px;
      background: rgba(31, 37, 40, 0.9);
      color: #fff;
      text-align: center;
      font-size: clamp(1.05rem, 4vw, 1.7rem);
      font-weight: 900;
      box-shadow: 0 18px 36px rgba(31, 37, 40, 0.22);
      transform: scale(0.74);
    }

    .success-ring,
    .success-spark {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 999px;
      transform: translate(-50%, -50%);
    }

    .success-ring {
      width: 80px;
      height: 80px;
      border: 4px solid rgba(31, 139, 76, 0.55);
      opacity: 0;
    }

    .success-spark {
      width: 10px;
      height: 10px;
      background: var(--spark-color, #f3c848);
      opacity: 0;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.72);
    }

    .photo-panel.is-celebrating .photo-frame {
      animation: successGlow 0.9s ease-out;
    }

    .photo-panel.is-celebrating .success-layer {
      animation: successLayer 1.05s ease-out;
    }

    .photo-panel.is-celebrating .success-badge {
      animation: successBadge 0.9s cubic-bezier(0.18, 1.28, 0.32, 1);
    }

    .photo-panel.is-celebrating .success-ring {
      animation: successRing 0.86s ease-out;
    }

    .photo-panel.is-celebrating .success-ring:nth-child(2) {
      animation-delay: 0.08s;
      border-color: rgba(35, 127, 122, 0.42);
    }

    .photo-panel.is-celebrating .success-spark {
      animation: successSpark 0.9s cubic-bezier(0.12, 0.8, 0.28, 1) both;
      animation-delay: calc(var(--i) * 38ms);
    }

    @keyframes guideBankPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(31, 37, 40, 0);
      }
      50% {
        box-shadow: 0 0 0 5px rgba(31, 37, 40, 0.045);
      }
    }

    @keyframes guideTrace {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 14; }
    }

    @keyframes guidePulse {
      0% { opacity: 0.28; transform: scale(0.68); }
      55% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.45); }
    }

    @keyframes guideWave {
      to { stroke-dashoffset: -34; }
    }

    @keyframes successGlow {
      0% { box-shadow: inset 0 0 0 0 rgba(31, 139, 76, 0); }
      42% { box-shadow: inset 0 0 0 8px rgba(31, 139, 76, 0.24); }
      100% { box-shadow: inset 0 0 0 0 rgba(31, 139, 76, 0); }
    }

    @keyframes successLayer {
      0% { opacity: 0; }
      12%, 72% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes successBadge {
      0% { opacity: 0; transform: scale(0.68) translateY(12px); }
      22% { opacity: 1; transform: scale(1.08) translateY(0); }
      64% { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0.92) translateY(-10px); }
    }

    @keyframes successRing {
      0% { opacity: 0.86; transform: translate(-50%, -50%) scale(0.22); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(4.2); }
    }

    @keyframes successSpark {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.25);
      }
      18% {
        opacity: 1;
      }
      82% {
        opacity: 1;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.7);
      }
    }

    .object-name {
      position: absolute;
      left: 10px;
      bottom: 10px;
      max-width: calc(100% - 20px);
      padding: 7px 10px;
      border-radius: 8px;
      background: rgba(31, 37, 40, 0.82);
      color: #fff;
      font-size: 0.84rem;
      font-weight: 900;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .photo-panel.is-solved .object-name {
      opacity: 1;
      transform: translateY(0);
    }

    .side-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100%;
      overflow: hidden;
    }

    .selection-head {
      padding: 12px;
      border-bottom: 1px solid rgba(31, 37, 40, 0.1);
      font-weight: 900;
    }

    .answer-slots {
      display: grid;
      gap: 8px;
      padding: 12px;
      align-content: start;
    }

    .slot {
      min-height: 58px;
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      border: 1px dashed rgba(31, 37, 40, 0.22);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      touch-action: manipulation;
    }

    .slot__label {
      min-width: 42px;
      padding: 5px 7px;
      border-radius: 8px;
      color: #fff;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 900;
    }

    .slot[data-category="shape"] .slot__label {
      background: var(--shape);
    }

    .slot[data-category="form"] .slot__label {
      background: var(--form);
    }

    .slot[data-category="touch"] .slot__label {
      background: var(--touch);
    }

    .slot__value {
      overflow-wrap: break-word;
      word-break: keep-all;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.25;
    }

    .slot.is-filled {
      border-style: solid;
      color: var(--ink);
    }

    .slot.is-correct {
      border-color: rgba(31, 139, 76, 0.52);
      background: #f0fbf4;
    }

    .slot.is-wrong {
      border-color: rgba(194, 65, 55, 0.52);
      background: #fff2f0;
    }

    .feedback {
      min-height: 54px;
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid rgba(31, 37, 40, 0.1);
      background: rgba(255, 253, 248, 0.82);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.42;
    }

    .feedback.is-good {
      color: var(--good);
    }

    .feedback.is-bad {
      color: var(--bad);
    }

    .bottom-layout {
      width: min(1024px, 100%);
      margin: 0 auto;
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
    }

    .bottom-bank-rows {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .bottom-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .action-btn {
      min-height: 42px;
      border: 1px solid rgba(31, 37, 40, 0.12);
      border-radius: 8px;
      padding: 0 13px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .action-btn:disabled {
      color: rgba(31, 37, 40, 0.36);
      background: rgba(31, 37, 40, 0.05);
      cursor: default;
    }

    .action-btn--primary {
      border-color: transparent;
      background: var(--ink);
      color: #fff;
    }

    .action-btn--primary:disabled {
      background: rgba(31, 37, 40, 0.16);
      color: rgba(31, 37, 40, 0.45);
    }

    .desktop-actions {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
      border-top: 1px solid rgba(31, 37, 40, 0.1);
    }

    .compact-status {
      display: none;
      min-height: 32px;
      align-items: center;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    @media (max-width: 820px) {
      :root {
        --bottom-bank-height: 188px;
      }

      .topbar {
        padding: 0 8px;
      }

      .topbar a {
        padding: 0 8px;
        font-size: 0.76rem;
      }

      .topbar__links a:nth-child(2) {
        display: none;
      }

      .title-strip__inner {
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 8px 10px;
      }

      .eyebrow {
        font-size: 0.68rem;
      }

      h1 {
        font-size: 1.05rem;
      }

      .score-pill {
        min-width: 76px;
        min-height: 34px;
        padding: 0 9px;
        font-size: 0.82rem;
      }

      .word-bank__inner {
        padding: 7px 8px;
      }

      .bank-row {
        gap: 6px;
      }

      .bank-label {
        min-width: 38px;
        padding: 6px 7px;
        font-size: 0.68rem;
      }

      .chip {
        min-height: 38px;
        min-width: 66px;
        padding: 0 11px;
        font-size: 0.86rem;
      }

      .game {
        padding: 8px 8px calc(var(--bottom-bank-height) + var(--safe-bottom) + 10px);
      }

      .game-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .photo-frame {
        min-height: 210px;
      }

      .photo-frame img {
        max-height: 36svh;
      }

      .side-panel {
        display: block;
      }

      .selection-head {
        display: none;
      }

      .answer-slots {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
        padding: 8px;
      }

      .slot {
        min-height: 54px;
        grid-template-columns: 1fr;
        gap: 5px;
        padding: 7px;
        text-align: center;
      }

      .slot__label {
        min-width: 0;
        width: 100%;
        font-size: 0.67rem;
        padding: 4px 5px;
      }

      .slot__value {
        font-size: 0.82rem;
        line-height: 1.2;
      }

      .feedback {
        min-height: 36px;
        padding: 8px;
        font-size: 0.8rem;
      }

      .desktop-actions {
        display: none;
      }

      .bottom-layout {
        grid-template-columns: 1fr;
        gap: 7px;
        padding: 7px 8px;
      }

      .bottom-actions {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .action-btn {
        min-height: 40px;
        padding: 0 9px;
        font-size: 0.86rem;
      }

      .compact-status {
        display: none;
      }
    }

    @media (max-width: 380px) {
      :root {
        --bottom-bank-height: 189px;
      }

      .photo-frame {
        min-height: 196px;
      }

      .photo-frame img {
        max-height: 29svh;
      }

      .slot {
        min-height: 50px;
        padding: 6px;
      }

      .slot__value {
        font-size: 0.78rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .guide-outline,
      .guide-point,
      .guide-wave,
      .bank-row.is-category-guide,
      .photo-panel.is-celebrating .photo-frame,
      .photo-panel.is-celebrating .success-layer,
      .photo-panel.is-celebrating .success-badge,
      .photo-panel.is-celebrating .success-ring,
      .photo-panel.is-celebrating .success-spark {
        animation-duration: 0.01ms;
        animation-iteration-count: 1;
      }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NB76SV96" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <nav class="topbar" aria-label="페이지 이동">
    <div class="topbar__links">
      <a href="../index.html">메인</a>
      <a href="index.html">16과</a>
    </div>
    <div class="topbar__title">16과 어휘 보조자료2</div>
    <div class="topbar__links">
      <a href="vocabulary.html">어휘</a>
    </div>
  </nav>

  <header class="title-strip">
    <div class="title-strip__inner">
      <div>
        <p class="eyebrow">모양 · 형태 · 촉감</p>
        <h1>모양, 형태, 촉감 설명하기</h1>
      </div>
      <div id="scorePill" class="score-pill">0 / 10</div>
    </div>
  </header>

  <main class="game">
    <div class="game-grid">
      <section id="photoPanel" class="photo-panel" aria-live="polite">
        <div class="round-bar">
          <span id="roundTag" class="round-tag">1 / 10</span>
          <div class="progress-track" aria-hidden="true">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
        <figure class="photo-frame">
          <img id="roundImage" src="" alt="">
          <svg id="guideLayer" class="guide-layer" viewBox="0 0 100 100" aria-hidden="true">
            <polygon class="guide-outline" points="29,19 77,56 42,78"></polygon>
            <circle class="guide-point" cx="29" cy="19" r="6"></circle>
            <path class="guide-wave" d="M40 39 C48 34, 56 45, 66 39"></path>
            <path class="guide-wave" d="M37 48 C48 42, 58 54, 70 47"></path>
            <path class="guide-wave" d="M40 57 C50 52, 58 63, 67 58"></path>
            <text class="guide-label" x="46" y="27">모양</text>
            <text class="guide-label" x="17" y="17">형태</text>
            <text class="guide-label" x="62" y="69">촉감</text>
          </svg>
          <div class="success-layer" aria-hidden="true">
            <span class="success-ring"></span>
            <span class="success-ring"></span>
            <span class="success-spark" style="--i:0; --x:-112px; --y:-46px; --spark-color:#db5f44;"></span>
            <span class="success-spark" style="--i:1; --x:-72px; --y:-104px; --spark-color:#237f7a;"></span>
            <span class="success-spark" style="--i:2; --x:8px; --y:-124px; --spark-color:#f3c848;"></span>
            <span class="success-spark" style="--i:3; --x:88px; --y:-92px; --spark-color:#8a6d1f;"></span>
            <span class="success-spark" style="--i:4; --x:124px; --y:-18px; --spark-color:#237f7a;"></span>
            <span class="success-spark" style="--i:5; --x:96px; --y:76px; --spark-color:#db5f44;"></span>
            <span class="success-spark" style="--i:6; --x:12px; --y:116px; --spark-color:#f3c848;"></span>
            <span class="success-spark" style="--i:7; --x:-86px; --y:92px; --spark-color:#8a6d1f;"></span>
            <strong class="success-badge">정답!</strong>
          </div>
          <figcaption id="objectName" class="object-name"></figcaption>
        </figure>
      </section>

      <aside class="side-panel" aria-label="선택한 어휘">
        <div class="selection-head">선택한 어휘</div>
        <div class="answer-slots">
          <button class="slot" type="button" data-category="shape">
            <span class="slot__label">모양</span>
            <span class="slot__value">-</span>
          </button>
          <button class="slot" type="button" data-category="form">
            <span class="slot__label">형태</span>
            <span class="slot__value">-</span>
          </button>
          <button class="slot" type="button" data-category="touch">
            <span class="slot__label">촉감</span>
            <span class="slot__value">-</span>
          </button>
        </div>
        <div id="feedback" class="feedback" role="status" aria-live="polite">0 / 3 분류 선택</div>
        <div class="desktop-actions">
          <button id="prevBtn" class="action-btn" type="button">이전</button>
          <button id="clearBtn" class="action-btn" type="button">초기화</button>
          <button id="nextBtn" class="action-btn" type="button">다음</button>
        </div>
      </aside>
    </div>
  </main>

  <section class="word-bank word-bank--bottom" aria-label="모양, 형태, 촉감 어휘와 확인">
    <div class="bottom-layout">
      <div class="bottom-bank-rows">
        <div id="shapeBank" class="bank-row"></div>
        <div id="formBank" class="bank-row"></div>
        <div id="touchBank" class="bank-row"></div>
        <div id="compactStatus" class="compact-status">0 / 3 분류 선택</div>
      </div>
      <div class="bottom-actions">
        <button id="mobilePrevBtn" class="action-btn" type="button">이전</button>
        <button id="checkBtn" class="action-btn action-btn--primary" type="button" disabled>확인</button>
        <button id="mobileNextBtn" class="action-btn" type="button">다음</button>
      </div>
    </div>
  </section>

  <script>
    (() => {
      const assetBase = '../assets/c16/vocabulary/shape-texture-game/';
      const categories = {
        shape: {
          label: '모양',
          words: ['세모', '네모', '동그라미', '마름모']
        },
        form: {
          label: '형태',
          words: ['둥글다', '평평하다', '뾰족하다', '울퉁불퉁하다']
        },
        touch: {
          label: '촉감',
          words: ['딱딱하다', '매끄럽다', '부드럽다', '거칠다']
        }
      };

      const rounds = [
        {
          title: '세모 금속 조각',
          image: 'triangle-metal.webp',
          alt: '세모 모양의 금속 조각',
          answer: { shape: ['세모'], form: ['평평하다', '뾰족하다'], touch: ['딱딱하다', '매끄럽다'] }
        },
        {
          title: '네모 유리 타일',
          image: 'square-glass-tile.webp',
          alt: '네모난 유리 타일',
          answer: { shape: ['네모'], form: ['평평하다'], touch: ['딱딱하다', '매끄럽다'] }
        },
        {
          title: '동그라미 쿠션',
          image: 'circle-cushion.webp',
          alt: '동그라미 모양의 둥근 쿠션',
          answer: { shape: ['동그라미'], form: ['둥글다'], touch: ['부드럽다'] }
        },
        {
          title: '마름모 돌 타일',
          image: 'diamond-stone-tile.webp',
          alt: '마름모 모양의 거친 돌 타일',
          answer: { shape: ['네모', '마름모'], form: ['평평하다', '울퉁불퉁하다'], touch: ['딱딱하다', '거칠다'] }
        },
        {
          title: '세모 현무암 조각',
          image: 'triangle-basalt.webp',
          alt: '세모 모양의 검은 현무암 조각',
          answer: { shape: ['세모'], form: ['뾰족하다', '울퉁불퉁하다'], touch: ['딱딱하다', '거칠다'] }
        },
        {
          title: '둥근 네모 쿠션',
          image: 'rounded-square-cushion.webp',
          alt: '모서리가 둥근 네모 쿠션',
          answer: { shape: ['네모'], form: ['둥글다'], touch: ['부드럽다'] }
        },
        {
          title: '세모 천 조각',
          image: 'triangle-cloth.webp',
          alt: '세모 모양의 천 조각',
          answer: { shape: ['세모'], form: ['평평하다', '뾰족하다'], touch: ['부드럽다'] }
        },
        {
          title: '네모 콘크리트 블록',
          image: 'concrete-block.webp',
          alt: '네모난 콘크리트 블록',
          answer: { shape: ['네모'], form: ['평평하다', '울퉁불퉁하다'], touch: ['딱딱하다', '거칠다'] }
        },
        {
          title: '동그라미 나무 받침',
          image: 'circle-wood-stand.webp',
          alt: '동그라미 모양의 나무 받침',
          answer: { shape: ['동그라미'], form: ['둥글다', '평평하다'], touch: ['딱딱하다', '매끄럽다'] }
        },
        {
          title: '마름모 거울 조각',
          image: 'diamond-mirror.webp',
          alt: '마름모 모양의 거울 조각',
          answer: { shape: ['마름모'], form: ['평평하다', '뾰족하다'], touch: ['딱딱하다', '매끄럽다'] }
        }
      ];

      const state = {
        index: 0,
        selected: { shape: [], form: [], touch: [] },
        solved: new Set(),
        lastChecked: null,
        successTimer: null
      };

      const elements = {
        shapeBank: document.getElementById('shapeBank'),
        formBank: document.getElementById('formBank'),
        touchBank: document.getElementById('touchBank'),
        scorePill: document.getElementById('scorePill'),
        roundTag: document.getElementById('roundTag'),
        progressFill: document.getElementById('progressFill'),
        photoPanel: document.getElementById('photoPanel'),
        roundImage: document.getElementById('roundImage'),
        objectName: document.getElementById('objectName'),
        feedback: document.getElementById('feedback'),
        compactStatus: document.getElementById('compactStatus'),
        checkBtn: document.getElementById('checkBtn'),
        clearBtn: document.getElementById('clearBtn'),
        prevBtn: document.getElementById('prevBtn'),
        nextBtn: document.getElementById('nextBtn'),
        mobilePrevBtn: document.getElementById('mobilePrevBtn'),
        mobileNextBtn: document.getElementById('mobileNextBtn'),
        slots: Array.from(document.querySelectorAll('.slot'))
      };

      function categoryClass(category) {
        return `bank-label bank-label--${category}`;
      }

      function renderBank(container, category) {
        container.innerHTML = '';
        const label = document.createElement('span');
        label.className = categoryClass(category);
        label.textContent = categories[category].label;
        container.appendChild(label);

        categories[category].words.forEach((word) => {
          const button = document.createElement('button');
          button.className = 'chip';
          button.type = 'button';
          button.dataset.category = category;
          button.dataset.word = word;
          button.setAttribute('aria-pressed', 'false');
          button.textContent = word;
          button.addEventListener('click', () => selectWord(category, word));
          container.appendChild(button);
        });
      }

      function renderBanks() {
        renderBank(elements.shapeBank, 'shape');
        renderBank(elements.formBank, 'form');
        renderBank(elements.touchBank, 'touch');
      }

      function selectWord(category, word) {
        const selected = state.selected[category];
        state.selected[category] = selected.includes(word)
          ? selected.filter((item) => item !== word)
          : [...selected, word];
        state.lastChecked = null;
        elements.photoPanel.classList.remove('is-solved');
        elements.feedback.className = 'feedback';
        elements.feedback.textContent = statusText();
        renderSelection();
      }

      function selectedCount() {
        return Object.values(state.selected).reduce((total, words) => total + words.length, 0);
      }

      function selectedCategoryCount() {
        return Object.values(state.selected).filter((words) => words.length > 0).length;
      }

      function isReadyToCheck() {
        return Object.keys(categories).every((category) => state.selected[category].length > 0);
      }

      function statusText() {
        const categoryCount = selectedCategoryCount();
        const wordCount = selectedCount();
        if (categoryCount === 3) {
          return wordCount > 3 ? `복수 선택 완료 · ${wordCount}개` : '선택 완료';
        }
        return `${categoryCount} / 3 분류 선택`;
      }

      function formatWords(words) {
        return words.length ? words.join(' · ') : '-';
      }

      function formatAnswer(category) {
        return formatWords(rounds[state.index].answer[category]);
      }

      function selectedWordsAreAccepted(category) {
        const selected = state.selected[category];
        const accepted = rounds[state.index].answer[category];
        return selected.length > 0 && selected.every((word) => accepted.includes(word));
      }

      function updateGuideState() {
        const guided = state.index === 0 && !state.solved.has(0);
        elements.photoPanel.classList.toggle('is-guided', guided);
        [elements.shapeBank, elements.formBank, elements.touchBank].forEach((bank) => {
          bank.classList.toggle('is-category-guide', guided);
        });
      }

      function triggerSuccessEffect() {
        clearTimeout(state.successTimer);
        elements.photoPanel.classList.remove('is-celebrating');
        void elements.photoPanel.offsetWidth;
        elements.photoPanel.classList.add('is-celebrating');
        state.successTimer = setTimeout(() => {
          elements.photoPanel.classList.remove('is-celebrating');
        }, 1100);
      }

      function updateChipState() {
        document.querySelectorAll('.chip').forEach((chip) => {
          const category = chip.dataset.category;
          const selected = state.selected[category].includes(chip.dataset.word);
          chip.setAttribute('aria-pressed', String(selected));
          chip.classList.remove('is-correct', 'is-wrong');

          if (state.lastChecked && selected) {
            const answer = rounds[state.index].answer[category];
            chip.classList.add(answer.includes(chip.dataset.word) ? 'is-correct' : 'is-wrong');
          }
        });
      }

      function renderSelection() {
        elements.slots.forEach((slot) => {
          const category = slot.dataset.category;
          const value = state.selected[category];
          const valueNode = slot.querySelector('.slot__value');
          valueNode.textContent = formatWords(value);
          slot.classList.toggle('is-filled', value.length > 0);
          slot.classList.remove('is-correct', 'is-wrong');

          if (state.lastChecked && value.length > 0) {
            slot.classList.add(selectedWordsAreAccepted(category) ? 'is-correct' : 'is-wrong');
          }
        });

        elements.checkBtn.disabled = !isReadyToCheck();
        elements.compactStatus.textContent = statusText();
        updateChipState();
      }

      function clearCategory(category) {
        state.selected[category] = [];
        state.lastChecked = null;
        elements.feedback.className = 'feedback';
        elements.feedback.textContent = statusText();
        elements.photoPanel.classList.remove('is-solved');
        renderSelection();
      }

      function clearSelection() {
        state.selected = { shape: [], form: [], touch: [] };
        state.lastChecked = null;
        elements.feedback.className = 'feedback';
        elements.feedback.textContent = '0 / 3 분류 선택';
        elements.photoPanel.classList.remove('is-solved');
        renderSelection();
      }

      function isCorrect() {
        return Object.keys(categories).every((category) => selectedWordsAreAccepted(category));
      }

      function checkAnswer() {
        if (!isReadyToCheck()) return;
        const round = rounds[state.index];
        const correct = isCorrect();
        state.lastChecked = correct ? 'correct' : 'wrong';

        if (correct) {
          state.solved.add(state.index);
          elements.feedback.className = 'feedback is-good';
          elements.feedback.textContent = `좋아요: ${formatWords(state.selected.shape)} + ${formatWords(state.selected.form)} + ${formatWords(state.selected.touch)}`;
          elements.photoPanel.classList.add('is-solved');
          updateGuideState();
          triggerSuccessEffect();
        } else {
          elements.feedback.className = 'feedback is-bad';
          elements.feedback.textContent = '어울리지 않는 말이 섞였어요. 표시된 어휘를 보고 다시 조합하세요.';
          elements.photoPanel.classList.remove('is-solved');
          updateGuideState();
        }

        renderSelection();
        updateScore();
      }

      function updateScore() {
        elements.scorePill.textContent = `${state.solved.size} / ${rounds.length}`;
      }

      function renderRound() {
        const round = rounds[state.index];
        elements.roundTag.textContent = `${state.index + 1} / ${rounds.length}`;
        elements.progressFill.style.width = `${((state.index + 1) / rounds.length) * 100}%`;
        elements.roundImage.src = `${assetBase}${round.image}`;
        elements.roundImage.alt = round.alt;
        elements.objectName.textContent = round.title;

        clearTimeout(state.successTimer);
        elements.photoPanel.classList.remove('is-celebrating');
        elements.photoPanel.classList.toggle('is-solved', state.solved.has(state.index));
        updateGuideState();
        state.selected = { shape: [], form: [], touch: [] };
        state.lastChecked = null;

        if (state.solved.has(state.index)) {
          elements.feedback.className = 'feedback is-good';
          elements.feedback.textContent = '이미 맞힌 사진입니다.';
        } else {
          elements.feedback.className = 'feedback';
          elements.feedback.textContent = '0 / 3 분류 선택';
        }

        renderSelection();
        updateScore();
      }

      function moveRound(delta) {
        state.index = (state.index + delta + rounds.length) % rounds.length;
        renderRound();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      elements.slots.forEach((slot) => {
        slot.addEventListener('click', () => clearCategory(slot.dataset.category));
      });

      elements.checkBtn.addEventListener('click', checkAnswer);
      elements.clearBtn.addEventListener('click', clearSelection);
      elements.prevBtn.addEventListener('click', () => moveRound(-1));
      elements.nextBtn.addEventListener('click', () => moveRound(1));
      elements.mobilePrevBtn.addEventListener('click', () => moveRound(-1));
      elements.mobileNextBtn.addEventListener('click', () => moveRound(1));

      renderBanks();
      renderRound();
    })();
  </script>
  <script src="../shared/site-copyright.js"></script>
</body>
